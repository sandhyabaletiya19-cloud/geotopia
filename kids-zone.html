                    <div class="factory-scene">
                        <div class="category-tabs">
                            <button class="cat-tab ${c==='oceanLand'?'active':''}" onclick="changeCat('oceanLand')">🌊 Ocean/Land</button>
                            <button class="cat-tab ${c==='riverMountain'?'active':''}" onclick="changeCat('riverMountain')">⛰️ River/Mountain</button>
                            <button class="cat-tab ${c==='birdAnimal'?'active':''}" onclick="changeCat('birdAnimal')">🦁 Bird/Animal</button>
                        </div>
                        <div class="combo-badge ${S.data.combo >= 3 ? 'show' : ''}" id="comboBadge">🔥 ${S.data.combo}x Combo!</div>
                        <div class="conveyor"></div>
                        <div class="sort-item" id="sortItem">${item.n}</div>
                        <div class="sort-bins">
                            <div class="sort-bin ${b1.t}" onclick="sortTo('${b1.t}')">
                                <div class="sort-bin-icon">${b1.i}</div>
                                <div class="sort-bin-label">${b1.l}</div>
                            </div>
                            <div class="sort-bin ${b2.t}" onclick="sortTo('${b2.t}')">
                                <div class="sort-bin-icon">${b2.i}</div>
                                <div class="sort-bin-label">${b2.l}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function changeCat(cat) {
            Audio.click();
            S.data.cat = cat;
            S.used = new Set();
            S.q = 0;
            S.score = 0;
            loadFactoryItems();
            renderFactoryQ();
        }

        function sortTo(type) {
            Audio.click();
            const item = S.data.current;
            const itemEl = document.getElementById('sortItem');

            if (type === item.t) {
                Audio.correct();
                itemEl.style.background = '#7ED957';
                S.data.combo++;
                const pts = 10 + (S.data.combo >= 3 ? S.data.combo * 2 : 0);
                S.score += pts;
                if (S.data.combo >= 3) {
                    document.getElementById('comboBadge').textContent = `🔥 ${S.data.combo}x Combo! +${pts}`;
                    document.getElementById('comboBadge').classList.add('show');
                }
            } else {
                Audio.wrong();
                itemEl.style.background = '#FF5252';
                S.data.combo = 0;
                document.getElementById('comboBadge').classList.remove('show');
            }

            S.q++;
            setTimeout(renderFactoryQ, 800);
        }

        // ==================== 🚩 FLAGS QUIZ ====================
        function startFlags() {
            S.total = 10;
            renderFlagQ();
        }

        function renderFlagQ() {
            const available = COUNTRIES.filter((_, i) => !S.used.has(i));
            if (available.length < 4 || S.q >= S.total) { showResults(); return; }

            const correct = available[Math.floor(Math.random() * available.length)];
            S.used.add(COUNTRIES.indexOf(correct));

            const wrong = shuffle(available.filter(c => c !== correct)).slice(0, 3);
            const options = shuffle([correct.n, ...wrong.map(c => c.n)]);
            S.data = { correct, options };

            const scr = document.getElementById('gameScreen');
            scr.innerHTML = `
                <div class="game-bar">
                    <div class="game-bar-left">
                        <button class="game-back" onclick="goHome()">⬅️</button>
                        <div class="game-bar-title"><span>🚩</span> Flag Quiz</div>
                    </div>
                    <div class="game-bar-right">
                        <div class="game-stat-box"><span>⭐</span><span id="flagScore">${S.score}</span></div>
                        <div class="game-stat-box"><span>📝</span><span>${S.q + 1}/${S.total}</span></div>
                    </div>
                </div>
                <div class="progress-wrap"><div class="progress-track"><div class="progress-bar" style="width:${(S.q/S.total)*100}%"></div></div></div>
                <div class="game-area">
                    <div style="text-align:center">
                        <p style="font-size:22px;color:#333;margin-bottom:15px">Which country has this flag?</p>
                        <div class="flag-display">
                            <img src="${flag(correct.f)}" onerror="this.src='https://via.placeholder.com/260x170?text=Flag'">
                        </div>
                        <div class="quiz-options">
                            ${options.map(o => `<button class="quiz-btn" onclick="answerFlag('${o.replace(/'/g,"\\'")}',this)">${o}</button>`).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function answerFlag(ans, el) {
            Audio.click();
            document.querySelectorAll('.quiz-btn').forEach(b => b.style.pointerEvents = 'none');
            
            if (ans === S.data.correct.n) {
                Audio.correct();
                el.classList.add('correct');
                S.score += 10;
                toast(true, 'Correct! 🎉');
            } else {
                Audio.wrong();
                el.classList.add('wrong');
                document.querySelectorAll('.quiz-btn').forEach(b => { if (b.textContent === S.data.correct.n) b.classList.add('correct'); });
                toast(false, S.data.correct.n);
            }
            S.q++;
            setTimeout(renderFlagQ, 1500);
        }

        // ==================== 🏛️ CAPITALS ====================
        function startCapitals() {
            S.total = 10;
            renderCapQ();
        }

        function renderCapQ() {
            const available = COUNTRIES.filter((_, i) => !S.used.has(i));
            if (available.length < 4 || S.q >= S.total) { showResults(); return; }

            const correct = available[Math.floor(Math.random() * available.length)];
            S.used.add(COUNTRIES.indexOf(correct));

            const wrong = shuffle(available.filter(c => c !== correct)).slice(0, 3);
            const options = shuffle([correct.c, ...wrong.map(c => c.c)]);
            S.data = { correct, options };

            const scr = document.getElementById('gameScreen');
            scr.innerHTML = `
                <div class="game-bar">
                    <div class="game-bar-left">
                        <button class="game-back" onclick="goHome()">⬅️</button>
                        <div class="game-bar-title"><span>🏛️</span> Capital Quest</div>
                    </div>
                    <div class="game-bar-right">
                        <div class="game-stat-box"><span>⭐</span><span>${S.score}</span></div>
                        <div class="game-stat-box"><span>📝</span><span>${S.q + 1}/${S.total}</span></div>
                    </div>
                </div>
                <div class="progress-wrap"><div class="progress-track"><div class="progress-bar" style="width:${(S.q/S.total)*100}%"></div></div></div>
                <div class="game-area">
                    <div style="text-align:center">
                        <div style="margin-bottom:20px">
                            <img src="${flag(correct.f)}" style="width:80px;height:50px;border-radius:8px;box-shadow:0 5px 15px rgba(0,0,0,0.2)">
                        </div>
                        <p style="font-size:28px;color:#333;margin-bottom:8px;font-weight:bold">${correct.n}</p>
                        <p style="font-size:20px;color:#666;margin-bottom:25px">What is the capital?</p>
                        <div class="quiz-options">
                            ${options.map(o => `<button class="quiz-btn" onclick="answerCap('${o.replace(/'/g,"\\'")}',this)">🏛️ ${o}</button>`).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function answerCap(ans, el) {
            Audio.click();
            document.querySelectorAll('.quiz-btn').forEach(b => b.style.pointerEvents = 'none');
            
            if (ans === S.data.correct.c) {
                Audio.correct();
                el.classList.add('correct');
                S.score += 10;
                toast(true, 'Correct! 🎉');
            } else {
                Audio.wrong();
                el.classList.add('wrong');
                document.querySelectorAll('.quiz-btn').forEach(b => { if (b.textContent.includes(S.data.correct.c)) b.classList.add('correct'); });
                toast(false, S.data.correct.c);
            }
            S.q++;
            setTimeout(renderCapQ, 1500);
        }

        // ==================== 🎯 TARGET SHOOT ====================
        function startShoot() {
            S.total = 10;
            renderShootQ();
        }

        function renderShootQ() {
            const available = COUNTRIES.filter((_, i) => !S.used.has(i));
            if (available.length < 5 || S.q >= S.total) { showResults(); return; }

            const correct = available[Math.floor(Math.random() * available.length)];
            S.used.add(COUNTRIES.indexOf(correct));

            const wrong = shuffle(available.filter(c => c !== correct)).slice(0, 4);
            const targets = shuffle([correct, ...wrong]);
            S.data = { correct };

            const positions = [
                {x: 20, y: 35}, {x: 50, y: 25}, {x: 80, y: 35},
                {x: 35, y: 55}, {x: 65, y: 55}
            ];

            const scr = document.getElementById('gameScreen');
            scr.innerHTML = `
                <div class="game-bar">
                    <div class="game-bar-left">
                        <button class="game-back" onclick="goHome()">⬅️</button>
                        <div class="game-bar-title"><span>🎯</span> Target Shoot</div>
                    </div>
                    <div class="game-bar-right">
                        <div class="game-stat-box"><span>⭐</span><span id="shootScore">${S.score}</span></div>
                        <div class="game-stat-box"><span>📝</span><span>${S.q + 1}/${S.total}</span></div>
                    </div>
                </div>
                <div class="progress-wrap"><div class="progress-track"><div class="progress-bar" style="width:${(S.q/S.total)*100}%"></div></div></div>
                <div class="game-area" style="padding:0">
                    <div class="shoot-game-area">
                        <div class="target-question">🎯 Hit: <strong>${correct.n}</strong></div>
                        ${targets.map((t, i) => `
                            <div class="shoot-target" style="left:${positions[i].x}%;top:${positions[i].y}%;animation-delay:${i*0.2}s" onclick="shootTarget(this,'${t.n.replace(/'/g,"\\'")}')">
                                <div class="target-circle">
                                    <img src="${flag(t.f)}" style="width:50px;height:32px;border-radius:4px;position:relative;z-index:5">
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function shootTarget(el, country) {
            Audio.click();
            document.querySelectorAll('.shoot-target').forEach(t => t.style.pointerEvents = 'none');

            if (country === S.data.correct.n) {
                Audio.correct();
                el.classList.add('hit');
                S.score += 10;
                toast(true, 'HIT! 🎯');
            } else {
                Audio.wrong();
                el.classList.add('miss');
                toast(false, `Target: ${S.data.correct.n}`);
            }
            S.q++;
            setTimeout(renderShootQ, 1200);
        }

        // ==================== 🏃 GEO RUNNER (SIMPLE) ====================
        function startRunner() {
            S.data = { score: 0, playing: true, speed: 2000 };
            renderRunner();
            runnerLoop();
        }

        function renderRunner() {
            const scr = document.getElementById('gameScreen');
            scr.innerHTML = `
                <div class="game-bar">
                    <div class="game-bar-left">
                        <button class="game-back" onclick="S.data.playing=false;goHome()">⬅️</button>
                        <div class="game-bar-title"><span>🏃</span> Geo Runner</div>
                    </div>
                    <div class="game-bar-right">
                        <div class="game-stat-box"><span>⭐</span><span id="runScore">${S.data.score}</span></div>
                    </div>
                </div>
                <div class="game-area" style="padding:0">
                    <div class="runner-game-area" id="runnerArea" onclick="runnerJump()">
                        <div class="runner-ground"></div>
                        <div class="jump-grass"></div>
                        <div class="runner-player" id="runner">🦊</div>
                        <div style="position:absolute;top:20px;left:50%;transform:translateX(-50%);background:white;padding:10px 25px;border-radius:20px;font-size:18px">
                            👆 Tap to jump & collect correct items!
                        </div>
                    </div>
                </div>
            `;
        }

        function runnerLoop() {
            if (!S.data.playing) return;
            
            const items = [...EASY_WORDS.slice(0, 10), ...ANIMALS.slice(0, 10).map(a => ({w: a, e: '🦁', c: 'Animal'}))];
            const item = items[Math.floor(Math.random() * items.length)];
            
            const area = document.getElementById('runnerArea');
            if (!area) return;

            const collectible = document.createElement('div');
            collectible.className = 'runner-collectible';
            collectible.textContent = item.e || '🌟';
            collectible.style.bottom = (100 + Math.random() * 150) + 'px';
            collectible.style.animationDuration = S.data.speed + 'ms';
            collectible.onclick = (e) => {
                e.stopPropagation();
                Audio.correct();
                S.data.score += 5;
                document.getElementById('runScore').textContent = S.data.score;
                collectible.remove();
            };
            area.appendChild(collectible);

            collectible.addEventListener('animationend', () => collectible.remove());

            setTimeout(runnerLoop, 800 + Math.random() * 500);
        }

        function runnerJump() {
            const runner = document.getElementById('runner');
            if (runner.classList.contains('jumping')) return;
            Audio.click();
            runner.classList.add('jumping');
            setTimeout(() => runner.classList.remove('jumping'), 600);
        }

        // ==================== 🧩 WORD PUZZLE ====================
        function startPuzzle() {
            S.total = 10;
            renderPuzzleQ();
        }

                function renderPuzzleQ() {
            const words = S.age === 'young' ? EASY_WORDS : [...EASY_WORDS, ...MEDIUM_WORDS];
            const available = words.filter((_, i) => !S.used.has(i));
            if (!available.length || S.q >= S.total) { showResults(); return; }

            const wordObj = available[Math.floor(Math.random() * available.length)];
            const idx = words.indexOf(wordObj);
            S.used.add(idx);

            const word = wordObj.w;
            const letters = word.split('');
            const extra = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').filter(l => !word.includes(l));
            const allPieces = shuffle([...letters, ...shuffle(extra).slice(0, Math.min(4, 8 - letters.length))]);

            S.data = { word, wordObj, letters, filled: [], usedPieces: new Set() };

            const scr = document.getElementById('gameScreen');
            scr.innerHTML = `
                <div class="game-bar">
                    <div class="game-bar-left">
                        <button class="game-back" onclick="goHome()">⬅️</button>
                        <div class="game-bar-title"><span>🧩</span> Word Puzzle</div>
                    </div>
                    <div class="game-bar-right">
                        <div class="game-stat-box"><span>⭐</span><span id="puzzleScore">${S.score}</span></div>
                        <div class="game-stat-box"><span>📝</span><span>${S.q + 1}/${S.total}</span></div>
                    </div>
                </div>
                <div class="progress-wrap"><div class="progress-track"><div class="progress-bar" style="width:${(S.q/S.total)*100}%"></div></div></div>
                <div class="game-area">
                    <div class="puzzle-game-area">
                        <div style="text-align:center;font-size:70px;margin-bottom:15px">${wordObj.e}</div>
                        <p class="puzzle-question">Spell: <strong>${wordObj.c}</strong></p>
                        
                        <div class="puzzle-grid" id="puzzleSlots">
                            ${letters.map((l, i) => `<div class="puzzle-slot" id="slot${i}" data-idx="${i}"></div>`).join('')}
                        </div>
                        
                        <div class="puzzle-pieces" id="puzzlePieces">
                            ${allPieces.map((l, i) => `
                                <div class="puzzle-piece" id="piece${i}" data-letter="${l}" onclick="clickPiece(${i},'${l}')">${l}</div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function clickPiece(pieceIdx, letter) {
            if (S.data.usedPieces.has(pieceIdx)) return;
            
            Audio.click();
            const currentSlotIdx = S.data.filled.length;
            const correctLetter = S.data.word[currentSlotIdx];

            if (letter === correctLetter) {
                // Correct piece
                Audio.correct();
                
                const slot = document.getElementById(`slot${currentSlotIdx}`);
                slot.textContent = letter;
                slot.classList.add('filled');
                
                const piece = document.getElementById(`piece${pieceIdx}`);
                piece.classList.add('used');
                
                S.data.filled.push(letter);
                S.data.usedPieces.add(pieceIdx);

                // Check if word complete
                if (S.data.filled.length === S.data.word.length) {
                    S.score += 10;
                    S.q++;
                    toast(true, 'Great! 🧩');
                    setTimeout(renderPuzzleQ, 1200);
                }
            } else {
                // Wrong piece - shake it
                Audio.wrong();
                const piece = document.getElementById(`piece${pieceIdx}`);
                piece.style.animation = 'none';
                piece.offsetHeight; // Trigger reflow
                piece.style.animation = 'shake 0.4s ease';
                setTimeout(() => piece.style.animation = '', 400);
            }
        }

        // ==================== TOAST ====================
        function toast(isCorrect, msg) {
            const t = document.getElementById('toast');
            t.className = `toast show ${isCorrect ? 'correct' : 'wrong'}`;
            document.getElementById('toastEmoji').textContent = isCorrect ? '🎉' : '😅';
            document.getElementById('toastText').textContent = msg;
            setTimeout(() => t.classList.remove('show'), 1200);
        }

        // ==================== RESULTS ====================
        function showResults() {
            Audio.win();
            confetti();

            let pct = Math.min(100, Math.max(0, Math.round((S.score / (S.total * 10)) * 100)));
            
            // Handle special games
            if (S.game === 'rocket') pct = S.data.found?.size === 10 ? 100 : Math.round((S.data.found?.size || 0) * 10);
            if (S.game === 'memory') pct = Math.min(100, S.score);
            if (S.game === 'catch') pct = Math.min(100, S.data.caught * 10);
            if (S.game === 'runner') { S.score = S.data.score; pct = Math.min(100, S.score); }

            const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
            const coins = pct >= 90 ? 20 : pct >= 70 ? 10 : 5;
            const mascot = pct >= 90 ? '🏆' : pct >= 70 ? '🌟' : '👍';
            const title = pct >= 90 ? 'AMAZING!' : pct >= 70 ? 'Great Job!' : 'Good Try!';
            const msg = pct >= 90 ? "You're a superstar!" : pct >= 70 ? "Keep it up!" : "Practice makes perfect!";

            S.coins += coins;
            save();
            updateUI();

            const scr = document.getElementById('gameScreen');
            scr.innerHTML = `
                <div class="result-screen active">
                    <div class="result-mascot">${mascot}</div>
                    <h1 class="result-title">${title}</h1>
                    <p class="result-msg">${msg}</p>
                    
                    <div class="result-stars">
                        <span class="result-star ${stars >= 1 ? 'earned' : ''}">⭐</span>
                        <span class="result-star ${stars >= 2 ? 'earned' : ''}">⭐</span>
                        <span class="result-star ${stars >= 3 ? 'earned' : ''}">⭐</span>
                    </div>
                    
                    <div class="result-stats">
                        <div class="result-stat">
                            <div class="result-stat-val">${S.score}</div>
                            <div class="result-stat-lbl">Score</div>
                        </div>
                        <div class="result-stat">
                            <div class="result-stat-val">${pct}%</div>
                            <div class="result-stat-lbl">Accuracy</div>
                        </div>
                    </div>
                    
                    <div class="result-coins">
                        <span>🪙</span>
                        <span>+${coins} Coins!</span>
                    </div>
                    
                    <div class="result-btns">
                        <button class="result-btn primary" onclick="replay()">🔄 Play Again</button>
                        <button class="result-btn secondary" onclick="goHome()">🏠 Home</button>
                    </div>
                </div>
            `;
        }

        function replay() {
            Audio.click();
            S.score = 0;
            S.q = 0;
            S.used = new Set();
            openGame(S.game);
        }

        // ==================== CONFETTI ====================
        function confetti() {
            const box = document.getElementById('confettiBox');
            box.innerHTML = '';
            
            const emojis = ['🎉', '🎊', '⭐', '🌟', '✨', '🎈', '🪙', '🏆', '🥳', '💫'];
            const colors = ['#FF6B9D', '#4ECDC4', '#FFE66D', '#A06CD5', '#FF8C42', '#7ED957', '#00d2ff', '#f5576c'];

            for (let i = 0; i < 50; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                const isEmoji = Math.random() > 0.6;
                
                if (isEmoji) {
                    piece.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    piece.style.fontSize = (15 + Math.random() * 20) + 'px';
                } else {
                    piece.style.width = (8 + Math.random() * 8) + 'px';
                    piece.style.height = (8 + Math.random() * 8) + 'px';
                    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                }
                
                piece.style.left = Math.random() * 100 + '%';
                piece.style.animationDuration = (2 + Math.random() * 2) + 's';
                piece.style.animationDelay = Math.random() * 0.8 + 's';
                
                box.appendChild(piece);
            }

            setTimeout(() => box.innerHTML = '', 4000);
        }

        // ==================== CONSOLE LOG ====================
        console.log('🌍 GEOTOPIA Kids Zone Loaded!');
        console.log(`📊 ${COUNTRIES.length} countries, ${RIVERS.length} rivers, ${MOUNTAINS.length} mountains`);
        console.log(`🐦 ${BIRDS.length} birds, 🦁 ${ANIMALS.length} animals`);
        console.log(`📝 ${EASY_WORDS.length} easy words, ${MEDIUM_WORDS.length} medium words`);
    </script>
</body>
</html>
