<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEOTOPIA - Kids Zone (3-12 Years)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-pink: #FF6B9D;
            --primary-blue: #4ECDC4;
            --primary-yellow: #FFE66D;
            --primary-purple: #A06CD5;
            --primary-orange: #FF8C42;
            --primary-green: #7ED957;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 50%, #d299c2 100%);
            overflow-x: hidden;
        }

        /* ==================== ANIMATED BACKGROUND ==================== */
        .bg-decorations {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
            opacity: 0.6;
        }

        .bubble:nth-child(1) { width: 80px; height: 80px; background: rgba(255,107,157,0.3); left: 10%; animation-delay: 0s; }
        .bubble:nth-child(2) { width: 60px; height: 60px; background: rgba(78,205,196,0.3); left: 20%; animation-delay: 1s; }
        .bubble:nth-child(3) { width: 100px; height: 100px; background: rgba(255,230,109,0.3); left: 35%; animation-delay: 2s; }
        .bubble:nth-child(4) { width: 50px; height: 50px; background: rgba(160,108,213,0.3); left: 50%; animation-delay: 3s; }
        .bubble:nth-child(5) { width: 70px; height: 70px; background: rgba(255,140,66,0.3); left: 65%; animation-delay: 4s; }
        .bubble:nth-child(6) { width: 90px; height: 90px; background: rgba(126,217,87,0.3); left: 80%; animation-delay: 5s; }
        .bubble:nth-child(7) { width: 55px; height: 55px; background: rgba(255,107,157,0.3); left: 90%; animation-delay: 6s; }
        .bubble:nth-child(8) { width: 75px; height: 75px; background: rgba(78,205,196,0.3); left: 5%; animation-delay: 7s; }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        .cloud {
            position: absolute;
            background: rgba(255,255,255,0.8);
            border-radius: 50px;
            animation: cloudFloat 20s linear infinite;
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
        }

        .cloud:nth-child(9) {
            width: 100px; height: 40px; top: 10%; left: -100px;
            animation-duration: 25s;
        }
        .cloud:nth-child(9)::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud:nth-child(9)::after { width: 40px; height: 40px; top: -20px; left: 45px; }

        .cloud:nth-child(10) {
            width: 120px; height: 45px; top: 25%; left: -120px;
            animation-duration: 30s;
            animation-delay: 5s;
        }
        .cloud:nth-child(10)::before { width: 60px; height: 60px; top: -30px; left: 20px; }
        .cloud:nth-child(10)::after { width: 45px; height: 45px; top: -22px; left: 55px; }

        .cloud:nth-child(11) {
            width: 80px; height: 35px; top: 50%; left: -80px;
            animation-duration: 22s;
            animation-delay: 10s;
        }
        .cloud:nth-child(11)::before { width: 45px; height: 45px; top: -22px; left: 12px; }
        .cloud:nth-child(11)::after { width: 35px; height: 35px; top: -18px; left: 38px; }

        @keyframes cloudFloat {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(100vw + 200px)); }
        }

        /* Cartoon Stars */
        .star-decoration {
            position: absolute;
            color: #FFD700;
            font-size: 30px;
            animation: twinkle 2s ease-in-out infinite;
        }

        .star-decoration:nth-child(12) { top: 15%; right: 10%; animation-delay: 0s; }
        .star-decoration:nth-child(13) { top: 30%; right: 25%; animation-delay: 0.5s; font-size: 20px; }
        .star-decoration:nth-child(14) { top: 60%; right: 5%; animation-delay: 1s; font-size: 25px; }
        .star-decoration:nth-child(15) { top: 75%; right: 30%; animation-delay: 1.5s; }

        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* ==================== LOADING SCREEN ==================== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-logo {
            width: 150px;
            height: 150px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            animation: bounce 1s ease-in-out infinite;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .loading-logo img {
            width: 100px;
            height: 100px;
        }

        .loading-text {
            color: white;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .loading-subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 18px;
            margin-bottom: 30px;
        }

        .loading-bar {
            width: 250px;
            height: 12px;
            background: rgba(255,255,255,0.3);
            border-radius: 6px;
            overflow: hidden;
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, #FFE66D, #FF6B9D, #4ECDC4);
            border-radius: 6px;
            animation: loading 2s ease-in-out forwards;
            background-size: 200% 100%;
            animation: loading 2s ease-in-out forwards, gradient 1s linear infinite;
        }

        @keyframes loading {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* Cute loading animals */
        .loading-animals {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .loading-animal {
            font-size: 40px;
            animation: animalJump 0.5s ease-in-out infinite;
        }

        .loading-animal:nth-child(1) { animation-delay: 0s; }
        .loading-animal:nth-child(2) { animation-delay: 0.1s; }
        .loading-animal:nth-child(3) { animation-delay: 0.2s; }
        .loading-animal:nth-child(4) { animation-delay: 0.3s; }
        .loading-animal:nth-child(5) { animation-delay: 0.4s; }

        @keyframes animalJump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* ==================== HEADER ==================== */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            font-size: 24px;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 55px;
            height: 55px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .logo-text {
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .logo-text span {
            color: #FFE66D;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .coin-display {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(255,215,0,0.4);
        }

        .coin-icon {
            font-size: 24px;
        }

        .coin-count {
            color: #333;
            font-size: 20px;
            font-weight: bold;
        }

        .streak-display {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #FF6B9D, #c44569);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(255,107,157,0.4);
        }

        .streak-icon {
            font-size: 20px;
        }

        .streak-count {
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .sound-btn {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            transition: all 0.3s ease;
        }

        .sound-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        /* ==================== MAIN CONTAINER ==================== */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
            position: relative;
            z-index: 1;
        }

        /* ==================== HOME SCREEN ==================== */
        .home-screen {
            display: block;
        }

        .welcome-section {
            text-align: center;
            margin-bottom: 40px;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: var(--card-shadow);
        }

        .welcome-mascot {
            font-size: 80px;
            margin-bottom: 20px;
            animation: wave 1s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(20deg); }
            75% { transform: rotate(-20deg); }
        }

        .welcome-title {
            font-size: 48px;
            color: #333;
            margin-bottom: 10px;
        }

        .welcome-title span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-subtitle {
            font-size: 22px;
            color: #666;
        }

        .age-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .age-btn {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border: 3px solid #ddd;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .age-btn.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .age-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .game-card {
            background: white;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--card-shadow);
            position: relative;
            overflow: hidden;
            border: 4px solid transparent;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
        }

        .game-card:nth-child(1)::before { background: linear-gradient(90deg, #FF6B9D, #c44569); }
        .game-card:nth-child(2)::before { background: linear-gradient(90deg, #4ECDC4, #44a08d); }
        .game-card:nth-child(3)::before { background: linear-gradient(90deg, #FFE66D, #f7b731); }
        .game-card:nth-child(4)::before { background: linear-gradient(90deg, #A06CD5, #6c5ce7); }
        .game-card:nth-child(5)::before { background: linear-gradient(90deg, #FF8C42, #e17055); }
        .game-card:nth-child(6)::before { background: linear-gradient(90deg, #7ED957, #26de81); }
        .game-card:nth-child(7)::before { background: linear-gradient(90deg, #FF6B9D, #c44569); }
        .game-card:nth-child(8)::before { background: linear-gradient(90deg, #4ECDC4, #44a08d); }
        .game-card:nth-child(9)::before { background: linear-gradient(90deg, #FFE66D, #f7b731); }
        .game-card:nth-child(10)::before { background: linear-gradient(90deg, #A06CD5, #6c5ce7); }
        .game-card:nth-child(11)::before { background: linear-gradient(90deg, #FF8C42, #e17055); }
        .game-card:nth-child(12)::before { background: linear-gradient(90deg, #7ED957, #26de81); }

        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border-color: #667eea;
        }

        .game-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            position: relative;
        }

        .game-card:nth-child(1) .game-icon { background: linear-gradient(135deg, #FF6B9D 0%, #c44569 100%); }
        .game-card:nth-child(2) .game-icon { background: linear-gradient(135deg, #4ECDC4 0%, #44a08d 100%); }
        .game-card:nth-child(3) .game-icon { background: linear-gradient(135deg, #FFE66D 0%, #f7b731 100%); }
        .game-card:nth-child(4) .game-icon { background: linear-gradient(135deg, #A06CD5 0%, #6c5ce7 100%); }
        .game-card:nth-child(5) .game-icon { background: linear-gradient(135deg, #FF8C42 0%, #e17055 100%); }
        .game-card:nth-child(6) .game-icon { background: linear-gradient(135deg, #7ED957 0%, #26de81 100%); }
        .game-card:nth-child(7) .game-icon { background: linear-gradient(135deg, #FF6B9D 0%, #c44569 100%); }
        .game-card:nth-child(8) .game-icon { background: linear-gradient(135deg, #4ECDC4 0%, #44a08d 100%); }
        .game-card:nth-child(9) .game-icon { background: linear-gradient(135deg, #FFE66D 0%, #f7b731 100%); }
        .game-card:nth-child(10) .game-icon { background: linear-gradient(135deg, #A06CD5 0%, #6c5ce7 100%); }
        .game-card:nth-child(11) .game-icon { background: linear-gradient(135deg, #FF8C42 0%, #e17055 100%); }
        .game-card:nth-child(12) .game-icon { background: linear-gradient(135deg, #7ED957 0%, #26de81 100%); }

        .game-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .game-description {
            font-size: 15px;
            color: #888;
            line-height: 1.5;
        }

        .game-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #FF6B9D, #c44569);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .game-difficulty {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 15px;
        }

        .difficulty-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ddd;
        }

        .difficulty-dot.active {
            background: #7ED957;
        }

        .difficulty-dot.active.medium {
            background: #FFE66D;
        }

        .difficulty-dot.active.hard {
            background: #FF6B9D;
        }

        /* ==================== GAME SCREEN ==================== */
        .game-screen {
            display: none;
        }

        .game-screen.active {
            display: block;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
            background: white;
            padding: 20px 30px;
            border-radius: 25px;
            box-shadow: var(--card-shadow);
        }

        .game-title-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .game-back-btn {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            font-size: 24px;
            color: white;
        }

        .game-back-btn:hover {
            transform: scale(1.1);
        }

        .current-game-title {
            font-size: 28px;
            color: #333;
            font-weight: bold;
        }

        .current-game-icon {
            font-size: 35px;
        }

        .game-stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 15px 25px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 2px solid #e9ecef;
        }

        .stat-icon {
            font-size: 28px;
        }

        .stat-info {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }

        /* ==================== GAME INTRO ==================== */
        .game-intro {
            background: white;
            border-radius: 35px;
            padding: 50px;
            text-align: center;
            box-shadow: var(--card-shadow);
            max-width: 650px;
            margin: 50px auto;
            position: relative;
            overflow: hidden;
        }

        .game-intro::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(90deg, #FF6B9D, #4ECDC4, #FFE66D, #A06CD5, #FF8C42, #7ED957);
        }

        .game-intro-icon {
            width: 140px;
            height: 140px;
            margin: 0 auto 30px;
            border-radius: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 70px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            animation: iconFloat 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .game-intro-title {
            font-size: 36px;
            color: #333;
            margin-bottom: 15px;
        }

        .game-intro-desc {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .game-intro-mascot {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .game-intro-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .play-btn {
            padding: 20px 55px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #7ED957 0%, #26de81 100%);
            border: none;
            border-radius: 35px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(126, 217, 87, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .play-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(126, 217, 87, 0.5);
        }

        .how-to-play-btn {
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
            background: white;
            border: 3px solid #667eea;
            border-radius: 35px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .how-to-play-btn:hover {
            background: #667eea;
            color: white;
        }

        /* ==================== HOW TO PLAY MODAL ==================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 35px;
            padding: 45px;
            max-width: 550px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            animation: modalBounce 0.4s ease;
        }

        @keyframes modalBounce {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: #f0f0f0;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: #FF6B9D;
            color: white;
            transform: rotate(90deg);
        }

        .modal-mascot {
            font-size: 60px;
            text-align: center;
            margin-bottom: 15px;
        }

        .modal-title {
            font-size: 30px;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .instruction-step {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 20px;
            border-left: 5px solid #667eea;
        }

        .step-number {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 20px;
            flex-shrink: 0;
        }

        .step-content {
            flex: 1;
        }

        .step-text {
            font-size: 17px;
            color: #555;
            line-height: 1.6;
        }

        .step-emoji {
            font-size: 30px;
            margin-bottom: 5px;
        }

        .modal-start-btn {
            width: 100%;
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #7ED957 0%, #26de81 100%);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(126, 217, 87, 0.4);
        }

        .modal-start-btn:hover {
            transform: translateY(-3px);
        }

        /* ==================== DIFFICULTY SELECTOR ==================== */
        .difficulty-selector {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            background: white;
            padding: 20px;
            border-radius: 25px;
            box-shadow: var(--card-shadow);
        }

        .difficulty-btn {
            padding: 18px 35px;
            font-size: 18px;
            font-weight: bold;
            border: 3px solid #ddd;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .difficulty-btn.easy {
            color: #7ED957;
        }

        .difficulty-btn.easy:hover, .difficulty-btn.easy.active {
            background: linear-gradient(135deg, #7ED957 0%, #26de81 100%);
            border-color: #7ED957;
            color: white;
            transform: scale(1.05);
        }

        .difficulty-btn.medium {
            color: #f7b731;
        }

        .difficulty-btn.medium:hover, .difficulty-btn.medium.active {
            background: linear-gradient(135deg, #FFE66D 0%, #f7b731 100%);
            border-color: #f7b731;
            color: #333;
            transform: scale(1.05);
        }

        .difficulty-btn.hard {
            color: #FF6B9D;
        }

        .difficulty-btn.hard:hover, .difficulty-btn.hard.active {
            background: linear-gradient(135deg, #FF6B9D 0%, #c44569 100%);
            border-color: #FF6B9D;
            color: white;
            transform: scale(1.05);
        }

        /* ==================== GAMEPLAY AREA ==================== */
        .gameplay-area {
            background: white;
            border-radius: 35px;
            padding: 40px;
            box-shadow: var(--card-shadow);
            min-height: 500px;
            position: relative;
            overflow: hidden;
        }

        .gameplay-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #FF6B9D, #4ECDC4, #FFE66D, #A06CD5);
        }

        .progress-container {
            margin-bottom: 30px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            color: #888;
        }

        .progress-bar {
            width: 100%;
            height: 18px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2, #FF6B9D);
            border-radius: 10px;
            transition: width 0.5s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .question-counter {
            text-align: center;
            font-size: 20px;
            color: #666;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .question-counter span {
            color: #667eea;
            font-size: 24px;
        }

        /* ==================== SPELLING GAME STYLES ==================== */
        .spelling-game {
            text-align: center;
        }

        .spelling-category-badge {
            display: inline-block;
            padding: 10px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .spelling-image-container {
            width: 220px;
            height: 220px;
            margin: 0 auto 30px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            border: 5px solid white;
            position: relative;
        }

        .spelling-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .spelling-image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            color: white;
        }

        .spelling-hint {
            font-size: 20px;
            color: #666;
            margin-bottom: 25px;
        }

        .spelling-hint strong {
            color: #667eea;
        }

        .spelling-word {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .letter-box {
            width: 65px;
            height: 75px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border: 4px solid #ddd;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            color: #333;
            text-transform: uppercase;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .letter-box.filled {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            color: white;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .letter-box.blank {
            background: white;
            border-color: #4ECDC4;
            border-style: dashed;
            animation: blinkBorder 1s ease-in-out infinite;
        }

        .letter-box.blank.selected {
            border-color: #FF6B9D;
            background: rgba(255, 107, 157, 0.1);
            transform: scale(1.1);
        }

        @keyframes blinkBorder {
            0%, 100% { border-color: #4ECDC4; }
            50% { border-color: #7ED957; }
        }

        .letter-box.correct {
            background: linear-gradient(135deg, #7ED957 0%, #26de81 100%);
            border-color: #7ED957;
            animation: correctBounce 0.5s ease;
        }

        .letter-box.wrong {
            background: linear-gradient(135deg, #FF6B9D 0%, #c44569 100%);
            border-color: #FF6B9D;
            animation: wrongShake 0.5s ease;
        }

        @keyframes correctBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        .letter-options-container {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 25px;
            border-radius: 25px;
            margin-top: 20px;
        }

        .letter-options-title {
            font-size: 16px;
            color: #888;
            margin-bottom: 15px;
        }

        .letter-options {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .letter-option {
            width: 60px;
            height: 65px;
            background: white;
            border: 3px solid #ddd;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: bold;
            color: #333;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .letter-option:hover {
            background: linear-gradient(135deg, #4ECDC4 0%, #44a08d 100%);
            border-color: #4ECDC4;
            color: white;
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 25px rgba(78, 205, 196, 0.4);
        }

        .letter-option.used {
            opacity: 0.3;
            pointer-events: none;
            transform: scale(0.9);
        }

        /* ==================== FLAG GAME STYLES ==================== */
        .flag-game {
            text-align: center;
        }

        .flag-display {
            width: 320px;
            height: 200px;
            margin: 0 auto 40px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
            border: 6px solid white;
            position: relative;
        }

        .flag-display img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .flag-question {
            font-size: 26px;
            color: #333;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .flag-question span {
            color: #667eea;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .option-btn {
            padding: 25px 20px;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            background: white;
            border: 4px solid #e9ecef;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }

        .option-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .option-btn:hover::before {
            left: 100%;
        }

        .option-btn:hover {
            border-color: #667eea;
            background: linear-gradient(135deg, #f8f9ff 0%, #e8ecff 100%);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }

        .option-btn.correct {
            background: linear-gradient(135deg, #7ED957 0%, #26de81 100%);
            border-color: #7ED957;
            color: white;
            animation: correctPulse 0.5s ease;
        }

        .option-btn.wrong {
            background: linear-gradient(135deg, #FF6B9D 0%, #c44569 100%);
            border-color: #FF6B9D;
            color: white;
            animation: wrongShake 0.5s ease;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* ==================== MEMORY GAME STYLES ==================== */
        .memory-game {
            text-align: center;
        }

        .memory-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .memory-stat {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 15px 30px;
            border-radius: 20px;
            text-align: center;
        }

        .memory-stat-label {
            font-size: 14px;
            color: #888;
            margin-bottom: 5px;
        }

        .memory-stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .memory-grid {
            display: grid;
            gap: 15px;
            justify-content: center;
            margin: 0 auto;
        }

        .memory-grid.grid-4x4 {
            grid-template-columns: repeat(4, 85px);
        }

        .memory-grid.grid-6x6 {
            grid-template-columns: repeat(6, 70px);
        }

        .memory-card {
            width: 85px;
            height: 85px;
            perspective: 1000px;
            cursor: pointer;
        }

        .memory-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .memory-card.flipped .memory-card-inner {
            transform: rotateY(180deg);
        }

        .memory-card-front, .memory-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        .memory-card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-size: 35px;
        }

        .memory-card-back {
            background: white;
            transform: rotateY(180deg);
            border: 4px solid #667eea;
            overflow: hidden;
        }

        .memory-card-back img {
            width: 90%;
            height: 90%;
            object-fit: contain;
        }

        .memory-card.matched .memory-card-inner {
            transform: rotateY(180deg);
        }

        .memory-card.matched .memory-card-back {
            border-color: #7ED957;
            background: linear-gradient(135deg, #d4fcc3 0%, #c8f7b5 100%);
        }

        .memory-card.matched {
            animation: matchedPop 0.5s ease;
        }

        @keyframes matchedPop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* ==================== NUMBER SEQUENCE GAME ==================== */
        .number-sequence-game {
            text-align: center;
        }

        .sequence-instruction {
            font-size: 26px;
            color: #333;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 20px;
        }

        .sequence-instruction span {
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 5px 20px;
            border-radius: 15px;
            font-size: 32px;
            font-weight: bold;
        }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(5, 80px);
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .number-card {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            position: relative;
        }

        .number-card:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.5);
        }

        .number-card.hidden .card-number {
            display: none;
        }

        .number-card.hidden::after {
            content: '?';
            font-size: 40px;
        }

        .number-card.revealed {
            background: linear-gradient(135deg, #7ED957 0%, #26de81 100%);
            box-shadow: 0 8px 25px rgba(126, 217, 87, 0.4);
            pointer-events: none;
        }

        .number-card.wrong-click {
            background: linear-gradient(135deg, #FF6B9D 0%, #c44569 100%);
            animation: wrongShake 0.5s ease;
        }

        /* ==================== SORTING GAME STYLES ==================== */
        .sorting-game {
            text-align: center;
        }

        .sorting-item-container {
            margin-bottom: 40px;
        }

        .sorting-item {
            display: inline-block;
            padding: 25px 50px;
            background: white;
            border: 4px solid #667eea;
            border-radius: 25px;
            font-size: 28px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: itemFloat 2s ease-in-out infinite;
        }

        @keyframes itemFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .sorting-categories {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .sorting-category {
            width: 280px;
            min-height: 250px;
            border-radius: 30px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .sorting-category.ocean {
            background: linear-gradient(180deg, #00d2ff 0%, #3a7bd5 100%);
        }

        .sorting-category.land {
            background: linear-gradient(180deg, #56ab2f 0%, #a8e063 100%);
        }

        .sorting-category.river {
            background: linear-gradient(180deg, #1a2980 0%, #26d0ce 100%);
        }

        .sorting-category.mountain {
            background: linear-gradient(180deg, #8e9eab 0%, #eef2f3 100%);
        }

        .sorting-category.bird {
            background: linear-gradient(180deg, #00c6ff 0%, #72c6ef 50%, #00c6ff 100%);
        }

        .sorting-category.animal {
            background: linear-gradient(180deg, #f5af19 0%, #f12711 100%);
        }

        .sorting-category:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .sorting-category-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .sorting-category-title {
            font-size: 26px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .sorting-category.correct {
            animation: correctPulse 0.5s ease;
            box-shadow: 0 0 30px rgba(126, 217, 87, 0.8);
        }

        .sorting-category.wrong {
            animation: wrongShake 0.5s ease;
        }

        /* ==================== RESULT SCREEN ==================== */
        .result-screen {
            display: none;
            text-align: center;
            padding: 50px 30px;
            background: white;
            border-radius: 35px;
            box-shadow: var(--card-shadow);
            position: relative;
            overflow: hidden;
        }

        .result-screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(90deg, #7ED957, #4ECDC4, #FFE66D, #FF6B9D);
        }

        .result-screen.active {
            display: block;
            animation: resultSlideIn 0.5s ease;
        }

        @keyframes resultSlideIn {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-mascot {
            font-size: 100px;
            margin-bottom: 20px;
            animation: mascotCelebrate 1s ease-in-out infinite;
        }

        @keyframes mascotCelebrate {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }

        .result-title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-message {
            font-size: 22px;
            color: #666;
            margin-bottom: 30px;
        }

        .result-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .result-stat {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 25px 40px;
            border-radius: 25px;
            min-width: 150px;
        }

        .result-stat-value {
            font-size: 42px;
            font-weight: bold;
            color: #667eea;
        }

        .result-stat-label {
            font-size: 16px;
            color: #888;
            margin-top: 5px;
        }

        .stars-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .star {
            font-size: 60px;
            transition: all 0.3s ease;
        }

        .star.earned {
            color: #FFD700;
            text-shadow: 0 5px 20px rgba(255, 215, 0, 0.5);
            animation: starPop 0.5s ease forwards;
        }

        .star.empty {
            color: #ddd;
        }

        .star:nth-child(1) { animation-delay: 0.1s; }
        .star:nth-child(2) { animation-delay: 0.2s; }
        .star:nth-child(3) { animation-delay: 0.3s; }

        @keyframes starPop {
            0% { transform: scale(0); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .coins-earned {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            padding: 20px 45px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border-radius: 35px;
            margin-bottom: 35px;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
            animation: coinsFloat 2s ease-in-out infinite;
        }

        @keyframes coinsFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .coins-earned-icon {
            font-size: 40px;
        }

        .coins-earned-text {
            font-size: 30px;
            font-weight: bold;
            color: #333;
        }

        .result-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .result-btn {
            padding: 20px 45px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .play-again-btn {
            color: white;
            background: linear-gradient(135deg, #7ED957 0%, #26de81 100%);
            box-shadow: 0 10px 30px rgba(126, 217, 87, 0.4);
        }

        .play-again-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(126, 217, 87, 0.5);
        }

        .home-btn {
            color: #667eea;
            background: white;
            border: 3px solid #667eea;
        }

        .home-btn:hover {
            background: #667eea;
            color: white;
        }

        /* ==================== FEEDBACK POPUP ==================== */
        .feedback-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 35px 60px;
            border-radius: 30px;
            font-size: 32px;
            font-weight: bold;
            color: white;
            z-index: 3000;
            display: none;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .feedback-popup.active {
            display: block;
            animation: feedbackPop 0.4s ease;
        }

        .feedback-popup.correct {
            background: linear-gradient(135deg, #7ED957 0%, #26de81 100%);
        }

        .feedback-popup.wrong {
            background: linear-gradient(135deg, #FF6B9D 0%, #c44569 100%);
        }

        .feedback-emoji {
            font-size: 60px;
            margin-bottom: 15px;
        }

        @keyframes feedbackPop {
            0% { transform: translate(-50%, -50%) scale(0); }
            70% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        /* ==================== CONFETTI ==================== */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5000;
        }

        .confetti {
            position: absolute;
            width: 15px;
            height: 15px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 768px) {
            .header {
                padding: 12px 15px;
            }

            .logo-text {
                font-size: 20px;
            }

                padding: 8px 15px;

            }

            }

            .letter-option {

            }

            }

            .memory-card {

            .number-grid {

            .number-card {

        // ==================== AUDIO SYSTEM ====================
        const AudioSystem = {
            context: null,
            
            init() {
                try {
                    this.context = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {
                    console.log('Web Audio not supported');
                }
            },
            
            playClick() {
                if (!gameState.soundEnabled) return;
                this.playTone(600, 0.1, 'sine');
            },
            
            playCorrect() {
                if (!gameState.soundEnabled) return;
                this.playTone(523.25, 0.15, 'sine');
                setTimeout(() => this.playTone(659.25, 0.15, 'sine'), 100);
                setTimeout(() => this.playTone(783.99, 0.2, 'sine'), 200);
            },
            
            playWrong() {
                if (!gameState.soundEnabled) return;
                this.playTone(200, 0.3, 'sawtooth');
            },
            
            playCelebration() {
                if (!gameState.soundEnabled) return;
                const notes = [523.25, 587.33, 659.25, 698.46, 783.99, 880, 987.77, 1046.50];
                notes.forEach((freq, i) => {
                    setTimeout(() => this.playTone(freq, 0.15, 'sine'), i * 80);
                });
            },
            
            playTone(frequency, duration, type) {
                if (!this.context) return;
                try {
                    const oscillator = this.context.createOscillator();
                    const gainNode = this.context.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(this.context.destination);
                    
                    oscillator.frequency.value = frequency;
                    oscillator.type = type;
                    
                    gainNode.gain.setValueAtTime(0.3, this.context.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, this.context.currentTime + duration);
                    
                    oscillator.start(this.context.currentTime);
                    oscillator.stop(this.context.currentTime + duration);
                } catch(e) {}
            }
        };

        // ==================== STREAK SYSTEM ====================
        function checkDailyStreak() {
            const today = new Date().toDateString();
            const yesterday = new Date(Date.now() - 86400000).toDateString();
            
            if (gameState.lastPlayDate === today) return;
            
            if (gameState.lastPlayDate === yesterday) {
                gameState.streak++;
                let bonus = gameState.streak >= 10 ? 50 : gameState.streak >= 5 ? 20 : 5;
                gameState.coins += bonus;
                showNotification(`🔥 Day ${gameState.streak} Streak! +${bonus} coins!`);
            } else if (gameState.lastPlayDate !== '') {
                gameState.streak = 1;
            } else {
                gameState.streak = 1;
            }
            
            gameState.lastPlayDate = today;
            saveGameState();
        }

            closeModal();
            startGame(gameState.currentGame);

        // ==================== START GAME ====================
        function startGame(gameName) {
            AudioSystem.playClick();
            gameState.currentQuestion = 0;
            gameState.score = 0;
            gameState.usedQuestions = new Set();
            
            switch(gameName) {
                case 'spelling': renderSpellingGame(); break;
                case 'flagRecognition': renderFlagGame(); break;
                case 'memory': renderMemoryGame(); break;
                case 'numberSequence': renderNumberGame(); break;
                case 'wordMaster': renderWordMasterGame(); break;
                case 'azGeography': renderAZGame(); break;
                case 'oceanLand': renderSortingGame('oceanLand'); break;
                case 'riverMountain': renderSortingGame('riverMountain'); break;
                case 'birdAnimal': renderSortingGame('birdAnimal'); break;
                case 'capitalMatch': renderCapitalGame(); break;
                default: renderSpellingGame();
            }
        }

        // ==================== SPELLING GAME ====================
        function getSpellingWords() {
            return gameState.ageGroup === 'young' ? EASY_WORDS : [...EASY_WORDS, ...MEDIUM_WORDS];
        }

        function renderSpellingGame() {
            gameState.totalQuestions = 10;
            const words = getSpellingWords();
            const available = words.filter((w, i) => !gameState.usedQuestions.has(i));
            
            if (available.length === 0 || gameState.currentQuestion >= gameState.totalQuestions) {
                showResults();
                return;
            }
            
            const randomIndex = Math.floor(Math.random() * available.length);
            const wordObj = available[randomIndex];
            const originalIndex = words.indexOf(wordObj);
            gameState.usedQuestions.add(originalIndex);
            
            const word = wordObj.word.toUpperCase();
            const numBlanks = gameState.ageGroup === 'young' 
                ? Math.max(1, Math.floor(word.length * 0.3))
                : Math.max(2, Math.floor(word.length * 0.4));
            
            // Determine blank positions (keep first letter visible for young kids)
            let blankIndices = [];
            let availableIndices = [];
            
            for (let i = (gameState.ageGroup === 'young' ? 1 : 0); i < word.length; i++) {
                if (i !== word.length - 1 || gameState.ageGroup !== 'young') {
                    availableIndices.push(i);
                }
            }
            
            shuffleArray(availableIndices);
            blankIndices = availableIndices.slice(0, numBlanks);
            
            gameState.gameData = {
                word: word,
                wordObj: wordObj,
                blankIndices: blankIndices,
                filledLetters: {},
                currentBlankIndex: 0
            };
            
            renderSpellingUI();
        }

            const { word, wordObj, blankIndices, filledLetters } = gameState.gameData;
            const progress = (gameState.currentQuestion / gameState.totalQuestions) * 100;
            const info = getGameInfo('spelling');
            
            // Create word display
            let wordHTML = '';
            for (let i = 0; i < word.length; i++) {
                if (blankIndices.includes(i)) {
                    const filled = filledLetters[i];
                    wordHTML += `
                        <div class="letter-box blank ${filled ? 'filled' : ''}" data-index="${i}">
                            ${filled || ''}
                        </div>
                    `;
                } else {
                    wordHTML += `<div class="letter-box filled">${word[i]}</div>`;
                }
            }
            
            // Create letter options
            const blankLetters = blankIndices.map(i => word[i]);
            const decoys = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').filter(l => !word.includes(l));
            shuffleArray(decoys);
            let options = [...blankLetters, ...decoys.slice(0, Math.min(4, 8 - blankLetters.length))];
            shuffleArray(options);
            
            // Remove already used letters from options
            const usedLetters = Object.values(filledLetters);
            options = options.filter((l, i) => {
                const usedCount = usedLetters.filter(ul => ul === l).length;
                const optionCount = options.slice(0, i + 1).filter(ol => ol === l).length;
                return optionCount > usedCount;
            });
            
            const screen = document.getElementById('gameScreen');
            screen.innerHTML = `

                    <div class="game-title-section">

                    </div>

                        <div class="spelling-category-badge">${wordObj.category}</div>
                        
                        <div class="spelling-image-container">
                            <div class="spelling-image-placeholder" style="background: ${info.gradient}">
                                <span>${wordObj.emoji}</span>
                            </div>
                        </div>
                        
                        <p class="spelling-hint">Spell the word: <strong>${wordObj.category}</strong></p>
                        
                        <div class="spelling-word">
                            ${wordHTML}
                        </div>
                        
                        <div class="letter-options-container">
                            <p class="letter-options-title">Tap a letter:</p>
                            <div class="letter-options">
                                ${options.map((letter, i) => `
                                    <div class="letter-option" data-letter="${letter}" data-id="${i}" onclick="selectSpellingLetter(this)">
                                        ${letter}

                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function selectSpellingLetter(element) {
            AudioSystem.playClick();
            if (element.classList.contains('used')) return;
            
            const letter = element.dataset.letter;
            const { word, blankIndices, filledLetters } = gameState.gameData;
            
            // Find next empty blank
            const emptyBlanks = blankIndices.filter(i => !filledLetters[i]);
            if (emptyBlanks.length === 0) return;
            
            const targetIndex = emptyBlanks[0];
            gameState.gameData.filledLetters[targetIndex] = letter;
            element.classList.add('used');
            
            // Update display
            const blankElement = document.querySelector(`.letter-box[data-index="${targetIndex}"]`);
            if (blankElement) {
                blankElement.textContent = letter;
                blankElement.classList.add('filled');
            }
            
            // Check if all blanks are filled
            const allFilled = blankIndices.every(i => gameState.gameData.filledLetters[i]);
            
            if (allFilled) {
                checkSpellingAnswer();
            }
        }

        function checkSpellingAnswer() {
            const { word, blankIndices, filledLetters } = gameState.gameData;
            
            let correct = true;
            for (const index of blankIndices) {
                if (filledLetters[index] !== word[index]) {
                    correct = false;
                    break;
                }
            }
            
            if (correct) {
                AudioSystem.playCorrect();
                gameState.score += 10;
                showFeedback(true, 'Great job! 🎉');
                
                // Highlight correct
                blankIndices.forEach(i => {
                    const el = document.querySelector(`.letter-box[data-index="${i}"]`);
                    if (el) el.classList.add('correct');
                });
            } else {
                AudioSystem.playWrong();
                showFeedback(false, `The word was: ${word}`);
                
                // Highlight wrong
                blankIndices.forEach(i => {
                    const el = document.querySelector(`.letter-box[data-index="${i}"]`);
                    if (el && filledLetters[i] !== word[i]) {
                        el.classList.add('wrong');
                    }
                });
            }
            
            setTimeout(() => {
                gameState.currentQuestion++;
                renderSpellingGame();
            }, 2000);
        }

        // ==================== MEMORY GAME ====================
        function renderMemoryGame() {
            const gridSize = gameState.ageGroup === 'young' ? 8 : 12; // 4x4 or 4x6
            const pairs = gridSize / 2;
            
            // Select random countries for pairs
            const selectedCountries = [...COUNTRIES].sort(() => Math.random() - 0.5).slice(0, pairs);
            
            // Create card pairs
            let cards = [];
            selectedCountries.forEach((country, index) => {

                cards.push({ id: index, country: country, matched: false });
            });
            shuffleArray(cards);
            
            gameState.gameData = {

                totalPairs: pairs,

        function flipMemoryCard(index) {
            if (!gameState.gameData.canFlip) return;
            
            const card = gameState.gameData.cards[index];
            const cardElement = document.querySelector(`.memory-card[data-index="${index}"]`);
            
            if (cardElement.classList.contains('flipped') || cardElement.classList.contains('matched')) {
                return;
            }
            
            AudioSystem.playClick();
            cardElement.classList.add('flipped');
            gameState.gameData.flipped.push({ index, card, element: cardElement });
            
            if (gameState.gameData.flipped.length === 2) {
                gameState.gameData.canFlip = false;
                gameState.gameData.moves++;
                document.getElementById('moveCount').textContent = gameState.gameData.moves;
                
                const [first, second] = gameState.gameData.flipped;
                
                if (first.card.id === second.card.id) {
                    // Match!
                    AudioSystem.playCorrect();
                    first.element.classList.add('matched');
                    second.element.classList.add('matched');
                    gameState.gameData.matched++;
                    document.getElementById('pairCount').textContent = 
                        `${gameState.gameData.matched}/${gameState.gameData.totalPairs}`;
                    
                    gameState.gameData.flipped = [];
                    gameState.gameData.canFlip = true;
                    
                    if (gameState.gameData.matched === gameState.gameData.totalPairs) {
                        gameState.score = Math.max(100 - (gameState.gameData.moves - gameState.gameData.totalPairs) * 5, 30);
                        setTimeout(() => showResults(), 1000);
                    }
                } else {
                    // No match
                    setTimeout(() => {
                        AudioSystem.playWrong();
                        first.element.classList.remove('flipped');
                        second.element.classList.remove('flipped');
                        gameState.gameData.flipped = [];
                        gameState.gameData.canFlip = true;
                    }, 1000);
                }
            }
        }
