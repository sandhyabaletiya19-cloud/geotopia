                                <span class="stat-value" id="currentScore">${gameState.score}</span>
                            </div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-info">
                                <span class="stat-label">Question</span>
                                <span class="stat-value">${gameState.currentQuestion + 1}/${gameState.totalQuestions}</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="gameplay-area">
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    
                    <div style="text-align: center;">
                        <div style="width: 140px; height: 140px; margin: 0 auto 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 35px; display: flex; justify-content: center; align-items: center; font-size: 80px; font-weight: bold; color: white; box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);">
                            ${letter}
                        </div>
                        
                        <p class="flag-question">Which word starts with <span>${letter}</span>?</p>
                        
                        <div class="options-grid" style="margin-top: 30px;">
                            ${options.map(opt => `
                                <button class="option-btn" onclick="selectAZAnswer('${opt}', this)">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function selectAZAnswer(answer, element) {
            AudioSystem.playClick();
            const correct = gameState.gameData.correct;
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.style.pointerEvents = 'none');
            
            if (answer === correct) {
                AudioSystem.playCorrect();
                element.classList.add('correct');
                gameState.score += 10;
                showFeedback(true, 'Correct! 🎉');
            } else {
                AudioSystem.playWrong();
                element.classList.add('wrong');
                buttons.forEach(btn => {
                    if (btn.textContent.trim() === correct) {
                        btn.classList.add('correct');
                    }
                });
                showFeedback(false, `It was ${correct}`);
            }
            
            setTimeout(() => {
                gameState.currentQuestion++;
                renderAZGame();
            }, 2000);
        }

        // ==================== SORTING GAMES ====================
        function renderSortingGame(type) {
            gameState.totalQuestions = 10;
            gameState.gameData = { type };
            
            let items = [];
            let cat1, cat2, icon1, icon2, bg1, bg2;
            
            if (type === 'oceanLand') {
                cat1 = 'Ocean'; cat2 = 'Land';
                icon1 = '🌊'; icon2 = '🏝️';
                bg1 = 'ocean'; bg2 = 'land';
                
                OCEANS.forEach(o => items.push({ name: o, category: 'ocean' }));
                SEAS.forEach(s => items.push({ name: s, category: 'ocean' }));
                COUNTRIES.slice(0, 50).forEach(c => items.push({ name: c.name, category: 'land' }));
            } else if (type === 'riverMountain') {
                cat1 = 'River'; cat2 = 'Mountain';
                icon1 = '💧'; icon2 = '⛰️';
                bg1 = 'river'; bg2 = 'mountain';
                
                RIVERS.forEach(r => items.push({ name: r, category: 'river' }));
                MOUNTAINS.forEach(m => items.push({ name: m, category: 'mountain' }));
            } else {
                cat1 = 'Bird'; cat2 = 'Animal';
                icon1 = '🐦'; icon2 = '🦁';
                bg1 = 'bird'; bg2 = 'animal';
                
                BIRDS.forEach(b => items.push({ name: b, category: 'bird' }));
                ANIMALS.forEach(a => items.push({ name: a, category: 'animal' }));
            }
            
            gameState.gameData.categories = { cat1, cat2, icon1, icon2, bg1, bg2, items };
            renderSortingQuestion();
        }

        function renderSortingQuestion() {
            const { type, categories } = gameState.gameData;
            const { cat1, cat2, icon1, icon2, bg1, bg2, items } = categories;
            
            const available = items.filter(item => !gameState.usedQuestions.has(item.name));
            
            if (available.length === 0 || gameState.currentQuestion >= gameState.totalQuestions) {
                showResults();
                return;
            }
            
            const current = available[Math.floor(Math.random() * available.length)];
            gameState.usedQuestions.add(current.name);
            gameState.gameData.current = current;
            
            const progress = (gameState.currentQuestion / gameState.totalQuestions) * 100;
            const info = getGameInfo(type);
            
            const screen = document.getElementById('gameScreen');
            screen.innerHTML = `
                <div class="game-header">
                    <div class="game-title-section">
                        <button class="game-back-btn" onclick="goHome()">⬅️</button>
                        <span class="current-game-icon">${info.icon}</span>
                        <h2 class="current-game-title">${info.title}</h2>
                    </div>
                    <div class="game-stats">
                        <div class="stat-box">
                            <span class="stat-icon">⭐</span>
                            <div class="stat-info">
                                <span class="stat-label">Score</span>
                                <span class="stat-value" id="currentScore">${gameState.score}</span>
                            </div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-info">
                                <span class="stat-label">Question</span>
                                <span class="stat-value">${gameState.currentQuestion + 1}/${gameState.totalQuestions}</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="gameplay-area">
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    
                    <div class="sorting-game">
                        <div class="sorting-item-container">
                            <div class="sorting-item">${current.name}</div>
                        </div>
                        
                        <p style="text-align: center; font-size: 20px; color: #666; margin-bottom: 30px;">
                            Is this a <strong>${cat1}</strong> or <strong>${cat2}</strong>?
                        </p>
                        
                        <div class="sorting-categories">
                            <div class="sorting-category ${bg1}" onclick="selectSortingCategory('${bg1}')">
                                <div class="sorting-category-icon">${icon1}</div>
                                <div class="sorting-category-title">${cat1}</div>
                            </div>
                            <div class="sorting-category ${bg2}" onclick="selectSortingCategory('${bg2}')">
                                <div class="sorting-category-icon">${icon2}</div>
                                <div class="sorting-category-title">${cat2}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function selectSortingCategory(category) {
            AudioSystem.playClick();
            const correct = gameState.gameData.current.category;
            const categories = document.querySelectorAll('.sorting-category');
            categories.forEach(cat => cat.style.pointerEvents = 'none');
            
            const clickedCat = document.querySelector(`.sorting-category.${category}`);
            
            if (category === correct) {
                AudioSystem.playCorrect();
                clickedCat.classList.add('correct');
                gameState.score += 10;
                showFeedback(true, 'Correct! 🎉');
            } else {
                AudioSystem.playWrong();
                clickedCat.classList.add('wrong');
                document.querySelector(`.sorting-category.${correct}`).classList.add('correct');
                showFeedback(false, `It's a ${correct}!`);
            }
            
            setTimeout(() => {
                gameState.currentQuestion++;
                renderSortingQuestion();
            }, 2000);
        }

        // ==================== CAPITAL MATCH GAME ====================
        function renderCapitalGame() {
            gameState.totalQuestions = 10;
            const available = COUNTRIES.filter((c, i) => !gameState.usedQuestions.has(i));
            
            if (available.length < 4 || gameState.currentQuestion >= gameState.totalQuestions) {
                showResults();
                return;
            }
            
            const randomIndex = Math.floor(Math.random() * available.length);
            const correct = available[randomIndex];
            const originalIndex = COUNTRIES.indexOf(correct);
            gameState.usedQuestions.add(originalIndex);
            
            const wrongOptions = available.filter(c => c !== correct);
            shuffleArray(wrongOptions);
            const options = [correct.capital, ...wrongOptions.slice(0, 3).map(c => c.capital)];
            shuffleArray(options);
            
            gameState.gameData = { correct, options };
            
            const progress = (gameState.currentQuestion / gameState.totalQuestions) * 100;
            const info = getGameInfo('capitalMatch');
            
            const screen = document.getElementById('gameScreen');
            screen.innerHTML = `
                <div class="game-header">
                    <div class="game-title-section">
                        <button class="game-back-btn" onclick="goHome()">⬅️</button>
                        <span class="current-game-icon">${info.icon}</span>
                        <h2 class="current-game-title">${info.title}</h2>
                    </div>
                    <div class="game-stats">
                        <div class="stat-box">
                            <span class="stat-icon">⭐</span>
                            <div class="stat-info">
                                <span class="stat-label">Score</span>
                                <span class="stat-value" id="currentScore">${gameState.score}</span>
                            </div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-info">
                                <span class="stat-label">Question</span>
                                <span class="stat-value">${gameState.currentQuestion + 1}/${gameState.totalQuestions}</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="gameplay-area">
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    
                    <div style="text-align: center;">
                        <div style="display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px;">
                            <img src="${getFlagUrl(correct.code)}" alt="${correct.name}" 
                                 style="width: 80px; height: 50px; object-fit: cover; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);"
                                 onerror="this.style.display='none'">
                            <h2 style="font-size: 36px; color: #333;">${correct.name}</h2>
                        </div>
                        
                        <p class="flag-question">What is the <span>capital</span> of ${correct.name}?</p>
                        
                        <div class="options-grid" style="margin-top: 30px;">
                            ${options.map(opt => `
                                <button class="option-btn" onclick="selectCapitalAnswer('${opt.replace(/'/g, "\\'")}', this)">
                                    🏛️ ${opt}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function selectCapitalAnswer(answer, element) {
            AudioSystem.playClick();
            const correct = gameState.gameData.correct.capital;
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.style.pointerEvents = 'none');
            
            if (answer === correct) {
                AudioSystem.playCorrect();
                element.classList.add('correct');
                gameState.score += 10;
                showFeedback(true, 'Correct! 🎉');
            } else {
                AudioSystem.playWrong();
                element.classList.add('wrong');
                buttons.forEach(btn => {
                    if (btn.textContent.includes(correct)) {
                        btn.classList.add('correct');
                    }
                });
                showFeedback(false, `It was ${correct}`);
            }
            
            setTimeout(() => {
                gameState.currentQuestion++;
                renderCapitalGame();
            }, 2000);
        }

        // ==================== FEEDBACK POPUP ====================
        function showFeedback(isCorrect, message) {
            const popup = document.getElementById('feedbackPopup');
            popup.className = `feedback-popup active ${isCorrect ? 'correct' : 'wrong'}`;
            document.getElementById('feedbackEmoji').textContent = isCorrect ? '🎉' : '😅';
            document.getElementById('feedbackText').textContent = message;
            
            setTimeout(() => {
                popup.classList.remove('active');
            }, 1500);
        }

        // ==================== RESULTS SCREEN ====================
        function showResults() {
            AudioSystem.playCelebration();
            createConfetti();
            
            const maxScore = gameState.totalQuestions * 10;
            let percentage = Math.round((gameState.score / maxScore) * 100);
            
            // For games without standard scoring
            if (gameState.currentGame === 'memory') {
                percentage = Math.round(gameState.score);
            } else if (gameState.currentGame === 'numberSequence') {
                percentage = Math.round(gameState.score);
            }
            
            percentage = Math.min(100, Math.max(0, percentage));
            
            let stars = 1;
            let coinsEarned = 5;
            let mascot = '😊';
            let message = 'Keep practicing!';
            
            if (percentage >= 90) {
                stars = 3;
                coinsEarned = 20;
                mascot = '🏆';
                message = 'Amazing! You\'re a Geography Star!';
            } else if (percentage >= 70) {
                stars = 2;
                coinsEarned = 10;
                mascot = '🌟';
                message = 'Great job! Keep it up!';
            } else if (percentage >= 50) {
                stars = 2;
                coinsEarned = 5;
                mascot = '👍';
                message = 'Good effort! Try again for more stars!';
            }
            
            addCoins(coinsEarned);
            
            const screen = document.getElementById('gameScreen');
            screen.innerHTML = `
                <div class="result-screen active">
                    <div class="result-mascot">${mascot}</div>
                    
                    <h1 class="result-title">${percentage >= 70 ? 'Congratulations!' : 'Good Try!'}</h1>
                    <p class="result-message">${message}</p>
                    
                    <div class="stars-display">
                        <div class="star ${stars >= 1 ? 'earned' : 'empty'}">⭐</div>
                        <div class="star ${stars >= 2 ? 'earned' : 'empty'}">⭐</div>
                        <div class="star ${stars >= 3 ? 'earned' : 'empty'}">⭐</div>
                    </div>
                    
                    <div class="result-stats">
                        <div class="result-stat">
                            <div class="result-stat-value">${gameState.score}</div>
                            <div class="result-stat-label">Score</div>
                        </div>
                        <div class="result-stat">
                            <div class="result-stat-value">${percentage}%</div>
                            <div class="result-stat-label">Accuracy</div>
                        </div>
                    </div>
                    
                    <div class="coins-earned">
                        <span class="coins-earned-icon">🪙</span>
                        <span class="coins-earned-text">+${coinsEarned} Coins!</span>
                    </div>
                    
                    <div class="result-buttons">
                        <button class="result-btn play-again-btn" onclick="startGame('${gameState.currentGame}')">
                            🔄 Play Again
                        </button>
                        <button class="result-btn home-btn" onclick="goHome()">
                            🏠 Back to Games
                        </button>
                    </div>
                </div>
            `;
        }

        // ==================== CONFETTI ====================
        function createConfetti() {
            const container = document.getElementById('confettiContainer');
            container.innerHTML = '';
            
            const colors = ['#FF6B9D', '#4ECDC4', '#FFE66D', '#A06CD5', '#FF8C42', '#7ED957'];
            const shapes = ['■', '●', '▲', '★', '♦', '♥'];
            
            for (let i = 0; i < 80; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.textContent = shapes[Math.floor(Math.random() * shapes.length)];
                confetti.style.fontSize = (Math.random() * 15 + 10) + 'px';
                confetti.style.color = colors[Math.floor(Math.random() * colors.length)];
                container.appendChild(confetti);
            }
            
            setTimeout(() => container.innerHTML = '', 5000);
        }

        // ==================== NOTIFICATION ====================
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 20px 40px;
                border-radius: 30px;
                font-size: 20px;
                font-weight: bold;
                z-index: 4000;
                box-shadow: 0 10px 40px rgba(0,0,0,0.3);
                animation: slideDown 0.4s ease;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideUp 0.4s ease';
                setTimeout(() => notification.remove(), 400);
            }, 3000);
        }

        // ==================== UTILITIES ====================
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function saveGameState() {
            localStorage.setItem('kidsCoins', gameState.coins);
            localStorage.setItem('kidsStreak', gameState.streak);
            localStorage.setItem('kidsLastPlayDate', gameState.lastPlayDate);
        }

        // Add animations
        const styleSheet = document.createElement('style');
        styleSheet.textContent = `
            @keyframes slideDown {
                from { transform: translate(-50%, -100px); opacity: 0; }
                to { transform: translate(-50%, 0); opacity: 1; }
            }
            @keyframes slideUp {
                from { transform: translate(-50%, 0); opacity: 1; }
                to { transform: translate(-50%, -100px); opacity: 0; }
            }
        `;
        document.head.appendChild(styleSheet);
    </script>
</body>
</html>
