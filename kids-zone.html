<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEOTOPIA PREMIUM 🌍 Ultimate Kids Geography Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Comic Sans MS', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        :root {
            --primary: #6C5CE7;
            --secondary: #A29BFE;
            --accent: #FD79A8;
            --gold: #FDCB6E;
            --success: #00B894;
            --danger: #E17055;
            --dark: #2D3436;
            --light: #DFE6E9;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow-x: hidden;
        }

        /* ===== PRELOADER ===== */
        .preloader {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a3e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.5s, visibility 0.5s;
        }

        .preloader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .preloader-planet {
            font-size: 80px;
            animation: planetBounce 1s ease-in-out infinite;
        }

        @keyframes planetBounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .preloader-title {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, #FDCB6E, #E17055, #FD79A8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 20px;
        }

        .preloader-bar {
            width: 200px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 30px;
            overflow: hidden;
        }

        .preloader-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #FDCB6E, #FD79A8);
            border-radius: 3px;
            animation: loadBar 2s ease-out forwards;
        }

        @keyframes loadBar {
            to { width: 100%; }
        }

        /* ===== HEADER ===== */
        .header {
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 42px;
            height: 42px;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 12px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 28px;
            animation: logoSpin 4s linear infinite;
        }

        @keyframes logoSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .logo-text {
            font-size: 20px;
            font-weight: 900;
            color: white;
        }

        .header-right {
            display: flex;
            gap: 8px;
        }

        .stat-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
            color: white;
        }

        .stat-badge.coins { background: linear-gradient(135deg, #FDCB6E, #E17055); }
        .stat-badge.gems { background: linear-gradient(135deg, #A29BFE, #6C5CE7); }

        /* ===== MAIN ===== */
        .main {
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
        }

        .screen {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== HOME SCREEN ===== */
        .hero {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
        }

        .hero-mascot {
            font-size: 70px;
            animation: mascotWave 2s ease-in-out infinite;
        }

        @keyframes mascotWave {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .hero h1 {
            color: white;
            font-size: 24px;
            margin-top: 10px;
        }

        .hero p {
            color: rgba(255,255,255,0.7);
            margin-top: 5px;
        }

        .section-title {
            color: white;
            font-size: 18px;
            margin: 20px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== GAME CARDS ===== */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .game-card {
            background: white;
            border-radius: 20px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }

        .game-card.volcano::before { background: linear-gradient(90deg, #E17055, #FDCB6E); }
        .game-card.pirate::before { background: linear-gradient(90deg, #0984E3, #74B9FF); }
        .game-card.ninja::before { background: linear-gradient(90deg, #6C5CE7, #A29BFE); }
        .game-card.rally::before { background: linear-gradient(90deg, #00B894, #55EFC4); }
        .game-card.space::before { background: linear-gradient(90deg, #2D3436, #636E72); }
        .game-card.puzzle::before { background: linear-gradient(90deg, #FD79A8, #E84393); }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .game-card:active {
            transform: scale(0.98);
        }

        .game-icon {
            font-size: 45px;
            margin-bottom: 8px;
        }

        .game-name {
            font-size: 14px;
            font-weight: bold;
            color: #2D3436;
        }

        .game-desc {
            font-size: 11px;
            color: #636E72;
            margin-top: 3px;
        }

        .game-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: bold;
            color: white;
        }

        .game-badge.hot { background: #E17055; }
        .game-badge.new { background: #00B894; }

        /* ===== QUICK GAMES ===== */
        .quick-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .quick-card {
            background: white;
            border-radius: 15px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quick-card:hover {
            transform: translateY(-3px);
        }

        .quick-icon {
            font-size: 30px;
        }

        .quick-name {
            font-size: 11px;
            font-weight: bold;
            color: #2D3436;
            margin-top: 5px;
        }

        /* ===== GAME SCREEN ===== */
        .game-header {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .game-back {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            color: white;
        }

        .game-info h2 {
            color: white;
            font-size: 16px;
        }

        .game-info p {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }

        .game-stats {
            display: flex;
            gap: 10px;
        }

        .game-stat {
            background: rgba(255,255,255,0.15);
            padding: 8px 15px;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .game-area {
            background: white;
            border-radius: 25px;
            min-height: 450px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin: 10px 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6C5CE7, #A29BFE, #FD79A8);
            border-radius: 4px;
            transition: width 0.3s;
        }

        /* ===== VOLCANO ESCAPE GAME ===== */
        .volcano-scene {
            position: relative;
            height: 420px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 30%, #E17055 70%, #FDCB6E 100%);
            overflow: hidden;
        }

        .volcano-bg {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 200px;
        }

        .volcano-mountain {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 180px solid transparent;
            border-right: 180px solid transparent;
            border-bottom: 200px solid #4a3728;
        }

        .volcano-ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(0deg, #2d1f14, #4a3728);
        }

        .volcano-path {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 200%;
            height: 25px;
            background: repeating-linear-gradient(90deg, #5c4033 0px, #5c4033 40px, #4a3728 40px, #4a3728 80px);
            animation: pathMove 0.4s linear infinite;
        }

        @keyframes pathMove {
            from { transform: translateX(0); }
            to { transform: translateX(-80px); }
        }

        .volcano-player {
            position: absolute;
            bottom: 55px;
            left: 60px;
            font-size: 50px;
            z-index: 100;
            transition: bottom 0.3s ease-out;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }

        .volcano-player.jumping {
            animation: playerJump 0.6s ease-out;
        }

        @keyframes playerJump {
            0% { bottom: 55px; }
            50% { bottom: 180px; }
            100% { bottom: 55px; }
        }

        .volcano-player.sliding {
            bottom: 35px;
            transform: rotate(-25deg) scaleY(0.6);
        }

        .volcano-item {
            position: absolute;
            font-size: 35px;
            z-index: 50;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .volcano-item:hover {
            transform: scale(1.1);
        }

        .volcano-item.coin {
            animation: coinBounce 0.5s ease-in-out infinite;
        }

        @keyframes coinBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .volcano-item.collected {
            animation: itemCollected 0.3s ease forwards !important;
        }

        @keyframes itemCollected {
            to { transform: scale(1.5) translateY(-30px); opacity: 0; }
        }

        .volcano-obstacle {
            position: absolute;
            font-size: 40px;
            bottom: 55px;
            z-index: 50;
        }

        .volcano-hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            z-index: 200;
        }

        .volcano-score {
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            display: flex;
            gap: 15px;
        }

        .volcano-lives {
            display: flex;
            gap: 5px;
            font-size: 22px;
        }

        .volcano-controls {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 200;
        }

        .volcano-btn {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.95);
            border: none;
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.1s;
        }

        .volcano-btn:active {
            transform: scale(0.9);
            background: #FDCB6E;
        }

        .volcano-target {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 20px;
            color: #FDCB6E;
            font-size: 14px;
            z-index: 200;
        }

        /* ===== PIRATE TREASURE GAME ===== */
        .pirate-scene {
            position: relative;
            height: 420px;
            background: linear-gradient(135deg, #deb887 0%, #c4a574 100%);
            overflow: hidden;
        }

        .pirate-map {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, #87CEEB 0%, #87CEEB 15%, transparent 15%),
                radial-gradient(circle at 70% 20%, #87CEEB 0%, #87CEEB 20%, transparent 20%),
                radial-gradient(circle at 50% 70%, #87CEEB 0%, #87CEEB 25%, transparent 25%),
                radial-gradient(circle at 85% 60%, #87CEEB 0%, #87CEEB 12%, transparent 12%),
                linear-gradient(135deg, #deb887 0%, #c4a574 100%);
        }

        .pirate-route {
            position: absolute;
            background: none;
            z-index: 5;
        }

        .pirate-route svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .pirate-route path {
            fill: none;
            stroke: #8B4513;
            stroke-width: 3;
            stroke-dasharray: 10, 5;
            opacity: 0.6;
        }

        .pirate-ship {
            position: absolute;
            font-size: 45px;
            z-index: 100;
            transition: all 1s ease;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }

        .pirate-ship.sailing {
            animation: shipSail 1s ease-in-out;
        }

        @keyframes shipSail {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }

        .pirate-location {
            position: absolute;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 50;
        }

        .pirate-location:hover {
            transform: scale(1.15);
        }

        .location-island {
            width: 60px;
            height: 40px;
            background: linear-gradient(180deg, #228B22 0%, #006400 100%);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .location-palm {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 25px;
        }

        .location-flag {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 22px;
            border-radius: 3px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .location-flag img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .location-name {
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 9px;
            white-space: nowrap;
        }

        .pirate-location.visited .location-island {
            background: linear-gradient(180deg, #FFD700 0%, #FFA500 100%);
        }

        .pirate-location.current {
            animation: locationPulse 1s ease-in-out infinite;
        }

        @keyframes locationPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .pirate-hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            z-index: 200;
        }

        .pirate-mission {
            background: rgba(139, 69, 19, 0.9);
            padding: 12px 20px;
            border-radius: 15px;
            color: white;
            text-align: center;
            border: 2px solid #FFD700;
        }

        .pirate-mission p {
            font-size: 12px;
            opacity: 0.8;
        }

        .pirate-mission h3 {
            font-size: 18px;
            color: #FFD700;
            margin-top: 3px;
        }

        .pirate-transport {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 200;
        }

        .transport-btn {
            width: 55px;
            height: 55px;
            background: white;
            border: 3px solid #8B4513;
            border-radius: 15px;
            font-size: 25px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .transport-btn.active {
            background: #FFD700;
            border-color: #FFA500;
            transform: scale(1.1);
        }

        .transport-btn:hover {
            transform: scale(1.05);
        }

        /* ===== FLAG NINJA GAME ===== */
        .ninja-scene {
            position: relative;
            height: 420px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
        }

        .ninja-dojo {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(0deg, #2D3436, #4a4a4a);
        }

        .ninja-target {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 12px 25px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
        }

        .ninja-target p {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }

        .ninja-target h3 {
            color: #FFD700;
            font-size: 20px;
            margin-top: 3px;
        }

        .ninja-combo {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #FF6B6B;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 20px #FF6B6B;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .ninja-combo.show {
            opacity: 1;
            animation: comboPop 0.3s ease;
        }

        @keyframes comboPop {
            0% { transform: translateX(-50%) scale(0.5); }
            70% { transform: translateX(-50%) scale(1.2); }
            100% { transform: translateX(-50%) scale(1); }
        }

        .ninja-flag {
            position: absolute;
            width: 80px;
            height: 55px;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            z-index: 50;
            transition: transform 0.15s;
        }

        .ninja-flag:hover {
            transform: scale(1.05);
        }

        .ninja-flag img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .ninja-flag.sliced {
            animation: flagSlice 0.4s ease forwards;
            pointer-events: none;
        }

        @keyframes flagSlice {
            0% { transform: scale(1) rotate(0); opacity: 1; }
            50% { transform: scale(1.3) rotate(15deg); }
            100% { transform: scale(0) rotate(30deg); opacity: 0; }
        }

        .ninja-flag.wrong {
            animation: flagWrong 0.4s ease;
        }

        @keyframes flagWrong {
            0%, 100% { transform: translateX(0); filter: none; }
            25% { transform: translateX(-15px); filter: hue-rotate(180deg); }
            75% { transform: translateX(15px); filter: hue-rotate(180deg); }
        }

        .ninja-score {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            z-index: 100;
        }

        .ninja-lives {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            gap: 5px;
            font-size: 22px;
            z-index: 100;
        }

        /* ===== WORLD RALLY GAME ===== */
        .rally-scene {
            position: relative;
            height: 420px;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8C8 50%, #7ED957 100%);
            overflow: hidden;
        }

        .rally-road {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            background: #444;
            transform: perspective(400px) rotateX(50deg);
            transform-origin: bottom;
        }

        .rally-lanes {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            display: flex;
            justify-content: space-around;
            transform: perspective(400px) rotateX(50deg);
            transform-origin: bottom;
        }

        .rally-lane {
            width: 4px;
            height: 100%;
            background: repeating-linear-gradient(0deg, white 0px, white 30px, transparent 30px, transparent 60px);
            animation: laneMove 0.2s linear infinite;
        }

        @keyframes laneMove {
            from { background-position: 0 0; }
            to { background-position: 0 60px; }
        }

        .rally-car {
            position: absolute;
            bottom: 40px;
            font-size: 55px;
            z-index: 100;
            transition: left 0.2s ease;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }

        .rally-car.left { left: 15%; }
        .rally-car.center { left: 50%; transform: translateX(-50%); }
        .rally-car.right { left: 75%; }

        .rally-item {

        .result-overlay {

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);

        .confetti {

        .hidden { display: none !important; }

    <!-- Preloader -->

    <!-- Confetti -->

    <script>
        // =====================================================
        //  🌍 GEOTOPIA PREMIUM v2.0 - COMPLETE GAME ENGINE
        // =====================================================

        // === DATA ===
        const COUNTRIES = [
            {n:"India",c:"New Delhi",f:"in"},{n:"China",c:"Beijing",f:"cn"},{n:"Japan",c:"Tokyo",f:"jp"},
            {n:"France",c:"Paris",f:"fr"},{n:"Germany",c:"Berlin",f:"de"},{n:"Italy",c:"Rome",f:"it"},
            {n:"Spain",c:"Madrid",f:"es"},{n:"Brazil",c:"Brasilia",f:"br"},{n:"Canada",c:"Ottawa",f:"ca"},
            {n:"Australia",c:"Canberra",f:"au"},{n:"UK",c:"London",f:"gb"},{n:"USA",c:"Washington",f:"us"},
            {n:"Russia",c:"Moscow",f:"ru"},{n:"South Korea",c:"Seoul",f:"kr"},{n:"Mexico",c:"Mexico City",f:"mx"},
            {n:"Egypt",c:"Cairo",f:"eg"},{n:"South Africa",c:"Pretoria",f:"za"},{n:"Kenya",c:"Nairobi",f:"ke"},
            {n:"Argentina",c:"Buenos Aires",f:"ar"},{n:"Thailand",c:"Bangkok",f:"th"},
            {n:"Indonesia",c:"Jakarta",f:"id"},{n:"Malaysia",c:"K. Lumpur",f:"my"},{n:"Singapore",c:"Singapore",f:"sg"},
            {n:"Turkey",c:"Ankara",f:"tr"},{n:"Greece",c:"Athens",f:"gr"},{n:"Portugal",c:"Lisbon",f:"pt"},
            {n:"Netherlands",c:"Amsterdam",f:"nl"},{n:"Sweden",c:"Stockholm",f:"se"},{n:"Norway",c:"Oslo",f:"no"},
            {n:"Poland",c:"Warsaw",f:"pl"},{n:"Switzerland",c:"Bern",f:"ch"},{n:"Austria",c:"Vienna",f:"at"},
            {n:"Ireland",c:"Dublin",f:"ie"},{n:"New Zealand",c:"Wellington",f:"nz"},{n:"Philippines",c:"Manila",f:"ph"},
            {n:"Vietnam",c:"Hanoi",f:"vn"},{n:"Pakistan",c:"Islamabad",f:"pk"},{n:"Bangladesh",c:"Dhaka",f:"bd"},
            {n:"Nepal",c:"Kathmandu",f:"np"},{n:"Chile",c:"Santiago",f:"cl"},{n:"Colombia",c:"Bogota",f:"co"},
            {n:"Peru",c:"Lima",f:"pe"},{n:"UAE",c:"Abu Dhabi",f:"ae"},{n:"Saudi Arabia",c:"Riyadh",f:"sa"},
            {n:"Israel",c:"Jerusalem",f:"il"},{n:"Morocco",c:"Rabat",f:"ma"},{n:"Nigeria",c:"Abuja",f:"ng"},
            {n:"Finland",c:"Helsinki",f:"fi"},{n:"Denmark",c:"Copenhagen",f:"dk"},{n:"Belgium",c:"Brussels",f:"be"}
        ];

        const flag = c => `https://flagcdn.com/w320/${c}.png`;
        const shuffle = a => { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; };
        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        // === STATE ===
        let STATE = {
            coins: parseInt(localStorage.getItem('gtCoins')) || 500,
            gems: parseInt(localStorage.getItem('gtGems')) || 25,
            currentGame: null,
            currentLevel: 1,
            gameRunning: false,
            intervals: [],
            timeouts: [],
            gameData: {}
        };

        // === AUDIO ===
        const Audio = {
            ctx: null,
            init() { try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} },
            play(freq, dur, type='sine') {
                if (!this.ctx) return;
                try {
                    const o = this.ctx.createOscillator();
                    const g = this.ctx.createGain();
                    o.connect(g); g.connect(this.ctx.destination);
                    o.frequency.value = freq; o.type = type;
                    g.gain.setValueAtTime(0.15, this.ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
                    o.start(); o.stop(this.ctx.currentTime + dur);
                } catch(e) {}
            },
            click() { this.play(800, 0.05); },
            collect() { this.play(880, 0.08); setTimeout(() => this.play(1100, 0.08), 50); },
            correct() { [523, 659, 784].forEach((f,i) => setTimeout(() => this.play(f, 0.1), i*80)); },
            wrong() { this.play(200, 0.2, 'sawtooth'); },
            win() { [523,587,659,698,784,880,988,1047].forEach((f,i) => setTimeout(() => this.play(f, 0.08), i*60)); }
        };

        // === INIT ===
        document.addEventListener('DOMContentLoaded', () => {
            Audio.init();
            updateUI();
            renderHome();
            setTimeout(() => document.getElementById('preloader').classList.add('hidden'), 2200);
        });

        document.addEventListener('click', () => {
            if (Audio.ctx?.state === 'suspended') Audio.ctx.resume();
        }, { once: true });

        // === UI ===
        function updateUI() {
            document.getElementById('coinsDisplay').textContent = STATE.coins;
            document.getElementById('gemsDisplay').textContent = STATE.gems;
        }

        function saveState() {
            localStorage.setItem('gtCoins', STATE.coins);
            localStorage.setItem('gtGems', STATE.gems);
        }

        function showToast(text, icon, type) {
            const toast = document.getElementById('toast');
            toast.className = `toast show ${type}`;
            document.getElementById('toastIcon').textContent = icon;
            document.getElementById('toastText').textContent = text;
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function confetti() {
            const container = document.getElementById('confettiContainer');
            container.innerHTML = '';
            const colors = ['#FDCB6E', '#E17055', '#FD79A8', '#A29BFE', '#74B9FF', '#00B894'];
            const emojis = ['🎉', '🎊', '⭐', '🌟', '✨'];

            for (let i = 0; i < 50; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                if (Math.random() > 0.5) {
                    c.textContent = emojis[rand(0, emojis.length-1)];
                    c.style.fontSize = rand(15, 25) + 'px';
                } else {
                    c.style.width = rand(8, 12) + 'px';
                    c.style.height = c.style.width;
                    c.style.background = colors[rand(0, colors.length-1)];
                    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                }
                c.style.left = rand(0, 100) + '%';
                c.style.animationDuration = rand(2, 4) + 's';
                c.style.animationDelay = Math.random() * 0.5 + 's';
                container.appendChild(c);
            }
            setTimeout(() => container.innerHTML = '', 4000);
        }

        // === NAVIGATION ===
        function goBack() {
            Audio.click();
            if (STATE.gameRunning) {
                if (confirm('Exit game? Progress will be lost.')) {
                    goHome();
                }
            } else {

        function spawnVolcanoItem() {
            if (!STATE.gameRunning) return;

            const scene = document.getElementById('volcanoScene');

            // Randomly spawn coin, flag, or obstacle
            const type = Math.random();
            
            if (type < 0.4) {

                spawnCollectible('🪙', 10, 'coin');
            } else if (type < 0.7) {

            STATE.timeouts.push(timeout);

        function spawnCollectible(emoji, points, type) {
            const scene = document.getElementById('volcanoScene');
            if (!scene) return;

            const item = document.createElement('div');
            item.className = `volcano-item ${type}`;
            item.textContent = emoji;
            item.style.right = '-50px';
            item.style.bottom = (80 + rand(0, 120)) + 'px';
            item.dataset.points = points;
            
            // Make it clickable/tappable
            item.onclick = () => collectVolcanoItem(item, points);
            
            scene.appendChild(item);

            // Move item left
            let pos = -50;
            const moveInterval = setInterval(() => {
                if (!STATE.gameRunning) {
                    clearInterval(moveInterval);
                    item.remove();
                    return;
                }
                pos += 4;
                item.style.right = pos + 'px';
                
                // Check auto-collect when near player
                const playerBottom = STATE.gameData.jumping ? 180 : (STATE.gameData.sliding ? 35 : 55);
                const itemBottom = parseInt(item.style.bottom);
                
                if (pos > 250 && pos < 320) { // Near player x position
                    if (Math.abs(itemBottom - playerBottom) < 60) {
                        collectVolcanoItem(item, points);
                    }
                }
                
                if (pos > 400) {
                    clearInterval(moveInterval);
                    item.remove();
                }
            }, 30);
            STATE.intervals.push(moveInterval);
        }

            if (item.classList.contains('collected')) return;
            
            Audio.collect();
            item.classList.add('collected');
            
            STATE.gameData.score += points;
            STATE.gameData.collected++;
            
            document.getElementById('vScore').textContent = STATE.gameData.score;
            document.getElementById('vCoins').textContent = STATE.gameData.collected;

                showToast(`+${points} ${countryName}!`, '🏳️', 'success');

        function generateRoutes(locations) {
            let paths = '';
            // Create some connecting routes between locations
            for (let i = 0; i < locations.length; i++) {
                const x1 = 15 + (i % 3) * 30 + 8;
                const y1 = 15 + Math.floor(i / 3) * 35 + 8;
                
                // Connect to next location
                if (i < locations.length - 1) {
                    const x2 = 15 + ((i + 1) % 3) * 30 + 8;
                    const y2 = 15 + Math.floor((i + 1) / 3) * 35 + 8;
                    paths += `<path d="M${x1}% ${y1}% L${x2}% ${y2}%" />`;
                }
            }
            // Connect to ship start position
            paths += `<path d="M50% 85% L${15 + 8}% ${15 + 8}%" />`;
            return paths;
        }

        function setTransport(type) {
            Audio.click();
            STATE.gameData.transport = type;
            
            document.querySelectorAll('.transport-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`t${type.charAt(0).toUpperCase() + type.slice(1)}`).classList.add('active');
            
            const ship = document.getElementById('pirateShip');
            if (ship) {
                ship.textContent = type === 'ship' ? '⛵' : type === 'plane' ? '✈️' : '🚗';
            }
        }

        function visitLocation(index) {
            if (!STATE.gameRunning) return;
            
            Audio.click();
            const loc = STATE.gameData.locations[index];
            const locEl = document.getElementById(`loc${index}`);
            
            if (locEl.classList.contains('visited')) {
                showToast('Already visited!', '📍', 'error');
                return;
            }
            
            // Move ship to location
            const ship = document.getElementById('pirateShip');
            const targetX = 15 + (index % 3) * 30 + 5;
            const targetY = 15 + Math.floor(index / 3) * 35 + 5;
            
            ship.style.transition = 'all 0.8s ease';
            ship.style.left = targetX + '%';
            ship.style.top = targetY + '%';
            ship.classList.add('sailing');
            
            STATE.gameData.moves++;
            
            setTimeout(() => {
                ship.classList.remove('sailing');
                
                if (loc.f === STATE.gameData.treasure.f) {
                    // Found treasure!
                    Audio.correct();
                    locEl.classList.add('visited');
                    STATE.gameData.found++;
                    STATE.gameData.score += 50;
                    
                    document.getElementById('pFound').textContent = STATE.gameData.found;
                    document.getElementById('pScore').textContent = STATE.gameData.score;
                    
                    showToast(`🎉 Found treasure in ${loc.n}!`, '💰', 'success');
                    confetti();
                    
                    if (STATE.gameData.found >= STATE.gameData.targetFound) {
                        pirateWin();
                    } else {
                        // New target
                        const remaining = STATE.gameData.locations.filter((l, i) => 
                            !document.getElementById(`loc${i}`).classList.contains('visited')
                        );
                        STATE.gameData.treasure = remaining[rand(0, remaining.length - 1)];
                        document.getElementById('pTarget').textContent = STATE.gameData.treasure.n;

                    showToast(`Not here! This is ${loc.n}`, '❌', 'error');
                }
            }, 800);
        }

        function spawnNinjaWave() {
            if (!STATE.gameRunning) return;
            
            const scene = document.getElementById('ninjaScene');
            if (!scene) return;

            // Remove old flags
            document.querySelectorAll('.ninja-flag').forEach(f => f.remove());

            // Spawn 3-4 flags
            const numFlags = rand(3, 4);
            const countries = shuffle([...COUNTRIES]).slice(0, numFlags);
            
            // Make sure target is included
            if (!countries.find(c => c.f === STATE.gameData.target.f)) {
                countries[rand(0, countries.length - 1)] = STATE.gameData.target;
            }

            shuffle(countries).forEach((country, i) => {
                const flagEl = document.createElement('div');
                flagEl.className = 'ninja-flag';
                flagEl.innerHTML = `<img src="${flag(country.f)}">`;
                flagEl.dataset.code = country.f;
                flagEl.dataset.name = country.n;
                
                // Spread flags across screen
                flagEl.style.left = (10 + i * 25) + '%';
                flagEl.style.top = '110%';
                
                flagEl.onclick = () => sliceNinjaFlag(flagEl, country);
                
                scene.appendChild(flagEl);
                
                // Animate flag appearing (SLOWER for kids)
                setTimeout(() => {
                    flagEl.style.transition = 'all 1.2s ease-out';
                    flagEl.style.top = (25 + rand(0, 30)) + '%';
                    flagEl.style.left = (5 + rand(0, 80)) + '%';
                    flagEl.style.transform = `rotate(${rand(-20, 20)}deg)`;
                }, i * 200);
                
                // Remove after longer time (SLOWER for kids)
                setTimeout(() => {
                    if (flagEl.parentElement && !flagEl.classList.contains('sliced')) {
                        flagEl.style.transition = 'all 0.8s ease-in';
                        flagEl.style.top = '110%';
                        setTimeout(() => flagEl.remove(), 800);
                    }
                }, 4500 + i * 200); // Much longer display time
            });

            // Next wave (SLOWER)
            const timeout = setTimeout(spawnNinjaWave, 5500);
            STATE.timeouts.push(timeout);
        }

        function sliceNinjaFlag(el, country) {
            if (!STATE.gameRunning || el.classList.contains('sliced')) return;
            
            if (country.f === STATE.gameData.target.f) {
                // Correct slice!
                Audio.correct();
                el.classList.add('sliced');
                
                STATE.gameData.combo++;
                STATE.gameData.maxCombo = Math.max(STATE.gameData.maxCombo, STATE.gameData.combo);
                
                const points = 10 + (STATE.gameData.combo * 5);
                STATE.gameData.score += points;
                STATE.gameData.sliced++;
                
                document.getElementById('nScore').textContent = STATE.gameData.score;
                document.getElementById('nScoreDisplay').textContent = STATE.gameData.score;
                document.getElementById('nSliced').textContent = STATE.gameData.sliced;
                
                // Show combo
                if (STATE.gameData.combo > 1) {
                    const comboEl = document.getElementById('nCombo');
                    comboEl.textContent = `COMBO x${STATE.gameData.combo}!`;
                    comboEl.classList.add('show');
                    setTimeout(() => comboEl.classList.remove('show'), 1500);
                }
                
                showToast(`+${points} ${country.n}!`, '⚔️', 'success');
                
                // Check win
                if (STATE.gameData.sliced >= STATE.gameData.targetSlices) {
                    ninjaWin();
                } else if (STATE.gameData.sliced % 2 === 0) {
                    // New target every 2 slices
                    STATE.gameData.target = COUNTRIES[rand(0, COUNTRIES.length - 1)];
                    document.getElementById('nTarget').textContent = STATE.gameData.target.n;
                }
            } else {
                // Wrong slice
                Audio.wrong();
                el.classList.add('wrong');
                STATE.gameData.combo = 0;
                STATE.gameData.lives--;
                
                document.getElementById('nLives').textContent = '❤️'.repeat(Math.max(0, STATE.gameData.lives)) + 
                                                                '🖤'.repeat(3 - Math.max(0, STATE.gameData.lives));
                
                showToast(`That's ${country.n}!`, '❌', 'error');

        function spawnRallyGate() {
            if (!STATE.gameRunning) return;
            
            const scene = document.getElementById('rallyScene');
            if (!scene) return;

            // Spawn flag gate
            const country = COUNTRIES[rand(0, COUNTRIES.length - 1)];
            const positions = ['20%', '50%', '80%'];
            const pos = positions[rand(0, 2)];
            
            const gate = document.createElement('div');
            gate.className = 'rally-item flag-gate';
            gate.innerHTML = `
                <div class="gate-flag"><img src="${flag(country.f)}"></div>
                <div class="gate-name">${country.n}</div>
            `;
            gate.style.left = pos;
            gate.style.top = '0%';
            gate.dataset.code = country.f;
            gate.dataset.pos = pos;
            
            scene.appendChild(gate);

            // Animate gate moving down
            let gateY = 0;
            const gateInterval = setInterval(() => {
                if (!STATE.gameRunning) {
                    clearInterval(gateInterval);
                    gate.remove();
                    return;
                }
                
                gateY += 3;
                gate.style.top = gateY + '%';
                
                // Check collision with car
                if (gateY > 65 && gateY < 80) {
                    const carPos = STATE.gameData.position;
                    const gatePos = pos === '20%' ? 'left' : pos === '80%' ? 'right' : 'center';
                    
                    if (carPos === gatePos || (carPos === 'center' && pos === '50%')) {
                        if (country.f === STATE.gameData.target.f) {
                            // Correct gate!
                            Audio.correct();
                            gate.classList.add('collected');
                            STATE.gameData.score += 20;
                            STATE.gameData.collected++;
                            STATE.gameData.speed = Math.min(200, STATE.gameData.speed + 10);
                            
                            document.getElementById('rScore').textContent = STATE.gameData.score;
                            showToast(`+20 ${country.n}!`, '🏁', 'success');
                            
                            // New target
                            STATE.gameData.target = COUNTRIES[rand(0, COUNTRIES.length - 1)];
                            document.getElementById('rTarget').textContent = STATE.gameData.target.n;
                            
                            setTimeout(() => gate.remove(), 300);
                            clearInterval(gateInterval);
                            return;
                        } else {
                            // Wrong gate - slow down
                            STATE.gameData.speed = Math.max(50, STATE.gameData.speed - 20);
                        }
                    }
                }
                
                if (gateY > 100) {
                    clearInterval(gateInterval);
                    gate.remove();
                }
            }, 40);
            STATE.intervals.push(gateInterval);

            // Spawn next gate
            const timeout = setTimeout(spawnRallyGate, 2000);
            STATE.timeouts.push(timeout);
        }

        function selectPuzzlePiece(idx) {
            const piece = document.getElementById(`pzPiece${idx}`);
            if (!piece || piece.classList.contains('matched')) return;
            
            Audio.click();
            
            const pieceData = STATE.gameData.pieces[idx];
            
            if (STATE.gameData.selected === null) {
                // First selection
                piece.classList.add('selected');
                STATE.gameData.selected = { idx, data: pieceData, el: piece };
            } else if (STATE.gameData.selected.idx === idx) {
                // Same piece, deselect
                piece.classList.remove('selected');
                STATE.gameData.selected = null;
            } else {
                // Second selection
                STATE.gameData.moves++;
                document.getElementById('pzMoves').textContent = STATE.gameData.moves;
                document.getElementById('pzMovesDisplay').textContent = STATE.gameData.moves;
                
                const first = STATE.gameData.selected;
                
                if (first.data.pairId === pieceData.pairId && first.data.type !== pieceData.type) {
                    // Match!
                    Audio.correct();
                    first.el.classList.remove('selected');
                    first.el.classList.add('matched');
                    piece.classList.add('matched');
                    
                    STATE.gameData.matched++;
                    document.getElementById('pzMatched').textContent = STATE.gameData.matched;
                    document.getElementById('pzMatchedDisplay').textContent = STATE.gameData.matched;
                    
                    showToast(`Matched ${pieceData.country.n}!`, '✅', 'success');

                    piece.classList.add('selected');
                    
                    setTimeout(() => {

                        piece.classList.remove('selected');
                    }, 500);
                }
                
                STATE.gameData.selected = null;
            }
        }

                    <div class="game-stats">
                        <div class="game-stat">👆 <span id="memMoves">0</span></div>
                        <div class="game-stat">✅ <span id="memPairs">0</span>/${pairs}</div>
                    </div>
                </div>
                <div class="game-area" style="padding: 20px;">
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 320px; margin: 20px auto;">
                        ${cards.map((card, i) => `
                            <div onclick="flipMemCard(${i})" style="aspect-ratio: 1; perspective: 1000px; cursor: pointer;">
                                <div id="memCard${i}" style="width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s;">
                                    <div style="position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; background: linear-gradient(135deg, #6C5CE7, #A29BFE); display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 5px 15px rgba(108,92,231,0.3);">❓</div>
                                    <div style="position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; background: white; transform: rotateY(180deg); border: 3px solid #6C5CE7; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                                        <img src="${flag(card.c.f)}" style="width: 85%; height: 85%; object-fit: contain;">
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function flipMemCard(idx) {
            if (!STATE.gameData.canFlip) return;
            
            const card = document.getElementById(`memCard${idx}`);
            if (!card || card.classList.contains('flipped') || card.classList.contains('matched')) return;

            Audio.click();
            card.style.transform = 'rotateY(180deg)';
            card.classList.add('flipped');
            STATE.gameData.flipped.push({ idx, card, data: STATE.gameData.cards[idx] });

            if (STATE.gameData.flipped.length === 2) {
                STATE.gameData.canFlip = false;
                STATE.gameData.moves++;
                document.getElementById('memMoves').textContent = STATE.gameData.moves;

                const [a, b] = STATE.gameData.flipped;
                
                if (a.data.id === b.data.id) {
                    Audio.correct();
                    a.card.classList.add('matched');
                    b.card.classList.add('matched');
                    STATE.gameData.matched++;
                    document.getElementById('memPairs').textContent = STATE.gameData.matched;
                    STATE.gameData.flipped = [];
                    STATE.gameData.canFlip = true;

                    if (STATE.gameData.matched === STATE.gameData.total) {
                        const score = Math.max(100 - (STATE.gameData.moves - STATE.gameData.total) * 3, 30);
                        const stars = STATE.gameData.moves <= STATE.gameData.total + 3 ? 3 : 
                                     STATE.gameData.moves <= STATE.gameData.total + 6 ? 2 : 1;
                        setTimeout(() => showResults(score, stars, 25, 2), 500);
                    }
                } else {
                    setTimeout(() => {
                        Audio.wrong();
                        a.card.style.transform = '';
                        b.card.style.transform = '';
                        a.card.classList.remove('flipped');
                        b.card.classList.remove('flipped');
                        STATE.gameData.flipped = [];
                        STATE.gameData.canFlip = true;
                    }, 800);
                }
            }
        }

        // MAP GAME
        function startMapGame() {
            STATE.gameData = { q: 0, score: 0, total: 6 };
            renderMapQuestion();
        }

        function renderMapQuestion() {
            if (STATE.gameData.q >= STATE.gameData.total) {
                const stars = STATE.gameData.score >= 50 ? 3 : STATE.gameData.score >= 30 ? 2 : 1;
                showResults(STATE.gameData.score, stars, 20, 2);
                return;
            }

            const correct = COUNTRIES[rand(0, COUNTRIES.length - 1)];
            const wrongs = shuffle(COUNTRIES.filter(c => c.f !== correct.f)).slice(0, 3);
            const options = shuffle([correct, ...wrongs]);
            STATE.gameData.correct = correct;

            const scr = document.getElementById('gameScreen');
            scr.innerHTML = `
                <div class="game-header">
                    <div class="game-header-left">
                        <button class="game-back" onclick="goHome()">←</button>
                        <div class="game-info">
                            <h2>🗺️ Map Master</h2>
                            <p>Question ${STATE.gameData.q + 1}/${STATE.gameData.total}</p>
                        </div>
                    </div>
                    <div class="game-stats">
                        <div class="game-stat">⭐ ${STATE.gameData.score}</div>
                    </div>
                </div>
                <div class="game-area" style="padding: 25px; text-align: center;">
                    <p style="font-size: 18px; color: #636E72;">Find the flag of:</p>
                    <h2 style="font-size: 28px; color: #6C5CE7; margin: 10px 0 25px;">${correct.n}</h2>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 300px; margin: 0 auto;">
                        ${options.map(o => `
                            <div onclick="answerMap('${o.f}')" style="cursor: pointer; border-radius: 15px; overflow: hidden; box-shadow: 0 8px 25px rgba(0,0,0,0.15); transition: all 0.2s;">
                                <img src="${flag(o.f)}" style="width: 100%; height: 80px; object-fit: cover;">
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function answerMap(code) {
            Audio.click();
            
            if (code === STATE.gameData.correct.f) {
                Audio.correct();
                STATE.gameData.score += 10;
                showToast('Correct!', '🎉', 'success');
            } else {
                Audio.wrong();
                showToast('Wrong!', '❌', 'error');
            }
            
            STATE.gameData.q++;
            setTimeout(renderMapQuestion, 800);
        }

        // =====================================================
        //  RESULTS
        // =====================================================
        function showResults(score, stars, coins, gems) {
            STATE.gameRunning = false;
            clearAllTimers();
            
            Audio.win();
            confetti();
            
            STATE.coins += coins;
            STATE.gems += gems;
            saveState();
            updateUI();
            
            document.getElementById('resultMascot').textContent = stars >= 2 ? '🏆' : stars === 1 ? '🌟' : '💪';
            document.getElementById('resultTitle').textContent = stars === 3 ? 'PERFECT!' : stars === 2 ? 'Great Job!' : stars === 1 ? 'Good Try!' : 'Keep Practicing!';
            document.getElementById('resultSubtitle').textContent = stars >= 2 ? "You're amazing!" : "You can do better!";
            document.getElementById('resultScore').textContent = score;
            
            document.getElementById('resultStars').innerHTML = [0, 1, 2].map(i => 
                `<span class="result-star ${i < stars ? 'earned' : ''}" style="animation-delay: ${i * 0.2}s">⭐</span>`
            ).join('');
            
            document.getElementById('resultRewards').innerHTML = `
                <div class="result-reward">🪙 +${coins}</div>
                ${gems > 0 ? `<div class="result-reward">💎 +${gems}</div>` : ''}
            `;
            
            document.getElementById('resultOverlay').classList.add('active');
        }

        function playAgain() {
            Audio.click();
            document.getElementById('resultOverlay').classList.remove('active');
            startGame(STATE.currentGame);
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (!STATE.gameRunning) return;
            
            if (STATE.currentGame === 'volcano') {
                if (e.key === 'ArrowUp' || e.key === ' ') {
                    e.preventDefault();
                    volcanoJump();
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    volcanoSlide();
                }
            } else if (STATE.currentGame === 'rally') {
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    rallyMove('left');
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    rallyMove('right');
                }
            }
        });

        console.log('🌍 GEOTOPIA PREMIUM v2.0 - All Games Working!');
    </script>
</body>
</html>
