                        </div>
                    </div>
                </div>
                
                <div class="progress-wrapper">
                    <div class="progress-bar">
                        <div class="progress-fill" style="width:${progress}%"></div>
                    </div>
                </div>
                
                <div class="game-area">
                    <div class="map-game">
                        <div class="map-container">
                            <div class="map-target">
                                🔍 Find: ${correct.name}
                            </div>
                            
                            <div class="world-map">
                                ${options.map(c => `
                                    <button class="country-btn" onclick="selectCountry('${c.name.replace(/'/g, "\\'")}', this)">
                                        <img src="${getFlagUrl(c.code)}" style="width:40px;height:25px;border-radius:3px;margin-right:8px;vertical-align:middle;" onerror="this.style.display='none'">
                                        ${c.name}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function selectCountry(name, el) {
            Audio.click();
            const correct = state.data.correct.name;
            const timeTaken = (Date.now() - state.data.startTime) / 1000;
            
            document.querySelectorAll('.country-btn').forEach(b => b.style.pointerEvents = 'none');
            
            if (name === correct) {
                Audio.correct();
                el.classList.add('correct');
                
                // Bonus points for speed
                const bonus = timeTaken < 3 ? 5 : timeTaken < 5 ? 3 : 0;
                state.score += 10 + bonus;
                
                showToast(true, bonus > 0 ? `Fast! +${10 + bonus} 🚀` : 'Correct! 🎉');
            } else {
                Audio.wrong();
                el.classList.add('wrong');
                document.querySelectorAll('.country-btn').forEach(b => {
                    if (b.textContent.includes(correct)) b.classList.add('correct');
                });
                showToast(false, `It was ${correct}`);
            }
            
            setTimeout(() => {
                state.question++;
                renderWorldQuestion();
            }, 1500);
        }

        // ==================== FEEDBACK TOAST ====================
        function showToast(isCorrect, message) {
            const toast = document.getElementById('feedbackToast');
            toast.className = `feedback-toast show ${isCorrect ? 'correct' : 'wrong'}`;
            document.getElementById('feedbackEmoji').textContent = isCorrect ? '🎉' : '😅';
            document.getElementById('feedbackText').textContent = message;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1200);
        }

        // ==================== RESULTS SCREEN ====================
        function showResults() {
            Audio.win();
            createConfetti();
            
            let maxScore = state.total * 10;
            let percentage = Math.round((state.score / maxScore) * 100);
            
            // Handle special cases
            if (state.currentGame === 'rocket') {
                percentage = state.data.found.length === 10 ? 100 : Math.round((state.data.found.length / 10) * 100);
                state.score = percentage;
            }
            if (state.currentGame === 'memory') {
                percentage = Math.min(100, Math.round(state.score));
            }
            
            percentage = Math.min(100, Math.max(0, percentage));
            
            let stars = percentage >= 90 ? 3 : percentage >= 70 ? 2 : 1;
            let coins = percentage >= 90 ? 20 : percentage >= 70 ? 10 : 5;
            let mascot = percentage >= 90 ? '🏆' : percentage >= 70 ? '🌟' : '👍';
            let title = percentage >= 90 ? 'AMAZING!' : percentage >= 70 ? 'Great Job!' : 'Good Try!';
            let message = percentage >= 90 ? "You're a Geography Superstar!" : 
                          percentage >= 70 ? "Keep up the great work!" : 
                          "Practice makes perfect!";
            
            state.coins += coins;
            save();
            updateUI();
            
            const screen = document.getElementById('gameScreen');
            screen.innerHTML = `
                <div class="result-screen active">
                    <div class="result-mascot">${mascot}</div>
                    <h1 class="result-title">${title}</h1>
                    <p class="result-message">${message}</p>
                    
                    <div class="result-stars">
                        <span class="result-star ${stars >= 1 ? 'earned' : ''}">⭐</span>
                        <span class="result-star ${stars >= 2 ? 'earned' : ''}">⭐</span>
                        <span class="result-star ${stars >= 3 ? 'earned' : ''}">⭐</span>
                    </div>
                    
                    <div class="result-stats">
                        <div class="result-stat">
                            <div class="result-stat-value">${state.score}</div>
                            <div class="result-stat-label">Score</div>
                        </div>
                        <div class="result-stat">
                            <div class="result-stat-value">${percentage}%</div>
                            <div class="result-stat-label">Accuracy</div>
                        </div>
                    </div>
                    
                    <div class="result-coins">
                        <span>🪙</span>
                        <span>+${coins} Coins!</span>
                    </div>
                    
                    <div class="result-buttons">
                        <button class="result-btn primary" onclick="restartGame()">
                            🔄 Play Again
                        </button>
                        <button class="result-btn secondary" onclick="goHome()">
                            🏠 Home
                        </button>
                    </div>
                </div>
            `;
        }

        function restartGame() {
            Audio.click();
            state.score = 0;
            state.question = 0;
            state.used = new Set();
            
            switch(state.currentGame) {
                case 'rocket': startRocketGame(); break;
                case 'factory': startFactoryGame(); break;
                case 'safari': startSafariGame(); break;
                case 'memory': startMemoryGame(); break;
                case 'flags': startFlagGame(); break;
                case 'capitals': startCapitalGame(); break;
                case 'bubbles': startBubbleGame(); break;
                case 'world': startWorldGame(); break;
                default: startRocketGame();
            }
        }

        // ==================== CONFETTI ====================
        function createConfetti() {
            const container = document.getElementById('confettiContainer');
            container.innerHTML = '';
            
            const emojis = ['🎉', '🎊', '⭐', '🌟', '✨', '🎈', '🪙', '🏆'];
            const colors = ['#FF6B9D', '#4ECDC4', '#FFE66D', '#A06CD5', '#FF8C42', '#7ED957'];
            
            for (let i = 0; i < 60; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.textContent = Math.random() > 0.5 ? emojis[Math.floor(Math.random() * emojis.length)] : '';
                confetti.style.cssText = `
                    left: ${Math.random() * 100}%;
                    font-size: ${15 + Math.random() * 20}px;
                    animation-duration: ${2 + Math.random() * 2}s;
                    animation-delay: ${Math.random() * 1}s;
                    ${!confetti.textContent ? `
                        width: 12px;
                        height: 12px;
                        background: ${colors[Math.floor(Math.random() * colors.length)]};
                        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
                    ` : ''}
                `;
                container.appendChild(confetti);
            }
            
            setTimeout(() => container.innerHTML = '', 4000);
        }

        // ==================== END ====================
        console.log('🌍 GEOTOPIA Kids Zone Loaded!');
        console.log(`📊 Data: ${COUNTRIES.length} countries, ${RIVERS.length} rivers, ${MOUNTAINS.length} mountains, ${BIRDS.length} birds, ${ANIMALS.length} animals`);
    </script>
</body>
</html>
