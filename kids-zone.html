<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEOTOPIA Kids - Premium Games 🌍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        :root {
            --pink: #FF6B9D;
            --blue: #4ECDC4;
            --yellow: #FFE66D;
            --purple: #A06CD5;
            --orange: #FF8C42;
            --green: #7ED957;
            --red: #FF5252;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8C8 50%, #7ED957 100%);
            overflow-x: hidden;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .world-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .sun {
            position: absolute;
            top: 20px;
            right: 40px;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #FFD700, #FFA500);
            border-radius: 50%;
            box-shadow: 0 0 50px #FFD700;
            animation: sunGlow 3s ease-in-out infinite;
        }

        .sun::after {
            content: '😊';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
        }

        @keyframes sunGlow {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.9;
            animation: cloudFloat linear infinite;
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        .cloud:nth-child(2) { width: 100px; height: 40px; top: 60px; animation-duration: 30s; }
        .cloud:nth-child(2)::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud:nth-child(2)::after { width: 40px; height: 40px; top: -18px; left: 50px; }

        .cloud:nth-child(3) { width: 80px; height: 35px; top: 130px; animation-duration: 25s; animation-delay: -10s; }
        .cloud:nth-child(3)::before { width: 40px; height: 40px; top: -20px; left: 12px; }
        .cloud:nth-child(3)::after { width: 35px; height: 35px; top: -15px; left: 40px; }

        @keyframes cloudFloat {
            0% { left: -150px; }
            100% { left: calc(100vw + 50px); }
        }

        /* ===== LOADING SCREEN ===== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: all 0.5s;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-earth {
            font-size: 100px;
            animation: earthBounce 0.8s ease-in-out infinite;
        }

        @keyframes earthBounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(10deg); }
        }

        .loading-title {
            color: white;
            font-size: 38px;
            margin-top: 20px;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }

        .loading-bar-wrap {
            width: 220px;
            height: 14px;
            background: rgba(255,255,255,0.3);
            border-radius: 7px;
            margin-top: 25px;
            overflow: hidden;
        }

        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #FFE66D, #FF6B9D, #4ECDC4);
            border-radius: 7px;
            animation: loadFill 2s ease-out forwards;
        }

        @keyframes loadFill {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 5px 30px rgba(0,0,0,0.25);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 14px;
            font-size: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 40px;
            animation: logoSpin 4s linear infinite;
        }

        @keyframes logoSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-text {
            color: white;
            font-size: 26px;
            font-weight: bold;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
        }

        .coin-pill {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #333;
        }

        .streak-pill {
            background: linear-gradient(135deg, #FF6B9D, #FF5252);
            color: white;
        }

        .sound-btn {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 14px;
            font-size: 24px;
            cursor: pointer;
        }

        /* ===== MAIN ===== */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 15px;
            position: relative;
            z-index: 1;
        }

        /* ===== HOME SCREEN ===== */
        .home-screen { display: block; }

        .welcome-banner {
            background: white;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.12);
            margin-bottom: 25px;
        }

        .welcome-mascot {
            font-size: 90px;
            animation: mascotDance 1.5s ease-in-out infinite;
        }

        @keyframes mascotDance {
            0%, 100% { transform: rotate(-8deg) scale(1); }
            50% { transform: rotate(8deg) scale(1.05); }
        }

        .welcome-title {
            font-size: 34px;
            color: #333;
            margin: 15px 0 8px;
        }

        .welcome-title span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-sub {
            font-size: 18px;
            color: #777;
        }

        .section-title {
            font-size: 26px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.25);
            margin-bottom: 18px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 18px;
        }

        .game-card {
            background: white;
            border-radius: 25px;
            padding: 22px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 35px rgba(0,0,0,0.1);
            position: relative;
        }

        .game-card:active {
            transform: scale(0.96);
        }

        .game-card:hover {
            transform: translateY(-8px);
        }

        .game-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
        }

        .game-badge.hot { background: linear-gradient(135deg, #f5576c, #f093fb); }
        .game-badge.new { background: linear-gradient(135deg, #4ECDC4, #26de81); }
        .game-badge.fun { background: linear-gradient(135deg, #FFE66D, #f7b731); color: #333; }

        .game-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .game-name {
            font-size: 15px;
            font-weight: bold;
            color: #333;
        }

        /* ===== GAME SCREEN ===== */
        .game-screen {
            display: none;
        }

        .game-screen.active {
            display: block;
        }

        .game-bar {
            background: white;
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            flex-wrap: wrap;
            gap: 12px;
        }

        .game-bar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .game-back {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 14px;
            font-size: 22px;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-bar-title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }

        .game-bar-right {
            display: flex;
            gap: 12px;
        }

        .game-stat-box {
            background: #f5f5f5;
            padding: 10px 18px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .game-area {
            background: white;
            border-radius: 30px;
            padding: 25px;
            min-height: 480px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        /* ===== PROGRESS BAR ===== */
        .progress-wrap {
            margin-bottom: 15px;
        }

        .progress-track {
            height: 12px;
            background: #e8e8e8;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #7ED957, #4ECDC4, #667eea);
            border-radius: 6px;
            transition: width 0.4s;
        }

        /* =====================================================
           🚀 NUMBER ROCKET - FIXED
           ===================================================== */
        .rocket-scene {
            position: relative;
            height: 450px;
            background: linear-gradient(180deg, #0d0d2b 0%, #1a1a4e 40%, #2d2d7a 100%);
            border-radius: 25px;
            overflow: hidden;
        }

        .space-stars {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .space-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: starTwinkle 2s ease-in-out infinite;
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .planet-moon {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 30% 30%, #f5f5f5, #bbb);
            border-radius: 50%;
            top: 25px;
            left: 25px;
        }

        .planet-mars {
            position: absolute;
            width: 35px;
            height: 35px;
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b);
            border-radius: 50%;
            top: 80px;
            right: 70px;
        }

        .rocket-ship {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 65px;
            z-index: 10;
            filter: drop-shadow(0 0 20px rgba(255,200,0,0.5));
            transition: all 0.3s;
        }

        .rocket-ship.launching {
            animation: rocketLaunch 3s ease-in forwards;
        }

        @keyframes rocketLaunch {
            0% { bottom: 35px; }
            30% { bottom: 100px; transform: translateX(-50%) rotate(-5deg); }
            60% { bottom: 200px; transform: translateX(-50%) rotate(5deg); }
            100% { bottom: 600px; transform: translateX(-50%) scale(0.3); opacity: 0; }
        }

        .rocket-flame {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            opacity: 0;
            z-index: 9;
        }

        .rocket-flame.on {
            opacity: 1;
            animation: flameFlicker 0.1s infinite;
        }

        @keyframes flameFlicker {
            0%, 100% { transform: translateX(-50%) scaleY(1); }
            50% { transform: translateX(-50%) scaleY(1.3); }
        }

        .fuel-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 12px;
            backdrop-filter: blur(5px);
        }

        .fuel-label {
            color: white;
            font-size: 11px;
            text-align: center;
            margin-bottom: 8px;
        }

        .fuel-tank {
            width: 25px;
            height: 120px;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .fuel-level {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(0deg, #f12711, #FF8C42, #FFE66D, #7ED957);
            border-radius: 10px;
            transition: height 0.4s;
        }

        .target-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .target-num {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .target-num.current {
            background: linear-gradient(135deg, #FFE66D, #f7b731);
            color: #333;
            transform: scale(1.15);
            box-shadow: 0 0 15px rgba(255,230,109,0.7);
        }

        .target-num.found {
            background: linear-gradient(135deg, #7ED957, #26de81);
            color: white;
        }

        .cards-container {
            position: absolute;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(5, 55px);
            gap: 10px;
        }

        .rocket-card {
            width: 55px;
            height: 55px;
            perspective: 1000px;
            cursor: pointer;
        }

        .rocket-card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        .rocket-card.flipped .rocket-card-inner {
            transform: rotateY(180deg);
        }

        .rocket-card-front, .rocket-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }

        .rocket-card-front {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.5);
        }

        .rocket-card-front::after {
            content: '?';
        }

        .rocket-card-back {
            background: linear-gradient(135deg, #4ECDC4, #26de81);
            color: white;
            transform: rotateY(180deg);
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.5);
        }

        .rocket-card.found .rocket-card-back {
            background: linear-gradient(135deg, #7ED957, #26de81);
        }

        .rocket-card.wrong .rocket-card-back {
            background: linear-gradient(135deg, #FF5252, #f12711);
        }

        .rocket-card.locked {
            pointer-events: none;
        }

        .instruction-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .instruction-box {
            background: white;
            padding: 30px 40px;
            border-radius: 25px;
            text-align: center;
            max-width: 350px;
            animation: popIn 0.4s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .instruction-box h3 {
            font-size: 26px;
            color: #333;
            margin-bottom: 15px;
        }

        .instruction-box p {
            font-size: 16px;
            color: #666;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .instruction-box .highlight {
            color: var(--purple);
            font-weight: bold;
        }

        .instruction-box .warning {
            color: var(--red);
            font-weight: bold;
            font-size: 14px;
            margin-top: 10px;
        }

        .start-btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #7ED957, #26de81);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(126, 217, 87, 0.4);
        }

        .attempt-display {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.15);
            padding: 8px 20px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }

        /* =====================================================
           🏹 ARCHERY GAME - WITH LEVELS
           ===================================================== */
        .archery-scene {
            position: relative;
            height: 450px;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8C8 60%, #7ED957 100%);
            border-radius: 25px;
            overflow: hidden;
        }

        .archery-ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(0deg, #5D4E37, #8B7355);
        }

        .archery-grass {
            position: absolute;
            bottom: 75px;
            left: 0;
            width: 100%;
            height: 15px;
            background: #7ED957;
        }

        .archer-container {
            position: absolute;
            bottom: 90px;
            left: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .archer {
            font-size: 60px;
            transform: scaleX(-1);
        }

        .bow-container {
            position: absolute;
            bottom: 100px;
            left: 80px;
            width: 60px;
            height: 100px;
        }

        .bow {
            position: absolute;
            width: 8px;
            height: 80px;
            background: linear-gradient(180deg, #8B4513, #654321);
            border-radius: 50%;
            transform: rotate(90deg);
            left: 25px;
            top: 10px;
        }

        .bow::before {
            content: '';
            position: absolute;
            width: 60px;
            height: 2px;
            background: #333;
            top: 39px;
            left: -26px;
        }

        .arrow {
            position: absolute;
            width: 50px;
            height: 4px;
            background: linear-gradient(90deg, #8B4513 80%, #FF5252 100%);
            top: 48px;
            left: 30px;
            transform-origin: left center;
            transition: all 0.3s;
        }

        .arrow::before {
            content: '';
            position: absolute;
            right: -10px;
            top: -3px;
            border-left: 15px solid #8B4513;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
        }

        .arrow.shooting {
            animation: arrowFly 0.5s ease-out forwards;
        }

        @keyframes arrowFly {
            0% { left: 30px; opacity: 1; }
            100% { left: 500px; opacity: 0; }
        }

        .targets-area {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .archery-target {
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .archery-target:hover {
            transform: scale(1.1);
        }

        .target-board {
            width: 90px;
            height: 90px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .target-board::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 8px solid #FF5252;
            border-radius: 50%;
            box-sizing: border-box;
        }

        .target-board::after {
            content: '';
            position: absolute;
            width: 60%;
            height: 60%;
            border: 6px solid #FF5252;
            border-radius: 50%;
        }

        .target-flag {
            width: 55px;
            height: 35px;
            border-radius: 5px;
            overflow: hidden;
            position: relative;
            z-index: 5;
        }

        .target-flag img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .archery-target.hit {
            animation: targetHit 0.5s ease forwards;
        }

        @keyframes targetHit {
            0% { transform: scale(1); }
            50% { transform: scale(1.3) rotate(10deg); }
            100% { transform: scale(0); opacity: 0; }
        }

        .archery-target.miss {
            animation: targetMiss 0.4s ease;
        }

        @keyframes targetMiss {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .archery-target.floating {
            animation: targetFloat 2s ease-in-out infinite;
        }

        @keyframes targetFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .level-display {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .target-country {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: bold;
        }

        /* =====================================================
           🏃 GEO RUNNER - FIXED
           ===================================================== */
        .runner-scene {
            position: relative;
            height: 400px;
            background: linear-gradient(180deg, #87CEEB 0%, #B4E1FF 100%);
            border-radius: 25px;
            overflow: hidden;
        }

        .runner-mountains {
            position: absolute;
            bottom: 100px;
            left: 0;
            width: 200%;
            height: 150px;
            background: 
                linear-gradient(135deg, transparent 40%, #9B8B7A 40%, #9B8B7A 45%, transparent 45%),
                linear-gradient(225deg, transparent 40%, #8B7B6A 40%, #8B7B6A 45%, transparent 45%);
            background-size: 100px 150px;
            animation: mountainScroll 8s linear infinite;
        }

        @keyframes mountainScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .runner-ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 100px;
            background: linear-gradient(0deg, #5D4E37 0%, #7ED957 100%);
            animation: groundScroll 1s linear infinite;
        }

        @keyframes groundScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100px); }
        }

        .runner-path {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 200%;
            height: 20px;
            background: repeating-linear-gradient(
                90deg,
                #999 0px, #999 30px,
                #888 30px, #888 60px
            );
            animation: pathScroll 0.3s linear infinite;
        }

        @keyframes pathScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-60px); }
        }

        .runner-player {
            position: absolute;
            bottom: 50px;
            left: 80px;
            font-size: 65px;
            z-index: 10;
            transition: bottom 0.15s;
        }

        .runner-player.running {
            animation: playerRun 0.2s steps(2) infinite;
        }

        @keyframes playerRun {
            0% { transform: translateY(0) scaleX(1); }
            50% { transform: translateY(-3px) scaleX(1.02); }
            100% { transform: translateY(0) scaleX(1); }
        }

        .runner-player.jumping {
            animation: playerJump 0.6s ease-out;
        }

        @keyframes playerJump {
            0% { bottom: 50px; }
            50% { bottom: 180px; }
            100% { bottom: 50px; }
        }

        .runner-collectible {
            position: absolute;
            font-size: 45px;
            z-index: 5;
            animation: collectibleMove linear forwards;
            cursor: pointer;
        }

        @keyframes collectibleMove {
            0% { right: -60px; }
            100% { right: calc(100% + 60px); }
        }

        .runner-collectible.correct {
            border: 3px solid #7ED957;
            border-radius: 50%;
            padding: 5px;
            background: rgba(126, 217, 87, 0.3);
        }

        .runner-collectible.collected {
            animation: collectAnim 0.3s ease forwards;
        }

        @keyframes collectAnim {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5) translateY(-30px); opacity: 0; }
        }

        .runner-obstacle {
            position: absolute;
            bottom: 50px;
            font-size: 50px;
            animation: obstacleMove linear forwards;
        }

        @keyframes obstacleMove {
            0% { right: -80px; }
            100% { right: calc(100% + 80px); }
        }

        .runner-target-display {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .runner-lives {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 25px;
            display: flex;
            gap: 5px;
        }

        .runner-tap-hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 16px;
        }

        /* =====================================================
           🧺 FLAG CATCHER - FIXED
           ===================================================== */
        .catcher-scene {
            position: relative;
            height: 450px;
            background: linear-gradient(180deg, #87CEEB 0%, #B4E1FF 50%, #98D8C8 100%);
            border-radius: 25px;
            overflow: hidden;
        }

        .catcher-clouds {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
        }

        .mini-cloud {
            position: absolute;
            font-size: 40px;
            opacity: 0.8;
            animation: cloudDrift linear infinite;
        }

        .mini-cloud:nth-child(1) { top: 10px; animation-duration: 20s; }
        .mini-cloud:nth-child(2) { top: 40px; animation-duration: 25s; animation-delay: -10s; }
        .mini-cloud:nth-child(3) { top: 60px; animation-duration: 18s; animation-delay: -5s; }

        @keyframes cloudDrift {
            0% { left: -60px; }
            100% { left: calc(100% + 60px); }
        }

        .target-flag-display {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 15px 30px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            z-index: 50;
        }

        .target-flag-display p {
            font-size: 16px;
            color: #666;
            margin-bottom: 8px;
        }

        .target-flag-display h3 {
            font-size: 24px;
            color: #333;
        }

        .falling-flag {
            position: absolute;
            width: 70px;
            height: 45px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 10;
            transition: transform 0.2s;
        }

        .falling-flag:hover {
            transform: scale(1.1);
        }

        .falling-flag img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .falling-flag.caught {
            animation: flagCaught 0.4s ease forwards;
        }

        @keyframes flagCaught {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); }
            100% { transform: scale(0); opacity: 0; }
        }

        .falling-flag.wrong {
            animation: flagWrong 0.5s ease;
        }

        @keyframes flagWrong {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(-15deg); }
            75% { transform: rotate(15deg); }
        }

        .falling-flag.missed {
            animation: flagMissed 0.3s ease forwards;
        }

        @keyframes flagMissed {
            0% { opacity: 1; }
            100% { opacity: 0; transform: translateY(20px); }
        }

        .catcher-basket {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 80px;
        }

        .basket-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #D2691E, #8B4513);
            border-radius: 0 0 30px 30px;
            position: relative;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .basket-body::before {
            content: '';
            position: absolute;
            top: -12px;
            left: -8px;
            right: -8px;
            height: 18px;
            background: linear-gradient(180deg, #A0522D, #8B4513);
            border-radius: 10px;
        }

        .basket-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #666;
            white-space: nowrap;
        }

        .catcher-lives {
            position: absolute;
            top: 80px;
            right: 20px;
            display: flex;
            gap: 5px;
        }

        .catcher-lives span {
            font-size: 25px;
        }

        .catcher-score-popup {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #7ED957;
            animation: scoreFloat 1s ease forwards;
            pointer-events: none;
        }

        @keyframes scoreFloat {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }

        @keyframes flagFall {
            0% { top: -60px; }
            100% { top: calc(100% - 120px); }
        }

        /* ===== OTHER GAME STYLES (Memory, Flags, etc) ===== */
        
        /* Memory */
        .memory-grid {
            display: grid;
            gap: 12px;
            justify-content: center;
            margin: 20px auto;
        }

        .memory-grid.g4 { grid-template-columns: repeat(4, 70px); }

        .mem-card {
            width: 70px;
            height: 70px;
            perspective: 1000px;
            cursor: pointer;
        }

        .mem-card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        .mem-card.flip .mem-card-inner {
            transform: rotateY(180deg);
        }

        .mem-card-front, .mem-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mem-card-front {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-size: 28px;
        }

        .mem-card-back {
            background: white;
            border: 3px solid #667eea;
            transform: rotateY(180deg);
            overflow: hidden;
            padding: 5px;
        }

        .mem-card-back img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .mem-card.matched .mem-card-back {
            background: #d4fcc3;
            border-color: #7ED957;
        }

        /* Quiz buttons */
        .quiz-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 500px;
            margin: 20px auto 0;
        }

        .quiz-btn {
            padding: 18px;
            border: 4px solid #e0e0e0;
            border-radius: 18px;
            background: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quiz-btn:hover {
            border-color: #667eea;
            transform: translateY(-3px);
        }

        .quiz-btn.correct {
            background: linear-gradient(135deg, #7ED957, #26de81);
            border-color: #7ED957;
            color: white;
        }

        .quiz-btn.wrong {
            background: linear-gradient(135deg, #FF5252, #f12711);
            border-color: #FF5252;
            color: white;
        }

        /* Flag display */
        .flag-display {
            width: 240px;
            height: 150px;
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            border: 5px solid white;
        }

        .flag-display img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Sorting */
        .factory-scene {
            background: linear-gradient(180deg, #ffecd2, #fcb69f);
            border-radius: 25px;
            min-height: 400px;
            position: relative;
            overflow: hidden;
        }

        .conveyor {
            position: absolute;
            bottom: 140px;
            left: 0;
            width: 100%;
            height: 45px;
            background: repeating-linear-gradient(90deg, #444 0px, #444 20px, #333 20px, #333 40px);
            animation: conveyorMove 0.8s linear infinite;
        }

        @keyframes conveyorMove {
            0% { background-position: 0 0; }
            100% { background-position: 40px 0; }
        }

        .sort-item {
            position: absolute;
            bottom: 160px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 18px 40px;
            border-radius: 20px;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .sort-bins {
            position: absolute;
            bottom: 15px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .sort-bin {
            width: 130px;
            height: 110px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.3s;
        }

        .sort-bin:hover {
            transform: scale(1.08) translateY(-5px);
        }

        .sort-bin.ocean { background: linear-gradient(180deg, #00d2ff, #3a7bd5); }
        .sort-bin.land { background: linear-gradient(180deg, #7ED957, #26de81); }
        .sort-bin.river { background: linear-gradient(180deg, #4ECDC4, #1a8f8f); }
        .sort-bin.mountain { background: linear-gradient(180deg, #8B7355, #5D4E37); }
        .sort-bin.bird { background: linear-gradient(180deg, #87CEEB, #5D9CEC); }
        .sort-bin.animal { background: linear-gradient(180deg, #f7b731, #e17055); }

        .sort-bin-icon { font-size: 40px; }
        .sort-bin-label { color: white; font-size: 14px; font-weight: bold; }

        .cat-tabs {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: white;
            padding: 6px;
            border-radius: 18px;
        }

        .cat-tab {
            padding: 8px 15px;
            border: none;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            background: #eee;
            color: #666;
        }

        .cat-tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        /* ===== RESULT SCREEN ===== */
        .result-screen {
            display: none;
            text-align: center;
            padding: 35px 25px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .result-screen.active {
            display: block;
            animation: resultPop 0.5s ease;
        }

        @keyframes resultPop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.03); }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-mascot {
            font-size: 100px;
            animation: resultDance 1s ease-in-out infinite;
        }

        @keyframes resultDance {
            0%, 100% { transform: rotate(-10deg) scale(1); }
            50% { transform: rotate(10deg) scale(1.08); }
        }

        .result-title {
            font-size: 36px;
            margin: 15px 0 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .result-msg {
            font-size: 18px;
            color: #666;
            margin-bottom: 25px;
        }

        .result-stars {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .result-star {
            font-size: 45px;
            color: #ddd;
        }

        .result-star.earned {
            color: #FFD700;
            animation: starEarn 0.5s ease forwards;
        }

        @keyframes starEarn {
            0% { transform: scale(0) rotate(-180deg); }
            100% { transform: scale(1) rotate(0); }
        }

        .result-stats {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 25px;
        }

        .result-stat {
            background: #f8f8f8;
            padding: 18px 30px;
            border-radius: 18px;
        }

        .result-stat-val {
            font-size: 30px;
            font-weight: bold;
            color: #667eea;
        }

        .result-stat-lbl {
            font-size: 13px;
            color: #888;
        }

        .result-coins {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            padding: 15px 35px;
            border-radius: 30px;
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 25px;
        }

        .result-btns {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .result-btn {
            padding: 16px 35px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .result-btn.primary {
            background: linear-gradient(135deg, #7ED957, #26de81);
            color: white;
        }

        .result-btn.secondary {
            background: white;
            color: #667eea;
            border: 3px solid #667eea;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            padding: 25px 45px;
            border-radius: 25px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        .toast.show {
            transform: translate(-50%, -50%) scale(1);
            animation: toastIn 0.35s ease;
        }

        @keyframes toastIn {
            0% { transform: translate(-50%, -50%) scale(0); }
            70% { transform: translate(-50%, -50%) scale(1.08); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .toast.correct { background: linear-gradient(135deg, #7ED957, #26de81); }
        .toast.wrong { background: linear-gradient(135deg, #FF5252, #f12711); }

        .toast-emoji { font-size: 50px; }

        /* ===== CONFETTI ===== */
        .confetti-box {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5000;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-20px) rotate(0); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .games-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .game-card { padding: 18px 10px; }
            .game-icon { font-size: 40px; }
            .game-name { font-size: 13px; }
            
            .cards-grid { grid-template-columns: repeat(5, 48px); gap: 8px; }
            .rocket-card { width: 48px; height: 48px; }
            .rocket-card-front, .rocket-card-back { font-size: 20px; }
            
            .memory-grid.g4 { grid-template-columns: repeat(4, 60px); }
            .mem-card { width: 60px; height: 60px; }

        .hidden { display: none !important; }

    <!-- Background -->
    <div class="world-bg">
        <div class="sun"></div>
        <div class="cloud"></div>
        <div class="cloud"></div>

    <div class="loading-screen" id="loadingScreen">
        <div class="loading-earth">🌍</div>
        <div class="loading-title">GEOTOPIA</div>
        <div class="loading-bar-wrap">
            <div class="loading-bar-fill"></div>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <button class="back-btn" onclick="goBack()">⬅️</button>

                <span class="logo-icon">🌍</span>
                <span class="logo-text">GEOTOPIA</span>
            </div>
        </div>
        <div class="header-right">
            <div class="stat-pill coin-pill">
                <span>🪙</span>
                <span id="coins">0</span>
            </div>

                <span>🔥</span>
                <span id="streak">0</span>

        </div>

    <!-- Main -->
    <div class="main-container">
        <!-- Home -->
        <div class="home-screen" id="homeScreen">
            <div class="welcome-banner">
                <div class="welcome-mascot">🦊</div>
                <h1 class="welcome-title">Welcome to <span>Kids Zone!</span></h1>
                <p class="welcome-sub">Fun geography games for everyone!</p>
            </div>

            <h2 class="section-title">🎮 Pick a Game!</h2>
            <div class="games-grid" id="gamesGrid"></div>
        </div>

        <!-- Game Screen -->
        <div class="game-screen" id="gameScreen"></div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <div class="toast-emoji" id="toastEmoji">🎉</div>
        <div id="toastText">Correct!</div>
    </div>

    <!-- Confetti -->
    <div class="confetti-box" id="confettiBox"></div>

    <script>

            play(f, d, t='sine') {
                if (!S.sound || !this.ctx) return;
                try {
                    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
                    o.connect(g); g.connect(this.ctx.destination);
                    o.frequency.value = f; o.type = t;
                    g.gain.setValueAtTime(0.2, this.ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + d);
                    o.start(); o.stop(this.ctx.currentTime + d);
                } catch(e) {}
            },
            click() { this.play(600, 0.08); },

        function clickRocketCard(idx, num) {
            if (S.data.showInstructions || S.data.locked) return;
            
            const card = document.getElementById(`rc${idx}`);
            if (card.classList.contains('found') || card.classList.contains('flipped')) return;
            
            Audio.click();
            card.classList.add('flipped');
            S.data.attempts++;
            document.getElementById('attemptDisplay').textContent = `Attempts: ${S.data.attempts}`;

            setTimeout(() => {
                if (num === S.data.target) {
                    // CORRECT
                    Audio.correct();
                    card.classList.add('found');
                    S.data.found.push(num);

                    document.getElementById(`tgt${num}`).classList.remove('current');
                    document.getElementById(`tgt${num}`).classList.add('found');
                    
                    S.data.target++;
                    document.getElementById('rocketFound').textContent = `${S.data.found.length}/10`;
                    document.getElementById('fuelFill').style.height = (S.data.found.length * 10) + '%';
                    
                    if (S.data.target <= 10) {
                        document.getElementById(`tgt${S.data.target}`).classList.add('current');
                        document.getElementById('rocketTarget').textContent = `Find: ${S.data.target}`;
                    }
                    
                    if (S.data.found.length >= 5) {
                        document.getElementById('flame').classList.add('on');
                    }
                    
                    // WIN

                        S.data.locked = true;
                        setTimeout(() => {
                            document.getElementById('rocket').classList.add('launching');

                            }, 3000);
                        }, 500);

                    card.classList.add('wrong');

                    }, 1200);
                }
            }, 500);
        }

        function spawnRunnerItem() {
            if (!S.data.running) return;
            
            const scene = document.getElementById('runnerScene');
            if (!scene) return;

            const isCorrect = Math.random() > 0.4;
            const item = isCorrect ? S.data.target : S.data.allItems[Math.floor(Math.random() * S.data.allItems.length)];
            
            const div = document.createElement('div');
            div.className = `runner-collectible ${item === S.data.target ? 'correct' : ''}`;
            div.textContent = item.e;
            div.style.bottom = (50 + Math.random() * 100) + 'px';
            div.style.animationDuration = S.data.speed + 'ms';
            div.dataset.correct = item === S.data.target;
            
            div.onclick = (e) => {
                e.stopPropagation();
                collectItem(div, item === S.data.target);
            };
            
            scene.appendChild(div);

            div.addEventListener('animationend', () => {
                if (!div.classList.contains('collected') && item === S.data.target) {
                    loseRunnerLife();
                }
                div.remove();
            });

            const interval = setTimeout(() => spawnRunnerItem(), 1500 + Math.random() * 1000);
            S.intervals.push(interval);
        }

        function collectItem(el, isCorrect) {
            if (el.classList.contains('collected')) return;
            
            el.classList.add('collected');
            
            if (isCorrect) {
                Audio.correct();
                S.data.score += 10;
                document.getElementById('runnerScore').textContent = S.data.score;
                
                S.data.allItems = shuffle([...EASY_WORDS]).slice(0, 5);
                S.data.target = S.data.allItems[0];
                document.getElementById('runnerTargetEmoji').textContent = S.data.target.e;
                document.getElementById('runnerTargetWord').textContent = S.data.target.w;
                
                S.data.speed = Math.max(1800, S.data.speed - 80);
            } else {
                Audio.wrong();
                loseRunnerLife();
            }
        }

        function loseRunnerLife() {
            S.data.lives--;
            const livesEl = document.getElementById('runnerLives');
            if (livesEl) {
                livesEl.textContent = '❤️'.repeat(Math.max(0, S.data.lives));
            }
            
            if (S.data.lives <= 0) {
                stopRunner();
                S.score = S.data.score;
                showResults();
            }
        }

        function runnerJump() {
            if (S.data.jumping) return;
            
            Audio.click();
            S.data.jumping = true;
            
            const player = document.getElementById('runnerPlayer');
            if (player) {
                player.classList.remove('running');
                player.classList.add('jumping');
                
                setTimeout(() => {
                    if (player) {
                        player.classList.remove('jumping');
                        player.classList.add('running');
                    }
                    S.data.jumping = false;
                }, 600);
            }
        }

            S.data.running = false;
            clearAllIntervals();
        }

                <div class="game-bar">
                    <div class="game-bar-left">
                        <button class="game-back" onclick="stopCatcher();goHome()">⬅️</button>
                        <div class="game-bar-title">🧺 Flag Catcher</div>
                    </div>
                    <div class="game-bar-right">
                        <div class="game-stat-box"><span>⭐</span><span id="catcherScore">${S.data.score}</span></div>
                    </div>
                </div>
                <div class="game-area" style="padding:0">
                    <div class="catcher-scene" id="catcherScene">
                        <div class="catcher-clouds">
                            <span class="mini-cloud">☁️</span>
                            <span class="mini-cloud">☁️</span>
                            <span class="mini-cloud">☁️</span>
                        </div>
                        
                        <div class="target-flag-display" id="targetDisplay">
                            <p>Catch the flag of:</p>
                            <h3 id="targetCountry">Loading...</h3>
                        </div>
                        
                        <div class="catcher-lives" id="catcherLives">
                            ${'❤️'.repeat(S.data.lives)}
                        </div>
                        
                        <div class="catcher-basket" id="basket">
                            <div class="basket-body"></div>
                            <div class="basket-label">👆 Tap correct flag!</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function spawnFlag() {
            if (!S.data.playing) return;
            
            const scene = document.getElementById('catcherScene');
            if (!scene) return;

            document.querySelectorAll('.falling-flag').forEach(f => f.remove());

            const countries = shuffle([...COUNTRIES]).slice(0, 4);
            S.data.target = countries[0];
            
            document.getElementById('targetCountry').textContent = S.data.target.n;

            const shuffled = shuffle([...countries]);
            
            shuffled.forEach((c, i) => {
                const div = document.createElement('div');
                div.className = 'falling-flag';
                div.innerHTML = `<img src="${flag(c.f)}" onerror="this.parentElement.textContent='🏳️'">`;
                div.style.left = (10 + i * 22) + '%';
                div.style.top = '-60px';
                div.style.animation = `flagFall ${S.data.speed}ms linear forwards`;
                div.dataset.code = c.f;
                
                div.onclick = () => catchFlag(div, c);
                
                scene.appendChild(div);

                div.addEventListener('animationend', () => {
                    if (!div.classList.contains('caught') && !div.classList.contains('wrong')) {
                        if (c.f === S.data.target.f) {
                            div.classList.add('missed');
                            loseCatcherLife();
                        }
                    }
                    setTimeout(() => div.remove(), 300);
                });
            });

            const interval = setTimeout(() => {
                if (S.data.playing && S.data.lives > 0) {
                    spawnFlag();
                }
            }, S.data.speed + 800);
            S.intervals.push(interval);
        }

        function catchFlag(el, country) {
            if (!S.data.playing || el.classList.contains('caught') || el.classList.contains('wrong')) return;
            
            Audio.click();
            
            if (country.f === S.data.target.f) {
                Audio.correct();
                el.classList.add('caught');
                S.data.score += 10;
                document.getElementById('catcherScore').textContent = S.data.score;
                
                showCatcherPopup(el, '+10');
                
                S.data.speed = Math.max(1800, S.data.speed - 120);
                
                setTimeout(() => {
                    document.querySelectorAll('.falling-flag').forEach(f => f.remove());
                    spawnFlag();
                }, 500);
            } else {
                Audio.wrong();
                el.classList.add('wrong');
                loseCatcherLife();
            }
        }

        function showCatcherPopup(el, text) {
            const scene = document.getElementById('catcherScene');
            const popup = document.createElement('div');
            popup.className = 'catcher-score-popup';
            popup.textContent = text;
            popup.style.left = el.style.left;
            popup.style.top = '40%';
            scene.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }

        function loseCatcherLife() {
            S.data.lives--;
            const livesEl = document.getElementById('catcherLives');
            if (livesEl) {
                livesEl.innerHTML = '❤️'.repeat(Math.max(0, S.data.lives)) + '🖤'.repeat(3 - Math.max(0, S.data.lives));
            }
            
            if (S.data.lives <= 0) {
                stopCatcher();
                S.score = S.data.score;
                showResults();
            }
        }

        function stopCatcher() {
            S.data.playing = false;
            clearAllIntervals();
        }

        // ==================== 🧠 MEMORY ====================
        function startMemory() {
            const pairs = 6;
            const countries = shuffle([...COUNTRIES]).slice(0, pairs);
            let cards = [];
            countries.forEach((c, i) => { cards.push({id: i, c}); cards.push({id: i, c}); });
            cards = shuffle(cards);
            
            S.data = { cards, flipped: [], matched: 0, moves: 0, total: pairs, canFlip: true };

            const scr = document.getElementById('gameScreen');
            scr.innerHTML = `
                <div class="game-bar">
                    <div class="game-bar-left">
                        <button class="game-back" onclick="goHome()">⬅️</button>
                        <div class="game-bar-title">🧠 Memory Match</div>
                    </div>
                    <div class="game-bar-right">
                        <div class="game-stat-box"><span>👆</span><span id="memMoves">0</span></div>
                        <div class="game-stat-box"><span>✅</span><span id="memPairs">0/${pairs}</span></div>
                    </div>
                </div>
                <div class="game-area">
                    <div style="text-align:center;margin-bottom:15px;font-size:18px;color:#666">🃏 Find matching flag pairs!</div>
                    <div class="memory-grid g4">
                        ${cards.map((card, i) => `
                            <div class="mem-card" id="mc${i}" onclick="flipMem(${i})">
                                <div class="mem-card-inner">
                                    <div class="mem-card-front">❓</div>
                                    <div class="mem-card-back">
                                        <img src="${flag(card.c.f)}" onerror="this.parentElement.textContent='🏳️'">
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function flipMem(idx) {
            if (!S.data.canFlip) return;
            const card = document.getElementById(`mc${idx}`);
            if (card.classList.contains('flip') || card.classList.contains('matched')) return;

            Audio.click();
            card.classList.add('flip');
            S.data.flipped.push({ idx, card, data: S.data.cards[idx] });

            if (S.data.flipped.length === 2) {
                S.data.canFlip = false;
                S.data.moves++;
                document.getElementById('memMoves').textContent = S.data.moves;

                const [a, b] = S.data.flipped;
                if (a.data.id === b.data.id) {
                    Audio.correct();
                    a.card.classList.add('matched');
                    b.card.classList.add('matched');
                    S.data.matched++;
                    document.getElementById('memPairs').textContent = `${S.data.matched}/${S.data.total}`;
                    S.data.flipped = [];
                    S.data.canFlip = true;

                    if (S.data.matched === S.data.total) {
                        S.score = Math.max(100 - (S.data.moves - S.data.total) * 3, 30);
                        setTimeout(showResults, 800);
                    }
                } else {
                    setTimeout(() => {
                        Audio.wrong();
                        a.card.classList.remove('flip');
                        b.card.classList.remove('flip');
                        S.data.flipped = [];
                        S.data.canFlip = true;
                    }, 1000);
                }
            }
        }

        // ==================== 🚩 FLAGS ====================
        function startFlags() {
            S.total = 10;
            renderFlagQ();
        }

        function renderFlagQ() {
            const available = COUNTRIES.filter((_, i) => !S.used.has(i));
            if (available.length < 4 || S.q >= S.total) { showResults(); return; }

            const correct = available[Math.floor(Math.random() * available.length)];
            S.used.add(COUNTRIES.indexOf(correct));

            const wrong = shuffle(available.filter(c => c !== correct)).slice(0, 3);
            const options = shuffle([correct.n, ...wrong.map(c => c.n)]);
            S.data = { correct, options };

            const scr = document.getElementById('gameScreen');
            scr.innerHTML = `
                <div class="game-bar">
                    <div class="game-bar-left">
                        <button class="game-back" onclick="goHome()">⬅️</button>
                        <div class="game-bar-title">🚩 Flag Quiz</div>
                    </div>
                    <div class="game-bar-right">
                        <div class="game-stat-box"><span>⭐</span><span>${S.score}</span></div>
                        <div class="game-stat-box"><span>📝</span><span>${S.q + 1}/${S.total}</span></div>
                    </div>
                </div>
                <div class="progress-wrap"><div class="progress-track"><div class="progress-bar" style="width:${(S.q/S.total)*100}%"></div></div></div>
                <div class="game-area">
                    <div style="text-align:center">
                        <p style="font-size:20px;color:#333;margin-bottom:15px">Which country has this flag?</p>
                        <div class="flag-display">
                            <img src="${flag(correct.f)}" onerror="this.src='https://via.placeholder.com/240x150?text=Flag'">
                        </div>
                        <div class="quiz-options">
                            ${options.map(o => `<button class="quiz-btn" onclick="answerFlag('${o.replace(/'/g,"\\'")}',this)">${o}</button>`).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function answerFlag(ans, el) {
            Audio.click();
            document.querySelectorAll('.quiz-btn').forEach(b => b.style.pointerEvents = 'none');
            
            if (ans === S.data.correct.n) {
                Audio.correct();
                el.classList.add('correct');
                S.score += 10;
            } else {
                Audio.wrong();
                el.classList.add('wrong');
                document.querySelectorAll('.quiz-btn').forEach(b => { if (b.textContent === S.data.correct.n) b.classList.add('correct'); });
            }
            S.q++;
            setTimeout(renderFlagQ, 1200);
        }

        // ==================== 🏛️ CAPITALS ====================
        function startCapitals() {
            S.total = 10;
            renderCapQ();
        }

        function renderCapQ() {
            const available = COUNTRIES.filter((_, i) => !S.used.has(i));
            if (available.length < 4 || S.q >= S.total) { showResults(); return; }

            const correct = available[Math.floor(Math.random() * available.length)];
            S.used.add(COUNTRIES.indexOf(correct));

            const wrong = shuffle(available.filter(c => c !== correct)).slice(0, 3);
            const options = shuffle([correct.c, ...wrong.map(c => c.c)]);
            S.data = { correct, options };

            const scr = document.getElementById('gameScreen');
            scr.innerHTML = `
                <div class="game-bar">
                    <div class="game-bar-left">
                        <button class="game-back" onclick="goHome()">⬅️</button>
                        <div class="game-bar-title">🏛️ Capital Quest</div>
                    </div>
                    <div class="game-bar-right">
                        <div class="game-stat-box"><span>⭐</span><span>${S.score}</span></div>
                        <div class="game-stat-box"><span>📝</span><span>${S.q + 1}/${S.total}</span></div>
                    </div>
                </div>
                <div class="progress-wrap"><div class="progress-track"><div class="progress-bar" style="width:${(S.q/S.total)*100}%"></div></div></div>
                <div class="game-area">
                    <div style="text-align:center">
                        <img src="${flag(correct.f)}" style="width:70px;height:45px;border-radius:6px;box-shadow:0 5px 15px rgba(0,0,0,0.2);margin-bottom:15px">
                        <p style="font-size:26px;color:#333;font-weight:bold;margin-bottom:5px">${correct.n}</p>
                        <p style="font-size:18px;color:#666;margin-bottom:20px">What is the capital?</p>
                        <div class="quiz-options">
                            ${options.map(o => `<button class="quiz-btn" onclick="answerCap('${o.replace(/'/g,"\\'")}',this)">🏛️ ${o}</button>`).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function answerCap(ans, el) {
            Audio.click();
            document.querySelectorAll('.quiz-btn').forEach(b => b.style.pointerEvents = 'none');
            
            if (ans === S.data.correct.c) {
                Audio.correct();
                el.classList.add('correct');
                S.score += 10;
            } else {
                Audio.wrong();
                el.classList.add('wrong');
                document.querySelectorAll('.quiz-btn').forEach(b => { if (b.textContent.includes(S.data.correct.c)) b.classList.add('correct'); });
            }
            S.q++;
            setTimeout(renderCapQ, 1200);
        }

        // ==================== 🏭 SORTING FACTORY ====================
        function startFactory() {
            S.data = { cat: 'oceanLand', combo: 0, items: [] };
            loadFactoryItems();
            renderFactoryQ();
        }

        function loadFactoryItems() {
            const c = S.data.cat;
            let items = [];
            if (c === 'oceanLand') {
                OCEANS.forEach(o => items.push({n: o, t: 'ocean'}));
                SEAS.forEach(s => items.push({n: s, t: 'ocean'}));
                COUNTRIES.slice(0, 30).forEach(c => items.push({n: c.n, t: 'land'}));
            } else if (c === 'riverMountain') {
                RIVERS.forEach(r => items.push({n: r, t: 'river'}));
                MOUNTAINS.forEach(m => items.push({n: m, t: 'mountain'}));
            } else {
                BIRDS.forEach(b => items.push({n: b, t: 'bird'}));
                ANIMALS.forEach(a => items.push({n: a, t: 'animal'}));
            }
            S.data.items = shuffle(items);
        }

        function renderFactoryQ() {
            const available = S.data.items.filter((_, i) => !S.used.has(i));
            if (!available.length || S.q >= S.total) { showResults(); return; }

            const item = available[0];
            S.used.add(S.data.items.indexOf(item));
            S.data.current = item;

            const c = S.data.cat;
            let b1, b2;
            if (c === 'oceanLand') { b1 = {t:'ocean',l:'OCEAN',i:'🌊'}; b2 = {t:'land',l:'LAND',i:'🏝️'}; }
            else if (c === 'riverMountain') { b1 = {t:'river',l:'RIVER',i:'💧'}; b2 = {t:'mountain',l:'MOUNTAIN',i:'⛰️'}; }
            else { b1 = {t:'bird',l:'BIRD',i:'🐦'}; b2 = {t:'animal',l:'ANIMAL',i:'🦁'}; }

            const scr = document.getElementById('gameScreen');
            scr.innerHTML = `
                <div class="game-bar">
                    <div class="game-bar-left">
                        <button class="game-back" onclick="goHome()">⬅️</button>
                        <div class="game-bar-title">🏭 Sorting Factory</div>
                    </div>
                    <div class="game-bar-right">
                        <div class="game-stat-box"><span>⭐</span><span id="factScore">${S.score}</span></div>
                        <div class="game-stat-box"><span>📝</span><span>${S.q + 1}/${S.total}</span></div>
                    </div>
                </div>
                <div class="progress-wrap"><div class="progress-track"><div class="progress-bar" style="width:${(S.q/S.total)*100}%"></div></div></div>
                <div class="game-area" style="padding:0">
                    <div class="factory-scene">
                        <div class="cat-tabs">
                            <button class="cat-tab ${c==='oceanLand'?'active':''}" onclick="changeCat('oceanLand')">🌊 Ocean/Land</button>
                            <button class="cat-tab ${c==='riverMountain'?'active':''}" onclick="changeCat('riverMountain')">⛰️ River/Mountain</button>
                            <button class="cat-tab ${c==='birdAnimal'?'active':''}" onclick="changeCat('birdAnimal')">🦁 Bird/Animal</button>
                        </div>
                        <div class="conveyor"></div>
                        <div class="sort-item">${item.n}</div>
                        <div class="sort-bins">
                            <div class="sort-bin ${b1.t}" onclick="sortTo('${b1.t}')">
                                <div class="sort-bin-icon">${b1.i}</div>
                                <div class="sort-bin-label">${b1.l}</div>
                            </div>
                            <div class="sort-bin ${b2.t}" onclick="sortTo('${b2.t}')">
                                <div class="sort-bin-icon">${b2.i}</div>
                                <div class="sort-bin-label">${b2.l}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function changeCat(cat) {
            Audio.click();
            S.data.cat = cat;
            S.used = new Set();
            S.q = 0;
            S.score = 0;
            loadFactoryItems();
            renderFactoryQ();
        }

        function sortTo(type) {
            Audio.click();
            const item = S.data.current;

            if (type === item.t) {
                Audio.correct();
                S.data.combo++;
                S.score += 10 + (S.data.combo >= 3 ? S.data.combo * 2 : 0);
            } else {
                Audio.wrong();
                S.data.combo = 0;
            }
            S.q++;
            setTimeout(renderFactoryQ, 600);
        }

        // ==================== TOAST ====================
        function toast(isCorrect, msg) {
            const t = document.getElementById('toast');
            t.className = `toast show ${isCorrect ? 'correct' : 'wrong'}`;
            document.getElementById('toastEmoji').textContent = isCorrect ? '🎉' : '😅';
            document.getElementById('toastText').textContent = msg;
            setTimeout(() => t.classList.remove('show'), 1100);
        }

        // ==================== RESULTS ====================
        function showResults() {
            clearAllIntervals();
            Audio.win();
            confetti();

            const pct = Math.min(100, Math.max(0, S.score));
            const stars = pct >= 80 ? 3 : pct >= 50 ? 2 : 1;
            const coins = pct >= 80 ? 20 : pct >= 50 ? 10 : 5;
            const mascot = pct >= 80 ? '🏆' : pct >= 50 ? '🌟' : '👍';
            const title = pct >= 80 ? 'AMAZING!' : pct >= 50 ? 'Great Job!' : 'Good Try!';
            const msg = pct >= 80 ? "You're a superstar!" : pct >= 50 ? "Keep it up!" : "Practice more!";

            S.coins += coins;
            save();
            updateUI();

            const scr = document.getElementById('gameScreen');
            scr.innerHTML = `
                <div class="result-screen active">
                    <div class="result-mascot">${mascot}</div>
                    <h1 class="result-title">${title}</h1>
                    <p class="result-msg">${msg}</p>
                    <div class="result-stars">
                        <span class="result-star ${stars >= 1 ? 'earned' : ''}">⭐</span>
                        <span class="result-star ${stars >= 2 ? 'earned' : ''}">⭐</span>
                        <span class="result-star ${stars >= 3 ? 'earned' : ''}">⭐</span>
                    </div>
                    <div class="result-stats">
                        <div class="result-stat">
                            <div class="result-stat-val">${S.score}</div>
                            <div class="result-stat-lbl">Score</div>
                        </div>
                    </div>
                    <div class="result-coins">
                        <span>🪙</span>
                        <span>+${coins} Coins!</span>
                    </div>
                    <div class="result-btns">
                        <button class="result-btn primary" onclick="replay()">🔄 Play Again</button>
                        <button class="result-btn secondary" onclick="goHome()">🏠 Home</button>
                    </div>
                </div>
            `;
        }

        function replay() {
            Audio.click();
            S.score = 0;
            S.q = 0;
            S.used = new Set();
            openGame(S.game);
        }

        // ==================== CONFETTI ====================
        function confetti() {
            const box = document.getElementById('confettiBox');
            box.innerHTML = '';
            const emojis = ['🎉', '🎊', '⭐', '🌟', '✨', '🎈', '🪙'];
            const colors = ['#FF6B9D', '#4ECDC4', '#FFE66D', '#A06CD5', '#FF8C42', '#7ED957'];

            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'confetti-piece';
                if (Math.random() > 0.6) {
                    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    p.style.fontSize = (15 + Math.random() * 15) + 'px';
                } else {
                    p.style.width = (8 + Math.random() * 8) + 'px';
                    p.style.height = p.style.width;
                    p.style.background = colors[Math.floor(Math.random() * colors.length)];
                    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                }
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (2 + Math.random() * 2) + 's';
                p.style.animationDelay = Math.random() * 0.5 + 's';
                box.appendChild(p);
            }
            setTimeout(() => box.innerHTML = '', 4000);
        }

        console.log('🌍 GEOTOPIA Kids - All Games Fixed & Ready!');
    </script>
</body>
</html>
