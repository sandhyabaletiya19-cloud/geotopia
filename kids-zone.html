<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEOTOPIA - Kids Zone 🌍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard', 'Comic Neue', cursive;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        :root {
            --pink: #FF6B9D;
            --blue: #4ECDC4;
            --yellow: #FFE66D;
            --purple: #A06CD5;
            --orange: #FF8C42;
            --green: #7ED957;
            --red: #FF5252;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8C8 50%, #7ED957 100%);
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .world-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .sun {
            position: absolute;
            top: 30px;
            right: 50px;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #FFD700 0%, #FFA500 100%);
            border-radius: 50%;
            box-shadow: 0 0 60px #FFD700, 0 0 100px #FFA500;
            animation: sunPulse 3s ease-in-out infinite;
        }

        .sun::before {
            content: '😎';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
        }

        @keyframes sunPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 100px;
            animation: cloudMove linear infinite;
            opacity: 0.9;
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        .cloud:nth-child(1) { width: 120px; height: 50px; top: 80px; animation-duration: 35s; }
        .cloud:nth-child(1)::before { width: 60px; height: 60px; top: -30px; left: 20px; }
        .cloud:nth-child(1)::after { width: 45px; height: 45px; top: -20px; left: 55px; }

        .cloud:nth-child(2) { width: 100px; height: 40px; top: 150px; animation-duration: 28s; animation-delay: -10s; }
        .cloud:nth-child(2)::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud:nth-child(2)::after { width: 35px; height: 35px; top: -15px; left: 45px; }

        .cloud:nth-child(3) { width: 80px; height: 35px; top: 220px; animation-duration: 40s; animation-delay: -20s; }
        .cloud:nth-child(3)::before { width: 40px; height: 40px; top: -20px; left: 10px; }
        .cloud:nth-child(3)::after { width: 30px; height: 30px; top: -12px; left: 35px; }

        @keyframes cloudMove {
            0% { left: -200px; }
            100% { left: 100vw; }
        }

        .bird {
            position: absolute;
            font-size: 25px;
            animation: birdFly 8s linear infinite;
        }

        .bird:nth-child(4) { top: 100px; animation-delay: 0s; }
        .bird:nth-child(5) { top: 130px; animation-delay: 0.3s; }
        .bird:nth-child(6) { top: 110px; animation-delay: 0.6s; }

        @keyframes birdFly {
            0% { left: -50px; transform: scaleX(1); }
            49% { transform: scaleX(1); }
            50% { left: 100vw; transform: scaleX(-1); }
            100% { left: -50px; transform: scaleX(-1); }
        }

        .ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            background: linear-gradient(0deg, #5D4E37 0%, #7ED957 100%);
        }

        .grass {
            position: absolute;
            bottom: 100px;
            font-size: 40px;
            animation: grassWave 2s ease-in-out infinite;
        }

        @keyframes grassWave {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* ===== LOADING SCREEN ===== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s, visibility 0.5s;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-earth {
            width: 150px;
            height: 150px;
            font-size: 120px;
            animation: earthSpin 2s linear infinite;
        }

        @keyframes earthSpin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .loading-title {
            color: white;
            font-size: 42px;
            margin-top: 20px;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }

        .loading-dots {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .loading-dot {
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            animation: dotJump 0.6s ease-in-out infinite;
        }

        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotJump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 5px 30px rgba(0,0,0,0.3);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 15px;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-earth {
            font-size: 45px;
            animation: logoWobble 2s ease-in-out infinite;
        }

        @keyframes logoWobble {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }

        .logo-text {
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .coin-box, .streak-box {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 18px;
        }

        .coin-box {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #333;
            box-shadow: 0 4px 15px rgba(255,215,0,0.5);
        }

        .streak-box {
            background: linear-gradient(135deg, #FF6B9D, #FF5252);
            color: white;
            box-shadow: 0 4px 15px rgba(255,107,157,0.5);
        }

        .coin-icon, .streak-icon {
            font-size: 22px;
        }

        .sound-btn {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 15px;
            font-size: 26px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .sound-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        /* ===== MAIN CONTAINER ===== */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* ===== HOME SCREEN ===== */
        .home-screen {
            display: block;
        }

        .welcome-card {
            background: white;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .welcome-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, var(--pink), var(--blue), var(--yellow), var(--purple), var(--orange), var(--green));
        }

        .welcome-mascot {
            font-size: 100px;
            animation: mascotBounce 1s ease-in-out infinite;
        }

        @keyframes mascotBounce {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .welcome-title {
            font-size: 38px;
            color: #333;
            margin: 15px 0;
        }

        .welcome-title span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-sub {
            font-size: 20px;
            color: #666;
            margin-bottom: 20px;
        }

        .age-toggle {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .age-btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: 4px solid #ddd;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .age-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .age-btn.active {
            border-color: var(--purple);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* ===== GAMES GRID ===== */
        .games-section-title {
            font-size: 28px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .game-card {
            background: white;
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            border: 4px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 25px 60px rgba(0,0,0,0.2);
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
        }

        .game-card:nth-child(1)::before { background: linear-gradient(90deg, #FF6B9D, #FF8C42); }
        .game-card:nth-child(2)::before { background: linear-gradient(90deg, #4ECDC4, #44a08d); }
        .game-card:nth-child(3)::before { background: linear-gradient(90deg, #667eea, #764ba2); }
        .game-card:nth-child(4)::before { background: linear-gradient(90deg, #FFE66D, #f7b731); }
        .game-card:nth-child(5)::before { background: linear-gradient(90deg, #7ED957, #26de81); }
        .game-card:nth-child(6)::before { background: linear-gradient(90deg, #A06CD5, #6c5ce7); }
        .game-card:nth-child(7)::before { background: linear-gradient(90deg, #FF5252, #f12711); }
        .game-card:nth-child(8)::before { background: linear-gradient(90deg, #00d2ff, #3a7bd5); }

        .game-card:nth-child(1):hover { border-color: #FF6B9D; }
        .game-card:nth-child(2):hover { border-color: #4ECDC4; }
        .game-card:nth-child(3):hover { border-color: #667eea; }
        .game-card:nth-child(4):hover { border-color: #FFE66D; }
        .game-card:nth-child(5):hover { border-color: #7ED957; }
        .game-card:nth-child(6):hover { border-color: #A06CD5; }
        .game-card:nth-child(7):hover { border-color: #FF5252; }
        .game-card:nth-child(8):hover { border-color: #00d2ff; }

        .game-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
        }

        .game-badge.new { background: linear-gradient(135deg, #FF6B9D, #FF5252); }
        .game-badge.hot { background: linear-gradient(135deg, #FF8C42, #f7b731); }
        .game-badge.fun { background: linear-gradient(135deg, #7ED957, #4ECDC4); }

        .game-icon-wrapper {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 55px;
            position: relative;
        }

        .game-card:nth-child(1) .game-icon-wrapper { background: linear-gradient(135deg, #FF6B9D 0%, #FF8C42 100%); }
        .game-card:nth-child(2) .game-icon-wrapper { background: linear-gradient(135deg, #4ECDC4 0%, #44a08d 100%); }
        .game-card:nth-child(3) .game-icon-wrapper { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .game-card:nth-child(4) .game-icon-wrapper { background: linear-gradient(135deg, #FFE66D 0%, #f7b731 100%); }
        .game-card:nth-child(5) .game-icon-wrapper { background: linear-gradient(135deg, #7ED957 0%, #26de81 100%); }
        .game-card:nth-child(6) .game-icon-wrapper { background: linear-gradient(135deg, #A06CD5 0%, #6c5ce7 100%); }
        .game-card:nth-child(7) .game-icon-wrapper { background: linear-gradient(135deg, #FF5252 0%, #f12711 100%); }
        .game-card:nth-child(8) .game-icon-wrapper { background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); }

        .game-card:hover .game-icon-wrapper {
            animation: iconPop 0.4s ease;
        }

        @keyframes iconPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2) rotate(10deg); }
            100% { transform: scale(1) rotate(0); }
        }

        .game-title {
            font-size: 22px;
            color: #333;
            margin-bottom: 8px;
        }

        .game-desc {
            font-size: 14px;
            color: #888;
            line-height: 1.4;
        }

        /* ===== GAME SCREEN ===== */
        .game-screen {
            display: none;
        }

        .game-screen.active {
            display: block;
        }

        /* ===== GAME HEADER BAR ===== */
        .game-top-bar {
            background: white;
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            flex-wrap: wrap;
            gap: 15px;
        }

        .game-top-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .game-back-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 15px;
            font-size: 24px;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .game-back-btn:hover {
            transform: scale(1.1);
        }

        .game-top-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .game-top-title span {
            font-size: 30px;
        }

        .game-top-stats {
            display: flex;
            gap: 15px;
        }

        .game-stat {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f0f0f0;
            padding: 10px 20px;
            border-radius: 15px;
        }

        .game-stat-icon {
            font-size: 24px;
        }

        .game-stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        /* ===== PROGRESS BAR ===== */
        .progress-wrapper {
            background: white;
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            color: #888;
        }

        .progress-bar {
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #7ED957, #4ECDC4, #667eea);
            border-radius: 10px;
            transition: width 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: progressShine 2s infinite;
        }

        @keyframes progressShine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ===== GAME AREA ===== */
        .game-area {
            background: white;
            border-radius: 30px;
            padding: 30px;
            min-height: 500px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .game-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #FF6B9D, #4ECDC4, #FFE66D, #667eea);
        }

        /* ===== NUMBER ROCKET GAME ===== */
        .rocket-game {
            text-align: center;
            position: relative;
            min-height: 500px;
        }

        .rocket-scene {
            position: relative;
            height: 450px;
            background: linear-gradient(180deg, #0c1445 0%, #1a237e 30%, #283593 60%, #3949ab 100%);
            border-radius: 25px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.5); }
        }

        .rocket {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 100px;
            transition: all 0.5s ease;
            filter: drop-shadow(0 0 20px rgba(255,200,0,0.5));
        }

        .rocket.launching {
            animation: rocketLaunch 3s ease-in-out forwards;
        }

        @keyframes rocketLaunch {
            0% { bottom: 50px; transform: translateX(-50%) rotate(0deg); }
            20% { transform: translateX(-50%) rotate(-5deg); }
            40% { transform: translateX(-50%) rotate(5deg); }
            60% { bottom: 200px; transform: translateX(-50%) rotate(0deg); }
            100% { bottom: 500px; transform: translateX(-50%) scale(0.5); opacity: 0; }
        }

        .rocket-flames {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            animation: flameFlicker 0.1s infinite;
            opacity: 0;
        }

        .rocket-flames.active {
            opacity: 1;
        }

        @keyframes flameFlicker {
            0%, 100% { transform: translateX(-50%) scaleY(1); }
            50% { transform: translateX(-50%) scaleY(1.2); }
        }

        .fuel-gauge {
            position: absolute;
            left: 20px;
            top: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            backdrop-filter: blur(10px);
        }

        .fuel-label {
            color: white;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .fuel-bar {
            width: 30px;
            height: 200px;
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .fuel-level {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(0deg, #FF5252, #FF8C42, #FFE66D, #7ED957);
            border-radius: 15px;
            transition: height 0.5s ease;
        }

        .number-targets {
            position: absolute;
            right: 20px;
            top: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .number-target {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .number-target.found {
            background: linear-gradient(135deg, #7ED957, #4ECDC4);
            animation: targetFound 0.3s ease;
        }

        @keyframes targetFound {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .number-target.current {
            background: linear-gradient(135deg, #FFE66D, #f7b731);
            color: #333;
            animation: currentPulse 1s ease-in-out infinite;
        }

        @keyframes currentPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,230,109,0.7); }
            50% { box-shadow: 0 0 0 10px rgba(255,230,109,0); }
        }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            padding: 20px;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .number-btn {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 15px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .number-btn.hidden {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .number-btn.hidden::before {
            content: '?';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 30px;
        }

        .number-btn.hidden .num-text {
            opacity: 0;
        }

        .number-btn:hover {
            transform: scale(1.1);
        }

        .number-btn.revealed {
            background: linear-gradient(135deg, #7ED957, #4ECDC4);
            pointer-events: none;
        }

        .number-btn.wrong {
            background: linear-gradient(135deg, #FF5252, #f12711);
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        /* ===== SORTING FACTORY GAME ===== */
        .factory-game {
            position: relative;
            min-height: 550px;
        }

        .factory-scene {
            background: linear-gradient(180deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 25px;
            padding: 20px;
            min-height: 520px;
            position: relative;
            overflow: hidden;
        }

        .conveyor-belt {
            position: absolute;
            bottom: 180px;
            left: 0;
            width: 100%;
            height: 60px;
            background: repeating-linear-gradient(
                90deg,
                #333 0px,
                #333 30px,
                #444 30px,
                #444 60px
            );
            border-radius: 10px;
            animation: conveyorMove 2s linear infinite;
        }

        @keyframes conveyorMove {
            0% { background-position: 0 0; }
            100% { background-position: 60px 0; }
        }

        .conveyor-item {
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 20px 40px;
            border-radius: 20px;
            font-size: 26px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: itemBounce 1s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes itemBounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        .conveyor-item.correct {
            animation: itemCorrect 0.5s ease forwards;
        }

        .conveyor-item.wrong {
            animation: itemWrong 0.5s ease;
        }

        @keyframes itemCorrect {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.2); }
            100% { transform: translateX(-50%) scale(0); opacity: 0; }
        }

        @keyframes itemWrong {
            0%, 100% { transform: translateX(-50%) rotate(0); background: white; }
            25% { transform: translateX(-50%) rotate(-10deg); background: #ffcdd2; }
            75% { transform: translateX(-50%) rotate(10deg); background: #ffcdd2; }
        }

        .sorting-bins {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .sort-bin {
            width: 150px;
            height: 140px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .sort-bin:hover {
            transform: scale(1.05) translateY(-10px);
        }

        .sort-bin.ocean {
            background: linear-gradient(180deg, #00d2ff 0%, #3a7bd5 100%);
        }

        .sort-bin.land {
            background: linear-gradient(180deg, #7ED957 0%, #26de81 100%);
        }

        .sort-bin.river {
            background: linear-gradient(180deg, #4ECDC4 0%, #1a8f8f 100%);
        }

        .sort-bin.mountain {
            background: linear-gradient(180deg, #8B7355 0%, #5D4E37 100%);
        }

        .sort-bin.bird {
            background: linear-gradient(180deg, #87CEEB 0%, #5D9CEC 100%);
        }

        .sort-bin.animal {
            background: linear-gradient(180deg, #f7b731 0%, #e17055 100%);
        }

        .sort-bin-icon {
            font-size: 50px;
        }

        .sort-bin-label {
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .sort-bin.pulse {
            animation: binPulse 0.3s ease;
        }

        @keyframes binPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .sort-bin .score-popup {
            position: absolute;
            top: -30px;
            font-size: 24px;
            font-weight: bold;
            color: #7ED957;
            animation: scorePopup 1s ease forwards;
            opacity: 0;
        }

        @keyframes scorePopup {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }

        .category-selector {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.9);
            padding: 10px;
            border-radius: 15px;
        }

        .cat-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            background: #eee;
            color: #666;
        }

        .cat-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .combo-display {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #FFE66D, #f7b731);
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            opacity: 0;
            transition: all 0.3s;
        }

        .combo-display.show {
            opacity: 1;
            animation: comboPop 0.3s ease;
        }

        @keyframes comboPop {
            0% { transform: translateX(-50%) scale(0.5); }
            70% { transform: translateX(-50%) scale(1.1); }
            100% { transform: translateX(-50%) scale(1); }
        }

        /* ===== BUBBLE POP GAME ===== */
        .bubble-game {
            position: relative;
            min-height: 500px;
        }

        .bubble-scene {
            background: linear-gradient(180deg, #e0f7fa 0%, #80deea 100%);
            border-radius: 25px;
            min-height: 480px;
            position: relative;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(255,255,255,0.2));
            border: 3px solid rgba(255,255,255,0.5);
            animation: bubbleFloat 3s ease-in-out infinite;
            text-align: center;
            padding: 10px;
            word-break: break-word;
        }

        .bubble:hover {
            transform: scale(1.1);
            z-index: 100;
        }

        .bubble.selected {
            border: 4px solid #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .bubble.pop {
            animation: bubblePop 0.3s ease forwards;
        }

        @keyframes bubbleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes bubblePop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        .bubble-instructions {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.9);
            padding: 15px 30px;
            border-radius: 20px;
            font-size: 18px;
            color: #333;
            text-align: center;
        }

        /* ===== FLAG CATCHER GAME ===== */
        .catcher-game {
            position: relative;
            min-height: 500px;
        }

        .catcher-scene {
            background: linear-gradient(180deg, #87CEEB 0%, #98D8C8 100%);
            border-radius: 25px;
            min-height: 480px;
            position: relative;
            overflow: hidden;
        }

        .falling-flag {
            position: absolute;
            top: -100px;
            width: 100px;
            height: 65px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            cursor: grab;
            transition: transform 0.2s;
            animation: flagFall linear forwards;
        }

        .falling-flag:active {
            cursor: grabbing;
            transform: scale(1.1);
        }

        .falling-flag img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes flagFall {
            0% { top: -100px; }
            100% { top: 100%; }
        }

        .country-baskets {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 20px;
        }

        .basket {
            width: 120px;
            padding: 15px 10px;
            background: linear-gradient(180deg, #8B4513, #5D3A1A);
            border-radius: 10px 10px 20px 20px;
            text-align: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
        }

        .basket:hover {
            transform: translateY(-10px);
        }

        .basket.correct {
            background: linear-gradient(180deg, #7ED957, #26de81);
            animation: basketBounce 0.3s ease;
        }

        @keyframes basketBounce {
            0%, 100% { transform: translateY(-10px); }
            50% { transform: translateY(-30px); }
        }

        /* ===== SPELLING SAFARI GAME ===== */
        .safari-game {
            position: relative;
            min-height: 500px;
        }

        .safari-scene {
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%2387CEEB" width="100" height="50"/><rect fill="%23f4d03f" y="50" width="100" height="50"/><circle fill="%23f39c12" cx="85" cy="15" r="12"/></svg>');
            background-size: cover;
            border-radius: 25px;
            min-height: 480px;
            position: relative;
            overflow: hidden;
        }

        .safari-ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(180deg, #c9a227 0%, #8B7355 100%);
        }

        .safari-animal {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 120px;
            animation: animalIdle 2s ease-in-out infinite;
        }

        @keyframes animalIdle {
            0%, 100% { transform: translateX(-50%) rotate(-3deg); }
            50% { transform: translateX(-50%) rotate(3deg); }
        }

        .safari-animal.happy {
            animation: animalHappy 0.5s ease;
        }

        @keyframes animalHappy {
            0%, 100% { transform: translateX(-50%) scale(1) rotate(0); }
            25% { transform: translateX(-50%) scale(1.1) rotate(-10deg); }
            75% { transform: translateX(-50%) scale(1.1) rotate(10deg); }
        }

        .safari-animal.sad {
            animation: animalSad 0.5s ease;
        }

        @keyframes animalSad {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-30px); }
        }

        .safari-word {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 20px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .word-display {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .letter-slot {
            width: 50px;
            height: 60px;
            background: #f0f0f0;
            border: 3px solid #ddd;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #333;
            transition: all 0.3s;
        }

        .letter-slot.filled {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: #667eea;
            color: white;
        }

        .letter-slot.empty {
            border-color: #4ECDC4;
            border-style: dashed;
            animation: slotPulse 1s ease-in-out infinite;
        }

        @keyframes slotPulse {
            0%, 100% { border-color: #4ECDC4; }
            50% { border-color: #7ED957; }
        }

        .letter-slot.correct {
            background: linear-gradient(135deg, #7ED957, #4ECDC4);
            border-color: #7ED957;
        }

        .letter-slot.wrong {
            background: linear-gradient(135deg, #FF5252, #f12711);
            border-color: #FF5252;
            animation: slotShake 0.3s ease;
        }

        @keyframes slotShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .safari-keyboard {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .key-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 8px;
        }

        .key-btn {
            width: 45px;
            height: 50px;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            background: linear-gradient(180deg, #f5f5f5, #e0e0e0);
            color: #333;
            box-shadow: 0 4px 0 #bbb;
        }

        .key-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #bbb;
        }

        .key-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #bbb;
        }

        .key-btn.used {
            opacity: 0.3;
            pointer-events: none;
        }

        .safari-category {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
        }

        /* ===== MEMORY MATCH GAME ===== */
        .memory-game {
            text-align: center;
        }

        .memory-grid {
            display: grid;
            gap: 15px;
            justify-content: center;
            margin: 20px auto;
        }

        .memory-grid.grid-4 {
            grid-template-columns: repeat(4, 80px);
        }

        .memory-grid.grid-6 {
            grid-template-columns: repeat(6, 70px);
        }

        .memory-card {
            aspect-ratio: 1;
            perspective: 1000px;
            cursor: pointer;
        }

        .memory-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .memory-card.flipped .memory-card-inner {
            transform: rotateY(180deg);
        }

        .memory-card-front, .memory-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .memory-card-front {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-size: 35px;
        }

        .memory-card-back {
            transform: rotateY(180deg);
            background: white;
            border: 3px solid #667eea;
            overflow: hidden;
            padding: 5px;
        }

        .memory-card-back img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .memory-card.matched .memory-card-back {
            background: linear-gradient(135deg, #d4fcc3, #c8f7b5);
            border-color: #7ED957;
        }

        .memory-card.matched {
            animation: matchBounce 0.5s ease;
        }

        @keyframes matchBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .memory-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        .memory-stat {
            text-align: center;
        }

        .memory-stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .memory-stat-label {
            font-size: 14px;
            color: #888;
        }

        /* ===== WORLD MAP GAME ===== */
        .map-game {
            text-align: center;
        }

        .map-container {
            background: linear-gradient(180deg, #4ECDC4 0%, #2980b9 100%);
            border-radius: 25px;
            padding: 20px;
            min-height: 450px;
            position: relative;
            overflow: hidden;
        }

        .map-target {
            background: linear-gradient(135deg, #FFE66D, #f7b731);
            padding: 15px 40px;
            border-radius: 25px;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .world-map {
            position: relative;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            height: 350px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 10px;
            padding: 20px;
        }

        .country-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 15px;
            background: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .country-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .country-btn.correct {
            background: linear-gradient(135deg, #7ED957, #4ECDC4);
            color: white;
            animation: correctPop 0.3s ease;
        }

        .country-btn.wrong {
            background: linear-gradient(135deg, #FF5252, #f12711);
            color: white;
            animation: shake 0.3s ease;
        }

        @keyframes correctPop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* ===== CAPITAL QUEST GAME ===== */
        .quest-game {
            text-align: center;
        }

        .quest-scene {
            background: linear-gradient(180deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 25px;
            padding: 30px;
            min-height: 450px;
            position: relative;
        }

        .passport {
            background: linear-gradient(135deg, #1a237e, #283593);
            width: 200px;
            height: 280px;
            margin: 0 auto 30px;
            border-radius: 15px;
            padding: 20px;
            color: white;
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .passport-title {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .passport-country {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .passport-flag {
            width: 120px;
            height: 75px;
            border-radius: 8px;
            overflow: hidden;
            margin: 0 auto 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .passport-flag img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .passport-stamps {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .stamp {
            width: 30px;
            height: 30px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .stamp.earned {
            background: #7ED957;
        }

        .capital-question {
            font-size: 22px;
            color: #333;
            margin-bottom: 25px;
        }

        .capital-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        .capital-btn {
            padding: 20px;
            border: 3px solid #ddd;
            border-radius: 15px;
            background: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .capital-btn:hover {
            border-color: #667eea;
            transform: translateY(-5px);
        }

        .capital-btn.correct {
            background: linear-gradient(135deg, #7ED957, #4ECDC4);
            border-color: #7ED957;
            color: white;
        }

        .capital-btn.wrong {
            background: linear-gradient(135deg, #FF5252, #f12711);
            border-color: #FF5252;
            color: white;
        }

        /* ===== RESULT SCREEN ===== */
        .result-screen {
            display: none;
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .result-screen.active {
            display: block;
            animation: resultPop 0.5s ease;
        }

        @keyframes resultPop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-mascot {
            font-size: 120px;
            margin-bottom: 20px;
            animation: mascotDance 1s ease-in-out infinite;
        }

        @keyframes mascotDance {
            0%, 100% { transform: rotate(-10deg) scale(1); }
            50% { transform: rotate(10deg) scale(1.1); }
        }

        .result-title {
            font-size: 42px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .result-message {
            font-size: 20px;
            color: #666;
            margin-bottom: 30px;
        }

        .result-stars {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .result-star {
            font-size: 50px;
            transition: all 0.3s;
        }

        .result-star.earned {
            animation: starEarn 0.5s ease forwards;
        }

        .result-star:nth-child(1) { animation-delay: 0.1s; }
        .result-star:nth-child(2) { animation-delay: 0.3s; }
        .result-star:nth-child(3) { animation-delay: 0.5s; }

        @keyframes starEarn {
            0% { transform: scale(0) rotate(-180deg); color: #ddd; }
            100% { transform: scale(1) rotate(0); color: #FFD700; }
        }

        .result-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .result-stat {
            background: #f8f9fa;
            padding: 20px 35px;
            border-radius: 20px;
        }

        .result-stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }

        .result-stat-label {
            font-size: 14px;
            color: #888;
        }

        .result-coins {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            padding: 15px 40px;
            border-radius: 30px;
            margin-bottom: 30px;
            font-size: 26px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 10px 30px rgba(255,215,0,0.4);
        }

        .result-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .result-btn {
            padding: 18px 40px;
            border: none;
            border-radius: 25px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-btn.primary {
            background: linear-gradient(135deg, #7ED957, #4ECDC4);
            color: white;
            box-shadow: 0 10px 30px rgba(126,217,87,0.4);
        }

        .result-btn.secondary {
            background: white;
            color: #667eea;
            border: 3px solid #667eea;
        }

        .result-btn:hover {
            transform: translateY(-5px);
        }

        /* ===== FEEDBACK TOAST ===== */
        .feedback-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            padding: 30px 60px;
            border-radius: 25px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .feedback-toast.show {
            animation: toastPop 0.4s ease forwards;
        }

        @keyframes toastPop {
            0% { transform: translate(-50%, -50%) scale(0); }
            70% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .feedback-toast.correct {
            background: linear-gradient(135deg, #7ED957, #4ECDC4);
        }

        .feedback-toast.wrong {
            background: linear-gradient(135deg, #FF5252, #f12711);
        }

        .feedback-emoji {
            font-size: 60px;
        }

        /* ===== CONFETTI ===== */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5000;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header {
                padding: 10px 15px;
            }
            
            .logo-text {
                font-size: 22px;
            }
            
            .welcome-title {
                font-size: 28px;
            }
            
            .games-grid {
                grid-template-columns: 1fr;
            }
            
            .game-area {
                padding: 20px;
            }
            
            .number-grid {
                grid-template-columns: repeat(5, 50px);
            }
            
            .number-btn {
                width: 50px;
                height: 50px;
                font-size: 22px;
            }
            
            .memory-grid.grid-4 {
                grid-template-columns: repeat(4, 65px);
            }
            
            .letter-slot {
                width: 40px;
                height: 50px;
                font-size: 24px;
            }
            
            .key-btn {
                width: 35px;
                height: 40px;
                font-size: 16px;
            }
            
            .sorting-bins {
                gap: 20px;
            }
            
            .sort-bin {
                width: 120px;
                height: 120px;
            }
            
            .result-stats {
                flex-direction: column;
                gap: 15px;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>

            play(freq, dur, type = 'sine') {
                if (!state.sound || !this.ctx) return;
                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.frequency.value = freq;
                    osc.type = type;
                    gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
                    osc.start();
                    osc.stop(this.ctx.currentTime + dur);
                } catch(e) {}
            },

function clickRocketCard(idx, num) {
    const card = document.getElementById(`card${idx}`);
    
    // Prevent clicking already found or currently flipping cards
    if (!card || card.classList.contains('found') || card.classList.contains('flipped')) {
        return;
    }
    
    Audio.click();
    
    // Flip the card to show number
    card.classList.add('flipped');
    
    // Check if correct number
    if (num === state.data.target) {
        // CORRECT!
        setTimeout(() => {
            Audio.correct();
            card.classList.add('found');
            state.data.found.push(num);
            
            // Update target indicator
            const currentTarget = document.getElementById(`target${num}`);
            if (currentTarget) {
                currentTarget.classList.remove('current');
                currentTarget.classList.add('found');
            }
            
            // Update next target
            state.data.target++;
            
            if (state.data.target <= 10) {
                const nextTarget = document.getElementById(`target${state.data.target}`);
                if (nextTarget) {
                    nextTarget.classList.add('current');
                }
                document.getElementById('rocketTarget').textContent = `Find: ${state.data.target}`;

            // Update found counter
            document.getElementById('rocketFound').textContent = `${state.data.found.length}/10`;
            
            // Update fuel gauge
            const fuelPercent = (state.data.found.length / 10) * 100;
            document.getElementById('fuelLevel').style.height = fuelPercent + '%';

            rocket.classList.add('shake');
            setTimeout(() => rocket.classList.remove('shake'), 300);
            
            // Activate flames after 3 found
            if (state.data.found.length >= 3) {
                document.getElementById('flames').classList.add('active');
            }
            
            // Check WIN condition
            if (state.data.found.length === 10) {
                // Disable all cards
                document.querySelectorAll('.rocket-number-card').forEach(c => {
                    c.classList.add('disabled');

                    document.getElementById('rocket').classList.add('launching');
                    Audio.win();
                    
                    // Show toast
                    showToast(true, '🚀 LIFTOFF! Mission Complete!');
                    
                    // Show results after rocket animation
                    setTimeout(() => {
                        state.score = 100;
                        showResults();
                    }, 2800);
                }, 500);
            }
        }, 300);
    } else {

        setTimeout(() => {
            Audio.wrong();
            card.classList.add('wrong');
            
            // Show toast with hint
            showToast(false, `Oops! Find ${state.data.target} first!`);
            
            // Flip back after delay
            setTimeout(() => {
                card.classList.remove('flipped', 'wrong');
            }, 1000);
        }, 300);
    }

            const wordObj = available[Math.floor(Math.random() * available.length)];
            const idx = words.indexOf(wordObj);
            state.used.add(idx);

            const word = wordObj.word.toUpperCase();
            const numBlanks = state.age === 'young' 
                ? Math.max(1, Math.ceil(word.length * 0.3))
                : Math.max(2, Math.ceil(word.length * 0.4));

            let blankIndices = [];
            let available2 = [];
            for (let i = (state.age === 'young' ? 1 : 0); i < word.length - (state.age === 'young' ? 1 : 0); i++) {
                available2.push(i);

            state.data = { word, wordObj, blankIndices, filled: {}, usedKeys: new Set() };

            const screen = document.getElementById('gameScreen');
            screen.innerHTML = `

                            <div class="safari-word">
                                <div class="word-display" id="wordDisplay">
                                    ${word.split('').map((char, i) => {
                                        if (blankIndices.includes(i)) {
                                            return `<div class="letter-slot empty" data-idx="${i}"></div>`;
                                        }
                                        return `<div class="letter-slot filled">${char}</div>`;
                                    }).join('')}

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function pressSafariKey(key) {
            Audio.click();
            const { word, blankIndices, filled, usedKeys } = state.data;
            
            if (usedKeys.has(key)) return;
            
            // Find first empty blank that needs this letter
            const emptyBlanks = blankIndices.filter(i => !filled[i]);
            if (emptyBlanks.length === 0) return;

            const targetIdx = emptyBlanks[0];
            const correctLetter = word[targetIdx];
            
            const slot = document.querySelector(`.letter-slot[data-idx="${targetIdx}"]`);
            const keyBtn = document.querySelector(`.key-btn[data-key="${key}"]`);
            
            if (key === correctLetter) {
                // Correct letter
                Audio.correct();
                slot.textContent = key;
                slot.classList.remove('empty');
                slot.classList.add('correct');
                filled[targetIdx] = key;
                keyBtn.classList.add('used');
                usedKeys.add(key);
                
                document.getElementById('safariAnimal').classList.add('happy');
                setTimeout(() => document.getElementById('safariAnimal').classList.remove('happy'), 500);
                
                // Check if word complete
                const allFilled = blankIndices.every(i => filled[i]);
                if (allFilled) {
                    state.score += 10;
                    showToast(true, 'Great spelling! 🎉');
                    setTimeout(() => {
                        state.question++;
                        renderSafari();
                    }, 1500);
                }
            } else {
                // Wrong letter
                Audio.wrong();
                slot.classList.add('wrong');
                setTimeout(() => slot.classList.remove('wrong'), 300);
                
                document.getElementById('safariAnimal').classList.add('sad');
                setTimeout(() => document.getElementById('safariAnimal').classList.remove('sad'), 500);
            }
        }

        function flipMemoryCard(idx) {
            if (!state.data.canFlip) return;
            
            const cardEl = document.querySelector(`.memory-card[data-idx="${idx}"]`);
            const card = state.data.cards[idx];
            
            if (cardEl.classList.contains('flipped') || cardEl.classList.contains('matched')) return;
            
            Audio.click();
            cardEl.classList.add('flipped');
            state.data.flipped.push({ idx, card, el: cardEl });
            
            if (state.data.flipped.length === 2) {
                state.data.canFlip = false;
                state.data.moves++;
                document.getElementById('moveCount').textContent = state.data.moves;
                
                const [first, second] = state.data.flipped;
                
                if (first.card.id === second.card.id) {
                    // Match!
                    Audio.correct();
                    first.el.classList.add('matched');
                    second.el.classList.add('matched');
                    state.data.matched++;
                    document.getElementById('pairCount').textContent = `${state.data.matched}/${state.data.total}`;
                    
                    state.data.flipped = [];
                    state.data.canFlip = true;
                    
                    if (state.data.matched === state.data.total) {
                        state.score = Math.max(100 - (state.data.moves - state.data.total) * 3, 30);
                        setTimeout(() => showResults(), 1000);
                    }
                } else {
                    // No match
                    setTimeout(() => {
                        Audio.wrong();
                        first.el.classList.remove('flipped');
                        second.el.classList.remove('flipped');
                        state.data.flipped = [];
                        state.data.canFlip = true;
                    }, 1000);
                }
            }
        }

        function startBubbleGame() {
            state.total = 10;
            state.data = {
                mode: 'capitals', // capitals, flags, rivers

        function renderBubbleGame() {
            if (state.data.matched >= state.total) {
                showResults();
                return;
            }

            // Create bubble pairs
            const pairs = 6;
            const countries = shuffle([...COUNTRIES]).slice(0, pairs);
            
            let bubbles = [];
            countries.forEach((c, i) => {
                bubbles.push({ id: i, type: 'country', value: c.name, country: c });
                bubbles.push({ id: i, type: 'capital', value: c.capital, country: c });
            });
            
            // Position bubbles randomly
            bubbles = bubbles.map((b, i) => ({
                ...b,
                x: 10 + Math.random() * 70,
                y: 15 + Math.random() * 55,
                size: 80 + Math.random() * 40,
                delay: Math.random() * 2,
                color: `hsl(${Math.random() * 360}, 70%, 80%)`
            }));
            
            state.data.bubbles = bubbles;
            state.data.selected = null;

            const screen = document.getElementById('gameScreen');
            screen.innerHTML = `
                <div class="game-top-bar">
                    <div class="game-top-left">
                        <button class="game-back-btn" onclick="goHome()">⬅️</button>

                        </div>
                    </div>
                </div>
                
                <div class="game-area">
                    <div class="bubble-game">
                        <div class="bubble-scene" id="bubbleScene">
                            <div class="bubble-instructions">
                                Pop matching <strong>Country + Capital</strong> bubbles! 🫧
                            </div>
                            
                            ${bubbles.map((b, i) => `
                                <div class="bubble" 
                                     id="bubble${i}"
                                     data-idx="${i}"
                                     data-id="${b.id}"
                                     data-type="${b.type}"
                                     onclick="clickBubble(${i})"
                                     style="
                                        left: ${b.x}%;
                                        top: ${b.y}%;
                                        width: ${b.size}px;
                                        height: ${b.size}px;
                                        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), ${b.color});
                                        animation-delay: ${b.delay}s;

                                    ${b.value}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;

        function clickBubble(idx) {
            Audio.click();
            const bubble = state.data.bubbles[idx];
            const bubbleEl = document.getElementById(`bubble${idx}`);
            
            if (!bubbleEl || bubbleEl.classList.contains('pop')) return;
            
            if (state.data.selected === null) {
                // First selection
                state.data.selected = { idx, bubble, el: bubbleEl };
                bubbleEl.classList.add('selected');
            } else {
                // Second selection
                const first = state.data.selected;
                
                if (first.idx === idx) {
                    // Clicked same bubble, deselect
                    first.el.classList.remove('selected');
                    state.data.selected = null;
                    return;
                }
                
                if (first.bubble.id === bubble.id && first.bubble.type !== bubble.type) {
                    // Match! (same country, different type)
                    Audio.correct();
                    first.el.classList.add('pop');
                    bubbleEl.classList.add('pop');
                    
                    state.score += 10;
                    state.data.matched++;
                    
                    document.getElementById('bubbleScore').textContent = state.score;

                    state.data.selected = null;
                    
                    // Check if round complete

                    if (remaining.length === 0) {
                        setTimeout(() => {
                            if (state.data.matched >= state.total) {
                                showResults();
                            } else {
                                renderBubbleGame();
                            }
                        }, 500);
                    }
                } else {
                    // No match
                    Audio.wrong();
                    first.el.classList.remove('selected');
                    bubbleEl.classList.add('selected');
                    
                    setTimeout(() => {
                        bubbleEl.classList.remove('selected');
                    }, 300);
                    
                    state.data.selected = null;
                }
            }
        }
