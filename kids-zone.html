<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEOTOPIA Kids - Learn Geography Fun! 🌍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        :root {
            --pink: #FF6B9D;
            --blue: #4ECDC4;
            --yellow: #FFE66D;
            --purple: #A06CD5;
            --orange: #FF8C42;
            --green: #7ED957;
            --red: #FF5252;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8C8 50%, #7ED957 100%);
        }

        /* ===== ANIMATED WORLD BACKGROUND ===== */
        .world-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .sun {
            position: absolute;
            top: 20px;
            right: 40px;
            width: 90px;
            height: 90px;
            background: radial-gradient(circle, #FFD700, #FFA500);
            border-radius: 50%;
            box-shadow: 0 0 50px #FFD700, 0 0 80px #FFA500;
            animation: sunGlow 3s ease-in-out infinite;
        }

        .sun::after {
            content: '😊';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 45px;
        }

        @keyframes sunGlow {
            0%, 100% { transform: scale(1); box-shadow: 0 0 50px #FFD700; }
            50% { transform: scale(1.05); box-shadow: 0 0 70px #FFD700; }
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.9;
            animation: cloudFloat linear infinite;
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        .cloud:nth-child(2) { width: 100px; height: 40px; top: 60px; animation-duration: 30s; }
        .cloud:nth-child(2)::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud:nth-child(2)::after { width: 40px; height: 40px; top: -18px; left: 50px; }

        .cloud:nth-child(3) { width: 80px; height: 35px; top: 130px; animation-duration: 25s; animation-delay: -10s; }
        .cloud:nth-child(3)::before { width: 40px; height: 40px; top: -20px; left: 12px; }
        .cloud:nth-child(3)::after { width: 35px; height: 35px; top: -15px; left: 40px; }

        .cloud:nth-child(4) { width: 120px; height: 45px; top: 200px; animation-duration: 35s; animation-delay: -20s; }
        .cloud:nth-child(4)::before { width: 55px; height: 55px; top: -28px; left: 20px; }
        .cloud:nth-child(4)::after { width: 45px; height: 45px; top: -22px; left: 60px; }

        @keyframes cloudFloat {
            0% { left: -150px; }
            100% { left: calc(100vw + 50px); }
        }

        .bird-flying {
            position: absolute;
            font-size: 22px;
            animation: birdFly 12s linear infinite;
        }

        .bird-flying:nth-child(5) { top: 80px; animation-delay: 0s; }
        .bird-flying:nth-child(6) { top: 100px; animation-delay: 0.2s; }
        .bird-flying:nth-child(7) { top: 90px; animation-delay: 0.4s; }

        @keyframes birdFly {
            0% { left: -30px; transform: scaleX(1); }
            100% { left: calc(100vw + 30px); transform: scaleX(1); }
        }

        .rainbow {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 150px;
            border-radius: 150px 150px 0 0;
            background: linear-gradient(
                180deg,
                #FF0000 0%, #FF0000 14%,
                #FF7F00 14%, #FF7F00 28%,
                #FFFF00 28%, #FFFF00 42%,
                #00FF00 42%, #00FF00 56%,
                #0000FF 56%, #0000FF 70%,
                #4B0082 70%, #4B0082 84%,
                #8B00FF 84%, #8B00FF 100%
            );
            opacity: 0.3;
            animation: rainbowPulse 5s ease-in-out infinite;
        }

        @keyframes rainbowPulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.4; }
        }

        /* ===== LOADING SCREEN ===== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: all 0.5s;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-earth {
            font-size: 100px;
            animation: earthBounce 0.8s ease-in-out infinite;
        }

        @keyframes earthBounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(10deg); }
        }

        .loading-title {
            color: white;
            font-size: 38px;
            margin-top: 20px;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }

        .loading-animals {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .loading-animal {
            font-size: 35px;
            animation: animalHop 0.5s ease-in-out infinite;
        }

        .loading-animal:nth-child(1) { animation-delay: 0s; }
        .loading-animal:nth-child(2) { animation-delay: 0.1s; }
        .loading-animal:nth-child(3) { animation-delay: 0.2s; }
        .loading-animal:nth-child(4) { animation-delay: 0.3s; }
        .loading-animal:nth-child(5) { animation-delay: 0.4s; }

        @keyframes animalHop {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .loading-bar-container {
            width: 220px;
            height: 14px;
            background: rgba(255,255,255,0.3);
            border-radius: 7px;
            margin-top: 25px;
            overflow: hidden;
        }

        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #FFE66D, #FF6B9D, #4ECDC4, #7ED957);
            border-radius: 7px;
            animation: loadingFill 2s ease-out forwards;
        }

        @keyframes loadingFill {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 5px 30px rgba(0,0,0,0.25);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 14px;
            font-size: 26px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 40px;
            animation: logoSpin 4s linear infinite;
        }

        @keyframes logoSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-text {
            color: white;
            font-size: 26px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
        }

        .coin-pill {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #333;
            box-shadow: 0 4px 15px rgba(255,215,0,0.4);
        }

        .streak-pill {
            background: linear-gradient(135deg, #FF6B9D, #FF5252);
            color: white;
            box-shadow: 0 4px 15px rgba(255,107,157,0.4);
        }

        .sound-btn {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 14px;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .sound-btn:active {
            transform: scale(0.95);
        }

        /* ===== MAIN CONTAINER ===== */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 15px;
            position: relative;
            z-index: 1;
        }

        /* ===== HOME SCREEN ===== */
        .home-screen {
            display: block;
        }

        .welcome-banner {
            background: white;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.12);
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .welcome-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, var(--pink), var(--orange), var(--yellow), var(--green), var(--blue), var(--purple));
        }

        .welcome-mascot {
            font-size: 90px;
            animation: mascotDance 1.5s ease-in-out infinite;
        }

        @keyframes mascotDance {
            0%, 100% { transform: rotate(-8deg) scale(1); }
            50% { transform: rotate(8deg) scale(1.05); }
        }

        .welcome-title {
            font-size: 34px;
            color: #333;
            margin: 15px 0 8px;
        }

        .welcome-title span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-sub {
            font-size: 18px;
            color: #777;
        }

        .age-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .age-btn {
            padding: 14px 28px;
            font-size: 17px;
            font-weight: bold;
            border: 4px solid #eee;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .age-btn:active {
            transform: scale(0.97);
        }

        .age-btn.active {
            border-color: var(--purple);
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        /* ===== GAMES SECTION ===== */
        .section-title {
            font-size: 26px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.25);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 18px;
        }

        .game-card {
            background: white;
            border-radius: 25px;
            padding: 22px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 35px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            border: 4px solid transparent;
        }

        .game-card:active {
            transform: scale(0.96);
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 18px 45px rgba(0,0,0,0.18);
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
        }

        .game-card:nth-child(1)::before { background: linear-gradient(90deg, #FF6B9D, #FF8C42); }
        .game-card:nth-child(2)::before { background: linear-gradient(90deg, #4ECDC4, #26de81); }
        .game-card:nth-child(3)::before { background: linear-gradient(90deg, #667eea, #764ba2); }
        .game-card:nth-child(4)::before { background: linear-gradient(90deg, #FFE66D, #f7b731); }
        .game-card:nth-child(5)::before { background: linear-gradient(90deg, #7ED957, #26de81); }
        .game-card:nth-child(6)::before { background: linear-gradient(90deg, #A06CD5, #6c5ce7); }
        .game-card:nth-child(7)::before { background: linear-gradient(90deg, #00d2ff, #3a7bd5); }
        .game-card:nth-child(8)::before { background: linear-gradient(90deg, #f5576c, #f093fb); }
        .game-card:nth-child(9)::before { background: linear-gradient(90deg, #11998e, #38ef7d); }
        .game-card:nth-child(10)::before { background: linear-gradient(90deg, #fc4a1a, #f7b733); }

        .game-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 10px;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
        }

        .game-badge.hot { background: linear-gradient(135deg, #f5576c, #f093fb); }
        .game-badge.new { background: linear-gradient(135deg, #4ECDC4, #26de81); }
        .game-badge.fun { background: linear-gradient(135deg, #FFE66D, #f7b731); color: #333; }

        .game-icon {
            font-size: 55px;
            margin-bottom: 12px;
            display: block;
        }

        .game-name {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

        /* ===== GAME SCREEN ===== */
        .game-screen {
            display: none;
        }

        .game-screen.active {
            display: block;
        }

        /* ===== GAME TOP BAR ===== */
        .game-bar {
            background: white;
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            flex-wrap: wrap;
            gap: 12px;
        }

        .game-bar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .game-back {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 14px;
            font-size: 22px;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-bar-title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .game-bar-right {
            display: flex;
            gap: 12px;
        }

        .game-stat-box {
            background: #f5f5f5;
            padding: 10px 18px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .game-stat-box span:first-child {
            font-size: 20px;
        }

        .game-stat-box span:last-child {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        /* ===== GAME AREA ===== */
        .game-area {
            background: white;
            border-radius: 30px;
            padding: 25px;
            min-height: 480px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .game-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #FF6B9D, #4ECDC4, #FFE66D, #667eea, #7ED957);
        }

        /* ===== PROGRESS BAR ===== */
        .progress-wrap {
            margin-bottom: 20px;
        }

        .progress-track {
            height: 14px;
            background: #e8e8e8;
            border-radius: 7px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #7ED957, #4ECDC4, #667eea);
            border-radius: 7px;
            transition: width 0.4s ease;
        }

        /* =====================================================
           🚀 NUMBER ROCKET GAME
           ===================================================== */
        .rocket-game-area {
            position: relative;
            height: 450px;
            background: linear-gradient(180deg, #0d0d2b 0%, #1a1a4e 40%, #2d2d7a 100%);
            border-radius: 25px;
            overflow: hidden;
        }

        /* Stars */
        .space-stars {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .space-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: starTwinkle 2s ease-in-out infinite;
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Planet decorations */
        .planet {
            position: absolute;
            border-radius: 50%;
        }

        .planet.moon {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #f5f5f5, #bbb);
            top: 30px;
            left: 30px;
            box-shadow: inset -8px -8px 20px rgba(0,0,0,0.3);
        }

        .planet.mars {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b);
            top: 100px;
            right: 80px;
        }

        /* Rocket */
        .rocket-ship {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 70px;
            z-index: 10;
            transition: all 0.4s ease;
            filter: drop-shadow(0 0 25px rgba(255,200,0,0.6));
        }

        .rocket-ship.shake {
            animation: rocketShake 0.3s ease;
        }

        @keyframes rocketShake {
            0%, 100% { transform: translateX(-50%) rotate(0); }
            25% { transform: translateX(-50%) rotate(-5deg); }
            75% { transform: translateX(-50%) rotate(5deg); }
        }

        .rocket-ship.launching {
            animation: rocketLiftoff 3s ease-in forwards;
        }

        @keyframes rocketLiftoff {
            0% { bottom: 40px; }
            30% { bottom: 80px; transform: translateX(-50%) rotate(-3deg); }
            50% { bottom: 150px; transform: translateX(-50%) rotate(3deg); }
            100% { bottom: 600px; transform: translateX(-50%) scale(0.4); opacity: 0; }
        }

        .rocket-flame {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 35px;
            opacity: 0;
            z-index: 9;
        }

        .rocket-flame.on {
            opacity: 1;
            animation: flameWiggle 0.1s infinite;
        }

        @keyframes flameWiggle {
            0%, 100% { transform: translateX(-50%) scaleY(1); }
            50% { transform: translateX(-50%) scaleY(1.2); }
        }

        /* Fuel gauge */
        .fuel-display {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            backdrop-filter: blur(5px);
        }

        .fuel-label {
            color: white;
            font-size: 13px;
            text-align: center;
            margin-bottom: 10px;
        }

        .fuel-tank {
            width: 30px;
            height: 140px;
            background: rgba(255,255,255,0.15);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .fuel-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(0deg, #f12711, #FF8C42, #FFE66D, #7ED957);
            border-radius: 13px;
            transition: height 0.5s ease;
        }

        /* Target numbers */
        .target-numbers {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .target-num {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.4);
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .target-num.current {
            background: linear-gradient(135deg, #FFE66D, #f7b731);
            color: #333;
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(255,230,109,0.7);
            animation: targetGlow 1s ease-in-out infinite;
        }

        @keyframes targetGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(255,230,109,0.6); }
            50% { box-shadow: 0 0 30px rgba(255,230,109,0.9); }
        }

        .target-num.found {
            background: linear-gradient(135deg, #7ED957, #26de81);
            color: white;
        }

        /* Number cards grid */
        .number-cards-wrap {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.08);
            padding: 18px;
            border-radius: 22px;
            backdrop-filter: blur(8px);
        }

        .number-cards-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        .num-card {
            width: 58px;
            height: 58px;
            perspective: 1000px;
            cursor: pointer;
        }

        .num-card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }

        .num-card.flipped .num-card-inner {
            transform: rotateY(180deg);
        }

        .num-card-front, .num-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
        }

        .num-card-front {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .num-card-front::after {
            content: '?';
            font-size: 28px;
        }

        .num-card-back {
            background: linear-gradient(135deg, #4ECDC4, #26de81);
            color: white;
            transform: rotateY(180deg);
            box-shadow: 0 6px 20px rgba(78, 205, 196, 0.5);
        }

        .num-card.found .num-card-back {
            background: linear-gradient(135deg, #7ED957, #26de81);
        }

        .num-card.wrong .num-card-back {
            background: linear-gradient(135deg, #FF5252, #f12711);
        }

        .num-card.found, .num-card.locked {
            pointer-events: none;
        }

        .num-card:hover {
            transform: scale(1.08);
        }

        /* Instructions bubble */
        .instruction-bubble {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            padding: 25px 40px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            z-index: 100;
            animation: bubblePop 0.4s ease;
        }

        @keyframes bubblePop {
            0% { transform: translate(-50%, -50%) scale(0); }
            70% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .instruction-bubble h3 {
            font-size: 24px;
            color: #333;
            margin-bottom: 15px;
        }

        .instruction-bubble p {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .instruction-bubble .start-btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #7ED957, #26de81);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(126, 217, 87, 0.4);
        }

        /* =====================================================
           🎈 BALLOON POP GAME
           ===================================================== */
        .balloon-game-area {
            position: relative;
            height: 480px;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8C8 60%, #7ED957 100%);
            border-radius: 25px;
            overflow: hidden;
        }

        .balloon {
            position: absolute;
            cursor: pointer;
            transition: transform 0.2s;
            animation: balloonFloat ease-in-out infinite;
        }

        .balloon:hover {
            transform: scale(1.1);
        }

        .balloon-body {
            width: 70px;
            height: 85px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            position: relative;
            box-shadow: inset -10px -10px 30px rgba(0,0,0,0.15), 
                        inset 10px 10px 30px rgba(255,255,255,0.3);
        }

        .balloon-body::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 15px solid inherit;
        }

        .balloon-string {
            position: absolute;
            bottom: -50px;
            left: 50%;
            width: 2px;
            height: 40px;
            background: #999;
        }

        @keyframes balloonFloat {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
        }

        .balloon.pop {
            animation: balloonPop 0.3s ease forwards;
        }

        @keyframes balloonPop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        .balloon-word-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 15px 35px;
            border-radius: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }

        .balloon-word {
            display: flex;
            gap: 8px;
        }

        .balloon-letter {
            width: 45px;
            height: 55px;
            background: #f0f0f0;
            border: 3px solid #ddd;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }

        .balloon-letter.filled {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: #667eea;
            color: white;
            animation: letterFill 0.3s ease;
        }

        @keyframes letterFill {
            0% { transform: scale(0.5); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* =====================================================
           🦘 ANIMAL JUMP GAME
           ===================================================== */
        .jump-game-area {
            position: relative;
            height: 450px;
            background: linear-gradient(180deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 25px;
            overflow: hidden;
        }

        .jump-ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(180deg, #8B7355, #5D4E37);
        }

        .jump-grass {
            position: absolute;
            bottom: 90px;
            left: 0;
            width: 200%;
            height: 30px;
            background: repeating-linear-gradient(
                90deg,
                #7ED957 0px, #7ED957 20px,
                #6BC84F 20px, #6BC84F 40px
            );
            animation: grassScroll 3s linear infinite;
        }

        @keyframes grassScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .jump-animal {
            position: absolute;
            bottom: 120px;
            left: 80px;
            font-size: 80px;
            transition: all 0.3s;
            z-index: 10;
        }

        .jump-animal.jumping {
            animation: animalJump 0.5s ease;
        }

        @keyframes animalJump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-120px); }
        }

        .jump-obstacle {
            position: absolute;
            bottom: 100px;
            font-size: 50px;
            animation: obstacleMove 2s linear forwards;
        }

        @keyframes obstacleMove {
            0% { right: -80px; }
            100% { right: calc(100% + 80px); }
        }

        .jump-score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .jump-item {
            position: absolute;
            font-size: 45px;
            animation: itemFloat 3s linear forwards;
            cursor: pointer;
        }

        @keyframes itemFloat {
            0% { right: -60px; transform: translateY(0); }
            100% { right: calc(100% + 60px); transform: translateY(-20px); }
        }

        .jump-item:hover {
            transform: scale(1.2);
        }

        /* =====================================================
           🎯 TARGET SHOOT GAME
           ===================================================== */
        .shoot-game-area {
            position: relative;
            height: 450px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 25px;
            overflow: hidden;
        }

        .target-question {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }

        .shoot-target {
            position: absolute;
            width: 100px;
            height: 100px;
            cursor: pointer;
            transition: all 0.3s;
            animation: targetBounce 2s ease-in-out infinite;
        }

        .shoot-target:hover {
            transform: scale(1.15);
        }

        @keyframes targetBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .target-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .target-circle::before {
            content: '';
            position: absolute;
            width: 80%;
            height: 80%;
            border: 4px solid #FF5252;
            border-radius: 50%;
        }

        .target-circle::after {
            content: '';
            position: absolute;
            width: 50%;
            height: 50%;
            border: 4px solid #FF5252;
            border-radius: 50%;
        }

        .shoot-target.hit {
            animation: targetHit 0.4s ease forwards;
        }

        @keyframes targetHit {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(0); opacity: 0; }
        }

        .shoot-target.miss {
            animation: targetMiss 0.4s ease;
        }

        @keyframes targetMiss {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px) rotate(-5deg); }
            75% { transform: translateX(15px) rotate(5deg); }
        }

        .crosshair {
            position: absolute;
            width: 50px;
            height: 50px;
            pointer-events: none;
            z-index: 100;
            opacity: 0.7;
        }

        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: white;
        }

        .crosshair::before {
            width: 100%;
            height: 3px;
            top: 50%;
            transform: translateY(-50%);
        }

        .crosshair::after {
            width: 3px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }

        /* =====================================================
           🎪 CIRCUS CATCH GAME
           ===================================================== */
        .catch-game-area {
            position: relative;
            height: 480px;
            background: linear-gradient(180deg, #ffeaa7 0%, #dfe6e9 100%);
            border-radius: 25px;
            overflow: hidden;
        }

        .catch-basket {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 80px;
            transition: left 0.1s;
        }

        .basket-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #8B4513, #5D3A1A);
            border-radius: 0 0 20px 20px;
            position: relative;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .basket-body::before {
            content: '';
            position: absolute;
            top: -15px;
            left: -10px;
            right: -10px;
            height: 20px;
            background: #654321;
            border-radius: 10px;
        }

        .falling-item {
            position: absolute;
            font-size: 50px;
            animation: itemFall linear forwards;
            cursor: pointer;
        }

        @keyframes itemFall {
            0% { top: -70px; }
            100% { top: calc(100% + 70px); }
        }

        .falling-item.caught {
            animation: itemCatch 0.3s ease forwards;
        }

        @keyframes itemCatch {
            0% { transform: scale(1); }
            100% { transform: scale(0); opacity: 0; }
        }

        .catch-score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .catch-target-word {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 35px;
            border-radius: 25px;
            font-size: 24px;
            font-weight: bold;
        }

        /* =====================================================
           🧩 PUZZLE DRAG GAME
           ===================================================== */
        .puzzle-game-area {
            position: relative;
            min-height: 450px;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            border-radius: 25px;
            padding: 25px;
        }

        .puzzle-question {
            text-align: center;
            font-size: 24px;
            color: #333;
            margin-bottom: 25px;
        }

        .puzzle-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .puzzle-slot {
            width: 70px;
            height: 80px;
            background: rgba(255,255,255,0.6);
            border: 4px dashed #667eea;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }

        .puzzle-slot.filled {
            background: linear-gradient(135deg, #7ED957, #26de81);
            border-style: solid;
            border-color: #7ED957;
            color: white;
        }

        .puzzle-pieces {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .puzzle-piece {
            width: 60px;
            height: 70px;
            background: white;
            border: 3px solid #ddd;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            cursor: grab;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .puzzle-piece:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border-color: #667eea;
        }

        .puzzle-piece:active {
            cursor: grabbing;
            transform: scale(1.1);
        }

        .puzzle-piece.used {
            opacity: 0.3;
            pointer-events: none;
        }

        /* =====================================================
           🏃 ENDLESS RUNNER GAME
           ===================================================== */
        .runner-game-area {
            position: relative;
            height: 400px;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8C8 100%);
            border-radius: 25px;
            overflow: hidden;
        }

        .runner-ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 80px;
            background: repeating-linear-gradient(
                90deg,
                #7ED957 0px, #7ED957 50px,
                #6BC84F 50px, #6BC84F 100px
            );
            animation: groundScroll 1s linear infinite;
        }

        @keyframes groundScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .runner-player {
            position: absolute;
            bottom: 80px;
            left: 100px;
            font-size: 70px;
            animation: playerRun 0.3s steps(2) infinite;
        }

        @keyframes playerRun {
            0% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0); }
        }

        .runner-player.jumping {
            animation: playerJump 0.6s ease;
        }

        @keyframes playerJump {
            0%, 100% { bottom: 80px; }
            50% { bottom: 200px; }
        }

        .runner-collectible {
            position: absolute;
            font-size: 40px;
            animation: collectibleMove 2s linear forwards;
        }

        @keyframes collectibleMove {
            0% { right: -60px; }
            100% { right: calc(100% + 60px); }
        }

        .runner-obstacle {
            position: absolute;
            bottom: 80px;
            font-size: 55px;
            animation: obstacleRun 2s linear forwards;
        }

        @keyframes obstacleRun {
            0% { right: -80px; }
            100% { right: calc(100% + 80px); }
        }

        /* =====================================================
           MEMORY, FLAGS, CAPITALS, SORTING - KEEP EXISTING
           ===================================================== */
        
        /* Memory Game */
        .memory-grid {
            display: grid;
            gap: 12px;
            justify-content: center;
            margin: 20px auto;
        }

        .memory-grid.g4 { grid-template-columns: repeat(4, 75px); }
        .memory-grid.g6 { grid-template-columns: repeat(4, 70px); }

        .mem-card {
            width: 75px;
            height: 75px;
            perspective: 1000px;
            cursor: pointer;
        }

        .mem-card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        .mem-card.flip .mem-card-inner {
            transform: rotateY(180deg);
        }

        .mem-card-front, .mem-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mem-card-front {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-size: 30px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .mem-card-back {
            background: white;
            border: 3px solid #667eea;
            transform: rotateY(180deg);
            overflow: hidden;
            padding: 5px;
        }

        .mem-card-back img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .mem-card.matched .mem-card-back {
            background: #d4fcc3;
            border-color: #7ED957;
        }

        /* Flag Quiz */
        .flag-display {
            width: 260px;
            height: 170px;
            margin: 20px auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            border: 5px solid white;
        }

        .flag-display img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 500px;
            margin: 25px auto 0;
        }

        .quiz-btn {
            padding: 20px;
            border: 4px solid #e0e0e0;
            border-radius: 18px;
            background: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quiz-btn:hover {
            border-color: #667eea;
            transform: translateY(-4px);
        }

        .quiz-btn.correct {
            background: linear-gradient(135deg, #7ED957, #26de81);
            border-color: #7ED957;
            color: white;
        }

        .quiz-btn.wrong {
            background: linear-gradient(135deg, #FF5252, #f12711);
            border-color: #FF5252;
            color: white;
        }

        /* Sorting Factory */
        .factory-scene {
            background: linear-gradient(180deg, #ffecd2, #fcb69f);
            border-radius: 25px;
            min-height: 420px;
            position: relative;
            overflow: hidden;
        }

        .conveyor {
            position: absolute;
            bottom: 150px;
            left: 0;
            width: 100%;
            height: 50px;
            background: repeating-linear-gradient(90deg, #444 0px, #444 25px, #333 25px, #333 50px);
            animation: conveyorRoll 1s linear infinite;
        }

        @keyframes conveyorRoll {
            0% { background-position: 0 0; }
            100% { background-position: 50px 0; }
        }

        .sort-item {
            position: absolute;
            bottom: 170px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 20px 45px;
            border-radius: 20px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            animation: itemHover 1.5s ease-in-out infinite;
        }

        @keyframes itemHover {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-8px); }
        }

        .sort-bins {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 35px;
        }

        .sort-bin {
            width: 140px;
            height: 120px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .sort-bin:hover {
            transform: scale(1.08) translateY(-8px);
        }

        .sort-bin.ocean { background: linear-gradient(180deg, #00d2ff, #3a7bd5); }
        .sort-bin.land { background: linear-gradient(180deg, #7ED957, #26de81); }
        .sort-bin.river { background: linear-gradient(180deg, #4ECDC4, #1a8f8f); }
        .sort-bin.mountain { background: linear-gradient(180deg, #8B7355, #5D4E37); }
        .sort-bin.bird { background: linear-gradient(180deg, #87CEEB, #5D9CEC); }
        .sort-bin.animal { background: linear-gradient(180deg, #f7b731, #e17055); }

        .sort-bin-icon { font-size: 45px; }
        .sort-bin-label { color: white; font-size: 16px; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }

        .category-tabs {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: white;
            padding: 8px;
            border-radius: 20px;
        }

        .cat-tab {
            padding: 10px 18px;
            border: none;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            background: #eee;
            color: #666;
            transition: all 0.3s;
        }

        .cat-tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .combo-badge {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #FFE66D, #f7b731);
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            opacity: 0;
            transition: all 0.3s;
        }

        .combo-badge.show {
            opacity: 1;
            animation: comboShow 0.3s ease;
        }

        @keyframes comboShow {
            0% { transform: translateX(-50%) scale(0.5); }
            70% { transform: translateX(-50%) scale(1.1); }
            100% { transform: translateX(-50%) scale(1); }
        }

        /* =====================================================
           RESULT SCREEN
           ===================================================== */
        .result-screen {
            display: none;
            text-align: center;
            padding: 35px 25px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .result-screen.active {
            display: block;
            animation: resultPop 0.5s ease;
        }

        @keyframes resultPop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.03); }

                    o.frequency.value = f; o.type = t;
                    g.gain.setValueAtTime(0.25, this.ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + d);
                    o.start(); o.stop(this.ctx.currentTime + d);
                } catch(e) {}
            },
            click() { this.play(600, 0.08); },
            correct() { this.play(523, 0.1); setTimeout(() => this.play(659, 0.1), 80); setTimeout(() => this.play(784, 0.12), 160); },
            wrong() { this.play(200, 0.25, 'sawtooth'); },

        };

        // ==================== 🎈 BALLOON POP ====================
        function startBalloon() {

        function nextBalloonWord() {
            const available = S.data.words.filter((_, i) => !S.used.has(i));
            if (!available.length || S.q >= S.total) { showResults(); return; }

            const wordObj = available[0];
            const idx = S.data.words.indexOf(wordObj);
            S.used.add(idx);
            S.data.current = wordObj;
            S.data.letterIdx = 0;

            const word = wordObj.w;
            const letters = word.split('');
            const extra = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').filter(l => !word.includes(l));
            const allLetters = shuffle([...letters, ...shuffle(extra).slice(0, Math.min(6, 12 - letters.length))]);

            const colors = ['#FF6B9D', '#4ECDC4', '#FFE66D', '#A06CD5', '#FF8C42', '#7ED957', '#00d2ff', '#f5576c'];

                            </div>
                        </div>
                        ${allLetters.map((l, i) => {
                            const x = 10 + Math.random() * 75;

                            const delay = Math.random() * 2;

                                <div class="balloon" id="balloon${i}" style="left:${x}%;top:${y}%;animation-delay:${delay}s" onclick="popBalloon(${i},'${l}')">

        function popBalloon(idx, letter) {
            const balloon = document.getElementById(`balloon${idx}`);
            if (!balloon || balloon.classList.contains('pop')) return;

            Audio.click();
            const word = S.data.current.w;
            const targetLetter = word[S.data.letterIdx];

            if (letter === targetLetter) {
                Audio.correct();
                balloon.classList.add('pop');
                
                const slot = document.getElementById(`bl${S.data.letterIdx}`);
                slot.textContent = letter;
                slot.classList.add('filled');
                
                S.data.letterIdx++;
                
                if (S.data.letterIdx >= word.length) {
                    S.score += 10;
                    S.q++;
                    toast(true, 'Great! 🎉');

                    balloon.style.transform = '';

            const area = document.getElementById('catchArea');

            // Remove old flags
            document.querySelectorAll('.falling-item').forEach(f => f.remove());

            const countries = shuffle([...COUNTRIES]).slice(0, 4);

            S.data.currentFlag = target;

                item.className = 'falling-item';
                item.innerHTML = `<img src="${flag(c.f)}" style="width:60px;height:40px;border-radius:5px;box-shadow:0 3px 10px rgba(0,0,0,0.3)">`;

                item.dataset.code = c.f;
                item.onclick = () => catchFlag(item, c);

                    document.getElementById('memPairs').textContent = `${S.data.matched}/${S.data.total}`;

            const c = S.data.cat;

                SEAS.forEach(s => items.push({n: s, t: 'ocean'}));
                COUNTRIES.slice(0, 40).forEach(c => items.push({n: c.n, t: 'land'}));

                RIVERS.forEach(r => items.push({n: r, t: 'river'}));
                MOUNTAINS.forEach(m => items.push({n: m, t: 'mountain'}));
            } else {
                BIRDS.forEach(b => items.push({n: b, t: 'bird'}));
                ANIMALS.forEach(a => items.push({n: a, t: 'animal'}));

            S.data.items = shuffle(items);
