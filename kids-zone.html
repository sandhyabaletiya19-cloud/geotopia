<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEOTOPIA ULTRA - Premium Geography Games 🌍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        /* ===== LOADER ===== */
        .loader {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.5s;
        }

        .loader.hide { opacity: 0; pointer-events: none; }

        .loader-icon {
            font-size: 100px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            color: white;
            font-size: 32px;
            font-weight: bold;
            margin-top: 20px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .loader-bar {
            width: 250px;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            margin-top: 30px;
            overflow: hidden;
        }

        .loader-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            width: 0%;
            animation: load 2s ease-out forwards;
        }

        @keyframes load {
            to { width: 100%; }
        }

        /* ===== HEADER ===== */
        .header {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .logo-icon {
            font-size: 32px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .stats {
            display: flex;
            gap: 15px;
        }

        .stat {
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* ===== MENU ===== */
        .menu {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .menu.hide { display: none; }

        .welcome {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            margin-bottom: 25px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .welcome-emoji {
            font-size: 80px;
            animation: bounce 1.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .welcome h1 {
            color: white;
            font-size: 32px;
            margin-top: 15px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .welcome p {
            color: rgba(255,255,255,0.9);
            font-size: 16px;
            margin-top: 10px;
        }

        .section-title {
            color: white;
            font-size: 22px;
            margin: 25px 0 15px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .game-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
        }

        .game-card.g1::before { background: linear-gradient(90deg, #FF6B6B, #FF8E53); }
        .game-card.g2::before { background: linear-gradient(90deg, #4ECDC4, #44A08D); }
        .game-card.g3::before { background: linear-gradient(90deg, #A8E6CF, #56AB2F); }
        .game-card.g4::before { background: linear-gradient(90deg, #FFD93D, #F2C94C); }
        .game-card.g5::before { background: linear-gradient(90deg, #C471F5, #9D50BB); }
        .game-card.g6::before { background: linear-gradient(90deg, #667eea, #764ba2); }

        .game-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .game-card:active {
            transform: scale(0.95);
        }

        .game-icon {
            font-size: 60px;
            margin-bottom: 12px;
        }

        .game-name {
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .game-desc {
            font-size: 12px;
            color: #7f8c8d;
        }

        .game-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #FF6B6B;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
        }

        .game-badge.new { background: #4ECDC4; }
        .game-badge.hot { background: #FF6B6B; }

        /* ===== GAME SCREEN ===== */
        .game-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: none;
            flex-direction: column;
        }

        .game-screen.active { display: flex; }

        .game-header {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-back {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 10px 15px;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .game-info {
            flex: 1;
            margin: 0 15px;
        }

        .game-title {
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .game-level {
            color: rgba(255,255,255,0.8);
            font-size: 13px;
        }

        .game-stats {
            display: flex;
            gap: 10px;
        }

        .game-stat {
            background: rgba(255,255,255,0.2);
            padding: 8px 12px;
            border-radius: 15px;
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .game-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        /* ===== SUBWAY SURFER STYLE ===== */
        .runner-game {
            width: 100%;
            height: 100%;
            position: relative;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            overflow: hidden;
        }

        .runner-ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 150px;
            background: linear-gradient(0deg, #2d5016, #4a7c23);
        }

        .runner-lanes {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 10%;
        }

        .lane {
            flex: 1;
            border-left: 2px dashed rgba(255,255,255,0.3);
            position: relative;
        }

        .lane:first-child { border-left: none; }

        .runner-player {
            position: absolute;
            width: 60px;
            height: 80px;
            left: 50%;
            bottom: 150px;
            transform: translateX(-50%);
            transition: all 0.2s ease;
            z-index: 100;
        }

        .player-char {
            font-size: 60px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }

        .runner-player.jumping {
            animation: jump 0.5s ease-out;
        }

        @keyframes jump {
            0% { bottom: 150px; }
            50% { bottom: 300px; }
            100% { bottom: 150px; }
        }

        .runner-player.sliding {
            height: 50px;
        }

        .runner-player.sliding .player-char {
            font-size: 50px;
            transform: rotate(-15deg);
        }

        .obstacle {
            position: absolute;
            width: 50px;
            height: 60px;
            bottom: 150px;
            font-size: 50px;
            transition: transform 0.1s;
        }

        .collectible {
            position: absolute;
            font-size: 40px;
            cursor: pointer;
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            to { transform: scale(1.1); }
        }

        .collectible.coin { 
            width: 35px;
            height: 35px;
        }

        .collectible.flag {
            width: 45px;
            height: 30px;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }

        .collectible.flag img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .runner-hud {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            z-index: 200;
        }

        .hud-score {
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .hud-target {
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            text-align: center;
        }

        .hud-target .label {
            font-size: 11px;
            opacity: 0.8;
        }

        .hud-target .value {
            font-size: 16px;
            font-weight: bold;
            color: #FFD700;
        }

        .runner-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 200;
        }

        .control-btn {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 50%;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.1s;
        }

        .control-btn:active {
            transform: scale(0.9);
        }

        /* ===== FRUIT NINJA STYLE ===== */
        .ninja-game {
            width: 100%;
            height: 100%;
            position: relative;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            overflow: hidden;
        }

        .ninja-flag {
            position: absolute;
            width: 90px;
            height: 60px;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }

        .ninja-flag:hover {
            transform: scale(1.05);
        }

        .ninja-flag img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .ninja-flag.sliced {
            animation: slice 0.4s ease-out forwards;
        }

        @keyframes slice {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            100% { transform: scale(0) rotate(45deg); opacity: 0; }
        }

        .slice-trail {
            position: absolute;
            height: 3px;
            background: linear-gradient(90deg, transparent, #FFD700, transparent);
            pointer-events: none;
            z-index: 1000;
            animation: fadeTrail 0.3s ease-out forwards;
        }

        @keyframes fadeTrail {
            to { opacity: 0; }
        }

        .ninja-hud {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
        }

        .ninja-target {
            background: rgba(0,0,0,0.7);
            padding: 15px 25px;
            border-radius: 20px;
            color: white;
            text-align: center;
        }

        .ninja-target .label {
            font-size: 12px;
            opacity: 0.8;
        }

        .ninja-target .value {
            font-size: 22px;
            font-weight: bold;
            color: #FFD700;
            margin-top: 5px;
        }

        .ninja-lives {
            display: flex;
            gap: 8px;
            font-size: 30px;
        }

        .combo-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 20px #FFD700;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
        }

        .combo-display.show {
            animation: comboShow 0.5s ease-out;
        }

        @keyframes comboShow {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        /* ===== CANDY CRUSH STYLE ===== */
        .match-game {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 20px;
        }

        .match-grid {
            display: grid;
            grid-template-columns: repeat(6, 60px);
            grid-template-rows: repeat(6, 60px);
            gap: 8px;
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .match-tile {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .match-tile:hover {
            transform: scale(1.05);
        }

        .match-tile.selected {
            border: 3px solid #FFD700;
            transform: scale(1.1);
        }

        .match-tile .flag-icon {
            width: 50px;
            height: 35px;
            border-radius: 5px;
            overflow: hidden;
        }

        .match-tile .flag-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .match-tile.matched {
            animation: matchPop 0.4s ease-out;
        }

        @keyframes matchPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(0); opacity: 0; }
        }

        .match-hud {
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
        }

        .match-stat {
            background: rgba(255,255,255,0.9);
            padding: 12px 25px;
            border-radius: 20px;
            text-align: center;
        }

        .match-stat .label {
            font-size: 12px;
            color: #666;
        }

        .match-stat .value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        /* ===== ANGRY BIRDS STYLE ===== */
        .slingshot-game {
            width: 100%;
            height: 100%;
            position: relative;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8C8 100%);
            overflow: hidden;
        }

        .slingshot {
            position: absolute;
            left: 15%;
            bottom: 150px;
            width: 80px;
            height: 120px;
        }

        .slingshot-base {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 20px;
            background: #8B4513;
            border-radius: 10px;
        }

        .slingshot-arm {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 100px;
            background: #654321;
            border-radius: 4px;
        }

        .slingshot-projectile {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            font-size: 45px;
            cursor: grab;
            z-index: 100;
        }

        .slingshot-projectile.launched {
            cursor: default;
            animation: launch 2s ease-out forwards;
        }

        @keyframes launch {
            0% { transform: translate(-50%, 0); }
            100% { transform: translate(200px, -400px); opacity: 0; }
        }

        .target-structure {
            position: absolute;
            right: 10%;
            bottom: 150px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .target-block {
            width: 80px;
            height: 60px;
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .target-block .flag-small {
            width: 60px;
            height: 40px;
            border-radius: 5px;
            overflow: hidden;
        }

        .target-block .flag-small img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .target-block.hit {
            animation: blockHit 0.5s ease-out forwards;
        }

        @keyframes blockHit {
            0% { transform: scale(1); }
            50% { transform: scale(1.2) rotate(10deg); }
            100% { transform: scale(0) rotate(45deg); opacity: 0; }
        }

        .slingshot-hud {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
        }

        .slingshot-target {
            background: rgba(0,0,0,0.7);
            padding: 12px 20px;
            border-radius: 20px;
            color: white;
        }

        .slingshot-target .label {
            font-size: 11px;
            opacity: 0.8;
        }

        .slingshot-target .value {
            font-size: 18px;
            font-weight: bold;
            color: #FFD700;
        }

        .shots-left {
            background: rgba(0,0,0,0.7);
            padding: 12px 20px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
        }

        /* ===== FLAPPY BIRD STYLE ===== */
        .flappy-game {
            width: 100%;
            height: 100%;
            position: relative;
            background: linear-gradient(180deg, #87CEEB 0%, #B4E1FF 100%);
            overflow: hidden;
        }

        .flappy-bird {
            position: absolute;
            left: 25%;
            width: 60px;
            height: 60px;
            font-size: 55px;
            transition: transform 0.1s;
            z-index: 100;
        }

        .flappy-bird.flap {
            animation: flap 0.3s ease-out;
        }

        @keyframes flap {
            0% { transform: rotate(0deg) translateY(0); }
            50% { transform: rotate(-20deg) translateY(-30px); }
            100% { transform: rotate(-10deg) translateY(-15px); }
        }

        .pipe {
            position: absolute;
            width: 80px;
            background: #4CAF50;
            border-radius: 10px;
            box-shadow: inset -5px 0 10px rgba(0,0,0,0.3);
        }

        .pipe.top {
            top: 0;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
        }

        .pipe.bottom {
            bottom: 0;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }

        .pipe-flag {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 40px;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }

        .pipe-flag img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .pipe.top .pipe-flag {
            bottom: -50px;
        }

        .pipe.bottom .pipe-flag {
            top: -50px;
        }

        .flappy-hud {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            text-align: center;
            z-index: 100;
        }

        .flappy-target {
            background: rgba(0,0,0,0.7);
            padding: 12px 25px;
            border-radius: 20px;
            color: white;
            display: inline-block;
        }

        .flappy-target .label {
            font-size: 12px;
            opacity: 0.8;
        }

        .flappy-target .value {
            font-size: 20px;
            font-weight: bold;
            color: #FFD700;
            margin-top: 3px;
        }

        .flappy-score {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 15px;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        /* ===== RACING STYLE ===== */
        .racing-game {
            width: 100%;
            height: 100%;
            position: relative;
            background: linear-gradient(180deg, #87CEEB 0%, #7ED957 100%);
            overflow: hidden;
        }

        .racing-track {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 70%;
            background: #555;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: bottom;
        }

        .track-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent 0px,
                transparent 40px,
                white 40px,
                white 60px
            );
            animation: trackMove 0.5s linear infinite;
        }

        @keyframes trackMove {
            to { background-position: 0 60px; }
        }

        .racing-car {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 100px;
            font-size: 60px;
            z-index: 100;
            transition: left 0.2s ease;
        }

        .racing-car.left { left: 30%; }
        .racing-car.right { left: 70%; }

        .track-item {
            position: absolute;
            font-size: 40px;
            transition: all 0.05s;
        }

        .track-item.flag-gate {
            width: 70px;
            height: 50px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .track-item.flag-gate img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .racing-hud {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
        }

        .racing-target {
            background: rgba(0,0,0,0.7);
            padding: 12px 20px;
            border-radius: 20px;
            color: white;
        }

        .racing-target .label {
            font-size: 11px;
            opacity: 0.8;
        }

        .racing-target .value {
            font-size: 18px;
            font-weight: bold;
            color: #FFD700;
        }

        .racing-speed {
            background: rgba(0,0,0,0.7);
            padding: 12px 20px;
            border-radius: 20px;
            color: white;
            text-align: right;
        }

        .racing-speed .speed-value {
            font-size: 28px;
            font-weight: bold;
            color: #4CAF50;
        }

        .racing-speed .speed-unit {
            font-size: 12px;
            opacity: 0.8;
        }

        .racing-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 80px;
            z-index: 200;
        }

        /* ===== RESULT MODAL ===== */
        .result-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .result-modal.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result-content {
            background: white;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .result-emoji {
            font-size: 100px;
            animation: bounce 1s ease-in-out infinite;
        }

        .result-title {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0 10px;
        }

        .result-subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 25px;
        }

        .result-stars {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .result-stars span {
            font-size: 50px;
            color: #ddd;
        }

        .result-stars span.filled {
            color: #FFD700;
            animation: starPop 0.5s ease backwards;
        }

        @keyframes starPop {
            0% { transform: scale(0) rotate(-180deg); }
            100% { transform: scale(1) rotate(0); }
        }

        .result-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .result-stat {
            background: #f5f5f5;
            padding: 15px 25px;
            border-radius: 15px;
        }

        .result-stat .value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .result-stat .label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .result-rewards {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .reward-badge {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        .result-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .result-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .result-btn.primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .result-btn.secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .result-btn:hover {
            transform: translateY(-2px);
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: white;
            padding: 15px 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 10000;
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: linear-gradient(135deg, #4CAF50, #8BC34A);
            color: white;
        }

        .toast.error {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: white;
        }

        .toast-content {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            font-weight: bold;
        }

        .toast-icon {
            font-size: 28px;
        }

        /* ===== CONFETTI ===== */
        .confetti-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 99999;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .games-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .game-icon { font-size: 50px; }
            .game-name { font-size: 14px; }

            .control-btn {
                width: 60px;
                height: 60px;
                font-size: 25px;
            }

            .match-grid {
                grid-template-columns: repeat(5, 50px);
                grid-template-rows: repeat(5, 50px);
                gap: 6px;
            }

            .match-tile {
                width: 50px;
                height: 50px;
            }
        }

        .hide { display: none !important; }
    </style>
</head>
<body>
    <!-- Loader -->
    <div class="loader" id="loader">
        <div class="loader-icon">🌍</div>
        <div class="loader-text">GEOTOPIA ULTRA</div>
        <div class="loader-bar">
            <div class="loader-fill"></div>
        </div>
    </div>

    <!-- Header -->
    <div class="header">
        <div class="logo">
            <span class="logo-icon">🌍</span>
            <span>GEOTOPIA</span>
        </div>
        <div class="stats">
            <div class="stat">
                <span>🪙</span>
                <span id="coins">500</span>
            </div>
            <div class="stat">
                <span>💎</span>
                <span id="gems">25</span>
            </div>
        </div>
    </div>

    <!-- Menu -->
    <div class="menu" id="menu">
        <div class="welcome">
            <div class="welcome-emoji">🦊</div>
            <h1>Ready for Adventure?</h1>
            <p>Choose your favorite game style!</p>
        </div>

        <h2 class="section-title">🎮 PREMIUM GAMES</h2>
        <div class="games-grid" id="gamesGrid"></div>
    </div>

    <!-- Game Screen -->
    <div class="game-screen" id="gameScreen">
        <div class="game-header">
            <button class="game-back" onclick="exitGame()">← Back</button>
            <div class="game-info">
                <div class="game-title" id="gameTitle">Game Title</div>
                <div class="game-level" id="gameLevel">Level 1</div>
            </div>
            <div class="game-stats">
                <div class="game-stat">⭐ <span id="gameScore">0</span></div>
            </div>
        </div>
        <div class="game-container" id="gameContainer"></div>
    </div>

    <!-- Result Modal -->
    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <div class="result-emoji" id="resultEmoji">🏆</div>
            <h1 class="result-title" id="resultTitle">AMAZING!</h1>
            <p class="result-subtitle" id="resultSubtitle">You're a geography star!</p>
            <div class="result-stars" id="resultStars">
                <span>⭐</span>
                <span>⭐</span>
                <span>⭐</span>
            </div>
            <div class="result-stats">
                <div class="result-stat">
                    <div class="value" id="resultScore">0</div>
                    <div class="label">Score</div>
                </div>
                <div class="result-stat">
                    <div class="value" id="resultBest">0</div>
                    <div class="label">Best</div>
                </div>
            </div>
            <div class="result-rewards" id="resultRewards"></div>
            <div class="result-buttons">
                <button class="result-btn primary" onclick="playAgain()">Play Again 🔄</button>
                <button class="result-btn secondary" onclick="backToMenu()">Menu 🏠</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <div class="toast-content">
            <span class="toast-icon" id="toastIcon">🎉</span>
            <span id="toastText">Great!</span>
        </div>
    </div>

    <!-- Confetti Container -->
    <div class="confetti-container" id="confettiContainer"></div>

    <script>
        // =====================================================
        //  🌍 GEOTOPIA ULTRA - COMPLETE GAME ENGINE
        // =====================================================

        // === DATA ===
        const COUNTRIES = [
            {n:"India",c:"New Delhi",f:"in"},{n:"China",c:"Beijing",f:"cn"},{n:"Japan",c:"Tokyo",f:"jp"},
            {n:"France",c:"Paris",f:"fr"},{n:"Germany",c:"Berlin",f:"de"},{n:"Italy",c:"Rome",f:"it"},
            {n:"Spain",c:"Madrid",f:"es"},{n:"Brazil",c:"Brasilia",f:"br"},{n:"Canada",c:"Ottawa",f:"ca"},
            {n:"Australia",c:"Canberra",f:"au"},{n:"UK",c:"London",f:"gb"},{n:"USA",c:"Washington",f:"us"},
            {n:"Russia",c:"Moscow",f:"ru"},{n:"S Korea",c:"Seoul",f:"kr"},{n:"Mexico",c:"Mexico City",f:"mx"},
            {n:"Egypt",c:"Cairo",f:"eg"},{n:"S Africa",c:"Pretoria",f:"za"},{n:"Argentina",c:"Buenos Aires",f:"ar"},
            {n:"Thailand",c:"Bangkok",f:"th"},{n:"Indonesia",c:"Jakarta",f:"id"},{n:"Malaysia",c:"Kuala Lumpur",f:"my"},
            {n:"Singapore",c:"Singapore",f:"sg"},{n:"Turkey",c:"Ankara",f:"tr"},{n:"Greece",c:"Athens",f:"gr"},
            {n:"Portugal",c:"Lisbon",f:"pt"},{n:"Netherlands",c:"Amsterdam",f:"nl"},{n:"Sweden",c:"Stockholm",f:"se"},
            {n:"Norway",c:"Oslo",f:"no"},{n:"Poland",c:"Warsaw",f:"pl"},{n:"Switzerland",c:"Bern",f:"ch"},
            {n:"Austria",c:"Vienna",f:"at"},{n:"Ireland",c:"Dublin",f:"ie"},{n:"New Zealand",c:"Wellington",f:"nz"},
            {n:"Philippines",c:"Manila",f:"ph"},{n:"Vietnam",c:"Hanoi",f:"vn"},{n:"Pakistan",c:"Islamabad",f:"pk"},
            {n:"Bangladesh",c:"Dhaka",f:"bd"},{n:"Chile",c:"Santiago",f:"cl"},{n:"Colombia",c:"Bogota",f:"co"},
            {n:"Peru",c:"Lima",f:"pe"},{n:"UAE",c:"Abu Dhabi",f:"ae"},{n:"Saudi Arabia",c:"Riyadh",f:"sa"}
        ];

        const flag = c => `https://flagcdn.com/w320/${c}.png`;
        const shuffle = a => { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; };
        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        // === STATE ===
        let STATE = {
            coins: parseInt(localStorage.getItem('geoCoins')) || 500,
            gems: parseInt(localStorage.getItem('geoGems')) || 25,
            currentGame: null,
            level: 1,
            score: 0,
            running: false,
            intervals: [],
            timeouts: [],
            gameData: {}
        };

        // === AUDIO ===
        const Audio = {
            ctx: null,
            init() { try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} },
            play(freq, dur, type='sine') {
                if (!this.ctx) return;
                try {
                    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
                    o.connect(g); g.connect(this.ctx.destination);
                    o.frequency.value = freq; o.type = type;
                    g.gain.setValueAtTime(0.12, this.ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
                    o.start(); o.stop(this.ctx.currentTime + dur);
                } catch(e) {}
            },
            click() { this.play(600, 0.05); },
            collect() { this.play(880, 0.08); setTimeout(() => this.play(1100, 0.08), 50); },
            correct() { [523, 659, 784].forEach((f,i) => setTimeout(() => this.play(f, 0.1), i*80)); },
            wrong() { this.play(200, 0.2, 'sawtooth'); },
            combo() { [800, 1000, 1200].forEach((f,i) => setTimeout(() => this.play(f, 0.08), i*50)); },
            win() { [523,587,659,698,784,880,988,1047].forEach((f,i) => setTimeout(() => this.play(f, 0.08), i*60)); }
        };

        // === INIT ===
        document.addEventListener('DOMContentLoaded', () => {
            Audio.init();
            updateUI();
            renderGames();
            setTimeout(() => document.getElementById('loader').classList.add('hide'), 2200);
        });

        document.addEventListener('click', () => {
            if (Audio.ctx?.state === 'suspended') Audio.ctx.resume();
        }, { once: true });

        // === UI ===
        function updateUI() {
            document.getElementById('coins').textContent = STATE.coins;
            document.getElementById('gems').textContent = STATE.gems;
        }

        function saveState() {
            localStorage.setItem('geoCoins', STATE.coins);
            localStorage.setItem('geoGems', STATE.gems);
        }

        // === GAMES LIST ===
        function renderGames() {
            const games = [
                { id: 'runner', name: 'Geo Runner', icon: '🏃', desc: 'Subway Surfer style', badge: 'hot', class: 'g1' },
                { id: 'ninja', name: 'Flag Slicer', icon: '🥷', desc: 'Fruit Ninja style', badge: 'new', class: 'g2' },
                { id: 'match', name: 'Flag Crush', icon: '🍬', desc: 'Candy Crush style', badge: '', class: 'g3' },
                { id: 'slingshot', name: 'Flag Shot', icon: '🎯', desc: 'Angry Birds style', badge: '', class: 'g4' },
                { id: 'flappy', name: 'Flappy Globe', icon: '🕊️', desc: 'Flappy Bird style', badge: 'new', class: 'g5' },
                { id: 'racing', name: 'World Racer', icon: '🏎️', desc: 'Racing style', badge: '', class: 'g6' }
            ];

            document.getElementById('gamesGrid').innerHTML = games.map(g => `
                <div class="game-card ${g.class}" onclick="startGame('${g.id}')">
                    ${g.badge ? `<span class="game-badge ${g.badge}">${g.badge.toUpperCase()}</span>` : ''}
                    <div class="game-icon">${g.icon}</div>
                    <div class="game-name">${g.name}</div>
                    <div class="game-desc">${g.desc}</div>
                </div>
            `).join('');
        }

        // === START GAME ===
        function startGame(id) {
            Audio.click();
            clearAllTimers();
            
            STATE.currentGame = id;
            STATE.level = 1;
            STATE.score = 0;
            STATE.running = true;
            STATE.gameData = {};

            document.getElementById('menu').classList.add('hide');
            document.getElementById('gameScreen').classList.add('active');
            document.getElementById('gameTitle').textContent = getGameName(id);
            document.getElementById('gameLevel').textContent = 'Level 1';
            document.getElementById('gameScore').textContent = '0';

            switch(id) {
                case 'runner': initRunner(); break;
                case 'ninja': initNinja(); break;
                case 'match': initMatch(); break;
                case 'slingshot': initSlingshot(); break;
                case 'flappy': initFlappy(); break;
                case 'racing': initRacing(); break;
            }
        }

        function getGameName(id) {
            const names = {
                runner: '🏃 Geo Runner',
                ninja: '🥷 Flag Slicer',
                match: '🍬 Flag Crush',
                slingshot: '🎯 Flag Shot',
                flappy: '🕊️ Flappy Globe',
                racing: '🏎️ World Racer'
            };
            return names[id] || 'Game';
        }

        function exitGame() {
            if (!confirm('Exit game? Progress will be lost!')) return;
            Audio.click();
            clearAllTimers();
            STATE.running = false;
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('menu').classList.remove('hide');
        }

        function clearAllTimers() {
            STATE.intervals.forEach(id => clearInterval(id));
            STATE.timeouts.forEach(id => clearTimeout(id));
            STATE.intervals = [];
            STATE.timeouts = [];
        }

        // =====================================================
        //  🏃 GEO RUNNER (SUBWAY SURFER STYLE)
        // =====================================================
        function initRunner() {
            const target = COUNTRIES[rand(0, COUNTRIES.length - 1)];
            STATE.gameData = {
                target: target,
                lane: 1, // 0=left, 1=center, 2=right
                jumping: false,
                sliding: false,
                speed: 5,
                distance: 0,
                collected: 0,
                targetCollected: 10
            };

            const container = document.getElementById('gameContainer');
            container.innerHTML = `
                <div class="runner-game">
                    <div class="runner-ground"></div>
                    <div class="runner-lanes">
                        <div class="lane"></div>
                        <div class="lane"></div>
                        <div class="lane"></div>
                    </div>
                    <div class="runner-player" id="runnerPlayer">
                        <div class="player-char">🏃</div>
                    </div>
                    <div class="runner-hud">
                        <div class="hud-score">Distance: <span id="runnerDist">0</span>m</div>
                        <div class="hud-target">
                            <div class="label">Collect flags of:</div>
                            <div class="value" id="runnerTarget">${target.n}</div>
                        </div>
                    </div>
                    <div class="runner-controls">
                        <button class="control-btn" onclick="runnerMove('left')">⬅️</button>
                        <button class="control-btn" onclick="runnerJump()">⬆️</button>
                        <button class="control-btn" onclick="runnerSlide()">⬇️</button>
                        <button class="control-btn" onclick="runnerMove('right')">➡️</button>
                    </div>
                </div>
            `;

            updateRunnerPosition();
            runnerGameLoop();
            spawnRunnerItems();
        }

        function updateRunnerPosition() {
            const player = document.getElementById('runnerPlayer');
            if (!player) return;
            
            const positions = ['20%', '50%', '80%'];
            player.style.left = positions[STATE.gameData.lane];
        }

        function runnerMove(dir) {
            if (!STATE.running || STATE.gameData.jumping || STATE.gameData.sliding) return;
            
            Audio.click();
            
            if (dir === 'left' && STATE.gameData.lane > 0) {
                STATE.gameData.lane--;
            } else if (dir === 'right' && STATE.gameData.lane < 2) {
                STATE.gameData.lane++;
            }
            
            updateRunnerPosition();
        }

        function runnerJump() {
            if (!STATE.running || STATE.gameData.jumping || STATE.gameData.sliding) return;
            
            Audio.click();
            STATE.gameData.jumping = true;
            
            const player = document.getElementById('runnerPlayer');
            if (player) {
                player.classList.add('jumping');
                setTimeout(() => {
                    player.classList.remove('jumping');
                    STATE.gameData.jumping = false;
                }, 500);
            }
        }

        function runnerSlide() {
            if (!STATE.running || STATE.gameData.jumping || STATE.gameData.sliding) return;
            
            Audio.click();
            STATE.gameData.sliding = true;
            
            const player = document.getElementById('runnerPlayer');
            if (player) {
                player.classList.add('sliding');
                setTimeout(() => {
                    player.classList.remove('sliding');
                    STATE.gameData.sliding = false;
                }, 600);
            }
        }

        function runnerGameLoop() {
            if (!STATE.running) return;
            
            const loop = setInterval(() => {
                if (!STATE.running) {
                    clearInterval(loop);
                    return;
                }
                
                STATE.gameData.distance += 1;
                STATE.gameData.speed = Math.min(8, 5 + STATE.gameData.distance / 200);
                
                const distEl = document.getElementById('runnerDist');
                if (distEl) distEl.textContent = STATE.gameData.distance;
            }, 100);
            
            STATE.intervals.push(loop);
        }

        function spawnRunnerItems() {
            if (!STATE.running) return;
            
            const container = document.querySelector('.runner-game');
            if (!container) return;

            // Random: coin, correct flag, or obstacle
            const type = Math.random();
            const lanes = [20, 50, 80];
            const lane = rand(0, 2);

            if (type < 0.3) {
                // Coin
                const coin = document.createElement('div');
                coin.className = 'collectible coin';
                coin.textContent = '🪙';
                coin.style.left = lanes[lane] + '%';
                coin.style.bottom = (170 + rand(0, 80)) + 'px';
                coin.onclick = () => collectRunnerItem(coin, 'coin', lane);
                container.appendChild(coin);
                
                moveRunnerItem(coin, lane, 'coin');
            } else if (type < 0.6) {
                // Flag (correct or wrong)
                const isCorrect = Math.random() > 0.4;
                const country = isCorrect ? STATE.gameData.target : COUNTRIES[rand(0, COUNTRIES.length - 1)];
                
                const flagEl = document.createElement('div');
                flagEl.className = 'collectible flag';
                flagEl.innerHTML = `<img src="${flag(country.f)}">`;
                flagEl.style.left = lanes[lane] + '%';
                flagEl.style.bottom = (170 + rand(0, 80)) + 'px';
                flagEl.dataset.correct = isCorrect;
                flagEl.dataset.country = country.n;
                flagEl.onclick = () => collectRunnerItem(flagEl, 'flag', lane);
                container.appendChild(flagEl);
                
                moveRunnerItem(flagEl, lane, 'flag');
            } else {
                // Obstacle
                const obstacles = ['🪨', '🌵', '🚧'];
                const obs = document.createElement('div');
                obs.className = 'obstacle';
                obs.textContent = obstacles[rand(0, obstacles.length - 1)];
                obs.style.left = lanes[lane] + '%';
                container.appendChild(obs);
                
                moveRunnerItem(obs, lane, 'obstacle');
            }

            const timeout = setTimeout(spawnRunnerItems, 800 + rand(0, 400));
            STATE.timeouts.push(timeout);
        }

        function moveRunnerItem(item, lane, type) {
            let pos = window.innerHeight;
            
            const move = setInterval(() => {
                if (!STATE.running || !item.parentElement) {
                    clearInterval(move);
                    item.remove();
                    return;
                }
                
                pos -= STATE.gameData.speed * 2;
                item.style.top = pos + 'px';
                
                // Check collision with player
                if (pos > window.innerHeight * 0.5 && pos < window.innerHeight * 0.65) {
                    if (lane === STATE.gameData.lane) {
                        if (type === 'obstacle' && !STATE.gameData.jumping && !STATE.gameData.sliding) {
                            // Hit obstacle!
                            runnerGameOver();
                            clearInterval(move);
                        }
                    }
                }
                
                if (pos < -100) {
                    clearInterval(move);
                    item.remove();
                }
            }, 20);

        function setupNinjaSwipe() {
            const game = document.getElementById('ninjaGame');
            if (!game) return;

            let isDrawing = false;
            let lastX = 0;
            let lastY = 0;

            const createTrail = (x1, y1, x2, y2) => {
                const trail = document.createElement('div');
                trail.className = 'slice-trail';
                const length = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
                const angle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;
                trail.style.width = length + 'px';
                trail.style.left = x1 + 'px';
                trail.style.top = y1 + 'px';
                trail.style.transform = `rotate(${angle}deg)`;
                game.appendChild(trail);
                setTimeout(() => trail.remove(), 300);
            };

            const handleMove = (x, y) => {
                if (isDrawing) {
                    createTrail(lastX, lastY, x, y);
                }
                lastX = x;
                lastY = y;
            };

            game.addEventListener('mousedown', (e) => { isDrawing = true; lastX = e.clientX; lastY = e.clientY; });
            game.addEventListener('mousemove', (e) => { if (isDrawing) handleMove(e.clientX, e.clientY); });
            game.addEventListener('mouseup', () => { isDrawing = false; });
            
            game.addEventListener('touchstart', (e) => { 
                isDrawing = true; 
                lastX = e.touches[0].clientX; 
                lastY = e.touches[0].clientY; 
            });
            game.addEventListener('touchmove', (e) => { 
                if (isDrawing) handleMove(e.touches[0].clientX, e.touches[0].clientY); 
            });
            game.addEventListener('touchend', () => { isDrawing = false; });
        }

        function spawnNinjaFlags() {
            if (!STATE.running) return;

            // Spawn 4-6 flags

            const countries = shuffle([...COUNTRIES]).slice(0, numFlags);

            // Include target
            if (!countries.find(c => c.f === STATE.gameData.target.f)) {
                countries[rand(0, countries.length - 1)] = STATE.gameData.target;
            }

            shuffle(countries).forEach((country, i) => {

                flagEl.className = 'ninja-flag';
                flagEl.innerHTML = `<img src="${flag(country.f)}">`;
                flagEl.dataset.code = country.f;

                flagEl.style.left = (5 + i * 16) + '%';

                flagEl.onclick = () => sliceNinjaFlag(flagEl, country);

                        flagEl.style.top = '110%';
                        setTimeout(() => flagEl.remove(), 1000);

        function renderMatchGrid() {
            const grid = document.getElementById('matchGrid');
            if (!grid) return;

            grid.innerHTML = STATE.gameData.grid.map((country, i) => `
                <div class="match-tile" id="tile${i}" onclick="selectMatchTile(${i})">

        function selectMatchTile(idx) {
            if (!STATE.running) return;

            const tile = document.getElementById(`tile${idx}`);
            if (!tile) return;

            if (STATE.gameData.selected === null) {
                // First selection
                tile.classList.add('selected');
                STATE.gameData.selected = idx;
            } else if (STATE.gameData.selected === idx) {
                // Deselect
                tile.classList.remove('selected');
                STATE.gameData.selected = null;
            } else {
                // Second selection - check if adjacent
                const first = STATE.gameData.selected;
                const gridSize = STATE.gameData.gridSize;
                
                const row1 = Math.floor(first / gridSize);
                const col1 = first % gridSize;
                const row2 = Math.floor(idx / gridSize);
                const col2 = idx % gridSize;
                
                const isAdjacent = (Math.abs(row1 - row2) === 1 && col1 === col2) ||
                                  (Math.abs(col1 - col2) === 1 && row1 === row2);

                if (isAdjacent) {
                    Audio.click();
                    swapMatchTiles(first, idx);
                } else {
                    showToast('Select adjacent tiles!', '❌', 'error');
                }

                document.getElementById(`tile${first}`).classList.remove('selected');
                STATE.gameData.selected = null;
            }
        }

        function swapMatchTiles(idx1, idx2) {
            // Swap in grid
            [STATE.gameData.grid[idx1], STATE.gameData.grid[idx2]] = 
            [STATE.gameData.grid[idx2], STATE.gameData.grid[idx1]];

            renderMatchGrid();
            
            STATE.gameData.moves--;
            document.getElementById('matchMoves').textContent = STATE.gameData.moves;

            // Check for matches
            setTimeout(() => {
                const matches = findMatches();
                if (matches.length > 0) {
                    Audio.correct();
                    processMatches(matches);
                } else {
                    // Swap back if no matches
                    [STATE.gameData.grid[idx1], STATE.gameData.grid[idx2]] = 
                    [STATE.gameData.grid[idx2], STATE.gameData.grid[idx1]];
                    renderMatchGrid();
                }

                if (STATE.gameData.moves <= 0) {
                    matchGameOver();
                } else if (STATE.score >= STATE.gameData.targetScore) {
                    matchWin();
                }
            }, 100);
        }

        function findMatches() {
            const matches = new Set();
            const gridSize = STATE.gameData.gridSize;
            const grid = STATE.gameData.grid;

            // Check horizontal
            for (let row = 0; row < gridSize; row++) {
                for (let col = 0; col < gridSize - 2; col++) {
                    const idx = row * gridSize + col;
                    if (grid[idx].f === grid[idx+1].f && grid[idx].f === grid[idx+2].f) {
                        matches.add(idx);
                        matches.add(idx+1);
                        matches.add(idx+2);
                    }
                }
            }

            // Check vertical
            for (let col = 0; col < gridSize; col++) {
                for (let row = 0; row < gridSize - 2; row++) {
                    const idx = row * gridSize + col;
                    if (grid[idx].f === grid[idx+gridSize].f && grid[idx].f === grid[idx+gridSize*2].f) {
                        matches.add(idx);
                        matches.add(idx+gridSize);
                        matches.add(idx+gridSize*2);
                    }
                }
            }

            return Array.from(matches);
        }

        function processMatches(matches) {
            matches.forEach(idx => {
                const tile = document.getElementById(`tile${idx}`);
                if (tile) tile.classList.add('matched');
            });

            const points = matches.length * 20;
            STATE.score += points;
            document.getElementById('gameScore').textContent = STATE.score;

            setTimeout(() => {
                // Replace matched tiles
                matches.forEach(idx => {
                    STATE.gameData.grid[idx] = STATE.gameData.flagTypes[rand(0, STATE.gameData.flagTypes.length - 1)];
                });
                renderMatchGrid();

                // Check for cascade matches
                const newMatches = findMatches();
                if (newMatches.length > 0) {
                    processMatches(newMatches);
                }
            }, 400);
        }

        function flappyGameLoop() {
            if (!STATE.running) return;

            const loop = setInterval(() => {
                if (!STATE.running) {

                }

                STATE.gameData.velocity += STATE.gameData.gravity;

        function spawnPipes() {
            if (!STATE.running) return;

            const game = document.getElementById('flappyGame');
            if (!game) return;

            const gapSize = 200;
            const gapTop = rand(100, window.innerHeight - gapSize - 100);

            // Top pipe
            const topPipe = document.createElement('div');
            topPipe.className = 'pipe top';
            topPipe.style.height = gapTop + 'px';
            topPipe.style.right = '0px';
            game.appendChild(topPipe);

            // Bottom pipe
            const bottomPipe = document.createElement('div');
            bottomPipe.className = 'pipe bottom';
            bottomPipe.style.height = (window.innerHeight - gapTop - gapSize) + 'px';
            bottomPipe.style.right = '0px';
            game.appendChild(bottomPipe);

            // Random flag
            const country = Math.random() > 0.5 ? STATE.gameData.target : COUNTRIES[rand(0, COUNTRIES.length - 1)];
            const flagEl = document.createElement('div');
            flagEl.className = 'pipe-flag';
            flagEl.innerHTML = `<img src="${flag(country.f)}">`;
            flagEl.dataset.code = country.f;
            flagEl.dataset.name = country.n;
            
            if (Math.random() > 0.5) {
                topPipe.appendChild(flagEl);
            } else {
                bottomPipe.appendChild(flagEl);
            }

            let pipeX = window.innerWidth;
            const movePipe = setInterval(() => {
                if (!STATE.running) {
                    clearInterval(movePipe);
                    topPipe.remove();
                    bottomPipe.remove();
                    return;
                }

                pipeX -= 3;
                topPipe.style.right = (window.innerWidth - pipeX) + 'px';
                bottomPipe.style.right = (window.innerWidth - pipeX) + 'px';

                // Check if bird passes through gap
                if (pipeX < window.innerWidth * 0.25 && pipeX > window.innerWidth * 0.25 - 10) {
                    if (STATE.gameData.birdY > gapTop && STATE.gameData.birdY < gapTop + gapSize) {
                        // Passed through!
                        if (country.f === STATE.gameData.target.f) {
                            Audio.correct();
                            STATE.score += 20;
                            STATE.gameData.collected++;
                            document.getElementById('gameScore').textContent = STATE.score;
                            document.getElementById('flappyScore').textContent = STATE.score;
                            showToast(`Collected ${country.n}!`, '🎉', 'success');

                            if (STATE.gameData.collected >= STATE.gameData.targetCollected) {
                                flappyWin();
                            }
                        }
                    } else {
                        // Hit pipe!
                        flappyGameOver();
                    }
                }

                if (pipeX < -100) {
                    clearInterval(movePipe);
                    topPipe.remove();
                    bottomPipe.remove();
                }
            }, 20);

            STATE.intervals.push(movePipe);

            const timeout = setTimeout(spawnPipes, 2500);
            STATE.timeouts.push(timeout);
        }

            if (!game) return;

            const lanes = ['30%', '50%', '70%'];
            const lane = rand(0, 2);

            // Flag or obstacle
            if (Math.random() > 0.3) {
                // Flag
                const country = Math.random() > 0.5 ? STATE.gameData.target : COUNTRIES[rand(0, COUNTRIES.length - 1)];
                const flag = document.createElement('div');
                flag.className = 'track-item flag-gate';
                flag.innerHTML = `<img src="${flag(country.f)}">`;
                flag.dataset.code = country.f;
                flag.dataset.name = country.n;
                flag.style.left = lanes[lane];
                flag.style.top = '0%';
                game.appendChild(flag);

                moveRacingItem(flag, lane);
            } else {
                // Obstacle
                const obs = document.createElement('div');
                obs.className = 'track-item';
                obs.textContent = '🚧';
                obs.style.left = lanes[lane];
                obs.style.top = '0%';
                game.appendChild(obs);

                moveRacingItem(obs, lane);
            }

            const timeout = setTimeout(spawnRacingItems, 1000);
            STATE.timeouts.push(timeout);
        }

        function moveRacingItem(item, lane) {
            let pos = 0;

            const move = setInterval(() => {
                if (!STATE.running || !item.parentElement) {
                    clearInterval(move);
                    item.remove();
                    return;
                }

                pos += 2;
                item.style.top = pos + '%';

                // Check collision
                if (pos > 60 && pos < 75) {
                    if (lane === STATE.gameData.lane) {
                        if (item.classList.contains('flag-gate')) {
                            const country = item.dataset.name;
                            if (item.dataset.code === STATE.gameData.target.f) {
                                Audio.correct();
                                STATE.score += 20;
                                STATE.gameData.collected++;
                                document.getElementById('gameScore').textContent = STATE.score;
                                showToast(`Collected ${country}!`, '🏁', 'success');

                                if (STATE.gameData.collected >= STATE.gameData.targetCollected) {
                                    racingWin();
                                }
                            } else {
                                Audio.wrong();
                                showToast(`Wrong! That's ${country}`, '❌', 'error');
                            }
                        } else {
                            // Hit obstacle
                            racingGameOver();
                        }
                        item.remove();
                        clearInterval(move);
                    }
                }

                if (pos > 100) {
                    clearInterval(move);
                    item.remove();
                }
            }, 20);

            STATE.intervals.push(move);
        }

        function racingWin() {
            STATE.running = false;
            clearAllTimers();
            showResults(STATE.score, 3, 55, 5);
        }

        function racingGameOver() {
            STATE.running = false;
            clearAllTimers();
            const stars = STATE.gameData.collected >= 6 ? 2 : STATE.gameData.collected >= 3 ? 1 : 0;
            showResults(STATE.score, stars, 35, 3);
        }

        // =====================================================
        //  RESULTS & UI
        // =====================================================
        function showResults(score, stars, coins, gems) {
            Audio.win();
            confetti();

            STATE.coins += coins;
            STATE.gems += gems;
            saveState();
            updateUI();

            const emojis = ['💪', '🌟', '🏆'];
            const titles = ['Good Try!', 'Great Job!', 'AMAZING!'];
            const subtitles = ['Keep practicing!', "You're getting better!", "You're a star!"];

            document.getElementById('resultEmoji').textContent = emojis[Math.min(stars, 2)];
            document.getElementById('resultTitle').textContent = titles[Math.min(stars, 2)];
            document.getElementById('resultSubtitle').textContent = subtitles[Math.min(stars, 2)];
            document.getElementById('resultScore').textContent = score;
            document.getElementById('resultBest').textContent = score; // TODO: Track best score

            const starsEl = document.getElementById('resultStars');
            starsEl.innerHTML = [0, 1, 2].map(i => 
                `<span class="${i < stars ? 'filled' : ''}" style="animation-delay: ${i * 0.2}s">⭐</span>`
            ).join('');

            document.getElementById('resultRewards').innerHTML = `
                <div class="reward-badge">🪙 +${coins}</div>
                ${gems > 0 ? `<div class="reward-badge">💎 +${gems}</div>` : ''}
            `;

            document.getElementById('resultModal').classList.add('show');
        }

        function playAgain() {
            Audio.click();
            document.getElementById('resultModal').classList.remove('show');
            startGame(STATE.currentGame);
        }

        function backToMenu() {
            Audio.click();
            document.getElementById('resultModal').classList.remove('show');
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('menu').classList.remove('hide');
        }

        function showToast(text, icon, type) {
            const toast = document.getElementById('toast');
            toast.className = `toast show ${type}`;
            document.getElementById('toastIcon').textContent = icon;
            document.getElementById('toastText').textContent = text;

            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function confetti() {
            const container = document.getElementById('confettiContainer');
            container.innerHTML = '';

            const colors = ['#FFD700', '#FF6B6B', '#4ECDC4', '#A8E6CF', '#C471F5'];
            const emojis = ['🎉', '🎊', '⭐', '🌟', '✨', '🏆'];

            for (let i = 0; i < 60; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';

                if (Math.random() > 0.5) {
                    c.textContent = emojis[rand(0, emojis.length - 1)];
                    c.style.fontSize = rand(15, 25) + 'px';
                } else {
                    c.style.width = rand(8, 12) + 'px';
                    c.style.height = c.style.width;
                    c.style.background = colors[rand(0, colors.length - 1)];
                    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                }

                c.style.left = rand(0, 100) + '%';
                c.style.animationDuration = rand(2, 4) + 's';
                c.style.animationDelay = Math.random() * 0.5 + 's';

                container.appendChild(c);
            }

            setTimeout(() => container.innerHTML = '', 4500);
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!STATE.running) return;

            switch(STATE.currentGame) {
                case 'runner':
                    if (e.key === 'ArrowLeft') runnerMove('left');
                    else if (e.key === 'ArrowRight') runnerMove('right');
                    else if (e.key === 'ArrowUp' || e.key === ' ') { e.preventDefault(); runnerJump(); }
                    else if (e.key === 'ArrowDown') { e.preventDefault(); runnerSlide(); }
                    break;
                case 'flappy':
                    if (e.key === ' ') { e.preventDefault(); flap(); }
                    break;
                case 'racing':
                    if (e.key === 'ArrowLeft') racingMove('left');
                    else if (e.key === 'ArrowRight') racingMove('right');
                    break;
            }
        });

        console.log('🌍 GEOTOPIA ULTRA - Premium Games Ready!');
        console.log('6 Different Game Styles - All Working!');
    </script>
</body>
</html>
