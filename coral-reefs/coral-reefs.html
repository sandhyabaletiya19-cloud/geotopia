<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coral Reefs Explorer | Geography Learning App</title>
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Main Styles -->
    <link rel="stylesheet" href="coral-reefs-styles.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪸</text></svg>">
</head>
<body>
    <!-- Animated Background -->
    <div class="ocean-background">
        <div class="water-layer water-layer-1"></div>
        <div class="water-layer water-layer-2"></div>
        <div class="water-layer water-layer-3"></div>
        
        <!-- Light Rays -->
        <div class="light-rays">
            <div class="light-ray ray-1"></div>
            <div class="light-ray ray-2"></div>
            <div class="light-ray ray-3"></div>
            <div class="light-ray ray-4"></div>
            <div class="light-ray ray-5"></div>
        </div>
        
        <!-- Floating Particles -->
        <div class="particles-container" id="particles"></div>
        
        <!-- Bubbles -->
        <div class="bubbles-container" id="bubbles"></div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <!-- Back Button -->
                <a href="index.html" class="back-button" aria-label="Go back">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </a>
                
                <!-- Title Section -->
                <div class="title-section">
                    <div class="title-wrapper">
                        <span class="title-icon">🪸</span>
                        <h1 class="main-title">Coral Reefs Explorer</h1>
                        <div class="wave-decoration">
                            <svg viewBox="0 0 120 20" class="wave-svg">
                                <path d="M0,10 Q15,0 30,10 T60,10 T90,10 T120,10" fill="none" stroke="currentColor" stroke-width="2"/>
                            </svg>
                        </div>
                    </div>
                    <p class="subtitle">Discover the world's underwater treasures</p>
                </div>
                
                <!-- Stats Section -->
                <div class="header-stats">
                    <div class="stat-item">
                        <div class="stat-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 6v6l4 2"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-number" id="total-reefs">50</span>
                            <span class="stat-label">Coral Reefs</span>
                        </div>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <div class="stat-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                                <circle cx="12" cy="10" r="3"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-number" id="total-countries">35+</span>
                            <span class="stat-label">Countries</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Search & Filter Bar -->
        <section class="search-filter-section">
            <div class="search-filter-container">
                
                <!-- Search Input -->
                <div class="search-wrapper">
                    <div class="search-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="M21 21l-4.35-4.35"/>
                        </svg>
                    </div>
                    <input 
                        type="text" 
                        class="search-input" 
                        id="search-input"
                        placeholder="Search coral reefs, countries, or oceans..."
                        autocomplete="off"
                    >
                    <button class="search-clear" id="search-clear" aria-label="Clear search">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 6L6 18M6 6l12 12"/>
                        </svg>
                    </button>
                </div>

                <!-- Filter Buttons -->
                <div class="filter-buttons-wrapper">
                    <div class="filter-buttons" id="filter-buttons">
                        <button class="filter-btn active" data-filter="all">
                            <span class="filter-icon">🌊</span>
                            <span class="filter-text">All Reefs</span>
                        </button>
                        <button class="filter-btn" data-filter="barrier">
                            <span class="filter-icon">🏝️</span>
                            <span class="filter-text">Barrier Reefs</span>
                        </button>
                        <button class="filter-btn" data-filter="fringing">
                            <span class="filter-icon">🪸</span>
                            <span class="filter-text">Fringing Reefs</span>
                        </button>
                        <button class="filter-btn" data-filter="atoll">
                            <span class="filter-icon">⭕</span>
                            <span class="filter-text">Atolls</span>
                        </button>
                        <button class="filter-btn" data-filter="largest">
                            <span class="filter-icon">📏</span>
                            <span class="filter-text">Largest</span>
                        </button>
                        <button class="filter-btn" data-filter="biodiverse">
                            <span class="filter-icon">🐠</span>
                            <span class="filter-text">Most Biodiverse</span>
                        </button>
                    </div>
                    
                    <!-- Scroll Indicators -->
                    <button class="scroll-btn scroll-left" id="scroll-left" aria-label="Scroll left">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                    </button>
                    <button class="scroll-btn scroll-right" id="scroll-right" aria-label="Scroll right">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 18l6-6-6-6"/>
                        </svg>
                    </button>
                </div>

                <!-- Ocean Dropdown -->
                <div class="ocean-dropdown-wrapper">
                    <div class="dropdown-container" id="ocean-dropdown">
                        <button class="dropdown-trigger" id="dropdown-trigger">
                            <span class="dropdown-icon">🌏</span>
                            <span class="dropdown-text">All Oceans</span>
                            <svg class="dropdown-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M6 9l6 6 6-6"/>
                            </svg>
                        </button>
                        <div class="dropdown-menu" id="dropdown-menu">
                            <button class="dropdown-item active" data-ocean="all">
                                <span class="item-icon">🌏</span>
                                <span>All Oceans</span>
                            </button>
                            <button class="dropdown-item" data-ocean="pacific">
                                <span class="item-icon">🌊</span>
                                <span>Pacific Ocean</span>
                            </button>
                            <button class="dropdown-item" data-ocean="atlantic">
                                <span class="item-icon">🌊</span>
                                <span>Atlantic Ocean</span>
                            </button>
                            <button class="dropdown-item" data-ocean="indian">
                                <span class="item-icon">🌊</span>
                                <span>Indian Ocean</span>
                            </button>
                            <button class="dropdown-item" data-ocean="caribbean">
                                <span class="item-icon">🏝️</span>
                                <span>Caribbean Sea</span>
                            </button>
                            <button class="dropdown-item" data-ocean="red-sea">
                                <span class="item-icon">🔴</span>
                                <span>Red Sea</span>
                            </button>
                            <button class="dropdown-item" data-ocean="coral-sea">
                                <span class="item-icon">🪸</span>
                                <span>Coral Sea</span>
                            </button>
                            <button class="dropdown-item" data-ocean="south-china">
                                <span class="item-icon">🌏</span>
                                <span>South China Sea</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Active Filters Display -->
            <div class="active-filters" id="active-filters">
                <!-- Dynamically populated -->
            </div>

            <!-- Results Count -->
            <div class="results-info">
                <span class="results-count" id="results-count">Showing 50 reefs</span>
                <button class="sort-btn" id="sort-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M6 12h12M9 18h6"/>
                    </svg>
                    <span>Sort by Size</span>
                </button>
            </div>
        </section>

        <!-- Reefs Grid -->
        <section class="reefs-section">
            <div class="reefs-grid" id="reefs-grid">
                <!-- Reef cards will be dynamically inserted here -->
            </div>
            
            <!-- Loading State -->
            <div class="loading-state" id="loading-state">
                <div class="loading-spinner">
                    <div class="spinner-ring"></div>
                    <div class="spinner-ring"></div>
                    <div class="spinner-ring"></div>
                </div>
                <p class="loading-text">Exploring the depths...</p>
            </div>
            
            <!-- Empty State -->
            <div class="empty-state" id="empty-state" style="display: none;">
                <div class="empty-icon">🔍</div>
                <h3 class="empty-title">No reefs found</h3>
                <p class="empty-text">Try adjusting your search or filters</p>
                <button class="reset-btn" id="reset-filters">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                    </svg>
                    Reset Filters
                </button>
            </div>
        </section>

        <!-- Quick Navigation -->
        <nav class="quick-nav" id="quick-nav">
            <button class="quick-nav-btn" data-section="top" aria-label="Scroll to top">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 15l-6-6-6 6"/>
                </svg>
            </button>
            <div class="quick-nav-divider"></div>
            <button class="quick-nav-btn" data-action="random" aria-label="Random reef">
                <span>🎲</span>
            </button>
        </nav>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <div class="footer-info">
                    <span class="footer-icon">🪸</span>
                    <span class="footer-text">Coral Reefs Explorer</span>
                </div>
                <div class="footer-links">
                    <a href="#" class="footer-link">About</a>
                    <a href="#" class="footer-link">Conservation</a>
                    <a href="#" class="footer-link">Sources</a>
                </div>
                <p class="footer-copyright">
                    Part of the Geography Learning App
                </p>
            </div>
        </footer>
    </div>

    <!-- Reef Card Template -->
    <template id="reef-card-template">
        <article class="reef-card" data-reef-id="">
            <div class="card-rank">
                <span class="rank-number">#1</span>
            </div>
            
            <div class="card-image-container">
                <div class="card-image-wrapper">
                    <img class="card-image" src="" alt="" loading="lazy">
                    <div class="card-image-overlay"></div>
                </div>
                <div class="card-glow"></div>
            </div>
            
            <div class="card-content">
                <h3 class="card-title"></h3>
                
                <div class="card-flags"></div>
                
                <div class="card-meta">
                    <span class="card-size">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 3H3v18h18V3zM9 9h6v6H9V9z"/>
                        </svg>
                        <span class="size-value"></span>
                    </span>
                    <span class="card-type-badge"></span>
                </div>
                
                <div class="card-health">
                    <div class="health-indicator"></div>
                    <span class="health-text"></span>
                </div>
            </div>
            
            <div class="card-hover-info">
                <p class="hover-ocean"></p>
                <p class="hover-species">
                    <span class="species-icon">🐠</span>
                    <span class="species-count"></span> fish species
                </p>
            </div>
        </article>
    </template>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Data Files -->
    <script src="coral-reefs-data-1.js"></script>
    <script src="coral-reefs-data-2.js"></script>
    <script src="coral-reefs-data-3.js"></script>
    <script src="coral-reefs-data-4.js"></script>
    <script src="coral-reefs-data-5.js"></script>
    <script src="coral-reefs-data.js"></script>
    
    <!-- Main App -->
    <script src="coral-reefs-app.js"></script>
</body>
</html>
