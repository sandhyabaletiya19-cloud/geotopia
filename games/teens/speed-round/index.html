<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0f">
    <title>Speed Round | GEOTOPIA Teens</title>
    <link rel="stylesheet" href="../styles/teens.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="game-page">
    <!-- Game Header -->
    <header class="game-header">
        <button class="back-btn" onclick="exitGame()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </button>
        <h1 class="game-title">SPEED ROUND</h1>
        <div class="game-stats-bar">
            <div class="game-stat timer">
                <span>⏱️</span>
                <span id="timer">60</span>
            </div>
            <div class="game-stat score">
                <span>⭐</span>
                <span id="score">0</span>
            </div>
        </div>
    </header>

    <!-- Game Container -->
    <main class="game-container">
        <!-- Intro Screen -->
        <section class="intro-screen" id="intro-screen">
            <div class="intro-icon">⚡</div>
            <h2 class="intro-title">SPEED ROUND</h2>
            <p class="intro-description">
                60 seconds of pure geography chaos! Answer as many questions as you can.
                Mixed questions: Flags, Capitals, and Countries. No time to think!
            </p>
            <div class="intro-buttons">
                <button class="btn-primary" onclick="startGame()">START GAME</button>
                <button class="btn-secondary" onclick="showHowToPlay()">How to Play</button>
            </div>
        </section>

        <!-- Countdown Screen -->
        <section class="countdown-screen" id="countdown-screen" style="display: none;">
            <div class="countdown-number" id="countdown-number">3</div>
        </section>

        <!-- Question Screen -->
        <section class="question-area speed-mode" id="question-screen" style="display: none;">
            <!-- Big timer bar at top -->
            <div class="speed-timer-bar">
                <div class="speed-timer-fill" id="speed-timer-bar"></div>
            </div>
            
            <!-- Question counter -->
            <div class="question-counter">
                Question <span id="question-number">1</span>
            </div>
            
            <!-- Question display -->
            <div class="speed-question" id="question-display">
                <span class="question-emoji" id="question-emoji">🚩</span>
                <span class="question-content" id="question-content"></span>
            </div>
            
            <!-- Options -->
            <div class="speed-options" id="options-grid">
                <!-- Generated by JS -->
            </div>
            
            <!-- Skip button -->
            <button class="skip-btn" id="skip-btn" onclick="skipQuestion()">
                SKIP →
            </button>
        </section>

        <!-- Results Screen -->
        <section class="results-screen" id="results-screen" style="display: none;">
            <div class="results-icon" id="results-icon">⚡</div>
            <h2 class="results-title">TIME'S UP!</h2>
            
            <div class="results-score">
                <span id="final-score">0</span>
            </div>
            
            <div class="new-high-score" id="new-high-score" style="display: none;">
                ✨ NEW HIGH SCORE! ✨
            </div>
            
            <div class="results-stats">
                <div class="result-stat">
                    <span class="result-stat-value" id="questions-answered">0</span>
                    <span class="result-stat-label">Answered</span>
                </div>
                <div class="result-stat">
                    <span class="result-stat-value" id="correct-count">0</span>
                    <span class="result-stat-label">Correct</span>
                </div>
                <div class="result-stat">
                    <span class="result-stat-value" id="accuracy-stat">0%</span>
                    <span class="result-stat-label">Accuracy</span>
                </div>
            </div>
            
            <div class="coins-earned" id="coins-earned">
                <span>+</span>
                <span id="coins-amount">0</span>
                <span>🪙</span>
            </div>
            
            <div class="results-buttons">
                <button class="btn-primary" onclick="restartGame()">PLAY AGAIN</button>
                <button class="btn-secondary" onclick="exitGame()">EXIT</button>
            </div>
        </section>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="toast-icon"></span>
        <span class="toast-message"></span>
    </div>

    <!-- Scripts -->
    <script src="../data/countries.js"></script>
    <script src="../shared/utils.js"></script>
    <script src="../shared/sounds.js"></script>
    <script src="game.js"></script>

    <style>
        /* Speed Round specific styles */
        .countdown-screen {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .countdown-number {
            font-family: var(--font-display);
            font-size: 15rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: countdownPulse 1s ease infinite;
        }
        
        @keyframes countdownPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .speed-mode {
            max-width: 700px;
        }
        
        .speed-timer-bar {
            position: fixed;
            top: 70px;
            left: 0;
            width: 100%;
            height: 8px;
            background: var(--bg-tertiary);
            z-index: 50;
        }
        
        .speed-timer-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--red), var(--yellow), var(--green));
            width: 100%;
            transition: width 0.1s linear;
        }
        
        .question-counter {
            font-family: var(--font-display);
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: var(--spacing-md);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .speed-question {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: var(--spacing-xl);
        }
        
        .question-emoji {
            font-size: 5rem;
            margin-bottom: var(--spacing-md);
            animation: questionPop 0.3s ease;
        }
        
        @keyframes questionPop {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        
        .question-content {
            font-size: 1.3rem;
            text-align: center;
            color: var(--text-secondary);
        }
        
        .speed-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-md);
            width: 100%;
            margin-bottom: var(--spacing-lg);
        }
        
        .speed-options .option-btn {
            padding: var(--spacing-lg) var(--spacing-md);
            font-size: 1.1rem;
        }
        
        .skip-btn {
            padding: var(--spacing-sm) var(--spacing-xl);
            background: transparent;
            border: 1px solid var(--text-muted);
            border-radius: var(--radius-md);
            color: var(--text-muted);
            font-family: var(--font-display);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .skip-btn:hover {
            border-color: var(--cyan);
            color: var(--cyan);
        }
        
        @media (max-width: 768px) {
            .speed-options {
                grid-template-columns: 1fr;
            }
            
            .question-emoji {
                font-size: 4rem;
            }
            
            .countdown-number {
                font-size: 10rem;
            }
        }
    </style>
</body>
</html>
