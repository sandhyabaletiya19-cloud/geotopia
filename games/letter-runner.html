/* ==== FILE: letter-runner.html ==== */
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Letter Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            touch-action: none;
        }
        
        #gameCanvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        #wordDisplay {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        #collectedLetters {
            position: absolute;
            top: 60px;
            left: 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            max-width: 300px;
        }
        
        .letter-tile {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            animation: popIn 0.3s ease;
        }
        
        @keyframes popIn {
            0% { transform: scale(0); }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        #wordFormed {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 64px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.8), 0 4px 8px rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
        }
        
        #wordFormed.show {
            animation: wordPop 1.5s ease forwards;
        }
        
        @keyframes wordPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
            40% { transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -100%) scale(1); }
        }
        
        #gameOver {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }
        
        #gameOver.show {
            display: flex;
        }
        
        #gameOver h1 {
            font-size: 64px;
            color: #ff4757;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        
        #gameOver .final-score {
            font-size: 32px;
            color: #fff;
            margin-bottom: 10px;
        }
        
        #gameOver .words-formed {
            font-size: 24px;
            color: #ffd700;
            margin-bottom: 40px;
        }
        
        #restartBtn {
            padding: 20px 60px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(102,126,234,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            pointer-events: auto;
        }
        
        #restartBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(102,126,234,0.5);
        }
        
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }
        
        #startScreen h1 {
            font-size: 56px;
            color: #fff;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }
        
        #startScreen .subtitle {
            font-size: 20px;
            color: #aaa;
            margin-bottom: 40px;
        }
        
        #startScreen .dino-preview {
            font-size: 100px;
            margin-bottom: 40px;
            animation: bounce 1s ease infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        #startBtn {
            padding: 20px 80px;
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(17,153,142,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            pointer-events: auto;
        }
        
        #startBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(17,153,142,0.5);
        }
        
        .controls-hint {
            margin-top: 40px;
            font-size: 16px;
            color: #888;
            text-align: center;
        }
        
        #combo {
            position: absolute;
            top: 120px;
            right: 20px;
            font-size: 20px;
            color: #38ef7d;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="score">Score: 0</div>
        <div id="combo"></div>
        <div id="wordDisplay">Letters:</div>
        <div id="collectedLetters"></div>
        <div id="wordFormed"></div>
        
        <div id="startScreen">
            <h1>🦖 LETTER RUNNER</h1>
            <p class="subtitle">Collect letters, form words, run forever!</p>
            <div class="dino-preview">🦖</div>
            <button id="startBtn">START GAME</button>
            <div class="controls-hint">
                ⬅️ ➡️ Move &nbsp;|&nbsp; ⬆️ Jump &nbsp;|&nbsp; ⬇️ Slide<br>
                <small>Swipe on mobile</small>
            </div>
        </div>
        
        <div id="gameOver">
            <h1>GAME OVER</h1>
            <div class="final-score">Score: <span id="finalScore">0</span></div>
            <div class="words-formed">Words Formed: <span id="wordsCount">0</span></div>
            <button id="restartBtn">PLAY AGAIN</button>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        const WORDS = [
            'CAT', 'DOG', 'RUN', 'FUN', 'SUN', 'HAT', 'BAT', 'RAT', 'MAP', 'CAP',
            'TOP', 'HOP', 'POP', 'CUP', 'CUT', 'BUT', 'NUT', 'HUT', 'JOG', 'LOG',
            'FOG', 'BOX', 'FOX', 'MIX', 'SIX', 'FIX', 'WAX', 'TAX', 'MAX', 'JAM',
            'HAM', 'RAM', 'DAM', 'VAN', 'TAN', 'PAN', 'FAN', 'MAN', 'CAN', 'BAN',
            'RED', 'BED', 'LED', 'PEN', 'TEN', 'HEN', 'MEN', 'DEN', 'WET', 'SET',
            'PET', 'NET', 'GET', 'LET', 'BET', 'JET', 'MET', 'YET', 'BIG', 'DIG',
            'FIG', 'JIG', 'PIG', 'RIG', 'WIG', 'ZIP', 'TIP', 'SIP', 'HIP', 'DIP',
            'RIP', 'LIP', 'BIT', 'FIT', 'HIT', 'KIT', 'SIT', 'WIT', 'WIN', 'PIN',
            'TIN', 'BIN', 'SIN', 'FIN', 'DIN', 'GOT', 'HOT', 'NOT', 'POT', 'ROT',
            'COT', 'DOT', 'LOT', 'BUS', 'GUM', 'SUM', 'MUM', 'HUM', 'TUB', 'RUB',
            'SUB', 'PUB', 'DUB', 'HUB', 'BUD', 'MUD', 'CUD', 'BUG', 'HUG', 'JUG',
            'MUG', 'RUG', 'TUG', 'DUG', 'BUN', 'GUN', 'NUN', 'PUN', 'RUN', 'ACE',
            'GAME', 'PLAY', 'JUMP', 'FAST', 'STAR', 'WORD', 'COIN', 'GOLD', 'HERO',
            'FIRE', 'WIND', 'RAIN', 'SNOW', 'TREE', 'BIRD', 'FISH', 'FROG', 'DUCK',
            'BEAR', 'LION', 'WOLF', 'DEER', 'GOAT', 'LAMB', 'PORK', 'BEEF', 'FOOD',
            'CAKE', 'RICE', 'MILK', 'SALT', 'FISH', 'MEAT', 'CORN', 'BEAN', 'PLUM',
            'DINO', 'ROAR', 'WILD', 'FREE', 'COOL', 'NICE', 'GOOD', 'BEST', 'MEGA',
            'SUPER', 'HYPER', 'ULTRA', 'POWER', 'SPEED', 'QUICK', 'SWIFT', 'BLAST',
            'FLASH', 'STORM', 'NIGHT', 'LIGHT', 'MAGIC', 'SPELL', 'QUEST', 'BONUS'
        ];
        
        const LANE_COUNT = 3;
        const LANE_WIDTH = 120;
        const ROAD_WIDTH = LANE_WIDTH * LANE_COUNT;
        
        class Player {
            constructor() {
                this.lane = 1;
                this.targetLane = 1;
                this.x = 0;
                this.y = 0;
                this.z = 100;
                this.width = 60;
                this.height = 80;
                this.isJumping = false;
                this.isSliding = false;
                this.jumpVelocity = 0;
                this.jumpHeight = 0;
                this.slideTimer = 0;
                this.runFrame = 0;
                this.runTimer = 0;
                this.laneChangeSpeed = 0.15;
            }
            
            update(dt, speed) {
                this.lane += (this.targetLane - this.lane) * this.laneChangeSpeed;
                
                if (this.isJumping) {
                    this.jumpHeight += this.jumpVelocity;
                    this.jumpVelocity -= 0.8;
                    if (this.jumpHeight <= 0) {
                        this.jumpHeight = 0;
                        this.isJumping = false;
                    }
                }
                
                if (this.isSliding) {
                    this.slideTimer -= dt;
                    if (this.slideTimer <= 0) {
                        this.isSliding = false;
                    }
                }
                
                this.runTimer += dt * speed * 0.01;
                if (this.runTimer > 0.1) {
                    this.runTimer = 0;
                    this.runFrame = (this.runFrame + 1) % 4;
                }
            }
            
            jump() {
                if (!this.isJumping && !this.isSliding) {
                    this.isJumping = true;
                    this.jumpVelocity = 18;
                }
            }
            
            slide() {
                if (!this.isJumping && !this.isSliding) {
                    this.isSliding = true;
                    this.slideTimer = 600;
                }
            }
            
            moveLeft() {
                if (this.targetLane > 0) {
                    this.targetLane--;
                }
            }
            
            moveRight() {
                if (this.targetLane < LANE_COUNT - 1) {
                    this.targetLane++;
                }
            }
            
            draw(ctx, roadX, roadY, perspective) {
                const laneX = roadX + (this.lane - 1) * LANE_WIDTH * perspective + LANE_WIDTH * perspective / 2;
                const baseY = roadY - 20;
                const scale = perspective * 1.2;
                const w = this.width * scale;
                const h = this.height * scale;
                const jumpOffset = this.jumpHeight * scale;
                
                ctx.save();
                ctx.translate(laneX, baseY - jumpOffset);
                
                if (this.isSliding) {
                    ctx.rotate(-Math.PI / 6);
                    ctx.scale(1, 0.5);
                }
                
                ctx.shadowColor = 'rgba(0,0,0,0.4)';
                ctx.shadowBlur = 15;
                ctx.shadowOffsetY = 10 + jumpOffset * 0.5;
                
                const bodyColor = '#2ed573';
                const bellyColor = '#7bed9f';
                const spotColor = '#1e8449';
                
                ctx.fillStyle = bodyColor;
                ctx.beginPath();
                ctx.ellipse(0, -h * 0.4, w * 0.35, h * 0.35, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = bellyColor;
                ctx.beginPath();
                ctx.ellipse(w * 0.08, -h * 0.35, w * 0.2, h * 0.25, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = bodyColor;
                ctx.beginPath();
                ctx.ellipse(-w * 0.15, -h * 0.7, w * 0.28, h * 0.22, -0.2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.ellipse(-w * 0.05, -h * 0.75, w * 0.12, w * 0.12, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.ellipse(-w * 0.02, -h * 0.74, w * 0.06, w * 0.06, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(-w * 0.01, -h * 0.76, w * 0.02, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = bodyColor;
                ctx.beginPath();
                ctx.moveTo(-w * 0.35, -h * 0.65);
                ctx.quadraticCurveTo(-w * 0.5, -h * 0.7, -w * 0.45, -h * 0.55);
                ctx.quadraticCurveTo(-w * 0.4, -h * 0.5, -w * 0.3, -h * 0.55);
                ctx.fill();
                
                const legOffset1 = Math.sin(this.runFrame * Math.PI / 2) * 10;
                const legOffset2 = Math.sin((this.runFrame + 2) * Math.PI / 2) * 10;
                
                ctx.fillStyle = bodyColor;
                ctx.beginPath();
                ctx.ellipse(-w * 0.1, -h * 0.1 + legOffset1, w * 0.12, h * 0.12, 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(w * 0.15, -h * 0.1 + legOffset2, w * 0.12, h * 0.12, -0.3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = bodyColor;
                ctx.beginPath();
                ctx.ellipse(-w * 0.25, -h * 0.45, w * 0.08, h * 0.06, -0.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(w * 0.1, -h * 0.5 + Math.sin(this.runFrame) * 3, w * 0.06, h * 0.05, 0.5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = bodyColor;
                ctx.beginPath();
                ctx.moveTo(w * 0.3, -h * 0.35);
                ctx.quadraticCurveTo(w * 0.5, -h * 0.4, w * 0.45, -h * 0.3);
                ctx.quadraticCurveTo(w * 0.4, -h * 0.25, w * 0.25, -h * 0.3);
                ctx.fill();
                
                ctx.fillStyle = spotColor;
                ctx.beginPath();
                ctx.arc(-w * 0.05, -h * 0.5, w * 0.05, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(w * 0.15, -h * 0.45, w * 0.04, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(w * 0.0, -h * 0.35, w * 0.03, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
            
            getHitbox(roadX, roadY, perspective) {
                const laneX = roadX + (this.lane - 1) * LANE_WIDTH * perspective + LANE_WIDTH * perspective / 2;
                const baseY = roadY - 20;
                const scale = perspective * 1.2;
                const w = this.width * scale * 0.6;
                const h = this.isSliding ? this.height * scale * 0.3 : this.height * scale * 0.7;
                const jumpOffset = this.jumpHeight * scale;
                
                return {
                    x: laneX - w / 2,
                    y: baseY - h - jumpOffset,
                    width: w,
                    height: h
                };
            }
        }
        
        class Obstacle {
            constructor(lane, type) {
                this.lane = lane;
                this.z = 1000;
                this.type = type;
                this.width = type === 'barrier' ? 100 : 80;
                this.height = type === 'barrier' ? 60 : type === 'low' ? 30 : 80;
            }
            
            update(speed) {
                this.z -= speed;
            }
            
            draw(ctx, roadX, roadY, roadWidth) {
                if (this.z < 50 || this.z > 800) return;
                
                const perspective = 800 / (800 + this.z);
                const x = roadX + (this.lane - 1) * LANE_WIDTH * perspective + LANE_WIDTH * perspective / 2;
                const y = roadY - this.z * 0.15;
                const scale = perspective;
                const w = this.width * scale;
                const h = this.height * scale;
                
                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetY = 5;
                
                if (this.type === 'barrier') {
                    const gradient = ctx.createLinearGradient(x - w/2, y - h, x + w/2, y);
                    gradient.addColorStop(0, '#ff6b6b');
                    gradient.addColorStop(0.5, '#ee5a5a');
                    gradient.addColorStop(1, '#c44');
                    ctx.fillStyle = gradient;
                    
                    ctx.beginPath();
                    ctx.roundRect(x - w/2, y - h, w, h, 5 * scale);
                    ctx.fill();
                    
                    ctx.fillStyle = '#fff';
                    const stripeW = w / 6;
                    for (let i = 0; i < 3; i++) {
                        ctx.fillRect(x - w/2 + stripeW + i * stripeW * 2, y - h, stripeW, h);
                    }
                } else if (this.type === 'low') {
                    const gradient = ctx.createLinearGradient(x - w/2, y - h, x + w/2, y);
                    gradient.addColorStop(0, '#ffa502');
                    gradient.addColorStop(1, '#ff7f00');
                    ctx.fillStyle = gradient;
                    
                    ctx.beginPath();
                    ctx.roundRect(x - w/2, y - h, w, h, 3 * scale);
                    ctx.fill();
                    
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.fillRect(x - w/2, y - h/2, w, h/2);
                } else {
                    const gradient = ctx.createLinearGradient(x, y - h, x, y);
                    gradient.addColorStop(0, '#a55');
                    gradient.addColorStop(0.5, '#855');
                    gradient.addColorStop(1, '#644');
                    ctx.fillStyle = gradient;
                    
                    ctx.beginPath();
                    ctx.moveTo(x, y - h);
                    ctx.lineTo(x + w/2, y - h * 0.3);
                    ctx.lineTo(x + w/3, y);
                    ctx.lineTo(x - w/3, y);
                    ctx.lineTo(x - w/2, y - h * 0.3);
                    ctx.closePath();
                    ctx.fill();
                    
                    ctx.fillStyle = '#966';
                    ctx.beginPath();
                    ctx.arc(x - w * 0.15, y - h * 0.5, w * 0.08, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }
            
            getHitbox(roadX, roadY) {
                if (this.z < 50 || this.z > 200) return null;
                
                const perspective = 800 / (800 + this.z);
                const x = roadX + (this.lane - 1) * LANE_WIDTH * perspective + LANE_WIDTH * perspective / 2;
                const y = roadY - this.z * 0.15;
                const scale = perspective;
                const w = this.width * scale * 0.7;
                const h = this.height * scale * 0.8;
                
                return {
                    x: x - w / 2,
                    y: y - h,
                    width: w,
                    height: h,
                    type: this.type
                };
            }
        }
        
        class Letter {
            constructor(lane, letter) {
                this.lane = lane;
                this.z = 1000;
                this.letter = letter;
                this.collected = false;
                this.rotation = 0;
                this.bobOffset = Math.random() * Math.PI * 2;
            }
            
            update(speed, time) {
                this.z -= speed;
                this.rotation += 0.03;
            }
            
            draw(ctx, roadX, roadY, time) {
                if (this.z < 50 || this.z > 800 || this.collected) return;
                
                const perspective = 800 / (800 + this.z);
                const x = roadX + (this.lane - 1) * LANE_WIDTH * perspective + LANE_WIDTH * perspective / 2;
                const bob = Math.sin(time * 0.005 + this.bobOffset) * 8;
                const y = roadY - this.z * 0.15 - 40 * perspective + bob;
                const scale = perspective;
                const size = 50 * scale;
                
                ctx.save();
                ctx.translate(x, y);
                
                ctx.shadowColor = 'rgba(102, 126, 234, 0.6)';
                ctx.shadowBlur = 20;
                
                const gradient = ctx.createLinearGradient(-size/2, -size/2, size/2, size/2);
                gradient.addColorStop(0, '#667eea');
                gradient.addColorStop(1, '#764ba2');
                ctx.fillStyle = gradient;
                
                ctx.beginPath();
                ctx.roundRect(-size/2, -size/2, size, size, 8 * scale);
                ctx.fill();
                
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.roundRect(-size/2 + 3, -size/2 + 3, size - 6, size/3, 5 * scale);
                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.font = `bold ${size * 0.65}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.letter, 0, 2);
                
                ctx.restore();
            }
            
            getHitbox(roadX, roadY) {
                if (this.z < 80 || this.z > 150 || this.collected) return null;
                
                const perspective = 800 / (800 + this.z);
                const x = roadX + (this.lane - 1) * LANE_WIDTH * perspective + LANE_WIDTH * perspective / 2;
                const y = roadY - this.z * 0.15 - 40 * perspective;
                const size = 50 * perspective;
                
                return {
                    x: x - size / 2,
                    y: y - size / 2,
                    width: size,
                    height: size
                };
            }
        }
        
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10 - 5;
                this.life = 1;
                this.color = color;
                this.size = Math.random() * 8 + 4;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.3;
                this.life -= 0.02;
            }
            
            draw(ctx) {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        class Game {
            constructor() {
                this.player = new Player();
                this.obstacles = [];
                this.letters = [];
                this.particles = [];
                this.collectedLetters = [];
                this.score = 0;
                this.wordsFormed = 0;
                this.speed = 5;
                this.baseSpeed = 5;
                this.maxSpeed = 15;
                this.gameTime = 0;
                this.isRunning = false;
                this.isGameOver = false;
                this.lastObstacleZ = 500;
                this.lastLetterZ = 300;
                this.roadOffset = 0;
                this.dayNightCycle = 0;
                
                this.setupControls();
            }
            
            setupControls() {
                document.addEventListener('keydown', (e) => {
                    if (!this.isRunning || this.isGameOver) return;
                    switch(e.key) {
                        case 'ArrowLeft': this.player.moveLeft(); break;
                        case 'ArrowRight': this.player.moveRight(); break;
                        case 'ArrowUp': this.player.jump(); break;
                        case 'ArrowDown': this.player.slide(); break;
                    }
                });
                
                let touchStartX = 0;
                let touchStartY = 0;
                
                canvas.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                });
                
                canvas.addEventListener('touchend', (e) => {
                    if (!this.isRunning || this.isGameOver) return;
                    
                    const touchEndX = e.changedTouches[0].clientX;
                    const touchEndY = e.changedTouches[0].clientY;
                    const dx = touchEndX - touchStartX;
                    const dy = touchEndY - touchStartY;
                    
                    if (Math.abs(dx) > Math.abs(dy)) {
                        if (dx > 30) this.player.moveRight();
                        else if (dx < -30) this.player.moveLeft();
                    } else {
                        if (dy < -30) this.player.jump();
                        else if (dy > 30) this.player.slide();
                    }
                });
                
                document.getElementById('startBtn').addEventListener('click', () => this.start());
                document.getElementById('restartBtn').addEventListener('click', () => this.restart());
            }
            
            start() {
                document.getElementById('startScreen').style.display = 'none';
                this.isRunning = true;
                this.gameLoop();
            }
            
            restart() {
                this.player = new Player();
                this.obstacles = [];
                this.letters = [];
                this.particles = [];
                this.collectedLetters = [];
                this.score = 0;
                this.wordsFormed = 0;
                this.speed = this.baseSpeed;
                this.gameTime = 0;
                this.isGameOver = false;
                this.lastObstacleZ = 500;
                this.lastLetterZ = 300;
                
                document.getElementById('gameOver').classList.remove('show');
                document.getElementById('collectedLetters').innerHTML = '';
                this.updateUI();
                this.isRunning = true;
                this.gameLoop();
            }
            
            spawnObstacle() {
                if (this.lastObstacleZ > 300) {
                    this.lastObstacleZ = 800 + Math.random() * 200;
                    const lane = Math.floor(Math.random() * LANE_COUNT);
                    const types = ['barrier', 'low', 'rock'];
                    const type = types[Math.floor(Math.random() * types.length)];
                    this.obstacles.push(new Obstacle(lane, type));
                }
            }
            
            spawnLetter() {
                if (this.lastLetterZ > 200) {
                    this.lastLetterZ = 600 + Math.random() * 300;
                    const lane = Math.floor(Math.random() * LANE_COUNT);
                    const letter = String.fromCharCode(65 + Math.floor(Math.random() * 26));
                    this.letters.push(new Letter(lane, letter));
                }
            }
            
            checkWordFormation() {
                const collected = this.collectedLetters.join('');
                
                for (const word of WORDS) {
                    if (collected.endsWith(word)) {
                        this.formWord(word);
                        return;
                    }
                }
                
                if (this.collectedLetters.length > 8) {
                    this.collectedLetters.shift();
                    this.updateLetterDisplay();
                }
            }
            
            formWord(word) {
                const wordEl = document.getElementById('wordFormed');
                wordEl.textContent = word + '!';
                wordEl.classList.remove('show');
                void wordEl.offsetWidth;
                wordEl.classList.add('show');
                
                const points = word.length * 100;
                this.score += points;
                this.wordsFormed++;
                
                for (let i = 0; i < word.length; i++) {
                    this.collectedLetters.pop();
                }
                this.updateLetterDisplay();
                
                for (let i = 0; i < 20; i++) {
                    this.particles.push(new Particle(
                        width / 2 + (Math.random() - 0.5) * 200,
                        height / 2,
                        ['#ffd700', '#ff6b6b', '#4ecdc4', '#667eea'][Math.floor(Math.random() * 4)]
                    ));
                }
            }
            
            updateLetterDisplay() {
                const container = document.getElementById('collectedLetters');
                container.innerHTML = '';
                this.collectedLetters.forEach((letter, i) => {
                    const tile = document.createElement('div');
                    tile.className = 'letter-tile';
                    tile.textContent = letter;
                    tile.style.animationDelay = `${i * 0.05}s`;
                    container.appendChild(tile);
                });
            }
            
            checkCollisions() {
                const roadX = width / 2 - ROAD_WIDTH / 2;
                const roadY = height * 0.85;
                const perspective = 800 / (800 + 100);
                
                const playerHitbox = this.player.getHitbox(roadX, roadY, perspective);
                
                for (const obstacle of this.obstacles) {
                    const obsHitbox = obstacle.getHitbox(roadX, roadY);
                    if (!obsHitbox) continue;
                    
                    if (this.boxCollision(playerHitbox, obsHitbox)) {
                        if (obsHitbox.type === 'low' && this.player.isSliding) continue;
                        if (obsHitbox.type !== 'low' && this.player.jumpHeight > 40) continue;
                        
                        this.gameOver();
                        return;
                    }
                }
                
                for (const letter of this.letters) {
                    if (letter.collected) continue;
                    const letterHitbox = letter.getHitbox(roadX, roadY);
                    if (!letterHitbox) continue;
                    
                    if (this.boxCollision(playerHitbox, letterHitbox)) {
                        letter.collected = true;
                        this.collectedLetters.push(letter.letter);
                        this.score += 10;
                        this.updateLetterDisplay();
                        this.checkWordFormation();
                        
                        for (let i = 0; i < 10; i++) {
                            this.particles.push(new Particle(
                                letterHitbox.x + letterHitbox.width / 2,
                                letterHitbox.y + letterHitbox.height / 2,
                                ['#667eea', '#764ba2'][Math.floor(Math.random() * 2)]
                            ));
                        }
                    }
                }
            }
            
            boxCollision(a, b) {
                return a.x < b.x + b.width &&
                       a.x + a.width > b.x &&
                       a.y < b.y + b.height &&
                       a.y + a.height > b.y;
            }
            
            gameOver() {
                this.isGameOver = true;
                this.isRunning = false;
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('wordsCount').textContent = this.wordsFormed;
                document.getElementById('gameOver').classList.add('show');
            }
            
            updateUI() {
                document.getElementById('score').textContent = `Score: ${this.score}`;
            }
            
            update(dt) {
                this.gameTime += dt;
                this.dayNightCycle += dt * 0.0001;
                
                this.speed = Math.min(this.maxSpeed, this.baseSpeed + this.gameTime * 0.0005);
                
                this.roadOffset = (this.roadOffset + this.speed * 2) % 50;
                
                this.player.update(dt, this.speed);
                
                for (const obs of this.obstacles) {
                    obs.update(this.speed);
                    this.lastObstacleZ = Math.min(this.lastObstacleZ, obs.z);
                }
                
                for (const letter of this.letters) {
                    letter.update(this.speed, this.gameTime);
                    this.lastLetterZ = Math.min(this.lastLetterZ, letter.z);
                }
                
                this.obstacles = this.obstacles.filter(o => o.z > 0);
                this.letters = this.letters.filter(l => l.z > 0 && !l.collected);
                
                for (const p of this.particles) {
                    p.update();
                }
                this.particles = this.particles.filter(p => p.life > 0);
                
                this.spawnObstacle();
                this.spawnLetter();
                
                this.checkCollisions();
                
                this.score += Math.floor(this.speed * 0.1);
                this.updateUI();
            }
            
            draw() {
                const dayProgress = (Math.sin(this.dayNightCycle) + 1) / 2;
                
                const skyTop = this.lerpColor([25, 25, 112], [135, 206, 235], dayProgress);
                const skyBottom = this.lerpColor([75, 0, 130], [255, 200, 150], dayProgress);
                
                const gradient = ctx.createLinearGradient(0, 0, 0, height);
                gradient.addColorStop(0, `rgb(${skyTop.join(',')})`);
                gradient.addColorStop(1, `rgb(${skyBottom.join(',')})`);
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, width, height);
                
                if (dayProgress > 0.3) {
                    ctx.fillStyle = '#fff7aa';
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 50;
                    ctx.beginPath();
                    ctx.arc(width * 0.8, height * 0.15, 40, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
                
                this.drawMountains(dayProgress);
                this.drawRoad();
                
                const sortedObjects = [...this.obstacles, ...this.letters].sort((a, b) => b.z - a.z);
                
                const roadX = width / 2 - ROAD_WIDTH / 2;
                const roadY = height * 0.85;
                
                for (const obj of sortedObjects) {
                    if (obj instanceof Obstacle) {
                        obj.draw(ctx, roadX, roadY, ROAD_WIDTH);
                    } else {
                        obj.draw(ctx, roadX, roadY, this.gameTime);
                    }
                }
                
                const perspective = 800 / (800 + 100);
                this.player.draw(ctx, roadX, roadY, perspective);
                
                for (const p of this.particles) {
                    p.draw(ctx);
                }
            }
            
            drawMountains(dayProgress) {
                const baseColor = this.lerpColor([60, 60, 80], [100, 140, 100], dayProgress);
                
                for (let layer = 0; layer < 3; layer++) {
                    const layerColor = baseColor.map(c => c - layer * 20);
                    ctx.fillStyle = `rgb(${layerColor.map(c => Math.max(0, c)).join(',')})`;
                    
                    ctx.beginPath();
                    ctx.moveTo(0, height * 0.5);
                    
                    for (let x = 0; x <= width; x += 50) {
                        const y = height * 0.5 - 
                                  Math.sin(x * 0.01 + layer) * 50 - 
                                  Math.sin(x * 0.02 + layer * 2) * 30 -
                                  layer * 30;
                        ctx.lineTo(x, y);
                    }
                    
                    ctx.lineTo(width, height * 0.6);
                    ctx.lineTo(0, height * 0.6);
                    ctx.closePath();
                    ctx.fill();
                }
            }
            
            drawRoad() {
                const roadY = height * 0.85;
                const vanishY = height * 0.4;
                const roadTopWidth = 60;
                
                ctx.fillStyle = '#3a3a5a';
                ctx.beginPath();
                ctx.moveTo(width / 2 - ROAD_WIDTH / 2, roadY);
                ctx.lineTo(width / 2 + ROAD_WIDTH / 2, roadY);
                ctx.lineTo(width / 2 + roadTopWidth / 2, vanishY);
                ctx.lineTo(width / 2 - roadTopWidth / 2, vanishY);
                ctx.closePath();
                ctx.fill();
                
                ctx.strokeStyle = '#666';
                ctx.lineWidth = 2;
                for (let i = 0; i <= LANE_COUNT; i++) {
                    const bottomX = width / 2 - ROAD_WIDTH / 2 + i * LANE_WIDTH;
                    const topX = width / 2 - roadTopWidth / 2 + i * (roadTopWidth / LANE_COUNT);
                    ctx.beginPath();
                    ctx.moveTo(bottomX, roadY);
                    ctx.lineTo(topX, vanishY);
                    ctx.stroke();
                }
                
                ctx.fillStyle = '#fffa';
                for (let z = this.roadOffset; z < 800; z += 50) {
                    const perspective = 800 / (800 + z);
                    const y = roadY - (roadY - vanishY) * (1 - perspective);
                    const dashWidth = 40 * perspective;
                    const dashHeight = 15 * perspective;
                    
                    for (let lane = 0; lane < LANE_COUNT; lane++) {
                        const laneWidth = ROAD_WIDTH * perspective;
                        const x = width / 2 - laneWidth / 2 + lane * (laneWidth / LANE_COUNT) + laneWidth / LANE_COUNT / 2;
                        
                        ctx.globalAlpha = perspective;
                        ctx.fillRect(x - dashWidth / 2, y - dashHeight, dashWidth, dashHeight);
                    }
                }
                ctx.globalAlpha = 1;
            }
            
            lerpColor(c1, c2, t) {
                return c1.map((c, i) => Math.round(c + (c2[i] - c) * t));
            }
            
            gameLoop() {
                if (!this.isRunning) return;
                
                const dt = 16.67;
                this.update(dt);
                this.draw();
                
                requestAnimationFrame(() => this.gameLoop());
            }
        }
        
        const game = new Game();
    </script>
</body>
