<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEO-GLADIATOR: TACTICAL SHOOTER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            cursor: crosshair;
        }

        #gameCanvas {
            display: block;
        }

        /* HUD Overlay */
        .hud {
            position: fixed;
            pointer-events: none;
            z-index: 100;
        }

        /* Health Bar */
        .health-bar {
            position: fixed;
            bottom: 30px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .health-icon {
            font-size: 2rem;
            filter: drop-shadow(0 0 10px #ff0000);
        }

        .health-container {
            width: 250px;
            height: 25px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #ff3333;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255,0,0,0.3);
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff4444, #ff6666);
            transition: width 0.3s;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.3);
        }

        .health-text {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #ff0000;
        }

        /* Ammo Display */
        .ammo-display {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0,0,0,0.7);
            padding: 15px 25px;
            border-radius: 10px;
            border: 2px solid #00f3ff;
            box-shadow: 0 0 20px rgba(0,243,255,0.3);
        }

        .ammo-icon {
            font-size: 2rem;
        }

        .ammo-count {
            font-size: 2rem;
            font-weight: bold;
            color: #00f3ff;
            text-shadow: 0 0 10px #00f3ff;
        }

        .ammo-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Weapon Selector */
        .weapon-selector {
            position: fixed;
            bottom: 100px;
            right: 30px;
            display: flex;
            gap: 10px;
        }

        .weapon-slot {
            width: 70px;
            height: 70px;
            background: rgba(0,0,0,0.7);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .weapon-slot.active {
            border-color: #00f3ff;
            box-shadow: 0 0 20px rgba(0,243,255,0.5);
            transform: scale(1.1);
        }

        .weapon-slot .icon {
            font-size: 1.8rem;
        }

        .weapon-slot .key {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            margin-top: 5px;
        }

        /* Score & Wave */
        .top-hud {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .score-box, .wave-box, .kills-box {
            background: rgba(0,0,0,0.7);
            padding: 10px 25px;
            border-radius: 10px;
            border: 2px solid;
            text-align: center;
        }

        .score-box {
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255,215,0,0.3);
        }

        .wave-box {
            border-color: #ff006e;
            box-shadow: 0 0 15px rgba(255,0,110,0.3);
        }

        .kills-box {
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0,255,136,0.3);
        }

        .stat-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
        }

        .score-box .stat-value { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
        .wave-box .stat-value { color: #ff006e; text-shadow: 0 0 10px #ff006e; }
        .kills-box .stat-value { color: #00ff88; text-shadow: 0 0 10px #00ff88; }

        /* Minimap */
        .minimap {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 180px;
            height: 180px;
            background: rgba(0,0,0,0.8);
            border: 2px solid rgba(0,243,255,0.5);
            border-radius: 10px;
            overflow: hidden;
        }

        .minimap canvas {
            width: 100%;
            height: 100%;
        }

        /* Crosshair */
        .crosshair {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
        }

        /* Wave Announcement */
        .wave-announce {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: 900;
            color: #ff006e;
            text-shadow: 0 0 50px #ff006e, 0 0 100px #ff006e;
            letter-spacing: 10px;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .wave-announce.show {
            opacity: 1;
            animation: waveFlash 0.5s ease-out;
        }

        @keyframes waveFlash {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* Damage Overlay */
        .damage-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle, transparent 50%, rgba(255,0,0,0.5));
            opacity: 0;
            transition: opacity 0.1s;
        }

        .damage-overlay.show {
            opacity: 1;
        }

        /* Game Over */
        .game-over {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s;
        }

        .game-over.show {
            opacity: 1;
            visibility: visible;
        }

        .game-over h1 {
            font-size: 5rem;
            font-weight: 900;
            color: #ff0000;
            text-shadow: 0 0 50px #ff0000;
            margin-bottom: 20px;
        }

        .game-over .stats {
            display: flex;
            gap: 50px;
            margin: 30px 0;
        }

        .game-over .stat-item {
            text-align: center;
        }

        .game-over .stat-item .value {
            font-size: 3rem;
            font-weight: bold;
            color: #00f3ff;
        }

        .game-over .stat-item .label {
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .restart-btn {
            margin-top: 30px;
            padding: 20px 60px;
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00f3ff, #0080ff);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s;
            pointer-events: auto;
        }

        .restart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0,243,255,0.5);
        }

        /* Start Screen */
        .start-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0a0e1a, #1a1a3e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .start-screen.hidden {
            display: none;
        }

        .start-screen h1 {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00f3ff, #ff006e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 5px;
        }

        .start-screen .subtitle {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 50px;
            letter-spacing: 5px;
        }

        .controls-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 50px;
            background: rgba(0,0,0,0.3);
            padding: 30px 50px;
            border-radius: 20px;
            border: 1px solid rgba(0,243,255,0.2);
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-key {
            background: rgba(0,243,255,0.2);
            border: 2px solid #00f3ff;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            color: #00f3ff;
            min-width: 60px;
            text-align: center;
        }

        .control-desc {
            color: rgba(255,255,255,0.8);
        }

        .start-btn {
            padding: 25px 80px;
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ff006e, #ff4444);
            border: none;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: all 0.3s;
            animation: pulse 2s infinite;
        }

        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(255,0,110,0.5);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255,0,110,0.5); }
            50% { box-shadow: 0 0 40px rgba(255,0,110,0.8); }
        }

        /* Reload indicator */
        .reload-indicator {
            position: fixed;
            bottom: 80px;
            right: 100px;
            color: #ff6600;
            font-size: 1.2rem;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .reload-indicator.show {
            opacity: 1;
            animation: reloadBlink 0.5s infinite;
        }

        @keyframes reloadBlink {
            50% { opacity: 0.5; }
        }

        /* Kill Feed */
        .kill-feed {
            position: fixed;
            top: 100px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .kill-item {
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 0.9rem;
            border-left: 3px solid #00ff88;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Power-up notification */
        .powerup-notify {
            position: fixed;
            top: 200px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(0,255,136,0.9), rgba(0,200,100,0.9));
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            opacity: 0;
            transition: all 0.3s;
        }

        .powerup-notify.show {
            opacity: 1;
            animation: popUp 0.5s ease-out;
        }

        @keyframes popUp {
            0% { transform: translateX(-50%) scale(0.5); }
            50% { transform: translateX(-50%) scale(1.2); }
            100% { transform: translateX(-50%) scale(1); }
        }
    </style>
</head>
<body>
    <!-- Start Screen -->
    <div class="start-screen" id="startScreen">
        <h1>GEO-GLADIATOR</h1>
        <p class="subtitle">TACTICAL SHOOTER</p>
        
        <div class="controls-info">
            <div class="control-item">
                <span class="control-key">W A S D</span>
                <span class="control-desc">Move</span>
            </div>
            <div class="control-item">
                <span class="control-key">MOUSE</span>
                <span class="control-desc">Aim</span>
            </div>
            <div class="control-item">
                <span class="control-key">LEFT CLICK</span>
                <span class="control-desc">Shoot</span>
            </div>
            <div class="control-item">
                <span class="control-key">R</span>
                <span class="control-desc">Reload</span>
            </div>
            <div class="control-item">
                <span class="control-key">1 2 3</span>
                <span class="control-desc">Switch Weapon</span>
            </div>
            <div class="control-item">
                <span class="control-key">SHIFT</span>
                <span class="control-desc">Sprint</span>
            </div>
        </div>
        
        <button class="start-btn" onclick="Game.start()">START GAME</button>
    </div>

    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- HUD Elements -->
    <div class="hud">
        <!-- Top Stats -->
        <div class="top-hud">
            <div class="score-box">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="wave-box">
                <div class="stat-label">Wave</div>
                <div class="stat-value" id="wave">1</div>
            </div>
            <div class="kills-box">
                <div class="stat-label">Kills</div>
                <div class="stat-value" id="kills">0</div>
            </div>
        </div>

        <!-- Health Bar -->
        <div class="health-bar">
            <span class="health-icon">❤️</span>
            <div class="health-container">
                <div class="health-fill" id="healthFill"></div>
            </div>
            <span class="health-text" id="healthText">100</span>
        </div>

        <!-- Weapon Selector -->
        <div class="weapon-selector">
            <div class="weapon-slot active" id="weapon1">
                <span class="icon">🔫</span>
                <span class="key">1</span>
            </div>
            <div class="weapon-slot" id="weapon2">
                <span class="icon">💥</span>
                <span class="key">2</span>
            </div>
            <div class="weapon-slot" id="weapon3">
                <span class="icon">🎯</span>
                <span class="key">3</span>
            </div>
        </div>

        <!-- Ammo Display -->
        <div class="ammo-display">
            <div>
                <div class="ammo-label">Ammo</div>
                <div class="ammo-count"><span id="ammo">30</span> / <span id="maxAmmo">30</span></div>
            </div>
        </div>

        <!-- Minimap -->
        <div class="minimap">
            <canvas id="minimap"></canvas>
        </div>

        <!-- Kill Feed -->
        <div class="kill-feed" id="killFeed"></div>

        <!-- Reload Indicator -->
        <div class="reload-indicator" id="reloadIndicator">⟳ RELOADING...</div>

        <!-- Power-up Notification -->
        <div class="powerup-notify" id="powerupNotify"></div>
    </div>

    <!-- Wave Announcement -->
    <div class="wave-announce" id="waveAnnounce">WAVE 1</div>

    <!-- Damage Overlay -->
    <div class="damage-overlay" id="damageOverlay"></div>

    <!-- Game Over Screen -->
    <div class="game-over" id="gameOver">
        <h1>GAME OVER</h1>
        <div class="stats">
            <div class="stat-item">
                <div class="value" id="finalScore">0</div>
                <div class="label">Score</div>
            </div>
            <div class="stat-item">
                <div class="value" id="finalWave">1</div>
                <div class="label">Wave Reached</div>
            </div>
            <div class="stat-item">
                <div class="value" id="finalKills">0</div>
                <div class="label">Total Kills</div>
            </div>
        </div>
        <button class="restart-btn" onclick="Game.restart()">PLAY AGAIN</button>
    </div>

    <script>
// ═══════════════════════════════════════════════════════════════════════════════
// GEO-GLADIATOR: TACTICAL SHOOTER - COMPLETE GAME ENGINE
// ═══════════════════════════════════════════════════════════════════════════════

const Game = {
    // Canvas
    canvas: null,
    ctx: null,
    width: 0,
    height: 0,

    // Game State
    running: false,
    paused: false,
    gameOver: false,

    // Stats
    score: 0,
    wave: 1,
    kills: 0,
    enemiesRemaining: 0,

    // Player
    player: {
        x: 0,
        y: 0,
        radius: 20,
        speed: 5,
        sprintSpeed: 8,
        health: 100,
        maxHealth: 100,
        angle: 0,
        weapon: 0,
        weapons: [
            { name: 'Pistol', ammo: 30, maxAmmo: 30, damage: 25, fireRate: 200, spread: 0.05, bullets: 1, reloadTime: 1000, icon: '🔫' },
            { name: 'Shotgun', ammo: 8, maxAmmo: 8, damage: 15, fireRate: 600, spread: 0.3, bullets: 5, reloadTime: 1500, icon: '💥' },
            { name: 'Rifle', ammo: 50, maxAmmo: 50, damage: 35, fireRate: 100, spread: 0.02, bullets: 1, reloadTime: 2000, icon: '🎯' }
        ],
        lastShot: 0,
        reloading: false,
        reloadStart: 0,
        invincible: false
    },

    // Input
    keys: {},
    mouse: { x: 0, y: 0, down: false },

    // Entities
    bullets: [],
    enemies: [],
    particles: [],
    powerups: [],
    explosions: [],

    // World
    camera: { x: 0, y: 0 },
    worldSize: 3000,
    obstacles: [],

    // Timing
    lastTime: 0,
    deltaTime: 0,

    // ═══════════════════════════════════════════════════════════════════════════
    // INITIALIZATION
    // ═══════════════════════════════════════════════════════════════════════════

    init() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resize();

        // Event Listeners
        window.addEventListener('resize', () => this.resize());
        window.addEventListener('keydown', (e) => this.onKeyDown(e));
        window.addEventListener('keyup', (e) => this.onKeyUp(e));
        window.addEventListener('mousemove', (e) => this.onMouseMove(e));
        window.addEventListener('mousedown', (e) => this.onMouseDown(e));
        window.addEventListener('mouseup', (e) => this.onMouseUp(e));
        window.addEventListener('contextmenu', (e) => e.preventDefault());
    },

    resize() {
        this.width = this.canvas.width = window.innerWidth;
        this.height = this.canvas.height = window.innerHeight;
    },

    start() {
        document.getElementById('startScreen').classList.add('hidden');
        this.reset();
        this.generateWorld();
        this.running = true;
        this.announceWave();
        this.gameLoop();
    },

    restart() {
        document.getElementById('gameOver').classList.remove('show');
        this.reset();
        this.generateWorld();
        this.running = true;
        this.gameOver = false;
        this.announceWave();
    },

    reset() {
        this.score = 0;
        this.wave = 1;
        this.kills = 0;
        this.bullets = [];
        this.enemies = [];
        this.particles = [];
        this.powerups = [];
        this.explosions = [];

        this.player.x = this.worldSize / 2;
        this.player.y = this.worldSize / 2;
        this.player.health = 100;
        this.player.weapon = 0;
        this.player.weapons.forEach(w => w.ammo = w.maxAmmo);
        this.player.reloading = false;
        this.player.invincible = false;

        this.updateHUD();
    },

    generateWorld() {
        this.obstacles = [];

        // Generate random obstacles (buildings, rocks, etc.)
        for (let i = 0; i < 80; i++) {
            const type = Math.random();
            let obstacle;

            if (type < 0.4) {
                // Building
                obstacle = {
                    x: Math.random() * this.worldSize,
                    y: Math.random() * this.worldSize,
                    width: 80 + Math.random() * 120,
                    height: 80 + Math.random() * 120,
                    type: 'building',
                    color: `hsl(${200 + Math.random() * 40}, 20%, ${20 + Math.random() * 15}%)`
                };
            } else if (type < 0.7) {
                // Rock
                obstacle = {
                    x: Math.random() * this.worldSize,
                    y: Math.random() * this.worldSize,
                    radius: 30 + Math.random() * 40,
                    type: 'rock',
                    color: `hsl(30, 10%, ${30 + Math.random() * 20}%)`
                };
            } else {
                // Tree
                obstacle = {
                    x: Math.random() * this.worldSize,
                    y: Math.random() * this.worldSize,
                    radius: 20 + Math.random() * 25,
                    type: 'tree',
                    color: `hsl(${100 + Math.random() * 40}, 50%, ${25 + Math.random() * 15}%)`
                };
            }

            // Don't place too close to player spawn
            const distToCenter = Math.hypot(obstacle.x - this.worldSize/2, obstacle.y - this.worldSize/2);
            if (distToCenter > 200) {
                this.obstacles.push(obstacle);
            }
        }

        this.spawnWave();
    },

    // ═══════════════════════════════════════════════════════════════════════════
    // INPUT HANDLING
    // ═══════════════════════════════════════════════════════════════════════════

    onKeyDown(e) {
        this.keys[e.key.toLowerCase()] = true;

        // Weapon switching
        if (e.key === '1') this.switchWeapon(0);
        if (e.key === '2') this.switchWeapon(1);
        if (e.key === '3') this.switchWeapon(2);

        // Reload
        if (e.key.toLowerCase() === 'r') this.reload();
    },

    onKeyUp(e) {
        this.keys[e.key.toLowerCase()] = false;
    },

    onMouseMove(e) {
        this.mouse.x = e.clientX;
        this.mouse.y = e.clientY;
    },

    onMouseDown(e) {
        if (e.button === 0) this.mouse.down = true;
    },

    onMouseUp(e) {
        if (e.button === 0) this.mouse.down = false;
    },

    // ═══════════════════════════════════════════════════════════════════════════
    // GAME LOOP
    // ═══════════════════════════════════════════════════════════════════════════

    gameLoop(timestamp = 0) {
        this.deltaTime = (timestamp - this.lastTime) / 1000;
        this.lastTime = timestamp;

        if (this.running && !this.gameOver) {
            this.update();
            this.render();
        }

        requestAnimationFrame((t) => this.gameLoop(t));
    },

    update() {
        this.updatePlayer();
        this.updateBullets();
        this.updateEnemies();
        this.updateParticles();
        this.updateExplosions();
        this.updatePowerups();
        this.checkCollisions();
        this.updateCamera();
        this.updateHUD();
        this.checkWaveComplete();

        // Auto-shoot if mouse held
        if (this.mouse.down) {
            this.shoot();
        }
    },

    // ═══════════════════════════════════════════════════════════════════════════
    // PLAYER
    // ═══════════════════════════════════════════════════════════════════════════

    updatePlayer() {
        const p = this.player;
        const speed = this.keys['shift'] ? p.sprintSpeed : p.speed;

        // Movement
        let dx = 0, dy = 0;
        if (this.keys['w']) dy -= 1;
        if (this.keys['s']) dy += 1;
        if (this.keys['a']) dx -= 1;
        if (this.keys['d']) dx += 1;

        // Normalize diagonal movement
        if (dx !== 0 && dy !== 0) {
            dx *= 0.707;
            dy *= 0.707;
        }

        // Apply movement
        const newX = p.x + dx * speed;
        const newY = p.y + dy * speed;

        // Collision with world bounds
        p.x = Math.max(p.radius, Math.min(this.worldSize - p.radius, newX));
        p.y = Math.max(p.radius, Math.min(this.worldSize - p.radius, newY));

        // Collision with obstacles
        this.obstacles.forEach(obs => {
            if (obs.type === 'building') {
                // Rectangle collision
                const closestX = Math.max(obs.x, Math.min(p.x, obs.x + obs.width));
                const closestY = Math.max(obs.y, Math.min(p.y, obs.y + obs.height));
                const dist = Math.hypot(p.x - closestX, p.y - closestY);

                if (dist < p.radius) {
                    const angle = Math.atan2(p.y - closestY, p.x - closestX);
                    p.x = closestX + Math.cos(angle) * p.radius;
                    p.y = closestY + Math.sin(angle) * p.radius;
                }
            } else {
                // Circle collision
                const dist = Math.hypot(p.x - obs.x, p.y - obs.y);
                const minDist = p.radius + obs.radius;

                if (dist < minDist) {
                    const angle = Math.atan2(p.y - obs.y, p.x - obs.x);
                    p.x = obs.x + Math.cos(angle) * minDist;
                    p.y = obs.y + Math.sin(angle) * minDist;
                }
            }
        });

        // Calculate angle to mouse
        const screenX = p.x - this.camera.x;
        const screenY = p.y - this.camera.y;
        p.angle = Math.atan2(this.mouse.y - screenY, this.mouse.x - screenX);

        // Update reload
        if (p.reloading) {
            const weapon = p.weapons[p.weapon];
            if (Date.now() - p.reloadStart >= weapon.reloadTime) {
                weapon.ammo = weapon.maxAmmo;
                p.reloading = false;
                document.getElementById('reloadIndicator').classList.remove('show');
            }
        }
    },

    shoot() {
        const p = this.player;
        const weapon = p.weapons[p.weapon];
        const now = Date.now();

        if (p.reloading) return;
        if (weapon.ammo <= 0) {
            this.reload();
            return;
        }
        if (now - p.lastShot < weapon.fireRate) return;

        p.lastShot = now;
        weapon.ammo--;

        // Create bullets
        for (let i = 0; i < weapon.bullets; i++) {
            const spread = (Math.random() - 0.5) * weapon.spread * 2;
            const angle = p.angle + spread;

            this.bullets.push({
                x: p.x + Math.cos(p.angle) * 30,
                y: p.y + Math.sin(p.angle) * 30,
                vx: Math.cos(angle) * 20,
                vy: Math.sin(angle) * 20,
                damage: weapon.damage,
                friendly: true,
                life: 60
            });
        }

        // Muzzle flash particles
        for (let i = 0; i < 5; i++) {
            this.particles.push({
                x: p.x + Math.cos(p.angle) * 35,
                y: p.y + Math.sin(p.angle) * 35,
                vx: Math.cos(p.angle + (Math.random() - 0.5)) * (5 + Math.random() * 5),
                vy: Math.sin(p.angle + (Math.random() - 0.5)) * (5 + Math.random() * 5),
                life: 0.2,
                maxLife: 0.2,
                color: '#ffff00',
                size: 4 + Math.random() * 4
            });
        }

        // Screen shake (subtle)
        this.camera.shake = 3;
    },

    reload() {
        const p = this.player;
        const weapon = p.weapons[p.weapon];

        if (p.reloading || weapon.ammo === weapon.maxAmmo) return;

        p.reloading = true;
        p.reloadStart = Date.now();
        document.getElementById('reloadIndicator').classList.add('show');
    },

    switchWeapon(index) {
        if (index >= 0 && index < this.player.weapons.length) {
            this.player.weapon = index;
            this.player.reloading = false;
            document.getElementById('reloadIndicator').classList.remove('show');

            // Update UI
            document.querySelectorAll('.weapon-slot').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
        }
    },

    takeDamage(amount) {
        if (this.player.invincible) return;

        this.player.health -= amount;
        document.getElementById('damageOverlay').classList.add('show');
        setTimeout(() => document.getElementById('damageOverlay').classList.remove('show'), 100);

        // Brief invincibility
        this.player.invincible = true;
        setTimeout(() => this.player.invincible = false, 200);

        if (this.player.health <= 0) {
            this.player.health = 0;
            this.endGame();
        }
    },

    // ═══════════════════════════════════════════════════════════════════════════
    // BULLETS
    // ═══════════════════════════════════════════════════════════════════════════

    updateBullets() {
        for (let i = this.bullets.length - 1; i >= 0; i--) {
            const b = this.bullets[i];
            b.x += b.vx;
            b.y += b.vy;
            b.life--;

            // Remove if out of bounds or expired
            if (b.life <= 0 || b.x < 0 || b.x > this.worldSize || b.y < 0 || b.y > this.worldSize) {
                this.bullets.splice(i, 1);
                continue;
            }

            // Check obstacle collision
            let hitObstacle = false;
            for (const obs of this.obstacles) {
                if (obs.type === 'building') {
                    if (b.x > obs.x && b.x < obs.x + obs.width && b.y > obs.y && b.y < obs.y + obs.height) {
                        hitObstacle = true;
                        break;
                    }
                } else {
                    if (Math.hypot(b.x - obs.x, b.y - obs.y) < obs.radius) {
                        hitObstacle = true;
                        break;
                    }
                }
            }

            if (hitObstacle) {
                // Spark effect
                for (let j = 0; j < 3; j++) {
                    this.particles.push({
                        x: b.x, y: b.y,
                        vx: (Math.random() - 0.5) * 5,
                        vy: (Math.random() - 0.5) * 5,
                        life: 0.3, maxLife: 0.3,
                        color: '#ffaa00', size: 3
                    });
                }
                this.bullets.splice(i, 1);
            }
        }
    },

    // ═══════════════════════════════════════════════════════════════════════════
    // ENEMIES
    // ═══════════════════════════════════════════════════════════════════════════

    spawnWave() {
        const enemyCount = 5 + this.wave * 3;
        this.enemiesRemaining = enemyCount;

        for (let i = 0; i < enemyCount; i++) {
            setTimeout(() => this.spawnEnemy(), i * 300);
        }
    },

    spawnEnemy() {
        // Spawn at edge of screen
        const side = Math.floor(Math.random() * 4);
        let x, y;

        const margin = 100;
        const camX = this.camera.x;
        const camY = this.camera.y;

        switch (side) {
            case 0: x = camX - margin; y = camY + Math.random() * this.height; break;
            case 1: x = camX + this.width + margin; y = camY + Math.random() * this.height; break;
            case 2: x = camX + Math.random() * this.width; y = camY - margin; break;
            case 3: x = camX + Math.random() * this.width; y = camY + this.height + margin; break;
        }

        // Clamp to world
        x = Math.max(50, Math.min(this.worldSize - 50, x));
        y = Math.max(50, Math.min(this.worldSize - 50, y));

        const types = ['basic', 'fast', 'tank', 'shooter'];
        const type = types[Math.floor(Math.random() * Math.min(types.length, 1 + Math.floor(this.wave / 2)))];

        const stats = {
            basic: { health: 50, speed: 2, damage: 10, radius: 18, color: '#ff4444', score: 10 },
            fast: { health: 30, speed: 4, damage: 8, radius: 15, color: '#ff8800', score: 15 },
            tank: { health: 150, speed: 1, damage: 20, radius: 28, color: '#8844ff', score: 25 },
            shooter: { health: 40, speed: 1.5, damage: 15, radius: 20, color: '#44ff44', score: 20, shoots: true }
        };

        const s = stats[type];
        this.enemies.push({
            x, y,
            type,
            health: s.health * (1 + this.wave * 0.1),
            maxHealth: s.health * (1 + this.wave * 0.1),
            speed: s.speed,
            damage: s.damage,
            radius: s.radius,
            color: s.color,
            score: s.score,
            shoots: s.shoots || false,
            lastShot: 0,
            angle: 0
        });
    },

    updateEnemies() {
        const p = this.player;

        for (const enemy of this.enemies) {
            // Calculate direction to player
            const dx = p.x - enemy.x;
            const dy = p.y - enemy.y;
            const dist = Math.hypot(dx, dy);
            enemy.angle = Math.atan2(dy, dx);

            // Move towards player
            if (dist > enemy.radius + p.radius + 5) {
                enemy.x += (dx / dist) * enemy.speed;
                enemy.y += (dy / dist) * enemy.speed;
            }

            // Shooter enemies
            if (enemy.shoots && dist < 400) {
                const now = Date.now();
                if (now - enemy.lastShot > 1500) {
                    enemy.lastShot = now;
                    this.bullets.push({
                        x: enemy.x,
                        y: enemy.y,
                        vx: (dx / dist) * 8,
                        vy: (dy / dist) * 8,
                        damage: enemy.damage,
                        friendly: false,
                        life: 100,
                        color: '#ff0000'
                    });
                }
            }

            // Collision with player
            if (dist < enemy.radius + p.radius) {
                this.takeDamage(enemy.damage);
                // Knockback enemy
                enemy.x -= (dx / dist) * 30;
                enemy.y -= (dy / dist) * 30;
            }

            // Keep in bounds
            enemy.x = Math.max(enemy.radius, Math.min(this.worldSize - enemy.radius, enemy.x));
            enemy.y = Math.max(enemy.radius, Math.min(this.worldSize - enemy.radius, enemy.y));
        }
    },

    killEnemy(enemy, index) {
        // Explosion effect
        this.explosions.push({
            x: enemy.x,
            y: enemy.y,
            radius: 5,
            maxRadius: enemy.radius * 2,
            life: 0.3,
            color: enemy.color
        });

        // Particles
        for (let i = 0; i < 15; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 6;
            this.particles.push({
                x: enemy.x,
                y: enemy.y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 0.5 + Math.random() * 0.5,
                maxLife: 1,
                color: enemy.color,
                size: 4 + Math.random() * 6
            });
        }

        // Score
        this.score += enemy.score * this.wave;
        this.kills++;
        this.enemiesRemaining--;

        // Kill feed
        this.addKillFeed(enemy.type);

        // Chance to drop powerup
        if (Math.random() < 0.2) {
            this.spawnPowerup(enemy.x, enemy.y);
        }

        this.enemies.splice(index, 1);
    },

    addKillFeed(type) {
        const feed = document.getElementById('killFeed');
        const item = document.createElement('div');
        item.className = 'kill-item';
        item.textContent = `☠️ Eliminated ${type.toUpperCase()}`;
        feed.appendChild(item);

        setTimeout(() => item.remove(), 3000);

        // Keep only last 5
        while (feed.children.length > 5) {
            feed.removeChild(feed.firstChild);
        }
    },

    // ═══════════════════════════════════════════════════════════════════════════
    // POWERUPS
    // ═══════════════════════════════════════════════════════════════════════════

    spawnPowerup(x, y) {
        const types = ['health', 'ammo', 'damage', 'speed'];
        const type = types[Math.floor(Math.random() * types.length)];

        const icons = { health: '❤️', ammo: '🔋', damage: '⚡', speed: '💨' };
        const colors = { health: '#ff4444', ammo: '#44ff44', damage: '#ffff00', speed: '#44ffff' };

        this.powerups.push({
            x, y,
            type,
            icon: icons[type],
            color: colors[type],
            radius: 20,
            life: 10 // Seconds before despawn
        });
    },

    updatePowerups() {
        const p = this.player;

        for (let i = this.powerups.length - 1; i >= 0; i--) {
            const pu = this.powerups[i];
            pu.life -= this.deltaTime;

            if (pu.life <= 0) {
                this.powerups.splice(i, 1);
                continue;
            }

            // Check player collision
            const dist = Math.hypot(p.x - pu.x, p.y - pu.y);
            if (dist < p.radius + pu.radius) {
                this.collectPowerup(pu, i);
            }
        }
    },

    collectPowerup(pu, index) {
        let message = '';

        switch (pu.type) {
            case 'health':
                this.player.health = Math.min(this.player.maxHealth, this.player.health + 30);
                message = '❤️ +30 HEALTH';
                break;
            case 'ammo':
                this.player.weapons.forEach(w => w.ammo = w.maxAmmo);
                message = '🔋 FULL AMMO';
                break;
            case 'damage':
                // Temporary damage boost handled elsewhere
                message = '⚡ DAMAGE BOOST';
                break;
            case 'speed':
                message = '💨 SPEED BOOST';
                break;
        }

        // Show notification
        const notify = document.getElementById('powerupNotify');
        notify.textContent = message;
        notify.classList.add('show');
        setTimeout(() => notify.classList.remove('show'), 1500);

        // Particles
        for (let i = 0; i < 10; i++) {
            const angle = Math.random() * Math.PI * 2;
            this.particles.push({
                x: pu.x,
                y: pu.y,
                vx: Math.cos(angle) * 3,
                vy: Math.sin(angle) * 3,
                life: 0.5,
                maxLife: 0.5,
                color: pu.color,
                size: 5
            });
        }

        this.powerups.splice(index, 1);
    },

    // ═══════════════════════════════════════════════════════════════════════════
    // PARTICLES & EFFECTS
    // ═══════════════════════════════════════════════════════════════════════════

    updateParticles() {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vx *= 0.95;
            p.vy *= 0.95;
            p.life -= this.deltaTime;

            if (p.life <= 0) {
                this.particles.splice(i, 1);
            }
        }
    },

    updateExplosions() {
        for (let i = this.explosions.length - 1; i >= 0; i--) {
            const e = this.explosions[i];
            e.life -= this.deltaTime;
            e.radius += (e.maxRadius - e.radius) * 0.2;

            if (e.life <= 0) {
                this.explosions.splice(i, 1);
            }
        }
    },

    // ═══════════════════════════════════════════════════════════════════════════
    // COLLISIONS
    // ═══════════════════════════════════════════════════════════════════════════

    checkCollisions() {
        // Bullets vs Enemies
        for (let i = this.bullets.length - 1; i >= 0; i--) {
            const b = this.bullets[i];

            if (b.friendly) {
                // Check enemy hits
                for (let j = this.enemies.length - 1; j >= 0; j--) {
                    const e = this.enemies[j];
                    const dist = Math.hypot(b.x - e.x, b.y - e.y);

                    if (dist < e.radius) {
                        e.health -= b.damage;
                        this.bullets.splice(i, 1);

                        // Hit particles
                        for (let k = 0; k < 5; k++) {
                            this.particles.push({
                                x: b.x, y: b.y,
                                vx: (Math.random() - 0.5) * 4,
                                vy: (Math.random() - 0.5) * 4,
                                life: 0.3, maxLife: 0.3,
                                color: '#ff0000', size: 3
                            });
                        }

                        if (e.health <= 0) {
                            this.killEnemy(e, j);
                        }
                        break;
                    }
                }
            } else {
                // Enemy bullet vs player
                const dist = Math.hypot(b.x - this.player.x, b.y - this.player.y);
                if (dist < this.player.radius) {
                    this.takeDamage(b.damage);
                    this.bullets.splice(i, 1);
                }
            }
        }
    },

    // ═══════════════════════════════════════════════════════════════════════════
    // CAMERA
    // ═══════════════════════════════════════════════════════════════════════════

    updateCamera() {
        // Follow player
        const targetX = this.player.x - this.width / 2;
        const targetY = this.player.y - this.height / 2;

        this.camera.x += (targetX - this.camera.x) * 0.1;
        this.camera.y += (targetY - this.camera.y) * 0.1;

        // Clamp to world bounds
        this.camera.x = Math.max(0, Math.min(this.worldSize - this.width, this.camera.x));
        this.camera.y = Math.max(0, Math.min(this.worldSize - this.height, this.camera.y));

        // Screen shake
        if (this.camera.shake > 0) {
            this.camera.x += (Math.random() - 0.5) * this.camera.shake;
            this.camera.y += (Math.random() - 0.5) * this.camera.shake;
            this.camera.shake *= 0.9;
        }
    },

    // ═══════════════════════════════════════════════════════════════════════════
    // WAVES
    // ═══════════════════════════════════════════════════════════════════════════

    checkWaveComplete() {
        if (this.enemies.length === 0 && this.enemiesRemaining <= 0) {
            this.wave++;
            this.announceWave();
            setTimeout(() => this.spawnWave(), 2000);
        }
    },

    announceWave() {
        const el = document.getElementById('waveAnnounce');
        el.textContent = `WAVE ${this.wave}`;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2000);
    },

    // ═══════════════════════════════════════════════════════════════════════════
    // HUD
    // ═══════════════════════════════════════════════════════════════════════════

    updateHUD() {
        document.getElementById('score').textContent = this.score;
        document.getElementById('wave').textContent = this.wave;
        document.getElementById('kills').textContent = this.kills;

        const healthPercent = (this.player.health / this.player.maxHealth) * 100;
        document.getElementById('healthFill').style.width = healthPercent + '%';
        document.getElementById('healthText').textContent = Math.ceil(this.player.health);

        const weapon = this.player.weapons[this.player.weapon];
        document.getElementById('ammo').textContent = weapon.ammo;
        document.getElementById('maxAmmo').textContent = weapon.maxAmmo;

        // Update minimap
        this.updateMinimap();
    },

    updateMinimap() {
        const canvas = document.getElementById('minimap');
        const ctx = canvas.getContext('2d');
        canvas.width = 180;
        canvas.height = 180;

        const scale = 180 / this.worldSize;

        // Background
        ctx.fillStyle = '#0a0e1a';
        ctx.fillRect(0, 0, 180, 180);

        // Obstacles
        ctx.fillStyle = 'rgba(100, 100, 100, 0.5)';
        this.obstacles.forEach(obs => {
            if (obs.type === 'building') {
                ctx.fillRect(obs.x * scale, obs.y * scale, obs.width * scale, obs.height * scale);
            } else {
                ctx.beginPath();
                ctx.arc(obs.x * scale, obs.y * scale, obs.radius * scale, 0, Math.PI * 2);
                ctx.fill();
            }
        });

        // Enemies
        ctx.fillStyle = '#ff4444';
        this.enemies.forEach(e => {
            ctx.beginPath();
            ctx.arc(e.x * scale, e.y * scale, 3, 0, Math.PI * 2);
            ctx.fill();
        });

        // Powerups
        this.powerups.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x * scale, p.y * scale, 3, 0, Math.PI * 2);
            ctx.fill();
        });

        // Player
        ctx.fillStyle = '#00f3ff';
        ctx.beginPath();
        ctx.arc(this.player.x * scale, this.player.y * scale, 4, 0, Math.PI * 2);
        ctx.fill();

        // Camera view box
        ctx.strokeStyle = 'rgba(0, 243, 255, 0.5)';
        ctx.lineWidth = 1;
        ctx.strokeRect(
            this.camera.x * scale,
            this.camera.y * scale,
            this.width * scale,
            this.height * scale
        );
    },

    // ═══════════════════════════════════════════════════════════════════════════
    // GAME OVER
    // ═══════════════════════════════════════════════════════════════════════════

    endGame() {
        this.gameOver = true;
        document.getElementById('finalScore').textContent = this.score;
        document.getElementById('finalWave').textContent = this.wave;
        document.getElementById('finalKills').textContent = this.kills;
        document.getElementById('gameOver').classList.add('show');
    },

    // ═══════════════════════════════════════════════════════════════════════════
    // RENDERING
    // ═══════════════════════════════════════════════════════════════════════════

    render() {
        const ctx = this.ctx;
        ctx.save();

        // Clear
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, this.width, this.height);

        // Apply camera transform
        ctx.translate(-this.camera.x, -this.camera.y);

        // Draw ground
        this.drawGround();

        // Draw obstacles
        this.drawObstacles();

        // Draw powerups
        this.drawPowerups();

        // Draw bullets
        this.drawBullets();

        // Draw enemies
        this.drawEnemies();

        // Draw player
        this.drawPlayer();

        // Draw particles
        this.drawParticles();

        // Draw explosions
        this.drawExplosions();

        ctx.restore();

        // Draw crosshair (screen space)
        this.drawCrosshair();
    },

    drawGround() {
        const ctx = this.ctx;
        const gridSize = 100;

        // Grid lines
        ctx.strokeStyle = 'rgba(0, 243, 255, 0.1)';
        ctx.lineWidth = 1;

        const startX = Math.floor(this.camera.x / gridSize) * gridSize;
        const startY = Math.floor(this.camera.y / gridSize) * gridSize;

        for (let x = startX; x < this.camera.x + this.width + gridSize; x += gridSize) {
            ctx.beginPath();
            ctx.moveTo(x, this.camera.y);
            ctx.lineTo(x, this.camera.y + this.height);
            ctx.stroke();
        }

        for (let y = startY; y < this.camera.y + this.height + gridSize; y += gridSize) {
            ctx.beginPath();
            ctx.moveTo(this.camera.x, y);
            ctx.lineTo(this.camera.x + this.width, y);
            ctx.stroke();
        }

        // World boundary
        ctx.strokeStyle = '#ff0000';
        ctx.lineWidth = 4;
        ctx.strokeRect(0, 0, this.worldSize, this.worldSize);
    },

    drawObstacles() {
        const ctx = this.ctx;

        this.obstacles.forEach(obs => {
            if (obs.type === 'building') {
                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(obs.x + 10, obs.y + 10, obs.width, obs.height);

                // Building
                ctx.fillStyle = obs.color;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

                // Highlight
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fillRect(obs.x, obs.y, obs.width, 5);
                ctx.fillRect(obs.x, obs.y, 5, obs.height);
            } else {
                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.beginPath();
                ctx.arc(obs.x + 5, obs.y + 5, obs.radius, 0, Math.PI * 2);
                ctx.fill();

                // Object
                ctx.fillStyle = obs.color;
                ctx.beginPath();
                ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI * 2);
                ctx.fill();

                // Highlight
                const gradient = ctx.createRadialGradient(
                    obs.x - obs.radius * 0.3, obs.y - obs.radius * 0.3, 0,
                    obs.x, obs.y, obs.radius
                );
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        });
    },

    drawPlayer() {
        const ctx = this.ctx;
        const p = this.player;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);

        // Glow
        const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 50);
        glow.addColorStop(0, 'rgba(0, 243, 255, 0.3)');
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(0, 0, 50, 0, Math.PI * 2);
        ctx.fill();

        // Body
        ctx.fillStyle = '#00f3ff';
        ctx.beginPath();
        ctx.arc(0, 0, p.radius, 0, Math.PI * 2);
        ctx.fill();

        // Inner
        ctx.fillStyle = '#0080ff';
        ctx.beginPath();
        ctx.arc(0, 0, p.radius * 0.7, 0, Math.PI * 2);
        ctx.fill();

        // Gun
        ctx.fillStyle = '#333';
        ctx.fillRect(p.radius * 0.5, -4, 25, 8);

        // Direction indicator
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(p.radius, 0);
        ctx.lineTo(p.radius - 8, -5);
        ctx.lineTo(p.radius - 8, 5);
        ctx.closePath();
        ctx.fill();

        ctx.restore();
    },

    drawEnemies() {
        const ctx = this.ctx;

        this.enemies.forEach(e => {
            ctx.save();
            ctx.translate(e.x, e.y);

            // Glow
            const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, e.radius * 2);
            glow.addColorStop(0, e.color.replace(')', ', 0.3)').replace('rgb', 'rgba'));
            glow.addColorStop(1, 'transparent');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(0, 0, e.radius * 2, 0, Math.PI * 2);
            ctx.fill();

            // Body
            ctx.fillStyle = e.color;
            ctx.beginPath();
            ctx.arc(0, 0, e.radius, 0, Math.PI * 2);
            ctx.fill();

            // Inner dark
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.beginPath();
            ctx.arc(0, 0, e.radius * 0.6, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(-5, -3, 4, 0, Math.PI * 2);
            ctx.arc(5, -3, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(-4, -3, 2, 0, Math.PI * 2);
            ctx.arc(6, -3, 2, 0, Math.PI * 2);
            ctx.fill();

            // Health bar
            const healthPercent = e.health / e.maxHealth;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(-e.radius, -e.radius - 12, e.radius * 2, 6);
            ctx.fillStyle = healthPercent > 0.5 ? '#00ff00' : healthPercent > 0.25 ? '#ffff00' : '#ff0000';
            ctx.fillRect(-e.radius, -e.radius - 12, e.radius * 2 * healthPercent, 6);

            ctx.restore();
        });
    },

    drawBullets() {
        const ctx = this.ctx;

        this.bullets.forEach(b => {
            // Trail
            const gradient = ctx.createLinearGradient(
                b.x - b.vx * 2, b.y - b.vy * 2,
                b.x, b.y
            );
            gradient.addColorStop(0, 'transparent');
            gradient.addColorStop(1, b.friendly ? '#ffff00' : '#ff0000');

            ctx.strokeStyle = gradient;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(b.x - b.vx * 2, b.y - b.vy * 2);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();

            // Bullet
            ctx.fillStyle = b.friendly ? '#ffff00' : '#ff0000';
            ctx.beginPath();
            ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
            ctx.fill();
        });
    },

    drawParticles() {
        const ctx = this.ctx;

        this.particles.forEach(p => {
            const alpha = p.life / p.maxLife;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
            ctx.fill();
        });

        ctx.globalAlpha = 1;
    },

    drawExplosions() {
        const ctx = this.ctx;

        this.explosions.forEach(e => {
            const alpha = e.life / 0.3;
            ctx.globalAlpha = alpha * 0.5;
            ctx.fillStyle = e.color;
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.globalAlpha = alpha;
            ctx.stroke();
        });

        ctx.globalAlpha = 1;
    },

    drawPowerups() {
        const ctx = this.ctx;

        this.powerups.forEach(p => {
            // Glow
            const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 2);
            glow.addColorStop(0, p.color.replace(')', ', 0.5)').replace('#', 'rgba(').replace(/(..)(..)(..)/, (m, r, g, b) => 
                `rgba(${parseInt(r,16)}, ${parseInt(g,16)}, ${parseInt(b,16)}, 0.5)`));
            glow.addColorStop(1, 'transparent');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius * 2, 0, Math.PI * 2);
            ctx.fill();

            // Circle
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fill();

            // Icon
            ctx.font = '20px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(p.icon, p.x, p.y);

            // Floating animation
            const float = Math.sin(Date.now() / 200) * 3;
            ctx.fillText(p.icon, p.x, p.y + float);
        });
    },

    drawCrosshair() {
        const ctx = this.ctx;
        const x = this.mouse.x;
        const y = this.mouse.y;
        const size = 15;
        const gap = 5;

        ctx.strokeStyle = '#00f3ff';
        ctx.lineWidth = 2;

        // Top
        ctx.beginPath();
        ctx.moveTo(x, y - gap);
        ctx.lineTo(x, y - size);
        ctx.stroke();

        // Bottom
        ctx.beginPath();
        ctx.moveTo(x, y + gap);
        ctx.lineTo(x, y + size);
        ctx.stroke();

        // Left
        ctx.beginPath();
        ctx.moveTo(x - gap, y);
        ctx.lineTo(x - size, y);
        ctx.stroke();

        // Right
        ctx.beginPath();
        ctx.moveTo(x + gap, y);
        ctx.lineTo(x + size, y);
        ctx.stroke();

        // Center dot
        ctx.fillStyle = '#ff006e';
        ctx.beginPath();
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.fill();
    }
};

// Initialize when page loads
window.addEventListener('load', () => Game.init());
    </script>
</body>
