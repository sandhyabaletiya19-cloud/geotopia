<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missing Spellings — BRUTAL MODE</title>
  <link rel="stylesheet" href="../../../styles/global.css">
  <style>
    body {
      background: #000000;
      color: #e8e8e8;
      min-height: 100vh;
      padding: 20px;
    }

    .spelling-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .stats-bar {
      display: flex;
      justify-content: space-between;
      background: #151515;
      padding: 16px 24px;
      border-radius: 8px;
      margin: 20px 0;
      flex-wrap: wrap;
      gap: 16px;
    }

    .stat-item {
      text-align: center;
      flex: 1;
      min-width: 100px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #d4af37;
    }

    .stat-label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .timer {
      font-size: 32px;
      font-weight: 700;
      color: #00d0ff;
      font-family: 'Courier New', monospace;
    }

    .spelling-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 50px 40px;
      margin: 30px 0;
      min-height: 500px;
      position: relative;
    }

    .difficulty-badge {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 8px 16px;
      background: rgba(255, 0, 51, 0.2);
      color: #ff0033;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .category-tag {
      display: inline-block;
      padding: 6px 14px;
      background: rgba(212, 175, 55, 0.1);
      color: #d4af37;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 30px;
    }

    .puzzle-word {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: 12px;
      text-align: center;
      margin: 50px 0;
      font-family: 'Courier New', monospace;
      color: #e8e8e8;
      line-height: 1.8;
      word-wrap: break-word;
    }

    .puzzle-word .blank {
      color: #00d0ff;
      display: inline-block;
      min-width: 30px;
    }

    .puzzle-word .revealed {
      color: #00ff88;
    }

    .answer-input {
      width: 100%;
      padding: 24px;
      font-size: 32px;
      background: #0f0f0f;
      border: 3px solid #333;
      border-radius: 12px;
      color: #e8e8e8;
      text-align: center;
      outline: none;
      text-transform: uppercase;
      letter-spacing: 8px;
      font-family: 'Courier New', monospace;
      transition: all 0.3s ease;
    }

    .answer-input:focus {
      border-color: #00d0ff;
      background: #151515;
    }

    .answer-input.correct {
      border-color: #00ff88;
      background: rgba(0, 255, 136, 0.1);
      animation: correctFlash 0.5s ease;
    }

    .answer-input.wrong {
      border-color: #ff0033;
      background: rgba(255, 0, 51, 0.1);
      animation: shake 0.4s ease;
    }

    @keyframes correctFlash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .hint-container {
      margin-top: 40px;
    }

    .hint-btn {
      background: rgba(0, 208, 255, 0.1);
      border: 2px solid #00d0ff;
      color: #00d0ff;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      margin: 0 8px;
      transition: all 0.3s ease;
      font-size: 14px;
      font-weight: 600;
    }

    .hint-btn:hover {
      background: rgba(0, 208, 255, 0.2);
      transform: translateY(-2px);
    }

    .hint-btn.used {
      opacity: 0.3;
      pointer-events: none;
      background: rgba(0, 208, 255, 0.05);
    }

    .hint-display {
      background: rgba(0, 208, 255, 0.05);
      border-left: 4px solid #00d0ff;
      padding: 20px;
      margin-top: 20px;
      border-radius: 8px;
      display: none;
      animation: slideDown 0.3s ease;
      color: #00d0ff;
      line-height: 1.8;
    }

    .hint-display.show {
      display: block;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .attempts-left {
      text-align: center;
      margin: 30px 0;
      font-size: 16px;
      color: #999;
    }

    .attempts-left .count {
      font-size: 28px;
      color: #ff0033;
      font-weight: 700;
    }

    .skip-penalty {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin-top: 10px;
    }

    .btn {
      padding: 18px 50px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
    }

    .btn-primary {
      background: #d4af37;
      color: #0b0b0b;
    }

    .btn-primary:hover {
      background: #f4cf47;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid #444;
      color: #999;
    }

    .btn-secondary:hover {
      border-color: #d4af37;
      color: #e8e8e8;
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid #444;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 1000;
      color: #999;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: #d4af37;
      color: #e8e8e8;
      transform: translateX(-4px);
    }

    .coin-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      font-weight: 700;
      animation: coinFly 1s ease-out forwards;
      pointer-events: none;
      z-index: 9999;
    }

    @keyframes coinFly {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0);
      }
      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.2);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -200%) scale(0.8);
      }
    }

    @media (max-width: 768px) {
      .puzzle-word {
        font-size: 32px;
        letter-spacing: 8px;
      }

      .answer-input {
        font-size: 24px;
        padding: 16px;
        letter-spacing: 4px;
      }

      .spelling-card {
        padding: 32px 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Back Button -->
  <div class="back-btn" onclick="location.href='../index.html'">←</div>

  <div class="spelling-container">
    
    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="score">0</div>
        <div class="stat-label">Score</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="solved">0/15</div>
        <div class="stat-label">Solved</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="streak">0</div>
        <div class="stat-label">Streak</div>
      </div>
      <div class="stat-item">
        <div class="timer" id="timer">0:00</div>
      </div>
    </div>

    <!-- Spelling Card -->
    <div class="spelling-card">
      <div class="difficulty-badge" id="difficultyBadge">BRUTAL</div>
      
      <div style="text-align: center;">
        <span class="category-tag" id="categoryTag">Loading...</span>
      </div>

      <div class="puzzle-word" id="puzzleWord">
        <!-- Puzzle will appear here -->
      </div>

      <div class="attempts-left">
        Attempts Left: <span class="count" id="attemptsCount">3</span>
      </div>

      <input 
        type="text" 
        class="answer-input" 
        id="answerInput" 
        placeholder="TYPE THE COMPLETE WORD..."
        autocomplete="off"
        maxlength="30"
      >

      <div class="hint-container">
        <div style="text-align: center; margin-bottom: 20px;">
          <button class="hint-btn" id="hintBtn1" onclick="showHint(1)">
            💡 Hint 1: Definition (-5 pts)
          </button>
          <button class="hint-btn" id="hintBtn2" onclick="showHint(2)">
            🔍 Hint 2: Category Detail (-10 pts)
          </button>
          <button class="hint-btn" id="hintBtn3" onclick="showHint(3)">
            🖼️ Hint 3: Visual Clue (-15 pts)
          </button>
        </div>

        <div class="hint-display" id="hintDisplay">
          <!-- Hints appear here -->
        </div>
      </div>

      <div style="margin-top: 50px; text-align: center;">
        <button class="btn btn-primary" onclick="checkAnswer()">
          SUBMIT ANSWER
        </button>
        <button class="btn btn-secondary" onclick="skipWord()" style="margin-left: 16px;">
          Skip (-20 pts)
        </button>
      </div>

      <div class="skip-penalty">
        Skipping costs 20 points and breaks your streak
      </div>

    </div>

  </div>

  <script src="words.js"></script>
  <script src="spelling.js"></script>

</body>
</html>
