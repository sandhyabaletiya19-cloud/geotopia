<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Master — Advanced Geography Terms</title>
  <link rel="stylesheet" href="../../styles/adult-dark.css">
  <style>
    .word-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .mode-selector {
      display: flex;
      gap: 16px;
      margin-bottom: 40px;
      justify-content: center;
    }

    .mode-btn {
      padding: 12px 24px;
      background: var(--deep-grey);
      border: 2px solid #333;
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .mode-btn.active {
      background: var(--gold);
      color: var(--void-black);
      border-color: var(--gold);
    }

    .word-card {
      background: var(--deep-grey);
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px;
      margin: 30px 0;
      min-height: 400px;
    }

    .definition {
      font-size: 22px;
      line-height: 1.8;
      margin-bottom: 40px;
      color: var(--text-primary);
      padding: 20px;
      background: rgba(212, 175, 55, 0.05);
      border-left: 4px solid var(--gold);
      border-radius: 8px;
    }

    .term-input {
      width: 100%;
      padding: 20px;
      font-size: 24px;
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 12px;
      color: var(--text-primary);
      font-family: var(--font-main);
      text-align: center;
      outline: none;
      transition: all 0.3s ease;
    }

    .term-input:focus {
      border-color: var(--electric-blue);
      background: #222;
    }

    .term-input.correct {
      border-color: var(--success-green);
      background: rgba(0, 255, 136, 0.1);
    }

    .term-input.wrong {
      border-color: var(--blood-red);
      background: rgba(255, 0, 51, 0.1);
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 30px;
    }

    .option-card {
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      text-align: center;
      font-size: 18px;
      transition: all 0.2s ease;
    }

    .option-card:hover {
      border-color: var(--gold);
      background: #222;
      transform: translateY(-2px);
    }

    .option-card.selected {
      border-color: var(--electric-blue);
      background: rgba(0, 208, 255, 0.1);
    }

    .hint-box {
      background: rgba(0, 208, 255, 0.05);
      border: 1px dashed var(--electric-blue);
      border-radius: 8px;
      padding: 16px;
      margin-top: 20px;
      font-size: 16px;
      color: var(--electric-blue);
      display: none;
    }

    .hint-box.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .progress-text {
      text-align: center;
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <div class="word-container">
    
    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="score">0</div>
        <div class="stat-label">Score</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="correct">0</div>
        <div class="stat-label">Correct</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="streak">0</div>
        <div class="stat-label">Streak</div>
      </div>
      <div class="stat-item">
        <div class="timer" id="timer">0:00</div>
      </div>
    </div>

    <!-- Mode Selector -->
    <div class="mode-selector">
      <button class="mode-btn active" onclick="changeMode('typing')">TERMINAL MODE</button>
      <button class="mode-btn" onclick="changeMode('match')">DEFINITION MATCH</button>
    </div>

    <!-- Word Card -->
    <div class="word-card">
      <div class="progress-text" id="progressText">Term 1 of 20</div>
      
      <div class="definition" id="definition">Loading definition...</div>
      
      <!-- Typing Mode Input -->
      <div id="typingMode">
        <input type="text" class="term-input" id="termInput" placeholder="Type the geography term..." autocomplete="off">
        <div class="hint-box" id="hintBox"></div>
        <div style="margin-top: 24px; text-align: center;">
          <button class="btn" onclick="showHint()" style="margin-right: 12px;">💡 Show Hint</button>
          <button class="btn btn-primary" onclick="checkAnswer()">Submit Answer</button>
        </div>
      </div>

      <!-- Match Mode Options -->
      <div id="matchMode" style="display: none;">
        <div class="options-grid" id="optionsGrid">
          <!-- Options will be inserted here -->
        </div>
      </div>

      <div style="margin-top: 40px; text-align: center;">
        <button class="btn back-btn" onclick="location.href='../../index.html'">← Back to Hub</button>
        <button class="btn btn-primary" id="nextBtn" onclick="nextTerm()" style="display:none;">Next Term →</button>
      </div>
    </div>

  </div>

  <script src="terms.js"></script>
  <script src="word.js"></script>

</body>
</html>
