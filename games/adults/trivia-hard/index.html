<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geopolitics Trivia — HARD MODE</title>
  <link rel="stylesheet" href="../../styles/adult-dark.css">
  <style>
    .trivia-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .question-card {
      background: var(--deep-grey);
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px;
      margin: 30px 0;
      min-height: 400px;
    }

    .question-number {
      font-size: 14px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    .question-text {
      font-size: 26px;
      font-weight: 500;
      line-height: 1.5;
      margin-bottom: 40px;
      color: var(--text-primary);
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .option {
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 12px;
      padding: 20px 24px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .option:hover {
      border-color: var(--gold);
      background: #222;
      transform: translateX(4px);
    }

    .option.selected {
      border-color: var(--electric-blue);
      background: rgba(0, 208, 255, 0.1);
    }

    .explanation {
      display: none;
      background: rgba(212, 175, 55, 0.1);
      border-left: 4px solid var(--gold);
      padding: 20px;
      margin-top: 24px;
      border-radius: 8px;
      font-size: 16px;
      line-height: 1.7;
    }

    .explanation.show {
      display: block;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .controls {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      gap: 16px;
    }

    .back-btn {
      background: transparent;
      border: 1px solid #444;
      color: var(--text-secondary);
    }

    .back-btn:hover {
      border-color: var(--gold);
      color: var(--text-primary);
    }
  </style>
</head>
<body>

  <div class="trivia-container">
    
    <!-- Header Stats -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="score">0</div>
        <div class="stat-label">Score</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="accuracy">0%</div>
        <div class="stat-label">Accuracy</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="streak">0</div>
        <div class="stat-label">Streak</div>
      </div>
      <div class="stat-item">
        <div class="timer" id="timer">0:00</div>
      </div>
    </div>

    <!-- Question Card -->
    <div class="question-card">
      <div class="question-number" id="questionNumber">Question 1 of 20</div>
      <div class="question-text" id="questionText">Loading question...</div>
      
      <div class="options" id="optionsContainer">
        <!-- Options will be inserted here -->
      </div>

      <div class="explanation" id="explanation">
        <!-- Explanation appears here after answer -->
      </div>

      <div class="controls">
        <button class="btn back-btn" onclick="location.href='../../index.html'">← Back to Hub</button>
        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="display:none;">Next Question →</button>
      </div>
    </div>

  </div>

  <script src="questions.js"></script>
  <script src="trivia.js"></script>

</body>
</html>
