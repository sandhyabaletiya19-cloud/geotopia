<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Extreme — 12×12 Grid</title>
  <link rel="stylesheet" href="../../styles/adult-dark.css">
  <style>
    .memory-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 8px;
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
    }

    .memory-card {
      aspect-ratio: 1;
      background: var(--deep-grey);
      border: 2px solid #333;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.3s ease;
      position: relative;
    }

    .memory-card.flipped {
      background: #1a1a1a;
      border-color: var(--electric-blue);
    }

    .memory-card.matched {
      background: rgba(0, 255, 136, 0.1);
      border-color: var(--success-green);
      pointer-events: none;
    }

    .memory-card .card-back {
      display: none;
    }

    .memory-card.flipped .card-back {
      display: block;
    }

    .memory-card:not(.flipped) .card-back {
      display: none;
    }

    .preview-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-size: 48px;
      color: var(--gold);
    }
  </style>
</head>
<body>

  <div class="trivia-container">
    
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="moves">0</div>
        <div class="stat-label">Moves</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="matched">0/72</div>
        <div class="stat-label">Matched</div>
      </div>
      <div class="stat-item">
        <div class="timer" id="timer">0:00</div>
      </div>
    </div>

    <div class="memory-grid" id="memoryGrid">
      <!-- 144 cards will be generated here -->
    </div>

    <div style="text-align: center; margin-top: 30px;">
      <button class="btn back-btn" onclick="location.href='../../index.html'">← Back to Hub</button>
      <button class="btn btn-primary" onclick="location.reload()">Restart</button>
    </div>

  </div>

  <div class="preview-overlay" id="previewOverlay">
    <div>MEMORIZE: <span id="countdown">5</span></div>
  </div>

  <script src="cards-data.js"></script>
  <script src="memory.js"></script>

</body>
</html>
