<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0F0F23" />
  <meta name="description" content="Guess today's mystery country in 6 tries. Daily geography game on Dharaverse!" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Map Mystery" />

  <title>Map Mystery — Dharaverse Daily</title>

  <link rel="icon" type="image/png" href="/public/logo192.png" />

  <!-- Google Fonts: Nunito -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Game Styles -->
  <link rel="stylesheet" href="css/game.css" />
</head>

<body data-theme="galaxy">

  <div class="game-container">

    <!-- HEADER -->
    <header class="game-header">
      <div class="header-left">
        <a href="/games/" class="back-btn" aria-label="Back to games">←</a>
        <h1 class="game-title">🌍 DHARAVERSE</h1>
      </div>
      <div class="header-right">
        <div class="streak-badge" title="Your current streak">
          <span class="streak-icon">🔥</span>
          <span class="streak-count">0</span>
        </div>
        <button class="theme-btn" aria-label="Choose theme">🎨</button>
      </div>
    </header>

    <!-- NEWS TICKER -->
    <div class="news-ticker">
      <span class="news-icon">📰</span>
      <span class="news-text">Loading today's hint...</span>
    </div>

    <!-- MAP -->
    <section class="map-section">
      <div id="game-map" role="application" tabindex="0"></div>
      <div class="map-overlay">
        <span class="guess-count">0/6</span>
        <div class="guess-dots">
          <div class="guess-dot"></div>
          <div class="guess-dot"></div>
          <div class="guess-dot"></div>
          <div class="guess-dot"></div>
          <div class="guess-dot"></div>
          <div class="guess-dot"></div>
        </div>
      </div>
    </section>

    <!-- INPUT -->
    <div class="input-section">
      <div class="input-row">
        <div class="input-wrapper">
          <span class="input-icon">🔍</span>
          <input
            id="country-input"
            class="country-input"
            type="text"
            placeholder="Type country name..."
            autocomplete="off"
            spellcheck="false"
            enterkeyhint="search"
          />
          <div class="autocomplete-dropdown" role="listbox"></div>
        </div>
        <button id="submit-btn" class="submit-btn" type="button" aria-label="Submit">→</button>
      </div>
    </div>

    <!-- GUESSES -->
    <section class="guesses-section">
      <div class="guesses-list" aria-live="polite"></div>
    </section>

    <!-- AD -->
    <div class="ad-container">
      <div class="ad-placeholder">Advertisement</div>
    </div>

  </div>

  <!-- LEAFLET JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- GAME SCRIPTS — ORDER MATTERS -->
  <script src="js/data.js"></script>
  <script src="js/logic.js"></script>
  <script src="js/state.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
