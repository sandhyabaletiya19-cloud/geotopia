<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geotopia - Games</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="themes.css">
</head>
<body>
    <header>
        <h1>Geotopia Games</h1>
        <nav>
            <label for="game-selector">Game:</label>
            <select id="game-selector">
                <option value="memory">Memory Game</option>
                <option value="quiz">Quiz Game</option>
            </select>

            <label for="theme-selector">Theme:</label>
            <select id="theme-selector">
                <option value="kids">Kids</option>
                <option value="teen">Teen</option>
            </select>
        </nav>
    </header>

    <main>
        <h2 id="level-display">Level 1</h2>
        <div class="game-board"></div>
    </main>

    <script src="game-engine.js"></script>
    <script src="games-app.js"></script>
</body>
</html>
