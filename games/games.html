/* ==== FILE: games.html ==== */
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geotopia - Multi-Game System</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="themes.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body data-theme="kids">
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">🌍</span>
                <h1>Geotopia</h1>
            </div>
            <div class="controls">
                <div class="control-group">
                    <label for="game-selector">Game:</label>
                    <select id="game-selector">
                        <option value="sequential-memory">Sequential Memory</option>
                        <option value="flag-memory">Flag Memory Match</option>
                        <option value="card-flip">Card Flip Game</option>
                        <option value="geography-quiz">Geography Quiz</option>
                        <option value="word-master">Word Master</option>
                        <option value="number-system">Number System Game</option>
                        <option value="treasure-run">Treasure Run</option>
                        <option value="swipe-game">Swipe / Fruit Ninja</option>
                        <option value="letter-runner">🦖 Letter Runner</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="theme-selector">Theme:</label>
                    <select id="theme-selector">
                        <option value="kids">Kids</option>
                        <option value="teen">Teen</option>
                    </select>
                </div>
            </div>
        </header>
        
        <div class="game-stats">
            <div class="stat-item">
                <span class="stat-label">Level</span>
                <span class="stat-value" id="level-display">1</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Score</span>
                <span class="stat-value" id="score-display">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Lives</span>
                <span class="stat-value" id="lives-display">❤️❤️❤️</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Time</span>
                <span class="stat-value" id="time-display">00:00</span>
            </div>
        </div>
        
        <main class="game-container">
            <div class="game-board" id="game-board"></div>
        </main>
        
        <div class="game-controls">
            <button id="start-btn" class="btn btn-primary">Start Game</button>
            <button id="restart-btn" class="btn btn-secondary">Restart</button>
            <button id="pause-btn" class="btn btn-secondary">Pause</button>
        </div>
        
        <div class="game-message" id="game-message"></div>
    </div>
    
    <div class="modal" id="game-modal">
        <div class="modal-content">
            <h2 id="modal-title">Game Over</h2>
            <p id="modal-message"></p>
            <div class="modal-stats" id="modal-stats"></div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="modal-restart">Play Again</button>
                <button class="btn btn-secondary" id="modal-close">Close</button>
            </div>
        </div>
    </div>
    
    <script src="games-data.js"></script>
    <script src="memory-engine.js"></script>
    <script src="quiz-engine.js"></script>
    <script src="sequence-engine.js"></script>
    <script src="treasure-engine.js"></script>
    <script src="swipe-engine.js"></script>
    <script src="games-app.js"></script>
</body>
</html>
