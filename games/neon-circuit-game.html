<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚡ FLOW ENERGY - Anti-Stress Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a14;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 25% 25%, rgba(120, 80, 255, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 75% 75%, rgba(255, 100, 150, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(60, 180, 220, 0.08) 0%, transparent 60%),
                linear-gradient(180deg, #08080f 0%, #0a0a14 50%, #080810 100%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: floatOrb 25s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(130, 90, 255, 0.25);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: rgba(255, 100, 160, 0.2);
            bottom: -50px;
            right: -50px;
            animation-delay: -10s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.1); }
            66% { transform: translate(-30px, 40px) scale(0.95); }
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0 10px;
        }

        .level-box {
            text-align: center;
        }

        .level-label {
            font-size: 10px;
            font-weight: 600;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .level-num {
            font-size: 48px;
            font-weight: 200;
            color: white;
            line-height: 1;
        }

        .stats-group {
            display: flex;
            gap: 20px;
        }

        .stat-box {
            text-align: center;
        }

        .stat-val {
            font-size: 22px;
            font-weight: 300;
            color: white;
        }

        .stat-lbl {
            font-size: 9px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-wrap {
            position: relative;
            width: 56px;
            height: 56px;
        }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-bg {
            fill: none;
            stroke: rgba(255,255,255,0.1);
            stroke-width: 4;
        }

        .progress-fill {
            fill: none;
            stroke: url(#grad1);
            stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.4s ease;
        }

        .progress-pct {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
            font-weight: 600;
            color: white;
        }

        .canvas-wrap {
            border-radius: 20px;
            overflow: hidden;
            background: rgba(0,0,0,0.4);
            box-shadow: 
                0 25px 80px rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(255,255,255,0.05),
                inset 0 -1px 0 rgba(0,0,0,0.3);
            padding: 12px;
        }

        #gameCanvas {
            display: block;
            border-radius: 12px;
            cursor: pointer;
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        .btn {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .btn:hover {
            background: rgba(255,255,255,0.12);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-hint {
            position: relative;
            background: linear-gradient(135deg, rgba(255,200,80,0.15), rgba(255,150,50,0.1));
            border-color: rgba(255,180,80,0.25);
        }

        .hint-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            font-size: 11px;
            font-weight: 700;
            color: #1a1a2e;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Overlays */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(8, 8, 15, 0.97);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(30px);
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .overlay-inner {
            text-align: center;
            padding: 30px;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .logo-icon {
            font-size: 90px;
            margin-bottom: 15px;
            display: block;
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { 
                transform: scale(1); 
                filter: drop-shadow(0 0 30px rgba(147, 112, 255, 0.6));
            }
            50% { 
                transform: scale(1.08); 
                filter: drop-shadow(0 0 50px rgba(255, 107, 157, 0.8));
            }
        }

        .title {
            font-size: 32px;
            font-weight: 200;
            color: white;
            letter-spacing: 10px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.45);
            letter-spacing: 3px;
            margin-bottom: 40px;
        }

        .menu-btns {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .menu-btn {
            padding: 18px 55px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            color: white;
            background: linear-gradient(135deg, rgba(130, 90, 255, 0.35), rgba(255, 90, 150, 0.25));
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            background: linear-gradient(135deg, rgba(130, 90, 255, 0.55), rgba(255, 90, 150, 0.45));
            transform: translateY(-3px);
            box-shadow: 0 20px 50px rgba(130, 90, 255, 0.35);
        }

        .menu-btn.primary {
            background: linear-gradient(135deg, rgba(130, 90, 255, 0.6), rgba(255, 90, 150, 0.5));
        }

        .win-title {
            font-size: 26px;
            font-weight: 300;
            color: white;
            letter-spacing: 5px;
            margin-bottom: 25px;
        }

        .win-stats {
            display: flex;
            gap: 45px;
            margin-bottom: 35px;
        }

        .win-stat-val {
            font-size: 38px;
            font-weight: 200;
            background: linear-gradient(135deg, #9370ff, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .win-stat-lbl {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .toast-area {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
        }

        .toast {
            padding: 14px 28px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(20px);
            animation: toastAnim 3s ease forwards;
        }

        @keyframes toastAnim {
            0% { opacity: 0; transform: translateY(20px); }
            15%, 85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-15px); }
        }

        @media (max-width: 420px) {
            .title { font-size: 24px; letter-spacing: 6px; }
            .level-num { font-size: 38px; }
            .btn { width: 46px; height: 46px; font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <svg width="0" height="0">
        <defs>
            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#9370ff"/>
                <stop offset="100%" style="stop-color:#ff6b9d"/>
            </linearGradient>
        </defs>
    </svg>

    <div class="toast-area" id="toastArea"></div>

    <!-- MENU -->
    <div class="overlay active" id="menuOverlay">
        <div class="overlay-inner">
            <span class="logo-icon">✧</span>
            <h1 class="title">FLOW ENERGY</h1>
            <p class="subtitle">Connect • Flow • Relax</p>
            <div class="menu-btns">
                <button class="menu-btn primary" id="btnStart">BEGIN JOURNEY</button>
                <button class="menu-btn" id="btnZen">ZEN MODE</button>
            </div>
        </div>
    </div>

    <!-- WIN -->
    <div class="overlay" id="winOverlay">
        <div class="overlay-inner">
            <span class="logo-icon">✨</span>
            <h1 class="win-title">PERFECT</h1>
            <div class="win-stats">
                <div>
                    <div class="win-stat-val" id="winMoves">0</div>
                    <div class="win-stat-lbl">Moves</div>
                </div>
                <div>
                    <div class="win-stat-val" id="winTime">0s</div>
                    <div class="win-stat-lbl">Time</div>
                </div>
            </div>
            <button class="menu-btn primary" id="btnNext">CONTINUE</button>
        </div>
    </div>

    <!-- GAME -->
    <div class="game-container" id="gameUI" style="display:none;">
        <div class="header">
            <div class="stats-group">
                <div class="stat-box">
                    <div class="stat-val" id="movesDisp">0</div>
                    <div class="stat-lbl">Moves</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="timeDisp">0:00</div>
                    <div class="stat-lbl">Time</div>
                </div>
            </div>

            <div class="level-box">
                <div class="level-label">Level</div>
                <div class="level-num" id="levelDisp">1</div>
            </div>

            <div class="progress-wrap">
                <svg class="progress-ring" width="56" height="56">
                    <circle class="progress-bg" cx="28" cy="28" r="24"/>
                    <circle class="progress-fill" id="progressCircle" cx="28" cy="28" r="24"
                        stroke-dasharray="150.8" stroke-dashoffset="150.8"/>
                </svg>
                <div class="progress-pct" id="progressPct">0%</div>
            </div>
        </div>

        <div class="canvas-wrap">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div class="controls">
            <button class="btn" id="btnUndo">↶</button>
            <button class="btn btn-hint" id="btnHint">
                💡
                <span class="hint-badge" id="hintBadge">3</span>
            </button>
            <button class="btn" id="btnRestart">↻</button>
            <button class="btn" id="btnMenu">☰</button>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // === AUDIO ===
        const Audio = {
            ctx: null,
            init() {
                if (this.ctx) return;
                try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } 
                catch(e) {}
            },
            play(type) {
                if (!this.ctx) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                if (type === 'rotate') {
                    osc.frequency.setValueAtTime(600, now);
                    osc.frequency.exponentialRampToValueAtTime(900, now + 0.08);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                } else if (type === 'win') {
                    [523, 659, 784, 1047].forEach((f, i) => {
                        const o = this.ctx.createOscillator();
                        const g = this.ctx.createGain();
                        o.connect(g);
                        g.connect(this.ctx.destination);
                        o.frequency.value = f;
                        const t = now + i * 0.12;
                        g.gain.setValueAtTime(0.2, t);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                        o.start(t);
                        o.stop(t + 0.3);
                    });
                } else if (type === 'connect') {
                    osc.frequency.setValueAtTime(500, now);
                    osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
                    gain.gain.setValueAtTime(0.12, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                }
            }
        };

        // === COLOR PALETTES ===
        const PALETTES = [
            { pri: '#9370ff', sec: '#ff6b9d', glow: 'rgba(147,112,255,0.6)' },
            { pri: '#00d4ff', sec: '#ff9f43', glow: 'rgba(0,212,255,0.6)' },
            { pri: '#00b894', sec: '#6c5ce7', glow: 'rgba(0,184,148,0.6)' },
            { pri: '#f9ca24', sec: '#e056fd', glow: 'rgba(249,202,36,0.6)' },
            { pri: '#fd79a8', sec: '#00cec9', glow: 'rgba(253,121,168,0.6)' }
        ];

        // === TILE TYPES ===
        // 0: empty, 1: curve, 2: straight, 3: T, 4: cross, 5: source, 6: end
        // edges: 0=top, 1=right, 2=bottom, 3=left

        const TILE_EDGES = {
            1: [ [0,1], [1,2], [2,3], [3,0] ], // curve rotations
            2: [ [0,2], [1,3] ], // straight
            3: [ [0,1,3], [0,1,2], [1,2,3], [0,2,3] ], // T-junction
            4: [ [0,1,2,3] ], // cross
            5: [ [0,1,2,3] ], // source
            6: [ [0], [1], [2], [3] ] // end
        };

        // === GAME STATE ===
        const G = {
            canvas: null,
            ctx: null,
            level: 1,
            mode: 'endless',
            moves: 0,
            hints: 3,
            startTime: 0,
            grid: [],
            size: 4,
            tileSize: 70,
            gap: 5,
            sources: [],
            ends: [],
            powered: new Set(),
            history: [],
            animating: null,
            palette: PALETTES[0],
            flowOffset: 0,
            particles: []
        };

        // === INIT ===
        function init() {
            G.canvas = document.getElementById('gameCanvas');
            G.ctx = G.canvas.getContext('2d');

            loadProgress();
            setupEvents();
            animate();
        }

        function setupEvents() {
            document.getElementById('btnStart').onclick = () => startGame('endless');
            document.getElementById('btnZen').onclick = () => startGame('zen');
            document.getElementById('btnNext').onclick = nextLevel;
            document.getElementById('btnUndo').onclick = undo;
            document.getElementById('btnHint').onclick = useHint;
            document.getElementById('btnRestart').onclick = restart;
            document.getElementById('btnMenu').onclick = showMenu;

            G.canvas.addEventListener('click', handleTap);
            G.canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = G.canvas.getBoundingClientRect();
                handleTap({ clientX: touch.clientX, clientY: touch.clientY });
            }, { passive: false });
        }

        function loadProgress() {
            try {
                const d = JSON.parse(localStorage.getItem('flowEnergySave') || '{}');
                G.level = d.level || 1;
                G.hints = d.hints !== undefined ? d.hints : 3;
            } catch(e) {}
        }

        function saveProgress() {
            try {
                localStorage.setItem('flowEnergySave', JSON.stringify({
                    level: G.level,
                    hints: G.hints
                }));
            } catch(e) {}
        }

        // === START GAME ===
        function startGame(mode) {
            Audio.init();
            G.mode = mode;
            document.getElementById('menuOverlay').classList.remove('active');
            document.getElementById('gameUI').style.display = 'flex';
            generateLevel();
        }

        function showMenu() {
            document.getElementById('gameUI').style.display = 'none';
            document.getElementById('menuOverlay').classList.add('active');
        }

        // === DIFFICULTY ===
        function getDifficulty() {
            const lvl = G.level;
            if (G.mode === 'zen') return { size: 4, ends: 2 };
            if (lvl <= 5) return { size: 3, ends: 1 };
            if (lvl <= 15) return { size: 4, ends: Math.min(3, 1 + Math.floor((lvl-5)/5)) };
            if (lvl <= 30) return { size: 5, ends: Math.min(4, 2 + Math.floor((lvl-15)/8)) };
            if (lvl <= 60) return { size: 6, ends: Math.min(5, 3 + Math.floor((lvl-30)/15)) };
            return { size: Math.min(7, 6 + Math.floor((lvl-60)/40)), ends: Math.min(6, 4 + Math.floor((lvl-60)/25)) };
        }

        // === LEVEL GENERATION ===
        function generateLevel() {
            const diff = getDifficulty();
            G.size = diff.size;
            G.moves = 0;
            G.history = [];
            G.startTime = Date.now();
            G.particles = [];
            G.palette = PALETTES[Math.floor(G.level / 5) % PALETTES.length];

            // Init empty grid
            G.grid = [];
            for (let y = 0; y < G.size; y++) {
                G.grid[y] = [];
                for (let x = 0; x < G.size; x++) {
                    G.grid[y][x] = { type: 0, rot: 0, correctRot: 0, locked: false };
                }
            }

            // Place source in center-ish
            const srcX = Math.floor(G.size / 2);
            const srcY = Math.floor(G.size / 2);
            G.sources = [{ x: srcX, y: srcY }];
            G.grid[srcY][srcX] = { type: 5, rot: 0, correctRot: 0, locked: true };

            // Generate connected path using random walk
            G.ends = [];
            const visited = new Set([`${srcX},${srcY}`]);
            const pathCells = [{ x: srcX, y: srcY }];

            generatePaths(srcX, srcY, diff.ends, visited, pathCells);

            // Assign tile types based on connections
            assignTileTypes(pathCells, visited);

            // Randomize rotations
            randomizeRotations();

            // Resize canvas
            resizeCanvas();
            updatePower();
            updateUI();
        }

        function generatePaths(startX, startY, numEnds, visited, pathCells) {
            const dirs = [
                { dx: 0, dy: -1 },
                { dx: 1, dy: 0 },
                { dx: 0, dy: 1 },
                { dx: -1, dy: 0 }
            ];

            let frontier = [{ x: startX, y: startY }];
            let endsPlaced = 0;
            let iterations = 0;
            const maxIter = G.size * G.size * 3;

            while (frontier.length > 0 && iterations < maxIter) {
                iterations++;
                const idx = Math.floor(Math.random() * frontier.length);
                const curr = frontier[idx];

                // Shuffle directions
                const shuffled = dirs.slice().sort(() => Math.random() - 0.5);
                let expanded = false;

                for (const d of shuffled) {
                    const nx = curr.x + d.dx;
                    const ny = curr.y + d.dy;
                    const key = `${nx},${ny}`;

                    if (nx >= 0 && nx < G.size && ny >= 0 && ny < G.size && !visited.has(key)) {
                        visited.add(key);
                        const cell = { x: nx, y: ny };
                        pathCells.push(cell);
                        frontier.push(cell);
                        expanded = true;

                        // Chance to place end
                        if (endsPlaced < numEnds && Math.random() < 0.35) {
                            G.ends.push(cell);
                            endsPlaced++;
                        }
                        break;
                    }
                }

                if (!expanded) {
                    frontier.splice(idx, 1);
                }
            }

            // Ensure we have enough ends
            while (G.ends.length < numEnds && pathCells.length > G.ends.length + 1) {
                for (let i = pathCells.length - 1; i >= 0; i--) {
                    const c = pathCells[i];
                    const isSource = G.sources.some(s => s.x === c.x && s.y === c.y);
                    const isEnd = G.ends.some(e => e.x === c.x && e.y === c.y);
                    if (!isSource && !isEnd) {
                        G.ends.push(c);
                        break;
                    }
                }
                if (G.ends.length >= numEnds) break;
            }
        }

        function assignTileTypes(pathCells, visited) {
            const dirs = [
                { dx: 0, dy: -1, edge: 0 },
                { dx: 1, dy: 0, edge: 1 },
                { dx: 0, dy: 1, edge: 2 },
                { dx: -1, dy: 0, edge: 3 }
            ];

            for (const cell of pathCells) {
                const isSource = G.sources.some(s => s.x === cell.x && s.y === cell.y);
                if (isSource) continue;

                const isEnd = G.ends.some(e => e.x === cell.x && e.y === cell.y);

                // Find connected neighbors
                const connEdges = [];
                for (const d of dirs) {
                    const nx = cell.x + d.dx;
                    const ny = cell.y + d.dy;
                    if (visited.has(`${nx},${ny}`)) {
                        connEdges.push(d.edge);
                    }
                }

                if (isEnd && connEdges.length >= 1) {
                    // End tile - only one connection
                    const edge = connEdges[0];
                    G.grid[cell.y][cell.x] = { type: 6, rot: edge, correctRot: edge, locked: false };
                } else {
                    const tile = findTileForEdges(connEdges);
                    G.grid[cell.y][cell.x] = tile;
                }
            }
        }

        function findTileForEdges(edges) {
            edges.sort((a, b) => a - b);
            const count = edges.length;

            if (count === 0 || count === 1) {
                // Dead end or single - make it an end piece
                const edge = edges[0] || 0;
                return { type: 6, rot: edge, correctRot: edge, locked: false };
            }

            if (count === 2) {
                const diff = Math.abs(edges[0] - edges[1]);
                if (diff === 2) {
                    // Straight
                    const rot = edges[0] === 0 ? 0 : 1;
                    return { type: 2, rot: rot, correctRot: rot, locked: false };
                } else {
                    // Curve
                    let rot = 0;
                    if (edges[0] === 0 && edges[1] === 1) rot = 0;
                    else if (edges[0] === 1 && edges[1] === 2) rot = 1;
                    else if (edges[0] === 2 && edges[1] === 3) rot = 2;
                    else if (edges[0] === 0 && edges[1] === 3) rot = 3;
                    return { type: 1, rot: rot, correctRot: rot, locked: false };
                }
            }

            if (count === 3) {
                // T-junction
                const missing = [0, 1, 2, 3].find(e => !edges.includes(e));
                const rot = (missing + 2) % 4;
                return { type: 3, rot: rot, correctRot: rot, locked: false };
            }

            if (count === 4) {
                return { type: 4, rot: 0, correctRot: 0, locked: false };
            }

            return { type: 0, rot: 0, correctRot: 0, locked: false };
        }

        function randomizeRotations() {
            for (let y = 0; y < G.size; y++) {
                for (let x = 0; x < G.size; x++) {
                    const tile = G.grid[y][x];
                    if (!tile.locked && tile.type > 0 && tile.type < 5) {
                        const maxRot = TILE_EDGES[tile.type].length;
                        let newRot;
                        do {
                            newRot = Math.floor(Math.random() * maxRot);
                        } while (newRot === tile.correctRot && Math.random() > 0.25);
                        tile.rot = newRot;
                    }
                }
            }
        }

        function resizeCanvas() {
            const maxW = Math.min(window.innerWidth - 50, 420);
            const maxH = Math.min(window.innerHeight - 320, 420);
            const maxSize = Math.min(maxW, maxH);

            G.tileSize = Math.floor((maxSize - (G.size - 1) * G.gap) / G.size);
            G.tileSize = Math.max(45, Math.min(80, G.tileSize));

            const total = G.size * G.tileSize + (G.size - 1) * G.gap;
            G.canvas.width = total;
            G.canvas.height = total;
        }

        // === INPUT ===
        function handleTap(e) {
            if (G.animating) return;
            const rect = G.canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const gx = Math.floor(x / (G.tileSize + G.gap));
            const gy = Math.floor(y / (G.tileSize + G.gap));

            if (gx >= 0 && gx < G.size && gy >= 0 && gy < G.size) {
                rotateTile(gx, gy);
            }
        }

        function rotateTile(x, y) {
            const tile = G.grid[y][x];
            if (tile.locked || tile.type === 0) return;

            G.history.push({ x, y, rot: tile.rot });

            const maxRot = TILE_EDGES[tile.type].length;
            const oldRot = tile.rot;
            tile.rot = (tile.rot + 1) % maxRot;
            G.moves++;

            G.animating = { x, y, from: oldRot, to: tile.rot, progress: 0 };

            Audio.play('rotate');
            emitParticles(x, y, 6);

            setTimeout(() => {
                G.animating = null;
                const prevPowered = G.powered.size;
                updatePower();
                if (G.powered.size > prevPowered) {
                    Audio.play('connect');
                }
                checkWin();
            }, 120);

            updateUI();
        }

        // === POWER ===
        function updatePower() {
            G.powered = new Set();
            const dirs = [
                { dx: 0, dy: -1, edge: 0, opp: 2 },
                { dx: 1, dy: 0, edge: 1, opp: 3 },
                { dx: 0, dy: 1, edge: 2, opp: 0 },
                { dx: -1, dy: 0, edge: 3, opp: 1 }
            ];

            for (const src of G.sources) {
                const queue = [src];
                const visited = new Set([`${src.x},${src.y}`]);
                G.powered.add(`${src.x},${src.y}`);

                while (queue.length > 0) {
                    const curr = queue.shift();
                    const tile = G.grid[curr.y][curr.x];
                    const edges = getTileEdges(tile);

                    for (const d of dirs) {
                        if (!edges.includes(d.edge)) continue;

                        const nx = curr.x + d.dx;
                        const ny = curr.y + d.dy;
                        const key = `${nx},${ny}`;

                        if (nx < 0 || nx >= G.size || ny < 0 || ny >= G.size) continue;
                        if (visited.has(key)) continue;

                        const neighbor = G.grid[ny][nx];
                        const neighborEdges = getTileEdges(neighbor);

                        if (neighborEdges.includes(d.opp)) {
                            visited.add(key);
                            G.powered.add(key);
                            queue.push({ x: nx, y: ny });
                        }
                    }
                }
            }

            updateUI();
        }

        function getTileEdges(tile) {
            if (tile.type === 0) return [];
            const rotations = TILE_EDGES[tile.type];
            if (!rotations) return [];
            return rotations[tile.rot % rotations.length] || [];
        }

        // === WIN CHECK ===
        function checkWin() {
            const allLit = G.ends.every(e => G.powered.has(`${e.x},${e.y}`));
            if (allLit && G.ends.length > 0) {
                onWin();
            }
        }

        function onWin() {
            Audio.play('win');

            // Celebration particles
            for (let i = 0; i < 25; i++) {
                setTimeout(() => {
                    emitParticles(Math.random() * G.size, Math.random() * G.size, 10);
                }, i * 40);
            }

            const elapsed = Math.floor((Date.now() - G.startTime) / 1000);

            setTimeout(() => {
                document.getElementById('winMoves').textContent = G.moves;
                document.getElementById('winTime').textContent = elapsed + 's';
                document.getElementById('winOverlay').classList.add('active');
            }, 700);

            saveProgress();
        }

        function nextLevel() {
            document.getElementById('winOverlay').classList.remove('active');
            G.level++;

            if (G.level % 10 === 0) {
                G.hints = Math.min(G.hints + 1, 10);
                toast('✨ Bonus hint earned!');
            }

            generateLevel();
            saveProgress();
        }

        // === CONTROLS ===
        function undo() {
            if (G.history.length === 0) return;
            const last = G.history.pop();
            G.grid[last.y][last.x].rot = last.rot;
            G.moves = Math.max(0, G.moves - 1);
            updatePower();
            updateUI();
        }

        function useHint() {
            if (G.hints <= 0) {
                toast('No hints remaining!');
                return;
            }

            for (let y = 0; y < G.size; y++) {
                for (let x = 0; x < G.size; x++) {
                    const tile = G.grid[y][x];
                    if (!tile.locked && tile.type > 0 && tile.type < 5) {
                        if (tile.rot !== tile.correctRot) {
                            tile.rot = tile.correctRot;
                            G.hints--;
                            emitParticles(x, y, 15);
                            updatePower();
                            checkWin();
                            updateUI();
                            saveProgress();
                            return;
                        }
                    }
                }
            }
            toast('All tiles correct!');
        }

        function restart() {
            randomizeRotations();
            G.moves = 0;
            G.history = [];
            G.startTime = Date.now();
            updatePower();
            updateUI();
        }

        function toast(msg) {
            const area = document.getElementById('toastArea');
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            area.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // === UI ===
        function updateUI() {
            document.getElementById('levelDisp').textContent = G.level;
            document.getElementById('movesDisp').textContent = G.moves;
            document.getElementById('hintBadge').textContent = G.hints;

            const lit = G.ends.filter(e => G.powered.has(`${e.x},${e.y}`)).length;
            const total = G.ends.length || 1;
            const pct = Math.round((lit / total) * 100);

            document.getElementById('progressPct').textContent = pct + '%';
            const circ = 2 * Math.PI * 24;
            document.getElementById('progressCircle').style.strokeDashoffset = circ - (pct / 100) * circ;
        }

        function updateTimer() {
            if (!G.startTime) return;
            const elapsed = Math.floor((Date.now() - G.startTime) / 1000);
            const m = Math.floor(elapsed / 60);
            const s = elapsed % 60;
            document.getElementById('timeDisp').textContent = `${m}:${s.toString().padStart(2, '0')}`;
        }

        // === PARTICLES ===
        function emitParticles(gx, gy, count) {
            const x = gx * (G.tileSize + G.gap) + G.tileSize / 2;
            const y = gy * (G.tileSize + G.gap) + G.tileSize / 2;

            for (let i = 0; i < count; i++) {
                G.particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1,
                    color: Math.random() > 0.5 ? G.palette.pri : G.palette.sec,
                    size: 2 + Math.random() * 4
                });
            }
        }

        function updateParticles() {
            G.particles = G.particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.94;
                p.vy *= 0.94;
                p.life -= 0.03;
                return p.life > 0;
            });
        }

        // === RENDERING ===
        function render() {
            const ctx = G.ctx;
            if (!G.grid.length) return;

            ctx.clearRect(0, 0, G.canvas.width, G.canvas.height);
            G.flowOffset = (G.flowOffset + 0.025) % 1;

            // Draw tiles
            for (let y = 0; y < G.size; y++) {
                for (let x = 0; x < G.size; x++) {
                    drawTile(x, y);
                }
            }

            // Draw particles
            updateParticles();
            G.particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        function drawTile(gx, gy) {
            const ctx = G.ctx;
            const tile = G.grid[gy][gx];
            const ts = G.tileSize;
            const gap = G.gap;
            const x = gx * (ts + gap);
            const y = gy * (ts + gap);
            const pal = G.palette;
            const isPowered = G.powered.has(`${gx},${gy}`);

            // Background
            ctx.fillStyle = 'rgba(255,255,255,0.035)';
            ctx.beginPath();
            ctx.roundRect(x, y, ts, ts, 10);
            ctx.fill();

            if (tile.type === 0) return;

            ctx.save();
            ctx.translate(x + ts / 2, y + ts / 2);

            // Rotation (with animation)
            let angle = 0;
            const maxRot = TILE_EDGES[tile.type] ? TILE_EDGES[tile.type].length : 4;

            if (G.animating && G.animating.x === gx && G.animating.y === gy) {
                G.animating.progress = Math.min(1, G.animating.progress + 0.15);
                const ease = 1 - Math.pow(1 - G.animating.progress, 3);
                const fromAngle = (G.animating.from / maxRot) * Math.PI * 2;
                const toAngle = (G.animating.to / maxRot) * Math.PI * 2;
                angle = fromAngle + (toAngle - fromAngle) * ease;
            } else {
                angle = (tile.rot / maxRot) * Math.PI * 2;
            }

            ctx.rotate(angle);

            const baseCol = isPowered ? pal.pri : 'rgba(100,100,130,0.5)';
            const half = ts / 2 - 10;
            const pipeW = ts * 0.16;

            if (isPowered) {
                ctx.shadowColor = pal.glow;
                ctx.shadowBlur = 18;
            }

            ctx.lineCap = 'round';
            ctx.lineWidth = pipeW;

            switch (tile.type) {
                case 1: drawCurve(ctx, half, pipeW, baseCol, isPowered, pal); break;
                case 2: drawStraight(ctx, half, pipeW, baseCol, isPowered, pal); break;
                case 3: drawTJunction(ctx, half, pipeW, baseCol, isPowered, pal); break;
                case 4: drawCross(ctx, half, pipeW, baseCol, isPowered, pal); break;
                case 5: 
                    ctx.rotate(-angle);
                    drawSource(ctx, half, pipeW, pal); 
                    break;
                case 6: drawEnd(ctx, half, pipeW, baseCol, isPowered, pal); break;
            }

            ctx.restore();

            // Lock icon
            if (tile.locked && tile.type !== 5) {
                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                ctx.font = '11px Arial';
                ctx.fillText('🔒', x + ts - 16, y + 13);
            }
        }

        function drawCurve(ctx, half, pw, col, powered, pal) {
            ctx.beginPath();
            ctx.moveTo(0, -half - pw / 2);
            ctx.quadraticCurveTo(0, 0, half + pw / 2, 0);

            if (powered) {
                const grad = ctx.createLinearGradient(0, -half, half, 0);
                grad.addColorStop(0, pal.pri);
                grad.addColorStop(1, pal.sec);
                ctx.strokeStyle = grad;
            } else {
                ctx.strokeStyle = col;
            }
            ctx.stroke();

            // Inner glow
            if (powered) {
                ctx.lineWidth = pw * 0.35;
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath();
                ctx.moveTo(0, -half);
                ctx.quadraticCurveTo(0, 0, half, 0);
                ctx.stroke();
                ctx.lineWidth = pw;

                drawFlowDots(ctx, [
                    { x: 0, y: -half }, { x: 0, y: -half * 0.3 },
                    { x: half * 0.3, y: 0 }, { x: half, y: 0 }
                ]);
            }

            drawCap(ctx, 0, -half, pw * 0.5, col, powered, pal);
            drawCap(ctx, half, 0, pw * 0.5, col, powered, pal);
        }

        function drawStraight(ctx, half, pw, col, powered, pal) {
            ctx.beginPath();
            ctx.moveTo(0, -half - pw / 2);
            ctx.lineTo(0, half + pw / 2);

            if (powered) {
                const grad = ctx.createLinearGradient(0, -half, 0, half);
                grad.addColorStop(0, pal.pri);
                grad.addColorStop(0.5, pal.sec);
                grad.addColorStop(1, pal.pri);
                ctx.strokeStyle = grad;
            } else {
                ctx.strokeStyle = col;
            }
            ctx.stroke();

            if (powered) {
                ctx.lineWidth = pw * 0.3;
                ctx.strokeStyle = 'rgba(255,255,255,0.35)';
                ctx.beginPath();
                ctx.moveTo(0, -half);
                ctx.lineTo(0, half);
                ctx.stroke();
                ctx.lineWidth = pw;

                drawFlowDots(ctx, [{ x: 0, y: -half }, { x: 0, y: 0 }, { x: 0, y: half }]);
            }

            drawCap(ctx, 0, -half, pw * 0.5, col, powered, pal);
            drawCap(ctx, 0, half, pw * 0.5, col, powered, pal);
        }

        function drawTJunction(ctx, half, pw, col, powered, pal) {
            // Horizontal
            ctx.beginPath();
            ctx.moveTo(-half - pw / 2, 0);
            ctx.lineTo(half + pw / 2, 0);
            if (powered) {
                const grad = ctx.createLinearGradient(-half, 0, half, 0);
                grad.addColorStop(0, pal.pri);
                grad.addColorStop(0.5, pal.sec);
                grad.addColorStop(1, pal.pri);
                ctx.strokeStyle = grad;
            } else {
                ctx.strokeStyle = col;
            }
            ctx.stroke();

            // Up
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -half - pw / 2);
            ctx.stroke();

            // Center
            ctx.beginPath();
            ctx.arc(0, 0, pw * 0.55, 0, Math.PI * 2);
            ctx.fillStyle = powered ? pal.sec : col;
            ctx.fill();

            if (powered) {
                ctx.beginPath();
                ctx.arc(0, 0, pw * 0.25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.fill();
            }

            drawCap(ctx, -half, 0, pw * 0.5, col, powered, pal);
            drawCap(ctx, half, 0, pw * 0.5, col, powered, pal);
            drawCap(ctx, 0, -half, pw * 0.5, col, powered, pal);
        }

        function drawCross(ctx, half, pw, col, powered, pal) {
            // Vertical
            ctx.beginPath();
            ctx.moveTo(0, -half - pw / 2);
            ctx.lineTo(0, half + pw / 2);
            if (powered) {
                const grad = ctx.createLinearGradient(0, -half, 0, half);
                grad.addColorStop(0, pal.pri);
                grad.addColorStop(0.5, pal.sec);
                grad.addColorStop(1, pal.pri);
                ctx.strokeStyle = grad;
            } else {
                ctx.strokeStyle = col;
            }
            ctx.stroke();

            // Horizontal
            ctx.beginPath();
            ctx.moveTo(-half - pw / 2, 0);
            ctx.lineTo(half + pw / 2, 0);
            ctx.stroke();

            // Center
            ctx.beginPath();
            ctx.arc(0, 0, pw * 0.6, 0, Math.PI * 2);
            ctx.fillStyle = powered ? pal.sec : col;
            ctx.fill();

            if (powered) {
                ctx.beginPath();
                ctx.arc(0, 0, pw * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.fill();
            }

            drawCap(ctx, 0, -half, pw * 0.5, col, powered, pal);
            drawCap(ctx, 0, half, pw * 0.5, col, powered, pal);
            drawCap(ctx, -half, 0, pw * 0.5, col, powered, pal);
            drawCap(ctx, half, 0, pw * 0.5, col, powered, pal);
        }

        function drawSource(ctx, half, pw, pal) {
            // Outer glow
            const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, half * 0.9);
            grad.addColorStop(0, pal.pri);
            grad.addColorStop(0.6, pal.sec);
            grad.addColorStop(1, 'rgba(0,0,0,0)');

            ctx.beginPath();
            ctx.arc(0, 0, half * 0.85, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // Pulsing core
            const pulse = 0.85 + Math.sin(Date.now() / 180) * 0.15;
            ctx.beginPath();
            ctx.arc(0, 0, half * 0.4 * pulse, 0, Math.PI * 2);
            ctx.fillStyle = pal.pri;
            ctx.shadowColor = pal.pri;
            ctx.shadowBlur = 25;
            ctx.fill();

            // White center
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(0, 0, half * 0.18, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.fill();

            // Connection dots
            [[0, -1], [1, 0], [0, 1], [-1, 0]].forEach(([dx, dy]) => {
                ctx.beginPath();
                ctx.arc(dx * half * 0.7, dy * half * 0.7, pw * 0.35, 0, Math.PI * 2);
                ctx.fillStyle = pal.sec;
                ctx.fill();
            });
        }

        function drawEnd(ctx, half, pw, col, powered, pal) {
            // Pipe to center
            ctx.beginPath();
            ctx.moveTo(0, -half - pw / 2);
            ctx.lineTo(0, -half * 0.3);

            if (powered) {
                const grad = ctx.createLinearGradient(0, -half, 0, 0);
                grad.addColorStop(0, pal.pri);
                grad.addColorStop(1, pal.sec);
                ctx.strokeStyle = grad;
            } else {
                ctx.strokeStyle = col;
            }
            ctx.stroke();

            // Bulb
            const r = half * 0.45;

            if (powered) {
                // Outer glow
                const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 1.8);
                glow.addColorStop(0, 'rgba(255,230,100,0.7)');
                glow.addColorStop(0.5, 'rgba(255,200,50,0.25)');
                glow.addColorStop(1, 'transparent');

                ctx.beginPath();
                ctx.arc(0, 0, r * 1.8, 0, Math.PI * 2);
                ctx.fillStyle = glow;
                ctx.fill();
            }

            // Main bulb
            const bulbGrad = ctx.createRadialGradient(-r * 0.25, -r * 0.25, 0, 0, 0, r);
            if (powered) {
                bulbGrad.addColorStop(0, '#fffbe6');
                bulbGrad.addColorStop(0.4, '#ffe066');
                bulbGrad.addColorStop(1, '#ffb300');
            } else {
                bulbGrad.addColorStop(0, 'rgba(130,130,150,0.7)');
                bulbGrad.addColorStop(1, 'rgba(80,80,100,0.5)');
            }

            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fillStyle = bulbGrad;
            ctx.fill();

            // Highlight
            if (powered) {
                ctx.beginPath();
                ctx.arc(-r * 0.2, -r * 0.2, r * 0.25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.fill();
            }

            drawCap(ctx, 0, -half, pw * 0.5, col, powered, pal);
        }

        function drawCap(ctx, x, y, r, col, powered, pal) {
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = powered ? pal.sec : col;
            ctx.fill();

            if (powered) {
                ctx.beginPath();
                ctx.arc(x, y, r * 0.45, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.45)';
                ctx.fill();
            }
        }

        function drawFlowDots(ctx, points) {
            const offset = G.flowOffset;

            for (let t = 0; t < 1; t += 0.2) {
                const pos = (t + offset) % 1;
                const idx = Math.floor(pos * (points.length - 1));
                const localT = (pos * (points.length - 1)) % 1;

                if (idx < points.length - 1) {
                    const px = points[idx].x + (points[idx + 1].x - points[idx].x) * localT;
                    const py = points[idx].y + (points[idx + 1].y - points[idx].y) * localT;

                    ctx.beginPath();
                    ctx.arc(px, py, 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.75)';
                    ctx.fill();
                }
            }
        }

        // === ANIMATION LOOP ===
        function animate() {
            render();
            updateTimer();
            requestAnimationFrame(animate);
        }

        // Start
        init();
    })();
    </script>
</body>
