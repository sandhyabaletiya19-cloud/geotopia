<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Energy - Connect Lights</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 350px;
        }

        .level-text {
            font-size: 16px;
            color: rgba(255,255,255,0.6);
        }

        .level-num {
            font-size: 28px;
            font-weight: 600;
            color: #fff;
        }

        .moves-text {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
        }

        #gameCanvas {
            border-radius: 16px;
            background: #12121f;
            cursor: pointer;
        }

        .buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:active {
            background: rgba(255,255,255,0.2);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(20,20,35,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .overlay h1 {
            font-size: 32px;
            font-weight: 300;
            color: #fff;
            margin-bottom: 10px;
        }

        .overlay p {
            font-size: 16px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 30px;
        }

        .overlay .btn {
            padding: 15px 40px;
            font-size: 16px;
        }

        .complete-text {
            color: #4ade80;
        }
    </style>
</head>
<body>
    <div class="overlay show" id="startScreen">
        <h1>Energy</h1>
        <p>Connect all lights to the power source</p>
        <button class="btn" id="startBtn">Start</button>
    </div>

    <div class="overlay" id="winScreen">
        <h1 class="complete-text">Complete!</h1>
        <p id="winInfo">Level 1</p>
        <button class="btn" id="nextBtn">Next Level</button>
    </div>

    <div class="container" id="gameArea" style="display:none;">
        <div class="header">
            <div>
                <div class="level-text">Level</div>
                <div class="level-num" id="levelNum">1</div>
            </div>
            <div style="text-align:right;">
                <div class="moves-text">Moves</div>
                <div class="level-num" id="movesNum">0</div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="buttons">
            <button class="btn" id="restartBtn">Restart</button>
            <button class="btn" id="menuBtn">Menu</button>
        </div>
    </div>

    <script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game state
        let level = 1;
        let moves = 0;
        let grid = [];
        let gridSize = 4;
        let tileSize = 70;
        let padding = 15;

        // Colors
        const DARK = '#12121f';
        const UNPOWERED = '#3a3a5c';
        const POWERED = '#4ade80';
        const POWERED_GLOW = 'rgba(74, 222, 128, 0.3)';
        const SOURCE_COLOR = '#fbbf24';

        // Tile types: 0=empty, 1=line, 2=curve, 3=source, 4=bulb
        // Edges: 0=top, 1=right, 2=bottom, 3=left

        // Edge connections for each tile type and rotation
        // Line: connects opposite edges
        // Curve: connects adjacent edges
        const TILE_CONNECTIONS = {
            1: { // Line
                0: [0, 2], // vertical
                1: [1, 3], // horizontal
                2: [0, 2],
                3: [1, 3]
            },
            2: { // Curve
                0: [0, 1], // top-right
                1: [1, 2], // right-bottom
                2: [2, 3], // bottom-left
                3: [3, 0]  // left-top
            },
            3: { // Source - connects all
                0: [0, 1, 2, 3]
            },
            4: { // Bulb - single connection
                0: [0],
                1: [1],
                2: [2],
                3: [3]
            }
        };

        // Direction helpers
        const DIR = [
            { dx: 0, dy: -1, edge: 0, opp: 2 }, // top
            { dx: 1, dy: 0, edge: 1, opp: 3 },  // right
            { dx: 0, dy: 1, edge: 2, opp: 0 },  // bottom
            { dx: -1, dy: 0, edge: 3, opp: 1 }  // left
        ];

        function getConnections(tile) {
            if (!tile || tile.type === 0) return [];
            const conns = TILE_CONNECTIONS[tile.type];
            if (!conns) return [];
            const rotations = Object.keys(conns).length;
            return conns[tile.rot % rotations] || [];
        }

        function hasEdge(tile, edge) {
            return getConnections(tile).includes(edge);
        }

        // Generate a solvable puzzle
        function generatePuzzle() {
            grid = [];
            for (let y = 0; y < gridSize; y++) {
                grid[y] = [];
                for (let x = 0; x < gridSize; x++) {
                    grid[y][x] = { type: 0, rot: 0, powered: false };
                }
            }

            // Place source in center
            const srcX = Math.floor(gridSize / 2);
            const srcY = Math.floor(gridSize / 2);
            grid[srcY][srcX] = { type: 3, rot: 0, powered: true, isSource: true };

            // Build a tree from source using DFS
            const visited = new Set();
            visited.add(`${srcX},${srcY}`);
            const connections = {}; // Store which edges each cell needs

            function addConnection(x, y, edge) {
                const key = `${x},${y}`;
                if (!connections[key]) connections[key] = [];
                if (!connections[key].includes(edge)) connections[key].push(edge);
            }

            // DFS to create spanning tree
            const stack = [{ x: srcX, y: srcY }];
            const cells = [{ x: srcX, y: srcY }];

            while (stack.length > 0) {
                const curr = stack[stack.length - 1];
                const neighbors = [];

                for (const d of DIR) {
                    const nx = curr.x + d.dx;
                    const ny = curr.y + d.dy;
                    if (nx >= 0 && nx < gridSize && ny >= 0 && ny < gridSize) {
                        if (!visited.has(`${nx},${ny}`)) {
                            neighbors.push({ x: nx, y: ny, dir: d });
                        }
                    }
                }

                if (neighbors.length > 0) {
                    // Pick random neighbor
                    const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    visited.add(`${next.x},${next.y}`);
                    cells.push({ x: next.x, y: next.y });
                    stack.push({ x: next.x, y: next.y });

                    // Record connections
                    addConnection(curr.x, curr.y, next.dir.edge);
                    addConnection(next.x, next.y, next.dir.opp);
                } else {
                    stack.pop();
                }
            }

            // Assign tile types based on connections
            for (const cell of cells) {
                if (cell.x === srcX && cell.y === srcY) continue;

                const key = `${cell.x},${cell.y}`;
                const edges = connections[key] || [];
                edges.sort((a, b) => a - b);

                if (edges.length === 1) {
                    // Bulb (endpoint)
                    grid[cell.y][cell.x] = {
                        type: 4,
                        rot: edges[0],
                        correctRot: edges[0],
                        powered: false,
                        isBulb: true
                    };
                } else if (edges.length === 2) {
                    // Check if straight or curve
                    const diff = Math.abs(edges[0] - edges[1]);
                    if (diff === 2) {
                        // Straight line
                        const rot = edges[0] === 0 ? 0 : 1;
                        grid[cell.y][cell.x] = {
                            type: 1,
                            rot: rot,
                            correctRot: rot,
                            powered: false
                        };
                    } else {
                        // Curve
                        let rot = 0;
                        if (edges[0] === 0 && edges[1] === 1) rot = 0;
                        else if (edges[0] === 1 && edges[1] === 2) rot = 1;
                        else if (edges[0] === 2 && edges[1] === 3) rot = 2;
                        else if (edges[0] === 0 && edges[1] === 3) rot = 3;
                        
                        grid[cell.y][cell.x] = {
                            type: 2,
                            rot: rot,
                            correctRot: rot,
                            powered: false
                        };
                    }
                }
            }

            // Randomize rotations
            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    const tile = grid[y][x];
                    if (tile.type === 1 || tile.type === 2 || tile.type === 4) {
                        const maxRot = tile.type === 1 ? 2 : 4;
                        // Ensure at least one rotation away from correct
                        let newRot;
                        do {
                            newRot = Math.floor(Math.random() * maxRot);
                        } while (newRot === tile.correctRot && Math.random() > 0.2);
                        tile.rot = newRot;
                    }
                }
            }

            updatePower();
        }

        // Update power state using BFS from source
        function updatePower() {
            // Reset all power
            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    if (!grid[y][x].isSource) {
                        grid[y][x].powered = false;
                    }
                }
            }

            // BFS from source
            const queue = [];
            const visited = new Set();

            // Find source
            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    if (grid[y][x].isSource) {
                        queue.push({ x, y });
                        visited.add(`${x},${y}`);
                    }
                }
            }

            while (queue.length > 0) {
                const curr = queue.shift();
                const tile = grid[curr.y][curr.x];
                const myEdges = getConnections(tile);

                for (const d of DIR) {
                    if (!myEdges.includes(d.edge)) continue;

                    const nx = curr.x + d.dx;
                    const ny = curr.y + d.dy;

                    if (nx < 0 || nx >= gridSize || ny < 0 || ny >= gridSize) continue;
                    if (visited.has(`${nx},${ny}`)) continue;

                    const neighbor = grid[ny][nx];
                    if (neighbor.type === 0) continue;

                    const neighborEdges = getConnections(neighbor);
                    if (neighborEdges.includes(d.opp)) {
                        visited.add(`${nx},${ny}`);
                        neighbor.powered = true;
                        queue.push({ x: nx, y: ny });
                    }
                }
            }
        }

        // Check if all bulbs are powered
        function checkWin() {
            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    const tile = grid[y][x];
                    if (tile.isBulb && !tile.powered) {
                        return false;
                    }
                }
            }
            return true;
        }

        // Handle tap/click
        function handleClick(e) {
            const rect = canvas.getBoundingClientRect();
            const clickX = (e.clientX || e.touches[0].clientX) - rect.left;
            const clickY = (e.clientY || e.touches[0].clientY) - rect.top;

            const gx = Math.floor((clickX - padding) / tileSize);
            const gy = Math.floor((clickY - padding) / tileSize);

            if (gx >= 0 && gx < gridSize && gy >= 0 && gy < gridSize) {
                const tile = grid[gy][gx];
                if (tile.type !== 0 && tile.type !== 3) {
                    // Rotate
                    const maxRot = tile.type === 1 ? 2 : 4;
                    tile.rot = (tile.rot + 1) % maxRot;
                    moves++;
                    
                    playSound('click');
                    updatePower();
                    render();
                    updateUI();

                    if (checkWin()) {
                        setTimeout(() => {
                            playSound('win');
                            showWin();
                        }, 300);
                    }
                }
            }
        }

        // Simple sound
        let audioCtx = null;
        function playSound(type) {
            if (!audioCtx) {
                try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
                catch(e) { return; }
            }
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'click') {
                osc.frequency.value = 600;
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'win') {
                [523, 659, 784].forEach((f, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.frequency.value = f;
                    const t = audioCtx.currentTime + i * 0.15;
                    g.gain.setValueAtTime(0.15, t);
                    g.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                    o.start(t);
                    o.stop(t + 0.3);
                });
            }
        }

        // Render
        function render() {
            const w = gridSize * tileSize + padding * 2;
            canvas.width = w;
            canvas.height = w;

            ctx.fillStyle = DARK;
            ctx.fillRect(0, 0, w, w);

            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    drawTile(x, y);
                }
            }
        }

        function drawTile(gx, gy) {
            const tile = grid[gy][gx];
            const x = padding + gx * tileSize;
            const y = padding + gy * tileSize;
            const cx = x + tileSize / 2;
            const cy = y + tileSize / 2;
            const r = tileSize * 0.35; // radius for curves
            const lineW = tileSize * 0.12;

            ctx.save();
            ctx.translate(cx, cy);

            const color = tile.powered || tile.isSource ? POWERED : UNPOWERED;

            // Add glow for powered tiles
            if (tile.powered || tile.isSource) {
                ctx.shadowColor = POWERED_GLOW;
                ctx.shadowBlur = 15;
            }

            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = lineW;
            ctx.lineCap = 'round';

            if (tile.type === 1) {
                // Straight line
                ctx.rotate(tile.rot * Math.PI / 2);
                ctx.beginPath();
                ctx.moveTo(0, -tileSize / 2);
                ctx.lineTo(0, tileSize / 2);
                ctx.stroke();
            } else if (tile.type === 2) {
                // Curved corner
                ctx.rotate(tile.rot * Math.PI / 2);
                ctx.beginPath();
                ctx.moveTo(0, -tileSize / 2);
                ctx.lineTo(0, -r);
                ctx.quadraticCurveTo(0, 0, r, 0);
                ctx.lineTo(tileSize / 2, 0);
                ctx.stroke();
            } else if (tile.type === 3) {
                // Source - circle
                ctx.fillStyle = tile.powered ? SOURCE_COLOR : UNPOWERED;
                ctx.strokeStyle = tile.powered ? SOURCE_COLOR : UNPOWERED;
                if (tile.powered) {
                    ctx.shadowColor = 'rgba(251, 191, 36, 0.4)';
                }
                
                ctx.beginPath();
                ctx.arc(0, 0, tileSize * 0.25, 0, Math.PI * 2);
                ctx.fill();

                // Connection stubs
                ctx.lineWidth = lineW * 0.8;
                for (let i = 0; i < 4; i++) {
                    ctx.save();
                    ctx.rotate(i * Math.PI / 2);
                    ctx.beginPath();
                    ctx.moveTo(0, -tileSize * 0.25);
                    ctx.lineTo(0, -tileSize * 0.4);
                    ctx.stroke();
                    ctx.restore();
                }
            } else if (tile.type === 4) {
                // Bulb
                ctx.rotate(tile.rot * Math.PI / 2);
                
                // Line to bulb
                ctx.beginPath();
                ctx.moveTo(0, -tileSize / 2);
                ctx.lineTo(0, -tileSize * 0.2);
                ctx.stroke();

                // Bulb circle
                const bulbR = tileSize * 0.18;
                ctx.beginPath();
                ctx.arc(0, 0, bulbR, 0, Math.PI * 2);
                ctx.fill();

                // Inner highlight when powered
                if (tile.powered) {
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.beginPath();
                    ctx.arc(-bulbR * 0.25, -bulbR * 0.25, bulbR * 0.35, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            ctx.restore();
        }

        function updateUI() {
            document.getElementById('levelNum').textContent = level;
            document.getElementById('movesNum').textContent = moves;
        }

        function showWin() {
            document.getElementById('winInfo').textContent = `Level ${level} - ${moves} moves`;
            document.getElementById('winScreen').classList.add('show');
        }

        function startGame() {
            moves = 0;
            gridSize = getDifficultySize();
            generatePuzzle();
            render();
            updateUI();
            
            document.getElementById('startScreen').classList.remove('show');
            document.getElementById('gameArea').style.display = 'flex';
        }

        function nextLevel() {
            level++;
            moves = 0;
            gridSize = getDifficultySize();
            generatePuzzle();
            render();
            updateUI();
            
            document.getElementById('winScreen').classList.remove('show');
        }

        function restart() {
            moves = 0;
            // Re-randomize rotations
            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    const tile = grid[y][x];
                    if (tile.type === 1 || tile.type === 2 || tile.type === 4) {
                        const maxRot = tile.type === 1 ? 2 : 4;
                        tile.rot = Math.floor(Math.random() * maxRot);
                    }
                }
            }
            updatePower();
            render();
            updateUI();
        }

        function showMenu() {
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('startScreen').classList.add('show');
        }

        function getDifficultySize() {
            if (level <= 3) return 3;
            if (level <= 8) return 4;
            if (level <= 15) return 5;
            if (level <= 25) return 6;
            return Math.min(7, 6 + Math.floor((level - 25) / 15));
        }

        // Event listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('nextBtn').addEventListener('click', nextLevel);
        document.getElementById('restartBtn').addEventListener('click', restart);
        document.getElementById('menuBtn').addEventListener('click', showMenu);

        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick(e);
        }, { passive: false });

        // Load saved progress
        try {
            const saved = localStorage.getItem('energyLevel');
            if (saved) level = parseInt(saved) || 1;
        } catch(e) {}

        // Save on level complete
        const origNext = nextLevel;
        nextLevel = function() {
            origNext();
            try { localStorage.setItem('energyLevel', level); } catch(e) {}
        };

    })();
    </script>
</body>
</html>
