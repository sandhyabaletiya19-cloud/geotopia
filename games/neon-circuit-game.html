<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚡ FLOW ENERGY - Anti-Stress Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        :root {
            --bg-dark: #0d0d1a;
            --bg-card: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at 30% 20%, rgba(120, 80, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(255, 100, 150, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 50%, rgba(80, 200, 255, 0.05) 0%, transparent 60%),
                        linear-gradient(180deg, #0a0a15 0%, #0d0d1a 50%, #0a0a12 100%);
        }

        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            animation: orbFloat 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(147, 112, 255, 0.4) 0%, transparent 70%);
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(255, 107, 157, 0.3) 0%, transparent 70%);
            bottom: 20%;
            right: 10%;
            animation-delay: -7s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(78, 205, 196, 0.3) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -20px) scale(1.1); }
            50% { transform: translate(-20px, 30px) scale(0.9); }
            75% { transform: translate(20px, 20px) scale(1.05); }
        }

        /* Game Container */
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            max-width: 100vw;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
        }

        .level-info {
            text-align: center;
        }

        .level-label {
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .level-number {
            font-size: 42px;
            font-weight: 200;
            color: white;
            line-height: 1;
        }

        .stats-row {
            display: flex;
            gap: 25px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 300;
            color: white;
        }

        .stat-label {
            font-size: 9px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Progress Ring */
        .progress-ring-container {
            position: relative;
            width: 60px;
            height: 60px;
        }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-ring-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 3;
        }

        .progress-ring-fill {
            fill: none;
            stroke: url(#progressGradient);
            stroke-width: 3;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: 500;
            color: white;
        }

        /* Canvas Container */
        .canvas-container {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        #gameCanvas {
            display: block;
            cursor: pointer;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 12px;
        }

        .ctrl-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .ctrl-btn:active {
            transform: scale(0.95);
        }

        .ctrl-btn.hint-btn {
            position: relative;
            background: linear-gradient(135deg, rgba(255, 200, 100, 0.15), rgba(255, 150, 50, 0.1));
            border-color: rgba(255, 180, 80, 0.3);
        }

        .hint-count {
            position: absolute;
            top: -5px;
            right: -5px;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            font-size: 10px;
            font-weight: 600;
            color: #1a1a2e;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Overlays */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 20, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(20px);
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .overlay-content {
            text-align: center;
            padding: 40px;
        }

        .menu-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: iconPulse 3s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(147, 112, 255, 0.5)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(147, 112, 255, 0.8)); }
        }

        .menu-title {
            font-size: 36px;
            font-weight: 200;
            color: white;
            letter-spacing: 8px;
            margin-bottom: 10px;
        }

        .menu-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-btn {
            padding: 18px 50px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            color: white;
            background: linear-gradient(135deg, rgba(147, 112, 255, 0.3), rgba(255, 107, 157, 0.2));
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            background: linear-gradient(135deg, rgba(147, 112, 255, 0.5), rgba(255, 107, 157, 0.4));
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(147, 112, 255, 0.3);
        }

        .menu-btn.primary {
            background: linear-gradient(135deg, rgba(147, 112, 255, 0.6), rgba(255, 107, 157, 0.5));
        }

        /* Win Overlay */
        .win-title {
            font-size: 28px;
            font-weight: 300;
            color: white;
            letter-spacing: 4px;
            margin-bottom: 30px;
        }

        .win-stats {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
        }

        .win-stat {
            text-align: center;
        }

        .win-stat-value {
            font-size: 36px;
            font-weight: 200;
            background: linear-gradient(135deg, #9370ff, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .win-stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Mode Toggle */
        .mode-selector {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .mode-option {
            padding: 10px 25px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.4);
            background: transparent;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-option.active {
            color: white;
            background: linear-gradient(135deg, rgba(147, 112, 255, 0.5), rgba(255, 107, 157, 0.4));
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
        }

        .toast {
            padding: 14px 28px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(20px);
            animation: toastSlide 3s ease forwards;
        }

        @keyframes toastSlide {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        /* Responsive */
        @media (max-width: 500px) {
            .menu-title { font-size: 28px; letter-spacing: 4px; }
            .level-number { font-size: 36px; }
            .ctrl-btn { width: 45px; height: 45px; font-size: 18px; }
        }
    </style>
</head>
<body>
    <!-- Ambient Background -->
    <div class="ambient-bg">
        <div class="ambient-orb orb-1"></div>
        <div class="ambient-orb orb-2"></div>
        <div class="ambient-orb orb-3"></div>
    </div>

    <!-- SVG Definitions -->
    <svg width="0" height="0">
        <defs>
            <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#9370ff"/>
                <stop offset="100%" style="stop-color:#ff6b9d"/>
            </linearGradient>
        </defs>
    </svg>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Menu Overlay -->
    <div class="overlay active" id="menuOverlay">
        <div class="overlay-content">
            <div class="menu-icon">✧</div>
            <h1 class="menu-title">FLOW ENERGY</h1>
            <p class="menu-subtitle">Connect • Flow • Relax</p>
            <div class="menu-buttons">
                <button class="menu-btn primary" onclick="game.start('endless')">BEGIN JOURNEY</button>
                <button class="menu-btn" onclick="game.start('zen')">ZEN MODE</button>
            </div>
        </div>
    </div>

    <!-- Win Overlay -->
    <div class="overlay" id="winOverlay">
        <div class="overlay-content">
            <div class="menu-icon" style="animation-delay: 0s;">✨</div>
            <h1 class="win-title">BEAUTIFUL</h1>
            <div class="win-stats">
                <div class="win-stat">
                    <div class="win-stat-value" id="winMoves">0</div>
                    <div class="win-stat-label">Moves</div>
                </div>
                <div class="win-stat">
                    <div class="win-stat-value" id="winTime">0s</div>
                    <div class="win-stat-label">Time</div>
                </div>
            </div>
            <button class="menu-btn primary" onclick="game.nextLevel()">CONTINUE</button>
        </div>
    </div>

    <!-- Game UI -->
    <div class="game-wrapper" id="gameWrapper" style="display: none;">
        <div class="header">
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-value" id="movesDisplay">0</div>
                    <div class="stat-label">Moves</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="timeDisplay">0:00</div>
                    <div class="stat-label">Time</div>
                </div>
            </div>

            <div class="level-info">
                <div class="level-label">Level</div>
                <div class="level-number" id="levelDisplay">1</div>
            </div>

            <div class="progress-ring-container">
                <svg class="progress-ring" width="60" height="60">
                    <circle class="progress-ring-bg" cx="30" cy="30" r="26"/>
                    <circle class="progress-ring-fill" id="progressRing" cx="30" cy="30" r="26"
                        stroke-dasharray="163.36" stroke-dashoffset="163.36"/>
                </svg>
                <div class="progress-text" id="progressText">0%</div>
            </div>
        </div>

        <div class="mode-selector">
            <button class="mode-option active" id="modeEndless" onclick="game.setMode('endless')">ENDLESS</button>
            <button class="mode-option" id="modeZen" onclick="game.setMode('zen')">ZEN</button>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div class="controls">
            <button class="ctrl-btn" onclick="game.undo()" title="Undo">↶</button>
            <button class="ctrl-btn hint-btn" onclick="game.hint()" title="Hint">
                💡
                <span class="hint-count" id="hintCount">3</span>
            </button>
            <button class="ctrl-btn" onclick="game.restart()" title="Restart">↻</button>
            <button class="ctrl-btn" onclick="game.menu()" title="Menu">☰</button>
        </div>
    </div>

    <script>
    // ==========================================
    // FLOW ENERGY GAME - Premium Curved Design
    // ==========================================

    class AudioEngine {
        constructor() {
            this.ctx = null;
            this.enabled = true;
        }

        init() {
            if (this.ctx) return;
            try {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) {}
        }

        play(type) {
            if (!this.enabled || !this.ctx) return;
            
            const now = this.ctx.currentTime;
            
            switch(type) {
                case 'rotate':
                    this.playTone([600, 800], 0.08, 'sine', 0.15);
                    break;
                case 'connect':
                    this.playTone([400, 600, 800], 0.15, 'sine', 0.2);
                    break;
                case 'complete':
                    this.playMelody([523, 659, 784, 1047], 0.12, 0.25);
                    break;
                case 'hint':
                    this.playTone([800, 1000], 0.1, 'triangle', 0.15);
                    break;
            }
        }

        playTone(freqs, duration, type, volume) {
            freqs.forEach((freq, i) => {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.type = type;
                osc.frequency.value = freq;
                const start = this.ctx.currentTime + i * 0.02;
                gain.gain.setValueAtTime(volume, start);
                gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
                osc.start(start);
                osc.stop(start + duration);
            });
        }

        playMelody(notes, gap, volume) {
            notes.forEach((freq, i) => {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.type = 'sine';
                osc.frequency.value = freq;
                const start = this.ctx.currentTime + i * gap;
                gain.gain.setValueAtTime(volume, start);
                gain.gain.exponentialRampToValueAtTime(0.001, start + 0.3);
                osc.start(start);
                osc.stop(start + 0.3);
            });
        }
    }

    // Color palettes for different aesthetics
    const PALETTES = [
        { // Purple-Pink
            primary: '#9370ff',
            secondary: '#ff6b9d',
            tertiary: '#4ecdc4',
            glow: 'rgba(147, 112, 255, 0.6)'
        },
        { // Cyan-Orange
            primary: '#00d4ff',
            secondary: '#ff9f43',
            tertiary: '#a29bfe',
            glow: 'rgba(0, 212, 255, 0.6)'
        },
        { // Green-Blue
            primary: '#00b894',
            secondary: '#0984e3',
            tertiary: '#fd79a8',
            glow: 'rgba(0, 184, 148, 0.6)'
        },
        { // Gold-Purple
            primary: '#f9ca24',
            secondary: '#6c5ce7',
            tertiary: '#00cec9',
            glow: 'rgba(249, 202, 36, 0.6)'
        },
        { // Rose-Teal
            primary: '#fd79a8',
            secondary: '#00cec9',
            tertiary: '#a29bfe',
            glow: 'rgba(253, 121, 168, 0.6)'
        }
    ];

    // Tile types with curved connection patterns
    // Each pattern defines which edges connect and how
    const TILE_PATTERNS = {
        // Empty
        EMPTY: { id: 0, connections: [] },
        // Curved corner - connects two adjacent edges with a curve
        CURVE: { 
            id: 1, 
            rotations: [
                { edges: [0, 1], curve: 'corner' }, // Top-Right
                { edges: [1, 2], curve: 'corner' }, // Right-Bottom
                { edges: [2, 3], curve: 'corner' }, // Bottom-Left
                { edges: [3, 0], curve: 'corner' }  // Left-Top
            ]
        },
        // Straight pipe
        STRAIGHT: {
            id: 2,
            rotations: [
                { edges: [0, 2], curve: 'straight' }, // Vertical
                { edges: [1, 3], curve: 'straight' }  // Horizontal
            ]
        },
        // T-junction with curves
        T_CURVE: {
            id: 3,
            rotations: [
                { edges: [0, 1, 3], curve: 't-junction' },
                { edges: [0, 1, 2], curve: 't-junction' },
                { edges: [1, 2, 3], curve: 't-junction' },
                { edges: [0, 2, 3], curve: 't-junction' }
            ]
        },
        // Cross - all four edges
        CROSS: {
            id: 4,
            rotations: [
                { edges: [0, 1, 2, 3], curve: 'cross' }
            ]
        },
        // Power source
        SOURCE: {
            id: 5,
            rotations: [
                { edges: [0, 1, 2, 3], curve: 'source' }
            ]
        },
        // End point / bulb
        END: {
            id: 6,
            rotations: [
                { edges: [0], curve: 'end' },
                { edges: [1], curve: 'end' },
                { edges: [2], curve: 'end' },
                { edges: [3], curve: 'end' }
            ]
        }
    };

    class FlowEnergyGame {
        constructor() {
            this.canvas = document.getElementById('gameCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.audio = new AudioEngine();
            
            this.state = {
                level: 1,
                mode: 'endless',
                moves: 0,
                hints: 3,
                startTime: 0,
                grid: [],
                gridSize: 4,
                sources: [],
                endpoints: [],
                powered: new Set(),
                history: [],
                animating: null,
                palette: PALETTES[0],
                flowOffset: 0,
                particles: []
            };

            this.tileSize = 80;
            this.gap = 4;
            
            this.init();
        }

        init() {
            this.loadProgress();
            this.setupEvents();
            this.animate();
        }

        setupEvents() {
            const handleInteraction = (e) => {
                e.preventDefault();
                const rect = this.canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const x = clientX - rect.left;
                const y = clientY - rect.top;
                this.handleTap(x, y);
            };

            this.canvas.addEventListener('click', handleInteraction);
            this.canvas.addEventListener('touchstart', handleInteraction, { passive: false });
        }

        loadProgress() {
            try {
                const saved = localStorage.getItem('flowEnergyProgress');
                if (saved) {
                    const data = JSON.parse(saved);
                    this.state.level = data.level || 1;
                    this.state.hints = data.hints !== undefined ? data.hints : 3;
                }
            } catch(e) {}
        }

        saveProgress() {
            try {
                localStorage.setItem('flowEnergyProgress', JSON.stringify({
                    level: this.state.level,
                    hints: this.state.hints
                }));
            } catch(e) {}
        }

        start(mode) {
            this.audio.init();
            this.state.mode = mode;
            document.getElementById('menuOverlay').classList.remove('active');
            document.getElementById('gameWrapper').style.display = 'flex';
            this.updateModeButtons();
            this.generateLevel();
        }

        setMode(mode) {
            this.state.mode = mode;
            this.updateModeButtons();
            this.generateLevel();
        }

        updateModeButtons() {
            document.getElementById('modeEndless').classList.toggle('active', this.state.mode === 'endless');
            document.getElementById('modeZen').classList.toggle('active', this.state.mode === 'zen');
        }

        getDifficulty() {
            const lvl = this.state.level;
            const isZen = this.state.mode === 'zen';
            
            if (isZen) {
                return { size: 4, endpoints: 2, complexity: 0.3 };
            }

            if (lvl <= 5) return { size: 3, endpoints: 1, complexity: 0.2 };
            if (lvl <= 15) return { size: 4, endpoints: 1 + Math.floor((lvl - 5) / 5), complexity: 0.3 };
            if (lvl <= 30) return { size: 5, endpoints: 2 + Math.floor((lvl - 15) / 8), complexity: 0.4 };
            if (lvl <= 60) return { size: 6, endpoints: 3 + Math.floor((lvl - 30) / 15), complexity: 0.5 };
            if (lvl <= 100) return { size: 7, endpoints: 4 + Math.floor((lvl - 60) / 20), complexity: 0.6 };
            return { size: Math.min(8, 7 + Math.floor((lvl - 100) / 50)), endpoints: Math.min(8, 5 + Math.floor((lvl - 100) / 30)), complexity: 0.7 };
        }

        generateLevel() {
            const diff = this.getDifficulty();
            this.state.gridSize = diff.size;
            this.state.moves = 0;
            this.state.history = [];
            this.state.startTime = Date.now();
            this.state.particles = [];

            // Change palette every few levels
            this.state.palette = PALETTES[Math.floor(this.state.level / 5) % PALETTES.length];

            // Initialize empty grid
            this.state.grid = [];
            for (let y = 0; y < diff.size; y++) {
                this.state.grid[y] = [];
                for (let x = 0; x < diff.size; x++) {
                    this.state.grid[y][x] = {
                        type: TILE_PATTERNS.EMPTY,
                        rotation: 0,
                        correctRotation: 0,
                        locked: false
                    };
                }
            }

            // Place source
            const sourcePos = {
                x: Math.floor(Math.random() * diff.size),
                y: Math.floor(Math.random() * diff.size)
            };
            this.state.sources = [sourcePos];
            this.state.grid[sourcePos.y][sourcePos.x] = {
                type: TILE_PATTERNS.SOURCE,
                rotation: 0,
                correctRotation: 0,
                locked: true
            };

            // Generate paths to endpoints using spanning tree
            this.state.endpoints = [];
            const visited = new Set([`${sourcePos.x},${sourcePos.y}`]);
            const pathCells = [sourcePos];

            // Create connected path network
            this.generateConnectedNetwork(sourcePos, diff.endpoints, visited, pathCells);

            // Fill path cells with appropriate tile types
            this.fillPathTiles(pathCells);

            // Add some extra tiles for complexity
            this.addComplexityTiles(diff.complexity);

            // Randomize rotations (this is the puzzle)
            this.randomizeRotations();

            // Resize canvas
            this.resizeCanvas();

            // Initial power check
            this.updatePower();
            this.updateUI();
        }

        generateConnectedNetwork(source, numEndpoints, visited, pathCells) {
            const size = this.state.gridSize;
            const directions = [
                { dx: 0, dy: -1 }, // Up
                { dx: 1, dy: 0 },  // Right
                { dx: 0, dy: 1 },  // Down
                { dx: -1, dy: 0 }  // Left
            ];

            // BFS to create branching paths
            let frontier = [source];
            let endpointsPlaced = 0;

            while (frontier.length > 0 && endpointsPlaced < numEndpoints) {
                // Pick a random cell from frontier
                const idx = Math.floor(Math.random() * frontier.length);
                const current = frontier[idx];

                // Shuffle directions
                const shuffledDirs = [...directions].sort(() => Math.random() - 0.5);

                let expanded = false;
                for (const dir of shuffledDirs) {
                    const nx = current.x + dir.dx;
                    const ny = current.y + dir.dy;
                    const key = `${nx},${ny}`;

                    if (nx >= 0 && nx < size && ny >= 0 && ny < size && !visited.has(key)) {
                        visited.add(key);
                        const newCell = { x: nx, y: ny };
                        pathCells.push(newCell);
                        frontier.push(newCell);
                        expanded = true;

                        // Chance to place endpoint
                        if (Math.random() < 0.3 && endpointsPlaced < numEndpoints) {
                            this.state.endpoints.push(newCell);
                            endpointsPlaced++;
                        }
                        break;
                    }
                }

                if (!expanded) {
                    frontier.splice(idx, 1);
                }
            }

            // Ensure we have required endpoints
            while (this.state.endpoints.length < numEndpoints) {
                // Find a leaf node (cell with only one connection possibility in path)
                for (let i = pathCells.length - 1; i >= 0; i--) {
                    const cell = pathCells[i];
                    if (!this.state.endpoints.some(e => e.x === cell.x && e.y === cell.y) &&
                        !this.state.sources.some(s => s.x === cell.x && s.y === cell.y)) {
                        this.state.endpoints.push(cell);
                        break;
                    }
                }
                if (this.state.endpoints.length < numEndpoints && pathCells.length <= this.state.endpoints.length + 1) break;
            }
        }

        fillPathTiles(pathCells) {
            const size = this.state.gridSize;
            const directions = [
                { dx: 0, dy: -1, edge: 0 }, // Up
                { dx: 1, dy: 0, edge: 1 },  // Right
                { dx: 0, dy: 1, edge: 2 },  // Down
                { dx: -1, dy: 0, edge: 3 }  // Left
            ];

            const pathSet = new Set(pathCells.map(c => `${c.x},${c.y}`));

            for (const cell of pathCells) {
                if (this.state.sources.some(s => s.x === cell.x && s.y === cell.y)) continue;
                if (this.state.endpoints.some(e => e.x === cell.x && e.y === cell.y)) {
                    // Find which direction connects to path
                    for (const dir of directions) {
                        const nx = cell.x + dir.dx;
                        const ny = cell.y + dir.dy;
                        if (pathSet.has(`${nx},${ny}`)) {
                            this.state.grid[cell.y][cell.x] = {
                                type: TILE_PATTERNS.END,
                                rotation: dir.edge,
                                correctRotation: dir.edge,
                                locked: false
                            };
                            break;
                        }
                    }
                    continue;
                }

                // Find connected neighbors
                const connectedEdges = [];
                for (const dir of directions) {
                    const nx = cell.x + dir.dx;
                    const ny = cell.y + dir.dy;
                    if (pathSet.has(`${nx},${ny}`)) {
                        connectedEdges.push(dir.edge);
                    }
                }

                // Choose appropriate tile type
                const tile = this.chooseTileType(connectedEdges);
                this.state.grid[cell.y][cell.x] = tile;
            }
        }

        chooseTileType(edges) {
            edges.sort((a, b) => a - b);
            const count = edges.length;

            if (count === 1) {
                return {
                    type: TILE_PATTERNS.END,
                    rotation: edges[0],
                    correctRotation: edges[0],
                    locked: false
                };
            }

            if (count === 2) {
                // Check if straight or curve
                const diff = Math.abs(edges[0] - edges[1]);
                if (diff === 2) {
                    // Straight
                    const rotation = edges[0] === 0 ? 0 : 1;
                    return {
                        type: TILE_PATTERNS.STRAIGHT,
                        rotation: rotation,
                        correctRotation: rotation,
                        locked: false
                    };
                } else {
                    // Curve
                    let rotation = 0;
                    if (edges[0] === 0 && edges[1] === 1) rotation = 0;
                    else if (edges[0] === 1 && edges[1] === 2) rotation = 1;
                    else if (edges[0] === 2 && edges[1] === 3) rotation = 2;
                    else if (edges[0] === 0 && edges[1] === 3) rotation = 3;
                    
                    return {
                        type: TILE_PATTERNS.CURVE,
                        rotation: rotation,
                        correctRotation: rotation,
                        locked: false
                    };
                }
            }

            if (count === 3) {
                // T-junction
                const missing = [0, 1, 2, 3].find(e => !edges.includes(e));
                const rotation = (missing + 2) % 4;
                return {
                    type: TILE_PATTERNS.T_CURVE,
                    rotation: rotation,
                    correctRotation: rotation,
                    locked: false
                };
            }

            if (count === 4) {
                return {
                    type: TILE_PATTERNS.CROSS,
                    rotation: 0,
                    correctRotation: 0,
                    locked: false
                };
            }

            return {
                type: TILE_PATTERNS.EMPTY,
                rotation: 0,
                correctRotation: 0,
                locked: false
            };
        }

        addComplexityTiles(complexity) {
            const size = this.state.gridSize;
            
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    if (this.state.grid[y][x].type === TILE_PATTERNS.EMPTY) {
                        if (Math.random() < complexity * 0.5) {
                            // Add random decorative tile
                            const types = [TILE_PATTERNS.CURVE, TILE_PATTERNS.STRAIGHT];
                            const type = types[Math.floor(Math.random() * types.length)];
                            this.state.grid[y][x] = {
                                type: type,
                                rotation: Math.floor(Math.random() * (type.rotations ? type.rotations.length : 4)),
                                correctRotation: 0,
                                locked: false,
                                decorative: true
                            };
                        }
                    }
                }
            }
        }

        randomizeRotations() {
            const size = this.state.gridSize;
            
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const tile = this.state.grid[y][x];
                    if (!tile.locked && tile.type !== TILE_PATTERNS.EMPTY) {
                        const maxRotations = tile.type.rotations ? tile.type.rotations.length : 4;
                        // Random rotation that's different from correct
                        let newRotation;
                        do {
                            newRotation = Math.floor(Math.random() * maxRotations);
                        } while (newRotation === tile.correctRotation && Math.random() > 0.3);
                        tile.rotation = newRotation;
                    }
                }
            }
        }

        resizeCanvas() {
            const container = document.querySelector('.canvas-container');
            const maxSize = Math.min(window.innerWidth - 40, window.innerHeight - 300, 450);
            
            this.tileSize = Math.floor((maxSize - (this.state.gridSize - 1) * this.gap) / this.state.gridSize);
            this.tileSize = Math.max(50, Math.min(85, this.tileSize));

            const totalSize = this.state.gridSize * this.tileSize + (this.state.gridSize - 1) * this.gap;
            this.canvas.width = totalSize;
            this.canvas.height = totalSize;
        }

        handleTap(x, y) {
            if (this.state.animating) return;

            const gridX = Math.floor(x / (this.tileSize + this.gap));
            const gridY = Math.floor(y / (this.tileSize + this.gap));

            if (gridX >= 0 && gridX < this.state.gridSize && 
                gridY >= 0 && gridY < this.state.gridSize) {
                this.rotateTile(gridX, gridY);
            }
        }

        rotateTile(x, y) {
            const tile = this.state.grid[y][x];
            
            if (tile.locked || tile.type === TILE_PATTERNS.EMPTY) return;

            // Save to history
            this.state.history.push({
                x, y,
                rotation: tile.rotation
            });

            const maxRotations = tile.type.rotations ? tile.type.rotations.length : 4;
            
            // Animate
            this.state.animating = {
                x, y,
                fromRotation: tile.rotation,
                toRotation: (tile.rotation + 1) % maxRotations,
                progress: 0
            };

            tile.rotation = (tile.rotation + 1) % maxRotations;
            this.state.moves++;

            this.audio.play('rotate');
            this.emitParticles(x, y, 5);

            setTimeout(() => {
                this.state.animating = null;
                this.updatePower();
                this.checkWin();
            }, 150);

            this.updateUI();
        }

        updatePower() {
            this.state.powered = new Set();
            const size = this.state.gridSize;
            const directions = [
                { dx: 0, dy: -1, edge: 0, opposite: 2 },
                { dx: 1, dy: 0, edge: 1, opposite: 3 },
                { dx: 0, dy: 1, edge: 2, opposite: 0 },
                { dx: -1, dy: 0, edge: 3, opposite: 1 }
            ];

            // BFS from sources
            for (const source of this.state.sources) {
                const queue = [source];
                const visited = new Set([`${source.x},${source.y}`]);
                this.state.powered.add(`${source.x},${source.y}`);

                while (queue.length > 0) {
                    const current = queue.shift();
                    const tile = this.state.grid[current.y][current.x];
                    const connections = this.getTileConnections(tile);

                    for (const dir of directions) {
                        if (!connections.includes(dir.edge)) continue;

                        const nx = current.x + dir.dx;
                        const ny = current.y + dir.dy;
                        const key = `${nx},${ny}`;

                        if (nx < 0 || nx >= size || ny < 0 || ny >= size) continue;
                        if (visited.has(key)) continue;

                        const neighbor = this.state.grid[ny][nx];
                        const neighborConn = this.getTileConnections(neighbor);

                        if (neighborConn.includes(dir.opposite)) {
                            visited.add(key);
                            this.state.powered.add(key);
                            queue.push({ x: nx, y: ny });
                        }
                    }
                }
            }

            this.updateUI();
        }

        getTileConnections(tile) {
            if (tile.type === TILE_PATTERNS.EMPTY) return [];
            if (!tile.type.rotations) return [];

            const rotationData = tile.type.rotations[tile.rotation % tile.type.rotations.length];
            return rotationData ? rotationData.edges : [];
        }

        checkWin() {
            const allEndpointsPowered = this.state.endpoints.every(ep => 
                this.state.powered.has(`${ep.x},${ep.y}`)
            );

            if (allEndpointsPowered && this.state.endpoints.length > 0) {
                this.onWin();
            }
        }

        onWin() {
            this.audio.play('complete');

            // Emit celebration particles
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const x = Math.random() * this.state.gridSize;
                    const y = Math.random() * this.state.gridSize;
                    this.emitParticles(x, y, 8);
                }, i * 50);
            }

            const elapsed = Math.floor((Date.now() - this.state.startTime) / 1000);

            setTimeout(() => {
                document.getElementById('winMoves').textContent = this.state.moves;
                document.getElementById('winTime').textContent = elapsed + 's';
                document.getElementById('winOverlay').classList.add('active');
            }, 600);

            this.saveProgress();
        }

        nextLevel() {
            document.getElementById('winOverlay').classList.remove('active');
            this.state.level++;

            // Bonus hint every 10 levels
            if (this.state.level % 10 === 0) {
                this.state.hints = Math.min(this.state.hints + 1, 10);
                this.toast('✨ Bonus hint earned!');
            }

            this.generateLevel();
            this.saveProgress();
        }

        restart() {
            this.randomizeRotations();
            this.state.moves = 0;
            this.state.history = [];
            this.state.startTime = Date.now();
            this.updatePower();
            this.updateUI();
        }

        undo() {
            if (this.state.history.length === 0) return;

            const last = this.state.history.pop();
            this.state.grid[last.y][last.x].rotation = last.rotation;
            this.state.moves = Math.max(0, this.state.moves - 1);
            
            this.updatePower();
            this.updateUI();
        }

        hint() {
            if (this.state.hints <= 0) {
                this.toast('No hints remaining!');
                return;
            }

            // Find a wrong tile
            for (let y = 0; y < this.state.gridSize; y++) {
                for (let x = 0; x < this.state.gridSize; x++) {
                    const tile = this.state.grid[y][x];
                    if (!tile.locked && tile.type !== TILE_PATTERNS.EMPTY && !tile.decorative) {
                        if (tile.rotation !== tile.correctRotation) {
                            tile.rotation = tile.correctRotation;
                            this.state.hints--;
                            this.audio.play('hint');
                            this.emitParticles(x, y, 15);
                            this.updatePower();
                            this.checkWin();
                            this.updateUI();
                            this.saveProgress();
                            return;
                        }
                    }
                }
            }

            this.toast('All tiles correct!');
        }

        menu() {
            document.getElementById('gameWrapper').style.display = 'none';
            document.getElementById('menuOverlay').classList.add('active');
        }

        toast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        emitParticles(gridX, gridY, count) {
            const x = gridX * (this.tileSize + this.gap) + this.tileSize / 2;
            const y = gridY * (this.tileSize + this.gap) + this.tileSize / 2;
            const palette = this.state.palette;

            for (let i = 0; i < count; i++) {
                this.state.particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 1,
                    color: Math.random() > 0.5 ? palette.primary : palette.secondary,
                    size: 2 + Math.random() * 4
                });
            }
        }

        updateUI() {
            document.getElementById('levelDisplay').textContent = this.state.level;
            document.getElementById('movesDisplay').textContent = this.state.moves;
            document.getElementById('hintCount').textContent = this.state.hints;

            // Progress
            const poweredEndpoints = this.state.endpoints.filter(ep => 
                this.state.powered.has(`${ep.x},${ep.y}`)
            ).length;
            const total = this.state.endpoints.length || 1;
            const percent = Math.round((poweredEndpoints / total) * 100);
            
            document.getElementById('progressText').textContent = percent + '%';
            const circumference = 2 * Math.PI * 26;
            const offset = circumference - (percent / 100) * circumference;
            document.getElementById('progressRing').style.strokeDashoffset = offset;
        }

        updateTimer() {
            if (!this.state.startTime) return;
            const elapsed = Math.floor((Date.now() - this.state.startTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            document.getElementById('timeDisplay').textContent = 
                `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // ==========================================
        // RENDERING - Beautiful Curved Pipes
        // ==========================================

        render() {
            const ctx = this.ctx;
            const size = this.state.gridSize;
            const tileSize = this.tileSize;
            const gap = this.gap;
            const palette = this.state.palette;

            ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

            // Update flow animation
            this.state.flowOffset = (this.state.flowOffset + 0.02) % 1;

            // Draw tiles
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    this.drawTile(x, y);
                }
            }

            // Draw particles
            this.updateParticles();
            this.drawParticles();
        }

        drawTile(gridX, gridY) {
            const ctx = this.ctx;
            const tile = this.state.grid[gridY][gridX];
            const tileSize = this.tileSize;
            const gap = this.gap;
            const x = gridX * (tileSize + gap);
            const y = gridY * (tileSize + gap);
            const palette = this.state.palette;
            const isPowered = this.state.powered.has(`${gridX},${gridY}`);
            
            // Background
            ctx.save();
            ctx.beginPath();
            ctx.roundRect(x, y, tileSize, tileSize, 12);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.fill();
            ctx.restore();

            if (tile.type === TILE_PATTERNS.EMPTY) return;

            ctx.save();
            ctx.translate(x + tileSize / 2, y + tileSize / 2);

            // Handle animation
            let rotation = 0;
            if (this.state.animating && 
                this.state.animating.x === gridX && 
                this.state.animating.y === gridY) {
                const anim = this.state.animating;
                const maxRot = tile.type.rotations ? tile.type.rotations.length : 4;
                const anglePerRotation = (Math.PI * 2) / maxRot;
                const fromAngle = anim.fromRotation * anglePerRotation;
                const toAngle = anim.toRotation * anglePerRotation;
                
                anim.progress = Math.min(1, anim.progress + 0.12);
                const ease = 1 - Math.pow(1 - anim.progress, 3);
                rotation = fromAngle + (toAngle - fromAngle) * ease;
            } else {
                const maxRot = tile.type.rotations ? tile.type.rotations.length : 4;
                rotation = (tile.rotation % maxRot) * (Math.PI * 2) / maxRot;
            }

            ctx.rotate(rotation);

            // Set up colors and glow
            const baseColor = isPowered ? palette.primary : 'rgba(100, 100, 120, 0.4)';
            const glowColor = isPowered ? palette.glow : 'transparent';

            if (isPowered) {
                ctx.shadowColor = glowColor;
                ctx.shadowBlur = 20;
            }

            // Draw based on tile type
            const half = tileSize / 2 - 8;
            const pipeWidth = tileSize * 0.18;

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            switch (tile.type) {
                case TILE_PATTERNS.CURVE:
                    this.drawCurvedCorner(ctx, half, pipeWidth, baseColor, isPowered, palette);
                    break;
                case TILE_PATTERNS.STRAIGHT:
                    this.drawStraightPipe(ctx, half, pipeWidth, baseColor, isPowered, palette);
                    break;
                case TILE_PATTERNS.T_CURVE:
                    this.drawTJunction(ctx, half, pipeWidth, baseColor, isPowered, palette);
                    break;
                case TILE_PATTERNS.CROSS:
                    this.drawCross(ctx, half, pipeWidth, baseColor, isPowered, palette);
                    break;
                case TILE_PATTERNS.SOURCE:
                    ctx.rotate(-rotation); // Reset for source
                    this.drawSource(ctx, half, pipeWidth, palette);
                    break;
                case TILE_PATTERNS.END:
                    this.drawEndpoint(ctx, half, pipeWidth, baseColor, isPowered, palette);
                    break;
            }

            ctx.restore();

            // Draw lock indicator
            if (tile.locked && tile.type !== TILE_PATTERNS.SOURCE) {
                ctx.save();
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.font = '10px Arial';
                ctx.fillText('🔒', x + tileSize - 15, y + 12);
                ctx.restore();
            }
        }

        drawCurvedCorner(ctx, half, pipeWidth, color, powered, palette) {
            // Beautiful curved corner from top edge to right edge
            ctx.beginPath();
            ctx.moveTo(0, -half - pipeWidth/2);
            
            // Bezier curve for smooth corner
            ctx.bezierCurveTo(
                0, 0,        // Control point 1
                0, 0,        // Control point 2
                half + pipeWidth/2, 0  // End point
            );
            
            ctx.lineWidth = pipeWidth;
            
            if (powered) {
                const gradient = ctx.createLinearGradient(0, -half, half, 0);
                gradient.addColorStop(0, palette.primary);
                gradient.addColorStop(1, palette.secondary);
                ctx.strokeStyle = gradient;
            } else {
                ctx.strokeStyle = color;
            }
            
            ctx.stroke();

            // Inner glow effect when powered
            if (powered) {
                ctx.beginPath();
                ctx.moveTo(0, -half - pipeWidth/2);
                ctx.bezierCurveTo(0, 0, 0, 0, half + pipeWidth/2, 0);
                ctx.lineWidth = pipeWidth * 0.4;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.stroke();

                // Animated energy flow
                this.drawEnergyFlow(ctx, [
                    { x: 0, y: -half },
                    { x: 0, y: -half * 0.5 },
                    { x: half * 0.5, y: 0 },
                    { x: half, y: 0 }
                ], palette);
            }

            // End caps
            this.drawPipeCap(ctx, 0, -half, pipeWidth, color, powered, palette);
            this.drawPipeCap(ctx, half, 0, pipeWidth, color, powered, palette);
        }

        drawStraightPipe(ctx, half, pipeWidth, color, powered, palette) {
            ctx.beginPath();
            ctx.moveTo(0, -half - pipeWidth/2);
            ctx.lineTo(0, half + pipeWidth/2);
            
            ctx.lineWidth = pipeWidth;
            
            if (powered) {
                const gradient = ctx.createLinearGradient(0, -half, 0, half);
                gradient.addColorStop(0, palette.primary);
                gradient.addColorStop(0.5, palette.secondary);
                gradient.addColorStop(1, palette.primary);
                ctx.strokeStyle = gradient;
            } else {
                ctx.strokeStyle = color;
            }
            
            ctx.stroke();

            // Inner highlight
            if (powered) {
                ctx.beginPath();
                ctx.moveTo(0, -half);
                ctx.lineTo(0, half);
                ctx.lineWidth = pipeWidth * 0.35;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
                ctx.stroke();

                this.drawEnergyFlow(ctx, [
                    { x: 0, y: -half },
                    { x: 0, y: 0 },
                    { x: 0, y: half }
                ], palette);
            }

            this.drawPipeCap(ctx, 0, -half, pipeWidth, color, powered, palette);
            this.drawPipeCap(ctx, 0, half, pipeWidth, color, powered, palette);
        }

        drawTJunction(ctx, half, pipeWidth, color, powered, palette) {
            // Horizontal pipe
            ctx.beginPath();
            ctx.moveTo(-half - pipeWidth/2, 0);
            ctx.lineTo(half + pipeWidth/2, 0);
            ctx.lineWidth = pipeWidth;
            
            if (powered) {
                const gradient = ctx.createLinearGradient(-half, 0, half, 0);
                gradient.addColorStop(0, palette.primary);
                gradient.addColorStop(0.5, palette.secondary);
                gradient.addColorStop(1, palette.primary);
                ctx.strokeStyle = gradient;
            } else {
                ctx.strokeStyle = color;
            }
            ctx.stroke();

            // Vertical extension (up)
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -half - pipeWidth/2);
            ctx.stroke();

            // Junction circle
            ctx.beginPath();
            ctx.arc(0, 0, pipeWidth * 0.6, 0, Math.PI * 2);
            ctx.fillStyle = powered ? palette.secondary : color;
            ctx.fill();

            if (powered) {
                ctx.beginPath();
                ctx.arc(0, 0, pipeWidth * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.fill();
            }

            this.drawPipeCap(ctx, -half, 0, pipeWidth, color, powered, palette);
            this.drawPipeCap(ctx, half, 0, pipeWidth, color, powered, palette);
            this.drawPipeCap(ctx, 0, -half, pipeWidth, color, powered, palette);
        }

        drawCross(ctx, half, pipeWidth, color, powered, palette) {
            // Vertical
            ctx.beginPath();
            ctx.moveTo(0, -half - pipeWidth/2);
            ctx.lineTo(0, half + pipeWidth/2);
            ctx.lineWidth = pipeWidth;
            
            if (powered) {
                const gradient = ctx.createLinearGradient(0, -half, 0, half);
                gradient.addColorStop(0, palette.primary);
                gradient.addColorStop(0.5, palette.secondary);
                gradient.addColorStop(1, palette.primary);
                ctx.strokeStyle = gradient;
            } else {
                ctx.strokeStyle = color;
            }
            ctx.stroke();

            // Horizontal
            ctx.beginPath();
            ctx.moveTo(-half - pipeWidth/2, 0);
            ctx.lineTo(half + pipeWidth/2, 0);
            ctx.stroke();

            // Center junction
            ctx.beginPath();
            ctx.arc(0, 0, pipeWidth * 0.7, 0, Math.PI * 2);
            ctx.fillStyle = powered ? palette.secondary : color;
            ctx.fill();

            if (powered) {
                ctx.beginPath();
                ctx.arc(0, 0, pipeWidth * 0.35, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.fill();
            }

            this.drawPipeCap(ctx, 0, -half, pipeWidth, color, powered, palette);
            this.drawPipeCap(ctx, 0, half, pipeWidth, color, powered, palette);
            this.drawPipeCap(ctx, -half, 0, pipeWidth, color, powered, palette);
            this.drawPipeCap(ctx, half, 0, pipeWidth, color, powered, palette);
        }

        drawSource(ctx, half, pipeWidth, palette) {
            // Outer ring
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, half * 0.9);
            gradient.addColorStop(0, palette.primary);
            gradient.addColorStop(0.5, palette.secondary);
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            
            ctx.beginPath();
            ctx.arc(0, 0, half * 0.85, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            // Pulsing core
            const pulse = 0.8 + Math.sin(Date.now() / 200) * 0.2;
            ctx.beginPath();
            ctx.arc(0, 0, half * 0.45 * pulse, 0, Math.PI * 2);
            ctx.fillStyle = palette.primary;
            ctx.shadowColor = palette.primary;
            ctx.shadowBlur = 30;
            ctx.fill();

            // Inner white core
            ctx.beginPath();
            ctx.arc(0, 0, half * 0.2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.fill();

            // Connection points (all 4 directions)
            const dirs = [[0, -1], [1, 0], [0, 1], [-1, 0]];
            ctx.shadowBlur = 0;
            dirs.forEach(([dx, dy]) => {
                ctx.beginPath();
                ctx.arc(dx * half * 0.75, dy * half * 0.75, pipeWidth * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = palette.secondary;
                ctx.fill();
            });
        }

        drawEndpoint(ctx, half, pipeWidth, color, powered, palette) {
            // Pipe to center
            ctx.beginPath();
            ctx.moveTo(0, -half - pipeWidth/2);
            ctx.lineTo(0, 0);
            ctx.lineWidth = pipeWidth;
            
            if (powered) {
                const gradient = ctx.createLinearGradient(0, -half, 0, 0);
                gradient.addColorStop(0, palette.primary);
                gradient.addColorStop(1, palette.secondary);
                ctx.strokeStyle = gradient;
            } else {
                ctx.strokeStyle = color;
            }
            ctx.stroke();

            // Bulb / endpoint
            const bulbRadius = half * 0.5;
            
            if (powered) {
                // Outer glow
                const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, bulbRadius * 1.8);
                glowGradient.addColorStop(0, 'rgba(255, 220, 100, 0.8)');
                glowGradient.addColorStop(0.5, 'rgba(255, 200, 50, 0.3)');
                glowGradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(0, 0, bulbRadius * 1.8, 0, Math.PI * 2);
                ctx.fillStyle = glowGradient;
                ctx.fill();
            }

            // Main bulb
            const bulbGradient = ctx.createRadialGradient(-bulbRadius * 0.3, -bulbRadius * 0.3, 0, 0, 0, bulbRadius);
            if (powered) {
                bulbGradient.addColorStop(0, '#fffbe8');
                bulbGradient.addColorStop(0.3, '#ffeb3b');
                bulbGradient.addColorStop(1, '#ffc107');
            } else {
                bulbGradient.addColorStop(0, 'rgba(120, 120, 140, 0.8)');
                bulbGradient.addColorStop(1, 'rgba(80, 80, 100, 0.6)');
            }
            
            ctx.beginPath();
            ctx.arc(0, 0, bulbRadius, 0, Math.PI * 2);
            ctx.fillStyle = bulbGradient;
            ctx.fill();

            // Highlight
            if (powered) {
                ctx.beginPath();
                ctx.arc(-bulbRadius * 0.25, -bulbRadius * 0.25, bulbRadius * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.fill();
            }

            this.drawPipeCap(ctx, 0, -half, pipeWidth, color, powered, palette);
        }

        drawPipeCap(ctx, x, y, pipeWidth, color, powered, palette) {
            ctx.beginPath();
            ctx.arc(x, y, pipeWidth * 0.55, 0, Math.PI * 2);
            ctx.fillStyle = powered ? palette.secondary : color;
            ctx.fill();

            if (powered) {
                ctx.beginPath();
                ctx.arc(x, y, pipeWidth * 0.25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.fill();
            }
        }

        drawEnergyFlow(ctx, points, palette) {
            const offset = this.state.flowOffset;
            
            // Draw flowing dots along path
            for (let t = 0; t < 1; t += 0.15) {
                const pos = (t + offset) % 1;
                const idx = Math.floor(pos * (points.length - 1));
                const localT = (pos * (points.length - 1)) % 1;
                
                if (idx < points.length - 1) {
                    const x = points[idx].x + (points[idx + 1].x - points[idx].x) * localT;
                    const y = points[idx].y + (points[idx + 1].y - points[idx].y) * localT;
                    
                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    ctx.fill();
                }
            }
        }

        updateParticles() {
            this.state.particles = this.state.particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.95;
                p.vy *= 0.95;
                p.life -= 0.025;
                return p.life > 0;
            });
        }

        drawParticles() {
            const ctx = this.ctx;
            this.state.particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        animate() {
            this.render();
            this.updateTimer();
            requestAnimationFrame(() => this.animate());
        }
    }

    // Initialize
    const game = new FlowEnergyGame();
    </script>
</body>
