<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Energy Connect</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #16213e;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            flex-direction: column;
            gap: 20px;
        }
        #info {
            color: #fff;
            font-size: 18px;
        }
        canvas {
            background: #0f1624;
            border-radius: 8px;
            cursor: pointer;
        }
        button {
            padding: 10px 20px;
            font-size: 14px;
            border: none;
            border-radius: 20px;
            background: #4a5568;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="info">Level <span id="lv">1</span> • Moves <span id="mv">0</span></div>
    <canvas id="c"></canvas>
    <button onclick="newLevel()">New Level</button>

    <script>
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        
        let level = 1, moves = 0, size = 4, grid = [], src, bulbs = [];
        const ts = 60; // tile size
        
        // Tile: {t: type, r: rotation, p: powered}
        // Types: 0=empty, 1=line, 2=curve, 3=source, 4=bulb
        
        function newLevel() {
            moves = 0;
            size = level < 5 ? 4 : (level < 10 ? 5 : 6);
            c.width = c.height = size * ts;
            
            // Create empty grid
            grid = Array(size).fill(0).map(() => Array(size).fill(0).map(() => ({t:0, r:0, p:false})));
            
            // Source at center
            src = {x: Math.floor(size/2), y: Math.floor(size/2)};
            grid[src.y][src.x] = {t:3, r:0, p:true};
            
            // Create path using simple DFS
            bulbs = [];
            const visited = new Set([`${src.x},${src.y}`]);
            const stack = [{x:src.x, y:src.y}];
            const edges = {}; // track needed edges
            
            while(stack.length) {
                const curr = stack[stack.length - 1];
                const dirs = [[0,-1,0,2],[1,0,1,3],[0,1,2,0],[-1,0,3,1]].filter(d => {
                    const nx = curr.x + d[0], ny = curr.y + d[1];
                    return nx >= 0 && nx < size && ny >= 0 && ny < size && !visited.has(`${nx},${ny}`);
                });
                
                if(dirs.length && Math.random() < 0.7) {
                    const d = dirs[Math.floor(Math.random() * dirs.length)];
                    const nx = curr.x + d[0], ny = curr.y + d[1];
                    visited.add(`${nx},${ny}`);
                    
                    // Record edges
                    const k1 = `${curr.x},${curr.y}`;
                    const k2 = `${nx},${ny}`;
                    if(!edges[k1]) edges[k1] = [];
                    if(!edges[k2]) edges[k2] = [];
                    edges[k1].push(d[2]);
                    edges[k2].push(d[3]);
                    
                    stack.push({x:nx, y:ny});
                } else {
                    stack.pop();
                }
            }
            
            // Assign tiles based on edges
            for(let y = 0; y < size; y++) {
                for(let x = 0; x < size; x++) {
                    if(x === src.x && y === src.y) continue;
                    const k = `${x},${y}`;
                    const e = edges[k];
                    if(!e || !e.length) continue;
                    
                    if(e.length === 1) {
                        // Bulb
                        grid[y][x] = {t:4, r:e[0], cor:e[0], p:false};
                        bulbs.push({x,y});
                    } else if(e.length === 2) {
                        const [a,b] = e.sort((p,q)=>p-q);
                        if(Math.abs(a-b) === 2) {
                            // Line
                            const r = a === 0 ? 0 : 1;
                            grid[y][x] = {t:1, r:r, cor:r, p:false};
                        } else {
                            // Curve
                            let r = 0;
                            if(a===0&&b===1) r=0;
                            else if(a===1&&b===2) r=1;
                            else if(a===2&&b===3) r=2;
                            else if(a===0&&b===3) r=3;
                            grid[y][x] = {t:2, r:r, cor:r, p:false};
                        }
                    }
                }
            }
            
            // Randomize
            for(let y = 0; y < size; y++) {
                for(let x = 0; x < size; x++) {
                    const t = grid[y][x];
                    if(t.t === 1 || t.t === 2 || t.t === 4) {
                        const max = t.t === 1 ? 2 : 4;
                        t.r = Math.floor(Math.random() * max);
                    }
                }
            }
            
            update();
            draw();
        }
        
        function update() {
            // Reset power
            for(let y = 0; y < size; y++) {
                for(let x = 0; x < size; x++) {
                    if(grid[y][x].t !== 3) grid[y][x].p = false;
                }
            }
            
            // BFS from source
            const q = [{x:src.x, y:src.y}];
            const vis = new Set([`${src.x},${src.y}`]);
            
            while(q.length) {
                const {x,y} = q.shift();
                const tile = grid[y][x];
                const myE = getEdges(tile);
                
                [[0,-1,0,2],[1,0,1,3],[0,1,2,0],[-1,0,3,1]].forEach(d => {
                    if(!myE.includes(d[2])) return;
                    const nx = x + d[0], ny = y + d[1];
                    if(nx < 0 || nx >= size || ny < 0 || ny >= size) return;
                    const k = `${nx},${ny}`;
                    if(vis.has(k)) return;
                    
                    const nei = grid[ny][nx];
                    if(nei.t === 0) return;
                    if(getEdges(nei).includes(d[3])) {
                        vis.add(k);
                        nei.p = true;
                        q.push({x:nx, y:ny});
                    }
                });
            }
            
            document.getElementById('mv').textContent = moves;
            
            // Check win - ALL bulbs must be powered
            if(bulbs.length && bulbs.every(b => grid[b.y][b.x].p)) {
                setTimeout(() => {
                    alert('Complete!');
                    level++;
                    document.getElementById('lv').textContent = level;
                    newLevel();
                }, 300);
            }
        }
        
        function getEdges(t) {
            if(t.t === 0) return [];
            if(t.t === 3) return [0,1,2,3];
            if(t.t === 1) return t.r % 2 ? [1,3] : [0,2];
            if(t.t === 2) return [[0,1],[1,2],[2,3],[3,0]][t.r];
            if(t.t === 4) return [t.r];
            return [];
        }
        
        function draw() {
            ctx.fillStyle = '#0f1624';
            ctx.fillRect(0, 0, c.width, c.height);
            
            for(let y = 0; y < size; y++) {
                for(let x = 0; x < size; x++) {
                    const t = grid[y][x];
                    if(t.t === 0) continue;
                    
                    const cx = x * ts + ts/2;
                    const cy = y * ts + ts/2;
                    const col = t.p ? '#10b981' : '#4a5568';
                    
                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.strokeStyle = col;
                    ctx.fillStyle = col;
                    ctx.lineWidth = 6;
                    ctx.lineCap = 'round';
                    
                    if(t.t === 1) {
                        // Line
                        ctx.rotate(t.r * Math.PI/2);
                        ctx.beginPath();
                        ctx.moveTo(0, -ts/2);
                        ctx.lineTo(0, ts/2);
                        ctx.stroke();
                    } else if(t.t === 2) {
                        // Curve
                        ctx.rotate(t.r * Math.PI/2);
                        ctx.beginPath();
                        ctx.arc(ts/3, -ts/3, ts/3, Math.PI, Math.PI*1.5);
                        ctx.stroke();
                    } else if(t.t === 3) {
                        // Source
                        ctx.fillStyle = '#f59e0b';
                        ctx.beginPath();
                        ctx.arc(0, 0, 12, 0, Math.PI*2);
                        ctx.fill();
                    } else if(t.t === 4) {
                        // Bulb
                        ctx.rotate(t.r * Math.PI/2);
                        ctx.beginPath();
                        ctx.moveTo(0, -ts/2);
                        ctx.lineTo(0, -8);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.arc(0, 0, 8, 0, Math.PI*2);
                        ctx.fill();
                    }
                    
                    ctx.restore();
                }
            }
        }
        
        c.onclick = e => {
            const r = c.getBoundingClientRect();
            const x = Math.floor((e.clientX - r.left) / ts);
            const y = Math.floor((e.clientY - r.top) / ts);
            
            if(x >= 0 && x < size && y >= 0 && y < size) {
                const t = grid[y][x];
                if(t.t === 1 || t.t === 2 || t.t === 4) {
                    const max = t.t === 1 ? 2 : 4;
                    t.r = (t.r + 1) % max;
                    moves++;
                    update();
                    draw();
                }
            }
        };
        
        newLevel();
    </script>
</body>
</html>
