<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏔️ Mountain Systems Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="mountain-styles.css">
</head>
<body>
    <!-- Loading Screen -->
    <div class="loader" id="loader">
        <div class="loader-content">
            <div class="loader-icon">🏔️</div>
            <div class="loader-spinner"></div>
            <p>Discovering Mountains...</p>
            <div class="loader-bar"><div class="loader-progress"></div></div>
        </div>
    </div>

    <!-- Background -->
    <div class="page-bg"></div>
    <div class="stars"></div>

    <!-- Main Container -->
    <main class="main-container">
        <!-- Header -->
        <header class="page-header">
            <a href="../index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                <span>Home</span>
            </a>
            
            <div class="header-center">
                <h1 class="page-title">
                    <i class="fas fa-mountain"></i>
                    Mountain Systems of the World
                </h1>
                <p class="page-subtitle">50 Major Ranges • Sorted by Highest Peak • Real Photography</p>
            </div>

            <div class="header-stats">
                <div class="header-stat">
                    <span class="stat-num">50</span>
                    <span class="stat-txt">Ranges</span>
                </div>
                <div class="header-stat">
                    <span class="stat-num">7</span>
                    <span class="stat-txt">Continents</span>
                </div>
            </div>
        </header>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="filter-group">
                <span class="filter-label">Filter by Continent:</span>
                <div class="filter-buttons" id="filterButtons">
                    <button class="filter-btn active" data-filter="all">
                        <i class="fas fa-globe"></i> All (50)
                    </button>
                    <button class="filter-btn" data-filter="asia">
                        <span class="flag">🌏</span> Asia
                    </button>
                    <button class="filter-btn" data-filter="americas">
                        <span class="flag">🌎</span> Americas
                    </button>
                    <button class="filter-btn" data-filter="europe">
                        <span class="flag">🌍</span> Europe
                    </button>
                    <button class="filter-btn" data-filter="africa">
                        <span class="flag">🌍</span> Africa
                    </button>
                    <button class="filter-btn" data-filter="oceania">
                        <span class="flag">🌏</span> Oceania
                    </button>
                </div>
            </div>
            
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search mountains...">
            </div>
        </div>

        <!-- Mountain Cards Grid -->
        <section class="cards-section">
            <div class="cards-grid" id="cardsGrid">
                <!-- Cards will be inserted by JavaScript -->
            </div>
        </section>

        <!-- Footer -->
        <footer class="page-footer">
            <p>🏔️ Mountain Systems Explorer • Real Geographic Data • Educational Purpose</p>
        </footer>
    </main>

    <!-- Scripts -->
    <script src="mountain-data.js"></script>
    <script src="mountain-app.js"></script>
</body>
</html>
