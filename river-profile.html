<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>River Profile | GEOTOPIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader-river {
            width: 100px;
            height: 100px;
            position: relative;
        }

        .loader-river::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid transparent;
            border-top-color: #87CEEB;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-river::after {
            content: '🌊';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 30px;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Hero Background */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .hero-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, 
                rgba(10, 10, 26, 0.92) 0%,
                rgba(26, 26, 62, 0.88) 50%,
                rgba(13, 27, 42, 0.92) 100%);
        }

        /* Navigation */
        .nav-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 10, 26, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(135, 206, 235, 0.2);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(135, 206, 235, 0.2);
            border-color: #87CEEB;
            color: #87CEEB;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .river-nav-title {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
        }

        .river-nav-title span {
            color: #87CEEB;
            font-weight: 600;
        }

        /* Content Container */
        .content-container {
            padding-top: 90px;
            min-height: 100vh;
        }

        /* River Header */
        .river-header {
            padding: 40px;
            text-align: center;
        }

        .river-rank-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            padding: 10px 30px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            color: #000;
            margin-bottom: 25px;
        }

        .river-name-main {
            font-size: 64px;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #fff, #87CEEB);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        .river-subtitle {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
        }

        .river-flags {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .flag-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .flag-img {
            width: 50px;
            height: 35px;
            border-radius: 5px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            object-fit: cover;
        }

        .flag-name {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Quick Stats */
        .quick-stats {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .quick-stat {
            text-align: center;
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            min-width: 140px;
        }

        .quick-stat-icon {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .quick-stat-value {
            font-size: 26px;
            font-weight: 800;
            color: #87CEEB;
        }

        .quick-stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Fly Along Button */
        .fly-along-container {
            text-align: center;
            margin-bottom: 50px;
        }

        .fly-along-btn {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            padding: 20px 50px;
            background: linear-gradient(135deg, #87CEEB, #00CED1);
            border: none;
            border-radius: 50px;
            color: #000;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 10px 40px rgba(135, 206, 235, 0.4);
        }

        .fly-along-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(135, 206, 235, 0.5);
        }

        .fly-along-btn i {
            font-size: 22px;
        }

        /* Map Section */
        .map-section {
            padding: 0 40px 40px;
        }

        .map-container {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(135, 206, 235, 0.2);
            border-radius: 25px;
            overflow: hidden;
        }

        .map-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
            gap: 15px;
        }

        .map-title {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .map-title i {
            color: #87CEEB;
        }

        #riverMap {
            height: 500px;
            width: 100%;
            background: #1a1a3e;
        }

        /* Mind Map Section */
        .mindmap-section {
            padding: 40px;
        }

        .section-title-main {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 40px;
        }

        .section-title-main i {
            color: #87CEEB;
            margin-right: 12px;
        }

        .mindmap-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .mindmap-branch {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
        }

        .branch-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .branch-header:hover {
            background: rgba(135, 206, 235, 0.1);
        }

        .branch-icon {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: rgba(135, 206, 235, 0.2);
        }

        .branch-title {
            flex: 1;
        }

        .branch-title h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .branch-title p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .branch-toggle {
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .branch-toggle i {
            transition: transform 0.3s ease;
        }

        .branch-header.expanded .branch-toggle i {
            transform: rotate(180deg);
        }

        .branch-content {
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .branch-content.expanded {
            max-height: 500px;
            padding: 20px;
        }

        .branch-content ul {
            list-style: none;
        }

        .branch-content li {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 14px;
        }

        .branch-content li:last-child {
            border-bottom: none;
        }

        .branch-content li::before {
            content: '→';
            color: #87CEEB;
        }

        .sub-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .sub-item {
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            font-size: 12px;
        }

        /* Fly Modal */
        .fly-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.98);
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        .fly-modal.active {
            display: flex;
        }

        .fly-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(10, 10, 26, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fly-info {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .fly-status {
            font-size: 18px;
            font-weight: 600;
        }

        .fly-progress {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .progress-bar {
            width: 200px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #87CEEB, #00CED1);
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .close-fly-btn {
            padding: 12px 25px;
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 10px;
            color: #FF6B6B;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }

        .close-fly-btn:hover {
            background: #FF6B6B;
            color: #fff;
        }

        #flyMap {
            flex: 1;
        }

        /* Waypoint Popup */
        .waypoint-popup {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 26, 0.98);
            border: 2px solid rgba(135, 206, 235, 0.4);
            border-radius: 20px;
            padding: 25px 40px;
            z-index: 2001;
            text-align: center;
            min-width: 300px;
            display: none;
        }

        .waypoint-popup.active {
            display: block;
            animation: popupSlide 0.5s ease;
        }

        @keyframes popupSlide {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .waypoint-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .waypoint-title {
            font-size: 20px;
            font-weight: 700;
            color: #87CEEB;
        }

        .waypoint-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .waypoint-distance {
            margin-top: 10px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* Summary Card */
        .summary-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 26, 0.98);
            border: 2px solid rgba(135, 206, 235, 0.4);
            border-radius: 30px;
            padding: 50px;
            z-index: 2002;
            text-align: center;
            min-width: 450px;
            display: none;
        }

        .summary-card.active {
            display: block;
        }

        .summary-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .summary-title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .summary-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin: 15px 0 30px;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .summary-stat {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
        }

        .summary-stat-value {
            font-size: 24px;
            font-weight: 800;
            color: #87CEEB;
        }

        .summary-stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }

        .summary-close-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #87CEEB, #00CED1);
            border: none;
            border-radius: 30px;
            color: #000;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }

        /* Footer */
        footer {
            background: rgba(0, 0, 0, 0.5);
            padding: 40px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        footer p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        /* Leaflet Custom */
        .leaflet-popup-content-wrapper {
            background: rgba(10, 10, 26, 0.95);
            color: #fff;
            border-radius: 12px;
        }

        .leaflet-popup-tip {
            background: rgba(10, 10, 26, 0.95);
        }

        .popup-title {
            font-weight: 600;
            color: #87CEEB;
        }

        .popup-desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-header { padding: 15px 20px; }
            .river-header { padding: 30px 20px; }
            .river-name-main { font-size: 36px; }
            .map-section, .mindmap-section { padding: 20px; }
            #riverMap { height: 350px; }
            .mindmap-container { grid-template-columns: 1fr; }
            .summary-card { min-width: 90%; padding: 30px; }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loader-river"></div>
        <p class="loading-text">Loading River Data...</p>
    </div>

    <!-- Hero Background -->
    <div class="hero-bg">
        <img id="heroBgImg" src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1600" alt="River">
        <div class="hero-overlay"></div>
    </div>

    <!-- Navigation -->
    <nav class="nav-header">
        <div class="nav-left">
            <a href="rivers.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <a href="index.html" class="logo">
                <div class="logo-icon">🌍</div>
                <span class="logo-text">GEOTOPIA</span>
            </a>
        </div>
        <div class="river-nav-title">Rivers / <span id="navRiverName">Loading...</span></div>
    </nav>

    <!-- Content -->
    <div class="content-container">
        <section class="river-header">
            <div class="river-rank-badge">
                <i class="fas fa-trophy"></i>
                <span id="rankText">#1 Longest River</span>
            </div>
            <h1 class="river-name-main" id="riverNameMain">Loading...</h1>
            <p class="river-subtitle" id="riverSubtitle">Loading...</p>
            <div class="river-flags" id="riverFlags"></div>
            <div class="quick-stats" id="quickStats"></div>
        </section>

        <div class="fly-along-container">
            <button class="fly-along-btn" onclick="startFlyAlong()">
                <i class="fas fa-plane"></i> Fly Along River
            </button>
        </div>

        <section class="map-section">
            <div class="map-container">
                <div class="map-header">
                    <div class="map-title"><i class="fas fa-map-marked-alt"></i> River System Map</div>
                </div>
                <div id="riverMap"></div>
            </div>
        </section>

        <section class="mindmap-section">
            <h2 class="section-title-main"><i class="fas fa-project-diagram"></i> River Information</h2>
            <div class="mindmap-container" id="mindmapContainer"></div>
        </section>
    </div>

    <!-- Fly Modal -->
    <div class="fly-modal" id="flyModal">
        <div class="fly-modal-header">
            <div class="fly-info">
                <div class="fly-status"><i class="fas fa-plane"></i> Flying: <span id="flyRiverName">River</span></div>
                <div class="fly-progress">
                    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                    <span class="progress-text" id="progressText">0%</span>
                </div>
            </div>
            <button class="close-fly-btn" onclick="closeFlyAlong()"><i class="fas fa-times"></i> Exit</button>
        </div>
        <div id="flyMap"></div>
    </div>

    <div class="waypoint-popup" id="waypointPopup">
        <div class="waypoint-icon" id="waypointIcon">📍</div>
        <div class="waypoint-title" id="waypointTitle">Waypoint</div>
        <div class="waypoint-subtitle" id="waypointSubtitle">Description</div>
        <div class="waypoint-distance" id="waypointDistance"></div>
    </div>

    <div class="summary-card" id="summaryCard">
        <div class="summary-icon">🎉</div>
        <div class="summary-title">Journey Complete!</div>
        <div class="summary-subtitle" id="summarySubtitle">You've traveled the entire river</div>
        <div class="summary-stats" id="summaryStats"></div>
        <button class="summary-close-btn" onclick="closeSummary()">Continue</button>
    </div>

    <footer><p>© 2024 GEOTOPIA - The Complete Geography Universe</p></footer>

    <script>
        // =====================================================
        // ALL RIVERS BASIC DATA
        // =====================================================
        const allRiversBasic = [
            { id: 1, name: "Nile", length: 6650, continent: "Africa", countries: ["EG", "SD", "SS", "UG", "ET", "RW", "BI", "TZ", "KE", "CD"], countryNames: ["Egypt", "Sudan", "South Sudan", "Uganda", "Ethiopia", "Rwanda", "Burundi", "Tanzania", "Kenya", "DR Congo"], source: "Nyungwe Forest, Rwanda", mouth: "Mediterranean Sea", image: "https://images.unsplash.com/photo-1553913861-c0fddf2619ee?w=1600", basin: 3254555, discharge: 2830 },
            { id: 2, name: "Amazon", length: 6400, continent: "South America", countries: ["BR", "PE", "CO", "VE", "EC", "BO", "GY"], countryNames: ["Brazil", "Peru", "Colombia", "Venezuela", "Ecuador", "Bolivia", "Guyana"], source: "Nevado Mismi, Peru", mouth: "Atlantic Ocean", image: "https://images.unsplash.com/photo-1516426122078-c23e76319801?w=1600", basin: 7050000, discharge: 209000 },
            { id: 3, name: "Yangtze", length: 6300, continent: "Asia", countries: ["CN"], countryNames: ["China"], source: "Tanggula Mountains, Tibet", mouth: "East China Sea", image: "https://images.unsplash.com/photo-1537531383496-f4749b14820d?w=1600", basin: 1808500, discharge: 30166 },

        // POPULATE PAGE
        // =====================================================
        function populatePage() {
            const river = currentRiver;
            const rank = getRiverRank(river.id);

            document.getElementById('heroBgImg').src = river.image;
            document.getElementById('navRiverName').textContent = river.name;
            document.getElementById('rankText').textContent = `#${rank} Longest River in the World`;
            document.getElementById('riverNameMain').textContent = river.name;
            document.getElementById('riverSubtitle').textContent = `${river.source} → ${river.mouth}`;
            document.title = `${river.name} River | GEOTOPIA`;

            // Flags
            document.getElementById('riverFlags').innerHTML = river.countries.slice(0, 6).map((code, i) => `
                <div class="flag-item">
                    <img src="${flagUrl(code)}" alt="${river.countryNames[i]}" class="flag-img">
                    <span class="flag-name">${river.countryNames[i]}</span>
                </div>
            `).join('');

            // Stats
            document.getElementById('quickStats').innerHTML = `
                <div class="quick-stat"><div class="quick-stat-icon">📏</div><div class="quick-stat-value">${river.length.toLocaleString()}</div><div class="quick-stat-label">km Length</div></div>
                <div class="quick-stat"><div class="quick-stat-icon">🌍</div><div class="quick-stat-value">${(river.basin/1000).toFixed(0)}K</div><div class="quick-stat-label">km² Basin</div></div>
                <div class="quick-stat"><div class="quick-stat-icon">💧</div><div class="quick-stat-value">${river.discharge.toLocaleString()}</div><div class="quick-stat-label">m³/s Flow</div></div>
                <div class="quick-stat"><div class="quick-stat-icon">🌐</div><div class="quick-stat-value">${river.countries.length}</div><div class="quick-stat-label">Countries</div></div>
                <div class="quick-stat"><div class="quick-stat-icon">🏆</div><div class="quick-stat-value">#${rank}</div><div class="quick-stat-label">World Rank</div></div>
            `;

            initializeMap();
            populateMindMap();
        }

        // =====================================================
        // INITIALIZE MAP
        // =====================================================
        function initializeMap() {
            const river = currentRiver;
            const pathData = getRiverPath(river.id);

            riverMap = L.map('riverMap').setView([20, 0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(riverMap);

            if (pathData && pathData.coordinates) {
                const coords = pathData.coordinates.map(c => [c[1], c[0]]);
                
                L.polyline(coords, { color: '#00BFFF', weight: 10, opacity: 0.2 }).addTo(riverMap);
                L.polyline(coords, { color: '#00BFFF', weight: 5, opacity: 0.8 }).addTo(riverMap);
                L.polyline(coords, { color: '#87CEEB', weight: 2, opacity: 1 }).addTo(riverMap);

                // Source marker
                L.marker(coords[0], { icon: L.divIcon({ className: '', html: '<div style="background:#00FF7F;width:16px;height:16px;border-radius:50%;border:2px solid white;"></div>', iconSize: [16,16], iconAnchor: [8,8] }) })
                    .addTo(riverMap).bindPopup(`<b style="color:#87CEEB">Source</b><br>${river.source}`);

                // Mouth marker
                L.marker(coords[coords.length-1], { icon: L.divIcon({ className: '', html: '<div style="background:#FF69B4;width:16px;height:16px;border-radius:50%;border:2px solid white;"></div>', iconSize: [16,16], iconAnchor: [8,8] }) })
                    .addTo(riverMap).bindPopup(`<b style="color:#87CEEB">Mouth</b><br>${river.mouth}`);

                riverMap.fitBounds(L.latLngBounds(coords), { padding: [50, 50] });
            }
        }

        // =====================================================
        // MIND MAP
        // =====================================================
        function populateMindMap() {
            const river = currentRiver;
            const branches = [
                { icon: '🏔️', title: 'Source', subtitle: 'Origin point', content: `<li>${river.source}</li>` },
                { icon: '🌊', title: 'Mouth', subtitle: 'Destination', content: `<li>${river.mouth}</li>` },
                { icon: '🌍', title: 'Countries', subtitle: `${river.countries.length} nations`, content: river.countryNames.map(c => `<li>${c}</li>`).join('') },
                { icon: '🌿', title: 'Tributaries', subtitle: 'Rivers flowing in', content: `<li><b>Left Bank:</b><div class="sub-list">${river.tributaries.left.map(t => `<span class="sub-item">${t}</span>`).join('')}</div></li><li><b>Right Bank:</b><div class="sub-list">${river.tributaries.right.map(t => `<span class="sub-item">${t}</span>`).join('')}</div></li>` },
                { icon: '🏙️', title: 'Major Cities', subtitle: 'Urban centers', content: river.cities.map(c => `<li>${c}</li>`).join('') },
                { icon: '🏗️', title: 'Dams', subtitle: 'Infrastructure', content: river.dams.map(d => `<li>${d}</li>`).join('') },
                { icon: '💰', title: 'Economic Importance', subtitle: 'Value', content: river.economicImportance.map(e => `<li>${e}</li>`).join('') },
                { icon: '🌱', title: 'Environmental Issues', subtitle: 'Challenges', content: river.environmentalIssues.map(e => `<li>${e}</li>`).join('') },
                { icon: '📜', title: 'History', subtitle: 'Heritage', content: `<li>${river.history}</li>` }
            ];

            document.getElementById('mindmapContainer').innerHTML = branches.map(b => `
                <div class="mindmap-branch">
                    <div class="branch-header" onclick="toggleBranch(this)">
                        <div class="branch-icon">${b.icon}</div>
                        <div class="branch-title"><h3>${b.title}</h3><p>${b.subtitle}</p></div>
                        <div class="branch-toggle"><i class="fas fa-chevron-down"></i></div>
                    </div>
                    <div class="branch-content"><ul>${b.content}</ul></div>
                </div>
            `).join('');
        }

        function toggleBranch(header) {
            header.classList.toggle('expanded');
            header.nextElementSibling.classList.toggle('expanded');
        }

        // =====================================================
        // FLY ALONG FEATURE
        // =====================================================
        function startFlyAlong() {
            const river = currentRiver;
            const pathData = getRiverPath(river.id);

            document.getElementById('flyModal').classList.add('active');
            document.getElementById('flyRiverName').textContent = river.name;
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').textContent = '0%';
            isPaused = false;

            if (flyMap) flyMap.remove();
            flyMap = L.map('flyMap', { zoomControl: true });
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 18 }).addTo(flyMap);

            setTimeout(() => {
                if (pathData && pathData.coordinates) {
                    runFlightAnimation(pathData);
                } else {
                    simulateFlight();
                }
            }, 500);
        }

        function runFlightAnimation(pathData) {
            const river = currentRiver;
            const path = pathData.coordinates.map(c => [c[1], c[0]]);
            const waypoints = pathData.waypoints || [];

            L.polyline(path, { color: '#00BFFF', weight: 5 }).addTo(flyMap);
            
            const planeMarker = L.marker(path[0], { 
                icon: L.divIcon({ html: '<div style="font-size:24px;">✈️</div>', iconSize: [24,24], iconAnchor: [12,12] }) 
            }).addTo(flyMap);

            flyMap.setView(path[0], 7);
            showWaypoint('🏔️', 'Source', river.source, '0 km');

            let idx = 0;
            let lastWP = -1;

            flyAnimation = setInterval(() => {
                if (isPaused) return;
                idx++;
                if (idx >= path.length) {
                    clearInterval(flyAnimation);
                    showSummary();
                    return;
                }

                const progress = idx / (path.length - 1);
                document.getElementById('progressFill').style.width = (progress * 100) + '%';
                document.getElementById('progressText').textContent = Math.round(progress * 100) + '%';

                planeMarker.setLatLng(path[idx]);
                flyMap.panTo(path[idx], { animate: true, duration: 0.3 });

                for (let i = 0; i < waypoints.length; i++) {
                    if (progress >= waypoints[i].progress && i > lastWP) {
                        lastWP = i;
                        showWaypoint(waypoints[i].icon, waypoints[i].title, waypoints[i].subtitle, Math.round(progress * river.length) + ' km');
                        break;
                    }
                }
            }, 250);
        }

        function simulateFlight() {
            const river = currentRiver;
            flyMap.setView([20, 0], 3);
            showWaypoint('🏔️', 'Source', river.source, '0 km');

            let progress = 0;
            flyAnimation = setInterval(() => {
                if (isPaused) return;
                progress += 2;
                if (progress >= 100) {
                    clearInterval(flyAnimation);
                    showSummary();
                    return;
                }
                document.getElementById('progressFill').style.width = progress + '%';
                document.getElementById('progressText').textContent = progress + '%';
            }, 150);
        }

        function showWaypoint(icon, title, subtitle, distance) {
            const popup = document.getElementById('waypointPopup');
            document.getElementById('waypointIcon').textContent = icon;
            document.getElementById('waypointTitle').textContent = title;
            document.getElementById('waypointSubtitle').textContent = subtitle;
            document.getElementById('waypointDistance').textContent = distance;
            popup.classList.remove('active');
            setTimeout(() => popup.classList.add('active'), 50);
            setTimeout(() => popup.classList.remove('active'), 3000);
        }

        function showSummary() {
            const river = currentRiver;
            document.getElementById('waypointPopup').classList.remove('active');
            document.getElementById('summarySubtitle').textContent = `You traveled ${river.length.toLocaleString()} km along the ${river.name}!`;
            document.getElementById('summaryStats').innerHTML = `
                <div class="summary-stat"><div class="summary-stat-value">${river.length.toLocaleString()}</div><div class="summary-stat-label">Kilometers</div></div>
                <div class="summary-stat"><div class="summary-stat-value">${river.countries.length}</div><div class="summary-stat-label">Countries</div></div>
                <div class="summary-stat"><div class="summary-stat-value">${river.tributaries.left.length + river.tributaries.right.length}</div><div class="summary-stat-label">Tributaries</div></div>
                <div class="summary-stat"><div class="summary-stat-value">${(river.basin/1000).toFixed(0)}K</div><div class="summary-stat-label">Basin km²</div></div>
            `;
            document.getElementById('summaryCard').classList.add('active');
        }

        function closeFlyAlong() {
            if (flyAnimation) clearInterval(flyAnimation);
            document.getElementById('flyModal').classList.remove('active');
            document.getElementById('summaryCard').classList.remove('active');
            document.getElementById('waypointPopup').classList.remove('active');
        }

        function closeSummary() {
            document.getElementById('summaryCard').classList.remove('active');
            closeFlyAlong();
        }
    </script>
</body>
</html>
