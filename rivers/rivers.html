<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivers of the World | Geography Learning App</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="rivers-styles.css">
</head>
<body class="listing-page">
    <!-- Loading -->
    <div class="loader" id="loader">
        <div class="loader-content">
            <div class="loader-icon">🌊</div>
            <div class="loader-spinner"></div>
            <p>Loading Rivers Data...</p>
        </div>
    </div>

    <!-- Hero Section -->
    <header class="hero-section">
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">
                <span class="title-icon">🌊</span>
                Rivers of the World
            </h1>
            <p class="hero-subtitle">Explore the magnificent waterways that shape our planet</p>
            <div class="hero-stats">
                <div class="stat-item">
                    <span class="stat-number" id="totalRivers">0</span>
                    <span class="stat-label">Rivers</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="totalContinents">0</span>
                    <span class="stat-label">Continents</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="totalLength">0</span>
                    <span class="stat-label">Total km</span>
                </div>
            </div>
        </div>
        <div class="scroll-indicator">
            <i class="fas fa-chevron-down"></i>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Search & Filter -->
        <section class="controls-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search rivers...">
            </div>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">
                    <i class="fas fa-globe"></i> All
                </button>
                <button class="filter-btn" data-filter="africa">
                    <i class="fas fa-globe-africa"></i> Africa
                </button>
                <button class="filter-btn" data-filter="asia">
                    <i class="fas fa-globe-asia"></i> Asia
                </button>
                <button class="filter-btn" data-filter="europe">
                    <i class="fas fa-globe-europe"></i> Europe
                </button>
                <button class="filter-btn" data-filter="north-america">
                    <i class="fas fa-globe-americas"></i> N. America
                </button>
                <button class="filter-btn" data-filter="south-america">
                    <i class="fas fa-globe-americas"></i> S. America
                </button>
                <button class="filter-btn" data-filter="australia">
                    <i class="fas fa-globe"></i> Australia
                </button>
            </div>
            <div class="sort-group">
                <label>Sort by:</label>
                <select id="sortSelect">
                    <option value="name">Name (A-Z)</option>
                    <option value="length">Length (Longest)</option>
                    <option value="discharge">Discharge (Highest)</option>
                    <option value="basin">Basin Area (Largest)</option>
                </select>
            </div>
        </section>

        <!-- Rivers Grid -->
        <section class="rivers-grid" id="riversGrid">
            <!-- Rivers inserted by JS -->
        </section>

        <!-- World Map Preview -->
        <section class="world-map-section">
            <h2 class="section-title">
                <i class="fas fa-map"></i>
                World Rivers Map
            </h2>
            <div id="worldMap" class="world-map"></div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>🌊 Geography Learning App - Rivers of the World</p>
    </footer>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="rivers-data.js"></script>
    <script src="rivers-app.js"></script>
</body>
</html>
