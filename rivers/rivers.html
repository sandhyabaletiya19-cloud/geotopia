<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌊 World's Greatest Rivers</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="rivers-styles.css">
</head>
<body class="home-page">
    <!-- Loading -->
    <div class="loader" id="loader">
        <div class="loader-content">
            <div class="loader-icon">🌊</div>
            <div class="loader-spinner"></div>
            <p>Loading Rivers Data...</p>
        </div>
    </div>

    <!-- Background -->
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>

    <!-- Main Container -->
    <main class="main-container">
        <!-- Header with Back Button -->
        <header class="main-header">
            <div class="header-left">
                <a href="../index.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back to Home</span>
                </a>
                <div class="logo">
                    <i class="fas fa-water"></i>
                    <span>World Rivers</span>
                </div>
            </div>
            <div class="header-center">
                <h1 class="main-title">
                    <span class="title-icon">🌊</span>
                    <span class="title-text">100 Greatest Rivers</span>
                </h1>
                <p class="subtitle">Explore the world's mightiest waterways</p>
            </div>
            <div class="header-right">
                <div class="stats-mini">
                    <div class="stat-item">
                        <span class="stat-num" id="totalRivers">100</span>
                        <span class="stat-label">Rivers</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-num" id="totalCountries">50+</span>
                        <span class="stat-label">Countries</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Search & Filter Section -->
        <section class="controls-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search rivers by name, country, or continent...">
                <button class="clear-btn" id="clearSearch">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="filter-row">
                <div class="filter-group">
                    <label>Continent:</label>
                    <select id="continentFilter">
                        <option value="all">All Continents</option>
                        <option value="Africa">Africa</option>
                        <option value="Asia">Asia</option>
                        <option value="Europe">Europe</option>
                        <option value="North America">North America</option>
                        <option value="South America">South America</option>
                        <option value="Australia">Australia</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Length:</label>
                    <select id="lengthFilter">
                        <option value="all">All Lengths</option>
                        <option value="6000+">6,000+ km (Mega)</option>
                        <option value="4000-6000">4,000-6,000 km</option>
                        <option value="2000-4000">2,000-4,000 km</option>
                        <option value="1000-2000">1,000-2,000 km</option>
                        <option value="0-1000">Under 1,000 km</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Sort by:</label>
                    <select id="sortFilter">
                        <option value="length-desc">Longest First</option>
                        <option value="length-asc">Shortest First</option>
                        <option value="name-asc">Name A-Z</option>
                        <option value="name-desc">Name Z-A</option>
                    </select>
                </div>
                <div class="view-toggle">
                    <button class="view-btn active" data-view="grid">
                        <i class="fas fa-th-large"></i>
                    </button>
                    <button class="view-btn" data-view="list">
                        <i class="fas fa-list"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- Results Count -->
        <div class="results-bar">
            <span id="resultsCount">Showing 100 rivers</span>
        </div>

        <!-- Rivers Grid -->
        <section class="rivers-grid" id="riversGrid">
            <!-- Rivers cards inserted by JS -->
        </section>

        <!-- No Results -->
        <div class="no-results" id="noResults" style="display: none;">
            <i class="fas fa-water"></i>
            <h3>No rivers found</h3>
            <p>Try adjusting your search or filters</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="main-footer">
        <p>🌊 World Rivers Explorer | Data sourced from geographic databases</p>
    </footer>

    <!-- Scripts -->
    <script src="data/rivers-data-1.js"></script>
    <script src="data/rivers-data-2.js"></script>
    <script src="data/rivers-data-3.js"></script>
    <script src="data/rivers-data-4.js"></script>
    <script src="data/rivers-data-5.js"></script>
    <script src="data/rivers-data-6.js"></script>
    <script src="data/rivers-data-7.js"></script>
    <script src="data/rivers-data-8.js"></script>
    <script src="data/rivers-data-9.js"></script>
    <script src="data/rivers-data-10.js"></script>
    <script src="rivers-data.js"></script>
    <script src="rivers-app.js"></script>
</body>
</html>
