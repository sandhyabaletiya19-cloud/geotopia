<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>River Profile</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="rivers-styles.css">
</head>
<body class="profile-page">
    
    <div class="loader" id="loader">
        <div class="loader-icon">🌊</div>
        <p>Loading...</p>
    </div>

    <div class="profile-bg" id="bg"></div>
    <div class="profile-overlay"></div>

    <main class="profile-container">
        
        <header class="profile-header">
            <div class="header-left">
                <a href="rivers.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> All Rivers
                </a>
                <h1 id="riverName"></h1>
                <div id="riverMeta"></div>
            </div>
            <button class="fly-btn" id="flyBtn">
                <i class="fas fa-plane"></i> Fly Along River
            </button>
        </header>

        <section class="stats-section">
            <div class="stats-grid" id="stats"></div>
        </section>

        <section class="content-grid">
            
            <div class="content-card">
                <div class="card-header">
                    <h3><i class="fas fa-map"></i> River Map</h3>
                </div>
                <div id="map" style="height: 400px;"></div>
            </div>

            <div class="content-card">
                <div class="card-header">
                    <h3><i class="fas fa-info-circle"></i> Information</h3>
                </div>
                <div id="info"></div>
            </div>
            
        </section>

        <section class="flow-section">
            <h3><i class="fas fa-code-branch"></i> Flow System</h3>
            <div class="flow-grid">
                <div class="flow-card">
                    <h4><i class="fas fa-arrow-right"></i> Tributaries (IN)</h4>
                    <div id="tribList"></div>
                </div>
                <div class="flow-card">
                    <h4><i class="fas fa-arrow-left"></i> Distributaries (OUT)</h4>
                    <div id="distList"></div>
                </div>
            </div>
        </section>

        <section class="facts-section">
            <h3><i class="fas fa-lightbulb"></i> Facts</h3>
            <div id="facts"></div>
        </section>

        <section class="cities-section">
            <h3><i class="fas fa-city"></i> Cities</h3>
            <div id="cities"></div>
        </section>

    </main>

    <div class="flyover-modal" id="flyModal">
        <button class="close-btn" id="closeBtn">✕</button>
        <h2 id="flyTitle"></h2>
        <div id="flyMap" style="height: 400px; margin: 20px 0;"></div>
        <div id="flyInfo"></div>
        <div id="flyProgress"></div>
        <div>
            <button id="pauseBtn">Pause</button>
            <button id="restartBtn">Restart</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="rivers-data.js"></script>
    <script>
        let river, map, flyMap, flyInt, paused = false;

        // GET RIVER ID
        const id = parseInt(new URLSearchParams(location.search).get('id'));
        if (!id || !riversData) {
            document.body.innerHTML = '<h1 style="text-align:center;padding:100px;">ERROR: River not found</h1>';
        } else {
            river = riversData.find(r => r.id === id);
            if (!river) {
                document.body.innerHTML = '<h1 style="text-align:center;padding:100px;">ERROR: River not found</h1>';
            } else {
                init();
            }
        }

        function init() {
            document.title = river.name;
            document.getElementById('bg').style.backgroundImage = `url(${river.image})`;
            
            // NAME
            document.getElementById('riverName').innerHTML = `<i class="fas fa-water"></i> ${river.name}`;
            
            // META
            document.getElementById('riverMeta').innerHTML = `
                <span><i class="fas fa-globe"></i> ${river.continent}</span>
                <span><i class="fas fa-flag"></i> ${river.countries.join(', ')}</span>
                <span><i class="fas fa-ruler"></i> ${river.length.toLocaleString()} km</span>
            `;
            
            // STATS
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon" style="background: #0077b620; color: #0077b6;">
                        <i class="fas fa-ruler"></i>
                    </div>
                    <div>
                        <div class="stat-value">${river.length.toLocaleString()}</div>
                        <div class="stat-label">Length (km)</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: #00b4d820; color: #00b4d8;">
                        <i class="fas fa-tint"></i>
                    </div>
                    <div>
                        <div class="stat-value">${river.discharge.toLocaleString()}</div>
                        <div class="stat-label">Discharge (m³/s)</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: #48cae420; color: #48cae4;">
                        <i class="fas fa-mountain"></i>
                    </div>
                    <div>
                        <div class="stat-value">${river.source.elevation.toLocaleString()}</div>
                        <div class="stat-label">Source Elevation (m)</div>
                    </div>
                </div>
            `;
            
            // INFO
            document.getElementById('info').innerHTML = `
                <div style="padding: 20px;">
                    <p><strong><i class="fas fa-play-circle"></i> Source:</strong> ${river.source.name} (${river.source.elevation}m)</p>
                    <p><strong><i class="fas fa-water"></i> Mouth:</strong> ${river.mouth.name}</p>
                    <p><strong><i class="fas fa-flag"></i> Countries:</strong> ${river.countries.join(', ')}</p>
                </div>
            `;
            
            // TRIBS
            document.getElementById('tribList').innerHTML = river.tributaries.map(t => `
                <div class="flow-item">
                    <i class="fas fa-arrow-right" style="color: #00b4d8;"></i>
                    <span>${t.name} (${t.length} km)</span>
                </div>
            `).join('') || '<p>None</p>';
            
            // DISTS
            document.getElementById('distList').innerHTML = river.distributaries.map(d => `
                <div class="flow-item">
                    <i class="fas fa-arrow-left" style="color: #f72585;"></i>
                    <span>${d.name} (${d.length} km)</span>
                </div>
            `).join('') || '<p>None</p>';
            
            // FACTS
            document.getElementById('facts').innerHTML = river.facts.map((f, i) => `
                <div class="fact-card">
                    <div class="fact-num">${i+1}</div>
                    <p>${f}</p>
                </div>
            `).join('');
            
            // CITIES
            document.getElementById('cities').innerHTML = river.cities.map(c => `
                <div class="city-card">
                    <i class="fas fa-city"></i>
                    <h4>${c.name}</h4>
                    <p>${c.population.toLocaleString()}</p>
                </div>
            `).join('');
            
            // MAP
            setTimeout(() => {
                map = L.map('map').setView([river.source.lat, river.source.lng], 5);
                L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);
                
                const courseLatLngs = river.course.map(c => [c[0], c[1]]);
                L.polyline(courseLatLngs, {color: '#0077b6', weight: 4}).addTo(map);
                
                L.marker([river.source.lat, river.source.lng]).addTo(map).bindPopup('Source: ' + river.source.name);
                L.marker([river.mouth.lat, river.mouth.lng]).addTo(map).bindPopup('Mouth: ' + river.mouth.name);
                
                river.tributaries.forEach(t => {
                    L.marker([t.lat, t.lng]).addTo(map).bindPopup(`→ ${t.name} (Tributary)`);
                });
                
                river.distributaries.forEach(d => {
                    L.marker([d.lat, d.lng]).addTo(map).bindPopup(`← ${d.name} (Distributary)`);
                });
                
                river.cities.forEach(c => {
                    L.marker([c.lat, c.lng]).addTo(map).bindPopup(`🏙️ ${c.name}`);
                });
                
                map.fitBounds(courseLatLngs);
                
                document.getElementById('loader').style.display = 'none';
            }, 500);
            
            // EVENTS
            document.getElementById('flyBtn').onclick = startFly;
            document.getElementById('closeBtn').onclick = () => {
                document.getElementById('flyModal').classList.remove('active');
                clearInterval(flyInt);
                if (flyMap) flyMap.remove();
            };
            document.getElementById('pauseBtn').onclick = () => { paused = !paused; };
            document.getElementById('restartBtn').onclick = () => {
                clearInterval(flyInt);
                startFly();
            };
        }

        function startFly() {
            document.getElementById('flyModal').classList.add('active');
            document.getElementById('flyTitle').textContent = `Flying Along ${river.name}`;
            
            setTimeout(() => {
                if (flyMap) flyMap.remove();
                
                flyMap = L.map('flyMap').setView([river.course[0][0], river.course[0][1]], 9);
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(flyMap);
                
                const courseLatLngs = river.course.map(c => [c[0], c[1]]);
                L.polyline(courseLatLngs, {color: '#00b4d8', weight: 3}).addTo(flyMap);
                
                let i = 0;
                paused = false;
                
                flyInt = setInterval(() => {
                    if (paused) return;
                    
                    if (i >= river.course.length) {
                        clearInterval(flyInt);
                        document.getElementById('flyInfo').textContent = 'Journey Complete!';
                        return;
                    }
                    
                    flyMap.flyTo([river.course[i][0], river.course[i][1]], 10, {duration: 1.5});
                    
                    const prog = Math.round((i / (river.course.length - 1)) * 100);
                    document.getElementById('flyProgress').innerHTML = `<div style="width:${prog}%;height:10px;background:#00b4d8;"></div>`;
                    document.getElementById('flyInfo').textContent = `Progress: ${prog}%`;
                    
                    i++;
                }, 2000);
            }, 200);
        }
    </script>
</body>
</html>
