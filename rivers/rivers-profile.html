<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>River Profile | Geography App</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Lato:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="rivers-styles.css">
</head>
<body class="profile-page">
    <!-- Loading -->
    <div class="loader" id="loader">
        <div class="loader-content">
            <div class="loader-icon">🌊</div>
            <div class="loader-spinner"></div>
            <p>Loading River Data...</p>
        </div>
    </div>

    <!-- Background -->
    <div class="profile-bg" id="profileBg"></div>
    <div class="profile-overlay"></div>

    <!-- Main Content -->
    <main class="profile-container">
        <!-- Header -->
        <header class="profile-header">
            <div class="header-left">
                <a href="rivers.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                    <span>All Rivers</span>
                </a>
                <div class="river-title">
                    <h1 id="riverName">
                        <i class="fas fa-water"></i>
                        <span>Loading...</span>
                    </h1>
                    <div class="river-meta" id="riverMeta"></div>
                </div>
            </div>
            <div class="header-right">
                <button class="action-btn fly-btn" id="flyAlongBtn">
                    <i class="fas fa-plane"></i>
                    <span>Fly Along River</span>
                </button>
            </div>
        </header>

        <!-- Stats Row -->
        <section class="stats-section">
            <div class="stats-grid" id="statsGrid">
                <!-- Stats inserted by JS -->
            </div>
        </section>

        <!-- Main Content Grid -->
        <section class="content-grid">
            <!-- Map Section -->
            <div class="content-card map-card">
                <div class="card-header">
                    <h3><i class="fas fa-map-marked-alt"></i> River Course Map</h3>
                    <div class="map-controls">
                        <button class="map-btn active" data-layer="terrain">
                            <i class="fas fa-mountain"></i> Terrain
                        </button>
                        <button class="map-btn" data-layer="satellite">
                            <i class="fas fa-satellite"></i> Satellite
                        </button>
                    </div>
                </div>
                <div id="riverMap"></div>
                <div class="map-legend">
                    <div class="legend-item">
                        <span class="legend-line river"></span> River Course
                    </div>
                    <div class="legend-item">
                        <span class="legend-arrow in"></span> Tributaries (IN)
                    </div>
                    <div class="legend-item">
                        <span class="legend-arrow out"></span> Distributaries (OUT)
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot city"></span> Major Cities
                    </div>
                </div>
            </div>

            <!-- Info Section -->
            <div class="content-card info-card">
                <div class="card-header">
                    <h3><i class="fas fa-info-circle"></i> River Information</h3>
                </div>
                <div class="info-tree" id="infoTree">
                    <!-- Info tree inserted by JS -->
                </div>
            </div>
        </section>

        <!-- Facts Section -->
        <section class="facts-section">
            <h3 class="section-title"><i class="fas fa-lightbulb"></i> Interesting Facts</h3>
            <div class="facts-grid" id="factsGrid">
                <!-- Facts inserted by JS -->
            </div>
        </section>

        <!-- Tributaries & Distributaries Section -->
        <section class="tributaries-section">
            <div class="trib-grid">
                <!-- Tributaries -->
                <div class="trib-card">
                    <h3 class="section-title">
                        <i class="fas fa-arrow-right" style="color: #00b4d8;"></i> 
                        Tributaries (Flow IN)
                    </h3>
                    <div class="trib-list" id="tributariesList">
                        <!-- Inserted by JS -->
                    </div>
                </div>
                
                <!-- Distributaries -->
                <div class="trib-card">
                    <h3 class="section-title">
                        <i class="fas fa-arrow-left" style="color: #f72585;"></i> 
                        Distributaries (Flow OUT)
                    </h3>
                    <div class="trib-list" id="distributariesList">
                        <!-- Inserted by JS -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Cities Section -->
        <section class="cities-section">
            <h3 class="section-title"><i class="fas fa-city"></i> Major Cities</h3>
            <div class="cities-grid" id="citiesGrid">
                <!-- Cities inserted by JS -->
            </div>
        </section>
    </main>

    <!-- Flyover Modal -->
    <div class="flyover-modal" id="flyoverModal">
        <button class="close-modal" id="closeFlyover">
            <i class="fas fa-times"></i>
        </button>
        <div class="flyover-content">
            <h2 class="flyover-title">
                <i class="fas fa-plane"></i>
                <span id="flyoverTitle">Flying Along River</span>
            </h2>
            <div class="flyover-map-container">
                <div id="flyoverMap"></div>
            </div>
            <div class="flyover-info">
                <div class="current-location">
                    <span class="info-label">Now viewing:</span>
                    <span class="location-name" id="currentLocation">Starting...</span>
                </div>
            </div>
            <div class="flyover-progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="progress-text" id="progressText">0%</span>
            </div>
            <div class="flyover-controls">
                <button class="control-btn" id="pauseBtn">
                    <i class="fas fa-pause"></i>
                </button>
                <button class="control-btn" id="restartBtn">
                    <i class="fas fa-redo"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="rivers-data.js"></script>
    <script src="rivers-profile.js"></script>
</body>
</html>
