<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>River Profile | Geography App</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Lato:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="rivers-styles.css">
</head>
<body class="profile-page">
    <!-- Loading -->
    <div class="loader" id="loader">
        <div class="loader-content">
            <div class="loader-icon">🌊</div>
            <div class="loader-spinner"></div>
            <p>Loading River Data...</p>
        </div>
    </div>

    <!-- Background -->
    <div class="profile-bg" id="profileBg"></div>
    <div class="profile-overlay"></div>

    <!-- Main Content -->
    <main class="profile-container">
        <!-- Header -->
        <header class="profile-header">
            <div class="header-left">
                <a href="rivers.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                    <span>All Rivers</span>
                </a>
                <div class="river-title">
                    <h1 id="riverName">
                        <i class="fas fa-water"></i>
                        <span>Loading...</span>
                    </h1>
                    <div class="river-meta" id="riverMeta"></div>
                </div>
            </div>
            <div class="header-right">
                <button class="action-btn fly-btn" id="flyAlongBtn">
                    <i class="fas fa-plane"></i>
                    <span>Fly Along River</span>
                </button>
            </div>
        </header>

        <!-- Stats Row -->
        <section class="stats-section">
            <div class="stats-grid" id="statsGrid">
                <!-- Stats inserted by JS -->
            </div>
        </section>

        <!-- Main Content Grid -->
        <section class="content-grid">
            <!-- Map Section -->
            <div class="content-card map-card">
                <div class="card-header">
                    <h3><i class="fas fa-map-marked-alt"></i> River Course Map</h3>
                    <div class="map-controls">
                        <button class="map-btn active" data-layer="terrain">
                            <i class="fas fa-mountain"></i> Terrain
                        </button>
                        <button class="map-btn" data-layer="satellite">
                            <i class="fas fa-satellite"></i> Satellite
                        </button>
                    </div>
                </div>
                <div id="riverMap"></div>
                <div class="map-legend">
                    <div class="legend-item">
                        <span class="legend-line river"></span> River Course
                    </div>
                    <div class="legend-item">
                        <span class="legend-arrow in"></span> Tributaries (IN)
                    </div>
                    <div class="legend-item">
                        <span class="legend-arrow out"></span> Distributaries (OUT)
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot city"></span> Major Cities
                    </div>
                </div>
            </div>

            <!-- Info Section -->
            <div class="content-card info-card">
                <div class="card-header">
                    <h3><i class="fas fa-info-circle"></i> River Information</h3>
                </div>
                <div class="info-tree" id="infoTree">
                    <!-- Info tree inserted by JS -->
                </div>
            </div>
        </section>

        <!-- Facts Section -->
        <section class="facts-section">
            <h3 class="section-title"><i class="fas fa-lightbulb"></i> Interesting Facts</h3>
            <div class="facts-grid" id="factsGrid">
                <!-- Facts inserted by JS -->
            </div>
        </section>

        <!-- Tributaries & Distributaries Section -->
        <section class="tributaries-section">
            <div class="trib-grid">
                <!-- Tributaries -->
                <div class="trib-card">
                    <h3 class="section-title">
                        <i class="fas fa-arrow-right" style="color: #00b4d8;"></i> 
                        Tributaries (Flow IN)
                    </h3>
                    <div class="trib-list" id="tributariesList">
                        <!-- Inserted by JS -->
                    </div>
                </div>
                
                <!-- Distributaries -->
                <div class="trib-card">
                    <h3 class="section-title">
                        <i class="fas fa-arrow-left" style="color: #f72585;"></i> 
                        Distributaries (Flow OUT)
                    </h3>
                    <div class="trib-list" id="distributariesList">
                        <!-- Inserted by JS -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Cities Section -->
        <section class="cities-section">
            <h3 class="section-title"><i class="fas fa-city"></i> Major Cities</h3>
            <div class="cities-grid" id="citiesGrid">
                <!-- Cities inserted by JS -->
            </div>
        </section>
    </main>

    <!-- Flyover Modal -->
    <div class="flyover-modal" id="flyoverModal">
        <button class="close-modal" id="closeFlyover">
            <i class="fas fa-times"></i>
        </button>
        <div class="flyover-content">
            <h2 class="flyover-title">
                <i class="fas fa-plane"></i>
                <span id="flyoverTitle">Flying Along River</span>
            </h2>
            <div class="flyover-map-container">
                <div id="flyoverMap"></div>
            </div>
            <div class="flyover-info">
                <div class="current-location">
                    <span class="info-label">Now viewing:</span>
                    <span class="location-name" id="currentLocation">Starting...</span>
                </div>
            </div>
            <div class="flyover-progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="progress-text" id="progressText">0%</span>
            </div>
            <div class="flyover-controls">
                <button class="control-btn" id="pauseBtn">
                    <i class="fas fa-pause"></i>
                </button>
                <button class="control-btn" id="restartBtn">
                    <i class="fas fa-redo"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
    // ==========================================
    // RIVERS PROFILE - COMPLETE APP (FIXED)
    // ==========================================

    let currentRiver = null;
    let map = null;
    let flyoverMap = null;
    let flyoverInterval = null;
    let isPaused = false;

    // ==========================================
    // INITIALIZATION
    // ==========================================
    document.addEventListener('DOMContentLoaded', function() {
        console.log('🌊 Rivers Profile Loading...');
        
        // Create particles
        createParticles();
        
        // Get river ID
        const urlParams = new URLSearchParams(window.location.search);
        const riverId = parseInt(urlParams.get('id'));
        
        console.log('River ID from URL:', riverId);
        
        if (!riverId) {
            showError('No river selected. Please go back and select a river.');
            return;
        }
        
        // Check if riversData exists
        if (typeof riversData === 'undefined') {
            showError('River data not loaded. Check rivers-data.js file.');
            return;
        }
        
        console.log('Rivers Data Available:', riversData.length, 'rivers');
        
        // Find river
        currentRiver = riversData.find(r => r.id === riverId);
        
        if (!currentRiver) {
            showError(`River with ID ${riverId} not found.`);
            return;
        }
        
        console.log('✅ Found River:', currentRiver.name);
        console.log('River Data:', currentRiver);
        
        // Initialize
        initProfile();
    });

    // ==========================================
    // CREATE PARTICLES
    // ==========================================
    function createParticles() {
        const container = document.getElementById('particles');
        if (!container) return;
        
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (15 + Math.random() * 10) + 's';
            container.appendChild(particle);
        }
    }

    // ==========================================
    // INIT PROFILE
    // ==========================================
    function initProfile() {
        // Set background
        const bgEl = document.getElementById('profileBg');
        if (bgEl && currentRiver.image) {
            bgEl.style.backgroundImage = `url('${currentRiver.image}')`;
        }
        
        document.title = `${currentRiver.name} | Rivers of the World`;
        
        // Render content
        renderMainContent();
        
        // Initialize map after content is rendered
        setTimeout(() => {
            initMap();
            setupEventListeners();
            
            // Hide loader
            document.getElementById('loader').classList.add('hidden');
        }, 500);
    }

    // ==========================================
    // RENDER MAIN CONTENT
    // ==========================================
    function renderMainContent() {
        const container = document.getElementById('mainContent');
        if (!container) return;
        
        container.innerHTML = `
            <!-- Header -->
            <header class="profile-header">
                <div class="header-left">
                    <a href="rivers.html" class="back-btn">
                        <i class="fas fa-arrow-left"></i>
                        <span>All Rivers</span>
                    </a>
                    <div class="river-title">
                        <h1>
                            <i class="fas fa-water"></i>
                            <span>${currentRiver.name}</span>
                        </h1>
                    </div>
                    <div class="river-meta">
                        <span><i class="fas fa-globe-americas"></i> ${currentRiver.continent}</span>
                        <span><i class="fas fa-flag"></i> ${currentRiver.countries.length} Countries</span>
                        <span><i class="fas fa-ruler-horizontal"></i> ${currentRiver.length.toLocaleString()} km</span>
                        <span><i class="fas fa-tint"></i> ${currentRiver.discharge.toLocaleString()} m³/s</span>
                    </div>
                </div>
                <div class="header-right">
                    <button class="action-btn" id="flyAlongBtn">
                        <i class="fas fa-plane"></i>
                        <span>Fly Along River</span>
                    </button>
                </div>
            </header>

            <!-- Stats -->
            <section class="stats-section">
                <div class="stats-grid">
                    ${renderStats()}
                </div>
            </section>

            <!-- Content Grid: Map + Mind Map -->
            <section class="content-grid">
                <!-- Map -->
                <div class="content-card">
                    <div class="card-header">
                        <h3><i class="fas fa-map-marked-alt"></i> Interactive River Map</h3>
                        <div class="map-controls">
                            <button class="map-btn active" data-layer="terrain">
                                <i class="fas fa-mountain"></i> Terrain
                            </button>
                            <button class="map-btn" data-layer="satellite">
                                <i class="fas fa-satellite"></i> Satellite
                            </button>
                        </div>
                    </div>
                    <div id="riverMap"></div>
                    <div class="map-legend">
                        <div class="legend-item">
                            <span class="legend-line river"></span> River Course
                        </div>
                        <div class="legend-item">
                            <span class="legend-marker source"><i class="fas fa-play"></i></span> Source
                        </div>
                        <div class="legend-item">
                            <span class="legend-marker mouth"><i class="fas fa-water"></i></span> Mouth
                        </div>
                        <div class="legend-item">
                            <span class="legend-marker tributary"><i class="fas fa-arrow-right"></i></span> Tributary
                        </div>
                        <div class="legend-item">
                            <span class="legend-marker distributary"><i class="fas fa-arrow-left"></i></span> Distributary
                        </div>
                        <div class="legend-item">
                            <span class="legend-marker city"><i class="fas fa-city"></i></span> City
                        </div>
                    </div>
                </div>

                <!-- Mind Map -->
                <div class="content-card">
                    <div class="card-header">
                        <h3><i class="fas fa-project-diagram"></i> River Information</h3>
                    </div>
                    <div class="mind-map">
                        <div class="mind-map-center">
                            <i class="fas fa-water"></i>
                            <span>${currentRiver.name.split(' ')[0]}</span>
                        </div>
                        <div class="mind-map-branches">
                            ${renderMindMap()}
                        </div>
                    </div>
                </div>
            </section>

            <!-- Tributaries & Distributaries -->
            <section class="flow-section">
                <div class="section-header">
                    <h3><i class="fas fa-code-branch"></i> Water Flow System</h3>
                </div>
                <div class="flow-grid">
                    ${renderFlowCards()}
                </div>
            </section>

            <!-- Facts -->
            <section class="facts-section">
                <div class="section-header">
                    <h3><i class="fas fa-lightbulb"></i> Interesting Facts</h3>
                </div>
                <div class="facts-grid">
                    ${renderFacts()}
                </div>
            </section>

            <!-- Cities -->
            <section class="cities-section">
                <div class="section-header">
                    <h3><i class="fas fa-city"></i> Major Cities Along the River</h3>
                </div>
                <div class="cities-grid">
                    ${renderCities()}
                </div>
            </section>
        `;
    }

    // ==========================================
    // RENDER STATS
    // ==========================================
    function renderStats() {
        const sourceElev = currentRiver.source?.elevation || 0;
        const tribCount = currentRiver.tributaries?.length || 0;
        const distCount = currentRiver.distributaries?.length || 0;
        
        const stats = [
            { icon: 'fa-ruler-horizontal', value: currentRiver.length.toLocaleString(), label: 'Length (km)', color: '#0077b6' },
            { icon: 'fa-tint', value: currentRiver.discharge.toLocaleString(), label: 'Discharge (m³/s)', color: '#00b4d8' },
            { icon: 'fa-mountain', value: sourceElev.toLocaleString(), label: 'Source Elevation (m)', color: '#48cae4' },
            { icon: 'fa-flag', value: currentRiver.countries.length, label: 'Countries', color: '#90e0ef' },
            { icon: 'fa-code-branch', value: tribCount, label: 'Tributaries', color: '#06d6a0' },
            { icon: 'fa-project-diagram', value: distCount, label: 'Distributaries', color: '#f72585' }
        ];
        
        return stats.map(stat => `
            <div class="stat-card">
                <div class="stat-icon" style="background: ${stat.color}25; color: ${stat.color}">
                    <i class="fas ${stat.icon}"></i>
                </div>
                <div class="stat-content">
                    <span class="stat-value">${stat.value}</span>
                    <span class="stat-label">${stat.label}</span>
                </div>
            </div>
        `).join('');
    }

    // ==========================================
    // RENDER MIND MAP - FIXED VERSION
    // ==========================================
    function renderMindMap() {
        // Safe access with fallbacks
        const sourceName = currentRiver.source?.name || 'Unknown Source';
        const sourceElevation = currentRiver.source?.elevation || 0;
        const mouthName = currentRiver.mouth?.name || 'Unknown Mouth';
        const description = currentRiver.description || 
            `The ${currentRiver.name} is one of the major rivers in ${currentRiver.continent}, flowing through ${currentRiver.countries.length} countries for ${currentRiver.length.toLocaleString()} kilometers.`;
        
        return `
            <!-- Source -->
            <div class="mind-branch">
                <div class="branch-header">
                    <div class="branch-icon" style="background: rgba(6, 214, 160, 0.25); color: #06d6a0;">
                        <i class="fas fa-play-circle"></i>
                    </div>
                    <span class="branch-title">Source</span>
                </div>
                <p class="branch-content">${sourceName} at ${sourceElevation.toLocaleString()}m elevation</p>
            </div>
            
            <!-- Mouth -->
            <div class="mind-branch">
                <div class="branch-header">
                    <div class="branch-icon" style="background: rgba(0, 180, 216, 0.25); color: #00b4d8;">
                        <i class="fas fa-water"></i>
                    </div>
                    <span class="branch-title">Mouth</span>
                </div>
                <p class="branch-content">${mouthName}</p>
            </div>
            
            <!-- Countries -->
            <div class="mind-branch">
                <div class="branch-header">
                    <div class="branch-icon" style="background: rgba(255, 215, 0, 0.25); color: #ffd700;">
                        <i class="fas fa-globe"></i>
                    </div>
                    <span class="branch-title">Countries (${currentRiver.countries.length})</span>
                </div>
                <div class="country-chips">
                    ${currentRiver.countries.map(c => `<span class="country-chip">${c}</span>`).join('')}
                </div>
            </div>
            
            <!-- Description -->
            <div class="mind-branch">
                <div class="branch-header">
                    <div class="branch-icon" style="background: rgba(72, 202, 228, 0.25); color: #48cae4;">
                        <i class="fas fa-info-circle"></i>
                    </div>
                    <span class="branch-title">About This River</span>
                </div>
                <p class="branch-content">${description}</p>
            </div>
            
            <!-- Flow Info -->
            <div class="mind-branch">
                <div class="branch-header">
                    <div class="branch-icon" style="background: rgba(144, 224, 239, 0.25); color: #90e0ef;">
                        <i class="fas fa-stream"></i>
                    </div>
                    <span class="branch-title">Flow Statistics</span>
                </div>
                <p class="branch-content">
                    Length: ${currentRiver.length.toLocaleString()} km • 
                    Discharge: ${currentRiver.discharge.toLocaleString()} m³/s
                </p>
            </div>
        `;
    }

    // ==========================================
    // RENDER FLOW CARDS
    // ==========================================
    function renderFlowCards() {
        // Tributaries
        let tributariesHTML = '';
        if (currentRiver.tributaries && currentRiver.tributaries.length > 0) {
            tributariesHTML = currentRiver.tributaries.map(trib => `
                <div class="flow-item">
                    <div class="flow-arrow">
                        <i class="fas fa-arrow-right"></i>
                    </div>
                    <div class="flow-info">
                        <h5>${trib.name}</h5>
                        <p>${trib.length?.toLocaleString() || 'N/A'} km</p>
                    </div>
                    <div class="flow-direction">
                        <i class="fas fa-sign-in-alt"></i> IN
                    </div>
                </div>
            `).join('');
        } else {
            tributariesHTML = '<p style="color: var(--text-secondary); padding: 20px; text-align: center;">No major tributaries recorded</p>';
        }
        
        // Distributaries
        let distributariesHTML = '';
        if (currentRiver.distributaries && currentRiver.distributaries.length > 0) {
            distributariesHTML = currentRiver.distributaries.map(dist => `
                <div class="flow-item">
                    <div class="flow-direction">
                        OUT <i class="fas fa-sign-out-alt"></i>
                    </div>
                    <div class="flow-info">
                        <h5>${dist.name}</h5>
                        <p>${dist.length?.toLocaleString() || 'N/A'} km</p>
                    </div>
                    <div class="flow-arrow">
                        <i class="fas fa-arrow-left"></i>
                    </div>
                </div>
            `).join('');
        } else {
            distributariesHTML = '<p style="color: var(--text-secondary); padding: 20px; text-align: center;">No major distributaries recorded</p>';
        }
        
        return `
            <div class="flow-card tributaries">
                <div class="flow-card-header">
                    <div class="flow-card-icon">
                        <i class="fas fa-arrow-right"></i>
                    </div>
                    <div class="flow-card-title">
                        <h4>Tributaries</h4>
                        <p>Rivers flowing INTO ${currentRiver.name}</p>
                    </div>
                </div>
                <div class="flow-list">
                    ${tributariesHTML}
                </div>
            </div>
            
            <div class="flow-card distributaries">
                <div class="flow-card-header">
                    <div class="flow-card-icon">
                        <i class="fas fa-arrow-left"></i>
                    </div>
                    <div class="flow-card-title">
                        <h4>Distributaries</h4>
                        <p>Branches flowing OUT of ${currentRiver.name}</p>
                    </div>
                </div>
                <div class="flow-list">
                    ${distributariesHTML}
                </div>
            </div>
        `;
    }

    // ==========================================
    // RENDER FACTS
    // ==========================================
    function renderFacts() {
        if (!currentRiver.facts || currentRiver.facts.length === 0) {
            return '<p style="color: var(--text-secondary); text-align: center; padding: 30px;">No facts available for this river.</p>';
        }
        
        return currentRiver.facts.map((fact, i) => `
            <div class="fact-card">
                <div class="fact-number">${i + 1}</div>
                <p class="fact-text">${fact}</p>
            </div>
        `).join('');
    }

    // ==========================================
    // RENDER CITIES
    // ==========================================
    function renderCities() {
        if (!currentRiver.cities || currentRiver.cities.length === 0) {
            return '<p style="color: var(--text-secondary); text-align: center; padding: 30px;">No city data available.</p>';
        }
        
        return currentRiver.cities.map(city => `
            <div class="city-card">
                <div class="city-icon">
                    <i class="fas fa-city"></i>
                </div>
                <h4>${city.name}</h4>
                <p><i class="fas fa-users"></i> ${city.population?.toLocaleString() || 'N/A'}</p>
            </div>
        `).join('');
    }

    // ==========================================
    // INITIALIZE MAP
    // ==========================================
    function initMap() {
        const mapEl = document.getElementById('riverMap');
        if (!mapEl) {
            console.error('Map element not found');
            return;
        }
        
        if (!currentRiver.course || currentRiver.course.length === 0) {
            console.error('No course data for river');
            mapEl.innerHTML = '<p style="padding: 50px; text-align: center; color: #888;">Map data not available</p>';
            return;
        }
        
        const course = currentRiver.course;
        const centerLat = course.reduce((s, p) => s + p[0], 0) / course.length;
        const centerLng = course.reduce((s, p) => s + p[1], 0) / course.length;
        
        map = L.map('riverMap').setView([centerLat, centerLng], 5);
        
        // Layers
        const terrain = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenTopoMap'
        });
        
        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '© Esri'
        });
        
        terrain.addTo(map);
        window.mapLayers = { terrain, satellite };
        
        // Draw river course
        const riverLine = L.polyline(course, {
            color: '#0077b6',
            weight: 5,
            opacity: 0.9
        }).addTo(map);
        
        // Animated flow line
        L.polyline(course, {
            color: '#00b4d8',
            weight: 3,
            opacity: 0.7,
            dashArray: '15, 10',
            className: 'river-flow'
        }).addTo(map);
        
        // Source marker
        if (currentRiver.source) {
            addMarker(course[0], 'source', 'fa-play', 
                `<b>🏔️ Source</b><br>${currentRiver.source.name || 'Unknown'}<br>Elevation: ${currentRiver.source.elevation || 0}m`);
        }
        
        // Mouth marker
        if (currentRiver.mouth) {
            addMarker(course[course.length - 1], 'mouth', 'fa-water',
                `<b>🌊 Mouth</b><br>${currentRiver.mouth.name || 'Unknown'}`);
        }
        
        // Tributaries
        if (currentRiver.tributaries) {
            currentRiver.tributaries.forEach(trib => {
                if (trib.coordinates) {
                    addMarker(trib.coordinates, 'tributary', 'fa-arrow-right',
                        `<b>→ ${trib.name}</b><br>Length: ${trib.length || 'N/A'} km<br><span style="color:#00b4d8">Flows INTO the river</span>`);
                }
            });
        }
        
        // Distributaries
        if (currentRiver.distributaries) {
            currentRiver.distributaries.forEach(dist => {
                if (dist.coordinates) {
                    addMarker(dist.coordinates, 'distributary', 'fa-arrow-left',
                        `<b>← ${dist.name}</b><br>Length: ${dist.length || 'N/A'} km<br><span style="color:#f72585">Flows OUT of the river</span>`);
                }
            });
        }
        
        // Cities
        if (currentRiver.cities) {
            currentRiver.cities.forEach(city => {
                if (city.coordinates) {
                    addMarker(city.coordinates, 'city', 'fa-city',
                        `<b>🏙️ ${city.name}</b><br>Population: ${city.population?.toLocaleString() || 'N/A'}`);
                }
            });
        }
        
        // Fit bounds
        map.fitBounds(riverLine.getBounds(), { padding: [50, 50] });
    }

    function addMarker(coords, type, icon, popup) {
        const markerIcon = L.divIcon({
            className: 'custom-marker',
            html: `<div class="marker-icon ${type}"><i class="fas ${icon}"></i></div>`,
            iconSize: [36, 36],
            iconAnchor: [18, 18]
        });
        
        L.marker(coords, { icon: markerIcon })
            .bindPopup(popup)
            .addTo(map);
    }

    // ==========================================
    // EVENT LISTENERS
    // ==========================================
    function setupEventListeners() {
        // Map layer buttons
        document.querySelectorAll('.map-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const layer = this.dataset.layer;
                
                map.eachLayer(l => {
                    if (l instanceof L.TileLayer) map.removeLayer(l);
                });
                window.mapLayers[layer].addTo(map);
                
                document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
        
        // Fly along button
        const flyBtn = document.getElementById('flyAlongBtn');
        if (flyBtn) flyBtn.addEventListener('click', startFlyover);
        
        const closeBtn = document.getElementById('closeFlyover');
        if (closeBtn) closeBtn.addEventListener('click', closeFlyover);
        
        const pauseBtn = document.getElementById('pauseBtn');
        if (pauseBtn) pauseBtn.addEventListener('click', togglePause);
        
        const restartBtn = document.getElementById('restartBtn');
        if (restartBtn) restartBtn.addEventListener('click', restartFlyover);
    }

    // ==========================================
    // FLYOVER
    // ==========================================
    function startFlyover() {
        document.getElementById('flyoverModal').classList.add('active');
        document.getElementById('flyoverTitle').textContent = `Flying Along ${currentRiver.name}`;
        
        setTimeout(initFlyoverMap, 300);
    }

    function initFlyoverMap() {
        if (flyoverMap) flyoverMap.remove();
        
        const course = currentRiver.course;
        if (!course || course.length === 0) return;
        
        flyoverMap = L.map('flyoverMap').setView(course[0], 9);
        
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(flyoverMap);
        
        L.polyline(course, { color: '#00b4d8', weight: 4 }).addTo(flyoverMap);
        
        animateFlyover();
    }

    function animateFlyover() {
        const course = currentRiver.course;
        let idx = 0;
        isPaused = false;
        document.getElementById('pauseBtn').innerHTML = '<i class="fas fa-pause"></i>';
        
        const locations = [
            currentRiver.source?.name || 'Source',
            ...(currentRiver.cities?.map(c => c.name) || []),
            currentRiver.mouth?.name || 'Mouth'
        ];
        
        flyoverInterval = setInterval(() => {
            if (isPaused) return;
            
            if (idx >= course.length) {
                clearInterval(flyoverInterval);
                document.getElementById('currentLocation').textContent = '🎉 Journey Complete!';
                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('progressText').textContent = '100%';
                return;
            }
            
            flyoverMap.flyTo(course[idx], 10, { duration: 1.5 });
            
            const progress = Math.round((idx / (course.length - 1)) * 100);
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = progress + '%';
            
            const locIdx = Math.floor((idx / course.length) * locations.length);
            document.getElementById('currentLocation').textContent = locations[Math.min(locIdx, locations.length - 1)];
            
            idx++;
        }, 2000);
    }

    function togglePause() {
        isPaused = !isPaused;
        document.getElementById('pauseBtn').innerHTML = isPaused 
            ? '<i class="fas fa-play"></i>' 
            : '<i class="fas fa-pause"></i>';
    }

    function restartFlyover() {
        if (flyoverInterval) clearInterval(flyoverInterval);
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('progressText').textContent = '0%';
        animateFlyover();
    }

    function closeFlyover() {
        document.getElementById('flyoverModal').classList.remove('active');
        if (flyoverInterval) clearInterval(flyoverInterval);
        if (flyoverMap) { flyoverMap.remove(); flyoverMap = null; }
    }

    // ==========================================
    // ERROR HANDLING
    // ==========================================
    function showError(msg) {
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('mainContent').innerHTML = `
            <div class="error-state">
                <i class="fas fa-exclamation-triangle"></i>
                <h2>Oops! Something went wrong</h2>
                <p>${msg}</p>
                <a href="rivers.html"><i class="fas fa-arrow-left"></i> Back to Rivers</a>
            </div>
        `;
    }
    
    console.log('✅ Rivers Profile Script Loaded!');
</script>
</body>
</html>
