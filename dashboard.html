<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Dashboard - DharaVerse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a14; --card: rgba(255,255,255,0.03);
            --purple: #7c3aed; --pink: #d63384; --border: rgba(255,255,255,0.1);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .dash-container { max-width: 900px; margin: 80px auto 0; }
        
        /* Profile Header */
        .profile-card {
            background: linear-gradient(135deg, rgba(124,58,237,0.1), rgba(214,51,132,0.1));
            border: 1px solid var(--purple); border-radius: 24px; padding: 30px;
            display: flex; align-items: center; gap: 20px; margin-bottom: 25px;
        }
        .avatar { width: 80px; height: 80px; background: var(--purple); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; }
        
        /* Grid Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .stat-box { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 20px; text-align: center; }
        .stat-val { font-size: 28px; font-weight: 800; color: var(--purple); margin: 10px 0; }
        .stat-lbl { color: rgba(255,255,255,0.5); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }

        /* Progress Section */
        .progress-section { margin-top: 30px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; }
        .progress-bar-bg { width: 100%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--pink)); width: 0%; transition: 1s ease; }
        
        .reward-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,215,0,0.1); border: 1px solid gold; color: gold; padding: 8px 16px; border-radius: 50px; font-size: 14px; margin-top: 15px; opacity: 0.3; }
        .reward-badge.active { opacity: 1; box-shadow: 0 0 20px rgba(255,215,0,0.3); }
        
        .btn-home { display: inline-block; margin-top: 20px; color: var(--purple); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="dash-container">
        <div class="profile-card">
            <div class="avatar">💜</div>
            <div>
                <h1 id="userName">Explorer</h1>
                <p id="userPhone" style="opacity: 0.6; margin: 5px 0;">+91 ••••• •••••</p>
                <span id="planBadge" style="background: var(--purple); padding: 4px 12px; border-radius: 50px; font-size: 11px; font-weight: 800;">BASIC PLAN</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-lbl">Access Period</div>
                <div class="stat-val" id="daysLeft">--</div>
                <div class="stat-lbl">Days Remaining</div>
            </div>
            <div class="stat-box">
                <div class="stat-lbl">Time Spent Today</div>
                <div class="stat-val" id="timeSpent">0m</div>
                <div class="stat-lbl">Target: 30 Minutes</div>
            </div>
        </div>

        <div class="progress-section">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h3>Daily Learning Progress</h3>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p id="progressStatus" style="font-size: 14px; opacity: 0.7;">Keep exploring to unlock today's reward!</p>
            
            <div class="reward-badge" id="rewardBadge">
                <i class="fas fa-trophy"></i> Daily Explorer Reward Unlocked
            </div>
        </div>

        <a href="/" class="btn-home"><i class="fas fa-arrow-left"></i> Back to Exploration</a>
    </div>

    <!-- Firebase SDKs (using same version as your auth.js) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
