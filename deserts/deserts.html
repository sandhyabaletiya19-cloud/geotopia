<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deserts Explorer - Discover Earth's Arid Wonders</title>
    <link rel="stylesheet" href="deserts-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="day-mode">
    <!-- Sand Particles Container -->
    <div class="sand-particles" id="sandParticles"></div>
    
    <!-- Heat Shimmer Overlay -->
    <div class="heat-shimmer"></div>
    
    <!-- Sun Glow -->
    <div class="sun-glow" id="sunGlow"></div>
    
    <!-- Moon & Stars (Night Mode) -->
    <div class="night-sky" id="nightSky">
        <div class="moon"></div>
        <div class="stars" id="stars"></div>
    </div>

    <!-- Header -->
    <header class="main-header">
        <div class="header-content">
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-sun"></i>
                </div>
                <div class="logo-text">
                    <h1>Deserts Explorer</h1>
                    <p class="tagline">Journey Through Earth's Arid Wonders</p>
                </div>
            </div>
            
            <!-- Stats Panel -->
            <div class="stats-panel">
                <div class="stat-item">
                    <i class="fas fa-map-marked-alt"></i>
                    <div class="stat-info">
                        <span class="stat-number" id="totalDeserts">50</span>
                        <span class="stat-label">Deserts</span>
                    </div>
                </div>
                <div class="stat-item">
                    <i class="fas fa-globe-africa"></i>
                    <div class="stat-info">
                        <span class="stat-number" id="totalCountries">45+</span>
                        <span class="stat-label">Countries</span>
                    </div>
                </div>
                <div class="stat-item">
                    <i class="fas fa-expand-arrows-alt"></i>
                    <div class="stat-info">
                        <span class="stat-number" id="largestDesert">9.2M</span>
                        <span class="stat-label">km² Largest</span>
                    </div>
                </div>
            </div>

            <!-- Day/Night Toggle -->
            <div class="day-night-toggle">
                <input type="checkbox" id="dayNightToggle" class="toggle-input">
                <label for="dayNightToggle" class="toggle-label">
                    <i class="fas fa-sun sun-icon"></i>
                    <i class="fas fa-moon moon-icon"></i>
                    <span class="toggle-ball"></span>
                </label>
            </div>
        </div>
    </header>

    <!-- Search & Filters Section -->
    <section class="search-filters-section">
        <div class="search-container">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="Search deserts, countries, features...">
                <button class="search-clear" id="searchClear">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>

        <div class="filters-container">
            <!-- Desert Type Filters -->
            <div class="filter-group type-filters">
                <button class="filter-btn active" data-type="all">
                    <i class="fas fa-globe"></i>
                    <span>All Deserts</span>
                </button>
                <button class="filter-btn" data-type="hot">
                    <i class="fas fa-fire"></i>
                    <span>Hot Deserts</span>
                </button>
                <button class="filter-btn" data-type="cold">
                    <i class="fas fa-snowflake"></i>
                    <span>Cold Deserts</span>
                </button>
                <button class="filter-btn" data-type="coastal">
                    <i class="fas fa-water"></i>
                    <span>Coastal</span>
                </button>
                <button class="filter-btn" data-type="rain-shadow">
                    <i class="fas fa-mountain"></i>
                    <span>Rain Shadow</span>
                </button>
            </div>

            <!-- Continent Filter -->
            <div class="filter-group continent-filter">
                <div class="select-wrapper">
                    <i class="fas fa-map"></i>
                    <select id="continentFilter">
                        <option value="all">All Continents</option>
                        <option value="Africa">Africa</option>
                        <option value="Asia">Asia</option>
                        <option value="Australia">Australia</option>
                        <option value="Europe">Europe</option>
                        <option value="North America">North America</option>
                        <option value="South America">South America</option>
                        <option value="Antarctica">Antarctica</option>
                    </select>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>

            <!-- Sort Options -->
            <div class="filter-group sort-filter">
                <div class="select-wrapper">
                    <i class="fas fa-sort"></i>
                    <select id="sortFilter">
                        <option value="area-desc">Largest First</option>
                        <option value="area-asc">Smallest First</option>
                        <option value="name-asc">A - Z</option>
                        <option value="name-desc">Z - A</option>
                        <option value="temp-desc">Hottest First</option>
                        <option value="temp-asc">Coldest First</option>
                    </select>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </div>

        <!-- Active Filters Display -->
        <div class="active-filters" id="activeFilters">
            <!-- Dynamically populated -->
        </div>

        <!-- Results Count -->
        <div class="results-info">
            <span id="resultsCount">Showing 50 deserts</span>
            <button class="reset-filters" id="resetFilters">
                <i class="fas fa-undo"></i> Reset All
            </button>
        </div>
    </section>

    <!-- Main Content - Desert Cards Grid -->
    <main class="main-content">
        <div class="deserts-grid" id="desertsGrid">
            <!-- Desert cards will be dynamically inserted here -->
        </div>

        <!-- Loading State -->
        <div class="loading-state" id="loadingState">
            <div class="loading-spinner">
                <div class="spinner-dune"></div>
                <div class="spinner-dune"></div>
                <div class="spinner-dune"></div>
            </div>
            <p>Loading deserts...</p>
        </div>

        <!-- No Results State -->
        <div class="no-results" id="noResults" style="display: none;">
            <div class="no-results-icon">
                <i class="fas fa-search"></i>
            </div>
            <h3>No deserts found</h3>
            <p>Try adjusting your filters or search terms</p>
            <button class="reset-btn" id="resetFromEmpty">
                <i class="fas fa-undo"></i> Reset Filters
            </button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-dunes">
                <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
                    <path d="M0,60 C200,120 400,0 600,60 C800,120 1000,0 1200,60 L1200,120 L0,120 Z" fill="currentColor"/>
                </svg>
            </div>
            <div class="footer-info">
                <p>
                    <i class="fas fa-sun"></i>
                    Deserts Explorer &copy; 2024
                </p>
                <p class="footer-subtitle">
                    Exploring Earth's magnificent arid landscapes
                </p>
            </div>
            <div class="footer-links">
                <a href="#" title="About"><i class="fas fa-info-circle"></i></a>
                <a href="#" title="Data Sources"><i class="fas fa-database"></i></a>
                <a href="#" title="GitHub"><i class="fab fa-github"></i></a>
            </div>
        </div>
    </footer>

    <!-- Card Template -->
    <template id="desertCardTemplate">
        <article class="desert-card" data-id="">
            <div class="card-glow"></div>
            <div class="card-image-container">
                <div class="image-wrapper">
                    <img src="" alt="" class="desert-image" loading="lazy">
                    <div class="image-overlay"></div>
                </div>
                <div class="type-badge">
                    <i class="fas fa-fire"></i>
                    <span>Hot</span>
                </div>
                <div class="temp-indicator">
                    <i class="fas fa-temperature-high"></i>
                    <span class="temp-value">50°C</span>
                </div>
            </div>
            <div class="card-content">
                <h3 class="desert-name"></h3>
                <div class="desert-location">
                    <div class="country-flags"></div>
                    <span class="continent-name"></span>
                </div>
                <div class="desert-stats">
                    <div class="stat">
                        <i class="fas fa-expand-arrows-alt"></i>
                        <span class="area-value"></span>
                    </div>
                </div>
            </div>
            <div class="card-footer">
                <a href="" class="explore-btn">
                    <span>Explore</span>
                    <i class="fas fa-arrow-right"></i>
                </a>
            </div>
        </article>
    </template>

    <!-- Scripts -->
    <script src="deserts-data-1.js"></script>
    <script src="deserts-data-2.js"></script>
    <script src="deserts-data-3.js"></script>
    <script src="deserts-data-4.js"></script>
    <script src="deserts-data-5.js"></script>
    <script src="deserts-data-6.js"></script>
    <script src="deserts-data-7.js"></script>
    <script src="deserts-data-8.js"></script>
    <script src="deserts-data-9.js"></script>
    <script src="deserts-data-10.js"></script>
    <script src="deserts-data.js"></script>
    <script src="deserts-app.js"></script>
</body>
</html>
