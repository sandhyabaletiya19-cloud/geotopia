<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dharaverse - Meet Dhara 🦊</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
        }

        .page-hero {
            text-align: center;
            padding: 60px 20px;
        }

        .page-hero h1 {
            font-size: 3em;
            margin-bottom: 15px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .page-hero p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        /* ═══════════════════════════════════════════
           DHARA WIDGET
           ═══════════════════════════════════════════ */

        #dhara-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999999;
        }

        /* ── BUBBLE ── */
        .dhara-bubble {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #87ceeb, #b8d4f0);
            cursor: pointer;
            box-shadow: 
                0 10px 30px rgba(135, 206, 235, 0.5),
                0 0 0 4px white;
            transition: all 0.3s ease;
            position: relative;
            animation: bubbleFloat 3s ease-in-out infinite;
            overflow: hidden;
            border: none;
        }

        .dhara-bubble:hover {
            transform: scale(1.1) rotate(10deg);
        }

        .dhara-bubble img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: 50% 15%;
            transform: scale(2.2);
            transform-origin: center 25%;
        }

        .dhara-bubble .notif {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 24px;
            height: 24px;
            background: #ff5252;
            border-radius: 50%;
            border: 3px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            font-weight: bold;
            animation: notifPulse 2s ease-in-out infinite;
        }

        @keyframes bubbleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes notifPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,82,82,0.6); }
            50% { transform: scale(1.15); box-shadow: 0 0 0 8px rgba(255,82,82,0); }
        }

        /* ── MAIN WINDOW ── */
        .dhara-window {
            width: 400px;
            height: 680px;
            border-radius: 35px;
            overflow: hidden;
            display: none;
            flex-direction: column;
            box-shadow: 
                0 30px 80px rgba(0,0,0,0.4),
                0 0 0 1px rgba(255,255,255,0.2);
            position: relative;
            background: linear-gradient(180deg, 
                #FFE5B4 0%,
                #FFD1A8 30%,
                #FFB88C 60%,
                #FF9A8B 100%);
        }

        .dhara-window.open {
            display: flex;
            animation: winOpen 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes winOpen {
            from { opacity: 0; transform: scale(0.7) translateY(50px); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ── TOP BAR ── */
        .dhara-top {
            position: absolute;
            top: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            z-index: 100;
        }

        .top-left {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            box-shadow: 0 0 8px #4caf50;
        }

        .dhara-name {
            color: #333;
            font-weight: 700;
            font-size: 15px;
        }

        .streak-pill {
            background: linear-gradient(135deg, #ff6b6b, #ff5252);
            color: white;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 700;
        }

        .close-x {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            color: #333;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

        .close-x:hover {
            background: white;
            transform: rotate(90deg);
        }

        /* ═══════════════════════════════════════════
           CHARACTER STAGE (Talking Tom Style)
           ═══════════════════════════════════════════ */

        .dhara-stage {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        /* Soft background elements */
        .sun {
            position: absolute;
            top: 50px;
            left: 30px;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, #fff9c4, #ffd54f);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(255, 213, 79, 0.6);
            animation: sunPulse 4s ease-in-out infinite;
        }

        @keyframes sunPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.85;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .cloud-1 {
            width: 80px;
            height: 25px;
            top: 80px;
            right: 40px;
            animation: cloudMove 25s linear infinite;
        }

        .cloud-2 {
            width: 60px;
            height: 20px;
            top: 130px;
            left: 100px;
            animation: cloudMove 35s linear infinite reverse;
        }

        @keyframes cloudMove {
            0% { transform: translateX(0); }
            100% { transform: translateX(50px); }
        }

        /* Ground/Floor */
        .ground {
            position: absolute;
            bottom: 0;
            left: 0; right: 0;
            height: 100px;
            background: linear-gradient(180deg, 
                rgba(139, 69, 19, 0.3) 0%, 
                rgba(101, 67, 33, 0.6) 100%);
            border-top-left-radius: 50% 30px;
            border-top-right-radius: 50% 30px;
        }

        .ground::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 20px;
            background: radial-gradient(ellipse at top, rgba(0,0,0,0.2), transparent);
            border-radius: 50%;
        }

        /* ── DHARA CHARACTER ── */
        .dhara-character {
            position: relative;
            width: 280px;
            height: 480px;
            z-index: 10;
            cursor: pointer;
            transition: transform 0.3s ease;
            transform-origin: bottom center;
            margin-bottom: -10px;
        }

        .dhara-character img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: bottom center;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.25));
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        /* Hide non-active images */
        .dhara-character img:not(.active) {
            display: none;
        }

        /* Animations */
        .dhara-character.idle {
            animation: charBreathe 4s ease-in-out infinite;
        }

        @keyframes charBreathe {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-4px) scale(1.005); }
        }

        .dhara-character.talking {
            animation: charTalk 0.5s ease-in-out infinite;
        }

        @keyframes charTalk {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .dhara-character.listening {
            animation: charLean 1.2s ease-in-out infinite;
        }

        @keyframes charLean {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-3px) rotate(-2deg); }
        }

        .dhara-character.excited {
            animation: charJump 0.6s ease-in-out infinite;
        }

        @keyframes charJump {
            0%, 100% { transform: translateY(0) scale(1); }
            30% { transform: translateY(-30px) scale(1.05); }
            60% { transform: translateY(0) scale(0.98); }
        }

        .dhara-character.sad {
            animation: charSad 3s ease-in-out infinite;
            filter: brightness(0.9) saturate(0.8);
        }

        @keyframes charSad {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(5px); }
        }

        .dhara-character.poked {
            animation: charPoke 0.6s ease-in-out;
        }

        @keyframes charPoke {
            0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
            25% { transform: translateY(-20px) scale(1.05) rotate(-5deg); }
            50% { transform: translateY(-30px) scale(1.08) rotate(0deg); }
            75% { transform: translateY(-10px) scale(1.02) rotate(5deg); }
        }

        .dhara-character.mimicking {
            animation: charMimic 0.3s ease-in-out infinite;
        }

        @keyframes charMimic {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.06); }
        }

        /* ── SPEECH BUBBLE ── */
        .speech-bubble {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 300px;
            background: white;
            border-radius: 25px;
            padding: 16px 22px;
            font-size: 14.5px;
            line-height: 1.5;
            color: #333;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 50;
            font-weight: 500;
        }

        .speech-bubble.show {
            opacity: 1;
            visibility: visible;
            animation: bubblePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes bubblePop {
            0% { transform: translateX(-50%) translateY(20px) scale(0.7); opacity: 0; }
            100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 14px solid white;
        }

        /* ── HEARTS, SPARKLES ── */
        .effect {
            position: absolute;
            font-size: 28px;
            pointer-events: none;
            z-index: 60;
            animation: effectFloat 2s ease-out forwards;
        }

        @keyframes effectFloat {
            0% { transform: translateY(0) scale(0); opacity: 1; }
            20% { transform: translateY(-30px) scale(1.3); opacity: 1; }
            100% { transform: translateY(-200px) scale(0.6); opacity: 0; }
        }

        /* ── FLOATING GLOBE ── */
        .floating-globe {
            position: absolute;
            top: 100px;
            right: 30px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: 
                radial-gradient(circle at 35% 35%, #5dade2, #1a5276 70%);
            box-shadow: 
                0 8px 25px rgba(46, 134, 193, 0.5),
                inset -8px -8px 15px rgba(0,0,0,0.3);
            animation: globeFloat 4s ease-in-out infinite;
            z-index: 5;
            cursor: pointer;
            overflow: hidden;
        }

        .floating-globe::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 24px;
            background: #27ae60;
            border-radius: 30% 70% 60% 40% / 50% 40% 60% 50%;
            top: 8px;
            left: 10px;
            opacity: 0.7;
            box-shadow: 14px 16px 0 -2px #27ae60;
        }

        @keyframes globeFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(15deg); }
        }

        /* ═══════════════════════════════════════════
           ACTION BAR (Talking Tom Style)
           ═══════════════════════════════════════════ */

        .action-bar {
            background: linear-gradient(180deg, #ffffff 0%, #f5f5f5 100%);
            padding: 18px 12px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            gap: 8px;
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
            position: relative;
            z-index: 50;
        }

        .action-btn {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            background: linear-gradient(135deg, #f0f0f0, #e0e0e0);
            box-shadow: 
                0 6px 12px rgba(0,0,0,0.1),
                inset 0 1px 0 rgba(255,255,255,0.5);
        }

        .action-btn:hover {
            transform: translateY(-6px) scale(1.1);
            box-shadow: 
                0 12px 25px rgba(0,0,0,0.2),
                inset 0 1px 0 rgba(255,255,255,0.5);
        }

        .action-btn:active {
            transform: translateY(-2px) scale(1.05);
        }

        .action-btn.active {
            background: linear-gradient(135deg, #87ceeb, #5dade2);
            color: white;
            transform: scale(1.1);
        }

        .action-btn .btn-label {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 10px;
            font-weight: 700;
            white-space: nowrap;
        }

        .action-btn.mic-active {
            background: linear-gradient(135deg, #ff5252, #ff1744);
            color: white;
            animation: micPulse 1s ease-in-out infinite;
        }

        @keyframes micPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,23,68,0.6); }
            50% { box-shadow: 0 0 0 15px rgba(255,23,68,0); }
        }

        /* ── CHAT INPUT ── */
        .chat-input-area {
            display: none;
            padding: 14px;
            background: white;
            border-top: 1px solid #eee;
            gap: 8px;
            align-items: center;
        }

        .chat-input-area.show {
            display: flex;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .chat-input {
            flex: 1;
            border: 2px solid #f0f0f0;
            border-radius: 25px;
            padding: 12px 20px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
            color: #333;
        }

        .chat-input:focus {
            border-color: #87ceeb;
        }

        .chat-send {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #87ceeb, #5dade2);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-send:hover { transform: scale(1.1) rotate(15deg); }

        /* ── CONFETTI ── */
        .confetti-area {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 200;
            overflow: hidden;
        }

        .conf {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: confFall 2.5s ease-in forwards;
        }

        @keyframes confFall {
            to { 
                top: 110%; 
                transform: rotate(720deg) translateX(var(--dx));
                opacity: 0;
            }
        }

        .dhara-window.shake { animation: winShake 0.5s; }
        @keyframes winShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        /* Mobile */
        @media (max-width: 420px) {
            .dhara-window {
                width: calc(100vw - 16px);
                height: calc(100vh - 50px);
                bottom: 8px;
                right: 8px;
                border-radius: 25px;
            }
            .dhara-character { width: 240px; height: 410px; }
        }
    </style>
</head>

            "IT": { name: "Italy", capital: "Rome", pop: "60 million", borders: 6, fun: "Most UNESCO sites", weird: "Free wine fountain runs 24/7" },
            "ZA": { name: "South Africa", capital: "Pretoria", pop: "59 million", borders: 6, fun: "Has 11 official languages", weird: "Has Lesotho inside it" },
            "PA": { name: "Panama", capital: "Panama City", pop: "4.3 million", borders: 2, fun: "Canal saves 12,000km journey", weird: "Sun rises over Pacific" },
        };

        const QUIZ = [
            { q: "Which country shares borders with 14 nations?", a: "china", hint: "Asian giant", alt: ["russia"] },
            { q: "Only country that's also a continent?", a: "australia", hint: "Down under" },
            { q: "Capital of Kazakhstan?", a: "astana", hint: "Not Almaty anymore" },
            { q: "Country inside South Africa?", a: "lesotho", hint: "Mountain kingdom" },
            { q: "Country with non-rectangular flag?", a: "nepal", hint: "Himalayan nation" },
            { q: "Country measuring happiness, not GDP?", a: "bhutan", hint: "Near India" },
            { q: "Largest landlocked country?", a: "kazakhstan", hint: "Central Asia" },
            { q: "Country with no army?", a: "iceland", hint: "Fire and ice" },
            { q: "Most visited country?", a: "france", hint: "Eiffel Tower" },
            { q: "Largest country by area?", a: "russia", hint: "11 time zones" },
        ];

        const MYSTERIES = [
            { clue: "Non-rectangular flag, between two Asian giants.", a: "nepal" },
            { clue: "An entire country INSIDE another, in Africa.", a: "lesotho" },
            { clue: "Nodding means NO here. Balkans.", a: "albania" },
            { clue: "No television until 1999.", a: "bhutan" },
            { clue: "Apples originated here.", a: "kazakhstan" },
        ];

        // ═══════════════════════════════════════
        // MEMORY
        // ═══════════════════════════════════════

        const MEM_KEY = 'dhara_mem_v3';

        function loadMem() {
            try {
                const d = JSON.parse(localStorage.getItem(MEM_KEY));
                if (d) {
                    if (d.lastVisit) {
                        const diff = Math.floor((Date.now() - new Date(d.lastVisit).getTime()) / 86400000);
                        d.daysGone = diff;
                        if (diff === 1) d.streak = (d.streak || 0) + 1;
                        else if (diff > 1) { d.oldStreak = d.streak; d.streak = 1; d.broke = true; }
                    }
                    d.lastVisit = new Date().toISOString();
                    d.visits = (d.visits || 0) + 1;
                    save(d);
                    return d;
                }
            } catch(e) {}
            const fresh = { name: null, streak: 0, lastVisit: new Date().toISOString(), visits: 1, daysGone: 0, quizScore: 0, broke: false };
            save(fresh);
            return fresh;
        }

        function save(m) {
            try { localStorage.setItem(MEM_KEY, JSON.stringify(m)); } catch(e) {}
        }

        const mem = loadMem();
        let activeQuiz = null;
        let activeMystery = null;
        let mode = 'chat';

        // ═══════════════════════════════════════
        // RESPONSE ENGINE
        // ═══════════════════════════════════════

        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function findCountry(text) {
            const low = text.toLowerCase();
            for (const k in COUNTRIES) {
                if (low.includes(COUNTRIES[k].name.toLowerCase())) return COUNTRIES[k];
            }
            return null;
        }

        function respond(input) {
            const low = input.toLowerCase().trim();

            if (activeQuiz) {
                const q = activeQuiz;
                activeQuiz = null;
                const right = low.includes(q.a) || (q.alt && q.alt.some(a => low.includes(a)));
                if (right) {
                    mem.quizScore = (mem.quizScore || 0) + 1;
                    save(mem);
                    setPose('excited');
                    confetti();
                    return pick([
                        `YES! Correct! Score: ${mem.quizScore} 🔥`,
                        `RIGHT! Almost impressed! Another?`,
                        `Nailed it! Want a harder one?`
                    ]);
                } else {
                    setPose('sad');
                    setTimeout(() => setPose('idle'), 2000);
                    return pick([
                        `Oof. It was "${q.a}". Try again?`,
                        `Nope! Answer: "${q.a}" 😤`,
                        `Wrong! "${q.a}" was it!`
                    ]);
                }
            }

            if (activeMystery) {
                const m = activeMystery;
                if (low.includes(m.a)) {
                    activeMystery = null;
                    confetti();
                    setPose('excited');
                    return `YES! It's ${m.a.toUpperCase()}! 🌍`;
                } else {
                    return pick(["Nope! Try again!", "Wrong guess! Think harder 🦊"]);
                }
            }

            if (/^(hi|hello|hey|morning|evening|namaste|yo|sup)/i.test(low)) {
                if (!mem.name) {
                    return pick([
                        "Hi! I'm Dhara — fox-eared geography genius. What's your name? 🦊",
                        "Hello! I'm Dhara. Geography is my superpower. What should I call you?"
                    ]);
                }
                if (mem.broke && mem.daysGone > 2) {
                    setPose('sad');
                    return `${mem.name}! ${mem.daysGone} days! I was worried 😭`;
                }
                if (mem.streak >= 5) {
                    setPose('excited');
                    return `${mem.name}! Day ${mem.streak} 🔥 Quiz time?`;
                }
                return pick([
                    `Hey ${mem.name}! Quiz, fact, or Daily Mystery? 🌍`,
                    `${mem.name}! What are we exploring today?`
                ]);
            }

            const nameM = low.match(/(?:i'm|i am|my name is|call me|name's)\s+(\w+)/i);
            if (nameM) {
                const n = nameM[1];
                if (!['the','a','yes','no','hi','hello','ok','fine'].includes(n.toLowerCase()) && n.length > 1) {
                    mem.name = n.charAt(0).toUpperCase() + n.slice(1);
                    save(mem);
                    setPose('excited');
                    showHearts();
                    return pick([
                        `${mem.name}! Love it! 🦊 Want a quiz?`,
                        `${mem.name}! Now we're friends! Let's explore!`
                    ]);
                }
            }

            if (/tell me about|what about|facts about|info on/i.test(low)) {
                const c = findCountry(low);
                if (!c) return pick(["Which country? I know 195! 🌍", "Be specific!"]);
                setPose('talking');
                return pick([
                    `${c.name}! Capital: ${c.capital}. ${c.fun}. Want the WEIRD fact?`,
                    `${c.name} — ${c.weird}. Bet you didn't know!`
                ]);
            }

            if (/capital of/i.test(low)) {
                const c = findCountry(low);
                if (!c) return "Which country's capital? 🌍";
                return `${c.capital}. Obviously 🌍`;
            }

            if (/who are you|what are you|are you ai|are you a bot/i.test(low)) {
                return pick([
                    "I'm Dhara — 27, fox-eared, geography goddess 🦊",
                    "Geographical consciousness of Earth in a cute body 🌍"
                ]);
            }

            if (/love|date|politics|movie|song/i.test(low)) {
                return "Cute, but geography only 🌍";
            }

            if (/smart|amazing|love you|beautiful|cool|cute|pretty/i.test(low)) {
                setPose('excited');
                showHearts();
                return pick([
                    `Aww! My fox ears love this! 💕`,
                    `Obviously I'm amazing 🦊`
                ]);
            }

            if (/stupid|dumb|hate|idiot/i.test(low)) {
                setPose('sad');
                return "The map shows the exit 🌍";
            }

            if (/bye|goodbye|see you|gotta go|later/i.test(low)) {
                return `Bye ${mem.name || ''}! Streak: ${mem.streak}. Don't break it! 🦊`;
            }

            const keys = Object.keys(COUNTRIES);
            const rc = COUNTRIES[keys[Math.floor(Math.random() * keys.length)]];
            return pick([
                `Random fact: ${rc.weird} (${rc.name}) 🌍`,
                `Try: "tell me about Japan" or click Quiz! 🦊`
            ]);
        }

        // ═══════════════════════════════════════
        // VOICE
        // ═══════════════════════════════════════

        let synth = window.speechSynthesis;
        let dharaVoice = null;
        let recognition = null;
        let isSpeaking = false;

        function initVoice() {
            function pickV() {
                const v = synth.getVoices();
                const tests = [
                    x => x.lang.includes('en-IN'),
                    x => x.lang.includes('en-GB') && /female/i.test(x.name),
                    x => x.lang.includes('en-GB'),
                    x => x.lang.startsWith('en') && /female|zira|samantha|karen/i.test(x.name),
                    x => x.lang.startsWith('en')
                ];
                for (const t of tests) { const m = v.find(t); if (m) { dharaVoice = m; return; } }
                if (v.length) dharaVoice = v[0];
            }
            pickV();
            if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = pickV;

            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SR) {
                recognition = new SR();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = 'en-US';

                recognition.onstart = () => {
                    setPose('listening');
                    document.getElementById('btnMic').classList.add('mic-active');
                };
                recognition.onend = () => {
                    setPose('idle');
                    document.getElementById('btnMic').classList.remove('mic-active');
                };
                recognition.onresult = (e) => {
                    let txt = '';
                    for (let i = 0; i < e.results.length; i++) {
                        if (e.results[i].isFinal) txt += e.results[i][0].transcript;
                    }
                    if (txt) handleInput(txt);
                };
                recognition.onerror = () => {
                    document.getElementById('btnMic').classList.remove('mic-active');
                    setPose('idle');
                };
            }
        }

        function speak(text, mimicMode) {
            return new Promise(resolve => {
                if (!synth) { resolve(); return; }
                synth.cancel();
                const u = new SpeechSynthesisUtterance(text);
                if (dharaVoice) u.voice = dharaVoice;
                u.rate = mimicMode ? 1.6 : 1.05;
                u.pitch = mimicMode ? 1.9 : 1.2;
                u.volume = 0.9;

                u.onstart = () => {
                    isSpeaking = true;
                    if (!mimicMode) setPose('talking');
                };
                u.onend = () => {
                    isSpeaking = false;
                    setPose('idle');
                    resolve();
                };
                u.onerror = () => {
                    isSpeaking = false;
                    setPose('idle');
                    resolve();
                };
                synth.speak(u);
            });
        }

        // ═══════════════════════════════════════
        // POSE SWITCHING (Makes her feel alive!)
        // ═══════════════════════════════════════

        function setPose(poseName) {
            const char = document.getElementById('dharaChar');
            const images = char.querySelectorAll('img');
            
            // Remove all animation classes
            char.classList.remove('idle', 'talking', 'listening', 'excited', 'sad', 'poked', 'mimicking');
            
            // Find matching pose image, fallback to idle
            let foundPose = false;
            images.forEach(img => {
                img.classList.remove('active');
                if (img.dataset.pose === poseName) {
                    img.classList.add('active');
                    foundPose = true;
                }
            });
            
            // If pose image doesn't exist, use default
            if (!foundPose) {
                images[0]?.classList.add('active');
            }
            
            // Add animation class
            char.classList.add(poseName === 'idle' ? 'idle' : poseName);
        }

        // ═══════════════════════════════════════
        // UI
        // ═══════════════════════════════════════

        let speechTimeout;

        function showSpeech(text) {
            const bubble = document.getElementById('speechBubble');
            bubble.textContent = text;
            bubble.classList.add('show');
            clearTimeout(speechTimeout);
            const dur = Math.max(3500, text.length * 65);
            speechTimeout = setTimeout(() => bubble.classList.remove('show'), dur);
        }

        function handleInput(text) {
            if (!text || !text.trim()) return;
            
            if (mode === 'mimic') {
                const mimicMsg = `*chipmunk* "${text}" 🦜`;
                showSpeech(mimicMsg);
                setPose('mimicking');
                speak(text, true).then(() => setPose('idle'));
            } else {
                const reply = respond(text);
                showSpeech(reply);
                speak(reply);
            }

            const input = document.getElementById('chatInput');
            if (input) input.value = '';
        }

        function confetti() {
            const area = document.getElementById('confettiArea');
            const colors = ['#87ceeb', '#5dade2', '#ffd54f', '#4caf50', '#ff5252', '#ab47bc'];
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'conf';
                p.style.left = Math.random() * 100 + '%';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.setProperty('--dx', (Math.random() * 100 - 50) + 'px');
                p.style.animationDelay = Math.random() * 0.5 + 's';
                p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                area.appendChild(p);
            }
            setTimeout(() => area.innerHTML = '', 3000);
        }

        function showHearts() {
            const stage = document.getElementById('dharaStage');
            const emojis = ['💖', '💕', '✨', '🌸'];
            for (let i = 0; i < 6; i++) {
                setTimeout(() => {
                    const h = document.createElement('div');
                    h.className = 'effect';
                    h.textContent = pick(emojis);
                    h.style.left = (35 + Math.random() * 30) + '%';
                    h.style.top = '55%';
                    stage.appendChild(h);
                    setTimeout(() => h.remove(), 2000);
                }, i * 180);
            }
        }

        function openWindow() {
            document.getElementById('dharaBubble').style.display = 'none';
            document.getElementById('dharaWindow').classList.add('open');
            
            setTimeout(() => {
                const greet = respond('hi');
                showSpeech(greet);
                speak(greet);
            }, 600);
        }

        function closeWindow() {
            document.getElementById('dharaBubble').style.display = 'block';
            document.getElementById('dharaWindow').classList.remove('open');
            synth.cancel();
            isSpeaking = false;
        }

        function setup() {
            document.getElementById('streakBadge').textContent = `🔥 ${mem.streak || 0}`;

            document.getElementById('dharaBubble').addEventListener('click', openWindow);
            document.getElementById('closeBtn').addEventListener('click', closeWindow);

            document.getElementById('dharaChar').addEventListener('click', () => {
                setPose('poked');
                const reactions = [
                    "Hey! Personal space! 🦊",
                    "Did you just poke me?! 😤",
                    "Stop poking! 🌍",
                    "Tickles! 😆"
                ];
                const msg = pick(reactions);
                showSpeech(msg);
                speak(msg);
                document.getElementById('dharaWindow').classList.add('shake');
                setTimeout(() => {
                    document.getElementById('dharaWindow').classList.remove('shake');
                    setPose('idle');
                }, 600);
            });

            document.getElementById('floatGlobe').addEventListener('click', (e) => {
                e.stopPropagation();
                const msg = pick(["That's MY globe! 🌍", "Spin your own! 😤", "Careful with that!"]);
                showSpeech(msg);
                speak(msg);
            });

            document.getElementById('btnMimic').addEventListener('click', () => {
                mode = mode === 'mimic' ? 'chat' : 'mimic';
                document.getElementById('btnMimic').classList.toggle('active', mode === 'mimic');
                const msg = mode === 'mimic' 
                    ? "Mimic mode! Say something! 🦜"
                    : "Back to chat! Ask me anything 🌍";
                showSpeech(msg);
                speak(msg);
            });

            document.getElementById('btnMic').addEventListener('click', () => {
                if (!recognition) {
                    showSpeech("Voice not supported 😔");
                    return;
                }
                try { recognition.start(); } catch(e) {}
            });

            document.getElementById('btnChat').addEventListener('click', () => {
                const ca = document.getElementById('chatArea');
                ca.classList.toggle('show');
                if (ca.classList.contains('show')) {
                    document.getElementById('chatInput').focus();
                }
            });

            document.getElementById('btnQuiz').addEventListener('click', () => {
                const q = QUIZ[Math.floor(Math.random() * QUIZ.length)];
                activeQuiz = q;
                const msg = `Quiz! ${q.q} Hint: ${q.hint}`;
                showSpeech(msg);
                speak(msg);
                document.getElementById('chatArea').classList.add('show');
                document.getElementById('chatInput').focus();
            });

            document.getElementById('btnMystery').addEventListener('click', () => {
                const dayIdx = Math.floor(Date.now() / 86400000);
                const m = MYSTERIES[dayIdx % MYSTERIES.length];
                activeMystery = m;
                const msg = `Daily Mystery 🗺️: ${m.clue}`;
                showSpeech(msg);
                speak(msg);
                document.getElementById('chatArea').classList.add('show');
                document.getElementById('chatInput').focus();
            });

            document.getElementById('chatSend').addEventListener('click', () => {
                handleInput(document.getElementById('chatInput').value);
            });

            document.getElementById('chatInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleInput(e.target.value);
            });

            initVoice();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', setup);
        } else {
            setup();
        }

    })();
    </script>

</body>
</html>
