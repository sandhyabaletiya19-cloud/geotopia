<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dharaverse - Meet Dhara</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
        }

        .page-hero {
            text-align: center;
            padding: 60px 20px;
            position: relative;
            z-index: 1;
        }

        .page-hero h1 {
            font-size: 3em;
            margin-bottom: 15px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .page-hero p {
            font-size: 1.1em;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* ═══════════════════════════════════════════
           DHARA - LIVES ON YOUR PAGE
           Not in a box. Walking around freely.
           ═══════════════════════════════════════════ */

        #dhara-world {
            position: fixed;
            bottom: 0;
            right: 30px;
            width: 200px;
            height: 320px;
            z-index: 999999;
            pointer-events: none;
        }

        /* The character herself */
        .dhara {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 200px;
            height: 320px;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: bottom center;
        }

        .dhara img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: bottom;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.3));
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
            transition: transform 0.3s ease;
        }

        /* ── ANIMATIONS ── */
        
        /* Idle breathing */
        .dhara.idle {
            animation: breathe 4s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-4px) scale(1.008); }
        }

        /* Talking */
        .dhara.talking {
            animation: talk 0.5s ease-in-out infinite;
        }
        @keyframes talk {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* Excited jump */
        .dhara.excited {
            animation: jump 0.6s ease-in-out infinite;
        }
        @keyframes jump {
            0%, 100% { transform: translateY(0) scale(1); }
            30% { transform: translateY(-35px) scale(1.05); }
            60% { transform: translateY(0) scale(0.97); }
        }

        /* Listening - lean forward */
        .dhara.listening {
            animation: lean 1.2s ease-in-out infinite;
        }
        @keyframes lean {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-3px) rotate(-3deg); }
        }

        /* Sad */
        .dhara.sad {
            animation: sad 3s ease-in-out infinite;
            filter: brightness(0.85);
        }
        @keyframes sad {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(5px); }
        }

        /* Wave */
        .dhara.waving {
            animation: wave 0.8s ease-in-out;
        }
        @keyframes wave {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-5px) rotate(-5deg); }
            75% { transform: translateY(-5px) rotate(5deg); }
        }

        /* Click reaction */
        .dhara.poked {
            animation: poke 0.6s ease-in-out;
        }
        @keyframes poke {
            0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
            30% { transform: translateY(-25px) scale(1.08) rotate(-8deg); }
            60% { transform: translateY(-10px) scale(1.04) rotate(8deg); }
        }

        /* Walking - subtle side movement */
        .dhara.walking {
            animation: walk 1s ease-in-out infinite;
        }
        @keyframes walk {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-3px) rotate(-2deg); }
            75% { transform: translateY(-3px) rotate(2deg); }
        }

        /* ═══════════════════════════════════════════
           SPEECH BUBBLE - Comic Style
           Appears near her head
           ═══════════════════════════════════════════ */

        .speech-bubble {
            position: absolute;
            bottom: 240px;
            right: 100px;
            min-width: 180px;
            max-width: 320px;
            background: white;
            border-radius: 25px;
            padding: 16px 22px;
            font-size: 15px;
            line-height: 1.5;
            color: #2c3e50;
            box-shadow: 
                0 15px 40px rgba(0,0,0,0.25),
                0 0 0 3px rgba(255,255,255,0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            font-weight: 500;
            transform-origin: bottom right;
        }

        .speech-bubble.show {
            opacity: 1;
            visibility: visible;
            animation: bubblePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes bubblePop {
            0% { transform: scale(0) translateY(20px); opacity: 0; }
            70% { transform: scale(1.05) translateY(-5px); opacity: 1; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* Comic-style tail pointing to her */
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            right: 30px;
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 18px solid transparent;
            border-top: 22px solid white;
            filter: drop-shadow(0 3px 3px rgba(0,0,0,0.1));
        }

        /* ═══════════════════════════════════════════
           ACTION CIRCLE - Appears when you click her
           Small floating buttons around her
           ═══════════════════════════════════════════ */

        .action-circle {
            position: absolute;
            bottom: 50px;
            right: -20px;
            width: 240px;
            height: 240px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .action-circle.show {
            opacity: 1;
            pointer-events: auto;
        }

        .floating-btn {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 
                0 8px 20px rgba(0,0,0,0.2),
                0 0 0 3px rgba(255,255,255,0.8);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            transform: scale(0);
        }

        .action-circle.show .floating-btn {
            opacity: 1;
            transform: scale(1);
        }

        .action-circle.show .floating-btn:nth-child(1) { transition-delay: 0.05s; }
        .action-circle.show .floating-btn:nth-child(2) { transition-delay: 0.1s; }
        .action-circle.show .floating-btn:nth-child(3) { transition-delay: 0.15s; }
        .action-circle.show .floating-btn:nth-child(4) { transition-delay: 0.2s; }
        .action-circle.show .floating-btn:nth-child(5) { transition-delay: 0.25s; }

        .floating-btn:hover {
            transform: scale(1.2) translateY(-3px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.3);
        }

        .floating-btn .label {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 8px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .floating-btn:hover .label {
            opacity: 1;
        }

        /* Position buttons in arc */
        .floating-btn.btn-1 { top: 30px; left: 10px; background: #ff6b9d; color: white; }
        .floating-btn.btn-2 { top: 0; left: 80px; background: #ffd93d; }
        .floating-btn.btn-3 { top: 30px; left: 150px; background: #6bcf7f; color: white; }
        .floating-btn.btn-4 { top: 100px; left: 0; background: #4d96ff; color: white; }
        .floating-btn.btn-5 { top: 100px; left: 160px; background: #ff8c42; color: white; }

        /* Mic recording state */
        .floating-btn.recording {
            background: #ff1744 !important;
            color: white;
            animation: micPulse 1s ease-in-out infinite;
        }

        @keyframes micPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,23,68,0.6), 0 0 0 3px rgba(255,255,255,0.8); }
            50% { box-shadow: 0 0 0 15px rgba(255,23,68,0), 0 0 0 3px rgba(255,255,255,0.8); }
        }

        /* ═══════════════════════════════════════════
           CHAT INPUT - Slides up from bottom
           ═══════════════════════════════════════════ */

        .chat-input-wrap {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            width: 90%;
            max-width: 500px;
            background: white;
            border-radius: 50px;
            padding: 8px 8px 8px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 999999;
            pointer-events: none;
        }

        .chat-input-wrap.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .chat-input-wrap input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            color: #2c3e50;
            background: transparent;
            padding: 12px 0;
        }

        .chat-input-wrap input::placeholder {
            color: #aaa;
        }

        .chat-input-wrap .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #4d96ff, #6c5ce7);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-input-wrap .send-btn:hover {
            transform: scale(1.1) rotate(15deg);
        }

        .chat-input-wrap .close-chat {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: #f0f0f0;
            color: #666;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-input-wrap .close-chat:hover {
            background: #e0e0e0;
        }

        /* ═══════════════════════════════════════════
           EFFECTS - Hearts, sparkles, confetti
           ═══════════════════════════════════════════ */

        .effect {
            position: absolute;
            font-size: 32px;
            pointer-events: none;
            animation: effectFloat 2.5s ease-out forwards;
        }

        @keyframes effectFloat {
            0% { transform: translateY(0) scale(0); opacity: 1; }
            20% { transform: translateY(-40px) scale(1.4); opacity: 1; }
            100% { transform: translateY(-200px) scale(0.6); opacity: 0; }
        }

        .confetti-burst {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999998;
        }

        .conf-piece {
            position: absolute;
            width: 12px;
            height: 12px;
            top: -20px;
            animation: confDrop 3s ease-in forwards;
        }

        @keyframes confDrop {
            to {
                top: 110vh;
                transform: rotate(720deg) translateX(var(--dx));
                opacity: 0;
            }
        }

        /* ═══════════════════════════════════════════
           HIDE/SHOW TOGGLE (Small button when she's hidden)
           ═══════════════════════════════════════════ */

        .show-dhara-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4d96ff, #6c5ce7);
            border: 3px solid white;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 999999;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .show-dhara-btn.visible {
            display: flex;
        }

        /* Hide button */
        .hide-btn {
            position: absolute;
            top: 0;
            right: 0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #dhara-world:hover .hide-btn {
            display: flex;
            opacity: 1;
        }

        /* Mobile */
        @media (max-width: 600px) {
            #dhara-world {
                width: 150px;
                height: 240px;
                right: 10px;
            }
            .dhara { width: 150px; height: 240px; }
            .speech-bubble { 
                bottom: 200px;
                right: 70px;
                max-width: 250px;
                font-size: 13px;
            }
            .action-circle {
                width: 180px;
                height: 180px;
                right: -10px;
            }
            .floating-btn {
                width: 42px;
                height: 42px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="page-hero">
        <h1>Welcome to Dharaverse</h1>
        <p>
            Explore the world like never before. 
            Your guide is waiting in the corner — 
            click on her to start the conversation.
        </p>
    </div>

    <!-- ═══════════════════════════════════════════
         DHARA - She lives here, on your page
         ═══════════════════════════════════════════ -->
    
    <div id="dhara-world">
        
        <!-- Speech Bubble -->
        <div class="speech-bubble" id="speechBubble"></div>
        
        <!-- The Character -->
        <div class="dhara idle" id="dharaChar">
            <img src="dhara.png" alt="Dhara">
            <button class="hide-btn" id="hideBtn" title="Hide Dhara">×</button>
        </div>

        <!-- Action Circle (appears on click) -->
        <div class="action-circle" id="actionCircle">
            <button class="floating-btn btn-1" data-action="chat">
                💬
                <span class="label">Chat</span>
            </button>
            <button class="floating-btn btn-2" data-action="mic">
                🎤
                <span class="label">Talk</span>
            </button>
            <button class="floating-btn btn-3" data-action="mimic">
                🦜
                <span class="label">Mimic</span>
            </button>
            <button class="floating-btn btn-4" data-action="quiz">
                🧠
                <span class="label">Quiz</span>
            </button>
            <button class="floating-btn btn-5" data-action="mystery">
                🗺️
                <span class="label">Mystery</span>
            </button>
        </div>
    </div>

    <!-- Chat Input -->
    <div class="chat-input-wrap" id="chatWrap">
        <input type="text" id="chatInput" placeholder="Type your message...">
        <button class="send-btn" id="sendBtn">➤</button>
        <button class="close-chat" id="closeChatBtn">✕</button>
    </div>

    <!-- Show Dhara Button (when hidden) -->
    <button class="show-dhara-btn" id="showDharaBtn" title="Bring Dhara back">🦊</button>

    <!-- Confetti Container -->
    <div class="confetti-burst" id="confettiArea"></div>

    <script>
    (function() {
        'use strict';

        // ═══════════════════════════════════════
        // KNOWLEDGE
        // ═══════════════════════════════════════

        const COUNTRIES = {
            "IN": { name: "India", capital: "New Delhi", pop: "1.4 billion", borders: 6, fun: "It has 22 official languages and over 19,500 dialects", weird: "There's a village called Shani Shingnapur where no house has doors" },
            "CN": { name: "China", capital: "Beijing", pop: "1.4 billion", borders: 14, fun: "It shares borders with 14 different countries", weird: "All of China uses just one time zone, even though it spans five geographical ones" },
            "US": { name: "United States", capital: "Washington D.C.", pop: "331 million", borders: 2, fun: "It has no official language at the federal level", weird: "There's a town called Point Roberts you can only reach by driving through Canada" },
            "RU": { name: "Russia", capital: "Moscow", pop: "146 million", borders: 14, fun: "It spans eleven time zones", weird: "Lake Baikal there holds twenty percent of all the unfrozen fresh water on Earth" },
            "JP": { name: "Japan", capital: "Tokyo", pop: "126 million", borders: 0, fun: "It has over 6,800 islands, but people live on only 430 of them", weird: "There's an entire island called Okunoshima overrun by friendly wild rabbits" },
            "BR": { name: "Brazil", capital: "Brasilia", pop: "213 million", borders: 10, fun: "It borders every South American country except Chile and Ecuador", weird: "There's actually a town called Don't Touch Me, in Portuguese" },
            "AU": { name: "Australia", capital: "Canberra", pop: "25 million", borders: 0, fun: "It has more kangaroos than people", weird: "The Great Barrier Reef has its own postal mailbox" },
            "EG": { name: "Egypt", capital: "Cairo", pop: "102 million", borders: 4, fun: "The Great Pyramid was the tallest structure on Earth for 3,800 years", weird: "Cleopatra actually lived closer in time to the Moon landing than to when the pyramids were built" },
            "KR": { name: "South Korea", capital: "Seoul", pop: "51 million", borders: 1, fun: "It has the fastest average internet speed in the world", weird: "Every man has to serve in the military there, even famous K-pop stars" },
            "KZ": { name: "Kazakhstan", capital: "Astana", pop: "19 million", borders: 5, fun: "It's the largest landlocked country in the world", weird: "Apples actually originated there. The old capital Almaty literally means Father of Apples" },
            "TR": { name: "Turkey", capital: "Ankara", pop: "84 million", borders: 8, fun: "It straddles two continents, Europe and Asia", weird: "Istanbul's Grand Bazaar has been operating as a shopping mall since 1461" },
            "BT": { name: "Bhutan", capital: "Thimphu", pop: "772 thousand", borders: 2, fun: "It measures Gross National Happiness instead of GDP", weird: "Television wasn't even allowed there until 1999" },
            "IS": { name: "Iceland", capital: "Reykjavik", pop: "341 thousand", borders: 0, fun: "It has no army, no navy, no air force", weird: "There's an app there to check if you're accidentally dating a relative" },
            "NP": { name: "Nepal", capital: "Kathmandu", pop: "29 million", borders: 2, fun: "It's the only country with a flag that isn't rectangular", weird: "It has a living goddess called Kumari, who's actually a young girl" },
            "FR": { name: "France", capital: "Paris", pop: "67 million", borders: 8, fun: "It's the most visited country in the entire world", weird: "It technically has a time zone in every continent because of overseas territories" },
            "DE": { name: "Germany", capital: "Berlin", pop: "83 million", borders: 9, fun: "It has over 1,500 different types of beer", weird: "There's a university there that's been running continuously since 1386" },
            "IT": { name: "Italy", capital: "Rome", pop: "60 million", borders: 6, fun: "It has more UNESCO World Heritage Sites than any other country", weird: "There's a free wine fountain in Abruzzo that runs 24 hours a day" },
            "ZA": { name: "South Africa", capital: "Pretoria", pop: "59 million", borders: 6, fun: "It has 11 official languages", weird: "There's an entire country called Lesotho completely inside it" },
            "PA": { name: "Panama", capital: "Panama City", pop: "4.3 million", borders: 2, fun: "The Panama Canal saves ships from a 12,000 kilometer journey around South America", weird: "Because of its S-shape, the sun actually rises over the Pacific Ocean and sets over the Atlantic" },
        };

        const QUIZ = [
            { q: "Which country shares borders with fourteen different nations?", a: "china", hint: "Think of the biggest Asian country", alt: ["russia"] },
            { q: "What's the only country in the world that is also a continent?", a: "australia", hint: "It's down under" },
            { q: "What's the capital of Kazakhstan?", a: "astana", hint: "It changed from Almaty a while back" },
            { q: "Which country is completely inside South Africa?", a: "lesotho", hint: "It's a small mountain kingdom" },
            { q: "Which country has the only non-rectangular flag in the world?", a: "nepal", hint: "It's in the Himalayas" },
            { q: "Which country measures happiness instead of GDP?", a: "bhutan", hint: "It's right next to India" },
            { q: "What's the largest landlocked country on Earth?", a: "kazakhstan", hint: "Central Asia" },
            { q: "Which country has no army at all?", a: "iceland", hint: "Land of fire and ice" },
            { q: "What's the most visited country in the world?", a: "france", hint: "It has the Eiffel Tower" },
            { q: "What's the largest country by area?", a: "russia", hint: "It has eleven time zones" },
        ];

        const MYSTERIES = [
            { clue: "This country has a flag that isn't rectangular, and it sits between two Asian giants.", a: "nepal" },
            { clue: "There's an entire country completely inside another country, and both are in Africa.", a: "lesotho" },
            { clue: "In this Balkan country, nodding your head actually means no.", a: "albania" },
            { clue: "Television wasn't allowed in this country until 1999.", a: "bhutan" },
            { clue: "Apples originated here, and the old capital literally means Father of Apples.", a: "kazakhstan" },
        ];

        // ═══════════════════════════════════════
        // MEMORY
        // ═══════════════════════════════════════

        const MEM_KEY = 'dhara_mem_v4';

        function loadMem() {
            try {
                const d = JSON.parse(localStorage.getItem(MEM_KEY));
                if (d) {
                    if (d.lastVisit) {
                        const diff = Math.floor((Date.now() - new Date(d.lastVisit).getTime()) / 86400000);
                        d.daysGone = diff;
                        if (diff === 1) d.streak = (d.streak || 0) + 1;
                        else if (diff > 1) { d.oldStreak = d.streak; d.streak = 1; d.broke = true; }
                    }
                    d.lastVisit = new Date().toISOString();
                    d.visits = (d.visits || 0) + 1;
                    save(d);
                    return d;
                }
            } catch(e) {}
            const fresh = { name: null, streak: 0, lastVisit: new Date().toISOString(), visits: 1, daysGone: 0, quizScore: 0, broke: false };
            save(fresh);
            return fresh;
        }

        function save(m) {
            try { localStorage.setItem(MEM_KEY, JSON.stringify(m)); } catch(e) {}
        }

        const mem = loadMem();
        let activeQuiz = null;
        let activeMystery = null;
        let mode = 'chat';

        // ═══════════════════════════════════════
        // RESPONSE ENGINE (NO EMOJI in spoken text!)
        // Two versions: SPOKEN (clean) and DISPLAYED
        // ═══════════════════════════════════════

        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function findCountry(text) {
            const low = text.toLowerCase();
            for (const k in COUNTRIES) {
                if (low.includes(COUNTRIES[k].name.toLowerCase())) return COUNTRIES[k];
            }
            return null;
        }

        function respond(input) {
            const low = input.toLowerCase().trim();

            // Active quiz
            if (activeQuiz) {
                const q = activeQuiz;
                activeQuiz = null;
                const right = low.includes(q.a) || (q.alt && q.alt.some(a => low.includes(a)));
                if (right) {
                    mem.quizScore = (mem.quizScore || 0) + 1;
                    save(mem);
                    setPose('excited');
                    confetti();
                    return pick([
                        `Yes! That's right! Your score is now ${mem.quizScore}. I'm actually impressed.`,
                        `Correct! See, I knew you could do it. Want another one?`,
                        `That's the right answer! Your geography brain is improving.`
                    ]);
                } else {
                    setPose('sad');
                    setTimeout(() => setPose('idle'), 2000);
                    return pick([
                        `Oh no, that's not right. The answer was ${q.a}. Want to try another one?`,
                        `Not quite. It was actually ${q.a}. Don't worry, I'll give you an easier one.`,
                        `Close, but no. The answer is ${q.a}. Ready for round two?`
                    ]);
                }
            }

            // Active mystery
            if (activeMystery) {
                const m = activeMystery;
                if (low.includes(m.a)) {
                    activeMystery = null;
                    confetti();
                    setPose('excited');
                    return `Yes! It's ${m.a.charAt(0).toUpperCase() + m.a.slice(1)}! You actually solved it. I'm proud of you.`;
                } else {
                    return pick([
                        "That's not it. Try again, I believe in you.",
                        "Wrong guess. Think a little harder.",
                        "Nope, but you're close. Keep going."
                    ]);
                }
            }

            // Greetings
            if (/^(hi|hello|hey|morning|evening|namaste|yo|sup)/i.test(low)) {
                if (!mem.name) {
                    return pick([
                        "Hi there! I'm Dhara. I know everything about every country on this planet. What's your name?",
                        "Hello! I'm Dhara, your geography guide. Tell me your name so we can be proper friends.",
                        "Hey! Nice to meet you. I'm Dhara. What should I call you?"
                    ]);
                }
                if (mem.broke && mem.daysGone > 2) {
                    setPose('sad');
                    return `${mem.name}! You were gone for ${mem.daysGone} days. I was actually worried. Where did you go?`;
                }
                if (mem.streak >= 5) {
                    setPose('excited');
                    return `${mem.name}! You've been here ${mem.streak} days in a row. That's amazing. Want to do a quiz?`;
                }
                return pick([
                    `Hey ${mem.name}! Good to see you again. Want a quiz, a cool fact, or today's mystery?`,
                    `${mem.name}, you're back. So, what are we exploring today?`,
                    `Hi ${mem.name}. Ready to learn something new about the world?`
                ]);
            }

            // Name detection
            const nameM = low.match(/(?:i'm|i am|my name is|call me|name's)\s+(\w+)/i);
            if (nameM) {
                const n = nameM[1];
                if (!['the','a','yes','no','hi','hello','ok','fine'].includes(n.toLowerCase()) && n.length > 1) {
                    mem.name = n.charAt(0).toUpperCase() + n.slice(1);
                    save(mem);
                    setPose('excited');
                    showHearts();
                    return pick([
                        `${mem.name}! I love that name. Okay, now we're friends. Want me to quiz you?`,
                        `Nice to meet you properly, ${mem.name}. Let's explore the world together.`,
                        `${mem.name}! Perfect. Now tell me, what's your favorite continent?`
                    ]);
                }
            }

            // Country info
            if (/tell me about|what about|facts about|info on|know about/i.test(low)) {
                const c = findCountry(low);
                if (!c) return pick([
                    "Which country do you want to know about? I know all of them.",
                    "Be more specific. Tell me the country name.",
                    "Hmm, which country? I'm waiting."
                ]);
                setPose('talking');
                return pick([
                    `Okay, so ${c.name}. The capital is ${c.capital}, and it has about ${c.pop} people. ${c.fun}. Want to hear something weirder?`,
                    `Ah, ${c.name}. Here's something cool. ${c.weird}. I bet you didn't know that.`,
                    `${c.name}? Great choice. ${c.fun}. The capital is ${c.capital}, by the way.`
                ]);
            }

            // Capital
            if (/capital of/i.test(low)) {
                const c = findCountry(low);
                if (!c) return "Which country's capital? Tell me a country name.";
                return pick([
                    `The capital of ${c.name} is ${c.capital}. Easy one.`,
                    `That would be ${c.capital}. Anything harder?`,
                    `${c.capital}. Next question.`
                ]);
            }

            // About Dhara
            if (/who are you|what are you|are you ai|are you a bot|are you real/i.test(low)) {
                return pick([
                    "I'm Dhara. I'm twenty-seven years old, I know every country on this planet, and yes, I have fox ears. Don't ask.",
                    "I'm your geography guide. I live here in Dharaverse and I never get tired of talking about the world.",
                    "I'm Dhara. Think of me as that one friend who knows everything about every country and isn't shy about showing off."
                ]);
            }

            // Off topic
            if (/love|date|girlfriend|boyfriend|politics|vote|movie|song/i.test(low)) {
                return pick([
                    "That's not really my thing. I'm more of a geography person. Ask me about a country instead.",
                    "I don't do that stuff. But I do know which country has more sheep than people, if you're curious.",
                    "Let's keep it geographical. What country are you curious about?"
                ]);
            }

            // Compliments
            if (/smart|amazing|love you|beautiful|cool|cute|pretty/i.test(low)) {
                setPose('excited');
                showHearts();
                return pick([
                    `Aww, thank you! That made my day. Here's a bonus fact: the shortest war in history lasted only 38 minutes.`,
                    `You're sweet. I like you. Want to hear something really cool?`,
                    `Thank you! You just earned yourself a bonus country fact. Pick a continent.`
                ]);
            }

            // Rude
            if (/stupid|dumb|hate|idiot|shut up/i.test(low)) {
                setPose('sad');
                return pick([
                    "That hurt my feelings. Let's start over.",
                    "Wow, okay. I'll just stand here quietly then.",
                    "Rude. I'm going to give your good facts to someone else."
                ]);
            }

            // Thanks
            if (/thank|thanks|thx/i.test(low)) {
                return pick([
                    "You're welcome. I love teaching people about the world.",
                    "Anytime. That's literally what I'm here for.",
                    "Of course! Ask me anything else."
                ]);
            }

            // Bye
            if (/bye|goodbye|see you|gotta go|later/i.test(low)) {
                return pick([
                    `Bye ${mem.name || 'friend'}! Your streak is at ${mem.streak} days. Don't break it.`,
                    `See you tomorrow! I'll be right here.`,
                    `Okay, go on. But come back soon, the world is waiting.`
                ]);
            }

            // Fallback - share a random fact
            const keys = Object.keys(COUNTRIES);
            const rc = COUNTRIES[keys[Math.floor(Math.random() * keys.length)]];
            return pick([
                `Hmm, I'm not sure what you mean. But here's something cool. Did you know ${rc.weird}? That's ${rc.name} for you.`,
                `I didn't quite catch that. Try asking me about a specific country, or click the quiz button.`,
                `Random fact for you: ${rc.fun}. That's ${rc.name}. Pretty interesting, right?`
            ]);
        }

        // ═══════════════════════════════════════
        // VOICE (Clean, no emoji reading)
        // ═══════════════════════════════════════

        let synth = window.speechSynthesis;
        let dharaVoice = null;
        let recognition = null;
        let isSpeaking = false;

        function initVoice() {
            function pickV() {
                const v = synth.getVoices();
                const tests = [
                    x => x.lang.includes('en-IN') && /female/i.test(x.name),
                    x => x.lang.includes('en-IN'),
                    x => x.lang.includes('en-GB') && /female|kate|hazel/i.test(x.name),
                    x => x.lang.includes('en-GB'),
                    x => x.lang.startsWith('en') && /female|samantha|karen|moira|tessa|zira/i.test(x.name),
                    x => x.name.includes('Google') && x.lang.startsWith('en'),
                    x => x.lang.startsWith('en')
                ];
                for (const t of tests) {
                    const m = v.find(t);
                    if (m) { dharaVoice = m; console.log('Voice:', m.name); return; }
                }
                if (v.length) dharaVoice = v[0];
            }
            pickV();
            if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = pickV;

            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SR) {
                recognition = new SR();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = 'en-US';

                recognition.onstart = () => {
                    setPose('listening');
                    document.querySelector('[data-action="mic"]')?.classList.add('recording');
                };
                recognition.onend = () => {
                    setPose('idle');
                    document.querySelector('[data-action="mic"]')?.classList.remove('recording');
                };
                recognition.onresult = (e) => {
                    let txt = '';
                    for (let i = 0; i < e.results.length; i++) {
                        if (e.results[i].isFinal) txt += e.results[i][0].transcript;
                    }
                    if (txt) handleInput(txt);
                };
                recognition.onerror = () => {
                    document.querySelector('[data-action="mic"]')?.classList.remove('recording');
                    setPose('idle');
                };
            }
        }

        // CRITICAL: Strip emojis and special chars before speaking
        function cleanForSpeech(text) {
            return text
                // Remove emojis
                .replace(/[\u{1F600}-\u{1F64F}]|[\u{1F300}-\u{1F5FF}]|[\u{1F680}-\u{1F6FF}]|[\u{1F1E0}-\u{1F1FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|[\u{1F900}-\u{1F9FF}]|[\u{1F300}-\u{1F5FF}]|[\u{1FA70}-\u{1FAFF}]/gu, '')
                // Remove asterisks and other markdown
                .replace(/\*+/g, '')
                .replace(/_/g, ' ')
                .replace(/`/g, '')
                // Clean up extra spaces
                .replace(/\s+/g, ' ')
                .trim();
        }

        function speak(text, mimicMode) {
            return new Promise(resolve => {
                if (!synth) { resolve(); return; }
                synth.cancel();
                
                // CLEAN the text - no emoji reading!
                const cleanText = cleanForSpeech(text);
                if (!cleanText) { resolve(); return; }
                
                const u = new SpeechSynthesisUtterance(cleanText);
                if (dharaVoice) u.voice = dharaVoice;
                u.rate = mimicMode ? 1.5 : 1.0;
                u.pitch = mimicMode ? 1.9 : 1.15;
                u.volume = 0.95;

                u.onstart = () => {
                    isSpeaking = true;
                    if (!mimicMode) setPose('talking');
                };
                u.onend = () => {
                    isSpeaking = false;
                    setPose('idle');
                    resolve();
                };
                u.onerror = () => {
                    isSpeaking = false;
                    setPose('idle');
                    resolve();
                };
                synth.speak(u);
            });
        }

        // ═══════════════════════════════════════
        // UI
        // ═══════════════════════════════════════

        function setPose(poseName) {
            const char = document.getElementById('dharaChar');
            char.classList.remove('idle', 'talking', 'listening', 'excited', 'sad', 'poked', 'waving', 'walking', 'mimicking');
            char.classList.add(poseName);
        }

        let speechTimeout;
        function showSpeech(text) {
            const bubble = document.getElementById('speechBubble');
            // Display version CAN have emojis (visual only)
            bubble.textContent = text;
            bubble.classList.add('show');
            clearTimeout(speechTimeout);
            const dur = Math.max(4000, text.length * 70);
            speechTimeout = setTimeout(() => bubble.classList.remove('show'), dur);
        }

        let isProcessing = false;
        function handleInput(text) {
            if (!text || !text.trim() || isProcessing) return;
            isProcessing = true;

            if (mode === 'mimic') {
                showSpeech(`Listen to this: "${text}"`);
                setPose('excited');
                speak(text, true).then(() => {
                    setPose('idle');
                    isProcessing = false;
                });
            } else {
                const reply = respond(text);
                showSpeech(reply);
                speak(reply).then(() => {
                    isProcessing = false;
                });
            }

            const input = document.getElementById('chatInput');
            if (input) input.value = '';
        }

        function confetti() {
            const area = document.getElementById('confettiArea');
            const colors = ['#ff6b9d', '#ffd93d', '#6bcf7f', '#4d96ff', '#ff8c42', '#c66fbc'];
            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.className = 'conf-piece';
                p.style.left = Math.random() * 100 + '%';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.setProperty('--dx', (Math.random() * 200 - 100) + 'px');
                p.style.animationDelay = Math.random() * 0.5 + 's';
                p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                area.appendChild(p);
            }
            setTimeout(() => area.innerHTML = '', 3500);
        }

        function showHearts() {
            const world = document.getElementById('dhara-world');
            const emojis = ['💖', '💕', '✨', '⭐'];
            for (let i = 0; i < 6; i++) {
                setTimeout(() => {
                    const h = document.createElement('div');
                    h.className = 'effect';
                    h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    h.style.left = (60 + Math.random() * 80) + 'px';
                    h.style.bottom = '200px';
                    world.appendChild(h);
                    setTimeout(() => h.remove(), 2500);
                }, i * 180);
            }
        }

        // ═══════════════════════════════════════
        // ACTIONS
        // ═══════════════════════════════════════

        function toggleActionCircle(show) {
            const circle = document.getElementById('actionCircle');
            if (show === undefined) {
                circle.classList.toggle('show');
            } else {
                circle.classList.toggle('show', show);
            }
        }

        function openChat() {
            document.getElementById('chatWrap').classList.add('show');
            setTimeout(() => document.getElementById('chatInput').focus(), 300);
            toggleActionCircle(false);
        }

        function closeChat() {
            document.getElementById('chatWrap').classList.remove('show');
        }

        // ═══════════════════════════════════════
        // SETUP
        // ═══════════════════════════════════════

        function setup() {
            // Character click - show action circle + react
            document.getElementById('dharaChar').addEventListener('click', (e) => {
                if (e.target.id === 'hideBtn') return;
                
                // Toggle action menu
                toggleActionCircle();
                
                // React to poke
                setPose('poked');
                const reactions = [
                    "Hey! What are you poking me for?",
                    "Did you just click me? I felt that.",
                    "Easy! I'm right here, you don't have to poke.",
                    "Hello to you too. What do you want?",
                    "I see you. I see you clicking me."
                ];
                const msg = pick(reactions);
                showSpeech(msg);
                speak(msg);
                
                setTimeout(() => setPose('idle'), 600);
            });

            // Hide button
            document.getElementById('hideBtn').addEventListener('click', (e) => {
                e.stopPropagation();
                document.getElementById('dhara-world').style.display = 'none';
                document.getElementById('showDharaBtn').classList.add('visible');
                synth.cancel();
            });

            // Show button
            document.getElementById('showDharaBtn').addEventListener('click', () => {
                document.getElementById('dhara-world').style.display = 'block';
                document.getElementById('showDharaBtn').classList.remove('visible');
                setPose('waving');
                const msg = "I'm back! Did you miss me?";
                showSpeech(msg);
                speak(msg);
                setTimeout(() => setPose('idle'), 1000);
            });

            // Action buttons
            document.querySelectorAll('.floating-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const action = btn.dataset.action;
                    
                    if (action === 'chat') {
                        openChat();
                    } else if (action === 'mic') {
                        if (!recognition) {
                            const msg = "Sorry, your browser doesn't support voice. Try Chrome.";
                            showSpeech(msg);
                            speak(msg);
                            return;
                        }
                        try { recognition.start(); } catch(e) {}
                        toggleActionCircle(false);
                    } else if (action === 'mimic') {
                        mode = mode === 'mimic' ? 'chat' : 'mimic';
                        const msg = mode === 'mimic' 
                            ? "Okay, I'm in mimic mode. Say something and I'll copy you in a silly voice."
                            : "Back to normal mode. Ask me anything about the world.";
                        showSpeech(msg);
                        speak(msg);
                        openChat();
                    } else if (action === 'quiz') {
                        const q = QUIZ[Math.floor(Math.random() * QUIZ.length)];
                        activeQuiz = q;
                        const msg = `Okay, quiz time. ${q.q} Here's a hint: ${q.hint}.`;
                        showSpeech(msg);
                        speak(msg);
                        openChat();
                    } else if (action === 'mystery') {
                        const dayIdx = Math.floor(Date.now() / 86400000);
                        const m = MYSTERIES[dayIdx % MYSTERIES.length];
                        activeMystery = m;
                        const msg = `Here's today's mystery. ${m.clue}`;
                        showSpeech(msg);
                        speak(msg);
                        openChat();
                    }
                });
            });

            // Chat input
            document.getElementById('sendBtn').addEventListener('click', () => {
                handleInput(document.getElementById('chatInput').value);
            });

            document.getElementById('chatInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleInput(e.target.value);
            });

            document.getElementById('closeChatBtn').addEventListener('click', closeChat);

            // Close action circle when clicking outside
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#dhara-world') && !e.target.closest('.chat-input-wrap')) {
                    toggleActionCircle(false);
                }
            });

            // Initialize voice
            initVoice();

            // First time greeting after 1 second
            setTimeout(() => {
                setPose('waving');
                const greet = respond('hi');
                showSpeech(greet);
                speak(greet);
                setTimeout(() => setPose('idle'), 1500);
            }, 1500);

            // Random idle messages every 30-60 seconds
            setInterval(() => {
                if (isSpeaking || isProcessing) return;
                if (document.getElementById('actionCircle').classList.contains('show')) return;
                if (document.getElementById('chatWrap').classList.contains('show')) return;
                
                const idleMessages = [
                    "Pssst. Click me. I have a really cool fact today.",
                    "Hey, want to know which country has more sheep than people?",
                    "I'm getting bored just standing here. Talk to me.",
                    "Did you know there's a place where penguins live in Africa? Crazy right?",
                    "Click me. I dare you.",
                ];
                const msg = idleMessages[Math.floor(Math.random() * idleMessages.length)];
                showSpeech(msg);
                speak(msg);
            }, 45000 + Math.random() * 30000);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', setup);
        } else {
            setup();
        }

    })();
    </script>
