<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lake Profile - Lakes Explorer</title>
    <link rel="stylesheet" href="lakes-styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="profile-page">
    <!-- Background Container -->
    <div class="profile-background" id="profileBackground">
        <div class="dark-overlay"></div>
        <div class="shimmer-effect"></div>
    </div>

    <!-- Header -->
    <header class="profile-header">
        <button class="back-btn" onclick="goToLakes()">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Lakes</span>
        </button>
        <div class="lake-title" id="lakeTitle">
            <h1 id="lakeName">Loading...</h1>
            <div class="lake-subtitle">
                <span class="country-flags" id="countryFlags"></span>
                <span class="lake-type" id="lakeType"></span>
            </div>
        </div>
        <div class="header-actions">
            <button class="action-btn" id="flyOverBtn">
                <i class="fas fa-plane"></i>
                Fly Over Lake
            </button>
            <button class="action-btn" id="fullscreenBtn">
                <i class="fas fa-expand"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="profile-content">
        <!-- Map Container -->
        <div class="map-container">
            <div id="lakeMap" class="lake-map"></div>
            <div class="map-controls">
                <button class="map-btn" id="toggleRivers" title="Toggle Rivers">
                    <i class="fas fa-water"></i>
                </button>
                <button class="map-btn" id="toggleCities" title="Toggle Cities">
                    <i class="fas fa-city"></i>
                </button>
                <button class="map-btn" id="toggleIslands" title="Toggle Islands">
                    <i class="fas fa-mountain"></i>
                </button>
                <button class="map-btn" id="toggleDepth" title="Toggle Depth Zones">
                    <i class="fas fa-layer-group"></i>
                </button>
                <button class="map-btn" id="resetView" title="Reset View">
                    <i class="fas fa-sync"></i>
                </button>
            </div>
            <div class="map-legend" id="mapLegend">
                <h4>Legend</h4>
                <div class="legend-item">
                    <span class="legend-color inflow"></span>
                    <span>Inflow Rivers</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color outflow"></span>
                    <span>Outflow Rivers</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color city"></span>
                    <span>Cities</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color island"></span>
                    <span>Islands</span>
                </div>
            </div>
        </div>

        <!-- Mind Map Data Section -->
        <div class="mind-map-container" id="mindMapContainer">
            <div class="mind-map-toggle" id="mindMapToggle">
                <i class="fas fa-sitemap"></i>
                <span>Lake Data</span>
            </div>
            <div class="mind-map" id="mindMap">
                <!-- Mind map will be dynamically generated -->
            </div>
        </div>
    </div>

    <!-- Fly Over Modal -->
    <div class="fly-over-modal" id="flyOverModal">
        <div class="fly-over-content">
            <div class="fly-over-header">
                <h3><i class="fas fa-plane"></i> Fly Over <span id="flyOverLakeName"></span></h3>
                <button class="close-fly-over" id="closeFlyOver">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="fly-over-progress">
                <div class="progress-bar" id="flyOverProgress"></div>
            </div>
            <div class="fly-over-info" id="flyOverInfo">
                <div class="current-location">
                    <i class="fas fa-map-marker-alt"></i>
                    <span id="currentLocationText">Starting flight...</span>
                </div>
                <div class="flight-stats">
                    <div class="flight-stat">
                        <span class="stat-value" id="flightAltitude">5000m</span>
                        <span class="stat-label">Altitude</span>
                    </div>
                    <div class="flight-stat">
                        <span class="stat-value" id="flightSpeed">200km/h</span>
                        <span class="stat-label">Speed</span>
                    </div>
                </div>
            </div>
            <div class="fly-over-controls">
                <button class="fly-control-btn" id="pauseFlight">
                    <i class="fas fa-pause"></i>
                </button>
                <button class="fly-control-btn" id="skipFlight">
                    <i class="fas fa-forward"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Quick Facts Panel -->
    <div class="quick-facts-panel" id="quickFacts">
        <div class="quick-fact">
            <i class="fas fa-ruler-combined"></i>
            <div class="fact-content">
                <span class="fact-value" id="factArea">--</span>
                <span class="fact-label">Surface Area</span>
            </div>
        </div>
        <div class="quick-fact">
            <i class="fas fa-arrows-alt-v"></i>
            <div class="fact-content">
                <span class="fact-value" id="factDepth">--</span>
                <span class="fact-label">Max Depth</span>
            </div>
        </div>
        <div class="quick-fact">
            <i class="fas fa-mountain"></i>
            <div class="fact-content">
                <span class="fact-value" id="factElevation">--</span>
                <span class="fact-label">Elevation</span>
            </div>
        </div>
        <div class="quick-fact">
            <i class="fas fa-tint"></i>
            <div class="fact-content">
                <span class="fact-value" id="factVolume">--</span>
                <span class="fact-label">Volume</span>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="lakes-data-1.js"></script>
    <script src="lakes-data-2.js"></script>
    <script src="lakes-data-3.js"></script>
    <script src="lakes-data-4.js"></script>
    <script src="lakes-data-5.js"></script>
    <script src="lakes-data-6.js"></script>
    <script src="lakes-data-7.js"></script>
    <script src="lakes-data-8.js"></script>
    <script src="lakes-data-9.js"></script>
    <script src="lakes-data-10.js"></script>
    <script src="lakes-data.js"></script>
    <script src="lakes-app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initProfilePage();
        });
    </script>
</body>
</html>
