<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lakes Explorer - Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="lakes-styles.css">
</head>
<body>
    <div class="lakes-container">
        <header class="lakes-header">
            <button class="back-btn" onclick="window.history.back()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="header-content">
                <h1><i class="fas fa-water"></i> Lakes Explorer</h1>
                <p>Discover the world's magnificent lakes</p>
            </div>
            <div class="header-stats">
                <div class="stat">
                    <span class="stat-number" id="totalLakes">0</span>
                    <span class="stat-label">Lakes</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="totalCountries">0</span>
                    <span class="stat-label">Countries</span>
                </div>
            </div>
        </header>

        <div class="search-filter-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search lakes...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All Lakes</button>
                <button class="filter-btn" data-filter="freshwater">Freshwater</button>
                <button class="filter-btn" data-filter="saltwater">Saltwater</button>
            </div>
            <div class="continent-filter">
                <select id="continentFilter">
                    <option value="all">All Continents</option>
                    <option value="Africa">Africa</option>
                    <option value="Asia">Asia</option>
                    <option value="Europe">Europe</option>
                    <option value="North America">North America</option>
                    <option value="South America">South America</option>
                    <option value="Oceania">Oceania</option>
                </select>
            </div>
        </div>

        <div class="lakes-grid" id="lakesGrid">
            <p style="color: white; padding: 20px;">Loading lakes...</p>
        </div>
    </div>

    <!-- Load scripts -->
    <script src="lakes-data-1.js"></script>
    <script src="lakes-data-2.js"></script>
    <script src="lakes-data-3.js"></script>
    <script src="lakes-data-4.js"></script>
    <script src="lakes-data-5.js"></script>
    <script src="lakes-data-6.js"></script>
    <script src="lakes-data-7.js"></script>
    <script src="lakes-data-8.js"></script>
    <script src="lakes-data-9.js"></script>
    <script src="lakes-data-10.js"></script>
    <script src="lakes-data.js"></script>
    <script src="lakes-app.js"></script>
    
    <script>
        // Debug: Check what's loaded
        console.log('=== DEBUG INFO ===');
        console.log('lakesData1:', typeof lakesData1 !== 'undefined' ? 'LOADED (' + lakesData1.length + ' lakes)' : 'NOT FOUND');
        console.log('lakesData2:', typeof lakesData2 !== 'undefined' ? 'LOADED' : 'NOT FOUND');
        console.log('lakesData3:', typeof lakesData3 !== 'undefined' ? 'LOADED' : 'NOT FOUND');
        console.log('getAllLakesData:', typeof getAllLakesData !== 'undefined' ? 'LOADED' : 'NOT FOUND');
        console.log('initLakesPage:', typeof initLakesPage !== 'undefined' ? 'LOADED' : 'NOT FOUND');
        
        // Try to initialize
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM Ready - Initializing...');
            if (typeof initLakesPage === 'function') {
                initLakesPage();
            } else {
                console.error('initLakesPage not found!');
                document.getElementById('lakesGrid').innerHTML = '<p style="color: red; padding: 20px;">Error: Could not load lakes. Check console for details.</p>';
            }
        });
    </script>
</body>
</html>
