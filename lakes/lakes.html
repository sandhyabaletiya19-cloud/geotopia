<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lakes Explorer - Geography Learning App</title>
    <link rel="stylesheet" href="lakes-styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="lakes-container">
        <!-- Header -->
        <header class="lakes-header">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="header-content">
                <h1><i class="fas fa-water"></i> Lakes Explorer</h1>
                <p>Discover the world's magnificent lakes</p>
            </div>
            <div class="header-stats">
                <div class="stat">
                    <span class="stat-number" id="totalLakes">0</span>
                    <span class="stat-label">Lakes</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="totalCountries">0</span>
                    <span class="stat-label">Countries</span>
                </div>
            </div>
        </header>

        <!-- Search and Filter -->
        <div class="search-filter-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search lakes...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All Lakes</button>
                <button class="filter-btn" data-filter="freshwater">Freshwater</button>
                <button class="filter-btn" data-filter="saltwater">Saltwater</button>
                <button class="filter-btn" data-filter="largest">Largest</button>
                <button class="filter-btn" data-filter="deepest">Deepest</button>
            </div>
            <div class="continent-filter">
                <select id="continentFilter">
                    <option value="all">All Continents</option>
                    <option value="Africa">Africa</option>
                    <option value="Asia">Asia</option>
                    <option value="Europe">Europe</option>
                    <option value="North America">North America</option>
                    <option value="South America">South America</option>
                    <option value="Oceania">Oceania</option>
                    <option value="Antarctica">Antarctica</option>
                </select>
            </div>
        </div>

        <!-- Lakes Grid -->
        <div class="lakes-grid" id="lakesGrid">
            <!-- Lake cards will be dynamically inserted here -->
        </div>

        <!-- Loading Indicator -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="water-loader">
                <div class="wave"></div>
                <div class="wave"></div>
                <div class="wave"></div>
            </div>
            <p>Loading Lakes...</p>
        </div>
    </div>

    <!-- Scripts - Load in correct order -->
    <script src="lakes-data-1.js"></script>
    <script src="lakes-data-2.js"></script>
    <script src="lakes-data-3.js"></script>
    <script src="lakes-data-4.js"></script>
    <script src="lakes-data-5.js"></script>
    <script src="lakes-data-6.js"></script>
    <script src="lakes-data-7.js"></script>
    <script src="lakes-data-8.js"></script>
    <script src="lakes-data-9.js"></script>
    <script src="lakes-data-10.js"></script>
    <script src="lakes-data.js"></script>
    <script src="../js/auto-inject.js"></script>
    <script src="../js/premium-wrapper.js"></script>
    <script src="lakes-app.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof initLakesPage === 'function') {
                initLakesPage();
            }
        });
    </script>
</body>
</html>
