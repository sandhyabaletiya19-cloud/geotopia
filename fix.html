<!DOCTYPE html>
<html>
<head>
    <title>Fix Account - DharaVerse</title>
    <style>
        body {
            background: #0a0a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 { font-size: 24px; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #8B5CF6, #7C3AED);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        .msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }
        .success {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            display: block;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🔧 Fix Premium Account</h1>
        <p>Enter your details to activate premium 💜</p>
        
        <input type="text" id="fixName" placeholder="Your Name">
        <input type="email" id="fixEmail" placeholder="Your Email">
        
        <button onclick="fixAccount()">✅ Activate Premium</button>
        
        <div class="msg" id="fixMsg"></div>
    </div>

    <script>
        function fixAccount() {
            var name = document.getElementById('fixName').value.trim();
            var email = document.getElementById('fixEmail').value.trim();

            if (!name || !email) {
                alert('Please enter both name and email');
                return;
            }

            var expiry = new Date();
            expiry.setFullYear(expiry.getFullYear() + 1);

            localStorage.setItem('dv_premium', 'true');
            localStorage.setItem('dv_plan', 'ultimate');
            localStorage.setItem('dv_plan_expiry', expiry.toISOString());
            localStorage.setItem('dv_user_loggedin', 'true');
            localStorage.setItem('dv_user_email', email);
            localStorage.setItem('dv_user_name', name);

            localStorage.setItem('dharaverse_premium', JSON.stringify({
                isPremium: true,
                expiryDate: expiry.toISOString(),
                plan: 'ultimate'
            }));

            var msg = document.getElementById('fixMsg');
            msg.className = 'msg success';
            msg.innerHTML = '✅ Premium Activated!<br>Name: ' + name + '<br>Email: ' + email + '<br>Plan: Ultimate 👑<br>Expires: ' + expiry.toLocaleDateString() + '<br><br>Redirecting to homepage...';

            setTimeout(function() {
                window.location.href = '/';
            }, 3000);
        }
    </script>
</body>
</html>
