<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Box</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Raleway', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?w=1920') center/cover;
            opacity: 0.25;
            z-index: -3;
        }

        .bg-fog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, #0a0a0f, transparent 50%, rgba(10,10,15,0.8));
            z-index: -2;
        }

        /* Stars */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(147, 51, 234, 0.4);
            border-radius: 50%;
            animation: floatParticle 6s ease-in-out infinite;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            50% { transform: translateY(-30px) translateX(10px); opacity: 0.7; }
        }

        /* Pages */
        .page {
            display: none;
            min-height: 100vh;
            animation: fadeIn 0.5s ease-out;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Homepage */
        .homepage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .main-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            background: linear-gradient(135deg, #a855f7, #ec4899, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: pulseGlow 3s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        .subtitle {
            color: #9ca3af;
            font-size: 1.1rem;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        /* Mystery Box */
        .mystery-box-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .mystery-box-container:hover {
            transform: scale(1.05);
        }

        .mystery-box-container.opening {
            animation: boxOpen 1.5s ease-out forwards;
        }

        @keyframes boxOpen {
            0% { transform: scale(1); }
            50% { transform: scale(1.2) rotateY(180deg); }
            100% { transform: scale(2); opacity: 0; }
        }

        .box-glow-outer {
            position: absolute;
            top: -40px;
            left: -40px;
            right: -40px;
            bottom: -40px;
            background: linear-gradient(135deg, #9333ea, #ec4899, #9333ea);
            border-radius: 30px;
            filter: blur(40px);
            opacity: 0.5;
            animation: glowPulse 2s ease-in-out infinite;
        }

        .box-glow-inner {
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            background: linear-gradient(135deg, #a855f7, #f472b6, #a855f7);
            border-radius: 25px;
            filter: blur(25px);
            opacity: 0.6;
            animation: glowPulse 2s ease-in-out infinite 0.5s;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        .mystery-box {
            position: relative;
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d1f4e 50%, #1a1a2e 100%);
            border-radius: 20px;
            border: 2px solid rgba(147, 51, 234, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .mystery-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 20px;
            border: 2px solid rgba(168, 85, 247, 0.4);
            animation: borderGlow 2s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .box-question {
            font-family: 'Cinzel', serif;
            font-size: 8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c084fc, #f472b6, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .click-hint {
            margin-top: 40px;
            color: #6b7280;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Quick Actions */
        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-top: 60px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-family: 'Raleway', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn.daily {
            background: linear-gradient(135deg, #d97706, #ea580c);
            box-shadow: 0 4px 20px rgba(217, 119, 6, 0.3);
        }

        .action-btn.random {
            background: linear-gradient(135deg, #9333ea, #db2777);
            box-shadow: 0 4px 20px rgba(147, 51, 234, 0.3);
        }

        .action-btn.map {
            background: linear-gradient(135deg, #059669, #0d9488);
            box-shadow: 0 4px 20px rgba(5, 150, 105, 0.3);
        }

        .action-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        /* Header */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: transparent;
            border: none;
            color: #a855f7;
            font-family: 'Raleway', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: #c084fc;
        }

        .page-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.5rem, 4vw, 2rem);
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Search */
        .search-container {
            max-width: 600px;
            margin: 0 auto 40px;
            padding: 0 20px;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: rgba(17, 17, 27, 0.8);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 14px;
            color: #fff;
            font-family: 'Raleway', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #a855f7;
        }

        .search-input::placeholder {
            color: #6b7280;
        }

        /* Category Sections */
        .category-section {
            max-width: 1400px;
            margin: 0 auto 50px;
            padding: 0 20px;
        }

        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title.geography { color: #c084fc; }
        .section-title.history { color: #fbbf24; }
        .section-title.location { color: #34d399; }

        /* Category Grid */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
        }

        .category-card {
            position: relative;
            padding: 24px 16px;
            border-radius: 16px;
            border: 1px solid rgba(147, 51, 234, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            overflow: hidden;
        }

        .category-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(147, 51, 234, 0.6);
        }

        .category-card.geography {
            background: linear-gradient(135deg, rgba(88, 28, 135, 0.6), rgba(67, 56, 202, 0.6));
            box-shadow: 0 4px 20px rgba(88, 28, 135, 0.2);
        }

        .category-card.geography:hover {
            box-shadow: 0 8px 30px rgba(147, 51, 234, 0.3);
        }

        .category-card.history {
            background: linear-gradient(135deg, rgba(120, 53, 15, 0.6), rgba(154, 52, 18, 0.6));
            border-color: rgba(251, 191, 36, 0.3);
            box-shadow: 0 4px 20px rgba(120, 53, 15, 0.2);
        }

        .category-card.history:hover {
            border-color: rgba(251, 191, 36, 0.6);
            box-shadow: 0 8px 30px rgba(251, 191, 36, 0.3);
        }

        .category-card.location {
            background: linear-gradient(135deg, rgba(6, 78, 59, 0.6), rgba(17, 94, 89, 0.6));
            border-color: rgba(52, 211, 153, 0.3);
            box-shadow: 0 4px 20px rgba(6, 78, 59, 0.2);
        }

        .category-card.location:hover {
            border-color: rgba(52, 211, 153, 0.6);
            box-shadow: 0 8px 30px rgba(52, 211, 153, 0.3);
        }

        .category-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            transition: transform 0.3s;
        }

        .category-card:hover .category-icon {
            transform: scale(1.15);
        }

        .category-name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .category-count {
            font-size: 0.75rem;
            color: #9ca3af;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 30px;
            padding: 0 20px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .filter-select {
            padding: 10px 16px;
            background: rgba(17, 17, 27, 0.8);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 10px;
            color: #fff;
            font-family: 'Raleway', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .filter-select:focus {
            outline: none;
            border-color: #a855f7;
        }

        .filter-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 16px;
            background: rgba(17, 17, 27, 0.8);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 10px;
            color: #fff;
            font-family: 'Raleway', sans-serif;
            font-size: 0.9rem;
        }

        .filter-input:focus {
            outline: none;
            border-color: #a855f7;
        }

        /* Mystery Grid */
        .mystery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            padding: 0 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .mystery-card {
            background: linear-gradient(135deg, rgba(17, 17, 27, 0.9), rgba(30, 27, 45, 0.9));
            border-radius: 16px;
            border: 1px solid rgba(147, 51, 234, 0.2);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mystery-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(147, 51, 234, 0.5);
            box-shadow: 0 10px 40px rgba(147, 51, 234, 0.2);
        }

        .mystery-image {
            position: relative;
            height: 180px;
            overflow: hidden;
        }

        .mystery-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .mystery-card:hover .mystery-image img {
            transform: scale(1.1);
        }

        .mystery-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, #0a0a0f, transparent 60%);
        }

        .bookmark-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            background: rgba(10, 10, 15, 0.8);
            border: none;
            border-radius: 10px;
            color: #9ca3af;
            font-size: 1rem;
            cursor: pointer;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .bookmark-btn:hover {
            background: rgba(30, 27, 45, 0.9);
        }

        .bookmark-btn.active {
            color: #fbbf24;
        }

        .status-badge {
            position: absolute;
            bottom: 12px;
            left: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            z-index: 2;
        }

        .status-badge.unsolved {
            background: rgba(127, 29, 29, 0.8);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
        }

        .status-badge.partial {
            background: rgba(120, 53, 15, 0.8);
            border: 1px solid rgba(245, 158, 11, 0.5);
            color: #fcd34d;
        }

        .status-badge.investigated {
            background: rgba(30, 58, 138, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.5);
            color: #93c5fd;
        }

        .status-badge.debunked {
            background: rgba(55, 65, 81, 0.8);
            border: 1px solid rgba(107, 114, 128, 0.5);
            color: #d1d5db;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-badge.unsolved .status-dot,
        .status-badge.investigated .status-dot {
            animation: pulseDot 2s ease-in-out infinite;
        }

        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }

        .mystery-content {
            padding: 20px;
        }

        .mystery-title {
            font-family: 'Cinzel', serif;
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #fff;
            transition: color 0.3s;
        }

        .mystery-card:hover .mystery-title {
            color: #c084fc;
        }

        .mystery-summary {
            font-size: 0.9rem;
            color: #9ca3af;
            line-height: 1.5;
            margin-bottom: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .mystery-location {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #6b7280;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .empty-state p {
            color: #4b5563;
            font-size: 0.95rem;
        }

        /* Detail Page */
        .detail-hero {
            position: relative;
            height: 50vh;
            min-height: 300px;
            max-height: 450px;
        }

        .detail-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, #0a0a0f, rgba(10,10,15,0.4) 50%, transparent);
        }

        .detail-back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(10, 10, 15, 0.8);
            border: none;
            border-radius: 10px;
            color: #a855f7;
            font-family: 'Raleway', sans-serif;
            font-size: 0.95rem;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s;
        }

        .detail-back-btn:hover {
            background: rgba(30, 27, 45, 0.9);
            color: #c084fc;
        }

        .detail-bookmark-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(10, 10, 15, 0.8);
            border: none;
            border-radius: 10px;
            color: #a855f7;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .detail-bookmark-btn:hover {
            background: rgba(30, 27, 45, 0.9);
        }

        .detail-bookmark-btn.active {
            color: #fbbf24;
        }

        .detail-status {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 10;
        }

        .detail-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px 60px;
        }

        .detail-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 700;
            background: linear-gradient(135deg, #a855f7, #ec4899, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .detail-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
        }

        .detail-meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #9ca3af;
            font-size: 0.95rem;
        }

        .detail-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 35px;
        }

        .detail-tag {
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .detail-tag.category {
            background: rgba(88, 28, 135, 0.5);
            border: 1px solid rgba(147, 51, 234, 0.3);
            color: #c084fc;
        }

        .detail-tag.region {
            background: rgba(31, 41, 55, 0.5);
            border: 1px solid rgba(107, 114, 128, 0.3);
            color: #d1d5db;
        }

        .detail-section {
            margin-bottom: 35px;
        }

        .detail-section-title {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            color: #c084fc;
            margin-bottom: 15px;
        }

        .detail-summary {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #d1d5db;
            background: rgba(17, 17, 27, 0.5);
            padding: 20px;
            border-radius: 14px;
            border: 1px solid rgba(147, 51, 234, 0.2);
        }

        .detail-explanation {
            font-size: 1rem;
            line-height: 1.8;
            color: #d1d5db;
            background: rgba(17, 17, 27, 0.3);
            padding: 25px;
            border-radius: 14px;
            border: 1px solid rgba(147, 51, 234, 0.1);
        }

        .detail-map {
            position: relative;
            height: 280px;
            background: rgba(17, 17, 27, 0.5);
            border-radius: 14px;
            border: 1px solid rgba(147, 51, 234, 0.2);
            overflow: hidden;
        }

        .detail-map img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .detail-map-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .detail-map-overlay .map-icon {
            font-size: 3rem;
            color: #ef4444;
            animation: bounce 2s ease-in-out infinite;
        }

        .detail-map-overlay .coords {
            margin-top: 12px;
            color: #d1d5db;
            font-size: 1rem;
        }

        .detail-map-overlay .location {
            color: #6b7280;
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .detail-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 40px;
        }

        .detail-action-btn {
            display: flex;

        }

        .detail-action-btn.secondary {
            background: rgba(31, 41, 55, 0.8);
            border: 1px solid rgba(147, 51, 234, 0.3);
        }

        .detail-action-btn:hover {
            transform: translateY(-3px);
        }

        /* Daily Reveal Overlay */
        .daily-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;

        }

        }

            text-align: center;
        }

        .daily-content .gift-icon {
            font-size: 5rem;
            animation: bounce 1s ease-in-out infinite;
        }

        .daily-content h2 {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: #fbbf24;
            margin-top: 25px;
        }

        .daily-content p {
            color: #9ca3af;
            margin-top: 10px;
        }

        .loading-bar {
            width: 200px;
            height: 6px;
            background: #1f2937;
            border-radius: 3px;
            margin: 25px auto 0;
            overflow: hidden;
        }

        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #f59e0b, #ea580c);
            width: 0%;
            animation: loading 2s ease-out forwards;
        }

        @keyframes loading {
            from { width: 0%; }
            to { width: 100%; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .mystery-box {
                width: 160px;
                height: 160px;
            }

            .box-question {
                font-size: 6rem;
            }

            .quick-actions {
                flex-direction: column;
                align-items: center;
            }

            .action-btn {
                width: 100%;
                max-width: 280px;
                justify-content: center;
            }

            .category-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));

            .mystery-grid {
                grid-template-columns: 1fr;
            }

            .filter-bar {
                flex-direction: column;
            }

            .filter-select, .filter-input {
                width: 100%;
            }

            .detail-hero {
                height: 40vh;
            }
        }

</head>

        const categories = [
            { id: 'mountains', name: 'Mountains', icon: '🏔️', type: 'geography' },
            { id: 'oceans', name: 'Oceans', icon: '🌊', type: 'geography' },
            { id: 'rivers', name: 'Rivers', icon: '🏞️', type: 'geography' },
            { id: 'forests', name: 'Forests', icon: '🌲', type: 'geography' },
            { id: 'deserts', name: 'Deserts', icon: '🏜️', type: 'geography' },
            { id: 'islands', name: 'Islands', icon: '🏝️', type: 'geography' },
            { id: 'caves', name: 'Caves', icon: '🕳️', type: 'geography' },
            { id: 'lakes', name: 'Lakes', icon: '💧', type: 'geography' },
            { id: 'volcanoes', name: 'Volcanoes', icon: '🌋', type: 'geography' },
            { id: 'ancient-civilizations', name: 'Ancient Civilizations', icon: '🏛️', type: 'history' },
            { id: 'lost-cities', name: 'Lost Cities', icon: '🏰', type: 'history' },
            { id: 'archaeological', name: 'Archaeological', icon: '💀', type: 'history' },
            { id: 'unsolved-events', name: 'Unsolved Events', icon: '❓', type: 'history' },
            { id: 'ancient-tech', name: 'Ancient Tech', icon: '⚡', type: 'history' },
            { id: 'countries', name: 'Countries', icon: '🗺️', type: 'location' },
            { id: 'continents', name: 'Continents', icon: '🌍', type: 'location' },
            { id: 'regions', name: 'Regions', icon: '📍', type: 'location' }
        ];

        // State
        let currentPage = 'home';
        let pageHistory = [];
        let selectedCategory = null;
        let selectedMystery = null;
        let bookmarks = JSON.parse(localStorage.getItem('mysteryBookmarks') || '[]');
        let filteredMysteries = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            createStars();
            createParticles();
            renderCategories();
        });

        // Create Stars
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }

        // Create Particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                container.appendChild(particle);
            }
        }

        // Render Categories
        function renderCategories() {
            const grids = {
                geography: document.getElementById('geographyGrid'),
                history: document.getElementById('historyGrid'),
                location: document.getElementById('locationGrid')
            };

            categories.forEach(function(cat) {
                const count = mysteries.filter(function(m) { return m.categoryId === cat.id; }).length;
                const card = document.createElement('div');
                card.className = 'category-card ' + cat.type;
                card.onclick = function() { openCategory(cat); };
                card.innerHTML = 
                    '<div class="category-icon">' + cat.icon + '</div>' +
                    '<div class="category-name">' + cat.name + '</div>' +
                    '<div class="category-count">' + count + ' mysteries</div>';
                grids[cat.type].appendChild(card);
            });
        }

        // Show Page
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(function(p) {
                p.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
            currentPage = pageId;
            window.scrollTo(0, 0);
        }

        // Go Back
        function goBack() {
            if (pageHistory.length > 0) {
                const prevPage = pageHistory.pop();
                showPage(prevPage);
            }
        }

        // Open Mystery Box
        function openMysteryBox() {
            const box = document.getElementById('mysteryBox');
            box.classList.add('opening');
            setTimeout(function() {
                box.classList.remove('opening');
                pageHistory.push('homePage');
                showPage('categoriesPage');
            }, 1500);
        }

        // Open Category
        function openCategory(category) {
            selectedCategory = category;
            document.getElementById('categoryTitle').innerHTML = category.icon + ' ' + category.name;
            
            // Populate country filter
            const countryFilter = document.getElementById('countryFilter');
            const categoryMysteries = mysteries.filter(function(m) { return m.categoryId === category.id; });
            const countries = [];
            categoryMysteries.forEach(function(m) {
                if (countries.indexOf(m.country) === -1) {
                    countries.push(m.country);
                }
            });
            countries.sort();
            
            countryFilter.innerHTML = '<option value="all">All Countries</option>';
            countries.forEach(function(c) {
                countryFilter.innerHTML += '<option value="' + c + '">' + c + '</option>';
            });

            document.getElementById('statusFilter').value = 'all';
            document.getElementById('categorySearch').value = '';
            
            pageHistory.push('categoriesPage');
            filterMysteries();
            showPage('categoryDetailPage');
        }

        // Filter Mysteries
        function filterMysteries() {
            const status = document.getElementById('statusFilter').value;
            const country = document.getElementById('countryFilter').value;
            const search = document.getElementById('categorySearch').value.toLowerCase();

            filteredMysteries = mysteries.filter(function(m) {
                if (m.categoryId !== selectedCategory.id) return false;
                if (status !== 'all' && m.status !== status) return false;
                if (country !== 'all' && m.country !== country) return false;
                if (search && m.title.toLowerCase().indexOf(search) === -1 && m.summary.toLowerCase().indexOf(search) === -1) return false;
                return true;
            });

            renderMysteryGrid();
        }

        // Get Status Class
        function getStatusClass(status) {
            switch(status) {
                case 'Unsolved': return 'unsolved';
                case 'Partially Solved': return 'partial';
                case 'Still Investigated': return 'investigated';
                case 'Debunked': return 'debunked';
                default: return '';
            }
        }

        // Render Mystery Grid
        function renderMysteryGrid() {
            const grid = document.getElementById('mysteryGrid');
            const emptyState = document.getElementById('emptyState');

            if (filteredMysteries.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            emptyState.style.display = 'none';
            
            let html = '';
            filteredMysteries.forEach(function(m) {
                const isBookmarked = bookmarks.indexOf(m.id) !== -1;
                html += 
                    '<div class="mystery-card" onclick="openMystery(\'' + m.id + '\')">' +
                        '<div class="mystery-image">' +
                            '<img src="' + m.imageUrl + '" alt="' + m.title + '">' +
                            '<button class="bookmark-btn ' + (isBookmarked ? 'active' : '') + '" onclick="event.stopPropagation(); toggleBookmark(\'' + m.id + '\')">' +
                                (isBookmarked ? '★' : '☆') +
                            '</button>' +
                            '<div class="status-badge ' + getStatusClass(m.status) + '">' +
                                '<span class="status-dot"></span>' +
                                m.status +
                            '</div>' +
                        '</div>' +
                        '<div class="mystery-content">' +
                            '<h3 class="mystery-title">' + m.title + '</h3>' +
                            '<p class="mystery-summary">' + m.summary + '</p>' +
                            '<div class="mystery-location">' +
                                '📍 ' + m.country +
                            '</div>' +
                        '</div>' +
                    '</div>';
            });
            grid.innerHTML = html;
        }

        // Open Mystery
        function openMystery(id) {
            selectedMystery = mysteries.find(function(m) { return m.id === id; });
            if (!selectedMystery) return;

            document.getElementById('detailImage').src = selectedMystery.imageUrl;
            document.getElementById('detailTitle').textContent = selectedMystery.title;
            document.getElementById('detailSummary').textContent = selectedMystery.summary;
            document.getElementById('detailExplanation').textContent = selectedMystery.fullExplanation;
            document.getElementById('detailCoords').textContent = 
                selectedMystery.coordinates.lat.toFixed(4) + '°, ' + selectedMystery.coordinates.lng.toFixed(4) + '°';
            document.getElementById('detailLocationText').textContent = 
                selectedMystery.location + ', ' + selectedMystery.country;

            document.getElementById('detailStatus').innerHTML = 
                '<div class="status-badge ' + getStatusClass(selectedMystery.status) + '">' +
                    '<span class="status-dot"></span>' +
                    selectedMystery.status +
                '</div>';

            document.getElementById('detailMeta').innerHTML = 
                '<div class="detail-meta-item">📍 ' + selectedMystery.location + '</div>' +
                '<div class="detail-meta-item">🌍 ' + selectedMystery.country + '</div>' +
                '<div class="detail-meta-item">📅 Discovered: ' + selectedMystery.dateDiscovered + '</div>';

            document.getElementById('detailTags').innerHTML = 
                '<span class="detail-tag category">' + selectedMystery.category + '</span>' +
                '<span class="detail-tag region">' + selectedMystery.region + '</span>';

            updateDetailBookmarkBtn();

            pageHistory.push(currentPage);
            showPage('mysteryDetailPage');
        }

        // Toggle Bookmark
        function toggleBookmark(id) {
            const index = bookmarks.indexOf(id);
            if (index !== -1) {
                bookmarks.splice(index, 1);
            } else {
                bookmarks.push(id);
            }
            localStorage.setItem('mysteryBookmarks', JSON.stringify(bookmarks));
            
            if (currentPage === 'categoryDetailPage') {
                renderMysteryGrid();
            }
        }

        // Toggle Detail Bookmark
        function toggleDetailBookmark() {
            if (!selectedMystery) return;
            toggleBookmark(selectedMystery.id);
            updateDetailBookmarkBtn();
        }

        // Update Detail Bookmark Button
        function updateDetailBookmarkBtn() {
            const btn = document.getElementById('detailBookmark');
            const isBookmarked = bookmarks.indexOf(selectedMystery.id) !== -1;
            btn.className = 'detail-bookmark-btn' + (isBookmarked ? ' active' : '');
            btn.textContent = isBookmarked ? '★' : '☆';
        }

        // Show Daily Mystery
        function showDailyMystery() {
            const overlay = document.getElementById('dailyOverlay');
            overlay.classList.add('active');
            
            setTimeout(function() {
                overlay.classList.remove('active');
                const randomIndex = Math.floor(Math.random() * mysteries.length);
                pageHistory = ['homePage'];
                openMystery(mysteries[randomIndex].id);
            }, 2500);
        }

        // Show Random Mystery
        function showRandomMystery() {
            const randomIndex = Math.floor(Math.random() * mysteries.length);
            pageHistory = ['homePage'];
            openMystery(mysteries[randomIndex].id);
        }
    </script>
</body>
</html>
