<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Geography Progress</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="upsc-styles.css">
</head>
<body class="profile-page">
    <!-- Loading -->
    <div class="loader" id="loader">
        <div class="loader-content">
            <div class="loader-icon">📊</div>
            <div class="loader-spinner"></div>
            <p>Loading Your Progress...</p>
        </div>
    </div>

    <!-- Background -->
    <div class="profile-bg"></div>
    <div class="profile-overlay"></div>

    <!-- Main Content -->
    <main class="profile-container">
        <!-- Header -->
        <header class="profile-header">
            <div class="header-left">
                <a href="UPSC.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back to Topics</span>
                </a>
                <div class="user-title">
                    <h1>
                        <i class="fas fa-user-graduate"></i>
                        <span>Your Geography Journey</span>
                    </h1>
                    <div class="user-meta">
                        <span id="userName">UPSC Aspirant</span>
                        <span class="separator">•</span>
                        <span id="studyStreak">🔥 5 Day Streak</span>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <button class="action-btn" id="exportProgressBtn">
                    <i class="fas fa-download"></i>
                    <span>Export Progress</span>
                </button>
            </div>
        </header>

        <!-- Stats Row -->
        <section class="stats-section">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                        <i class="fas fa-book-open"></i>
                    </div>
                    <div class="stat-details">
                        <div class="stat-value" id="topicsStudied">0</div>
                        <div class="stat-label">Topics Studied</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                        <i class="fas fa-brain"></i>
                    </div>
                    <div class="stat-details">
                        <div class="stat-value" id="mnemonicsLearned">0</div>
                        <div class="stat-label">Mnemonics Mastered</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                        <i class="fas fa-chart-pie"></i>
                    </div>
                    <div class="stat-details">
                        <div class="stat-value" id="diagramsViewed">0</div>
                        <div class="stat-label">Diagrams Viewed</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="stat-details">
                        <div class="stat-value" id="studyTime">0h</div>
                        <div class="stat-label">Total Study Time</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Progress Content Grid -->
        <section class="content-grid">
            <!-- Category Progress -->
            <div class="content-card progress-card">
                <div class="card-header">
                    <h3><i class="fas fa-chart-line"></i> Category-wise Progress</h3>
                </div>
                <div class="progress-list" id="categoryProgress">
                    <!-- Progress bars inserted by JS -->
                </div>
            </div>

            <!-- Study Calendar -->
            <div class="content-card calendar-card">
                <div class="card-header">
                    <h3><i class="fas fa-calendar-alt"></i> Study Heatmap</h3>
                    <div class="calendar-legend">
                        <span class="legend-item"><span class="heat-box heat-0"></span>0</span>
                        <span class="legend-item"><span class="heat-box heat-1"></span>1-2</span>
                        <span class="legend-item"><span class="heat-box heat-2"></span>3-5</span>
                        <span class="legend-item"><span class="heat-box heat-3"></span>6+</span>
                    </div>
                </div>
                <div class="study-calendar" id="studyCalendar">
                    <!-- Calendar inserted by JS -->
                </div>
            </div>
        </section>

        <!-- Weak Areas Section -->
        <section class="weak-areas-section">
            <h3 class="section-title"><i class="fas fa-exclamation-triangle"></i> Topics Needing Revision</h3>
            <div class="weak-topics-grid" id="weakTopicsGrid">
                <!-- Weak topics inserted by JS -->
            </div>
        </section>

        <!-- Achievements Section -->
        <section class="achievements-section">
            <h3 class="section-title"><i class="fas fa-trophy"></i> Achievements Unlocked</h3>
            <div class="achievements-grid" id="achievementsGrid">
                <!-- Achievements inserted by JS -->
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="upsc-data.js"></script>
    <script src="upsc-app.js"></script>
</body>
</html>
