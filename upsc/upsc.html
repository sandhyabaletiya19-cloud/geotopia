<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPSC Geography Flashcards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #667eea;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            min-height: 300px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.3s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card.flipped .question {
            display: none;
        }

        .card.flipped .answer {
            display: block;
        }

        .question, .answer {
            font-size: 1.3rem;
            line-height: 1.6;
        }

        .answer {
            display: none;
            color: #333;
        }

        .question {
            color: #667eea;
            font-weight: 600;
        }

        .flip-hint {
            text-align: center;
            color: #999;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .navigation {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #667eea;
            color: white;
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        .counter {
            text-align: center;
            color: white;
            margin-top: 15px;
            font-size: 1.1rem;
        }

        .tags {
            margin-top: 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            background: #e0e7ff;
            color: #667eea;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 UPSC Geography Flashcards</h1>
        
        <div class="controls">
            <select id="topicSelect">
                <option value="all">All Topics</option>
            </select>
        </div>

        <div class="card" id="flashcard">
            <div class="question" id="question">Loading...</div>
            <div class="answer" id="answer">Loading...</div>
            <div class="tags" id="tags"></div>
            <div class="flip-hint">👆 Click to flip</div>
        </div>

        <div class="navigation">
            <button id="prevBtn">← Previous</button>
            <button id="nextBtn">Next →</button>
        </div>

        <div class="counter" id="counter">0 / 0</div>
    </div>

    <script>
        // ALL DATA EMBEDDED HERE
        const geographyData = {
            "Physical Geography - Geomorphology": [
                {
                    question: "What is the theory of plate tectonics?",
                    answer: "The theory that Earth's outer shell is divided into several plates that glide over the mantle. These plates interact at boundaries causing earthquakes, volcanoes, and mountain formation.",
                    tags: ["plate tectonics", "earth structure"]
                },
                {
                    question: "Explain the process of weathering.",
                    answer: "Weathering is the breakdown of rocks at Earth's surface through physical (mechanical), chemical, or biological processes without involving movement of the material.",
                    tags: ["weathering", "erosion"]
                }
            ],
            "Physical Geography - Climatology": [
                {
                    question: "What is the Coriolis effect?",
                    answer: "The deflection of moving objects caused by Earth's rotation. It deflects to the right in Northern Hemisphere and left in Southern Hemisphere.",
                    tags: ["coriolis", "atmospheric circulation"]
                },
                {
                    question: "Explain the Indian Monsoon system.",
                    answer: "Seasonal reversal of winds caused by differential heating of land and ocean. SW monsoon (June-Sept) brings rainfall; NE monsoon (Oct-Dec) affects Tamil Nadu coast.",
                    tags: ["monsoon", "India"]
                }
            ],
            "India - Physical Features": [
                {
                    question: "Describe the physiographic divisions of India.",
                    answer: "1) The Himalayas 2) Northern Plains 3) Peninsular Plateau 4) Coastal Plains 5) Islands. Each has distinct geological history, relief, and resources.",
                    tags: ["India", "physiography"]
                },
                {
                    question: "What is the importance of the Himalayas?",
                    answer: "Climate barrier (blocks cold winds, traps monsoon), perennial rivers, biodiversity, tourism, strategic defense, glaciers as water source.",
                    tags: ["Himalayas", "India"]
                }
            ],
            "Economic Geography - Agriculture": [
                {
                    question: "What is Green Revolution in India?",
                    answer: "Agricultural transformation (1960s-70s) using HYV seeds, fertilizers, irrigation. Increased wheat and rice production significantly in Punjab, Haryana, and western UP.",
                    tags: ["Green Revolution", "India"]
                }
            ],
            "Human Geography - Population": [
                {
                    question: "What is demographic transition theory?",
                    answer: "Theory explaining population change through stages: High birth/death rates → Declining death rates → Declining birth rates → Low birth/death rates.",
                    tags: ["population", "demographic transition"]
                }
            ]
        };

        // APP LOGIC
        let allCards = [];
        let currentCards = [];
        let currentIndex = 0;

        const card = document.getElementById('flashcard');
        const question = document.getElementById('question');
        const answer = document.getElementById('answer');
        const tagsDiv = document.getElementById('tags');
        const topicSelect = document.getElementById('topicSelect');
        const counter = document.getElementById('counter');

        // Initialize
        function init() {
            // Flatten all cards
            for (let topic in geographyData) {
                geographyData[topic].forEach(card => {
                    allCards.push({...card, topic: topic});
                });
            }

            // Populate topics
            for (let topic in geographyData) {
                let option = document.createElement('option');
                option.value = topic;
                option.textContent = topic;
                topicSelect.appendChild(option);
            }

            currentCards = [...allCards];
            shuffle(currentCards);
            showCard();
        }

        function showCard() {
            if (currentCards.length === 0) {
                question.textContent = "No cards available";
                answer.textContent = "";
                tagsDiv.innerHTML = "";
                counter.textContent = "0 / 0";
                return;
            }

            const currentCard = currentCards[currentIndex];
            question.textContent = currentCard.question;
            answer.textContent = currentCard.answer;
            
            tagsDiv.innerHTML = '';
            currentCard.tags.forEach(tag => {
                let tagSpan = document.createElement('span');
                tagSpan.className = 'tag';
                tagSpan.textContent = tag;
                tagsDiv.appendChild(tagSpan);
            });

            counter.textContent = `${currentIndex + 1} / ${currentCards.length}`;
            card.classList.remove('flipped');
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Event Listeners
        card.addEventListener('click', () => {
            card.classList.toggle('flipped');
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % currentCards.length;
            showCard();
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + currentCards.length) % currentCards.length;
            showCard();
        });

        topicSelect.addEventListener('change', (e) => {
            if (e.target.value === 'all') {
                currentCards = [...allCards];
            } else {
                currentCards = allCards.filter(card => card.topic === e.target.value);
            }
            shuffle(currentCards);
            currentIndex = 0;
            showCard();
        });

        // Start
        init();
    </script>
</body>
</html>
