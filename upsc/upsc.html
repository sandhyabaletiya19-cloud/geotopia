<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPSC Geography - Visual Learning System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="upsc-styles.css">
</head>
<body>
    <!-- Loader -->
    <div class="loader" id="loader">
        <div class="loader-content">
            <div class="loader-icon">🌍</div>
            <div class="loader-spinner"></div>
            <p>Loading Geography...</p>
        </div>
    </div>

    <!-- Animated Background -->
    <div class="animated-bg">
        <div class="floating-element" style="--delay: 0s; --x: 10%; --y: 20%;">🌍</div>
        <div class="floating-element" style="--delay: 2s; --x: 80%; --y: 10%;">🏔️</div>
        <div class="floating-element" style="--delay: 4s; --x: 20%; --y: 70%;">🌊</div>
        <div class="floating-element" style="--delay: 6s; --x: 70%; --y: 80%;">🌿</div>
        <div class="floating-element" style="--delay: 8s; --x: 50%; --y: 40%;">☁️</div>
        <div class="floating-element" style="--delay: 3s; --x: 90%; --y: 50%;">🌋</div>
    </div>

    <!-- Header -->
    <header class="main-header">
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-globe-asia"></i>
                <div class="logo-text">
                    <h1>UPSC Geography</h1>
                    <span>Visual Learning System</span>
                </div>
            </div>
            <nav class="main-nav">
                <button class="nav-btn active" data-filter="all">
                    <i class="fas fa-th-large"></i> All Topics
                </button>
                <button class="nav-btn" data-filter="physical">
                    <i class="fas fa-mountain"></i> Physical
                </button>
                <button class="nav-btn" data-filter="india">
                    <i class="fas fa-flag"></i> India
                </button>
                <button class="nav-btn" data-filter="human">
                    <i class="fas fa-users"></i> Human
                </button>
            </nav>
            <div class="header-actions">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search topics...">
                </div>
                <div class="progress-indicator">
                    <div class="progress-ring">
                        <svg viewBox="0 0 36 36">
                            <path class="progress-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                            <path class="progress-fill" id="progressFill" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        </svg>
                        <span id="progressText">0%</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Category Tabs -->
    <section class="category-section">
        <div class="category-tabs" id="categoryTabs">
            <!-- Inserted by JS -->
        </div>
    </section>

    <!-- Stats Bar -->
    <section class="stats-bar">
        <div class="stat-item">
            <i class="fas fa-book-open"></i>
            <div class="stat-info">
                <span class="stat-value" id="totalTopics">0</span>
                <span class="stat-label">Total Topics</span>
            </div>
        </div>
        <div class="stat-item">
            <i class="fas fa-check-circle"></i>
            <div class="stat-info">
                <span class="stat-value" id="completedTopics">0</span>
                <span class="stat-label">Completed</span>
            </div>
        </div>
        <div class="stat-item">
            <i class="fas fa-star"></i>
            <div class="stat-info">
                <span class="stat-value" id="bookmarkedTopics">0</span>
                <span class="stat-label">Bookmarked</span>
            </div>
        </div>
        <div class="stat-item">
            <i class="fas fa-fire"></i>
            <div class="stat-info">
                <span class="stat-value" id="streakDays">0</span>
                <span class="stat-label">Day Streak</span>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main-content">
        <div class="topics-grid" id="topicsGrid">
            <!-- Topic cards inserted by JS -->
        </div>
    </main>

    <!-- Topic Detail Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-container" id="modalContainer">
            <button class="modal-close" id="modalClose">
                <i class="fas fa-times"></i>
            </button>
            
            <!-- Modal Header -->
            <div class="modal-header" id="modalHeader">
                <div class="modal-icon" id="modalIcon">🌍</div>
                <div class="modal-title-section">
                    <h2 id="modalTitle">Topic Title</h2>
                    <div class="modal-meta">
                        <span class="meta-tag" id="modalCategory">Category</span>
                        <span class="meta-tag" id="modalDifficulty">Difficulty</span>
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="action-btn bookmark-btn" id="bookmarkBtn">
                        <i class="far fa-bookmark"></i>
                    </button>
                    <button class="action-btn complete-btn" id="completeBtn">
                        <i class="far fa-check-circle"></i>
                    </button>
                </div>
            </div>

            <!-- Modal Navigation -->
            <div class="modal-nav">
                <button class="modal-nav-btn active" data-section="mindmap">
                    <i class="fas fa-project-diagram"></i> Mind Map
                </button>
                <button class="modal-nav-btn" data-section="memory">
                    <i class="fas fa-brain"></i> Memory Hooks
                </button>
                <button class="modal-nav-btn" data-section="concepts">
                    <i class="fas fa-cubes"></i> Concepts
                </button>
                <button class="modal-nav-btn" data-section="facts">
                    <i class="fas fa-bolt"></i> Quick Facts
                </button>
                <button class="modal-nav-btn" data-section="traps">
                    <i class="fas fa-exclamation-triangle"></i> UPSC Traps
                </button>
                <button class="modal-nav-btn" data-section="revision">
                    <i class="fas fa-compress-arrows-alt"></i> Revision
                </button>
            </div>

            <!-- Modal Content -->
            <div class="modal-content" id="modalContent">
                <!-- Content sections inserted by JS -->
            </div>

            <!-- Modal Footer -->
            <div class="modal-footer">
                <button class="footer-btn prev-btn" id="prevTopic">
                    <i class="fas fa-chevron-left"></i> Previous
                </button>
                <button class="footer-btn next-btn" id="nextTopic">
                    Next <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
<script src="data-base.js"></script>
<script src="data-geomorphology.js"></script>
<script src="upsc-app.js"></script>
</body>
</html>
