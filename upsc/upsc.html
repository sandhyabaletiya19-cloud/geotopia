<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPSC Geography - Visual Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="upsc-styles.css">
</head>
<body>
    <!-- Loading Screen -->
    <div class="loader" id="loader">
        <div class="loader-content">
            <div class="loader-icon">🌍</div>
            <div class="loader-spinner"></div>
            <p>Loading Geography Universe...</p>
        </div>
    </div>

    <!-- Hero Section -->
    <section class="hero-section">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">
                <i class="fas fa-globe-asia"></i>
                UPSC Geography
            </h1>
            <p class="hero-subtitle">Master Geography Through Visual Mind Maps & Memory Hooks</p>
            <div class="hero-stats">
                <div class="stat-item">
                    <div class="stat-number" id="totalTopics">150+</div>
                    <div class="stat-label">Topics Covered</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalMnemonics">200+</div>
                    <div class="stat-label">Memory Tricks</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalDiagrams">300+</div>
                    <div class="stat-label">Visual Diagrams</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="completionRate">0%</div>
                    <div class="stat-label">Your Progress</div>
                </div>
            </div>
            <div class="hero-actions">
                <a href="upsc-profile.html" class="btn btn-primary">
                    <i class="fas fa-user-chart"></i>
                    View Progress Dashboard
                </a>
                <button class="btn btn-secondary" id="randomTopicBtn">
                    <i class="fas fa-random"></i>
                    Random Topic Challenge
                </button>
            </div>
        </div>
        <div class="scroll-indicator">
            <i class="fas fa-chevron-down"></i>
        </div>
    </section>

    <!-- Search & Filter Bar -->
    <section class="search-section">
        <div class="container">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search any geography topic... (e.g., monsoon, volcanoes, rivers)">
                <button class="clear-btn" id="clearSearch">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">
                    <i class="fas fa-globe"></i> All Topics
                </button>
                <button class="filter-tab" data-filter="physical">
                    <i class="fas fa-mountain"></i> Physical Geography
                </button>
                <button class="filter-tab" data-filter="india">
                    <i class="fas fa-flag-india"></i> Geography of India
                </button>
                <button class="filter-tab" data-filter="economic">
                    <i class="fas fa-chart-line"></i> Economic Geography
                </button>
                <button class="filter-tab" data-filter="environment">
                    <i class="fas fa-leaf"></i> Environment & Models
                </button>
            </div>
        </div>
    </section>

    <!-- Main Content: Category Cards -->
    <section class="categories-section">
        <div class="container">
            <div id="categoriesContainer">
                <!-- Categories will be inserted by JS -->
            </div>
        </div>
    </section>

    <!-- Topic Modal (Detailed View) -->
    <div class="topic-modal" id="topicModal">
        <button class="close-modal" id="closeModal">
            <i class="fas fa-times"></i>
        </button>
        <div class="modal-content" id="modalContent">
            <!-- Content inserted by JS -->
        </div>
    </div>

    <!-- Scripts -->
    <script src="upsc-data.js"></script>
    <script src="geography-data.js"></script>
    <script src="upsc-app.js"></script>
    <script src="upsc-app.js"></script>
</body>
</html>
