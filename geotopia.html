<!DOCTYPE html>
<html>
<head>
    <title>DharaVerse - Proof of Concept</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 8px;
            max-width: 300px;
        }
        #timeline {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 8px;
            color: white;
        }
        #timeSlider {
            width: 100%;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>🌍 DharaVerse</h2>
        <p id="eraName">Hadean Eon</p>
        <p id="yearDisplay">4.5 Billion Years Ago</p>
        <p id="description">Earth is forming from cosmic dust...</p>
    </div>

    <div id="timeline">
        <input type="range" id="timeSlider" min="-4500000000" max="2024" value="-4500000000">
        <div style="display: flex; justify-content: space-between; font-size: 12px;">
            <span>4.5 Ga</span>
            <span>3 Ga</span>
            <span>1 Ga</span>
            <span>500 Ma</span>
            <span>Today</span>
        </div>
        <button id="playBtn" style="margin-top: 10px; padding: 10px 20px;">▶ Play</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Earth sphere
        const geometry = new THREE.SphereGeometry(5, 64, 64);
        
        // Texture loader
        const textureLoader = new THREE.TextureLoader();
        
        // Current year
        let currentYear = -4500000000;
        let isPlaying = false;
        
        // Different Earth textures for different eras
        const earthTextures = {
            hadean: createHadeanTexture(),
            modern: 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/earth_atmos_2048.jpg'
        };

        // Start with Hadean Earth
        const material = new THREE.MeshPhongMaterial({
            map: earthTextures.hadean
        });
        
        const earth = new THREE.Mesh(geometry, material);
        scene.add(earth);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);
        
        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);

        camera.position.z = 15;

        // Create glowing Hadean texture
        function createHadeanTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Lava-like gradient
            const gradient = ctx.createLinearGradient(0, 0, 1024, 512);
            gradient.addColorStop(0, '#ff4500');
            gradient.addColorStop(0.5, '#ff6347');
            gradient.addColorStop(1, '#8b0000');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 1024, 512);
            
            // Add some "lava cracks"
            for(let i = 0; i < 100; i++) {
                ctx.strokeStyle = `rgba(255, 255, 0, ${Math.random()})`;
                ctx.lineWidth = Math.random() * 3;
                ctx.beginPath();
                ctx.moveTo(Math.random() * 1024, Math.random() * 512);
                ctx.lineTo(Math.random() * 1024, Math.random() * 512);
                ctx.stroke();
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        // Historical data
        const eras = [
            {
                start: -4500000000,
                end: -4000000000,
                name: "Hadean Eon",
                desc: "Earth is a molten ball of lava. Frequent asteroid impacts. No solid crust yet.",
                color: "#ff4500"
            },
            {
                start: -4000000000,
                end: -2500000000,
                name: "Archean Eon",
                desc: "Earth's crust solidifies. First oceans form. Life begins in deep ocean vents.",
                color: "#4169e1"
            },
            {
                start: -2500000000,
                end: -541000000,
                name: "Proterozoic Eon",
                desc: "Oxygen builds up in atmosphere. First multicellular life appears.",
                color: "#90ee90"
            },
            {
                start: -541000000,
                end: -252000000,
                name: "Paleozoic Era",
                desc: "Life explodes in diversity. Fish, plants, insects, reptiles evolve. Pangaea forms.",
                color: "#daa520"
            },
            {
                start: -252000000,
                end: -66000000,
                name: "Mesozoic Era - Age of Dinosaurs",
                desc: "Dinosaurs dominate. Pangaea breaks apart. First mammals and birds appear.",
                color: "#9acd32"
            },
            {
                start: -66000000,
                end: -10000,
                name: "Cenozoic Era",
                desc: "Mammals rise. Ice ages come and go. Human ancestors evolve.",
                color: "#87ceeb"
            },
            {
                start: -10000,
                end: 2024,
                name: "Human Civilization",
                desc: "Agriculture invented. Empires rise and fall. Modern world emerges.",
                color: "#ffd700"
            }
        ];

        function getCurrentEra(year) {
            return eras.find(era => year >= era.start && year < era.end) || eras[eras.length - 1];
        }

        function formatYear(year) {
            if(year < -1000000000) return `${Math.abs(year / 1000000000).toFixed(1)} Billion Years Ago`;
            if(year < -1000000) return `${Math.abs(year / 1000000).toFixed(0)} Million Years Ago`;
            if(year < 0) return `${Math.abs(year).toLocaleString()} BCE`;
            return `${year} CE`;
        }

        function updateEarth(year) {
            currentYear = year;
            const era = getCurrentEra(year);
            
            // Update UI
            document.getElementById('eraName').textContent = era.name;
            document.getElementById('yearDisplay').textContent = formatYear(year);
            document.getElementById('description').textContent = era.desc;
            
            // Change Earth appearance based on era
            if(year < -4000000000) {
                // Hadean - molten
                earth.material.map = earthTextures.hadean;
                earth.material.emissive = new THREE.Color(0xff4500);
                earth.material.emissiveIntensity = 0.3;
            } else if(year < -2500000000) {
                // Archean - cooling, first oceans
                earth.material.emissive = new THREE.Color(0x000000);
                earth.material.emissiveIntensity = 0;
            } else {
                // Modern Earth texture for recent times
                if(earth.material.map !== earthTextures.modern) {
                    textureLoader.load(earthTextures.modern, (texture) => {
                        earth.material.map = texture;
                        earth.material.needsUpdate = true;
                    });
                }
            }
            
            earth.material.needsUpdate = true;
        }

        // Timeline controls
        const slider = document.getElementById('timeSlider');
        const playBtn = document.getElementById('playBtn');

        slider.addEventListener('input', (e) => {
            updateEarth(parseInt(e.target.value));
        });

        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            playBtn.textContent = isPlaying ? '⏸ Pause' : '▶ Play';
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Rotate Earth
            earth.rotation.y += 0.001;
            
            // Auto-advance time if playing
            if(isPlaying) {
                let speed = 1000000; // 1 million years per frame
                if(currentYear > -10000) speed = 10; // Slow down for human history
                
                currentYear += speed;
                if(currentYear > 2024) currentYear = -4500000000; // Loop
                
                slider.value = currentYear;
                updateEarth(currentYear);
            }
            
            renderer.render(scene, camera);
        }

        // Mouse controls
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        renderer.domElement.addEventListener('mousedown', () => isDragging = true);
        renderer.domElement.addEventListener('mouseup', () => isDragging = false);
        
        renderer.domElement.addEventListener('mousemove', (e) => {
            if(isDragging) {
                const deltaX = e.offsetX - previousMousePosition.x;
                const deltaY = e.offsetY - previousMousePosition.y;
                
                earth.rotation.y += deltaX * 0.01;
                earth.rotation.x += deltaY * 0.01;
            }
            
            previousMousePosition = { x: e.offsetX, y: e.offsetY };
        });

        // Zoom with mouse wheel
        renderer.domElement.addEventListener('wheel', (e) => {
            e.preventDefault();
            camera.position.z += e.deltaY * 0.01;
            camera.position.z = Math.max(8, Math.min(30, camera.position.z));
        });

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize
        updateEarth(currentYear);
        animate();
    </script>
</body>
</html>
