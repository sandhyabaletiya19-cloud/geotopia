<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islands Explorer - Discover Paradise</title>
    <link rel="stylesheet" href="islands-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Animated Background Elements -->
    <div class="background-animations">
        <div class="ocean-waves">
            <div class="wave wave-1"></div>
            <div class="wave wave-2"></div>
            <div class="wave wave-3"></div>
        </div>
        <div class="floating-clouds">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>
        </div>
        <div class="palm-trees">
            <div class="palm palm-left">
                <div class="palm-trunk"></div>
                <div class="palm-leaves">
                    <div class="leaf leaf-1"></div>
                    <div class="leaf leaf-2"></div>
                    <div class="leaf leaf-3"></div>
                    <div class="leaf leaf-4"></div>
                    <div class="leaf leaf-5"></div>
                </div>
            </div>
            <div class="palm palm-right">
                <div class="palm-trunk"></div>
                <div class="palm-leaves">
                    <div class="leaf leaf-1"></div>
                    <div class="leaf leaf-2"></div>
                    <div class="leaf leaf-3"></div>
                    <div class="leaf leaf-4"></div>
                    <div class="leaf leaf-5"></div>
                </div>
            </div>
        </div>
        <div class="sand-particles">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
        </div>
    </div>

    <!-- Main Container -->
    <div class="app-container">
        <!-- Header -->
        <header class="main-header">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo-icon">
                        <i class="fas fa-umbrella-beach"></i>
                    </div>
                    <h1 class="logo-text">
                        <span class="logo-main">Islands</span>
                        <span class="logo-sub">Explorer</span>
                    </h1>
                </div>
                <div class="stats-section">
                    <div class="stat-item">
                        <i class="fas fa-island-tropical"></i>
                        <div class="stat-content">
                            <span class="stat-number" id="total-islands">100</span>
                            <span class="stat-label">Islands</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-globe-americas"></i>
                        <div class="stat-content">
                            <span class="stat-number" id="total-countries">45</span>
                            <span class="stat-label">Countries</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-water"></i>
                        <div class="stat-content">
                            <span class="stat-number" id="total-oceans">5</span>
                            <span class="stat-label">Oceans</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Search and Filters -->
        <section class="search-filter-section">
            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="search-input" placeholder="Search islands, countries, or attractions..." autocomplete="off">
                    <button class="search-clear" id="search-clear">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>

            <div class="filters-container">
                <div class="filter-group type-filters">
                    <button class="filter-btn active" data-filter="all">
                        <i class="fas fa-globe"></i>
                        <span>All</span>
                    </button>
                    <button class="filter-btn" data-filter="tropical">
                        <i class="fas fa-sun"></i>
                        <span>Tropical</span>
                    </button>
                    <button class="filter-btn" data-filter="volcanic">
                        <i class="fas fa-mountain"></i>
                        <span>Volcanic</span>
                    </button>
                    <button class="filter-btn" data-filter="continental">
                        <i class="fas fa-map"></i>
                        <span>Continental</span>
                    </button>
                    <button class="filter-btn" data-filter="coral">
                        <i class="fas fa-fish"></i>
                        <span>Coral</span>
                    </button>
                </div>

                <div class="filter-group dropdown-filters">
                    <div class="dropdown-container">
                        <label for="ocean-filter">
                            <i class="fas fa-water"></i>
                            Ocean
                        </label>
                        <select id="ocean-filter" class="filter-dropdown">
                            <option value="all">All Oceans</option>
                            <option value="Pacific Ocean">Pacific Ocean</option>
                            <option value="Atlantic Ocean">Atlantic Ocean</option>
                            <option value="Indian Ocean">Indian Ocean</option>
                            <option value="Arctic Ocean">Arctic Ocean</option>
                            <option value="Southern Ocean">Southern Ocean</option>
                            <option value="Mediterranean Sea">Mediterranean Sea</option>
                            <option value="Caribbean Sea">Caribbean Sea</option>
                        </select>
                    </div>

                    <div class="dropdown-container">
                        <label for="region-filter">
                            <i class="fas fa-compass"></i>
                            Region
                        </label>
                        <select id="region-filter" class="filter-dropdown">
                            <option value="all">All Regions</option>
                            <option value="Asia">Asia</option>
                            <option value="Europe">Europe</option>
                            <option value="Africa">Africa</option>
                            <option value="North America">North America</option>
                            <option value="South America">South America</option>
                            <option value="Oceania">Oceania</option>
                            <option value="Antarctica">Antarctica</option>
                        </select>
                    </div>

                    <div class="dropdown-container">
                        <label for="sort-filter">
                            <i class="fas fa-sort"></i>
                            Sort By
                        </label>
                        <select id="sort-filter" class="filter-dropdown">
                            <option value="name-asc">Name (A-Z)</option>
                            <option value="name-desc">Name (Z-A)</option>
                            <option value="area-desc">Area (Largest)</option>
                            <option value="area-asc">Area (Smallest)</option>
                            <option value="population-desc">Population (Highest)</option>
                            <option value="population-asc">Population (Lowest)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="active-filters" id="active-filters">
                <!-- Active filter tags will be inserted here -->
            </div>

            <div class="results-info">
                <span id="results-count">Showing 100 islands</span>
            </div>
        </section>

        <!-- Islands Grid -->
        <main class="islands-grid-container">
            <div class="islands-grid" id="islands-grid">
                <!-- Island cards will be dynamically inserted here -->
            </div>

            <!-- Loading Spinner -->
            <div class="loading-spinner" id="loading-spinner">
                <div class="spinner">
                    <div class="spinner-ring"></div>
                    <i class="fas fa-umbrella-beach spinner-icon"></i>
                </div>
                <p>Discovering islands...</p>
            </div>

            <!-- No Results Message -->
            <div class="no-results" id="no-results" style="display: none;">
                <i class="fas fa-map-marked-alt"></i>
                <h3>No islands found</h3>
                <p>Try adjusting your search or filters</p>
                <button class="reset-filters-btn" id="reset-filters">
                    <i class="fas fa-redo"></i>
                    Reset Filters
                </button>
            </div>
        </main>

        <!-- Footer -->
        <footer class="main-footer">
            <div class="footer-content">
                <div class="footer-logo">
                    <i class="fas fa-umbrella-beach"></i>
                    <span>Islands Explorer</span>
                </div>
                <p class="footer-text">Explore the world's most beautiful islands</p>
                <div class="footer-links">
                    <a href="#" class="footer-link">
                        <i class="fab fa-github"></i>
                    </a>
                    <a href="#" class="footer-link">
                        <i class="fab fa-twitter"></i>
                    </a>
                    <a href="#" class="footer-link">
                        <i class="fab fa-instagram"></i>
                    </a>
                </div>
                <p class="copyright">&copy; 2024 Islands Explorer. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <!-- Island Card Template -->
    <template id="island-card-template">
        <article class="island-card" data-island-id="">
            <div class="card-image-container">
                <div class="card-image-wrapper">
                    <img src="" alt="" class="card-image" loading="lazy">
                    <div class="card-overlay"></div>
                </div>
                <div class="card-glow"></div>
            </div>
            <div class="card-content">
                <div class="card-header">
                    <h3 class="island-name"></h3>
                    <div class="island-flags"></div>
                </div>
                <div class="card-details">
                    <div class="detail-item area">
                        <i class="fas fa-ruler-combined"></i>
                        <span class="area-value"></span>
                    </div>
                    <div class="detail-item location">
                        <i class="fas fa-map-marker-alt"></i>
                        <span class="location-value"></span>
                    </div>
                </div>
                <div class="card-badge">
                    <span class="type-badge"></span>
                </div>
            </div>
            <div class="card-hover-info">
                <p class="hover-climate"></p>
                <p class="hover-attractions"></p>
                <span class="explore-text">Click to Explore <i class="fas fa-arrow-right"></i></span>
            </div>
        </article>
    </template>

    <!-- Scripts -->
    <script src="islands-data-1.js"></script>
    <script src="islands-data-2.js"></script>
    <script src="islands-data-3.js"></script>
    <script src="islands-data-4.js"></script>
    <script src="islands-data-5.js"></script>
    <script src="islands-data-6.js"></script>
    <script src="islands-data-7.js"></script>
    <script src="islands-data-8.js"></script>
    <script src="islands-data-9.js"></script>
    <script src="islands-data-10.js"></script>
    <script src="../js/auto-inject.js"></script>
    <script src="../js/premium-wrapper.js"></script>
    <script src="islands-data.js"></script>
    <script src="islands-app.js"></script>
</body>
</html>
