<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical World Maps | GeoTopia Interactive Atlas</title>

    <!-- Leaflet CSS - lightweight mapping library -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        :root {
            --font-display: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
            --font-heading: Georgia, 'Times New Roman', Palatino, serif;
            --font-body: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
            --font-mono: 'Courier New', 'Lucida Console', Courier, monospace;
            --dark-bg: #0a0a12;
            --panel-bg: #0d0f18;
            --sidebar-bg: #0c0e16;
            --border-clr: rgba(255,215,0,0.15);
            --gold: #FFD700;
            --gold-dim: #D4AF37;
            --text-primary: #fff;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.45);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: var(--font-body);
            background: var(--dark-bg);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ====== HEADER ====== */
        .main-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 2000;
            height: 52px;
            padding: 0 1.2rem;
            background: rgba(10,10,18,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-clr);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .back-btn {
            display: flex; align-items: center; gap: 0.4rem;
            padding: 0.35rem 0.8rem;
            background: rgba(255,215,0,0.08);
            border: 1px solid rgba(255,215,0,0.25);
            border-radius: 20px;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .back-btn:hover { background: rgba(255,215,0,0.18); }

        .logo {
            font-family: var(--font-mono);
            font-size: 1.2rem; font-weight: 900;
            color: var(--gold);
            letter-spacing: 0.15em;
        }

        .page-title {
            font-family: var(--font-display);
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .header-btns { display: flex; gap: 0.5rem; }

        .hdr-btn {
            padding: 0.35rem 0.75rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: flex; align-items: center; gap: 0.3rem;
        }
        .hdr-btn:hover { background: rgba(255,215,0,0.12); color: var(--gold); border-color: rgba(255,215,0,0.3); }

        /* ====== LAYOUT ====== */
        .app-wrap {
            display: flex;
            height: calc(100vh - 52px);
            margin-top: 52px;
        }

        /* ====== SIDEBAR ====== */
        .sidebar {
            width: 310px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-clr);
            display: flex; flex-direction: column;
            overflow: hidden;
            transition: width 0.3s, transform 0.3s;
            flex-shrink: 0;
            z-index: 1500;
        }

        .sidebar.collapsed { width: 0; padding: 0; border: none; overflow: hidden; }

        .sidebar-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.7rem 1rem;
            background: rgba(255,215,0,0.04);
            border-bottom: 1px solid var(--border-clr);
            cursor: pointer;
            flex-shrink: 0;
        }

        .sidebar-head h3 {
            font-family: var(--font-display);
            font-size: 0.95rem; color: var(--gold);
        }

        .sidebar-head .toggle-icon {
            color: var(--gold); font-size: 1.1rem;
            transition: transform 0.3s;
        }

        .sidebar-body {
            flex: 1; overflow-y: auto; padding: 0;
        }

        .sidebar-body::-webkit-scrollbar { width: 5px; }
        .sidebar-body::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.2); border-radius: 3px; }

        /* Era Groups */
        .era-grp { border-bottom: 1px solid var(--border-clr); }

        .era-grp-hdr {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.65rem 1rem;
            cursor: pointer; transition: background 0.2s; user-select: none;
        }
        .era-grp-hdr:hover { background: rgba(255,215,0,0.06); }

        .era-grp-left { display: flex; align-items: center; gap: 0.6rem; }
        .era-grp-icon { font-size: 1.1rem; width: 26px; text-align: center; }
        .era-grp-name { font-family: var(--font-display); font-size: 0.88rem; color: var(--text-primary); }
        .era-grp-arrow { color: var(--text-muted); font-size: 0.85rem; transition: transform 0.3s; display: inline-block; }
        .era-grp.open .era-grp-arrow { transform: rotate(90deg); }

        .era-items { display: none; background: rgba(0,0,0,0.2); }
        .era-grp.open .era-items { display: block; }

        .era-item {
            display: flex; align-items: center; gap: 0.6rem;
            padding: 0.5rem 1rem 0.5rem 2.6rem;
            cursor: pointer; transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        .era-item:hover { background: rgba(255,215,0,0.06); }
        .era-item.active { background: rgba(255,215,0,0.1); border-left-color: var(--gold); }

        .era-yr {
            font-family: var(--font-mono); font-size: 0.72rem;
            color: var(--gold); min-width: 62px; letter-spacing: 0.08em;
        }
        .era-lbl { font-size: 0.82rem; color: var(--text-secondary); }
        .era-item.active .era-lbl { color: var(--text-primary); font-weight: 600; }

        /* ====== MAP AREA ====== */
        .map-area {
            flex: 1; position: relative; overflow: hidden;
        }

        #map {
            width: 100%; height: 100%;
            background: #0d1a2a;
            z-index: 1;
        }

        /* Make Leaflet tiles darker */
        .leaflet-tile-pane { filter: brightness(0.6) saturate(0.3) contrast(1.2); }
        .leaflet-tile-pane img { filter: hue-rotate(180deg) invert(1) brightness(0.7) saturate(0.4) contrast(1.1); }

        /* Leaflet Controls Restyle */
        .leaflet-control-zoom a {
            background: rgba(12,14,22,0.92) !important;
            color: var(--gold) !important;
            border-color: var(--border-clr) !important;
        }
        .leaflet-control-zoom a:hover {
            background: rgba(255,215,0,0.15) !important;
        }
        .leaflet-control-attribution {
            background: rgba(10,10,18,0.8) !important;
            color: var(--text-muted) !important;
            font-size: 0.65rem !important;
        }
        .leaflet-control-attribution a { color: var(--gold) !important; }

        /* Leaflet Popup Restyle */
        .leaflet-popup-content-wrapper {
            background: rgba(12,14,22,0.95) !important;
            color: var(--text-primary) !important;
            border: 1px solid var(--gold) !important;
            border-radius: 10px !important;
            box-shadow: 0 5px 30px rgba(0,0,0,0.6) !important;
        }
        .leaflet-popup-tip { background: rgba(12,14,22,0.95) !important; }
        .leaflet-popup-close-button { color: var(--gold) !important; }

        .popup-title {
            font-family: var(--font-display);
            font-size: 1rem;
            color: var(--gold);
            margin-bottom: 0.4rem;
            letter-spacing: 0.04em;
        }
        .popup-period {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }
        .popup-desc {
            font-size: 0.88rem;
            line-height: 1.6;
            color: var(--text-secondary);
        }
        .popup-facts { margin-top: 0.5rem; }
        .popup-facts li {
            font-size: 0.82rem;
            color: var(--text-secondary);
            padding: 0.2rem 0;
            list-style: none;
            padding-left: 1rem;
            position: relative;
        }
        .popup-facts li::before {
            content: '◆'; position: absolute; left: 0;
            color: var(--gold); font-size: 0.5rem; top: 0.35rem;
        }

        /* ====== TIMELINE BAR ====== */
        .timeline-bar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 100px;
            background: linear-gradient(180deg, transparent 0%, rgba(10,10,18,0.96) 35%);
            z-index: 1500;
            padding: 0.3rem 1.5rem 0.7rem;
            display: flex; flex-direction: column;
        }

        .tl-controls {
            display: flex; align-items: center; gap: 0.8rem;
            margin-bottom: 0.3rem;
        }

        .play-btn {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: var(--gold);
            border: none;
            color: var(--dark-bg);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
            font-weight: bold;
        }
        .play-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(255,215,0,0.4); }
        .play-btn.playing { background: #e74c3c; color: white; }

        .speed-wrap { display: flex; gap: 0.3rem; }

        .spd-btn {
            padding: 0.2rem 0.45rem;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.13);
            border-radius: 5px;
            color: var(--text-muted);
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-mono);
        }
        .spd-btn:hover, .spd-btn.active {
            background: rgba(255,215,0,0.15);
            color: var(--gold);
            border-color: rgba(255,215,0,0.3);
        }

        .yr-display {
            font-family: var(--font-mono);
            font-size: 1.8rem;
            color: var(--gold);
            min-width: 130px;
            text-align: center;
            text-shadow: 0 0 15px rgba(255,215,0,0.3);
            letter-spacing: 0.1em;
        }

        .era-display {
            font-family: var(--font-display);
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-left: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 350px;
        }

        .tl-slider-wrap { position: relative; width: 100%; height: 35px; }

        .tl-slider {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            outline: none; cursor: pointer;
            z-index: 2; position: relative;
        }

        .tl-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 22px; height: 22px;
            background: var(--gold);
            border-radius: 50%; cursor: grab;
            box-shadow: 0 0 12px rgba(255,215,0,0.5);
        }
        .tl-slider::-moz-range-thumb {
            width: 22px; height: 22px;
            background: var(--gold);
            border-radius: 50%; cursor: grab; border: none;
        }

        .tl-markers {
            position: absolute; top: 12px;
            left: 0; right: 0;
            display: flex; justify-content: space-between;
            pointer-events: none;
            padding: 0 10px;
        }

        .tl-mark {
            font-family: var(--font-mono);
            font-size: 0.58rem;
            color: var(--text-muted);
            position: relative;
            letter-spacing: 0.05em;
        }
        .tl-mark::before {
            content: '';
            position: absolute; top: -10px;
            left: 50%; transform: translateX(-50%);
            width: 1px; height: 6px;
            background: rgba(255,255,255,0.2);
        }

        /* ====== INFO PANEL ====== */
        .info-panel {
            position: absolute;
            top: 10px; right: 10px;
            width: 350px;
            max-height: calc(100% - 120px);
            background: rgba(12,14,22,0.94);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-clr);
            border-radius: 14px;
            z-index: 1600;
            overflow: hidden;
            display: flex; flex-direction: column;
            transition: transform 0.4s, opacity 0.3s;
        }
        .info-panel.hidden { transform: translateX(370px); opacity: 0; pointer-events: none; }

        .ip-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.9rem 1.1rem;
            border-bottom: 1px solid var(--border-clr);
            background: rgba(255,215,0,0.03);
        }
        .ip-title {
            font-family: var(--font-display);
            font-size: 1.05rem; color: var(--gold);
            letter-spacing: 0.04em;
        }
        .ip-close {
            width: 26px; height: 26px; border-radius: 50%;
            background: rgba(255,255,255,0.07);
            border: none; color: var(--text-muted);
            cursor: pointer; font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .ip-close:hover { background: rgba(255,0,0,0.2); color: #e74c3c; }

        .ip-body {
            padding: 1.1rem; overflow-y: auto; flex: 1;
        }
        .ip-body::-webkit-scrollbar { width: 5px; }
        .ip-body::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.2); border-radius: 3px; }

        .ip-badge {
            display: inline-block;
            padding: 0.2rem 0.65rem;
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.25);
            border-radius: 14px;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--gold);
            margin-bottom: 0.9rem;
            letter-spacing: 0.08em;
        }

        .ip-desc {
            font-size: 0.93rem; line-height: 1.7;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .ip-section-title {
            font-family: var(--font-display);
            font-size: 0.92rem; color: var(--gold);
            margin-bottom: 0.5rem; padding-bottom: 0.3rem;
            border-bottom: 1px solid rgba(255,215,0,0.12);
            letter-spacing: 0.04em;
        }

        .ip-list { list-style: none; margin-bottom: 1rem; }
        .ip-list li {
            padding: 0.3rem 0 0.3rem 1.1rem;
            position: relative;
            font-size: 0.85rem;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .ip-list li:last-child { border-bottom: none; }
        .ip-list li::before {
            content: '◆'; position: absolute; left: 0;
            color: var(--gold); font-size: 0.45rem; top: 0.5rem;
        }

        .legend-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0; }
        .legend-swatch {
            width: 20px; height: 12px; border-radius: 3px;
            border: 1px solid rgba(255,255,255,0.15); flex-shrink: 0;
        }
        .legend-text { font-size: 0.83rem; color: var(--text-secondary); }

        /* ====== MOBILE BUTTON ====== */
        .mobile-toggle {
            display: none;
            position: absolute;
            top: 10px; left: 10px;
            z-index: 1600;
            width: 40px; height: 40px;
            border-radius: 10px;
            background: rgba(12,14,22,0.92);
            border: 1px solid var(--border-clr);
            color: var(--gold);
            font-size: 1.3rem;
            cursor: pointer;
            align-items: center; justify-content: center;
        }

        /* ====== LOADING ====== */
        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--dark-bg);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity 0.6s;
        }
        .loading.done { opacity: 0; pointer-events: none; }
        .loading-icon { font-size: 4rem; animation: spin 2s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { from { transform: rotateY(0); } to { transform: rotateY(360deg); } }
        .loading-text { font-family: var(--font-mono); font-size: 1rem; color: var(--gold); letter-spacing: 0.15em; }
        .loading-bar { width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 1rem; overflow: hidden; }
        .loading-fill { height: 100%; background: var(--gold); width: 0; animation: fill 2s ease forwards; }
        @keyframes fill { to { width: 100%; } }

        /* ====== RESPONSIVE ====== */
        @media (max-width: 900px) {
            .sidebar { width: 260px; }
            .info-panel { width: 300px; }
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 0; top: 0; bottom: 0;
                width: 280px;
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            .sidebar.mob-open { transform: translateX(0); }
            .sidebar.collapsed { transform: translateX(-100%); }
            .mobile-toggle { display: flex !important; }
            .info-panel { top: auto; bottom: 105px; right: 5px; left: 5px; width: auto; max-height: 40vh; }
            .era-display { display: none; }
            .hdr-btn span { display: none; }
            .page-title { display: none; }
        }
    </style>
</head>
<body>

<!-- Loading -->
<div class="loading" id="loader">
    <div class="loading-icon">🌍</div>
    <div class="loading-text">LOADING ATLAS...</div>
    <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<!-- Header -->
<header class="main-header">
    <div class="logo-area">
        <a href="historical-geo.html" class="back-btn">← Back</a>
        <span class="logo">GEOTOPIA</span>
        <span class="page-title">Interactive Historical Atlas</span>
    </div>
    <div class="header-btns">
        <button class="hdr-btn" id="toggleInfo">ⓘ <span>Info</span></button>
        <button class="hdr-btn" id="resetView">⤢ <span>Reset</span></button>
        <a href="border-evolution.html" class="hdr-btn">🗺 <span>Borders</span></a>
    </div>
</header>

<!-- App -->
<div class="app-wrap">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-head" id="sidebarToggle">
            <h3>📜 Time Periods</h3>
            <span class="toggle-icon">‹</span>
        </div>
        <div class="sidebar-body" id="sidebarBody">
            <!-- Filled by JS -->
        </div>
    </aside>

    <!-- Map -->
    <div class="map-area">
        <button class="mobile-toggle" id="mobToggle">☰</button>
        <div id="map"></div>

        <!-- Info Panel -->
        <div class="info-panel" id="infoPanel">
            <div class="ip-header">
                <span class="ip-title" id="ipTitle">Dawn of Civilization</span>
                <button class="ip-close" id="ipClose">✕</button>
            </div>
            <div class="ip-body" id="ipBody"></div>
        </div>

        <!-- Timeline -->
        <div class="timeline-bar">
            <div class="tl-controls">
                <button class="play-btn" id="playBtn">▶</button>
                <div class="speed-wrap">
                    <button class="spd-btn" data-speed="0.5">0.5×</button>
                    <button class="spd-btn active" data-speed="1">1×</button>
                    <button class="spd-btn" data-speed="2">2×</button>
                    <button class="spd-btn" data-speed="5">5×</button>
                </div>
                <span class="yr-display" id="yrDisp">5000 BCE</span>
                <span class="era-display" id="eraDisp">Dawn of Civilization</span>
            </div>
            <div class="tl-slider-wrap">
                <input type="range" class="tl-slider" id="slider" min="-5000" max="2026" value="-5000" step="1"/>
                <div class="tl-markers">
                    <span class="tl-mark">5000 BCE</span>
                    <span class="tl-mark">3000 BCE</span>
                    <span class="tl-mark">1000 BCE</span>
                    <span class="tl-mark">1 CE</span>
                    <span class="tl-mark">500</span>
                    <span class="tl-mark">1000</span>
                    <span class="tl-mark">1500</span>
                    <span class="tl-mark">1800</span>
                    <span class="tl-mark">2026</span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ═══════════════════════════════════════════════════════════════
// GEOTOPIA HISTORICAL ATLAS - Complete Application
// ═══════════════════════════════════════════════════════════════

const Atlas = {

// ───── STATE ─────
currentYear: -5000,
playing: false,
speed: 1,
interval: null,
map: null,
layers: {},

// ═══════════════════════════════════════
// HISTORICAL DATA - ALL CIVILIZATIONS
// ═══════════════════════════════════════
eras: [
    // ─── ANCIENT ───
    { year: -5000, label: 'Dawn of Civilization', group: 'ancient', icon: '🏛️' },
    { year: -3500, label: 'First Cities (Uruk)', group: 'ancient', icon: '🏛️' },
    { year: -3000, label: 'Early Bronze Age', group: 'ancient', icon: '🏛️' },
    { year: -2500, label: 'Pyramid Age', group: 'ancient', icon: '🏛️' },
    { year: -2000, label: 'Middle Bronze Age', group: 'ancient', icon: '🏛️' },
    { year: -1500, label: 'Late Bronze Age', group: 'ancient', icon: '🏛️' },
    { year: -1200, label: 'Bronze Age Collapse', group: 'ancient', icon: '🏛️' },
    { year: -1000, label: 'Iron Age Begins', group: 'ancient', icon: '🏛️' },
    { year: -750, label: 'Assyrian Empire', group: 'ancient', icon: '🏛️' },
    { year: -500, label: 'Classical Antiquity', group: 'ancient', icon: '🏛️' },
    { year: -323, label: "Alexander's Empire", group: 'ancient', icon: '🏛️' },
    { year: -200, label: 'Roman Republic', group: 'ancient', icon: '🏛️' },
    { year: 1,    label: 'Roman Empire Peak', group: 'ancient', icon: '🏛️' },
    { year: 117,  label: "Trajan's Rome", group: 'ancient', icon: '🏛️' },
    // ─── MEDIEVAL ───
    { year: 476,  label: 'Fall of Rome', group: 'medieval', icon: '⚔️' },

// ═══════════════════════════════════════
// INITIALIZATION
// ═══════════════════════════════════════
init() {
    this.createMap();
    this.buildSidebar();
    this.bindEvents();
    this.setYear(-5000);
    setTimeout(() => document.getElementById('loader').classList.add('done'), 2000);
},

createMap() {
    this.map = L.map('map', {
        center: [25, 45],
        zoom: 3,
        minZoom: 2,
        maxZoom: 10,
        zoomControl: false,
        attributionControl: true
    });

    // Dark-themed tile layer
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 19
    }).addTo(this.map);

    // Add zoom control top-left
    L.control.zoom({ position: 'topleft' }).addTo(this.map);

    // Create territory layers
    this.layers.territories = L.layerGroup().addTo(this.map);
    this.layers.cities = L.layerGroup().addTo(this.map);
    this.layers.routes = L.layerGroup().addTo(this.map);

    // Add all territories
    this.territories.forEach(t => {
        const latlngs = t.coords.map(c => [c[0], c[1]]);
        const polygon = L.polygon(latlngs, {
            color: t.color,
            fillColor: t.fillColor,
            fillOpacity: 0.45,
            weight: 2,
            opacity: 0.8
        });

        let popupHtml = `<div class="popup-title">${t.popup.title}</div>`;
        popupHtml += `<div class="popup-period">${t.popup.period}</div>`;
        popupHtml += `<div class="popup-desc">${t.popup.desc}</div>`;
        popupHtml += `<ul class="popup-facts">`;
        t.popup.facts.forEach(f => popupHtml += `<li>${f}</li>`);
        popupHtml += `</ul>`;
        polygon.bindPopup(popupHtml, { maxWidth: 350 });

        polygon._data = { from: t.from, to: t.to, id: t.id };
        polygon._visible = false;
        this.layers.territories.addLayer(polygon);
    });

    // Add cities
    this.cities.forEach(c => {
        const marker = L.circleMarker([c.lat, c.lng], {
            radius: 4,
            color: '#FFD700',
            fillColor: '#FFD700',
            fillOpacity: 0.9,
            weight: 1
        });
        marker.bindPopup(`<div class="popup-title">${c.name}</div><div class="popup-desc">${c.desc}</div>`);
        marker._data = { from: c.from, to: c.to };
        marker._visible = false;
        this.layers.cities.addLayer(marker);
    });

    // Add trade routes
    this.tradeRoutes.forEach(r => {
        const latlngs = r.coords.map(c => [c[0], c[1]]);
        const polyline = L.polyline(latlngs, {
            color: r.color,
            weight: r.weight,
            opacity: 0.7,
            dashArray: r.dashArray
        });
        polyline.bindPopup(`<div class="popup-title">${r.name}</div><div class="popup-desc">${r.popup}</div>`);
        polyline._data = { from: r.from, to: r.to };
        polyline._visible = false;
        this.layers.routes.addLayer(polyline);
    });
},

buildSidebar() {
    const body = document.getElementById('sidebarBody');
    let html = '';
    const groupOrder = ['ancient','medieval','early-modern','19th','wars','cold-war','modern'];

    groupOrder.forEach(gId => {
        const g = this.groups[gId];
        const items = this.eras.filter(e => e.group === gId);
        const isFirst = gId === 'ancient';
        html += `<div class="era-grp ${isFirst ? 'open' : ''}" data-group="${gId}">`;
        html += `<div class="era-grp-hdr"><div class="era-grp-left"><span class="era-grp-icon">${g.icon}</span><span class="era-grp-name">${g.name}</span></div><span class="era-grp-arrow">›</span></div>`;
        html += `<div class="era-items">`;
        items.forEach((item, i) => {
            const yrStr = item.year < 0 ? `${Math.abs(item.year)} BCE` : `${item.year} CE`;
            const isActive = (i === 0 && isFirst);
            html += `<div class="era-item ${isActive ? 'active' : ''}" data-year="${item.year}"><span class="era-yr">${yrStr}</span><span class="era-lbl">${item.label}</span></div>`;
        });
        html += `</div></div>`;
    });
    body.innerHTML = html;
},

bindEvents() {
    // Slider
    document.getElementById('slider').addEventListener('input', e => this.setYear(parseInt(e.target.value)));

    // Play
    document.getElementById('playBtn').addEventListener('click', () => this.togglePlay());

    // Speed
    document.querySelectorAll('.spd-btn').forEach(b => {
        b.addEventListener('click', e => {
            document.querySelectorAll('.spd-btn').forEach(x => x.classList.remove('active'));
            e.target.classList.add('active');
            this.speed = parseFloat(e.target.dataset.speed);
            if (this.playing) { this.stopPlay(); this.startPlay(); }
        });
    });

    // Sidebar items
    document.getElementById('sidebarBody').addEventListener('click', e => {
        const item = e.target.closest('.era-item');
        const hdr = e.target.closest('.era-grp-hdr');
        if (item) {
            document.getElementById('slider').value = item.dataset.year;
            this.setYear(parseInt(item.dataset.year));
            // Close mobile sidebar
            document.getElementById('sidebar').classList.remove('mob-open');
        }
        if (hdr) { hdr.parentElement.classList.toggle('open'); }
    });

    // Sidebar toggle
    document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('collapsed'));

    // Mobile sidebar
    document.getElementById('mobToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('mob-open'));

    // Info panel
    document.getElementById('toggleInfo').addEventListener('click', () => document.getElementById('infoPanel').classList.toggle('hidden'));
    document.getElementById('ipClose').addEventListener('click', () => document.getElementById('infoPanel').classList.add('hidden'));

    // Reset view
    document.getElementById('resetView').addEventListener('click', () => this.map.setView([25, 45], 3));

    // Keyboard
    document.addEventListener('keydown', e => {
        if (e.key === ' ') { e.preventDefault(); this.togglePlay(); }
        if (e.key === 'ArrowRight') { const s = document.getElementById('slider'); s.value = Math.min(2026, parseInt(s.value) + 25); this.setYear(parseInt(s.value)); }
        if (e.key === 'ArrowLeft') { const s = document.getElementById('slider'); s.value = Math.max(-5000, parseInt(s.value) - 25); this.setYear(parseInt(s.value)); }
    });
},

// ═══════════════════════════════════════
// YEAR MANAGEMENT
// ═══════════════════════════════════════
setYear(year) {
    this.currentYear = year;
    const yrStr = year < 0 ? `${Math.abs(year)} BCE` : `${year} CE`;
    document.getElementById('yrDisp').textContent = yrStr;

    // Find era
    const eraKey = this.findEra(year);
    const eraInfo = this.eraInfo[eraKey];
    if (eraInfo) {
        document.getElementById('eraDisp').textContent = eraInfo.t;
        document.getElementById('ipTitle').textContent = eraInfo.t;
        this.updateInfoPanel(eraInfo, yrStr);
    }

    // Update map layers
    this.updateVisibility(year);

    // Update sidebar
    this.updateSidebar(year);
},

findEra(year) {
    const keys = Object.keys(this.eraInfo).map(Number).sort((a, b) => a - b);
    let closest = keys[0];
    for (const k of keys) { if (k <= year) closest = k; else break; }
    return closest.toString();
},

updateVisibility(year) {
    // Territories
    this.layers.territories.eachLayer(layer => {
        const d = layer._data;
        const shouldShow = year >= d.from && year <= d.to;
        if (shouldShow && !layer._visible) {
            layer.setStyle({ opacity: 0.8, fillOpacity: 0.45 });
            if (!this.map.hasLayer(layer)) this.layers.territories.addLayer(layer);
            layer._visible = true;
        } else if (!shouldShow && layer._visible) {
            layer.setStyle({ opacity: 0, fillOpacity: 0 });
            layer._visible = false;
        }
    });

    // Cities
    this.layers.cities.eachLayer(layer => {
        const d = layer._data;
        const show = year >= d.from && year <= d.to;
        if (show && !layer._visible) {
            layer.setStyle({ opacity: 1, fillOpacity: 0.9 });
            layer._visible = true;
        } else if (!show && layer._visible) {
            layer.setStyle({ opacity: 0, fillOpacity: 0 });
            layer._visible = false;
        }
    });

    // Routes
    this.layers.routes.eachLayer(layer => {
        const d = layer._data;
        const show = year >= d.from && year <= d.to;
        if (show && !layer._visible) {
            layer.setStyle({ opacity: 0.7 });
            layer._visible = true;
        } else if (!show && layer._visible) {
            layer.setStyle({ opacity: 0 });
            layer._visible = false;
        }
    });
},

updateInfoPanel(info, yrStr) {
    const body = document.getElementById('ipBody');
    let h = `<span class="ip-badge">${yrStr}</span>`;
    h += `<p class="ip-desc">${info.d}</p>`;

    // Territory legend
    const visible = [];
    this.layers.territories.eachLayer(l => { if (l._visible) visible.push(l); });
    if (visible.length) {
        h += `<h4 class="ip-section-title">Visible Civilizations</h4>`;
        visible.forEach(l => {
            const t = this.territories.find(x => x.id === l._data.id);
            if (t) h += `<div class="legend-item"><div class="legend-swatch" style="background:${t.fillColor}; border-color:${t.color}"></div><span class="legend-text">${t.name}</span></div>`;
        });
    }

    if (info.f && info.f.length) {
        h += `<h4 class="ip-section-title" style="margin-top:1rem;">Key Facts</h4><ul class="ip-list">`;
        info.f.forEach(f => h += `<li>${f}</li>`);
        h += `</ul>`;
    }
    body.innerHTML = h;
},

updateSidebar(year) {
    let closest = null, diff = Infinity;
    document.querySelectorAll('.era-item').forEach(el => {
        el.classList.remove('active');
        const d = Math.abs(parseInt(el.dataset.year) - year);
        if (d < diff) { diff = d; closest = el; }
    });
    if (closest) {
        closest.classList.add('active');
        const grp = closest.closest('.era-grp');
        if (grp && !grp.classList.contains('open')) grp.classList.add('open');
        closest.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
},

// ═══════════════════════════════════════
// PLAYBACK
// ═══════════════════════════════════════
togglePlay() { this.playing ? this.stopPlay() : this.startPlay(); },

startPlay() {
    this.playing = true;
    const btn = document.getElementById('playBtn');
    btn.textContent = '⏸'; btn.classList.add('playing');
    const slider = document.getElementById('slider');
    const step = Math.max(1, Math.round(8 * this.speed));
    const ms = Math.max(30, 80 / this.speed);
    this.interval = setInterval(() => {
        let v = parseInt(slider.value) + step;
        if (v > 2026) v = -5000;
        slider.value = v;
        this.setYear(v);
    }, ms);
},

stopPlay() {
    this.playing = false;
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('playBtn').classList.remove('playing');
    clearInterval(this.interval);
}

}; // End Atlas

// Initialize
document.addEventListener('DOMContentLoaded', () => Atlas.init());
</script>
