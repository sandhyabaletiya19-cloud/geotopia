    <style>
        * {

            padding: 0;
            box-sizing: border-box;
        }

        body {

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .nav-bar {
            background: #2c3e50;
            padding: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-btn {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .nav-btn.active {
            background: #e74c3c;
        }

        .content-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
        }

        #map {
            height: 600px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .data-panel {
            height: 600px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .category-section {
            margin-bottom: 30px;
        }

        .category-title {
            font-size: 1.5em;
            color: #2c3e50;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid #3498db;
        }

        .ice-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid #3498db;
        }

        .ice-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .ice-item h3 {
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .ice-item p {
            color: #7f8c8d;
            font-size: 0.9em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-box h3 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat-box p {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            max-width: 900px;
            margin: 50px auto;
            border-radius: 15px;
            overflow: hidden;
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 25px;
            position: relative;
        }

        .modal-header h2 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2em;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .close-modal:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 30px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .detail-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #3498db;
        }

        .detail-item label {
            font-weight: bold;
            color: #2c3e50;
            display: block;
            margin-bottom: 5px;
        }

        .detail-item span {
            color: #555;
        }

        .search-box {
            width: 100%;
            padding: 12px 20px;
            font-size: 1em;
            border: 2px solid #ddd;
            border-radius: 25px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.2);
        }

        @media (max-width: 768px) {
            .content-wrapper {
                grid-template-columns: 1fr;
            }

            .detail-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>

        let map;
        let markers = L.markerClusterGroup({
            chunkedLoading: true,
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: true,
            zoomToBoundsOnClick: true
        });

        // Initialize map
        function initMap() {
            map = L.map('map', {
                center: [20, 0],
                zoom: 2,
                minZoom: 2,
                maxZoom: 18
            });

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            loadMarkers(iceData);
            displayDataPanel(iceData);
        }

        // Custom icons
        function getIcon(type) {
            const colors = {
                'ice-sheets': '#1e3c72',
                'ice-caps': '#2a5298',
                'glaciers': '#3498db',
                'sea-ice': '#5dade2'
            };

            return L.divIcon({
                className: 'custom-marker',
                html: `<div style="background: ${colors[type]}; width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3);"></div>`,
                iconSize: [30, 30]
            });
        }

        // Load markers
        function loadMarkers(data) {
            markers.clearLayers();

            data.forEach(item => {
                const marker = L.marker([item.lat, item.lon], {
                    icon: getIcon(item.type)
                });

                marker.bindPopup(`
                    <div style="min-width: 200px;">
                        <h3 style="margin: 0 0 10px 0; color: #2c3e50;">${item.name}</h3>
                        <p style="margin: 5px 0;"><strong>Type:</strong> ${item.type.replace('-', ' ').toUpperCase()}</p>
                        <p style="margin: 5px 0;"><strong>Location:</strong> ${item.location}</p>
                        <p style="margin: 5px 0;"><strong>Area:</strong> ${item.area || 'N/A'}</p>
                        <button onclick="showDetails('${item.name}')" style="margin-top: 10px; padding: 8px 15px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer;">View Full Details</button>
                    </div>
                `);

                marker.on('click', function() {
                    map.setView([item.lat, item.lon], 6);
                });

                markers.addLayer(marker);
            });

            map.addLayer(markers);
        }

        // Display data panel
        function displayDataPanel(data) {
            const panel = document.getElementById('dataPanel');
            const grouped = {};

            data.forEach(item => {
                if (!grouped[item.type]) {
                    grouped[item.type] = [];
                }
                grouped[item.type].push(item);
            });

            let html = '';

            Object.keys(grouped).forEach(type => {
                const title = type.replace('-', ' ').toUpperCase();
                html += `
                    <div class="category-section" data-category="${type}">
                        <h2 class="category-title">${title}</h2>
                `;

                grouped[type].forEach(item => {
                    html += `
                        <div class="ice-item" onclick="showDetails('${item.name}')">
                            <h3>${item.name}</h3>
                            <p><strong>${item.location}</strong> • ${item.area || item.length || 'N/A'}</p>
                            <p style="font-size: 0.85em; margin-top: 5px;">${item.description.substring(0, 100)}...</p>
                        </div>
                    `;
                });

                html += `</div>`;
            });

            panel.innerHTML = html;
        }

        // Show details modal
        function showDetails(name) {
            const item = iceData.find(i => i.name === name);
            if (!item) return;

            document.getElementById('modalTitle').textContent = item.name;
            document.getElementById('modalSubtitle').textContent = `${item.type.replace('-', ' ').toUpperCase()} • ${item.location}`;

            let bodyHTML = `
                <div class="detail-grid">
                    <div class="detail-item">
                        <label>Location</label>
                        <span>${item.location}</span>
                    </div>
                    <div class="detail-item">
                        <label>Type</label>
                        <span>${item.type.replace('-', ' ').toUpperCase()}</span>
                    </div>
                    ${item.area ? `<div class="detail-item"><label>Area</label><span>${item.area}</span></div>` : ''}
                    ${item.length ? `<div class="detail-item"><label>Length</label><span>${item.length}</span></div>` : ''}
                    ${item.volume ? `<div class="detail-item"><label>Volume</label><span>${item.volume}</span></div>` : ''}
                    ${item.maxThickness ? `<div class="detail-item"><label>Max Thickness</label><span>${item.maxThickness}</span></div>` : ''}
                    ${item.avgThickness ? `<div class="detail-item"><label>Avg Thickness</label><span>${item.avgThickness}</span></div>` : ''}
                    ${item.elevation ? `<div class="detail-item"><label>Elevation</label><span>${item.elevation}</span></div>` : ''}
                    ${item.percentFreshwater ? `<div class="detail-item"><label>% of Earth's Freshwater</label><span>${item.percentFreshwater}</span></div>` : ''}
                    ${item.seaLevelEquivalent ? `<div class="detail-item"><label>Sea Level Equivalent</label><span>${item.seaLevelEquivalent}</span></div>` : ''}
                    ${item.iceAge ? `<div class="detail-item"><label>Ice Age</label><span>${item.iceAge}</span></div>` : ''}
                    ${item.temperature ? `<div class="detail-item"><label>Temperature</label><span>${item.temperature}</span></div>` : ''}
                </div>

                <div style="margin-top: 20px;">
                    <h3 style="color: #2c3e50; margin-bottom: 10px;">Description</h3>
                    <p style="line-height: 1.6; color: #555;">${item.description}</p>
                </div>

                ${item.keyFeatures ? `
                    <div style="margin-top: 20px;">
                        <h3 style="color: #2c3e50; margin-bottom: 10px;">Key Features</h3>
                        <p style="line-height: 1.6; color: #555;">${item.keyFeatures}</p>
                    </div>
                ` : ''}

                ${item.threats ? `
                    <div style="margin-top: 20px;">
                        <h3 style="color: #e74c3c; margin-bottom: 10px;">Threats</h3>
                        <p style="line-height: 1.6; color: #555;">${item.threats}</p>
                    </div>
                ` : ''}

                ${item.significance ? `
                    <div style="margin-top: 20px;">
                        <h3 style="color: #27ae60; margin-bottom: 10px;">Significance</h3>
                        <p style="line-height: 1.6; color: #555;">${item.significance}</p>
                    </div>
                ` : ''}

                ${item.meltRate ? `
                    <div style="margin-top: 20px; padding: 15px; background: #fff3cd; border-left: 4px solid #ffc107; border-radius: 5px;">
                        <strong>⚠️ Melt Rate:</strong> ${item.meltRate}
                    </div>
                ` : ''}

                ${item.retreatRate ? `
                    <div style="margin-top: 20px; padding: 15px; background: #f8d7da; border-left: 4px solid #dc3545; border-radius: 5px;">
                        <strong>📉 Retreat Rate:</strong> ${item.retreatRate}
                    </div>
                ` : ''}

                <div style="margin-top: 20px; padding: 15px; background: #d1ecf1; border-left: 4px solid #17a2b8; border-radius: 5px;">
                    <strong>📍 Coordinates:</strong> ${item.lat.toFixed(4)}°, ${item.lon.toFixed(4)}°
                </div>
            `;

            document.getElementById('modalBody').innerHTML = bodyHTML;
            document.getElementById('detailModal').style.display = 'block';

            // Zoom to location on map
            map.setView([item.lat, item.lon], 6);
        }

        // Close modal
        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        // Filter by category
        function filterCategory(category) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            let filtered = category === 'all' ? iceData : iceData.filter(item => item.type === category);

            loadMarkers(filtered);
            displayDataPanel(filtered);
        }

        // Search function
        function searchIce() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            const filtered = iceData.filter(item =>
                item.name.toLowerCase().includes(searchTerm) ||
                item.location.toLowerCase().includes(searchTerm) ||
                item.type.toLowerCase().includes(searchTerm) ||
                item.description.toLowerCase().includes(searchTerm)
            );

            loadMarkers(filtered);
            displayDataPanel(filtered);
        }

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Initialize on load
        window.onload = initMap;
    </script>
</body>
</html>
