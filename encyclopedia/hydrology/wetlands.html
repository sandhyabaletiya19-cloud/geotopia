            margin-top: 5px;
            background: #9b59b6;

            margin-bottom: 5px;
        }

        .stat-box p {
            font-size: 0.9em;
            opacity: 0.9;

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
            overflow-y: auto;
        }

            background: white;
            max-width: 900px;
            margin: 50px auto;
            border-radius: 15px;
            overflow: hidden;
            animation: slideDown 0.3s;
        }

            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

            padding: 25px;
            position: relative;
        }

            font-size: 2em;
            margin-bottom: 10px;
        }

            top: 20px;
            right: 20px;
            font-size: 2em;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: all 0.3s;

        .close-modal:hover {

            margin-bottom: 20px;

</head>

        let map;
        let markers = L.markerClusterGroup({
            chunkedLoading: true,
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: true,
            zoomToBoundsOnClick: true
        });

        function initMap() {
            map = L.map('map', {
                center: [10, 0],
                zoom: 2,
                minZoom: 2,
                maxZoom: 18
            });

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            loadMarkers(wetlandData);
            displayDataPanel(wetlandData);
        }

        function getIcon(type) {
            const colors = {
                'marshes': '#27ae60',
                'swamps': '#16a085',
                'bogs': '#8e44ad',
                'mangroves': '#d35400',
                'deltas': '#2980b9'
            };

            return L.divIcon({
                className: 'custom-marker',
                html: `<div style="background: ${colors[type]}; width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3);"></div>`,
                iconSize: [30, 30]
            });
        }

        function loadMarkers(data) {
            markers.clearLayers();

            data.forEach(item => {
                const marker = L.marker([item.lat, item.lon], {
                    icon: getIcon(item.type)
                });

                let badges = '';
                if (item.ramsar) badges += '<span class="ramsar-badge">RAMSAR</span> ';
                if (item.unesco) badges += '<span class="unesco-badge">UNESCO</span> ';

                marker.bindPopup(`
                    <div style="min-width: 250px;">
                        <h3 style="margin: 0 0 10px 0; color: #2c3e50;">${item.name}</h3>
                        <p style="margin: 5px 0;"><strong>Type:</strong> ${item.wetlandType}</p>
                        <p style="margin: 5px 0;"><strong>Location:</strong> ${item.location}</p>
                        <p style="margin: 5px 0;"><strong>Area:</strong> ${item.area}</p>
                        <div style="margin-top: 10px;">${badges}</div>
                        <button onclick="showDetails('${item.name}')" style="margin-top: 10px; padding: 8px 15px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer;">View Full Details</button>
                    </div>
                `);

                marker.on('click', function() {
                    map.setView([item.lat, item.lon], 7);
                });

                markers.addLayer(marker);
            });

            map.addLayer(markers);
        }

        function displayDataPanel(data) {
            const panel = document.getElementById('dataPanel');
            const grouped = {};

            data.forEach(item => {
                if (!grouped[item.type]) {
                    grouped[item.type] = [];
                }
                grouped[item.type].push(item);
            });

            let html = '';

            Object.keys(grouped).forEach(type => {
                const title = type.toUpperCase();
                html += `
                    <div class="category-section" data-category="${type}">
                        <h2 class="category-title">${title}</h2>
                `;

                grouped[type].forEach(item => {
                    let badges = '';
                    if (item.ramsar) badges += '<span class="ramsar-badge">RAMSAR</span> ';
                    if (item.unesco) badges += '<span class="unesco-badge">UNESCO</span> ';

                    html += `
                        <div class="wetland-item" onclick="showDetails('${item.name}')">
                            <h3>${item.name}</h3>
                            <p><strong>${item.location}</strong></p>
                            <p style="font-size: 0.85em; margin-top: 5px;">${item.wetlandType} • ${item.area}</p>
                            <div style="margin-top: 5px;">${badges}</div>
                        </div>
                    `;
                });

                html += `</div>`;
            });

            panel.innerHTML = html;
        }

        function showDetails(name) {
            const item = wetlandData.find(i => i.name === name);
            if (!item) return;

            document.getElementById('modalTitle').textContent = item.name;
            document.getElementById('modalSubtitle').textContent = `${item.wetlandType} • ${item.location}`;

            let designations = item.designation.join(', ');

            let bodyHTML = `
                <div class="detail-grid">
                    <div class="detail-item">
                        <label>Location</label>
                        <span>${item.location}</span>
                    </div>
                    <div class="detail-item">
                        <label>Country</label>
                        <span>${item.country}</span>
                    </div>
                    <div class="detail-item">
                        <label>Area</label>
                        <span>${item.area}</span>
                    </div>
                    <div class="detail-item">
                        <label>Wetland Type</label>
                        <span>${item.wetlandType}</span>
                    </div>
                    <div class="detail-item">
                        <label>Designations</label>
                        <span>${designations}</span>
                    </div>
                    ${item.established ? `
                    <div class="detail-item">
                        <label>Established</label>
                        <span>${item.established}</span>
                    </div>` : ''}
                </div>

                <div style="margin-top: 20px;">
                    <h3 style="color: #2c3e50; margin-bottom: 10px;">Description</h3>
                    <p style="line-height: 1.6; color: #555;">${item.description}</p>
                </div>

                <div style="margin-top: 20px;">
                    <h3 style="color: #2c3e50; margin-bottom: 10px;">Key Features</h3>
                    <p style="line-height: 1.6; color: #555;">${item.keyFeatures}</p>
                </div>

                <div style="margin-top: 20px;">
                    <h3 style="color: #3498db; margin-bottom: 10px;">Hydrology</h3>
                    <p style="line-height: 1.6; color: #555;">${item.hydrology}</p>
                </div>

                <div style="margin-top: 20px;">
                    <h3 style="color: #27ae60; margin-bottom: 10px;">Biodiversity</h3>
                    <p style="line-height: 1.6; color: #555;">${item.biodiversity}</p>
                </div>

                <div class="species-list">
                    <h4>🌱 Flora</h4>
                    <p style="color: #555; margin-top: 5px;">${item.flora}</p>
                </div>

                <div class="species-list" style="background: #e3f2fd;">
                    <h4 style="color: #2196f3;">🦅 Fauna</h4>
                    <p style="color: #555; margin-top: 5px;">${item.fauna}</p>
                </div>

                <div style="margin-top: 20px;">
                    <h3 style="color: #e74c3c; margin-bottom: 10px;">Threats</h3>
                    <p style="line-height: 1.6; color: #555;">${item.threats}</p>
                </div>

                <div style="margin-top: 20px;">
                    <h3 style="color: #27ae60; margin-bottom: 10px;">Conservation</h3>
                    <p style="line-height: 1.6; color: #555;">${item.conservation}</p>
                </div>

                <div style="margin-top: 20px;">
                    <h3 style="color: #2c3e50; margin-bottom: 10px;">Ecosystem Services</h3>
                    <p style="line-height: 1.6; color: #555;">${item.ecosystem_services}</p>
                </div>

                <div style="margin-top: 20px; padding: 15px; background: #d4edda; border-left: 4px solid #28a745; border-radius: 5px;">
                    <strong>🌍 Significance:</strong> ${item.significance}
                </div>

                <div style="margin-top: 20px; padding: 15px; background: #d1ecf1; border-left: 4px solid #17a2b8; border-radius: 5px;">
                    <strong>📍 Coordinates:</strong> ${item.lat.toFixed(4)}°, ${item.lon.toFixed(4)}°
                </div>
            `;

            document.getElementById('modalBody').innerHTML = bodyHTML;
            document.getElementById('detailModal').style.display = 'block';

            map.setView([item.lat, item.lon], 7);
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        function filterCategory(category) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            let filtered = category === 'all' ? wetlandData : wetlandData.filter(item => item.type === category);

            loadMarkers(filtered);
            displayDataPanel(filtered);
        }

        function searchWetland() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            const filtered = wetlandData.filter(item =>
                item.name.toLowerCase().includes(searchTerm) ||
                item.location.toLowerCase().includes(searchTerm) ||
                item.country.toLowerCase().includes(searchTerm) ||
                item.description.toLowerCase().includes(searchTerm) ||
                item.fauna.toLowerCase().includes(searchTerm) ||
                item.flora.toLowerCase().includes(searchTerm)
            );

            loadMarkers(filtered);
            displayDataPanel(filtered);
        }

        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        window.onload = initMap;
    </script>
</body>
