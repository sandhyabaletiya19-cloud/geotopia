<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Groundwater & Aquifers - DharaVerse Encyclopedia</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #134E5E 0%, #71B280 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .nav-bar {
            background: #2c3e50;
            padding: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-btn {
            padding: 10px 20px;
            background: #16a085;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: #1abc9c;
            transform: translateY(-2px);
        }

        .nav-btn.active {
            background: #e67e22;
        }

        .content-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
        }

        #map {
            height: 600px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .data-panel {
            height: 600px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .category-section {
            margin-bottom: 30px;
        }

        .category-title {
            font-size: 1.5em;
            color: #2c3e50;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid #16a085;
        }

        .aquifer-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid #16a085;
        }

        .aquifer-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .aquifer-item h3 {
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .aquifer-item p {
            color: #7f8c8d;
            font-size: 0.9em;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            margin-top: 5px;
        }

        .status-critical {
            background: #e74c3c;
            color: white;
        }

        .status-stressed {
            background: #e67e22;
            color: white;
        }

        .status-moderate {
            background: #f39c12;
            color: white;
        }

        .status-stable {
            background: #27ae60;
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #16a085 0%, #1abc9c 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-box h3 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat-box p {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            max-width: 900px;
            margin: 50px auto;
            border-radius: 15px;
            overflow: hidden;
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #134E5E 0%, #71B280 100%);
            color: white;
            padding: 25px;
            position: relative;
        }

        .modal-header h2 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2em;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .close-modal:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 30px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .detail-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #16a085;
        }

        .detail-item label {
            font-weight: bold;
            color: #2c3e50;
            display: block;
            margin-bottom: 5px;
        }

        .detail-item span {
            color: #555;
        }

        .search-box {
            width: 100%;
            padding: 12px 20px;
            font-size: 1em;
            border: 2px solid #ddd;
            border-radius: 25px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #16a085;
            box-shadow: 0 0 10px rgba(22, 160, 133, 0.2);
        }

        .water-table-indicator {
            background: linear-gradient(to bottom, #3498db 0%, #2ecc71 100%);
            height: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .content-wrapper {
                grid-template-columns: 1fr;
            }

            .detail-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>

    </div>

                uses: "Mining, pastoral (limited), exploration",
                threats: "Potential resource extraction impacts, climate change",
                significance: "Future water resource, currently underdeveloped"
            },

            // MIDDLE EAST ADDITIONAL
            {
                name: "Mountain Aquifer (Israel-Palestine)",
                type: "major",
                category: "transboundary",
                location: "Israel & West Bank",
                countries: ["Israel", "Palestine"],
                lat: 32.0,
                lon: 35.2,
                area: "130 km² catchment",
                volume: "50 km³",
                depth: "Up to 800 m",
                aquiferType: "Karst - Limestone, dolomite",
                rechargeRate: "0.35 km³/year",
                withdrawalRate: "0.45 km³/year",
                waterQuality: "Excellent",
                population: "7 million people",
                status: "stressed",
                description: "Critical transboundary aquifer, politically contentious water resource.",
                keyFeatures: "High quality water, shared resource, political disputes",
                uses: "Municipal drinking water, agriculture",
                threats: "Over-extraction, political conflicts, pollution",
                significance: "Primary freshwater source, central to Israeli-Palestinian water disputes"
            },

            // SOUTH AMERICA ADDITIONAL
            {
                name: "Puelche Aquifer",
                type: "major",
                category: "major",
                location: "Argentina (Buenos Aires area)",
                countries: ["Argentina"],
                lat: -35.0,
                lon: -58.0,
                area: "180,000 km²",
                volume: "120 km³",
                depth: "10-60 m",
                aquiferType: "Unconsolidated sands",
                rechargeRate: "2 km³/year",
                waterQuality: "Good to excellent",
                population: "15 million people",
                status: "moderate",
                description: "Important shallow aquifer serving Buenos Aires metropolitan area.",
                keyFeatures: "Shallow depth, good accessibility, urban pollution vulnerability",
                uses: "Municipal water supply, industrial",
                threats: "Urban contamination, industrial pollution, over-extraction in cities",
                significance: "Primary water source for Argentina's capital region"
            },

            // AFRICA ADDITIONAL
            {
                name: "Murzuq Basin",
                type: "fossil",
                category: "major",
                location: "Libya",
                countries: ["Libya"],
                lat: 26.0,
                lon: 14.0,
                area: "350,000 km²",
                volume: "4,800 km³",
                depth: "Up to 2,000 m",
                aquiferType: "Sedimentary - Sandstone",
                rechargeRate: "Negligible",
                waterQuality: "Good - fresh",
                age: "Paleozoic (ancient)",
                population: "500,000 people",
                status: "moderate",
                description: "Part of Libya's Great Man-Made River project, ancient fossil water.",
                keyFeatures: "Non-renewable, GMMR extraction, massive pipeline system",
                uses: "Agriculture, municipal supply (coastal cities), industry",
                threats: "Non-renewable depletion, political instability",
                significance: "Supports Libya's ambitious desert agriculture and coastal city water supply"
            }
        ];

        let map;
        let markers = L.markerClusterGroup({
            chunkedLoading: true,
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: true,
            zoomToBoundsOnClick: true
        });

        function initMap() {
            map = L.map('map', {
                center: [20, 0],
                zoom: 2,
                minZoom: 2,
                maxZoom: 18
            });

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            loadMarkers(aquiferData);
            displayDataPanel(aquiferData);
        }

        function getIcon(status) {
            const colors = {
                'critical': '#e74c3c',
                'stressed': '#e67e22',
                'moderate': '#f39c12',
                'stable': '#27ae60'
            };

            return L.divIcon({
                className: 'custom-marker',
                html: `<div style="background: ${colors[status]}; width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3);"></div>`,
                iconSize: [30, 30]
            });
        }

        function loadMarkers(data) {
            markers.clearLayers();

            data.forEach(item => {
                const marker = L.marker([item.lat, item.lon], {
                    icon: getIcon(item.status)
                });

                marker.bindPopup(`
                    <div style="min-width: 250px;">
                        <h3 style="margin: 0 0 10px 0; color: #2c3e50;">${item.name}</h3>
                        <p style="margin: 5px 0;"><strong>Location:</strong> ${item.location}</p>
                        <p style="margin: 5px 0;"><strong>Area:</strong> ${item.area}</p>
                        <p style="margin: 5px 0;"><strong>Volume:</strong> ${item.volume}</p>
                        <p style="margin: 5px 0;"><strong>Status:</strong> <span class="status-badge status-${item.status}">${item.status.toUpperCase()}</span></p>
                        <button onclick="showDetails('${item.name}')" style="margin-top: 10px; padding: 8px 15px; background: #16a085; color: white; border: none; border-radius: 5px; cursor: pointer;">View Full Details</button>
                    </div>
                `);

                marker.on('click', function() {
                    map.setView([item.lat, item.lon], 5);
                });

                markers.addLayer(marker);
            });

            map.addLayer(markers);
        }

        function displayDataPanel(data) {
            const panel = document.getElementById('dataPanel');
            const grouped = {};

            data.forEach(item => {
                const key = item.category || item.type;
                if (!grouped[key]) {
                    grouped[key] = [];
                }
                grouped[key].push(item);
            });

            let html = '';

            Object.keys(grouped).forEach(category => {
                const title = category.replace('-', ' ').toUpperCase();
                html += `
                    <div class="category-section" data-category="${category}">
                        <h2 class="category-title">${title}</h2>
                `;

                grouped[category].forEach(item => {
                    html += `
                        <div class="aquifer-item" onclick="showDetails('${item.name}')">
                            <h3>${item.name}</h3>
                            <p><strong>${item.location}</strong></p>
                            <p style="font-size: 0.85em; margin-top: 5px;">Area: ${item.area} • Volume: ${item.volume}</p>
                            <span class="status-badge status-${item.status}">${item.status.toUpperCase()}</span>
                        </div>
                    `;
                });

                html += `</div>`;
            });

            panel.innerHTML = html;
        }

        function showDetails(name) {
            const item = aquiferData.find(i => i.name === name);
            if (!item) return;

            document.getElementById('modalTitle').textContent = item.name;
            document.getElementById('modalSubtitle').textContent = `${item.type.toUpperCase()} • ${item.location}`;

            let bodyHTML = `
                <div class="detail-grid">
                    <div class="detail-item">
                        <label>Location</label>
                        <span>${item.location}</span>
                    </div>
                    <div class="detail-item">
                        <label>Countries</label>
                        <span>${item.countries.join(', ')}</span>
                    </div>
                    <div class="detail-item">
                        <label>Area</label>
                        <span>${item.area}</span>
                    </div>
                    <div class="detail-item">
                        <label>Volume</label>
                        <span>${item.volume}</span>
                    </div>
                    <div class="detail-item">
                        <label>Depth Range</label>
                        <span>${item.depth}</span>
                    </div>
                    <div class="detail-item">
                        <label>Aquifer Type</label>
                        <span>${item.aquiferType}</span>
                    </div>
                    ${item.rechargeRate ? `
                    <div class="detail-item">
                        <label>Recharge Rate</label>
                        <span>${item.rechargeRate}</span>
                    </div>` : ''}
                    ${item.withdrawalRate ? `
                    <div class="detail-item">
                        <label>Withdrawal Rate</label>
                        <span>${item.withdrawalRate}</span>
                    </div>` : ''}
                    <div class="detail-item">
                        <label>Water Quality</label>
                        <span>${item.waterQuality}</span>
                    </div>
                    ${item.temperature ? `
                    <div class="detail-item">
                        <label>Temperature</label>
                        <span>${item.temperature}</span>
                    </div>` : ''}
                    ${item.age ? `
                    <div class="detail-item">
                        <label>Age</label>
                        <span>${item.age}</span>
                    </div>` : ''}
                    <div class="detail-item">
                        <label>Population Served</label>
                        <span>${item.population}</span>
                    </div>
                    <div class="detail-item">
                        <label>Status</label>
                        <span class="status-badge status-${item.status}">${item.status.toUpperCase()}</span>
                    </div>
                </div>

                <div style="margin-top: 20px;">
                    <h3 style="color: #2c3e50; margin-bottom: 10px;">Description</h3>
                    <p style="line-height: 1.6; color: #555;">${item.description}</p>
                </div>

                <div style="margin-top: 20px;">
                    <h3 style="color: #2c3e50; margin-bottom: 10px;">Key Features</h3>
                    <p style="line-height: 1.6; color: #555;">${item.keyFeatures}</p>
                </div>

                <div style="margin-top: 20px;">
                    <h3 style="color: #16a085; margin-bottom: 10px;">Uses</h3>
                    <p style="line-height: 1.6; color: #555;">${item.uses}</p>
                </div>

                <div style="margin-top: 20px;">
                    <h3 style="color: #e74c3c; margin-bottom: 10px;">Threats & Challenges</h3>
                    <p style="line-height: 1.6; color: #555;">${item.threats}</p>
                </div>

                ${item.depletionRate ? `
                <div style="margin-top: 20px; padding: 15px; background: #f8d7da; border-left: 4px solid #dc3545; border-radius: 5px;">
                    <strong>⚠️ Depletion Rate:</strong> ${item.depletionRate}
                </div>` : ''}

                ${item.management ? `
                <div style="margin-top: 20px;">
                    <h3 style="color: #27ae60; margin-bottom: 10px;">Management</h3>
                    <p style="line-height: 1.6; color: #555;">${item.management}</p>
                </div>` : ''}

                <div style="margin-top: 20px;">
                    <h3 style="color: #2c3e50; margin-bottom: 10px;">Significance</h3>
                    <p style="line-height: 1.6; color: #555;">${item.significance}</p>
                </div>

                <div style="margin-top: 20px; padding: 15px; background: #d1ecf1; border-left: 4px solid #17a2b8; border-radius: 5px;">
                    <strong>📍 Coordinates:</strong> ${item.lat.toFixed(4)}°, ${item.lon.toFixed(4)}°
                </div>
            `;

            document.getElementById('modalBody').innerHTML = bodyHTML;
            document.getElementById('detailModal').style.display = 'block';

            map.setView([item.lat, item.lon], 5);
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        function filterCategory(category) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            let filtered;
            if (category === 'all') {
                filtered = aquiferData;
            } else {
                filtered = aquiferData.filter(item => 
                    item.type === category || item.category === category
                );
            }

            loadMarkers(filtered);
            displayDataPanel(filtered);
        }

        function searchAquifer() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            const filtered = aquiferData.filter(item =>
                item.name.toLowerCase().includes(searchTerm) ||
                item.location.toLowerCase().includes(searchTerm) ||
                item.countries.some(c => c.toLowerCase().includes(searchTerm)) ||
                item.description.toLowerCase().includes(searchTerm)
            );

            loadMarkers(filtered);
            displayDataPanel(filtered);
        }

        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        window.onload = initMap;
    </script>
</body>
</html>
