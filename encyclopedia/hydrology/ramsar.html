        .stat-box.purple {

        }

        .stat-box.orange {
            background: linear-gradient(135deg, #d35400 0%, #e67e22 100%);
        }

            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat-box p {
            font-size: 0.85em;
            opacity: 0.9;
        }

        }

        .site-card-header .country {

            opacity: 0.9;

        }

        .site-card-body p {

            color: #555;
            margin-bottom: 8px;
        }

            flex-wrap: wrap;

        .badge-ramsar {

            color: white;

        .badge-area {
            background: #3498db;
            color: white;
        }

        .badge-year {
            background: #9b59b6;
            color: white;
        }

            background: #2c3e50;
            color: white;
            padding: 12px 15px;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 10;
        }

            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            overflow-y: auto;
        }

            background: white;
            max-width: 950px;
            margin: 40px auto;
            border-radius: 15px;
            overflow: hidden;
            animation: slideDown 0.3s;
        }

            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

            background: linear-gradient(135deg, #0a3d62 0%, #1e8449 100%);
            color: white;
            padding: 25px;
            position: relative;
        }

            margin-bottom: 8px;
            padding-right: 50px;
        }

        .modal-header .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

            top: 20px;
            right: 20px;
            font-size: 2em;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: all 0.3s;

        .modal-body {

            }
        }

            .detail-grid {
                grid-template-columns: 1fr;
            }

            }

                grid-template-columns: repeat(2, 1fr);
            }

    </style>

        let map;
        let markers = L.markerClusterGroup({
            chunkedLoading: true,
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: true,
            zoomToBoundsOnClick: true,
            maxClusterRadius: 50
        });

        let currentFilter = 'all';
        let filteredData = [...ramsarSites];

        function initMap() {
            map = L.map('map', {
                center: [20, 0],
                zoom: 2,
                minZoom: 2,
                maxZoom: 18
            });

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            populateCountryFilter();
            loadMarkers(ramsarSites);
            displaySitesList(ramsarSites);
            updateStats(ramsarSites);
        }

        function populateCountryFilter() {
            const countries = [...new Set(ramsarSites.map(s => s.country))].sort();
            const select = document.getElementById('countryFilter');
            countries.forEach(country => {
                const option = document.createElement('option');
                option.value = country;
                option.textContent = country;
                select.appendChild(option);
            });
        }

        function getIcon(type) {
            const colors = {
                'Marine/Coastal': '#2980b9',
                'Inland': '#27ae60',
                'Human-made': '#8e44ad'
            };

            return L.divIcon({
                className: 'custom-marker',
                html: `<div style="background: ${colors[type] || '#27ae60'}; width: 24px; height: 24px; border-radius: 50%; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3);"></div>`,
                iconSize: [24, 24]
            });
        }

        function loadMarkers(data) {
            markers.clearLayers();

            data.forEach(site => {
                const marker = L.marker([site.lat, site.lon], {
                    icon: getIcon(site.type)
                });

                marker.bindPopup(`
                    <div class="map-popup">
                        <h3>${site.name}</h3>
                        <p><strong>Country:</strong> ${site.country}</p>
                        <p><strong>Area:</strong> ${site.area.toLocaleString()} ha</p>
                        <p><strong>Type:</strong> ${site.type}</p>
                        <p><strong>Designated:</strong> ${site.year}</p>
                        <button class="btn-details" onclick="showDetails(${site.id})">View Full Details</button>
                    </div>
                `, { maxWidth: 300 });

                marker.on('click', function() {
                    map.setView([site.lat, site.lon], 8);
                });

                markers.addLayer(marker);
            });

            map.addLayer(markers);
        }

        function displaySitesList(data) {
            const container = document.getElementById('sitesList');
            document.getElementById('resultsCount').textContent = `Showing ${data.length} of ${ramsarSites.length} Ramsar Sites`;
            document.getElementById('displayedSites').textContent = data.length;

            // Group by region
            const grouped = {};
            data.forEach(site => {
                if (!grouped[site.region]) {
                    grouped[site.region] = [];
                }
                grouped[site.region].push(site);
            });

            let html = '';

            Object.keys(grouped).sort().forEach(region => {
                html += `<div class="region-header">${region} (${grouped[region].length} sites)</div>`;

                grouped[region].forEach(site => {
                    html += `
                        <div class="site-card" onclick="showDetails(${site.id})">
                            <div class="site-card-header">
                                <h3>${site.name}</h3>
                                <div class="country">${site.country}</div>
                            </div>
                            <div class="site-card-body">
                                <p><strong>Area:</strong> ${site.area.toLocaleString()} hectares</p>
                                <p><strong>Type:</strong> ${site.type}</p>
                                <p>${site.description.substring(0, 100)}...</p>
                                <div class="site-card-badges">
                                    <span class="badge badge-ramsar">RAMSAR ${site.year}</span>
                                    <span class="badge badge-area">${site.area.toLocaleString()} ha</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            });

            container.innerHTML = html;
        }

        function updateStats(data) {
            document.getElementById('displayedSites').textContent = data.length;
            const totalArea = data.reduce((sum, site) => sum + site.area, 0);
            document.getElementById('totalArea').textContent = (totalArea / 1000000).toFixed(1) + 'M';
        }

        function showDetails(id) {
            const site = ramsarSites.find(s => s.id === id);
            if (!site) return;

            document.getElementById('modalTitle').textContent = site.name;
            document.getElementById('modalSubtitle').textContent = `${site.country} • ${site.region} • Ramsar Site #${site.id}`;

            const criteriaHtml = site.criteria.map(c => `<div class="criteria-item">Criterion ${c}</div>`).join('');

            let bodyHTML = `
                <div class="detail-grid">
                    <div class="detail-item">
                        <label>Country</label>
                        <span>${site.country}</span>
                    </div>
                    <div class="detail-item">
                        <label>Region</label>
                        <span>${site.region}</span>
                    </div>
                    <div class="detail-item">
                        <label>Area</label>
                        <span>${site.area.toLocaleString()} hectares</span>
                    </div>
                    <div class="detail-item">
                        <label>Wetland Type</label>
                        <span>${site.type}</span>
                    </div>
                    <div class="detail-item">
                        <label>Designation Year</label>
                        <span>${site.year}</span>
                    </div>
                    <div class="detail-item">
                        <label>Coordinates</label>
                        <span>${site.lat.toFixed(4)}°, ${site.lon.toFixed(4)}°</span>
                    </div>
                </div>

                <h3 class="section-title">Description</h3>
                <p style="line-height: 1.7; color: #555;">${site.description}</p>

                <h3 class="section-title">Ramsar Criteria Met</h3>
                <div class="criteria-grid">
                    ${criteriaHtml}
                </div>

                <div class="info-box green">
                    <h4 style="color: #27ae60; margin-bottom: 8px;">🦅 Biodiversity</h4>
                    <p>${site.biodiversity}</p>
                </div>

                <div class="info-box red">
                    <h4 style="color: #e74c3c; margin-bottom: 8px;">⚠️ Threats</h4>
                    <p>${site.threats}</p>
                </div>

                <div class="info-box blue">
                    <h4 style="color: #3498db; margin-bottom: 8px;">🌍 Significance</h4>
                    <p>${site.significance}</p>
                </div>

                <div class="info-box yellow">
                    <h4 style="color: #d4a600; margin-bottom: 8px;">📍 Location Details</h4>
                    <p><strong>Coordinates:</strong> ${site.lat.toFixed(4)}° ${site.lat >= 0 ? 'N' : 'S'}, ${site.lon.toFixed(4)}° ${site.lon >= 0 ? 'E' : 'W'}</p>
                    <p><strong>Region:</strong> ${site.region}</p>
                    <p><strong>Country:</strong> ${site.country}</p>
                </div>

                <h3 class="section-title">Ramsar Criteria Explanation</h3>
                <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; font-size: 0.9em; line-height: 1.6;">
                    ${getCriteriaExplanations(site.criteria)}
                </div>

                <div style="margin-top: 25px; text-align: center;">
                    <button onclick="zoomToSite(${site.lat}, ${site.lon})" style="padding: 12px 25px; background: #1e8449; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; margin-right: 10px;">
                        📍 View on Map
                    </button>
                    <a href="https://rsis.ramsar.org/ris/${site.id}" target="_blank" style="padding: 12px 25px; background: #2980b9; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; text-decoration: none; display: inline-block;">
                        🔗 Ramsar Database
                    </a>
                </div>
            `;

            document.getElementById('modalBody').innerHTML = bodyHTML;
            document.getElementById('detailModal').style.display = 'block';

            // Zoom to location
            map.setView([site.lat, site.lon], 8);
        }

        function getCriteriaExplanations(criteria) {
            const explanations = {
                1: "<strong>Criterion 1:</strong> Contains a representative, rare, or unique example of a natural or near-natural wetland type.",
                2: "<strong>Criterion 2:</strong> Supports vulnerable, endangered, or critically endangered species or threatened ecological communities.",
                3: "<strong>Criterion 3:</strong> Supports populations of plant and/or animal species important for maintaining biodiversity.",
                4: "<strong>Criterion 4:</strong> Supports plant and/or animal species at a critical stage in their life cycles, or provides refuge during adverse conditions.",
                5: "<strong>Criterion 5:</strong> Regularly supports 20,000 or more waterbirds.",
                6: "<strong>Criterion 6:</strong> Regularly supports 1% of the individuals in a population of one species or subspecies of waterbird.",
                7: "<strong>Criterion 7:</strong> Supports a significant proportion of indigenous fish subspecies, species or families.",
                8: "<strong>Criterion 8:</strong> Is an important source of food for fishes, spawning ground, nursery and/or migration path.",
                9: "<strong>Criterion 9:</strong> Regularly supports 1% of the individuals in a population of one species or subspecies of wetland-dependent non-avian animal species."
            };

            return criteria.map(c => `<p>${explanations[c]}</p>`).join('');
        }

        function zoomToSite(lat, lon) {
            closeModal();
            map.setView([lat, lon], 10);
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        function filterRegion(region) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            currentFilter = region;
            applyFilters();
        }

        function filterByCountry() {
            applyFilters();
        }

        function filterByType() {
            applyFilters();
        }

        function searchSites() {
            applyFilters();
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            const countryFilter = document.getElementById('countryFilter').value;
            const typeFilter = document.getElementById('typeFilter').value;

            filteredData = ramsarSites.filter(site => {
                // Region filter
                if (currentFilter !== 'all' && site.region !== currentFilter) {
                    return false;
                }

                // Country filter
                if (countryFilter && site.country !== countryFilter) {
                    return false;
                }

                // Type filter
                if (typeFilter && site.type !== typeFilter) {
                    return false;
                }

                // Search filter
                if (searchTerm) {
                    const searchFields = [
                        site.name,
                        site.country,
                        site.region,
                        site.description,
                        site.biodiversity,
                        site.significance
                    ].join(' ').toLowerCase();

                    if (!searchFields.includes(searchTerm)) {
                        return false;
                    }
                }

                return true;
            });

            loadMarkers(filteredData);
            displaySitesList(filteredData);
            updateStats(filteredData);
        }

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Escape key to close modal
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        // Initialize on load
        window.onload = initMap;
    </script>
</body>
</html>
