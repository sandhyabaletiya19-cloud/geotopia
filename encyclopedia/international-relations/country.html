<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country | Unity Atlas</title>
    <link rel="stylesheet" href="ir-main.css">
    <link rel="stylesheet" href="country.css">
    <link rel="stylesheet" href="animations.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="ir-nav">
        <div class="nav-container">
            <a href="index.html" class="back-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                <span>All Countries</span>
            </a>
            <div class="nav-brand">
                <div class="brand-icon">🌍</div>
                <div class="brand-text">
                    <span class="brand-name">Unity Atlas</span>
                    <span class="brand-tagline" id="navCountryName">Loading...</span>
                </div>
            </div>
            <div class="nav-actions">
                <button class="nav-btn" id="shareBtn" title="Share">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="country-main" id="countryMain">
        <!-- Will be populated by JavaScript -->
        <div class="loading-state">
            <div class="loader"></div>
            <p>Loading country data...</p>
        </div>
    </main>

    <!-- Scripts -->
    <script src="countries-data.js"></script>
    <script src="data-manager.js"></script>
    <script src="country-page.js"></script>
</body>
</html>
