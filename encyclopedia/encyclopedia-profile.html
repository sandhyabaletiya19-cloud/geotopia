<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Profile | GeoVerse Encyclopedia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --deep-ocean: #0a1628;
            --ocean-blue: #0f2744;
            --twilight-blue: #1a3a5c;
            --teal-accent: #14b8a6;
            --emerald: #10b981;
            --gold-accent: #f59e0b;
            --amber-glow: #fbbf24;
            --coral: #f97316;
            --cloud-white: #f8fafc;
            --gradient-ocean: linear-gradient(135deg, #0a1628 0%, #1e3a5f 50%, #0f4c75 100%);
            --gradient-earth: linear-gradient(180deg, #1a3a5c 0%, #0a1628 100%);
            --gradient-aurora: linear-gradient(135deg, #14b8a6 0%, #3b82f6 50%, #8b5cf6 100%);
            --gradient-sunset: linear-gradient(135deg, #f97316 0%, #f59e0b 50%, #fbbf24 100%);
            --gradient-card: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            --shadow-soft: 0 4px 20px rgba(0,0,0,0.3);
            --shadow-glow: 0 0 40px rgba(20, 184, 166, 0.2);
            --shadow-card: 0 8px 32px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gradient-earth);
            min-height: 100vh;
            color: var(--cloud-white);
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1920&q=80') center/cover;
            opacity: 0.08;
            animation: slowPan 120s linear infinite;
        }

        @keyframes slowPan {
            0% { transform: translate(0, 0) scale(1.1); }
            50% { transform: translate(-10%, -10%) scale(1.2); }
            100% { transform: translate(0, 0) scale(1.1); }
        }

        .app-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
        }

        /* Navigation Header */
        .nav-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            background: rgba(10, 22, 40, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-logo {
            width: 50px; height: 50px;
            background: var(--gradient-aurora);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: var(--shadow-glow);
        }

        .nav-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 600;
            background: var(--gradient-aurora);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-subtitle {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
        }

        .nav-btn {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .nav-btn.primary {
            background: var(--gradient-aurora);
            color: white;
        }

        .nav-btn.secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-soft);
        }

        /* Main Content */
        .main-content {
            padding-top: 100px;
            padding-bottom: 4rem;
        }

        /* Country Hero Section */
        .country-hero {
            position: relative;
            height: 500px;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.4);
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, transparent 0%, rgba(10,22,40,0.8) 70%, var(--deep-ocean) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            align-items: flex-end;
            padding: 3rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        .country-identity {
            display: flex;
            align-items: flex-end;
            gap: 2.5rem;
            flex: 1;
        }

        .country-flag {
            width: 180px;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: var(--shadow-card);
            border: 3px solid rgba(255,255,255,0.2);
        }

        .country-info h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
        }

        .country-official-name {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 1rem;
            font-style: italic;
        }

        .country-tags {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .tag {
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tag.continent {
            background: rgba(20, 184, 166, 0.3);
            border-color: var(--teal-accent);
        }

        .tag.region {
            background: rgba(245, 158, 11, 0.3);
            border-color: var(--gold-accent);
        }

        .quick-stats {
            display: flex;
            gap: 2rem;
            margin-left: auto;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            padding: 1.5rem;
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            min-width: 140px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--teal-accent);
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.3rem;
        }

        /* Tab Navigation */
        .profile-tabs {
            position: sticky;
            top: 80px;
            z-index: 100;
            background: rgba(10, 22, 40, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0 3rem;
        }

        .tabs-container {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            gap: 0;
            overflow-x: auto;
        }

        .tab-btn {
            padding: 1.2rem 2rem;
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .tab-btn:hover {
            color: rgba(255,255,255,0.9);
            background: rgba(255,255,255,0.05);
        }

        .tab-btn.active {
            color: var(--teal-accent);
            border-bottom-color: var(--teal-accent);
        }

        /* Profile Content */
        .profile-content {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem 3rem;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Section Cards */
        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .info-card {
            background: var(--gradient-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        .info-card:hover {
            transform: translateY(-5px);
            border-color: rgba(20, 184, 166, 0.3);
            box-shadow: var(--shadow-glow);
        }

        .info-card.full-card {
            grid-column: 1 / -1;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .card-icon {
            width: 50px; height: 50px;
            background: var(--gradient-aurora);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .info-row:last-child { border-bottom: none; }

        .info-label {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-value {
            font-weight: 500;
            text-align: right;
            max-width: 60%;
        }

        .info-value.highlight { color: var(--teal-accent); }

        .info-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .list-item {
            padding: 0.6rem 1.2rem;
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .list-item:hover {
            background: rgba(20, 184, 166, 0.2);
            border-color: var(--teal-accent);
        }

        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 2px;
            background: var(--gradient-aurora);
        }

        .timeline-item {
            position: relative;
            padding-bottom: 2rem;
            padding-left: 2rem;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -6px; top: 5px;
            width: 14px; height: 14px;
            background: var(--teal-accent);
            border-radius: 50%;
            border: 3px solid var(--deep-ocean);
        }

        .timeline-year {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--gold-accent);
            margin-bottom: 0.3rem;
        }

        .timeline-title {
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .timeline-desc {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
        }

        /* Facts Grid */
        .facts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .fact-card {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1.5rem;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .fact-card:hover {
            background: rgba(255,255,255,0.08);
            transform: translateX(5px);
        }

        .fact-icon {
            width: 45px; height: 45px;
            background: var(--gradient-aurora);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .fact-content h4 {
            font-size: 0.95rem;
            margin-bottom: 0.3rem;
        }

        .fact-content p {
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
        }

        /* Related */
        .related-section { margin-top: 3rem; }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.2);
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .related-card {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.5rem;
            background: var(--gradient-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .related-card:hover {
            transform: translateY(-5px);
            border-color: var(--teal-accent);
            box-shadow: var(--shadow-glow);
        }

        .related-image {
            width: 80px; height: 80px;
            border-radius: 12px;
            object-fit: cover;
        }

        .related-info h4 { font-size: 1.1rem; margin-bottom: 0.3rem; }
        .related-info p { color: rgba(255,255,255,0.6); font-size: 0.85rem; margin-bottom: 0.5rem; }

        .related-tag {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            background: rgba(20, 184, 166, 0.2);
            border-radius: 15px;
            font-size: 0.75rem;
            color: var(--teal-accent);
        }

        /* Error State */
        .error-container {
            text-align: center;
            padding: 4rem 2rem;
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .error-container h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .error-container p {
            color: rgba(255,255,255,0.7);
            margin-bottom: 2rem;
        }

        /* Loading State */
        .loading-container {
            text-align: center;
            padding: 4rem 2rem;
        }

        .loading-spinner {
            width: 60px; height: 60px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--teal-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 992px) {
            .country-hero { height: auto; min-height: 400px; }
            .hero-content { flex-direction: column; align-items: flex-start; }
            .quick-stats { margin-left: 0; margin-top: 2rem; width: 100%; }
            .country-info h1 { font-size: 2.5rem; }
            .section-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .nav-header { padding: 1rem; }
            .profile-content { padding: 1.5rem; }
            .profile-tabs { padding: 0 1rem; }
            .tab-btn { padding: 1rem 1.2rem; font-size: 0.85rem; }
            .country-flag { width: 120px; height: 80px; }
            .stat-item { min-width: 100px; padding: 1rem; }
            .stat-value { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <div class="app-container">
        <!-- Navigation Header -->
        <header class="nav-header">
            <div class="nav-brand">
                <div class="nav-logo">🌍</div>
                <div>
                    <div class="nav-title">GeoVerse</div>
                    <div class="nav-subtitle">World Encyclopedia</div>
                </div>
            </div>

            <div class="nav-actions">
                <a href="encyclopedia.html" class="nav-btn secondary">

        <main class="main-content" id="mainContent">

                            <div class="country-info">

                <!-- Tab Navigation -->
                <nav class="profile-tabs">

                            <i class="fas fa-mountain"></i> Geography
                        </button>
                        <button class="tab-btn" data-tab="political">
                            <i class="fas fa-landmark"></i> Political
                        </button>
                        <button class="tab-btn" data-tab="economy">
                            <i class="fas fa-chart-line"></i> Economy
                        </button>
                        <button class="tab-btn" data-tab="culture">
                            <i class="fas fa-masks-theater"></i> Culture
                        </button>
                        <button class="tab-btn" data-tab="history">
                            <i class="fas fa-scroll"></i> History
                        </button>
                        <button class="tab-btn" data-tab="facts">
                            <i class="fas fa-lightbulb"></i> Quick Facts
                        </button>
                    </div>
                </nav>

                <!-- Profile Content -->
                <div class="profile-content">
                    <div class="tab-content active" id="overview">
                        <div class="section-grid" id="overviewGrid"></div>
                    </div>
                    <div class="tab-content" id="geography">
                        <div class="section-grid" id="geographyGrid"></div>
                    </div>
                    <div class="tab-content" id="political">
                        <div class="section-grid" id="politicalGrid"></div>
                    </div>
                    <div class="tab-content" id="economy">
                        <div class="section-grid" id="economyGrid"></div>
                    </div>
                    <div class="tab-content" id="culture">
                        <div class="section-grid" id="cultureGrid"></div>
                    </div>
                    <div class="tab-content" id="history">
                        <div class="section-grid" id="historyGrid"></div>
                    </div>
                    <div class="tab-content" id="facts">
                        <div class="facts-grid" id="factsGrid"></div>
                    </div>

                    <!-- Related Topics -->
                    <section class="related-section">
                        <h2 class="section-title">Neighboring Countries</h2>
                        <div class="related-grid" id="relatedGrid"></div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script src="encyclopedia-data.js"></script>
    <script src="encyclopedia-data-1.js"></script>

    <script src="encyclopedia-data-3.js"></script>
    <script src="encyclopedia-data-4.js"></script>
    <script src="encyclopedia-data-5.js"></script>

    <script src="encyclopedia-data-7.js"></script>

    <!-- PROFILE PAGE SCRIPT -->
    <script>
        // ============================================
        // HELPER FUNCTIONS
        // ============================================
        
        function safeGet(obj, path, defaultVal) {
            if (defaultVal === undefined) defaultVal = 'N/A';
            try {
                var keys = path.split('.');
                var result = obj;
                for (var i = 0; i < keys.length; i++) {
                    result = result[keys[i]];
                    if (result === undefined || result === null) return defaultVal;
                }
                return result;
            } catch (e) {
                return defaultVal;
            }
        }

        function safeArray(arr) {
            return Array.isArray(arr) ? arr : [];
        }

        function formatNumber(num) {
            if (!num) return 'N/A';
            if (typeof num === 'string') num = parseInt(num.replace(/,/g, ''));
            if (isNaN(num)) return 'N/A';
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return num.toLocaleString();
        }

        function formatArea(area) {
            if (!area) return 'N/A';

            var html = '';
            var timeline = safeArray(c.history ? c.history.timeline : []);
            var figures = safeArray(c.history ? c.history.notableFigures : []);

            // Timeline
            html += '<div class="info-card full-card">';
            html += '<div class="card-header"><div class="card-icon"><i class="fas fa-scroll"></i></div><h3 class="card-title">Historical Timeline</h3></div>';
            if (timeline.length > 0) {
                html += '<div class="timeline">';
                for (var i = 0; i < timeline.length; i++) {
                    var event = timeline[i];
                    html += '<div class="timeline-item">';
                    html += '<div class="timeline-year">' + (event.year || event.period || '') + '</div>';
                    html += '<div class="timeline-title">' + (event.title || '') + '</div>';
                    html += '<div class="timeline-desc">' + (event.description || '') + '</div>';
                    html += '</div>';
                }
                html += '</div>';
            } else {
                html += '<p style="color: rgba(255,255,255,0.5);">Timeline information coming soon</p>';
            }
            html += '</div>';

            // Notable Figures
            html += '<div class="info-card">';
            html += '<div class="card-header"><div class="card-icon"><i class="fas fa-user-graduate"></i></div><h3 class="card-title">Notable Figures</h3></div>';
            if (figures.length > 0) {
                html += '<div class="info-list">';
                for (var i = 0; i < figures.length; i++) {
                    html += '<span class="list-item">' + figures[i] + '</span>';
                }
                html += '</div>';
            } else {
                html += '<p style="color: rgba(255,255,255,0.5);">Information not available</p>';
            }
            html += '</div>';

            document.getElementById('historyGrid').innerHTML = html;
        }

        // ============================================
        // RENDER FACTS TAB
        // ============================================
        
        function renderFactsTab() {
            var c = currentCountry;
            if (!c) return;

            var facts = safeArray(c.quickFacts);
            var html = '';

            if (facts.length > 0) {
                for (var i = 0; i < facts.length; i++) {
                    var fact = facts[i];
                    html += '<div class="fact-card">';
                    html += '<div class="fact-icon"><i class="fas fa-' + (fact.icon || 'star') + '"></i></div>';
                    html += '<div class="fact-content">';
                    html += '<h4>' + (fact.title || '') + '</h4>';
                    html += '<p>' + (fact.text || '') + '</p>';
                    html += '</div>';
                    html += '</div>';
                }
            } else {
                html = '<p style="color: rgba(255,255,255,0.5); text-align: center; padding: 2rem;">Quick facts coming soon...</p>';
            }

            document.getElementById('factsGrid').innerHTML = html;
        }

        // ============================================
        // RENDER RELATED TOPICS
        // ============================================
        
        function renderRelatedTopics() {
            var c = currentCountry;
            if (!c) return;

            var neighbors = safeArray(c.location ? c.location.neighbors : []).slice(0, 6);
            var html = '';

            if (neighbors.length > 0) {
                for (var i = 0; i < neighbors.length; i++) {
                    var neighbor = neighbors[i];
                    html += '<div class="related-card" onclick="searchCountry(\'' + neighbor + '\')">';
                    html += '<img src="https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?w=200&q=80" alt="' + neighbor + '" class="related-image">';
                    html += '<div class="related-info">';
                    html += '<h4>' + neighbor + '</h4>';
                    html += '<p>Neighboring country</p>';
                    html += '<span class="related-tag">Country</span>';
                    html += '</div>';
                    html += '</div>';
                }
            } else {
                html = '<p style="color: rgba(255,255,255,0.5);">No neighboring countries (island nation or isolated)</p>';
            }

            document.getElementById('relatedGrid').innerHTML = html;
        }

        // ============================================
        // SEARCH COUNTRY BY NAME
        // ============================================
        
        function searchCountry(name) {
            var allCountries = getAllCountries();
            for (var i = 0; i < allCountries.length; i++) {
                if (allCountries[i].name === name) {
                    window.location.href = 'encyclopedia-profile.html?id=' + allCountries[i].id;
                    return;
                }
            }
            alert('Country "' + name + '" not found in database');
        }

        // ============================================
        // TAB SWITCHING
        // ============================================
        
        document.querySelectorAll('.tab-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var tabId = this.getAttribute('data-tab');
                
                document.querySelectorAll('.tab-btn').forEach(function(b) {
                    b.classList.remove('active');
                });
                this.classList.add('active');
                
                document.querySelectorAll('.tab-content').forEach(function(c) {
                    c.classList.remove('active');
                });
                
                var targetTab = document.getElementById(tabId);
                if (targetTab) targetTab.classList.add('active');
            });
        });

        // ============================================
        // INITIALIZE PAGE
        // ============================================
        
        document.addEventListener('DOMContentLoaded', function() {
            var countryId = getCountryId();
            console.log('Looking for country:', countryId);

            // Small delay to ensure data files are loaded
            setTimeout(function() {
                var allCountries = getAllCountries();
                console.log('Total countries loaded:', allCountries.length);

                if (allCountries.length === 0) {
                    showError('No country data available. Please check that data files are loaded correctly.');
                    return;
                }

                currentCountry = findCountry(countryId);

                if (currentCountry) {
                    console.log('Found:', currentCountry.name);
                    renderCountryProfile();
                } else {
                    console.error('Country not found:', countryId);
                    showError('Country with ID "' + countryId + '" was not found. Available countries: ' + allCountries.length);
                }
            }, 100);
        });
    </script>
</body>
</html>
