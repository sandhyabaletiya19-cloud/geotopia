                        <div class="country-info">
                            <h3>${country}</h3>
                            <div class="country-status status-${data.status}">${data.status}</div>
                        </div>
                    </div>
                    
                    ${data.tectonicActivity ? `
                        <div class="issue-section">
                            <h4>⚠️ Tectonic Activity</h4>
                            ${Object.entries(data.tectonicActivity).map(([type, info]) => `
                                <div class="issue-item">
                                    <div class="issue-name">
                                        ${type.toUpperCase()}
                                        <span class="severity-badge severity-${info.severity}">${info.severity}</span>
                                    </div>
                                    <ul class="issue-details">
                                        ${info.details.slice(0, 3).map(d => `<li>${d}</li>`).join('')}
                                    </ul>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                    
                    ${data.climateChange ? `
                        <div class="issue-section">
                            <h4>🌡️ Climate Change</h4>
                            ${Object.entries(data.climateChange).map(([type, info]) => `
                                <div class="issue-item">
                                    <div class="issue-name">
                                        ${type.toUpperCase()}
                                        <span class="severity-badge severity-${info.severity}">${info.severity}</span>
                                    </div>
                                    <ul class="issue-details">
                                        ${info.details.slice(0, 3).map(d => `<li>${d}</li>`).join('')}
                                    </ul>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                `;

                card.addEventListener('click', () => {
                    map.setView([data.lat, data.lng], 5);
                    const marker = markers.find(m => m.country === country);
                    if (marker) marker.marker.openPopup();
                });

                grid.appendChild(card);
            });
        }

        function updateStatistics(countries) {
            document.getElementById('stat-total').textContent = countries.length;
            
            const critical = countries.filter(c => c.data.status === 'critical').length;
            document.getElementById('stat-critical').textContent = critical;
            
            const earthquakes = countries.filter(c => 
                c.data.tectonicActivity?.earthquakes?.severity === 'extreme'
            ).length;
            document.getElementById('stat-earthquakes').textContent = earthquakes;
            
            const volcanoes = countries.filter(c => 
                c.data.tectonicActivity?.volcanoes?.severity === 'extreme'
            ).length;
            document.getElementById('stat-volcanoes').textContent = volcanoes;
            
            const warming = countries.filter(c => 
                c.data.climateChange?.globalWarming?.severity === 'extreme' ||
                c.data.climateChange?.globalWarming?.severity === 'high'
            ).length;
            document.getElementById('stat-warming').textContent = warming;
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        document.getElementById('search').addEventListener('input', filterCountries);
        document.getElementById('continent-filter').addEventListener('change', filterCountries);
        document.getElementById('status-filter').addEventListener('change', filterCountries);
        document.getElementById('issue-filter').addEventListener('change', filterCountries);

        // ============================================
        // INITIALIZE ON PAGE LOAD
        // ============================================
        window.addEventListener('DOMContentLoaded', () => {
            initMap();
            displayCountryCards(markers);
            updateStatistics(markers);
        });
    </script>
</body>
</html>
