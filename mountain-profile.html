<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mountain Profile</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="mountain-styles.css">
</head>
<body class="profile-page">
    <!-- Loading -->
    <div class="loader" id="loader">
        <div class="loader-content">
            <div class="loader-icon">🏔️</div>
            <div class="loader-spinner"></div>
            <p>Loading Mountain Data...</p>
        </div>
    </div>

    <!-- Background Image -->
    <div class="profile-bg" id="profileBg"></div>
    <div class="profile-overlay"></div>

    <!-- Main Content -->
    <main class="profile-container">
        <!-- Header -->
        <header class="profile-header">
            <div class="header-left">
                <a href="mountain.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                    <span>All Mountains</span>
                </a>
                <div class="mountain-title">
                    <h1 id="mountainName">
                        <i class="fas fa-mountain"></i>
                        <span>Loading...</span>
                    </h1>
                    <div class="mountain-meta" id="mountainMeta"></div>
                </div>
            </div>
            <div class="header-right">
                <button class="action-btn fly-btn" id="flyoverBtn">
                    <i class="fas fa-plane"></i>
                    <span>Fly Over Mountains</span>
                </button>
            </div>
        </header>

        <!-- Stats Row -->
        <section class="stats-section">
            <div class="stats-grid" id="statsGrid">
                <!-- Stats inserted by JS -->
            </div>
        </section>

        <!-- Main Content Grid -->
        <section class="content-grid">
            <!-- Map Section -->
            <div class="content-card map-card">
                <div class="card-header">
                    <h3><i class="fas fa-map-marked-alt"></i> Interactive Terrain Map</h3>
                    <div class="map-controls">
                        <button class="map-btn active" data-layer="terrain">
                            <i class="fas fa-mountain"></i> Terrain
                        </button>
                        <button class="map-btn" data-layer="satellite">
                            <i class="fas fa-satellite"></i> Satellite
                        </button>
                        <button class="map-btn" data-layer="topo">
                            <i class="fas fa-layer-group"></i> Topo
                        </button>
                    </div>
                </div>
                <div id="mountainMap"></div>
                <div class="map-legend">
                    <div class="legend-item"><span class="legend-dot peak"></span> Major Peaks</div>
                    <div class="legend-item"><span class="legend-dot glacier"></span> Glaciers</div>
                    <div class="legend-item"><span class="legend-dot pass"></span> Passes</div>
                    <div class="legend-item"><span class="legend-dot city"></span> Cities</div>
                </div>
            </div>

            <!-- Info Tree Section -->
            <div class="content-card info-card">
                <div class="card-header">
                    <h3><i class="fas fa-sitemap"></i> Mountain Information</h3>
                </div>
                <div class="info-tree" id="infoTree">
                    <!-- Info tree inserted by JS -->
                </div>
            </div>
        </section>

        <!-- Peaks Gallery -->
        <section class="peaks-section">
            <h3 class="section-title"><i class="fas fa-mountain"></i> Major Peaks</h3>
            <div class="peaks-grid" id="peaksGrid">
                <!-- Peaks inserted by JS -->
            </div>
        </section>
    </main>

    <!-- Flyover Modal -->
    <div class="flyover-modal" id="flyoverModal">
        <button class="close-modal" id="closeFlyover">
            <i class="fas fa-times"></i>
        </button>
        <div class="flyover-content">
            <h2 class="flyover-title">
                <i class="fas fa-plane"></i>
                <span id="flyoverTitle">Flying Over Mountains</span>
            </h2>
            <div class="flyover-map-container">
                <div id="flyoverMap"></div>
            </div>
            <div class="flyover-info">
                <div class="current-location">
                    <span class="info-label">Now viewing:</span>
                    <span class="peak-name" id="currentPeak">Starting...</span>
                    <span class="peak-elev" id="currentElev"></span>
                </div>
            </div>
            <div class="flyover-progress" id="flyoverProgress">
                <!-- Progress inserted by JS -->
            </div>
            <div class="flyover-controls">
                <button class="control-btn" id="pauseBtn">
                    <i class="fas fa-pause"></i>
                </button>
                <button class="control-btn" id="restartBtn">
                    <i class="fas fa-redo"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="mountain-data.js"></script>
    <script src="mountain-app.js"></script>
</body>
</html>
