<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - DharaVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="/logo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Background ── */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(139,92,246,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139,92,246,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
        }

        .glow-1 {
            background: rgba(139,92,246,0.12);
            top: -200px;
            left: -200px;
        }

        .glow-2 {
            background: rgba(236,72,153,0.08);
            bottom: -200px;
            right: -200px;
        }

        /* ── Floating Shapes ── */
        .floating-shape {
            position: fixed;
            border-radius: 50%;
            background: rgba(139,92,246,0.06);
            border: 1px solid rgba(139,92,246,0.1);
            animation: floatAnim linear infinite;
            pointer-events: none;
        }

        .shape-1 { width:80px; height:80px; top:10%; left:5%; animation-duration:15s; }
        .shape-2 { width:120px; height:120px; top:60%; right:8%; animation-duration:20s; animation-delay:-7s; }
        .shape-3 { width:60px; height:60px; bottom:15%; left:12%; animation-duration:12s; animation-delay:-3s; }
        .shape-4 { width:100px; height:100px; top:30%; right:15%; animation-duration:18s; animation-delay:-10s; }

        @keyframes floatAnim {
            0%   { transform: translateY(0) rotate(0deg); opacity:0.6; }
            50%  { transform: translateY(-30px) rotate(180deg); opacity:1; }
            100% { transform: translateY(0) rotate(360deg); opacity:0.6; }
        }

        /* ── Login Card ── */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 0 20px;
        }

        .card-inner {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 48px 40px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
        }

        /* ── Header ── */
        .card-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #8B5CF6, #EC4899);
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 40px rgba(139,92,246,0.4);
            font-size: 32px;
        }

        .card-header h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #8B5CF6, #EC4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .card-header p {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 15px;
            z-index: 1;
        }

        .form-group input {
            width: 100%;
            padding: 15px 16px 15px 46px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: rgba(139,92,246,0.5);
            background: rgba(139,92,246,0.08);
            box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
        }

        .form-group input::placeholder {
            color: rgba(255,255,255,0.2);
        }

        .toggle-pwd {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            padding: 0;
        }

        .toggle-pwd:hover { color: rgba(255,255,255,0.7); }

        /* ── Error ── */
        .error-msg {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px;
            color: #EF4444;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .error-msg.show { display: flex; }

        /* ── Login Button ── */
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #8B5CF6, #7C3AED);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(139,92,246,0.4);
        }

        .login-btn:active { transform: translateY(0); }

        /* ── Attempts warning ── */
        .attempts-warning {
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            margin-top: 16px;
        }

        .attempts-warning span {
            color: #F59E0B;
            font-weight: 600;
        }

        /* ── Footer ── */
        .card-footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .card-footer p {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 10px;
        }

        .back-link {
            font-size: 13px;
            color: rgba(139,92,246,0.8);
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-link:hover { color: #8B5CF6; }

        /* ── Shake ── */
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            15%,45%,75% { transform: translateX(-6px); }
            30%,60%,90% { transform: translateX(6px); }
        }

        .shake { animation: shake 0.4s ease; }

        /* ── Locked state ── */
        .locked-overlay {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .locked-overlay.show { display: block; }

        .lock-icon-big {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .locked-overlay h3 {
            font-size: 18px;
            font-weight: 700;
            color: #EF4444;
            margin-bottom: 8px;
        }

        .locked-overlay p {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 16px;
        }

        .unlock-timer {
            font-size: 24px;
            font-weight: 800;
            color: #F59E0B;
            font-variant-numeric: tabular-nums;
        }

        @media(max-width: 480px) {
            .card-inner { padding: 36px 24px; }
        }
    </style>
</head>
<body>

    <!-- Background -->
    <div class="bg-grid"></div>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>
    <div class="floating-shape shape-3"></div>
    <div class="floating-shape shape-4"></div>

    <!-- Login Card -->
    <div class="login-card">
        <div class="card-inner" id="cardInner">

            <div class="card-header">
                <div class="logo-wrap">👑</div>
                <h1>DHARAVERSE ADMIN</h1>
                <p>Authorized Personnel Only</p>
            </div>

            <!-- Normal Login Form -->
            <div id="loginSection">
                <form id="adminLoginForm">

                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Username</label>
                        <div class="input-wrap">
                            <i class="fas fa-user"></i>
                            <input
                                type="text"
                                id="username"
                                placeholder="admin@dharaverse"
                                autocomplete="username"
                                required
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <div class="input-wrap">
                            <i class="fas fa-lock"></i>
                            <input
                                type="password"
                                id="password"
                                placeholder="Enter admin password"
                                autocomplete="current-password"
                                required
                            >
                            <button type="button" class="toggle-pwd" id="togglePwd">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="error-msg" id="errorMsg">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="errorText">Invalid credentials</span>
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">
                        <i class="fas fa-shield-alt"></i>
                        ACCESS ADMIN PANEL
                    </button>

                    <div class="attempts-warning" id="attemptsWarn" style="display:none;">
                        <span id="attemptsLeft">3</span> attempts remaining before lockout
                    </div>

                </form>
            </div>

            <!-- Locked State -->
            <div class="locked-overlay" id="lockedOverlay">
                <div class="lock-icon-big">🔒</div>
                <h3>Account Locked</h3>
                <p>Too many failed attempts. Try again in:</p>
                <div class="unlock-timer" id="unlockTimer">05:00</div>
            </div>

            <div class="card-footer">
                <p>🔐 DharaVerse Admin System v2.0</p>
                <a href="/" class="back-link">← Back to DharaVerse</a>
            </div>

        </div>
    </div>

    <script>
    // ═══════════════════════════════════════
    // DHARAVERSE ADMIN LOGIN
    // ═══════════════════════════════════════

    const ADMIN = {
        username: 'rudhveeb@gmail.com',
        password: 'Dhara2026@Admin!'   // ← Change this to your password
    };

    const MAX_ATTEMPTS  = 3;
    const LOCKOUT_TIME  = 5 * 60 * 1000;  // 5 minutes lockout
    const SESSION_HOURS = 24;

    // ── DOM ──
    const form         = document.getElementById('adminLoginForm');
    const usernameEl   = document.getElementById('username');
    const passwordEl   = document.getElementById('password');
    const errorMsg     = document.getElementById('errorMsg');
    const errorText    = document.getElementById('errorText');
    const togglePwd    = document.getElementById('togglePwd');
    const loginBtn     = document.getElementById('loginBtn');
    const attemptsWarn = document.getElementById('attemptsWarn');
    const attemptsLeft = document.getElementById('attemptsLeft');
    const lockedOverlay= document.getElementById('lockedOverlay');
    const loginSection = document.getElementById('loginSection');
    const unlockTimer  = document.getElementById('unlockTimer');

    // ── Already logged in? ──
    if (localStorage.getItem('dv_admin') === 'true') {
        const loginTime = parseInt(localStorage.getItem('dv_admin_time') || '0');
        const elapsed   = Date.now() - loginTime;
        if (elapsed < SESSION_HOURS * 60 * 60 * 1000) {
            window.location.href = '/admin-dashboard.html';
        }
    }

    // ── Check lockout ──
    checkLockout();

    // ── Toggle password visibility ──
    togglePwd.addEventListener('click', () => {
        const isHidden = passwordEl.type === 'password';
        passwordEl.type = isHidden ? 'text' : 'password';
        togglePwd.innerHTML = isHidden
            ? '<i class="fas fa-eye-slash"></i>'
            : '<i class="fas fa-eye"></i>';
    });

    // ── Submit ──
    form.addEventListener('submit', (e) => {
        e.preventDefault();

        const u = usernameEl.value.trim();
        const p = passwordEl.value;

        if (u === ADMIN.username && p === ADMIN.password) {
            // ✅ Success
            localStorage.setItem('dv_admin', 'true');
            localStorage.setItem('dv_admin_time', Date.now().toString());
            localStorage.removeItem('dv_admin_attempts');
            localStorage.removeItem('dv_admin_lockout');

            loginBtn.innerHTML = '<i class="fas fa-check-circle"></i> SUCCESS!';
            loginBtn.style.background = 'linear-gradient(135deg,#4CAF50,#2E7D32)';

            setTimeout(() => {
                window.location.href = '/admin-dashboard.html';
            }, 600);

        } else {
            // ❌ Failed
            handleFailedAttempt();
        }
    });

    // ── Failed attempt handler ──
    function handleFailedAttempt() {
        let attempts = parseInt(localStorage.getItem('dv_admin_attempts') || '0');
        attempts++;
        localStorage.setItem('dv_admin_attempts', attempts.toString());

        const remaining = MAX_ATTEMPTS - attempts;

        if (remaining <= 0) {
            // Lockout
            localStorage.setItem('dv_admin_lockout', Date.now().toString());
            localStorage.setItem('dv_admin_attempts', '0');
            checkLockout();
            return;
        }

        // Show error
        errorText.textContent = `Wrong credentials. ${remaining} attempt${remaining > 1 ? 's' : ''} remaining.`;
        errorMsg.classList.add('show');

        // Show attempts warning
        attemptsWarn.style.display = 'block';
        attemptsLeft.textContent = remaining;

        // Shake
        form.classList.add('shake');
        setTimeout(() => form.classList.remove('shake'), 400);

        // Hide error after 4s
        setTimeout(() => errorMsg.classList.remove('show'), 4000);

        // Clear password
        passwordEl.value = '';
        passwordEl.focus();
    }

    // ── Check lockout ──
    function checkLockout() {
        const lockoutTime = localStorage.getItem('dv_admin_lockout');
        if (!lockoutTime) return;

        const elapsed   = Date.now() - parseInt(lockoutTime);
        const remaining = LOCKOUT_TIME - elapsed;

        if (remaining <= 0) {
            localStorage.removeItem('dv_admin_lockout');
            return;
        }

        // Show locked state
        loginSection.style.display = 'none';
        lockedOverlay.classList.add('show');

        // Countdown
        const countdown = setInterval(() => {
            const r = LOCKOUT_TIME - (Date.now() - parseInt(lockoutTime));
            if (r <= 0) {
                clearInterval(countdown);
                localStorage.removeItem('dv_admin_lockout');
                loginSection.style.display = 'block';
                lockedOverlay.classList.remove('show');
                return;
            }
            const m = Math.floor(r / 60000);
            const s = Math.floor((r % 60000) / 1000);
            unlockTimer.textContent =
                `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }, 1000);
    }
    </script>

</body>
</html>
