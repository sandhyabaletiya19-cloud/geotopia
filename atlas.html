<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Atlas - Geotopia | 200+ Interactive Maps</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-fullscreen@1.0.2/dist/leaflet.fullscreen.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
        }

        /* Header */
        header {
            background: rgba(0, 0, 0, 0.95);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: clamp(18px, 4vw, 28px);
            font-weight: bold;
            background: linear-gradient(45deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: clamp(12px, 2vw, 14px);
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(45deg, #00d4ff, #00ff88);
            color: #000;
        }

        .btn-secondary {
            background: transparent;
            color: #00d4ff;
            border: 2px solid #00d4ff;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        /* Main Container */
        .main-container {
            display: flex;
            height: calc(100vh - 70px);
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 350px;
            background: rgba(0, 0, 0, 0.8);
            overflow-y: auto;
            padding: 20px;
            flex-shrink: 0;
            transition: transform 0.3s;
        }

        .sidebar.hidden {
            transform: translateX(-100%);
            position: absolute;
        }

        .sidebar-toggle {
            display: none;
            position: fixed;
            left: 10px;
            top: 80px;
            z-index: 999;
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
        }

        .search-box {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #333;
            border-radius: 10px;
            background: #1a1a2e;
            color: white;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .search-box:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .search-box::placeholder {
            color: #666;
        }

        /* Categories */
        .category {
            margin-bottom: 15px;
        }

        .category-header {
            background: linear-gradient(90deg, #1a1a2e, transparent);
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
            border-left: 3px solid #00d4ff;
        }

        .category-header:hover {
            background: linear-gradient(90deg, #00d4ff22, transparent);
        }

        .category-header .icon {
            font-size: 20px;
            margin-right: 10px;
        }

        .category-header .arrow {
            transition: transform 0.3s;
        }

        .category.open .arrow {
            transform: rotate(180deg);
        }

        .category-content {
            display: none;
            padding: 10px 0;
        }

        .category.open .category-content {
            display: block;
        }

        .map-item {
            padding: 10px 15px;
            margin: 5px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .map-item:hover {
            background: rgba(0, 212, 255, 0.2);
            transform: translateX(5px);
        }

        .map-item.active {
            background: linear-gradient(90deg, #00d4ff33, transparent);
            border-left: 3px solid #00d4ff;
        }

        .map-item .emoji {
            font-size: 18px;
        }

        /* Map Container */
        .map-container {
            flex: 1;
            position: relative;
            background: #0a0a1a;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Map Controls */
        .map-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 500;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-btn {
            width: 45px;
            height: 45px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00d4ff;
            border-radius: 10px;
            color: #00d4ff;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: #00d4ff;
            color: #000;
        }

        /* Layer Selector */
        .layer-selector {
            position: absolute;
            bottom: 30px;
            left: 20px;
            z-index: 500;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #333;
        }

        .layer-selector h4 {
            margin-bottom: 10px;
            color: #00d4ff;
            font-size: 12px;
            text-transform: uppercase;
        }

        .layer-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .layer-btn {
            padding: 8px 12px;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 6px;
            color: white;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .layer-btn:hover, .layer-btn.active {
            background: #00d4ff;
            color: #000;
            border-color: #00d4ff;
        }

        /* Info Panel */
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 500;
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #00d4ff;
            max-width: 300px;
        }

        .info-panel h3 {
            color: #00d4ff;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .info-panel p {
            font-size: 13px;
            color: #ccc;
            line-height: 1.6;
        }

        .info-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
        }

        /* Coordinates Display */
        .coords-display {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 500;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            color: #00ff88;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #333;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            color: #00d4ff;
            font-size: 16px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 70px;
                height: calc(100vh - 70px);
                z-index: 998;
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-toggle {
                display: block;
            }

            .main-container {
                flex-direction: column;
            }

            .map-container {
                height: calc(100vh - 70px);
            }

            .info-panel {
                max-width: calc(100% - 80px);
                font-size: 12px;
            }

            .layer-selector {
                bottom: 80px;
                left: 10px;
                right: 10px;
                max-width: none;
            }

            .coords-display {
                bottom: 10px;
                right: 10px;
                font-size: 10px;
            }
        }

        @media (max-width: 480px) {
            .sidebar {
                width: 280px;
            }

            .map-controls {
                top: 10px;
                right: 10px;
            }

            .control-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
        }

        /* Custom Leaflet Styles */
        .leaflet-control-zoom {
            border: none !important;
        }

        .leaflet-control-zoom a {
            background: rgba(0, 0, 0, 0.8) !important;
            color: #00d4ff !important;
            border: 2px solid #00d4ff !important;
        }

        .leaflet-control-zoom a:hover {
            background: #00d4ff !important;
            color: #000 !important;
        }

        .leaflet-popup-content-wrapper {
            background: rgba(0, 0, 0, 0.9);
            color: white;
            border: 2px solid #00d4ff;
            border-radius: 10px;
        }

        .leaflet-popup-tip {
            background: #00d4ff;
        }

        .leaflet-popup-content {
            margin: 15px;
        }

        .leaflet-popup-content h4 {
            color: #00d4ff;
            margin-bottom: 5px;
        }

        /* Marker Clusters */
        .marker-cluster {
            background: rgba(0, 212, 255, 0.6);
            border: 2px solid #00d4ff;
        }

        .marker-cluster div {
            background: rgba(0, 212, 255, 0.9);
            color: #000;
            font-weight: bold;
        }
    </style>
</head>

            <div class="logo">🌍 GEOTOPIA WORLD ATLAS</div>
            <div class="header-buttons">
                <a href="index.html" class="btn btn-secondary">← Home</a>
                <button class="btn btn-primary" onclick="resetMap()">🔄 Reset View</button>
            </div>
        </div>
    </header>

    <!-- Sidebar Toggle for Mobile -->
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

    <!-- Main Container -->
    <div class="main-container">
        
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 Search 200+ maps...">
            
            <div id="categoriesContainer">
                <!-- Categories will be loaded dynamically -->
            </div>
        </div>

        <!-- Map Container -->
        <div class="map-container">
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <div class="loading-text">Loading Map...</div>
            </div>

            <!-- The Map -->
            <div id="map"></div>

            <!-- Info Panel -->
            <div class="info-panel" id="infoPanel">
                <button class="info-close" onclick="closeInfoPanel()">×</button>
                <h3 id="infoPanelTitle">🌍 World Atlas</h3>
                <p id="infoPanelDesc">Welcome to Geotopia's Interactive World Atlas! Select any map from the sidebar to explore. Use mouse/touch to pan and zoom.</p>
            </div>

            <!-- Map Controls -->
            <div class="map-controls">
                <button class="control-btn" onclick="zoomIn()" title="Zoom In">+</button>
                <button class="control-btn" onclick="zoomOut()" title="Zoom Out">−</button>
                <button class="control-btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
                <button class="control-btn" onclick="locateUser()" title="My Location">📍</button>
                <button class="control-btn" onclick="takeScreenshot()" title="Screenshot">📷</button>
            </div>

            <!-- Layer Selector -->
            <div class="layer-selector">
                <h4>🗺️ Map Style</h4>
                <div class="layer-options">
                    <button class="layer-btn active" onclick="changeLayer('street')">Street</button>
                    <button class="layer-btn" onclick="changeLayer('satellite')">Satellite</button>
                    <button class="layer-btn" onclick="changeLayer('terrain')">Terrain</button>
                    <button class="layer-btn" onclick="changeLayer('dark')">Dark</button>
                    <button class="layer-btn" onclick="changeLayer('topo')">Topo</button>
                </div>
            </div>

            <!-- Coordinates Display -->
            <div class="coords-display" id="coordsDisplay">
                Lat: 0.0000 | Lng: 0.0000 | Zoom: 2
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->

                maxZoom: 19
            }),
            topo: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
                attribution: '© Esri',
                maxZoom: 19
            })
        };

        // Initialize Map
        function initMap() {
            map = L.map('map', {
                center: [20, 0],
                zoom: 2,
                zoomControl: false,
                minZoom: 2,
                maxZoom: 19,
                worldCopyJump: true
            });

            // Add default layer
            currentLayer = tileLayers.street;
            currentLayer.addTo(map);

            // Add zoom control to bottom right
            L.control.zoom({ position: 'bottomright' }).addTo(map);

            // Update coordinates on mouse move
            map.on('mousemove', function(e) {
                updateCoords(e.latlng.lat, e.latlng.lng, map.getZoom());
            });

            map.on('zoomend', function() {
                const center = map.getCenter();
                updateCoords(center.lat, center.lng, map.getZoom());
            });

            // Hide loading
            document.getElementById('loadingOverlay').classList.add('hidden');

            // Load categories
            loadCategories();
        }

        // Update Coordinates Display
        function updateCoords(lat, lng, zoom) {
            document.getElementById('coordsDisplay').textContent = 
                `Lat: ${lat.toFixed(4)} | Lng: ${lng.toFixed(4)} | Zoom: ${zoom}`;
        }

        // ==================== CATEGORY LOADING ====================
        function loadCategories() {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = '';

            for (const [key, category] of Object.entries(mapsDatabase)) {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';
                categoryDiv.innerHTML = `
                    <div class="category-header" onclick="toggleCategory(this)">
                        <span><span class="icon">${category.icon}</span> ${category.name}</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="category-content">
                        ${category.maps.map(m => `
                            <div class="map-item" onclick="loadMap(${m.id}, '${key}')">
                                <span class="emoji">${m.icon}</span>
                                <span>${m.name}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(categoryDiv);
            }
        }

        function toggleCategory(header) {
            const category = header.parentElement;
            category.classList.toggle('open');
        }

        // ==================== MAP LOADING ====================
        function loadMap(mapId, categoryKey) {
            const category = mapsDatabase[categoryKey];
            const mapData = category.maps.find(m => m.id === mapId);

            if (!mapData) return;

            // Show loading
            document.getElementById('loadingOverlay').classList.remove('hidden');

            // Clear existing markers
            markers.forEach(marker => map.removeLayer(marker));
            markers = [];

            // Fly to location
            map.flyTo([mapData.lat, mapData.lng], mapData.zoom, {
                duration: 1.5
            });

            // Add marker
            const marker = L.marker([mapData.lat, mapData.lng])
                .addTo(map)
                .bindPopup(`<h4>${mapData.icon} ${mapData.name}</h4><p>${mapData.desc}</p>`)
                .openPopup();
            markers.push(marker);

            // Update info panel
            document.getElementById('infoPanelTitle').textContent = `${mapData.icon} ${mapData.name}`;
            document.getElementById('infoPanelDesc').textContent = mapData.desc;

            // Update active state in sidebar
            document.querySelectorAll('.map-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.map-item').classList.add('active');

            // Hide loading after animation
            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }, 1500);

            // Close sidebar on mobile
            if (window.innerWidth <= 900) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }

        // ==================== LAYER SWITCHING ====================
        function changeLayer(layerName) {
            map.removeLayer(currentLayer);
            currentLayer = tileLayers[layerName];
            currentLayer.addTo(map);

            // Update active button
            document.querySelectorAll('.layer-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        // ==================== CONTROLS ====================
        function zoomIn() {
            map.zoomIn();
        }

        function zoomOut() {
            map.zoomOut();
        }

        function resetMap() {
            map.setView([20, 0], 2);
            markers.forEach(marker => map.removeLayer(marker));
            markers = [];
            document.getElementById('infoPanelTitle').textContent = '🌍 World Atlas';
            document.getElementById('infoPanelDesc').textContent = 'Welcome to Geotopia\'s Interactive World Atlas! Select any map from the sidebar to explore.';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function locateUser() {
            if (navigator.geolocation) {
                document.getElementById('loadingOverlay').classList.remove('hidden');
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        map.flyTo([lat, lng], 14);

                        const marker = L.marker([lat, lng])
                            .addTo(map)
                            .bindPopup('<h4>📍 You are here!</h4>')
                            .openPopup();
                        markers.push(marker);

                        document.getElementById('loadingOverlay').classList.add('hidden');
                    },
                    function(error) {
                        alert('Could not get your location. Please enable GPS.');
                        document.getElementById('loadingOverlay').classList.add('hidden');
                    }
                );
            } else {
                alert('Geolocation is not supported by your browser.');
            }
        }

        function takeScreenshot() {
            alert('📷 Screenshot feature: Press Ctrl+Shift+S (Windows) or Cmd+Shift+4 (Mac) to capture the screen.');
        }

        function closeInfoPanel() {
            document.getElementById('infoPanel').style.display = 'none';
        }

        // ==================== SEARCH ====================
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            
            document.querySelectorAll('.category').forEach(category => {
                let hasMatch = false;
                category.querySelectorAll('.map-item').forEach(item => {
                    const text = item.textContent.toLowerCase();
                    if (text.includes(searchTerm)) {
                        item.style.display = 'flex';
                        hasMatch = true;
                    } else {
                        item.style.display = 'none';
                    }
                });
                
                if (hasMatch) {
                    category.classList.add('open');
                    category.style.display = 'block';
                } else if (searchTerm) {
                    category.style.display = 'none';
                } else {
                    category.style.display = 'block';
                    category.classList.remove('open');
                }
            });
        });

        // ==================== SIDEBAR TOGGLE ====================
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // ==================== INITIALIZE ====================
        document.addEventListener('DOMContentLoaded', initMap);

        // Handle resize
        window.addEventListener('resize', function() {
            map.invalidateSize();
        });
    </script>

</body>
</html>
