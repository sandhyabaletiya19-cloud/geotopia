<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - DharaVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="/logo.png">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg,#0a0a1a 0%,#1a1a3e 50%,#0d0d2b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 620px;
            width: 100%;
        }

        /* Success Circle */
        .success-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: linear-gradient(135deg,#4CAF50,#2E7D32);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 0 60px rgba(76,175,80,0.35);
            animation: popIn 0.6s cubic-bezier(0.68,-0.55,0.27,1.55);
        }

        .success-circle i { font-size:56px; color:#fff; animation: checkIn 0.4s ease 0.4s both; }

        @keyframes popIn {
            from { transform: scale(0) rotate(-180deg); }
            to   { transform: scale(1) rotate(0deg); }
        }

        @keyframes checkIn {
            from { transform:scale(0); opacity:0; }
            50%  { transform:scale(1.3); }
            to   { transform:scale(1); opacity:1; }
        }

        h1 { font-size: clamp(30px,5vw,44px); font-weight:800; margin-bottom:12px; }

        h1 span {
            background: linear-gradient(135deg,#FFD700,#FFA500);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
        }

        .msg {
            font-size:16px;
            color:rgba(255,255,255,0.7);
            margin-bottom:25px;
            line-height:1.7;
        }

        /* Plan Badge */
        .plan-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            background: linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,215,0,0.08));
            border: 1px solid rgba(255,215,0,0.4);
            border-radius: 50px;
            font-size:16px;
            font-weight:700;
            color:#FFD700;
            margin-bottom:28px;
            animation: fadeUp 0.5s ease 0.6s both;
        }

        @keyframes fadeUp {
            from { transform:translateY(20px); opacity:0; }
            to   { transform:translateY(0); opacity:1; }
        }

        /* Receipt Card */
        .receipt-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 25px;
            text-align: left;
            animation: fadeUp 0.5s ease 0.8s both;
        }

        .receipt-card h3 {
            font-size:13px;
            font-weight:700;
            color:rgba(255,255,255,0.4);
            text-transform:uppercase;
            letter-spacing:2px;
            margin-bottom:18px;
        }

        .receipt-row {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:11px 0;
            border-bottom:1px solid rgba(255,255,255,0.06);
        }

        .receipt-row:last-child {
            border-bottom:none;
            border-top:1px solid rgba(255,255,255,0.15);
            margin-top:6px;
            padding-top:14px;
        }

        .r-label { font-size:13px; color:rgba(255,255,255,0.5); }
        .r-value { font-size:13px; font-weight:600; }
        .r-value.total { font-size:22px; color:#4CAF50; }

        /* Features Unlocked */
        .features-box {
            background: rgba(76,175,80,0.08);
            border: 1px solid rgba(76,175,80,0.2);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 28px;
            text-align: left;
            animation: fadeUp 0.5s ease 1s both;
        }

        .features-box h3 {
            font-size:14px;
            font-weight:700;
            color:#4CAF50;
            margin-bottom:14px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(170px,1fr));
            gap: 10px;
        }

        .feat-item {
            display:flex;
            align-items:center;
            gap:8px;
            font-size:13px;
            color:rgba(255,255,255,0.8);
        }

        .feat-item i { color:#4CAF50; font-size:12px; }

        /* Buttons */
        .btns {
            display:flex;
            gap:14px;
            justify-content:center;
            flex-wrap:wrap;
            animation: fadeUp 0.5s ease 1.2s both;
        }

        .btn {
            padding:15px 32px;
            border-radius:12px;
            font-size:15px;
            font-weight:700;
            text-decoration:none;
            display:inline-flex;
            align-items:center;
            gap:8px;
            transition:all 0.3s;
            font-family:'Inter',sans-serif;
        }

        .btn:hover { transform:translateY(-3px); box-shadow:0 10px 30px rgba(0,0,0,0.3); }

        .btn-home { background:linear-gradient(135deg,#FFD700,#FFA500); color:#0a0a1a; }
        .btn-play { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#fff; }

        /* Confetti */
        .confetti {
            position:fixed;
            border-radius:2px;
            animation:fall linear infinite;
            pointer-events:none;
        }

        @keyframes fall {
            0%   { transform:translateY(-100vh) rotate(0deg); opacity:1; }
            100% { transform:translateY(100vh)  rotate(720deg); opacity:0; }
        }

        @media(max-width:480px) {
            .btn { width:100%; justify-content:center; }
            .btns { flex-direction:column; }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="success-circle">
        <i class="fas fa-check"></i>
    </div>

    <h1>Payment <span>Successful!</span></h1>

    <p class="msg">
        Welcome to DharaVerse Premium! 🎉<br>
        Your plan is now active. Everything's unlocked and ready.
    </p>

    <div class="plan-badge">
        <i class="fas fa-crown"></i>
        <span id="planName">Premium Member</span>
    </div>

    <!-- Receipt -->
    <div class="receipt-card">
        <h3>📄 Payment Receipt</h3>
        <div class="receipt-row">
            <span class="r-label">Plan</span>
            <span class="r-value" id="rPlan">—</span>
        </div>
        <div class="receipt-row">
            <span class="r-label">Payment ID</span>
            <span class="r-value" id="rId" style="font-size:11px; word-break:break-all;">—</span>
        </div>
        <div class="receipt-row">
            <span class="r-label">Date</span>
            <span class="r-value" id="rDate">—</span>
        </div>
        <div class="receipt-row">
            <span class="r-label">Amount Paid</span>
            <span class="r-value total" id="rAmount">—</span>
        </div>
    </div>

    <!-- Features Unlocked -->
    <div class="features-box">
        <h3>🔓 What's Now Unlocked</h3>
        <div class="features-grid" id="featsGrid"></div>
    </div>

    <!-- Buttons -->
    <div class="btns">
        <a href="/" class="btn btn-home">
            <i class="fas fa-home"></i> Go to Home
        </a>
        <a href="/games/games.html" class="btn btn-play">
            <i class="fas fa-gamepad"></i> Start Playing
        </a>
    </div>

</div>

<script>
    const params  = new URLSearchParams(window.location.search);
    const plan    = params.get('plan');
    const payId   = params.get('id');
    const amount  = params.get('amount');

    const PLAN_DATA = {
        games: {
            name: '🎮 Games Plan',
            feats: ['All games unlocked','Map Quiz unlimited','Flag Quiz unlimited','Capital Quiz unlimited','Spin Globe unlimited','All future games']
        },
        upsc: {
            name: '📚 UPSC Plan',
            feats: ['All UPSC topics','Geography notes','Practice questions','Previous year topics','Revision material','Basic features included']
        },
        pro: {
            name: '⭐ Pro Plan',
            feats: ['All games unlocked','Full encyclopedia','All landscapes','Full atlas','All countries explorer','Full Bharat section','Ad-free experience']
        },
        ultimate: {
            name: '👑 Ultimate Plan',
            feats: ['EVERYTHING unlocked','All games','All UPSC content','Full encyclopedia','All landscapes','Full atlas','Ad-free','Priority support']
        }
    };

    if (plan && PLAN_DATA[plan]) {
        const data = PLAN_DATA[plan];

        document.getElementById('planName').textContent = data.name;
        document.getElementById('rPlan').textContent    = data.name;
        document.getElementById('rId').textContent      = payId   || 'N/A';
        document.getElementById('rDate').textContent    = new Date().toLocaleDateString('en-IN',{year:'numeric',month:'long',day:'numeric'});
        document.getElementById('rAmount').textContent  = amount  ? `₹${parseInt(amount).toLocaleString('en-IN')}` : '—';

        const grid = document.getElementById('featsGrid');
        data.feats.forEach(f => {
            grid.innerHTML += `<div class="feat-item"><i class="fas fa-check-circle"></i><span>${f}</span></div>`;
        });
    }

    // ── CONFETTI ──
    const colors = ['#FFD700','#FFA500','#FF6B6B','#4CAF50','#87CEEB','#8B5CF6','#EC4899'];
    for (let i = 0; i < 70; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        const size = 6 + Math.random() * 8;
        Object.assign(c.style, {
            left:              Math.random() * 100 + 'vw',
            width:             size + 'px',
            height:            size + 'px',
            background:        colors[Math.floor(Math.random() * colors.length)],
            animationDuration: (3 + Math.random() * 3) + 's',
            animationDelay:    Math.random() * 4 + 's',
            borderRadius:      Math.random() > 0.5 ? '50%' : '2px'
        });
        document.body.appendChild(c);
    }

    // Stop confetti after 7s
    setTimeout(() => {
        document.querySelectorAll('.confetti').forEach(c => c.style.animationPlayState = 'paused');
    }, 7000);
</script>

</body>
</html>
