<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - GEOTOPIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d0d2b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .success-container {
            text-align: center;
            max-width: 600px;
            padding: 50px;
        }

        .success-icon {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 40px;
            animation: scaleIn 0.5s ease;
        }

        .success-icon i {
            font-size: 70px;
            color: #fff;
            animation: checkmark 0.5s ease 0.3s both;
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        @keyframes checkmark {
            from { transform: scale(0) rotate(-45deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        h1 span {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            line-height: 1.7;
        }

        .plan-badge {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.1));
            border: 1px solid #FFD700;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            color: #FFD700;
            margin-bottom: 40px;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 16px 40px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #0a0a1a;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #FFD700;
            animation: confetti-fall 3s linear infinite;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>
        <h1>Payment <span>Successful!</span></h1>
        <p>Welcome to GEOTOPIA Premium! 🎉<br>Your subscription is now active. Explore all the premium features and start your geography learning journey.</p>
        <div class="plan-badge" id="planBadge">
            <i class="fas fa-crown"></i> Premium Member
        </div>
        <div class="action-buttons">
            <a href="index.html" class="btn btn-primary">
                <i class="fas fa-home"></i> Go to Home
            </a>
            <a href="dashboard.html" class="btn btn-secondary">
                <i class="fas fa-th-large"></i> My Dashboard
            </a>
        </div>
    </div>

    <script>
        // Get plan from URL
        const urlParams = new URLSearchParams(window.location.search);
        const plan = urlParams.get('plan');
        
        if (plan) {
            const planNames = {
                monthly: 'Monthly Plan',
                biannual: '6 Months Plan',
                yearly: 'Yearly Plan',
                launch: 'Founding Member'
            };
            document.getElementById('planBadge').innerHTML = 
                `<i class="fas fa-crown"></i> ${planNames[plan] || 'Premium Member'}`;
        }

        // Create confetti
        for (let i = 0; i < 50; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.animationDelay = Math.random() * 3 + 's';
            confetti.style.background = ['#FFD700', '#FFA500', '#FF6B6B', '#4CAF50', '#87CEEB'][Math.floor(Math.random() * 5)];
            document.body.appendChild(confetti);
        }
    </script>
</body>
</html>
