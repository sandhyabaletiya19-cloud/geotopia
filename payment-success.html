<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - DharaVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="/logo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d0d2b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }

        .success-container {
            text-align: center;
            max-width: 650px;
            width: 100%;
        }

        /* Success Animation */
        .success-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 35px;
            animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            box-shadow: 0 0 60px rgba(76, 175, 80, 0.3);
        }

        .success-circle i {
            font-size: 60px;
            color: #fff;
            animation: checkDraw 0.4s ease 0.4s both;
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-180deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        @keyframes checkDraw {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-size: clamp(32px, 5vw, 46px);
            font-weight: 800;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        h1 span {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .success-message {
            font-size: 17px;
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 30px;
            line-height: 1.7;
        }

        /* Plan Badge */
        .plan-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 215, 0, 0.08));
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 50px;
            font-size: 17px;
            font-weight: 700;
            color: #FFD700;
            margin-bottom: 30px;
            animation: fadeUp 0.5s ease 0.6s both;
        }

        @keyframes fadeUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Receipt Card */
        .receipt-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 35px;
            text-align: left;
            animation: fadeUp 0.5s ease 0.8s both;
        }

        .receipt-card h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .receipt-row:last-child {
            border-bottom: none;
            padding-top: 15px;
            margin-top: 5px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
        }

        .receipt-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .receipt-value {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .receipt-value.total {
            font-size: 20px;
            color: #4CAF50;
        }

        /* Features Unlocked */
        .features-unlocked {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.2);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 35px;
            animation: fadeUp 0.5s ease 1s both;
        }

        .features-unlocked h3 {
            font-size: 16px;
            font-weight: 700;
            color: #4CAF50;
            margin-bottom: 15px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .feature-item i {
            color: #4CAF50;
        }

        /* Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeUp 0.5s ease 1.2s both;
        }

        .btn {
            padding: 16px 36px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #0a0a1a;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confetti-fall 4s linear infinite;
            pointer-events: none;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 480px) {
            .success-container { padding: 10px; }
            .receipt-card { padding: 20px; }
            .btn { padding: 14px 28px; font-size: 14px; width: 100%; justify-content: center; }
            .action-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="success-container">

        <div class="success-circle">
            <i class="fas fa-check"></i>
        </div>

        <h1>Payment <span>Successful!</span></h1>

        <p class="success-message">
            Welcome to DharaVerse Premium! 🎉<br>
            Your plan is now active. Start exploring everything!
        </p>

        <div class="plan-badge" id="planBadge">
            <i class="fas fa-crown"></i>
            <span id="planName">Premium Member</span>
        </div>

        <!-- Receipt -->
        <div class="receipt-card">
            <h3>📄 Payment Receipt</h3>
            <div class="receipt-row">
                <span class="receipt-label">Plan</span>
                <span class="receipt-value" id="receiptPlan">—</span>
            </div>
            <div class="receipt-row">
                <span class="receipt-label">Payment ID</span>
                <span class="receipt-value" id="receiptId">—</span>
            </div>
            <div class="receipt-row">
                <span class="receipt-label">Date</span>
                <span class="receipt-value" id="receiptDate">—</span>
            </div>
            <div class="receipt-row">
                <span class="receipt-label">Amount Paid</span>
                <span class="receipt-value total" id="receiptAmount">—</span>
            </div>
        </div>

        <!-- Features Unlocked -->
        <div class="features-unlocked">
            <h3>🔓 Features Unlocked</h3>
            <div class="features-grid" id="featuresGrid">
                <!-- Filled by JS -->
            </div>
        </div>

        <!-- Buttons -->
        <div class="action-buttons">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i> Go to Home
            </a>
            <a href="/games/games.html" class="btn btn-secondary">
                <i class="fas fa-gamepad"></i> Start Playing
            </a>
        </div>

    </div>

    <script>
        // ===== GET URL PARAMS =====
        const urlParams = new URLSearchParams(window.location.search);
        const plan = urlParams.get('plan');
        const paymentId = urlParams.get('id');
        const amount = urlParams.get('amount');

        // ===== PLAN CONFIG =====
        const planConfig = {
            games: {
                name: '🎮 Games Plan',
                features: ['All games unlimited', 'Map Quiz', 'Flag Quiz', 'Capital Quiz', 'Spin Globe', 'Future games']
            },
            upsc: {
                name: '📚 UPSC Plan',
                features: ['All UPSC content', 'Geography notes', 'Practice questions', 'Previous year topics', 'Revision material']
            },
            pro: {
                name: '⭐ Pro Plan',
                features: ['All games unlimited', 'Full encyclopedia', 'All landscapes', 'All continents', 'Full atlas', 'Ad-free']
            },
            ultimate: {
                name: '👑 Ultimate Plan',
                features: ['Everything in Pro', 'All UPSC content', 'All games', 'Full encyclopedia', 'Ad-free', 'Priority support', 'Everything unlocked']
            }
        };

        // ===== FILL RECEIPT =====
        if (plan && planConfig[plan]) {
            const config = planConfig[plan];

            // Plan badge
            document.getElementById('planName').textContent = config.name;

            // Receipt
            document.getElementById('receiptPlan').textContent = config.name;
            document.getElementById('receiptId').textContent = paymentId || 'N/A';
            document.getElementById('receiptDate').textContent = new Date().toLocaleDateString('en-IN', {
                year: 'numeric', month: 'long', day: 'numeric'
            });
            document.getElementById('receiptAmount').textContent = amount ? `₹${parseInt(amount).toLocaleString()}` : 'N/A';

            // Features
            const featuresGrid = document.getElementById('featuresGrid');
            config.features.forEach(feature => {
                featuresGrid.innerHTML += `
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>${feature}</span>
                    </div>
                `;
            });
        }

        // ===== CONFETTI =====
        const confettiColors = ['#FFD700', '#FFA500', '#FF6B6B', '#4CAF50', '#87CEEB', '#8B5CF6', '#EC4899'];
        for (let i = 0; i < 60; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.animationDelay = Math.random() * 4 + 's';
            confetti.style.animationDuration = (3 + Math.random() * 3) + 's';
            confetti.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
            confetti.style.width = (6 + Math.random() * 8) + 'px';
            confetti.style.height = (6 + Math.random() * 8) + 'px';
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            document.body.appendChild(confetti);
        }

        // Stop confetti after 6 seconds
        setTimeout(() => {
            document.querySelectorAll('.confetti').forEach(c => c.style.animationPlayState = 'paused');
        }, 6000);
    </script>

</body>
</html>
