<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - DharaVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="/logo.png">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        :root {
            --bg: #0a0a14;
            --bg2: #13132a;
            --purple: #6441A5;
            --purple-light: #9B59B6;
            --purple-dark: #4A2D7A;
            --purple-glow: rgba(100,65,165,0.3);
            --pink: #D63384;
            --text: #ffffff;
            --text2: rgba(255,255,255,0.65);
            --text3: rgba(255,255,255,0.35);
            --border: rgba(255,255,255,0.08);
            --card: rgba(255,255,255,0.04);
        }

       body {
    font-family: 'Inter', sans-serif;
    background: #0a0a14;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;      /* ← only hide horizontal scroll */
    overflow-y: auto;        /* ← allow vertical scroll */
    position: relative;
    padding: 20px 0;         /* ← breathing room top & bottom */
}
        /* BG Effects */
        .bg-glow-1 {
            position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, var(--purple-glow), transparent 70%);
            top: -150px; left: -100px;
            pointer-events: none;
        }

        .bg-glow-2 {
            position: fixed;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(214,51,132,0.12), transparent 70%);
            bottom: -100px; right: -100px;
            pointer-events: none;
        }

        .bg-stars {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.15), transparent),
                              radial-gradient(1px 1px at 80px 60px, rgba(255,255,255,0.1), transparent),
                              radial-gradient(1px 1px at 130px 120px, rgba(255,255,255,0.12), transparent),
                              radial-gradient(1px 1px at 200px 80px, rgba(255,255,255,0.08), transparent);
            background-size: 250px 250px;
            pointer-events: none;
        }

        /* Main Container */
       .auth-container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 460px;
    padding: 20px;           /* ← padding all sides */
    margin: auto;            /* ← center properly */
}

        .auth-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 44px 38px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    overflow-y: auto;        /* ← allow card to scroll */
    max-height: 90vh;        /* ← limit height on small screens */
}

        /* Header */
        .auth-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .auth-logo {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 18px;
            box-shadow: 0 0 40px var(--purple-glow);
        }

        .auth-header h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .auth-header h1 span {
            background: linear-gradient(135deg, var(--purple-light), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-header p {
            font-size: 14px;
            color: var(--text2);
        }

        /* Tab Toggle */
        .auth-tabs {
            display: flex;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
            border: 1px solid var(--border);
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--text3);
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .auth-tab.active {
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            color: #fff;
            box-shadow: 0 4px 16px var(--purple-glow);
        }

        /* Forms */
        .auth-form { display: none; }
        .auth-form.active { display: block; }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 7px;
        }

        .input-box {
            position: relative;
        }

        .input-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text3);
            font-size: 15px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 14px 14px 42px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            outline: none;
            -webkit-appearance: none;
        }

        .form-group select {
            cursor: pointer;
            padding-right: 40px;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--purple);
            background: rgba(100,65,165,0.08);
            box-shadow: 0 0 0 3px rgba(100,65,165,0.15);
        }

        .form-group input::placeholder {
            color: rgba(255,255,255,0.2);
        }

        .form-group select option {
            background: #1a1a2e;
            color: #fff;
        }

        .toggle-pwd {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text3);
            cursor: pointer;
            font-size: 15px;
            padding: 0;
        }

        /* Region Flag */
        .region-info {
            display: none;
            padding: 10px 14px;
            background: rgba(100,65,165,0.1);
            border: 1px solid rgba(100,65,165,0.2);
            border-radius: 10px;
            margin-top: 8px;
            font-size: 12px;
            color: var(--text2);
        }

        .region-info.show { display: flex; align-items: center; gap: 8px; }

        .region-info i { color: var(--purple-light); }

        /* Error */
        .auth-error {
            display: none;
            padding: 10px 14px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px;
            color: #EF4444;
            font-size: 13px;
            margin-bottom: 16px;
            align-items: center;
            gap: 8px;
        }

        .auth-error.show { display: flex; }

        /* Submit Button */
        .auth-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 6px;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px var(--purple-glow);
        }

        /* Divider */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: var(--text3);
            font-size: 12px;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Footer */
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .auth-footer p {
            font-size: 12px;
            color: var(--text3);
            margin-bottom: 8px;
        }

        .auth-footer a {
            color: var(--purple-light);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        .auth-footer a:hover { text-decoration: underline; }

        /* Terms */
        .terms-text {
            font-size: 11px;
            color: var(--text3);
            text-align: center;
            margin-top: 16px;
            line-height: 1.6;
        }

        .terms-text a {
            color: var(--purple-light);
            text-decoration: none;
        }

        @keyframes shake {
            0%,100% { transform:translateX(0); }
            15%,45%,75% { transform:translateX(-5px); }
            30%,60%,90% { transform:translateX(5px); }
        }

        .shake { animation: shake 0.4s ease; }

        @media(max-width:480px) {
            .auth-card { padding: 32px 22px; }
        }

        /* ── MOBILE SCROLL FIX ── */
@media (max-height: 700px) {
    body {
        align-items: flex-start;  /* ← don't center on short screens */
        padding: 20px;
    }

    .auth-card {
        padding: 28px 22px;       /* ← smaller padding on short screens */
    }
}
        
    </style>
</head>
<body>

<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>
<div class="bg-stars"></div>

<div class="auth-container">
    <div class="auth-card">

        <div class="auth-header">
            <div class="auth-logo">🌍</div>
            <h1>Welcome to <span>DharaVerse</span></h1>
            <p>Sign in to unlock premium geography content</p>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchTab('login')">Sign In</div>
            <div class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
        </div>

        <!-- Error -->
        <div class="auth-error" id="authError">
            <i class="fas fa-exclamation-circle"></i>
            <span id="authErrorText"></span>
        </div>

        <!-- ══ LOGIN FORM ══ -->
        <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">

            <div class="form-group">
                <label>Email</label>
                <div class="input-box">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="your@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-box">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Enter password" required>
                    <button type="button" class="toggle-pwd" onclick="togglePassword('loginPassword', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="auth-btn">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>

        </form>

        <!-- ══ SIGNUP FORM ══ -->
        <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)">

            <div class="form-group">
                <label>Full Name</label>
                <div class="input-box">
                    <i class="fas fa-user"></i>
                    <input type="text" id="signupName" placeholder="Your full name" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <div class="input-box">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="signupEmail" placeholder="your@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <div class="input-box">
                    <i class="fas fa-phone"></i>
                    <input type="tel" id="signupPhone" placeholder="+91 XXXXX XXXXX" required>
                </div>
            </div>

            <div class="form-group">
                <label>Your Region</label>
                <div class="input-box">
                    <i class="fas fa-globe"></i>
                    <select id="signupRegion" onchange="onRegionChange()" required>
                        <option value="" disabled selected>Select your country</option>
                        <option value="IN">🇮🇳 India</option>
                        <option value="US">🇺🇸 United States</option>
                        <option value="GB">🇬🇧 United Kingdom</option>
                        <option value="CA">🇨🇦 Canada</option>
                        <option value="AU">🇦🇺 Australia</option>
                        <option value="DE">🇩🇪 Germany</option>
                        <option value="FR">🇫🇷 France</option>
                        <option value="JP">🇯🇵 Japan</option>
                        <option value="KR">🇰🇷 South Korea</option>
                        <option value="BR">🇧🇷 Brazil</option>
                        <option value="AE">🇦🇪 UAE</option>
                        <option value="SG">🇸🇬 Singapore</option>
                        <option value="MY">🇲🇾 Malaysia</option>
                        <option value="NP">🇳🇵 Nepal</option>
                        <option value="LK">🇱🇰 Sri Lanka</option>
                        <option value="BD">🇧🇩 Bangladesh</option>
                        <option value="PK">🇵🇰 Pakistan</option>
                        <option value="ZA">🇿🇦 South Africa</option>
                        <option value="NG">🇳🇬 Nigeria</option>
                        <option value="KE">🇰🇪 Kenya</option>
                        <option value="OTHER">🌍 Other Country</option>
                    </select>
                </div>
                <div class="region-info" id="regionInfo">
                    <i class="fas fa-info-circle"></i>
                    <span id="regionInfoText"></span>
                </div>
            </div>

            <div class="form-group">
                <label>Create Password</label>
                <div class="input-box">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="signupPassword" placeholder="Min 6 characters" minlength="6" required>
                    <button type="button" class="toggle-pwd" onclick="togglePassword('signupPassword', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="auth-btn">
                <i class="fas fa-user-plus"></i> Create Account
            </button>

            <p class="terms-text">
                By signing up you agree to our
                <a href="/legal/terms-and-conditions.html">Terms</a> &
                <a href="/legal/privacy-policy.html">Privacy Policy</a>
            </p>

        </form>

        <div class="auth-footer">
            <p>🌍 DharaVerse — Your Gateway to Global Geography</p>
            <a href="/">← Back to Home</a>
        </div>

    </div>
</div>

<script src="/js/auth.js"></script>

</body>
</html>
