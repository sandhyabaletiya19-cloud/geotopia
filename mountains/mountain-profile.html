<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mountain Profile | Mountain Systems Explorer</title>
    <link rel="stylesheet" href="mountains-styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="profile-page">
    <!-- Full Screen Background -->
    <div class="profile-background" id="profile-background">
        <img src="" alt="" id="bg-image">
        <div class="bg-overlay"></div>
    </div>

    <!-- Navigation -->
    <nav class="profile-nav">
        <a href="mountains.html" class="back-link">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Mountains</span>
        </a>
        <div class="nav-center">
            <h1 id="mountain-name">Loading...</h1>
        </div>
        <div class="nav-actions">
            <button class="action-btn" id="flyover-btn" title="Fly Over">
                <i class="fas fa-plane"></i>
            </button>
            <button class="action-btn" id="fullscreen-btn" title="Fullscreen">
                <i class="fas fa-expand"></i>
            </button>
            <button class="action-btn" id="share-btn" title="Share">
                <i class="fas fa-share-alt"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="profile-main">
        <!-- Interactive Map Section -->
        <section class="map-section">
            <div class="map-wrapper">
                <div id="mountain-map"></div>
                <div class="map-controls">
                    <button class="map-control-btn" id="toggle-peaks" title="Toggle Peaks">
                        <i class="fas fa-mountain"></i>
                    </button>
                    <button class="map-control-btn" id="toggle-glaciers" title="Toggle Glaciers">
                        <i class="fas fa-snowflake"></i>
                    </button>
                    <button class="map-control-btn" id="toggle-rivers" title="Toggle Rivers">
                        <i class="fas fa-water"></i>
                    </button>
                    <button class="map-control-btn" id="toggle-passes" title="Toggle Passes">
                        <i class="fas fa-road"></i>
                    </button>
                    <button class="map-control-btn" id="toggle-cities" title="Toggle Cities">
                        <i class="fas fa-city"></i>
                    </button>
                    <div class="map-control-divider"></div>
                    <button class="map-control-btn" id="terrain-view" title="Terrain View">
                        <i class="fas fa-layer-group"></i>
                    </button>
                    <button class="map-control-btn" id="satellite-view" title="Satellite View">
                        <i class="fas fa-satellite"></i>
                    </button>
                </div>
                <div class="map-info-panel" id="map-info-panel">
                    <button class="close-panel"><i class="fas fa-times"></i></button>
                    <div class="panel-content" id="panel-content"></div>
                </div>
            </div>
        </section>

        <!-- Mind Map Data Section -->
        <section class="mindmap-section">
            <div class="mindmap-header">
                <h2><i class="fas fa-project-diagram"></i> Mountain Data Explorer</h2>
                <div class="mindmap-controls">
                    <button class="expand-all-btn">
                        <i class="fas fa-expand-arrows-alt"></i>
                        Expand All
                    </button>
                    <button class="collapse-all-btn">
                        <i class="fas fa-compress-arrows-alt"></i>
                        Collapse All
                    </button>
                </div>
            </div>
            <div class="mindmap-container" id="mindmap-container">
                <!-- Mind map will be generated here -->
            </div>
        </section>

        <!-- Peaks Gallery -->
        <section class="peaks-gallery-section">
            <h2><i class="fas fa-mountain"></i> Major Peaks</h2>
            <div class="peaks-gallery" id="peaks-gallery">
                <!-- Peaks cards will be generated here -->
            </div>
        </section>

        <!-- Photo Gallery -->
        <section class="photo-gallery-section">
            <h2><i class="fas fa-images"></i> Photo Gallery</h2>
            <div class="photo-gallery" id="photo-gallery">
                <!-- Photos will be loaded here -->
            </div>
        </section>

        <!-- Rivers Section -->
        <section class="rivers-section">
            <h2><i class="fas fa-water"></i> Rivers Originating Here</h2>
            <div class="rivers-list" id="rivers-list">
                <!-- Rivers will be loaded here -->
            </div>
        </section>

        <!-- Related Mountains -->
        <section class="related-section">
            <h2><i class="fas fa-link"></i> Related Mountain Ranges</h2>
            <div class="related-mountains" id="related-mountains">
                <!-- Related mountains will be loaded here -->
            </div>
        </section>
    </main>

    <!-- Fly Over Modal -->
    <div class="flyover-modal" id="flyover-modal">
        <div class="flyover-content">
            <button class="close-flyover"><i class="fas fa-times"></i></button>
            <h2>Fly Over <span id="flyover-name"></span></h2>
            <div class="flyover-slideshow" id="flyover-slideshow">
                <!-- Flyover images will be loaded here -->
            </div>
            <div class="flyover-controls">
                <button class="flyover-btn" id="prev-slide"><i class="fas fa-chevron-left"></i></button>
                <div class="flyover-progress">
                    <div class="progress-bar" id="flyover-progress"></div>
                </div>
                <button class="flyover-btn" id="next-slide"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="flyover-info" id="flyover-info">
                <h3>Current View</h3>
                <p id="flyover-description"></p>
            </div>
        </div>
    </div>

    <!-- Peak Detail Modal -->
    <div class="peak-modal" id="peak-modal">
        <div class="peak-modal-content">
            <button class="close-peak-modal"><i class="fas fa-times"></i></button>
            <div class="peak-modal-body" id="peak-modal-body">
                <!-- Peak details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="profile-footer">
        <div class="footer-content">
            <p>&copy; 2024 Mountain Systems Explorer | Geography Learning App</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data/mountains-data-1.js"></script>
    <script src="data/mountains-data-2.js"></script>
    <script src="data/mountains-data-3.js"></script>
    <script src="data/mountains-data-4.js"></script>
    <script src="data/mountains-data-5.js"></script>
    <script src="mountains-data.js"></script>
    <script src="mountains-app.js"></script>
</body>
</html>
