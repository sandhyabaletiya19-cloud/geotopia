<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEOTOPIA - Working Test</title>
    
    <!-- THREE.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        #app {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* HEADER */
        .header {
            height: 60px;
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #333;
            z-index: 100;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4a9eff;
            text-shadow: 0 0 10px rgba(74, 158, 255, 0.5);
        }
        
        .year-display {
            font-size: 18px;
            color: #fff;
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 20px;
        }
        
        /* MAP CONTAINER - THE KEY FIX */
        #map-container {
            flex: 1;
            width: 100%;
            min-height: 400px;
            position: relative;
            background: #000011;
        }
        
        #map-container canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }
        
        /* TIMELINE */
        .timeline {
            height: 120px;
            background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%);
            padding: 15px 20px;
            border-top: 1px solid #333;
        }
        
        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .timeline-controls {
            display: flex;
            gap: 10px;
        }
        
        .timeline-controls button {
            background: rgba(74, 158, 255, 0.2);
            border: 1px solid #4a9eff;
            color: #4a9eff;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .timeline-controls button:hover {
            background: rgba(74, 158, 255, 0.4);
        }
        
        .timeline-track {
            width: 100%;
            height: 30px;
            background: linear-gradient(90deg, 
                #ff4500 0%, 
                #8b0000 11%, 
                #4b0082 33%, 
                #006400 45%, 
                #228b22 65%, 
                #4169e1 100%
            );
            border-radius: 15px;
            position: relative;
            cursor: pointer;
        }
        
        .timeline-handle {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 40px;
            background: #fff;
            border-radius: 10px;
            cursor: grab;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        
        .era-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 11px;
            color: #888;
        }
        
        /* INFO OVERLAY */
        .info-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px 20px;
            border-radius: 10px;
            color: #fff;
            z-index: 10;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .info-overlay h3 {
            color: #4a9eff;
            margin-bottom: 5px;
        }
        
        /* LOADING SCREEN */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }
        
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-title {
            font-size: 48px;
            color: #4a9eff;
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(74, 158, 255, 0.8);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading-bar {
            width: 300px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff4500, #4a9eff);
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        
        .loading-text {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- LOADING SCREEN -->
    <div id="loading-screen">
        <div class="loading-title">🌍 GEOTOPIA</div>
        <div class="loading-bar">
            <div class="loading-bar-fill" id="loading-bar-fill"></div>
        </div>
        <div class="loading-text" id="loading-text">Initializing...</div>
    </div>

    <!-- MAIN APP -->
    <div id="app">
        <!-- HEADER -->
        <header class="header">
            <div class="logo">🌍 GEOTOPIA</div>
            <div class="year-display" id="year-display">4.5 Billion Years Ago</div>
        </header>
        
        <!-- MAP -->
        <div id="map-container">
            <div class="info-overlay">
                <h3 id="era-name">Hadean Eon</h3>
                <p id="era-description">Earth is forming from cosmic debris</p>
            </div>
        </div>
        
        <!-- TIMELINE -->
        <div class="timeline">
            <div class="timeline-header">
                <div class="timeline-controls">
                    <button id="btn-beginning">⏮️ Start</button>
                    <button id="btn-play">▶️ Play</button>
                    <button id="btn-end">⏭️ Now</button>
                </div>
                <div id="current-year-label">4.5 Ga</div>
            </div>
            <div class="timeline-track" id="timeline-track">
                <div class="timeline-handle" id="timeline-handle" style="left: 0%;"></div>
            </div>
            <div class="era-labels">
                <span>Hadean</span>
                <span>Archean</span>
                <span>Proterozoic</span>
                <span>Paleozoic</span>
                <span>Mesozoic</span>
                <span>Cenozoic</span>
                <span>Now</span>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // GEOTOPIA - COMPLETE WORKING VERSION
        // ============================================================
        
        // Global state
        let scene, camera, renderer, globe;
        let currentYear = -4500000000;
        let isPlaying = false;
        let isDragging = false;
        
        // Era definitions
        const eras = [
            { name: 'Hadean', start: -4500000000, end: -4000000000, color: 0xff4500, desc: 'Molten Earth, Moon formation' },
            { name: 'Archean', start: -4000000000, end: -2500000000, color: 0x8b0000, desc: 'First continents, first life' },
            { name: 'Proterozoic', start: -2500000000, end: -541000000, color: 0x4b0082, desc: 'Oxygen rises, complex life' },
            { name: 'Paleozoic', start: -541000000, end: -252000000, color: 0x006400, desc: 'Cambrian explosion, fish, forests' },
            { name: 'Mesozoic', start: -252000000, end: -66000000, color: 0x228b22, desc: 'Age of dinosaurs' },
            { name: 'Cenozoic', start: -66000000, end: 2024, color: 0x4169e1, desc: 'Age of mammals, humans' }
        ];
        
        // ============================================================
        // LOADING SEQUENCE
        // ============================================================
        
        async function startLoading() {
            const loadingBar = document.getElementById('loading-bar-fill');
            const loadingText = document.getElementById('loading-text');
            
            const steps = [
                { text: 'Creating universe...', progress: 20 },
                { text: 'Forming solar system...', progress: 40 },
                { text: 'Cooling Earth...', progress: 60 },
                { text: 'Adding oceans...', progress: 80 },
                { text: 'Ready!', progress: 100 }
            ];
            
            for (const step of steps) {
                loadingText.textContent = step.text;
                loadingBar.style.width = step.progress + '%';
                await sleep(500);
            }
            
            await sleep(500);
            
            // Initialize the 3D scene
            initScene();
            
            // Hide loading screen
            document.getElementById('loading-screen').classList.add('hidden');
        }
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        // ============================================================
        // 3D SCENE INITIALIZATION
        // ============================================================
        
        function initScene() {
            const container = document.getElementById('map-container');
            
            // Get actual dimensions
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            console.log('Container size:', width, 'x', height);
            
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000011);
            
            // Camera
            camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
            camera.position.z = 5;
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);
            
            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 3, 5);
            scene.add(directionalLight);
            
            // Stars
            addStars();
            
            // Globe
            createGlobe();
            
            // Controls
            setupControls();
            
            // Timeline
            setupTimeline();
            
            // Start animation
            animate();
            
            // Handle resize
            window.addEventListener('resize', onResize);
            
            // Render first frame
            updateForYear(currentYear);
            
            console.log('✅ Scene initialized!');
        }
        
        function addStars() {
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 3000;
            const positions = new Float32Array(starCount * 3);
            
            for (let i = 0; i < starCount * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 200;
            }
            
            starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const starMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.1,
                transparent: true,
                opacity: 0.8
            });
            
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
        }
        
        function createGlobe() {
            const geometry = new THREE.SphereGeometry(2, 64, 64);
            const material = new THREE.MeshPhongMaterial({
                color: 0xff4500,  // Start molten
                emissive: 0x8b0000,
                emissiveIntensity: 0.5,
                shininess: 30
            });
            
            globe = new THREE.Mesh(geometry, material);
            scene.add(globe);
            
            // Add atmosphere
            const atmosphereGeometry = new THREE.SphereGeometry(2.1, 64, 64);
            const atmosphereMaterial = new THREE.MeshBasicMaterial({
                color: 0xff6600,
                transparent: true,
                opacity: 0.2,
                side: THREE.BackSide
            });
            const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
            scene.add(atmosphere);
        }
        
        function setupControls() {
            let previousMouse = { x: 0, y: 0 };
            let rotation = { x: 0, y: 0 };
            
            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMouse = { x: e.clientX, y: e.clientY };
                renderer.domElement.style.cursor = 'grabbing';
            });
            
            renderer.domElement.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMouse.x;
                    const deltaY = e.clientY - previousMouse.y;
                    
                    rotation.y += deltaX * 0.005;
                    rotation.x += deltaY * 0.005;
                    rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotation.x));
                    
                    globe.rotation.y = rotation.y;
                    globe.rotation.x = rotation.x;
                    
                    previousMouse = { x: e.clientX, y: e.clientY };
                }
            });
            
            renderer.domElement.addEventListener('mouseup', () => {
                isDragging = false;
                renderer.domElement.style.cursor = 'grab';
            });
            
            renderer.domElement.addEventListener('mouseleave', () => {
                isDragging = false;
                renderer.domElement.style.cursor = 'grab';
            });
            
            renderer.domElement.addEventListener('wheel', (e) => {
                e.preventDefault();
                camera.position.z = Math.max(3, Math.min(10, camera.position.z + e.deltaY * 0.01));
            });
            
            renderer.domElement.style.cursor = 'grab';
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            // Auto-rotate when not dragging
            if (!isDragging) {
                globe.rotation.y += 0.001;
            }
            
            renderer.render(scene, camera);
        }
        
        function onResize() {
            const container = document.getElementById('map-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }
        
        // ============================================================
        // TIMELINE
        // ============================================================
        
        function setupTimeline() {
            const track = document.getElementById('timeline-track');
            const handle = document.getElementById('timeline-handle');
            
            // Click on track
            track.addEventListener('click', (e) => {
                const rect = track.getBoundingClientRect();
                const position = (e.clientX - rect.left) / rect.width;
                goToPosition(position);
            });
            
            // Drag handle
            let draggingTimeline = false;
            
            handle.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                draggingTimeline = true;
            });
            
            document.addEventListener('mousemove', (e) => {
                if (draggingTimeline) {
                    const rect = track.getBoundingClientRect();
                    let position = (e.clientX - rect.left) / rect.width;
                    position = Math.max(0, Math.min(1, position));
                    goToPosition(position);
                }
            });
            
            document.addEventListener('mouseup', () => {
                draggingTimeline = false;
            });
            
            // Buttons
            document.getElementById('btn-beginning').addEventListener('click', () => {
                goToPosition(0);
            });
            
            document.getElementById('btn-end').addEventListener('click', () => {
                goToPosition(1);
            });
            
            document.getElementById('btn-play').addEventListener('click', togglePlay);
        }
        
        function goToPosition(position) {
            // Logarithmic scale for 4.5 billion years
            const minYear = -4500000000;
            const maxYear = 2024;
            
            // Convert position to year using log scale
            const logMin = Math.log10(Math.abs(minYear) + 1);
            const logMax = Math.log10(Math.abs(maxYear) + 1);
            const logValue = logMin + (logMax - logMin) * position;
            
            currentYear = position < 0.99 
                ? -(Math.pow(10, logValue) - 1)
                : maxYear - (1 - position) * 10000;
            
            updateForYear(currentYear);
            
            // Update handle position
            document.getElementById('timeline-handle').style.left = (position * 100) + '%';
        }
        
        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('btn-play');
            btn.textContent = isPlaying ? '⏸️ Pause' : '▶️ Play';
            
            if (isPlaying) {
                playTimeline();
            }
        }
        
        function playTimeline() {
            if (!isPlaying) return;
            
            // Move forward in time
            const handle = document.getElementById('timeline-handle');
            let currentPos = parseFloat(handle.style.left) || 0;
            currentPos += 0.1; // 0.1% per frame
            
            if (currentPos >= 100) {
                currentPos = 100;
                isPlaying = false;
                document.getElementById('btn-play').textContent = '▶️ Play';
            }
            
            goToPosition(currentPos / 100);
            
            setTimeout(playTimeline, 50);
        }
        
        // ============================================================
        // UPDATE FOR YEAR
        // ============================================================
        
        function updateForYear(year) {
            currentYear = year;
            
            // Find current era
            const era = eras.find(e => year >= e.start && year < e.end) || eras[eras.length - 1];
            
            // Update globe color
            updateGlobeForEra(era, year);
            
            // Update UI
            document.getElementById('year-display').textContent = formatYear(year);
            document.getElementById('current-year-label').textContent = formatYear(year);
            document.getElementById('era-name').textContent = era.name + ' Eon';
            document.getElementById('era-description').textContent = era.desc;
        }
        
        function updateGlobeForEra(era, year) {
            const index = eras.indexOf(era);
            
            let color, emissive, emissiveIntensity, atmosphereColor, atmosphereOpacity;
            
            switch (era.name) {
                case 'Hadean':
                    color = 0xff4500;
                    emissive = 0x8b0000;
                    emissiveIntensity = 0.6;
                    atmosphereColor = 0xff6600;
                    atmosphereOpacity = 0.3;
                    break;
                case 'Archean':
                    color = 0x4a3728;
                    emissive = 0x2a1a08;
                    emissiveIntensity = 0.3;
                    atmosphereColor = 0x553311;
                    atmosphereOpacity = 0.2;
                    break;
                case 'Proterozoic':
                    color = 0x2a4a6a;
                    emissive = 0x1a3a5a;
                    emissiveIntensity = 0.2;
                    atmosphereColor = 0x4466aa;
                    atmosphereOpacity = 0.15;
                    break;
                case 'Paleozoic':
                    color = 0x2a6a3a;
                    emissive = 0x1a4a2a;
                    emissiveIntensity = 0.15;
                    atmosphereColor = 0x66aa88;
                    atmosphereOpacity = 0.1;
                    break;
                case 'Mesozoic':
                    color = 0x3a8a4a;
                    emissive = 0x2a6a3a;
                    emissiveIntensity = 0.1;
                    atmosphereColor = 0x88cc99;
                    atmosphereOpacity = 0.1;
                    break;
                case 'Cenozoic':
                default:
                    color = 0x4a9eff;
                    emissive = 0x2a5faf;
                    emissiveIntensity = 0.1;
                    atmosphereColor = 0x88ccff;
                    atmosphereOpacity = 0.1;
                    break;
            }
            
            // Update globe material
            globe.material.color.setHex(color);
            globe.material.emissive.setHex(emissive);
            globe.material.emissiveIntensity = emissiveIntensity;
            
            // Update atmosphere (second child after lights and stars)
            const atmosphere = scene.children.find(c => 
                c.type === 'Mesh' && c !== globe && c.geometry.parameters.radius > 2
            );
            if (atmosphere) {
                atmosphere.material.color.setHex(atmosphereColor);
                atmosphere.material.opacity = atmosphereOpacity;
            }
        }
        
        function formatYear(year) {
            const absYear = Math.abs(year);
            
            if (absYear >= 1000000000) {
                return (absYear / 1000000000).toFixed(1) + ' Ga';
            }
            if (absYear >= 1000000) {
                return (absYear / 1000000).toFixed(1) + ' Ma';
            }
            if (absYear >= 1000) {
                return (absYear / 1000).toFixed(0) + 'K ' + (year < 0 ? 'BCE' : 'CE');
            }
            if (year < 0) {
                return Math.round(absYear) + ' BCE';
            }
            return Math.round(year) + ' CE';
        }
        
        // ============================================================
        // START EVERYTHING
        // ============================================================
        
        window.addEventListener('DOMContentLoaded', startLoading);
    </script>
</body>
</html>
