<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
</head>
<body>
    <h1>JavaScript Test</h1>
    
    <button onclick="testClick()">CLICK ME</button>
    
    <div id="result" style="font-size: 30px; color: red; margin-top: 20px;"></div>

    <script>
        function testClick() {
            document.getElementById('result').innerHTML = 'SUCCESS! JavaScript is working!';
            alert('Button clicked!');
        }
    </script>
</body>
</html>
